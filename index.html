<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TWINS v2.0 - SMART DESPACHOS</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root {
            --bg: #121826; /* Azul pizarra suave */
            --surface: #1f2937; /* Gris azulado para tarjetas */
            --accent: #3b82f6; /* Azul brillante moderno */
            --text: #f9fafb;
            --text-dim: #9ca3af;
            --border: #374151;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
        }

        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; outline: none; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; line-height: 1.5; }

        /* HEADER PREMIUM */
        .top-header { 
            position: sticky; top: 0; z-index: 1000; 
            background: rgba(18, 24, 38, 0.85); backdrop-filter: blur(12px);
            padding: 15px 20px; display: flex; justify-content: space-between; 
            align-items: center; border-bottom: 1px solid var(--border);
        }

        .page { display: none; padding: 15px 15px 110px 15px; max-width: 550px; margin: 0 auto; animation: slideUp 0.3s ease-out; }
        .active { display: block !important; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* CARDS SMART */
        .card { 
            background: var(--surface); border: 1px solid var(--border); 
            border-radius: 24px; padding: 20px; margin-bottom: 15px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        /* STATS BANNER */
        .stat-banner { 
            background: linear-gradient(135deg, #2563eb, #1e40af); 
            padding: 25px; border-radius: 28px; color: white; 
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 20px; box-shadow: 0 10px 20px -5px rgba(37, 99, 235, 0.3);
        }
        .stat-val { font-size: 44px; font-weight: 800; letter-spacing: -1px; line-height: 1; }
        .stat-label { font-size: 11px; font-weight: 700; text-transform: uppercase; opacity: 0.9; margin-bottom: 4px; }

        /* INPUTS MODERNOS */
        input, select { 
            background: #111827; border: 1.5px solid var(--border); 
            padding: 16px; border-radius: 16px; color: white; 
            font-size: 15px; width: 100%; margin-bottom: 12px; transition: 0.2s;
        }
        input:focus { border-color: var(--accent); background: #000; }

        /* BOTONES */
        .btn { border: none; border-radius: 16px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s; }
        .btn:active { transform: scale(0.96); }
        .btn-add { background: var(--accent); color: white; padding: 16px; font-size: 15px; }
        .btn-save { background: var(--success); color: white; padding: 20px; width: 100%; font-size: 17px; margin-top: 10px; }

        /* NAVEGACIÓN ESTILO IOS/ANDROID 14 */
        .nav-bar { 
            position: fixed; bottom: 20px; left: 15px; right: 15px; 
            background: rgba(31, 41, 55, 0.95); backdrop-filter: blur(20px);
            height: 75px; border-radius: 26px; display: flex; 
            border: 1px solid rgba(255,255,255,0.1); z-index: 2000;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .nav-item { 
            flex: 1; display: flex; flex-direction: column; align-items: center; 
            justify-content: center; color: var(--text-dim); background: none; 
            border: none; font-size: 11px; font-weight: 600; position: relative;
        }
        .nav-item i { font-size: 24px; margin-bottom: 4px; }
        .nav-item.active { color: var(--accent); }
        .nav-indicator { 
            position: absolute; top: 0; width: 30px; height: 4px; 
            background: var(--accent); border-radius: 0 0 4px 4px;
            box-shadow: 0 2px 10px var(--accent); transition: 0.3s;
        }

        /* HISTORIAL */
        .history-card { border-left: 5px solid var(--accent); }
        .tag { font-size: 10px; font-weight: 800; padding: 4px 10px; border-radius: 8px; background: rgba(255,255,255,0.1); }
    </style>
</head>
<body>

    <header id="app-header" class="top-header" style="display:none">
        <div style="font-weight:800; font-size: 20px; letter-spacing: -0.5px">TWINS <span style="color:var(--accent)">SMART</span></div>
        <div id="user-info" onclick="logout()" style="font-size:12px; font-weight:700; background:var(--border); padding:8px 16px; border-radius:50px;">---</div>
    </header>

    <div id="page-login" class="page active">
        <div style="text-align:center; padding:60px 0">
            <div style="background: var(--accent); width: 80px; height: 80px; border-radius: 24px; display: flex; align-items: center; justify-content: center; margin: 0 auto; box-shadow: 0 10px 20px rgba(59, 130, 246, 0.4)">
                <i class="ph-fill ph-package" style="font-size:45px; color:white"></i>
            </div>
            <h2 style="margin-top:24px; font-weight: 800; font-size: 28px">Bienvenido</h2>
            <p style="color: var(--text-dim)">Gestión de Inventario y Despacho</p>
        </div>
        <div id="login-options" style="display:grid; gap:14px"></div>
    </div>

    <div id="page-route" class="page">
        <div class="stat-banner">
            <div>
                <div class="stat-label">Carga en Curso</div>
                <div id="count-cajas" class="stat-val">0</div>
            </div>
            <div style="text-align:right">
                <div class="stat-label">Paradas</div>
                <div id="count-puntos" style="font-size:26px; font-weight:800">0</div>
                <button onclick="clearAll()" style="background:rgba(255,255,255,0.2); border:none; color:white; padding:6px 14px; border-radius:12px; font-size:11px; font-weight:700; margin-top:8px">LIMPIAR</button>
            </div>
        </div>

        <div class="card">
            <input type="text" id="inp-cli" placeholder="Nombre del Cliente">
            <div style="display:flex; gap:12px">
                <input type="number" id="inp-can" placeholder="Cant. Cajas" style="flex:0.6">
                <button class="btn btn-add" onclick="addPoint()" style="flex:1.4">AÑADIR A RUTA</button>
            </div>
        </div>

        <div id="list-container" style="display:none">
            <div id="live-list" style="margin-bottom:20px"></div>
            <div class="card">
                <h4 style="margin:0 0 15px 0; font-size: 13px; color: var(--text-dim)">ASIGNACIÓN DE EQUIPO</h4>
                <select id="sel-pla" onchange="predictAndSave()"></select>
                <div style="display:flex; gap:12px">
                    <select id="sel-cho" onchange="persist()"></select>
                    <select id="sel-aux" onchange="persist()"></select>
                </div>
                <button class="btn btn-save" onclick="openConfirm()">GUARDAR DESPACHO</button>
            </div>
        </div>
    </div>

    <div id="page-history" class="page">
        <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:12px; margin-bottom:20px">
            <div class="card" style="margin:0; text-align:center; padding:15px"><div class="stat-label">Día</div><div id="st-day" style="font-size:22px; font-weight:800; color:var(--accent)">0</div></div>
            <div class="card" style="margin:0; text-align:center; padding:15px"><div class="stat-label">Mes</div><div id="st-month" style="font-size:22px; font-weight:800">0</div></div>
            <div class="card" style="margin:0; text-align:center; padding:15px"><div class="stat-label">Ptos</div><div id="st-pts" style="font-size:22px; font-weight:800; color:var(--success)">0</div></div>
        </div>
        <div style="display:flex; gap:10px; margin-bottom:20px">
            <input type="date" id="filter-date" onchange="renderHistory()" style="margin:0">
        </div>
        <div id="history-feed"></div>
    </div>

    <div id="page-fleet" class="page">
        <h3 style="margin-bottom:20px">Estado de Unidades</h3>
        <div id="fleet-grid"></div>
    </div>

    <div id="page-stats" class="page">
        <div class="card">
            <h4 style="margin-top:0">Rendimiento Mensual</h4>
            <div style="height:250px"><canvas id="c-cho"></canvas></div>
        </div>
        <button class="btn" style="background:var(--danger); color:white; width:100%; padding:18px" onclick="generatePDF()">
            <i class="ph ph-file-pdf"></i> EXPORTAR REPORTE PDF
        </button>
    </div>

    <nav id="app-nav" class="nav-bar" style="display:none">
        <div id="nav-ind" class="nav-indicator"></div>
        <button class="nav-item active" id="n-route" onclick="go('page-route', 0)"><i class="ph ph-layout"></i>HOJA</button>
        <button class="nav-item" id="n-history" onclick="go('page-history', 1)"><i class="ph ph-clock-counter-clockwise"></i>DATA</button>
        <button class="nav-item" id="n-fleet" onclick="go('page-fleet', 2)"><i class="ph ph-truck"></i>FLOTA</button>
        <button class="nav-item" id="n-stats" style="display:none" onclick="go('page-stats', 3)"><i class="ph ph-chart-line"></i>STATS</button>
    </nav>

    <div id="modal-confirm" style="display:none; position:fixed; inset:0; background:rgba(18,24,38,0.95); z-index:3000; align-items:center; justify-content:center; padding:20px; backdrop-filter:blur(10px)">
        <div class="card" style="width:100%; max-width:380px; text-align:center; padding:30px">
            <h2 style="margin-top:0">¿Cuándo sale?</h2>
            <p style="color:var(--text-dim); margin-bottom:25px">Selecciona la fecha de despacho</p>
            <button class="btn btn-save" onclick="finalize('HOY')" style="margin-bottom:12px">SALIENDO AHORA</button>
            <button class="btn" style="background:var(--border); color:white; width:100%; padding:18px; margin-bottom:20px" onclick="finalize('MAÑANA')">PARA MAÑANA</button>
            <button onclick="closeConfirm()" style="background:none; border:none; color:var(--text-dim); font-weight:700">VOLVER</button>
        </div>
    </div>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbxCRMbdOGYjf0R-w1v9tHG76jDhHXxuXOwHahYEV7Gj1lFn3y42C2s9DUO5nkgO75qy/exec";
        let activeUser = "", currentCarga = [], db = [], editIdx = null;

        const DATA = {
            placas: ["CEP-929", "BPN-711", "BVN-704", "BUL-742", "BVN-930"],
            choferes: ["TAJHO", "LUIS H.", "ROMARIO", "CESAR C.", "WALDIR", "MARCELO"],
            auxiliares: ["Cristopher", "Plácido", "Martin", "Percy", "Rodolfo", "Ricardo", "Elio", "Daniel C.", "Jofer", "Nelson", "Julio"],
            soats: { "CEP-929": "2026-07-22", "BPN-711": "2026-06-10", "BVN-704": "2026-07-02", "BUL-742": "2026-04-02", "BVN-930": "2026-07-02" }
        };

        window.onload = () => {
            setupUI();
            const savedUser = localStorage.getItem('tw_logged');
            if(savedUser) login(savedUser);
            if(localStorage.getItem('tw_temp_carga')) {
                currentCarga = JSON.parse(localStorage.getItem('tw_temp_carga'));
                refreshCargaUI();
                document.getElementById('sel-pla').value = localStorage.getItem('tw_temp_pla') || "";
                document.getElementById('sel-cho').value = localStorage.getItem('tw_temp_cho') || "";
                document.getElementById('sel-aux').value = localStorage.getItem('tw_temp_aux') || "";
            }
            syncData();
        };

        function setupUI() {
            const grid = document.getElementById('login-options');
            ['TAJHO ADMIN', 'FRANCESCO', 'OSCAR', 'LUIS HERBER'].forEach(u => grid.innerHTML += `<button class="btn" style="background:var(--surface); border:1.5px solid var(--border); color:white; padding:20px; font-size:16px" onclick="login('${u}')">${u}</button>`);
            document.getElementById('sel-pla').innerHTML = '<option value="">Seleccionar Unidad</option>' + DATA.placas.map(p => `<option value="${p}">${p}</option>`).join('');
            document.getElementById('sel-cho').innerHTML = '<option value="">Chofer</option>' + DATA.choferes.map(c => `<option value="${c}">${c}</option>`).join('');
            document.getElementById('sel-aux').innerHTML = '<option value="">Auxiliar</option>' + DATA.auxiliares.map(a => `<option value="${a}">${a}</option>`).join('');
            document.getElementById('filter-date').value = new Date().toLocaleDateString('en-CA');
        }

        async function syncData() {
            try {
                const res = await fetch(API);
                db = await res.json();
                localStorage.setItem('tw_db', JSON.stringify(db));
                renderHistory(); renderFleet();
            } catch(e) {
                db = JSON.parse(localStorage.getItem('tw_db') || "[]");
                renderHistory(); renderFleet();
            }
        }

        function login(u) { 
            activeUser = u; 
            localStorage.setItem('tw_logged', u); 
            document.getElementById('page-login').classList.remove('active'); 
            document.getElementById('app-header').style.display = 'flex'; 
            document.getElementById('app-nav').style.display = 'flex'; 
            document.getElementById('user-info').innerText = u; 
            if(u === "TAJHO ADMIN") document.getElementById('n-stats').style.display = "flex"; 
            go('page-route', 0); 
        }

        function go(id, idx) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            const items = Array.from(document.querySelectorAll('.nav-item')).filter(i => i.style.display !== 'none');
            const realIdx = items.findIndex(i => i.id === 'n-' + id.split('-')[1]);
            document.getElementById('nav-ind').style.left = `calc(${realIdx * (100/items.length)}% + (${100/items.length}% - 30px) / 2)`;
            if(id === 'page-stats') setTimeout(drawCharts, 100);
        }

        function addPoint() {
            const cli = document.getElementById('inp-cli').value.toUpperCase();
            const can = parseInt(document.getElementById('inp-can').value);
            if(!cli || !can) return;
            currentCarga.push({ cli, can });
            document.getElementById('inp-cli').value = ""; document.getElementById('inp-can').value = "";
            persist(); refreshCargaUI();
        }

        function refreshCargaUI() {
            const container = document.getElementById('live-list');
            let total = 0; container.innerHTML = "";
            currentCarga.forEach((item, i) => {
                total += item.can;
                container.innerHTML += `<div class="card" style="padding:15px; margin-bottom:8px; display:flex; justify-content:space-between; align-items:center; background:#111827"><div><b style="color:var(--accent)">${item.can}</b> <span style="font-size:14px; margin-left:10px">${item.cli}</span></div><i class="ph ph-trash-simple" style="color:var(--danger); font-size:20px" onclick="removePoint(${i})"></i></div>`;
            });
            document.getElementById('count-cajas').innerText = total;
            document.getElementById('count-puntos').innerText = currentCarga.length;
            document.getElementById('list-container').style.display = currentCarga.length > 0 ? 'block' : 'none';
        }

        function renderHistory() {
            const container = document.getElementById('history-feed');
            const selDate = document.getElementById('filter-date').value;
            let h = "", dTotal = 0, mTotal = 0, mPts = 0;
            const now = new Date(selDate + "T12:00:00");

            db.forEach((r, i) => {
                const rD = new Date(r.fecha + "T12:00:00");
                const pts = r.puntos || r.items.split(',').length;
                if(rD.getMonth() === now.getMonth()) { mTotal += parseFloat(r.total); mPts += pts; }
                if(r.fecha === selDate) {
                    dTotal += parseFloat(r.total);
                    h += `<div class="card history-card">
                        <div style="display:flex; justify-content:space-between; margin-bottom:10px"><span class="tag">${r.hora}</span><span class="tag" style="color:var(--accent)">${r.placa}</span></div>
                        <div style="font-size:18px; font-weight:800; margin-bottom:4px">${r.total} Cajas</div>
                        <div style="color:var(--text-dim); font-size:13px; margin-bottom:15px">${r.chofer} • ${r.auxiliar}</div>
                        <div id="det-${i}" style="display:none; background:#111827; padding:15px; border-radius:15px; font-size:12px; margin-bottom:15px; border:1px solid var(--border)">${r.items.split(',').join('<br>')}</div>
                        <div style="display:grid; grid-template-columns: 1fr 50px 50px; gap:10px">
                            <button class="btn" style="background:var(--border); color:white; font-size:12px" onclick="toggleDet(${i})">VER RUTA</button>
                            <button class="btn" style="background:var(--border)" onclick="loadEdit(${i})"><i class="ph ph-pencil-simple"></i></button>
                            <button class="btn" style="background:#128C7E; color:white" onclick="shareWA('${r.placa}','${r.total}','${r.items}')"><i class="ph-fill ph-whatsapp-logo"></i></button>
                        </div>
                    </div>`;
                }
            });
            container.innerHTML = h || `<div style="text-align:center; padding:40px; opacity:0.5">Sin despachos este día</div>`;
            document.getElementById('st-day').innerText = dTotal;
            document.getElementById('st-month').innerText = mTotal;
            document.getElementById('st-pts').innerText = mPts;
        }

        function renderFleet() {
            document.getElementById('fleet-grid').innerHTML = DATA.placas.map(p => {
                const d = Math.ceil((new Date(DATA.soats[p]) - new Date()) / 86400000);
                return `<div class="card" style="display:flex; justify-content:space-between; align-items:center"><div><b style="font-size:18px">${p}</b><br><small style="color:var(--text-dim)">SOAT: ${DATA.soats[p]}</small></div><div style="text-align:right"><div style="font-size:20px; font-weight:800; color:${d<30?'var(--danger)':'var(--success)'}">${d}</div><small style="font-size:9px; font-weight:800; opacity:0.6">DÍAS</small></div></div>`;
            }).join('');
        }

        function drawCharts() {
            const stats = {};
            db.forEach(r => stats[r.chofer] = (stats[r.chofer] || 0) + parseFloat(r.total));
            const ctx = document.getElementById('c-cho');
            if(window.myChart) window.myChart.destroy();
            window.myChart = new Chart(ctx, {
                type: 'bar',
                data: { labels: Object.keys(stats), datasets: [{ data: Object.values(stats), backgroundColor: '#3b82f6', borderRadius: 8 }] },
                options: { indexAxis: 'y', maintainAspectRatio: false, plugins: { legend: false }, scales: { x: { grid: { display: false } }, y: { grid: { display: false } } } }
            });
        }

        function toggleDet(i) { const d = document.getElementById(`det-${i}`); d.style.display = d.style.display === 'none' ? 'block' : 'none'; }
        function persist() { localStorage.setItem('tw_temp_carga', JSON.stringify(currentCarga)); localStorage.setItem('tw_temp_pla', document.getElementById('sel-pla').value); localStorage.setItem('tw_temp_cho', document.getElementById('sel-cho').value); localStorage.setItem('tw_temp_aux', document.getElementById('sel-aux').value); }
        function removePoint(i) { currentCarga.splice(i,1); persist(); refreshCargaUI(); }
        function openConfirm() { document.getElementById('modal-confirm').style.display = 'flex'; }
        function closeConfirm() { document.getElementById('modal-confirm').style.display = 'none'; }
        function clearAll() { currentCarga = []; localStorage.removeItem('tw_temp_carga'); refreshCargaUI(); }
        function logout() { localStorage.clear(); location.reload(); }
        function predictAndSave() { const l = db.find(r => r.placa === document.getElementById('sel-pla').value); if(l) { document.getElementById('sel-cho').value = l.chofer; document.getElementById('sel-aux').value = l.auxiliar; } persist(); }
        function shareWA(p, t, i) { window.location.href = `https://wa.me/?text=*📦 TWINS DESPACHOS*%0A*Placa:* ${p}%0A*Cajas:* ${t}%0A*Ruta:*%0A${i.split(", ").join("%0A")}`; }

        async function finalize(tipo) {
            let f = new Date(); if(tipo === 'MAÑANA') f.setDate(f.getDate() + 1);
            const r = {
                fecha: f.toLocaleDateString('en-CA'),
                hora: new Date().toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' }),
                placa: document.getElementById('sel-pla').value,
                chofer: document.getElementById('sel-cho').value,
                auxiliar: document.getElementById('sel-aux').value,
                items: currentCarga.map(i => `${i.cli}: ${i.can}`).join(", "),
                total: currentCarga.reduce((a,b) => a + b.can, 0),
                puntos: currentCarga.length,
                operario: activeUser
            };
            fetch(API, { method: 'POST', mode: 'no-cors', body: JSON.stringify(r) });
            db.unshift(r); localStorage.setItem('tw_db', JSON.stringify(db));
            clearAll(); closeConfirm(); go('page-history', 1);
        }

        function loadEdit(i) {
            const r = db[i]; 
            currentCarga = r.items.split(", ").map(it => { const [cli, can] = it.split(": "); return { cli, can: parseInt(can) }; });
            document.getElementById('sel-pla').value = r.placa;
            document.getElementById('sel-cho').value = r.chofer;
            document.getElementById('sel-aux').value = r.auxiliar;
            refreshCargaUI(); go('page-route', 0);
        }

        function generatePDF() {
            const { jsPDF } = window.jspdf; const doc = new jsPDF();
            doc.text("REPORTE TWINS", 14, 20);
            doc.autoTable({ head: [['Fecha', 'Unidad', 'Chofer', 'Cajas']], body: db.map(r => [r.fecha, r.placa, r.chofer, r.total]), startY: 30 });
            doc.save("Reporte.pdf");
        }
    </script>
</body>
</html>
