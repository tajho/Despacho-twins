<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TWINS ELITE - V25 CLARITY</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root {
            --bg: #f8fafc; --surface: #ffffff; --accent: #0062ff; 
            --text-main: #0f172a; --text-dim: #64748b; --border: #e2e8f0; 
            --success: #10b981; --danger: #f43f5e; --shadow: rgba(0,0,0,0.05);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; transition: 0.2s ease; }
        body { margin: 0; background: var(--bg); color: var(--text-main); font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; }
        
        /* Contenedores */
        .page { display: none; height: 100vh; overflow-y: auto; padding: 15px 20px 140px 20px; max-width: 500px; margin: 0 auto; }
        .active { display: block !important; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        /* Header Moderno */
        .top-header { position: sticky; top: 0; z-index: 1000; background: rgba(255,255,255,0.85); backdrop-filter: blur(15px); padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .logo { font-weight: 800; font-size: 20px; color: var(--text-main); }
        .logo span { color: var(--accent); }

        /* Tarjetas Estilo "Soft" */
        .card { background: var(--surface); border-radius: 22px; padding: 20px; border: 1px solid var(--border); margin-bottom: 16px; box-shadow: 0 4px 12px var(--shadow); position: relative; }
        .card:active { transform: scale(0.98); }
        
        .h-header { display: flex; justify-content: space-between; align-items: flex-start; }
        .h-header b { font-size: 19px; font-weight: 800; color: var(--text-main); }
        .cjs-badge { background: #ecfdf5; color: var(--success); padding: 6px 14px; border-radius: 12px; font-weight: 800; font-size: 15px; }

        /* Buscador Inteligente - Diseño Claro */
        .search-area { position: sticky; top: 0; background: var(--bg); padding: 10px 0 15px 0; z-index: 100; }
        .search-bar { background: #fff; border: 1px solid var(--border); border-radius: 16px; padding: 15px 18px; display: flex; align-items: center; gap: 12px; box-shadow: 0 2px 8px var(--shadow); }
        .search-bar input { background: none; border: none; width: 100%; font-size: 15px; font-weight: 600; color: var(--text-main); }
        .search-bar i { color: var(--accent); font-size: 20px; }

        /* Acciones de Tarjeta */
        .actions-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 15px; border-top: 1px solid var(--border); padding-top: 15px; }
        .btn-sm { border: none; border-radius: 12px; padding: 12px 5px; font-size: 11px; font-weight: 700; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .btn-view { background: #f1f5f9; color: #475569; }
        .btn-edit { background: #eff6ff; color: #3b82f6; }
        .btn-wa { background: #ecfdf5; color: #10b981; }

        /* Botonera Inferior */
        .nav-main { position: fixed; bottom: 25px; left: 20px; right: 20px; background: #fff; height: 75px; border-radius: 24px; display: flex; border: 1px solid var(--border); z-index: 2000; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .nav-opt { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-dim); background: none; border: none; font-size: 10px; font-weight: 700; }
        .nav-opt.active { color: var(--accent); }
        .nav-opt i { font-size: 24px; margin-bottom: 3px; }

        /* Inputs de Carga */
        .inp-modern { background: #fff; border: 1px solid var(--border); padding: 18px; border-radius: 16px; width: 100%; font-size: 16px; font-weight: 600; margin-bottom: 10px; }
        .btn-send { background: var(--accent); color: #fff; border: none; border-radius: 18px; padding: 20px; width: 100%; font-weight: 800; font-size: 16px; box-shadow: 0 8px 20px rgba(0,98,255,0.25); }

        /* Modal */
        .modal { display:none; position:fixed; inset:0; background:rgba(15, 23, 42, 0.4); backdrop-filter: blur(8px); z-index:3000; align-items:center; justify-content:center; padding:20px; }
        .modal-body { background: #fff; border-radius: 30px; padding: 30px; width: 100%; max-width: 400px; text-align: center; border: 1px solid var(--border); }
    </style>
</head>
<body>

    <header id="app-header" class="top-header" style="display:none">
        <div class="logo">TWINS <span>ELITE</span></div>
        <div onclick="syncData()" style="font-size:11px; font-weight:800; color:var(--accent); background:#f0f7ff; padding:8px 14px; border-radius:12px; cursor:pointer;">
            <i class="ph-bold ph-arrows-clockwise"></i> ACTUALIZAR
        </div>
    </header>

    <div id="page-login" class="page active">
        <div style="text-align:center; padding:60px 0 40px;">
            <div style="width:75px; height:75px; background:var(--accent); border-radius:22px; margin:0 auto 25px; display:flex; align-items:center; justify-content:center; box-shadow: 0 10px 25px rgba(0,98,255,0.3);">
                <i class="ph-fill ph-user-focus" style="font-size:40px; color:#fff;"></i>
            </div>
            <h1 style="font-weight:800; margin:0; letter-spacing:-1px;">Gestión de Almacén</h1>
            <p style="color:var(--text-dim); font-weight:500;">Inicia sesión para continuar</p>
        </div>
        <div id="login-options"></div>
    </div>

    <div id="page-history" class="page">
        <div class="search-area">
            <div class="search-bar">
                <i class="ph-bold ph-sparkle"></i>
                <input type="text" id="smart-search" placeholder="Busca placa, chofer o cliente..." oninput="renderSmartHistory()">
            </div>
        </div>
        <div id="history-feed"></div>
    </div>

    <div id="page-select-plate" class="page">
        <h2 style="font-weight:800; margin-bottom:20px;">Nueva Carga</h2>
        <div id="plate-options" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;"></div>
    </div>

    <div id="page-route" class="page">
        <div style="background: var(--accent); padding: 30px; border-radius: 28px; margin-bottom: 25px; color:#fff; position:relative; box-shadow: 0 12px 30px rgba(0,98,255,0.2);">
            <div style="position:relative; z-index:2;">
                <small style="font-weight:700; opacity:0.8;">CAJAS REGISTRADAS</small>
                <div style="display:flex; justify-content:space-between; align-items:flex-end;">
                    <h1 id="count-cajas" style="font-size:54px; margin:0; font-weight:800;">0</h1>
                    <div style="text-align:right;">
                        <b id="active-plate-label" style="font-size:20px; display:block;">---</b>
                        <span id="count-puntos" style="font-size:13px; opacity:0.9;">0 Clientes</span>
                    </div>
                </div>
            </div>
        </div>
        
        <input type="text" id="inp-cli" class="inp-modern" placeholder="Cliente" list="suggestions">
        <datalist id="suggestions"></datalist>
        
        <div style="display:flex; gap:12px; margin-bottom:25px;">
            <input type="number" id="inp-can" class="inp-modern" placeholder="Cant." style="flex:1; margin-bottom:0;">
            <button onclick="addPoint()" style="background:var(--text-main); color:#fff; border:none; border-radius:16px; width:70px; font-size:26px;"><i class="ph-bold ph-plus"></i></button>
        </div>
        
        <div id="live-list"></div>
        <div id="finalize-area" style="display:none; margin-top:20px;">
            <button onclick="openModal('modal-date')" class="btn-send">FINALIZAR Y GUARDAR</button>
        </div>
    </div>

    <div id="modal-date" class="modal">
        <div class="modal-body">
            <h3 style="font-weight:800; margin:0 0 10px 0;">Programación</h3>
            <p style="color:var(--text-dim); margin-bottom:25px;">¿Cuándo sale esta ruta?</p>
            <button onclick="finalizeProcess('hoy')" class="btn-send" style="margin-bottom:12px;">PARA HOY</button>
            <button onclick="finalizeProcess('mañana')" class="inp-modern" style="background:#f1f5f9; color:var(--text-main); border:none;">PARA MAÑANA</button>
            <button onclick="closeModal('modal-date')" style="background:none; border:none; color:var(--danger); margin-top:20px; font-weight:700;">CANCELAR</button>
        </div>
    </div>

    <nav id="app-nav" class="nav-main" style="display:none">
        <button class="nav-opt active" id="n-route" onclick="go('page-select-plate')"><i class="ph-fill ph-plus-circle"></i>NUEVO</button>
        <button class="nav-opt" id="n-history" onclick="go('page-history')"><i class="ph-fill ph-database"></i>DATA</button>
        <button class="nav-opt" id="n-fleet" onclick="go('page-fleet')"><i class="ph-fill ph-truck"></i>FLOTA</button>
        <button class="nav-opt" id="n-reports" onclick="go('page-reports')"><i class="ph-fill ph-chart-pie-slice"></i>REPORTES</button>
    </nav>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbxuVVOZfMx8jkN-q079s6g7ppPAF4XIkNG-DEQGt6MqiownzLo3NMyWBIZ1hkTyoPBl/exec";
        let db = [], currentCarga = [], activeUser = "";
        const ASIGNACION = { "CEP-929": "ROMARIO", "BPN-711": "CESAR C.", "BVN-704": "LUIS H.", "BUL-742": "WALDIR", "BVN-930": "MARCELO" };

        window.onload = () => {
            const saved = localStorage.getItem('tw_db_v25');
            if(saved) { db = JSON.parse(saved); renderSmartHistory(); updateSuggestions(); }
            setupUI();
            if(localStorage.getItem('tw_logged')) login(localStorage.getItem('tw_logged'));
        };

        function setupUI() {
            const l = document.getElementById('login-options');
            ['TAJHO ADMIN', 'FRANCESCO', 'OSCAR', 'LUIS HERBER'].forEach(u => {
                l.innerHTML += `<div onclick="checkPass('${u}')" class="card" style="display:flex; justify-content:space-between; align-items:center; cursor:pointer; font-weight:700;">${u} <i class="ph ph-caret-right" style="color:var(--accent)"></i></div>`;
            });
            document.getElementById('plate-options').innerHTML = Object.keys(ASIGNACION).map(p => 
                `<div onclick="startPlate('${p}')" class="card" style="text-align:center; padding:35px 10px; font-weight:800; font-size:20px; cursor:pointer; border-bottom:4px solid var(--accent);">${p}</div>`
            ).join('');
        }

        async function syncData() {
            try {
                const r = await fetch(API);
                const data = await r.json();
                db = data.map((x, i) => ({ ...x, id: 'ID-'+Date.now()+i, fecha: x.fecha.split('T')[0] }));
                localStorage.setItem('tw_db_v25', JSON.stringify(db));
                renderSmartHistory(); updateSuggestions();
            } catch(e) { console.log("Offline Mode"); }
        }

        function renderSmartHistory() {
            const val = document.getElementById('smart-search').value.toLowerCase();
            let html = "";
            const filtered = db.filter(r => `${r.placa} ${r.chofer} ${r.items} ${r.fecha}`.toLowerCase().includes(val));

            filtered.forEach(r => {
                const f = r.fecha.split('-').reverse().join('/');
                html += `
                <div class="card">
                    <div class="h-header">
                        <div>
                            <b>${r.placa}</b>
                            <div style="font-size:12px; color:var(--text-dim); margin-top:4px; font-weight:600;">${r.chofer} | ${f}</div>
                        </div>
                        <div class="cjs-badge">${r.total} CJS</div>
                    </div>
                    <div class="actions-row">
                        <button class="btn-sm btn-view" onclick="viewR('${r.id}')"><i class="ph ph-eye"></i>VER</button>
                        <button class="btn-sm btn-edit" onclick="editR('${r.id}')"><i class="ph ph-pencil"></i>EDITAR</button>
                        <button class="btn-sm btn-wa" onclick="sendWA('${r.id}')"><i class="ph ph-whatsapp-logo"></i>WA</button>
                    </div>
                </div>`;
            });
            document.getElementById('history-feed').innerHTML = html || "<p style='text-align:center; color:var(--text-dim); margin-top:40px;'>Sin datos...</p>";
        }

        function startPlate(p) { localStorage.setItem('tw_temp_placa', p); go('page-route'); refreshCargaUI(); }

        function addPoint() {
            const cli = document.getElementById('inp-cli').value.toUpperCase(), can = parseInt(document.getElementById('inp-can').value);
            if(!cli || isNaN(can)) return;
            currentCarga.push({cli, can});
            document.getElementById('inp-cli').value = ""; document.getElementById('inp-can').value = "";
            refreshCargaUI();
        }

        function refreshCargaUI() {
            let t = 0; let h = "";
            document.getElementById('active-plate-label').innerText = localStorage.getItem('tw_temp_placa') || "---";
            currentCarga.forEach((it, i) => {
                t += it.can;
                h += `<div class="card" style="display:flex; justify-content:space-between; padding:15px; margin-bottom:10px; border-left:4px solid var(--accent);">
                    <span><b>${it.can}</b> ${it.cli}</span>
                    <i class="ph ph-trash" style="color:var(--danger); font-size:20px;" onclick="currentCarga.splice(${i},1);refreshCargaUI()"></i>
                </div>`;
            });
            document.getElementById('count-cajas').innerText = t;
            document.getElementById('count-puntos').innerText = currentCarga.length + " Clientes";
            document.getElementById('finalize-area').style.display = t > 0 ? 'block' : 'none';
            document.getElementById('live-list').innerHTML = h;
        }

        async function finalizeProcess(tipo) {
            let f = new Date(); if(tipo === 'mañana') f.setDate(f.getDate() + 1);
            const r = {
                fecha: f.toISOString().split('T')[0],
                chofer: ASIGNACION[localStorage.getItem('tw_temp_placa')],
                placa: localStorage.getItem('tw_temp_placa'),
                items: currentCarga.map(i => `${i.cli}: ${i.can}`).join(", "),
                total: currentCarga.reduce((a,b)=>a+b.can,0),
                id: 'ID-'+Date.now()
            };
            db.unshift(r); localStorage.setItem('tw_db_v25', JSON.stringify(db));
            fetch(API, {method:'POST', mode:'no-cors', body:JSON.stringify(r)});
            closeModal('modal-date'); currentCarga = []; go('page-history');
        }

        function login(u) {
            activeUser = u; localStorage.setItem('tw_logged', u);
            document.getElementById('page-login').classList.remove('active');
            document.getElementById('app-header').style.display = 'flex';
            document.getElementById('app-nav').style.display = 'flex';
            syncData(); go('page-history');
        }
        function checkPass(u) { if(u==='TAJHO ADMIN' && prompt("Clave:")!=="1994") return; login(u); }
        function go(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-opt').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            const bid = id.includes('plate') || id.includes('route') ? 'n-route' : 'n-'+id.split('-')[1];
            if(document.getElementById(bid)) document.getElementById(bid).classList.add('active');
        }
        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function sendWA(id) {
            const r = db.find(x => x.id === id);
            const msg = `*TWINS ELITE*\n📦 *Unidad:* ${r.placa}\n👤 *Chofer:* ${r.chofer}\n📅 *Fecha:* ${r.fecha.split('-').reverse().join('/')}\n\n*DETALLE:*\n${r.items.split(',').map(li => "• " + li.trim()).join('\n')}\n\n*TOTAL: ${r.total} CAJAS*`;
            window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
        }
        function updateSuggestions() {
            const clientes = [...new Set(db.flatMap(r => r.items.split(',').map(i => i.split(':')[0].trim())))];
            document.getElementById('suggestions').innerHTML = clientes.slice(0, 15).map(c => `<option value="${c}">`).join('');
        }
    </script>
</body>
</html>
