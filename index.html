<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TWINS ELITE - V49.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root {
            --bg: #f8f9fa; --surface: #ffffff; --accent: #000000; 
            --text: #111827; --text-dim: #6b7280; --border: #e5e7eb; 
            --success: #10b981; --shadow: 0 4px 12px rgba(0,0,0,0.05);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { margin: 0; background: var(--bg); color: var(--text); padding-bottom: 100px; }

        .page { display: none; padding: 20px; max-width: 600px; margin: 0 auto; animation: fade 0.2s ease; }
        .active { display: block; }
        @keyframes fade { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* Encabezados Refinados */
        .header-mini { background: #fff; padding: 15px 20px; border-radius: 20px; border: 1px solid var(--border); margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .header-mini h1 { margin: 0; font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
        .placa-badge { background: #000; color: #fff; padding: 6px 14px; border-radius: 12px; font-size: 14px; font-weight: 800; }

        /* Dashboard Stats */
        .core-dash { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .master-card { background: #fff; padding: 18px; border-radius: 20px; border: 1px solid var(--border); box-shadow: var(--shadow); }
        .master-card.black { background: #000; color: #fff; border: none; }
        .stat-label { font-size: 10px; font-weight: 800; text-transform: uppercase; opacity: 0.6; display: block; margin-bottom: 4px; }
        .stat-main { font-size: 24px; font-weight: 800; }

        /* Filtros */
        .filter-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; background: #fff; padding: 15px; border-radius: 20px; border: 1px solid var(--border); }
        .filter-item label { font-size: 9px; font-weight: 800; text-transform: uppercase; color: var(--text-dim); margin-bottom: 5px; display: block; }

        /* Cards de Ruta */
        .route-card { background: #fff; border-radius: 20px; padding: 16px; margin-bottom: 12px; border: 1px solid var(--border); box-shadow: var(--shadow); }
        .section-tag { font-size: 10px; font-weight: 800; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin: 25px 0 10px 5px; }
        
        .route-actions { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 15px; }
        .btn-action { border: 1px solid var(--border); border-radius: 12px; padding: 10px 5px; font-size: 9px; font-weight: 800; background: #fff; display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--text); }
        .btn-action.wa { background: #000; color: #fff; border: none; }

        /* Formulario */
        .input-group { margin-bottom: 15px; }
        .input-group label { font-size: 11px; font-weight: 700; margin-left: 5px; margin-bottom: 5px; display: block; }
        .field { background: #fff; border: 1px solid var(--border); border-radius: 14px; padding: 14px; width: 100%; font-size: 15px; font-weight: 600; outline: none; }
        .field:focus { border-color: #000; }

        /* Nav inferior */
        .nav-bottom { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; height: 80px; display: flex; border-top: 1px solid var(--border); z-index: 1000; padding-bottom: env(safe-area-inset-bottom); }
        .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #9ca3af; background: none; border: none; font-size: 10px; font-weight: 800; transition: 0.2s; }
        .nav-btn.active { color: #000; }
        .nav-btn i { font-size: 24px; margin-bottom: 4px; }

        /* Modales */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: none; align-items: center; justify-content: center; z-index: 2000; padding: 20px; backdrop-filter: blur(4px); }
        .modal-box { background: #fff; border-radius: 24px; padding: 25px; width: 100%; max-height: 80vh; overflow-y: auto; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <div id="page-dash" class="page active">
        <h1 style="font-weight: 900; font-size: 26px; margin-bottom: 20px;">Twins Elite</h1>
        <div class="core-dash">
            <div class="master-card black"><span class="stat-label">Cajas Hoy</span><span id="stat-hoy" class="stat-main">0</span></div>
            <div class="master-card"><span class="stat-label">Cajas Mes</span><span id="stat-mes" class="stat-main">0</span></div>
        </div>
        <div id="smart-history"></div>
    </div>

    <div id="page-data" class="page">
        <h1 style="font-weight: 900; font-size: 26px; margin-bottom: 20px;">Data de Almacén</h1>
        <div class="filter-grid">
            <div class="filter-item">
                <label>Filtrar por Mes</label>
                <input type="month" id="f-month" class="field" onchange="renderData()">
            </div>
            <div class="filter-item">
                <label>Filtrar por Día</label>
                <input type="date" id="f-day" class="field" onchange="renderData()">
            </div>
        </div>
        <div id="data-results"></div>
    </div>

    <div id="page-units" class="page">
        <h1 style="font-weight: 900; font-size: 26px; margin-bottom: 10px;">Nueva Carga</h1>
        <p style="color:var(--text-dim); font-size: 14px; margin-bottom: 20px;">Selecciona la unidad para despacho:</p>
        <div id="units-grid" style="display:grid; grid-template-columns:1fr 1fr; gap:12px;"></div>
    </div>

    <div id="page-assign" class="page">
        <div class="header-mini">
            <h1>Programación</h1>
            <span id="view-placa-assign" class="placa-badge">---</span>
        </div>
        <div class="input-group">
            <label>Fecha de Salida</label>
            <input type="date" id="date-assign" class="field">
        </div>
        <div class="input-group">
            <label>Equipo de Ruta</label>
            <select id="chofer-assign" class="field" style="margin-bottom:10px;"></select>
            <select id="aux-assign" class="field"></select>
        </div>
        <button onclick="goLoad()" class="field" style="background:#000; color:#fff; height:60px; margin-top:10px; border:none; font-weight:800;">INICIAR CARGA</button>
    </div>

    <div id="page-load" class="page">
        <div class="header-mini">
            <div><span class="stat-label" style="opacity:1; color:#000">CARGANDO</span><h1 id="view-placa-load">---</h1></div>
            <div style="text-align:right;"><span id="view-total-load" style="font-size:28px; font-weight:900;">0</span><span class="stat-label">Cajas</span></div>
        </div>
        <div style="display:flex; gap:8px; margin-bottom:15px;">
            <input type="text" id="i-cli" placeholder="Cliente" class="field" style="flex:2;">
            <input type="number" id="i-can" placeholder="Cjs" class="field" style="flex:1;">
        </div>
        <button onclick="add()" style="width:100%; background:#000; color:#fff; border:none; padding:16px; border-radius:14px; font-weight:800; margin-bottom:20px;">+ AGREGAR CLIENTE</button>
        <div id="load-list"></div>
        <button id="btn-save" onclick="save()" class="field" style="display:none; background:#10b981; color:#fff; margin-top:20px; border:none;">GUARDAR REGISTRO</button>
    </div>

    <nav class="nav-bottom">
        <button class="nav-btn active" id="n-dash" onclick="go('page-dash')"><i class="ph-bold ph-chart-pie"></i>HISTORIAL</button>
        <button class="nav-btn" id="n-units" onclick="go('page-units')"><i class="ph-bold ph-plus-circle"></i>NUEVA</button>
        <button class="nav-btn" id="n-data" onclick="go('page-data')"><i class="ph-bold ph-database"></i>DATA</button>
    </nav>

    <div id="modal-view" class="modal"><div class="modal-box"><h3 id="m-title" style="margin-top:0;"></h3><div id="m-body"></div><button onclick="closeModal('modal-view')" class="field" style="margin-top:20px;">CERRAR</button></div></div>
    <div id="modal-wa" class="modal"><div class="modal-box"><h3 style="color:#10b981; margin-top:0;">Confirmar WhatsApp</h3><div id="wa-body"></div><div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:20px;"><button onclick="closeModal('modal-wa')" class="field">CANCELAR</button><button onclick="sendWA()" class="field" style="background:#10b981; color:#fff; border:none;">ENVIAR</button></div></div></div>

    <script>
        let db = JSON.parse(localStorage.getItem('twins_v49_db')) || [];
        let current = { items: [] }, waTarget = null;

        const FLOTA = { "CEP-929": "ROMARIO", "BPN-711": "CESAR C.", "BVN-704": "LUIS H.", "BUL-742": "WALDIR", "BVN-930": "MARCELO" };
        const CONDUCTORES = ["TAJHO", "ROMARIO", "CESAR C.", "LUIS H.", "WALDIR", "MARCELO"];
        const AUXILIARES = ["POR DEFINIR", "CRISTOPHER", "PERCY", "PLACIDO", "RODOLFO", "RICARDO", "ELIO", "JOFER", "MARTIN", "NELSON", "JULIO", "DANIEL C."];

        window.onload = () => {
            const sc = document.getElementById('chofer-assign'), sa = document.getElementById('aux-assign'), ug = document.getElementById('units-grid');
            CONDUCTORES.forEach(c => sc.innerHTML += `<option value="${c}">${c}</option>`);
            AUXILIARES.forEach(a => sa.innerHTML += `<option value="${a}">${a}</option>`);
            for(let p in FLOTA) ug.innerHTML += `<div style="background:#fff; padding:20px; border-radius:18px; text-align:center; font-weight:800; border:1px solid var(--border);" onclick="start('${p}')">${p}</div>`;
            renderStats(); renderSmartHistory();
        };

        function start(p) {
            current = { placa: p, items: [], id: 'R'+Date.now() };
            document.getElementById('view-placa-assign').innerText = p;
            document.getElementById('chofer-assign').value = FLOTA[p] || CONDUCTORES[0];
            document.getElementById('date-assign').valueAsDate = new Date();
            go('page-assign');
        }

        function goLoad() {
            current.chofer = document.getElementById('chofer-assign').value;
            current.auxiliar = document.getElementById('aux-assign').value;
            current.fecha = document.getElementById('date-assign').value;
            document.getElementById('view-placa-load').innerText = current.placa;
            refreshLoad(); go('page-load');
        }

        function add() {
            const cli = document.getElementById('i-cli').value.toUpperCase().trim(), can = parseInt(document.getElementById('i-can').value);
            if(!cli || isNaN(can)) return;
            current.items.push({cli, can});
            document.getElementById('i-cli').value = ""; document.getElementById('i-can').value = "";
            document.getElementById('i-cli').focus();
            refreshLoad();
        }

        function refreshLoad() {
            let t = current.items.reduce((a,b)=>a+b.can,0);
            document.getElementById('view-total-load').innerText = t;
            document.getElementById('load-list').innerHTML = current.items.map((it, i) => `
                <div style="display:flex; justify-content:space-between; padding:12px; background:#fff; border-radius:12px; border:1px solid #eee; margin-bottom:8px; font-weight:700;">
                    <span>${it.can} • ${it.cli}</span><i class="ph-bold ph-trash" style="color:red" onclick="current.items.splice(${i},1);refreshLoad()"></i>
                </div>`).reverse().join('');
            document.getElementById('btn-save').style.display = t > 0 ? 'block' : 'none';
        }

        function save() {
            const idx = db.findIndex(x => x.id === current.id);
            if(idx > -1) db[idx] = current; else db.unshift(current);
            localStorage.setItem('twins_v49_db', JSON.stringify(db));
            go('page-dash'); renderStats(); renderSmartHistory();
        }

        function renderSmartHistory() {
            const cont = document.getElementById('smart-history'); cont.innerHTML = "";
            const hoy = new Date().toISOString().split('T')[0];
            let ayer = new Date(); ayer.setDate(ayer.getDate()-1); ayer = ayer.toISOString().split('T')[0];
            
            const rHoy = db.filter(r => r.fecha === hoy), rAyer = db.filter(r => r.fecha === ayer), rFut = db.filter(r => r.fecha > hoy);
            
            if(rFut.length) { cont.innerHTML += `<div class="section-tag">Programados</div>`; rFut.forEach(r => cont.innerHTML += card(r)); }
            cont.innerHTML += `<div class="section-tag">Hoy</div>`;
            if(!rHoy.length) cont.innerHTML += `<p style="font-size:12px; color:gray; margin-left:10px;">Sin rutas registradas.</p>`;
            rHoy.forEach(r => cont.innerHTML += card(r, true));
            if(rAyer.length) { cont.innerHTML += `<div class="section-tag">Ayer</div>`; rAyer.forEach(r => cont.innerHTML += card(r)); }
        }

        function renderData() {
            const m = document.getElementById('f-month').value, d = document.getElementById('f-day').value;
            let filt = db;
            if(d) filt = filt.filter(r => r.fecha === d); else if(m) filt = filt.filter(r => r.fecha.startsWith(m));
            const cont = document.getElementById('data-results');
            cont.innerHTML = filt.length ? "" : "<p style='text-align:center; color:gray; margin-top:20px;'>No hay resultados.</p>";
            filt.forEach(r => cont.innerHTML += card(r));
        }

        function card(r, highlight = false) {
            const t = r.items.reduce((a,b)=>a+b.can,0);
            return `<div class="route-card" style="${highlight?'border-left:4px solid #000':''}">
                <div style="display:flex; justify-content:space-between;">
                    <div><b style="font-size:18px;">${r.placa}</b><div style="font-size:11px; color:var(--text-dim); font-weight:700;">${r.chofer} | ${r.auxiliar}</div></div>
                    <div style="text-align:right;"><span style="font-size:9px; display:block; opacity:0.5;">${r.fecha}</span><b style="font-size:18px;">${t} CJS</b></div>
                </div>
                <div class="route-actions">
                    <button class="btn-action" onclick="view('${r.id}')"><i class="ph-bold ph-eye"></i>VER</button>
                    <button class="btn-action" onclick="edit('${r.id}')"><i class="ph-bold ph-pencil"></i>EDITAR</button>
                    <button class="btn-action wa" onclick="prepWA('${r.id}')"><i class="ph-bold ph-whatsapp-logo"></i>WA</button>
                </div>
            </div>`;
        }

        function renderStats() {
            const h = new Date().toISOString().split('T')[0], m = h.substring(0,7);
            const sum = (arr) => arr.reduce((a,b)=>a+b.items.reduce((x,y)=>x+y.can,0),0);
            document.getElementById('stat-hoy').innerText = sum(db.filter(r => r.fecha === h));
            document.getElementById('stat-mes').innerText = sum(db.filter(r => r.fecha.startsWith(m)));
        }

        function view(id) {
            const r = db.find(x => x.id === id);
            document.getElementById('m-title').innerText = `Ruta ${r.placa}`;
            document.getElementById('m-body').innerHTML = r.items.map(i => `<div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #eee;"><span>${i.cli}</span><b>${i.can} Cjs</b></div>`).join('');
            document.getElementById('modal-view').style.display = 'flex';
        }

        function prepWA(id) {
            waTarget = db.find(x => x.id === id);
            document.getElementById('wa-body').innerHTML = `<b>Unidad:</b> ${waTarget.placa}<br><b>Cajas:</b> ${waTarget.items.reduce((a,b)=>a+b.can,0)}<br><b>Clientes:</b> ${waTarget.items.length}`;
            document.getElementById('modal-wa').style.display = 'flex';
        }

        function sendWA() {
            const r = waTarget;
            const list = r.items.map(i => `• ${i.cli}: ${i.can}`).join('\n');
            const msg = `*TWINS ELITE*\n\n🚛 *UNIDAD:* ${r.placa}\n👤 *CHOFER:* ${r.chofer}\n🤝 *AUX:* ${r.auxiliar}\n\n*LISTA:*\n${list}\n\n📦 *TOTAL:* ${r.items.reduce((a,b)=>a+b.can,0)} Cjs\n👥 *CLIENTES:* ${r.items.length}`;
            window.location.href = "whatsapp://send?text=" + encodeURIComponent(msg);
            closeModal('modal-wa');
        }

        function edit(id) { current = JSON.parse(JSON.stringify(db.find(x => x.id === id))); document.getElementById('view-placa-load').innerText = current.placa; refreshLoad(); go('page-load'); }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function go(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(n => n.classList.remove('active'));
            document.getElementById('n-' + id.split('-')[1]).classList.add('active');
            if(id === 'page-dash') renderSmartHistory();
            if(id === 'page-data') renderData();
        }
    </script>
</body>
</html>
