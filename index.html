<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TWINS ELITE - V67.5</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root {
            --bg: #f4f6f8; --surface: #ffffff; --accent: #000000; 
            --text: #111827; --text-dim: #6b7280; --border: #e5e7eb; 
            --gold: #FFD700; --silver: #C0C0C0; --green: #10b981; --red: #ef4444;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { margin: 0; background: var(--bg); color: var(--text); padding-bottom: 100px; overflow-x: hidden; }

        .page { display: none; padding: 20px; max-width: 600px; margin: 0 auto; animation: fade 0.2s ease; }
        .active { display: block; }
        @keyframes fade { from { opacity: 0; } to { opacity: 1; } }

        /* --- DASHBOARD 4 CUADROS PEQUEÑOS (TU DISEÑO) --- */
        .core-dash { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .master-card { background: #fff; padding: 15px; border-radius: 20px; border: 1px solid var(--border); display: flex; flex-direction: column; justify-content: center; min-height: 90px; }
        .master-card.black { background: #000; color: #fff; border: none; }
        .stat-label { font-size: 9px; font-weight: 800; text-transform: uppercase; opacity: 0.6; }
        .stat-main { font-size: 22px; font-weight: 900; line-height: 1.2; }
        .stat-sub { font-size: 10px; font-weight: 700; opacity: 0.8; margin-top: 4px; }

        /* --- RESTO DEL DISEÑO BASE --- */
        .search-box { position: relative; margin-bottom: 20px; }
        .search-box input { width: 100%; padding: 16px 20px 16px 50px; background: #fff; border: 1px solid var(--border); border-radius: 18px; font-weight: 700; outline: none; }
        .search-box i { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); font-size: 20px; color: var(--text-dim); }
        .route-card { background: #fff; border-radius: 24px; padding: 20px; margin-bottom: 15px; border: 1px solid var(--border); }
        .card-crew { font-size: 11px; font-weight: 700; color: #4b5563; margin-top: 12px; padding: 12px; background: #f9fafb; border-radius: 15px; }
        .nav-bottom { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; height: 85px; display: flex; border-top: 1px solid var(--border); z-index: 1000; }
        .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #9ca3af; background: none; border: none; font-size: 10px; font-weight: 800; }
        .nav-btn.active { color: #000; }
        .field { background: #fff; border: 1px solid var(--border); border-radius: 16px; padding: 16px; width: 100%; font-size: 15px; font-weight: 700; outline: none; margin-bottom: 12px; }
        #sync-status { position: fixed; top: 10px; right: 10px; background: var(--green); color: #fff; padding: 5px 12px; border-radius: 20px; font-size: 10px; font-weight: 800; display: none; z-index: 6000; }
    </style>
</head>
<body>

    <div id="sync-status">SUBIENDO AL EXCEL...</div>

    <div id="page-login">
        <div style="text-align: center; padding: 50px 20px;">
            <h1 style="font-weight: 900;">Twins Elite</h1>
            <p style="color: var(--text-dim); font-weight: 700; margin-bottom: 30px;">Selecciona Usuario</p>
            <div style="cursor:pointer; padding:15px; border:1px solid #ddd; border-radius:15px; margin-bottom:10px; font-weight:800;" onclick="login('TAJHO')">TAJHO</div>
            <div style="cursor:pointer; padding:15px; border:1px solid #ddd; border-radius:15px; margin-bottom:10px; font-weight:800;" onclick="login('FRANCHESCO')">FRANCHESCO</div>
            <div style="cursor:pointer; padding:15px; border:1px solid #ddd; border-radius:15px; margin-bottom:10px; font-weight:800;" onclick="login('OSCAR')">OSCAR</div>
            <div style="cursor:pointer; padding:15px; border:1px solid #ddd; border-radius:15px; margin-bottom:10px; font-weight:800;" onclick="login('LUIS HERBER')">LUIS HERBER</div>
        </div>
    </div>

    <div id="page-dash" class="page">
        <h1 style="font-weight:900; margin-bottom:20px;">Dashboard</h1>
        
        <div class="core-dash">
            <div class="master-card black">
                <span class="stat-label">Cajas Hoy</span>
                <span id="h-cajas" class="stat-main">0</span>
            </div>
            <div class="master-card black">
                <span class="stat-label">Clientes Hoy</span>
                <span id="h-cli" class="stat-main">0</span>
            </div>
            <div class="master-card">
                <span class="stat-label">Cajas Mes</span>
                <span id="m-cajas" class="stat-main">0</span>
            </div>
            <div class="master-card">
                <span class="stat-label">Clientes Mes</span>
                <span id="m-cli" class="stat-main">0</span>
            </div>
        </div>

        <div class="search-box">
            <i class="ph-bold ph-magnifying-glass"></i>
            <input type="text" id="smart-search" placeholder="Buscar placa o chofer..." onkeyup="renderHistory()">
        </div>
        <div id="hist-cont"></div>
    </div>

    <div id="page-units" class="page">
        <h1 style="font-weight:900; margin-bottom:20px;">Unidades</h1>
        <div id="units-grid" style="display:grid; grid-template-columns:1fr 1fr; gap:15px;"></div>
    </div>

    <div id="page-config" class="page">
        <div style="background:#000; color:#fff; padding:30px; border-radius:30px; margin-bottom:25px; text-align:center;"><h2 id="conf-placa" style="margin:0;">---</h2></div>
        <input type="date" id="c-fecha" class="field">
        <select id="c-chofer" class="field"></select>
        <select id="c-aux" class="field"></select>
        <button onclick="goLoad()" style="width:100%; padding:20px; background:#000; color:#fff; border-radius:20px; font-weight:800; border:none;">INICIAR</button>
    </div>

    <div id="page-load" class="page">
        <div style="background:#000; color:#fff; padding:20px; border-radius:20px; margin-bottom:15px; display:flex; justify-content:space-between;">
            <b id="load-placa-txt">---</b>
            <b id="load-total">0 CJS</b>
        </div>
        <div style="display:flex; gap:10px; margin-bottom:15px;">
            <input type="text" id="i-cli" placeholder="Cliente" class="field" style="flex:2; margin:0">
            <input type="number" id="i-can" placeholder="Cjs" class="field" style="flex:1; margin:0">
        </div>
        <button onclick="addItem()" style="width:100%; padding:18px; background:#eee; border-radius:15px; font-weight:800; border:none; margin-bottom:10px;">+ AGREGAR</button>
        <div id="load-list"></div>
        <button id="btn-save" onclick="save()" style="display:none; width:100%; padding:22px; background:var(--green); color:#fff; border-radius:22px; font-weight:900; border:none; margin-top:20px;">FINALIZAR</button>
    </div>

    <nav id="navbar" class="nav-bottom" style="display:none;">
        <button class="nav-btn" onclick="go('page-units')"><i class="ph-bold ph-plus-circle"></i>NUEVA</button>
        <button class="nav-btn" onclick="go('page-dash')"><i class="ph-bold ph-chart-bar"></i>HISTORIAL</button>
    </nav>

    <script>
        const CLOUD_URL = "https://script.google.com/macros/s/AKfycbzkIqN5__aLRTfyeJSWAAB-pUmt54kGsv4Ex2KWz_dgAvrCT_Gty05uZelf6gbcL4p7/exec";
        let db = JSON.parse(localStorage.getItem('twins_v65_db')) || [];
        let cur = { items: [] };
        let currentUser = "";

        // FIX FECHA PERU
        function getLimaDate() {
            return new Intl.DateTimeFormat('en-CA', { timeZone: 'America/Lima', year: 'numeric', month: '2-digit', day: '2-digit' }).format(new Date());
        }

        function login(u) {
            currentUser = u;
            document.getElementById('page-login').style.display = 'none';
            document.getElementById('navbar').style.display = 'flex';
            go('page-dash');
            pull();
        }

        window.onload = () => {
            const FLOTA = { "CEP-929": "ROMARIO", "BPN-711": "CESAR C.", "BVN-704": "LUIS H.", "BUL-742": "WALDIR", "BVN-930": "MARCELO" };
            const ug = document.getElementById('units-grid');
            for(let p in FLOTA) ug.innerHTML += `<div style="background:#fff; padding:25px; border-radius:24px; text-align:center; border:1px solid var(--border);" onclick="initConf('${p}', '${FLOTA[p]}')"><b>${p}</b></div>`;
            const conds = ["TAJHO", "ROMARIO", "CESAR C.", "LUIS H.", "WALDIR", "MARCELO"];
            const auxs = ["CRISTOPHER", "PERCY", "PLACIDO", "RODOLFO", "RICARDO", "ELIO", "JOFER", "MARTIN", "NELSON"];
            conds.forEach(c => document.getElementById('c-chofer').innerHTML += `<option value="${c}">${c}</option>`);
            auxs.forEach(a => document.getElementById('c-aux').innerHTML += `<option value="${a}">${a}</option>`);
        };

        function go(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'page-dash') stats();
        }

        function stats() {
            const h = getLimaDate(), m = h.substring(0,7);
            const rH = db.filter(r => r.fecha === h), rM = db.filter(r => r.fecha.startsWith(m));
            const sumC = (arr) => arr.reduce((a,b) => a + b.items.reduce((x,y)=>x+y.can,0), 0);
            const sumL = (arr) => arr.reduce((a,b) => a + b.items.length, 0);
            document.getElementById('h-cajas').innerText = sumC(rH);
            document.getElementById('h-cli').innerText = sumL(rH);
            document.getElementById('m-cajas').innerText = sumC(rM);
            document.getElementById('m-cli').innerText = sumL(rM);
            renderHistory();
        }

        function initConf(p, c) {
            cur = { id: 'R'+Date.now(), placa: p, items: [], fecha: getLimaDate(), chofer: c, auxiliar: "CRISTOPHER", registradoPor: currentUser };
            document.getElementById('conf-placa').innerText = p;
            document.getElementById('c-fecha').value = cur.fecha;
            document.getElementById('c-chofer').value = c;
            go('page-config');
        }

        function goLoad() {
            cur.fecha = document.getElementById('c-fecha').value;
            cur.chofer = document.getElementById('c-chofer').value;
            cur.auxiliar = document.getElementById('c-aux').value;
            document.getElementById('load-placa-txt').innerText = cur.placa;
            refreshLoad(); go('page-load');
        }

        function addItem() {
            const cli = document.getElementById('i-cli').value.toUpperCase().trim(), can = parseInt(document.getElementById('i-can').value);
            if(cli && can) { cur.items.push({cli, can}); document.getElementById('i-cli').value=""; document.getElementById('i-can').value=""; refreshLoad(); }
        }

        function refreshLoad() {
            const tot = cur.items.reduce((a,b)=>a+b.can, 0);
            document.getElementById('load-total').innerText = tot + " CJS";
            document.getElementById('btn-save').style.display = tot > 0 ? 'block' : 'none';
            document.getElementById('load-list').innerHTML = cur.items.map(i => `<div style="padding:10px; border-bottom:1px solid #eee; display:flex; justify-content:space-between;"><span>${i.cli}</span><b>${i.can}</b></div>`).reverse().join('');
        }

        async function save() {
            db.unshift(cur);
            localStorage.setItem('twins_v65_db', JSON.stringify(db));
            document.getElementById('sync-status').style.display = 'block';
            await fetch(CLOUD_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(cur) });
            setTimeout(() => { document.getElementById('sync-status').style.display = 'none'; pull(); }, 2000);
            go('page-dash');
        }

        async function pull() {
            try { const r = await fetch(CLOUD_URL); const d = await r.json(); if(d) { db = d; localStorage.setItem('twins_v65_db', JSON.stringify(db)); stats(); } } catch(e){}
        }

        function renderHistory() {
            const q = document.getElementById('smart-search').value.toLowerCase();
            const filt = db.filter(r => r.placa.toLowerCase().includes(q) || r.chofer.toLowerCase().includes(q));
            document.getElementById('hist-cont').innerHTML = filt.map(r => `
                <div class="route-card">
                    <div style="display:flex; justify-content:space-between; font-size:11px; font-weight:800; color:var(--text-dim);">
                        <span>📅 ${r.fecha}</span> <span>${r.placa}</span>
                    </div>
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-top:5px;">
                        <b style="font-size:24px;">${r.items.reduce((a,b)=>a+b.can,0)} CJS</b>
                        <b style="color:var(--text-dim); font-size:12px;">${r.items.length} CLI.</b>
                    </div>
                    <div class="card-crew">👤 ${r.chofer} | 👥 ${r.auxiliar}</div>
                </div>`).join('');
        }
    </script>
</body>
</html>
