<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TWINS LOGISTICS PRO V59</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #05070a; --surface: #0f1218;
            --accent: #0066ff; --accent-glow: rgba(0, 102, 255, 0.3);
            --text: #ffffff; --text-dim: #94a3b8;
            --border: #1e293b; --success: #10b981; --danger: #ef4444;
        }

        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; outline: none; }
        body { 
            margin: 0; background: var(--bg); color: var(--text); 
            font-family: 'Plus Jakarta Sans', sans-serif; min-height: 100vh;
        }

        .page { display: none; padding: 15px; padding-bottom: 110px; max-width: 600px; margin: 0 auto; animation: pageFade 0.3s ease; }
        .active { display: block !important; }
        @keyframes pageFade { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        .top-header { 
            position: sticky; top: 0; z-index: 1000; background: rgba(5, 7, 10, 0.8);
            backdrop-filter: blur(12px); padding: 12px 20px; display: flex; 
            justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border);
        }

        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 16px; margin-bottom: 12px; }
        
        .stat-banner { background: linear-gradient(135deg, var(--accent), #0033cc); padding: 20px; border-radius: 24px; color: white; display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .stat-val { font-size: 38px; font-weight: 800; line-height: 1; }
        .stat-label { font-size: 10px; font-weight: 700; text-transform: uppercase; opacity: 0.8; }

        input, select { background: #1a1f26; border: 1px solid var(--border); padding: 14px; border-radius: 14px; color: white; font-size: 15px; font-weight: 500; width: 100%; margin-bottom: 10px; }
        input:focus { border-color: var(--accent); box-shadow: 0 0 10px var(--accent-glow); }

        .btn { border: none; border-radius: 14px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s; }
        .btn:active { transform: scale(0.96); }
        .btn-add { background: var(--accent); color: white; padding: 14px 20px; width: 100%; }
        .btn-save { background: var(--success); color: white; padding: 16px; width: 100%; font-size: 15px; }
        .btn-delete { background: rgba(239, 68, 68, 0.1); color: var(--danger); width: 32px; height: 32px; border-radius: 10px; }
        
        .point-item { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.03); padding: 12px 15px; border-radius: 12px; margin-bottom: 6px; border: 1px solid rgba(255,255,255,0.05); }

        /* Historial Mejorado */
        .history-card { position: relative; border-left: 4px solid var(--accent); padding: 18px; }
        .history-list-view { display: none; background: #05070a; border-radius: 12px; padding: 12px; margin-top: 12px; border: 1px solid var(--border); font-size: 13px; line-height: 1.6; color: var(--text-dim); }
        .history-list-view.show { display: block; animation: slideDown 0.3s ease; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        .nav-bar { position: fixed; bottom: 15px; left: 15px; right: 15px; background: #161b22; height: 70px; border-radius: 20px; display: flex; border: 1px solid var(--border); z-index: 2000; box-shadow: 0 15px 30px rgba(0,0,0,0.5); }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-dim); background: none; border: none; font-size: 10px; font-weight: 700; }
        .nav-item.active { color: var(--accent); }
        .nav-item i { font-size: 22px; margin-bottom: 2px; }
    </style>
</head>
<body>

    <header id="app-header" class="top-header" style="display:none">
        <div style="font-weight:900;">TWINS LOGISTICS <span style="color:var(--accent)">PRO</span></div>
        <div id="user-info" onclick="logout()" style="font-size:10px; font-weight:800; background:var(--border); padding:6px 12px; border-radius:20px;">---</div>
    </header>

    <div id="page-login" class="page active">
        <div style="text-align:center; padding:50px 0">
            <i class="ph-bold ph-layout" style="font-size:50px; color:var(--accent)"></i>
            <h2 style="margin-top:15px">Warehouse Manager</h2>
        </div>
        <div id="login-options" style="display:grid; gap:10px"></div>
    </div>

    <div id="page-route" class="page">
        <div class="stat-banner">
            <div>
                <div class="stat-label">Carga en Proceso</div>
                <div id="count-cajas" class="stat-val">0</div>
                <div class="stat-label" style="margin-top:5px">Cajas totales</div>
            </div>
            <div style="text-align:right">
                <div class="stat-label">Puntos</div>
                <div id="count-puntos" style="font-size:24px; font-weight:800">0</div>
                <button onclick="clearAll()" style="background:rgba(255,71,87,0.2); border:none; color:#ff4757; padding:5px 10px; border-radius:8px; margin-top:8px; font-size:10px; font-weight:700">BORRAR TODO</button>
            </div>
        </div>

        <div class="card">
            <input type="text" id="inp-cli" placeholder="Nombre del Cliente" oninput="saveDraft()">
            <div style="display:flex; gap:10px">
                <input type="number" id="inp-can" placeholder="Cant." style="flex:0.4" oninput="saveDraft()">
                <button class="btn btn-add" onclick="addPoint()" style="flex:1.6"><i class="ph ph-plus-circle"></i> AGREGAR</button>
            </div>
        </div>

        <div id="list-container" style="display:none">
            <div id="live-list" style="margin-bottom:15px"></div>

            <div class="card">
                <select id="sel-pla" onchange="predict(); saveDraft();"></select>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px">
                    <select id="sel-cho" onchange="saveDraft()"></select>
                    <select id="sel-aux" onchange="saveDraft()"></select>
                </div>
                <button id="btn-main-action" class="btn btn-save" onclick="finalize()"><i class="ph-bold ph-check"></i> GUARDAR DESPACHO</button>
            </div>
        </div>
    </div>

    <div id="page-history" class="page">
        <div style="display:flex; gap:8px; margin-bottom:15px">
            <input type="date" id="filter-date" onchange="renderHistory()" style="flex:1; margin-bottom:0">
            <button class="btn" style="background:var(--surface); border:1px solid var(--border); width:50px" onclick="syncData()"><i class="ph ph-arrows-clockwise"></i></button>
        </div>
        <div id="history-feed"></div>
    </div>

    <div id="page-stats" class="page">
        <div class="card"><div class="stat-label">Productividad Choferes</div><div style="height:200px; margin-top:15px"><canvas id="c-cho"></canvas></div></div>
        <div class="card"><div class="stat-label">Productividad Auxiliares</div><div style="height:200px; margin-top:15px"><canvas id="c-aux"></canvas></div></div>
    </div>

    <nav id="app-nav" class="nav-bar" style="display:none">
        <button class="nav-item active" id="n-route" onclick="go('page-route')"><i class="ph ph-clipboard-text"></i>RUTA</button>
        <button class="nav-item" id="n-history" onclick="go('page-history')"><i class="ph ph-database"></i>DATA</button>
        <button class="nav-item" id="n-stats" onclick="go('page-stats')"><i class="ph ph-chart-bar"></i>STATS</button>
    </nav>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbxCRMbdOGYjf0R-w1v9tHG76jDhHXxuXOwHahYEV7Gj1lFn3y42C2s9DUO5nkgO75qy/exec";
        let activeUser = "", currentCarga = [], db = [], chart1 = null, chart2 = null;

        const DATA = {
            placas: ["CEP-929", "BPN-711", "BVN-704", "BUL-742", "BVN-930"],
            choferes: ["TAJHO", "LUIS H.", "ROMARIO", "CESAR C.", "WALDIR", "MARCELO"],
            auxiliares: ["Cristopher", "Plácido", "Martin", "Percy", "Rodolfo", "Ricardo", "Elio", "Daniel C.", "Jofer", "Nelson", "Julio"]
        };

        window.onload = () => {
            setupLogin();
            loadDraft(); // Recuperar si hubo un cierre inesperado
            if(localStorage.getItem('tw_user')) login(localStorage.getItem('tw_user'));
            syncData();
        };

        // --- PERSISTENCIA (ANTIERRORES) ---
        function saveDraft() {
            const draft = {
                cli: document.getElementById('inp-cli').value,
                can: document.getElementById('inp-can').value,
                items: currentCarga,
                pla: document.getElementById('sel-pla').value,
                cho: document.getElementById('sel-cho').value,
                aux: document.getElementById('sel-aux').value
            };
            localStorage.setItem('tw_draft', JSON.stringify(draft));
        }

        function loadDraft() {
            const saved = localStorage.getItem('tw_draft');
            if(!saved) return;
            const d = JSON.parse(saved);
            document.getElementById('inp-cli').value = d.cli || "";
            document.getElementById('inp-can').value = d.can || "";
            currentCarga = d.items || [];
            document.getElementById('sel-pla').value = d.pla || "";
            document.getElementById('sel-cho').value = d.cho || "";
            document.getElementById('sel-aux').value = d.aux || "";
            refreshCargaUI();
        }

        function setupLogin() {
            const grid = document.getElementById('login-options');
            ['TAJHO ADMIN', 'FRANCESCO', 'OSCAR', 'LUIS HERBER'].forEach(u => {
                grid.innerHTML += `<button class="btn btn-add" style="background:var(--surface); border:1px solid var(--border)" onclick="login('${u}')">${u}</button>`;
            });
            document.getElementById('sel-pla').innerHTML = '<option value="">Vehículo</option>' + DATA.placas.map(p => `<option value="${p}">${p}</option>`).join('');
            document.getElementById('sel-cho').innerHTML = '<option value="">Chofer</option>' + DATA.choferes.map(c => `<option value="${c}">${c}</option>`).join('');
            document.getElementById('sel-aux').innerHTML = '<option value="">Auxiliar</option>' + DATA.auxiliares.map(a => `<option value="${a}">${a}</option>`).join('');
        }

        async function syncData() {
            try {
                const res = await fetch(API);
                db = await res.json();
                localStorage.setItem('tw_db', JSON.stringify(db));
                renderHistory();
            } catch(e) {
                db = JSON.parse(localStorage.getItem('tw_db')) || [];
                renderHistory();
            }
        }

        function addPoint() {
            const cli = document.getElementById('inp-cli').value.toUpperCase();
            const can = parseInt(document.getElementById('inp-can').value);
            if(!cli || !can) return;
            currentCarga.push({ cli, can });
            document.getElementById('inp-cli').value = "";
            document.getElementById('inp-can').value = "";
            saveDraft();
            refreshCargaUI();
        }

        function removePoint(idx) {
            currentCarga.splice(idx, 1);
            saveDraft();
            refreshCargaUI();
        }

        function refreshCargaUI() {
            const container = document.getElementById('live-list');
            let total = 0; container.innerHTML = "";
            currentCarga.forEach((item, i) => {
                total += item.can;
                container.innerHTML += `<div class="point-item"><div><b>${item.can}</b> CJ • ${item.cli}</div><button class="btn-delete" onclick="removePoint(${i})"><i class="ph ph-x"></i></button></div>`;
            });
            document.getElementById('count-cajas').innerText = total;
            document.getElementById('count-puntos').innerText = currentCarga.length;
            document.getElementById('list-container').style.display = currentCarga.length > 0 ? 'block' : 'none';
        }

        async function finalize() {
            const aux = document.getElementById('sel-aux').value;
            if(!aux) return alert("Asigna un auxiliar.");
            
            const registro = {
                fecha: new Date().toLocaleDateString('en-CA'),
                hora: new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true }),
                placa: document.getElementById('sel-pla').value,
                chofer: document.getElementById('sel-cho').value,
                auxiliar: aux,
                items: currentCarga.map(i => `${i.cli}: ${i.can}`).join(", "),
                total: currentCarga.reduce((a,b) => a + b.can, 0),
                operario: activeUser
            };

            db.unshift(registro);
            localStorage.setItem('tw_db', JSON.stringify(db));
            fetch(API, { method: 'POST', mode: 'no-cors', body: JSON.stringify(registro) });
            clearAll();
            go('page-history');
        }

        function renderHistory() {
            const container = document.getElementById('history-feed');
            const filterDate = document.getElementById('filter-date').value;
            let html = "";
            db.forEach((r, i) => {
                if(r.fecha.split('T')[0] === filterDate) {
                    html += `
                    <div class="card history-card">
                        <div style="display:flex; justify-content:space-between; margin-bottom:5px">
                            <span style="font-weight:800; color:var(--accent)">${r.placa}</span>
                            <span style="font-size:11px; color:var(--text-dim)">${r.hora}</span>
                        </div>
                        <div style="font-size:16px; font-weight:800">${r.total} CAJAS</div>
                        <div style="font-size:12px; color:var(--text-dim)">Chofer: ${r.chofer}</div>
                        
                        <div id="list-${i}" class="history-list-view">${r.items.split(", ").join("<br>")}</div>
                        
                        <div style="display:flex; gap:8px; margin-top:10px">
                            <button class="btn" style="flex:1; background:var(--border); font-size:11px; padding:10px" onclick="toggleListView(${i})">VER LISTA</button>
                            <button class="btn" style="background:#25D366; width:45px" onclick="share('${r.placa}','${r.total}','${r.items}')"><i class="ph-fill ph-whatsapp-logo"></i></button>
                        </div>
                    </div>`;
                }
            });
            container.innerHTML = html || `<p style="text-align:center; opacity:0.3; padding:30px">Sin datos para esta fecha.</p>`;
        }

        function toggleListView(i) {
            document.getElementById(`list-${i}`).classList.toggle('show');
        }

        function go(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('n-' + id.split('-')[1]).classList.add('active');
            if(id === 'page-history') { document.getElementById('filter-date').value = "2026-02-23"; renderHistory(); }
            if(id === 'page-stats') setTimeout(drawCharts, 100);
        }

        function drawCharts() {
            const statsC = {}, statsA = {}, now = new Date();
            db.forEach(r => {
                if(new Date(r.fecha + "T12:00:00").getMonth() === now.getMonth()) {
                    statsC[r.chofer] = (statsC[r.chofer] || 0) + parseFloat(r.total);
                    statsA[r.auxiliar] = (statsA[r.auxiliar] || 0) + parseFloat(r.total);
                }
            });
            const cfg = (obj, color) => ({ type: 'bar', data: { labels: Object.keys(obj), datasets: [{ data: Object.values(obj), backgroundColor: color, borderRadius: 8 }] }, options: { indexAxis: 'y', maintainAspectRatio: false, plugins: { legend: false }, scales: { x: { display: false }, y: { ticks: { color: '#94a3b8' } } } } });
            if(chart1) chart1.destroy(); chart1 = new Chart(document.getElementById('c-cho'), cfg(statsC, '#0066ff'));
            if(chart2) chart2.destroy(); chart2 = new Chart(document.getElementById('c-aux'), cfg(statsA, '#10b981'));
        }

        function clearAll() {
            currentCarga = [];
            localStorage.removeItem('tw_draft');
            document.getElementById('inp-cli').value = "";
            document.getElementById('inp-can').value = "";
            refreshCargaUI();
        }

        function login(u) { 
            activeUser = u; 
            localStorage.setItem('tw_user', u);
            document.getElementById('page-login').classList.remove('active'); 
            document.getElementById('app-header').style.display = 'flex'; 
            document.getElementById('app-nav').style.display = 'flex'; 
            document.getElementById('user-info').innerText = u; 
            go('page-route'); 
        }

        function logout() { localStorage.clear(); location.reload(); }
        function predict() { const l = db.find(r => r.placa === document.getElementById('sel-pla').value); if(l) { document.getElementById('sel-cho').value = l.chofer; document.getElementById('sel-aux').value = l.auxiliar; } }
        function share(p, t, i) { window.location.href = `https://wa.me/?text=*📦 TWINS LOGISTICS*%0A*Placa:* ${p}%0A*Cajas:* ${t}%0A*Ruta:* ${i}`; }
    </script>
</body>
</html>
