<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TWINS ELITE - V48.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root {
            --bg: #f4f7f6; --surface: #ffffff; --accent: #000000; 
            --text: #000000; --text-dim: #6b7280; --border: #e5e7eb; 
            --success: #25D366; --shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { margin: 0; background: var(--bg); color: var(--text); padding-bottom: 90px; }

        .page { display: none; padding: 20px; max-width: 600px; margin: 0 auto; animation: fade 0.3s ease; }
        .active { display: block; }
        @keyframes fade { from { opacity: 0; } to { opacity: 1; } }

        /* Header de Carga Fijo */
        .sticky-header { background: #000; color: #fff; padding: 25px; border-radius: 0 0 32px 32px; margin: -20px -20px 20px -20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        
        .section-title { font-size: 11px; font-weight: 800; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1.5px; margin: 25px 0 12px 5px; display: flex; align-items: center; gap: 8px; }

        /* Cards Estilo Almacén */
        .route-card { background: #fff; border-radius: 24px; padding: 20px; margin-bottom: 12px; border: 1px solid var(--border); box-shadow: var(--shadow); position: relative; overflow: hidden; }
        .route-card::before { content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 6px; background: #eee; }
        .route-card.today::before { background: #000; }
        
        .route-actions { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 18px; }
        .action-btn { border: 1px solid var(--border); border-radius: 14px; padding: 12px 5px; font-size: 10px; font-weight: 800; background: #fff; display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .action-btn.wa { background: #000; color: #fff; border: none; }

        /* Dashboard */
        .core-dash { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 10px; }
        .master-card { background: #fff; padding: 20px; border-radius: 24px; border: 1px solid var(--border); }
        .master-card.black { background: #000; color: #fff; }
        .stat-main { font-size: 28px; font-weight: 900; display: block; }
        .stat-label { font-size: 10px; font-weight: 800; text-transform: uppercase; opacity: 0.7; }

        .input-box { background: #fff; border: 1px solid var(--border); border-radius: 18px; padding: 18px; width: 100%; font-size: 16px; font-weight: 700; outline: none; }
        
        /* Modales */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; align-items: center; justify-content: center; z-index: 2000; padding: 20px; backdrop-filter: blur(5px); }
        .modal-content { background: #fff; border-radius: 32px; padding: 30px; width: 100%; max-height: 85vh; overflow-y: auto; }
        .modal-item { display: flex; justify-content: space-between; padding: 15px; background: #f8f9fa; border-radius: 14px; margin-bottom: 8px; font-weight: 700; }

        /* Nav */
        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; height: 80px; display: flex; border-top: 1px solid var(--border); z-index: 1000; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #9ca3af; background: none; border: none; font-size: 10px; font-weight: 800; }
        .nav-item.active { color: #000; }
        .nav-item i { font-size: 26px; margin-bottom: 4px; }
    </style>
</head>
<body>

    <div id="page-dash" class="page active">
        <h2 style="font-weight: 900; font-size: 28px; letter-spacing: -1px; margin-bottom: 20px;">TWINS ELITE</h2>
        
        <div class="core-dash">
            <div class="master-card black">
                <span class="stat-label">Cajas Hoy</span>
                <span id="stat-hoy" class="stat-main">0</span>
            </div>
            <div class="master-card">
                <span class="stat-label">Cajas Mes</span>
                <span id="stat-mes" class="stat-main">0</span>
            </div>
        </div>

        <div id="historial-inteligente"></div>
    </div>

    <div id="page-units" class="page">
        <h2 style="font-weight: 900;">Nueva Carga</h2>
        <p style="color:gray; font-size:14px; margin-bottom:20px;">Selecciona la unidad que sale a ruta:</p>
        <div id="units-grid" style="display:grid; grid-template-columns:1fr 1fr; gap:12px;"></div>
    </div>

    <div id="page-assign" class="page">
        <div class="sticky-header">
            <span class="stat-label" style="color:#fff; opacity:0.6;">UNIDAD SELECCIONADA</span>
            <h1 id="assign-placa-view" style="margin:0; font-size:38px; font-weight:900;">---</h1>
        </div>
        
        <div class="route-card" style="margin-top:0; border:none;">
            <label class="section-title">Programación de Salida</label>
            <input type="date" id="sel-date-manual" class="input-box" style="margin-bottom:15px;">
            
            <label class="section-title">Personal de Ruta</label>
            <select id="sel-chofer" class="input-box" style="margin-bottom:10px;"></select>
            <select id="sel-aux" class="input-box"></select>
            
            <button onclick="confirmAssign()" class="input-box" style="background:#000; color:#fff; margin-top:30px; border:none; height:70px; font-size:18px;">INICIAR CARGA DE CAJAS</button>
        </div>
    </div>

    <div id="page-load" class="page">
        <div class="sticky-header">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <div>
                    <span class="stat-label" style="color:#fff; opacity:0.6;">CARGANDO UNIDAD</span>
                    <h1 id="load-placa-view" style="margin:0; font-size:32px; font-weight:900;">---</h1>
                </div>
                <div style="text-align:right;">
                    <span id="load-total" style="font-size:42px; font-weight:900; display:block;">0</span>
                    <span class="stat-label" style="color:#fff;">CAJAS TOTAL</span>
                </div>
            </div>
        </div>

        <div style="background:#fff; padding:20px; border-radius:24px; border:1px solid var(--border); margin-top:-10px;">
            <div style="display:flex; gap:10px; margin-bottom:15px;">
                <input type="text" id="inp-cli" placeholder="Nombre del Cliente" class="input-box" style="flex:2;">
                <input type="number" id="inp-can" placeholder="Cant" class="input-box" style="flex:1;">
            </div>
            <button onclick="addItem()" style="width:100%; background:#000; color:#fff; border:none; border-radius:15px; padding:18px; font-weight:800; font-size:16px;">+ AGREGAR A LISTA</button>
            
            <div id="items-list" style="margin-top:25px;"></div>
        </div>
        
        <button id="btn-finish" onclick="saveAndSync()" class="input-box" style="display:none; background:#25D366; color:#fff; border:none; margin-top:20px; height:70px;">FINALIZAR Y GUARDAR</button>
    </div>

    <div id="modal-view" class="modal">
        <div class="modal-content">
            <h3 id="view-title" style="margin-top:0; font-weight:900;">Detalle</h3>
            <div id="view-body"></div>
            <button onclick="closeModal('modal-view')" class="input-box" style="margin-top:20px; background:#f3f4f6; border:none;">CERRAR</button>
        </div>
    </div>

    <div id="modal-wa" class="modal">
        <div class="modal-content">
            <h3 style="margin-top:0; font-weight:900; color:#25D366;"><i class="ph-fill ph-whatsapp-logo"></i> Confirmar WhatsApp</h3>
            <div id="wa-summary"></div>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:25px;">
                <button onclick="closeModal('modal-wa')" class="input-box" style="background:#f3f4f6; border:none;">ATRÁS</button>
                <button onclick="executeWA()" class="input-box" style="background:#25D366; color:#fff; border:none;">ENVIAR AHORA</button>
            </div>
        </div>
    </div>

    <nav class="nav-bar">
        <button class="nav-item active" id="btn-nav-dash" onclick="go('page-dash')"><i class="ph-fill ph-chart-bar"></i>HISTORIAL</button>
        <button class="nav-item" id="btn-nav-units" onclick="go('page-units')"><i class="ph-fill ph-plus-circle"></i>NUEVA</button>
    </nav>

    <script>
        let db = JSON.parse(localStorage.getItem('twins_v48_db')) || [];
        let current = { items: [] }, waTargetId = null;

        const FLOTA = { "CEP-929": "ROMARIO", "BPN-711": "CESAR C.", "BVN-704": "LUIS H.", "BUL-742": "WALDIR", "BVN-930": "MARCELO" };
        const CONDUCTORES = ["TAJHO", "ROMARIO", "CESAR C.", "LUIS H.", "WALDIR", "MARCELO"];
        const AUXILIARES = ["POR DEFINIR", "CRISTOPHER", "PERCY", "PLACIDO", "RODOLFO", "RICARDO", "ELIO", "JOFER", "MARTIN", "NELSON", "JULIO", "DANIEL C."];

        window.onload = () => {
            document.getElementById('sel-date-manual').valueAsDate = new Date();
            const sc = document.getElementById('sel-chofer'), sa = document.getElementById('sel-aux'), ug = document.getElementById('units-grid');
            CONDUCTORES.forEach(c => sc.innerHTML += `<option value="${c}">${c}</option>`);
            AUXILIARES.forEach(a => sa.innerHTML += `<option value="${a}">${a}</option>`);
            for(let p in FLOTA) ug.innerHTML += `<div style="background:white; padding:25px; border-radius:20px; text-align:center; font-weight:900; border:1px solid var(--border);" onclick="startAssign('${p}')">${p}</div>`;
            renderStats(); renderSmartHistory();
        };

        function startAssign(p) {
            current = { placa: p, items: [], id: 'R' + Date.now() };
            document.getElementById('assign-placa-view').innerText = p; // Corrección: Se asigna la placa al título
            document.getElementById('sel-chofer').value = FLOTA[p] || CONDUCTORES[0];
            go('page-assign');
        }

        function confirmAssign() {
            current.chofer = document.getElementById('sel-chofer').value;
            current.auxiliar = document.getElementById('sel-aux').value;
            current.fecha = document.getElementById('sel-date-manual').value;
            document.getElementById('load-placa-view').innerText = current.placa; // Corrección: Se asigna la placa al título de carga
            refreshLoadUI(); go('page-load');
        }

        function addItem() {
            const cli = document.getElementById('inp-cli').value.toUpperCase().trim(), can = parseInt(document.getElementById('inp-can').value);
            if(!cli || isNaN(can)) return;
            current.items.push({cli, can});
            document.getElementById('inp-cli').value = ""; document.getElementById('inp-can').value = "";
            document.getElementById('inp-cli').focus();
            refreshLoadUI();
        }

        function refreshLoadUI() {
            let t = current.items.reduce((a,b)=>a+b.can,0);
            document.getElementById('load-total').innerText = t;
            document.getElementById('items-list').innerHTML = current.items.map((it, i) => `
                <div class="modal-item"><span>${it.can} • ${it.cli}</span><i class="ph-bold ph-trash" style="color:red" onclick="current.items.splice(${i},1);refreshLoadUI()"></i></div>`).reverse().join('');
            document.getElementById('btn-finish').style.display = t > 0 ? 'block' : 'none';
        }

        function renderSmartHistory() {
            const container = document.getElementById('historial-inteligente');
            container.innerHTML = "";
            
            const hoy = new Date().toISOString().split('T')[0];
            let ayer = new Date(); ayer.setDate(ayer.getDate() - 1); ayer = ayer.toISOString().split('T')[0];
            let mañana = new Date(); mañana.setDate(mañana.getDate() + 1); mañana = mañana.toISOString().split('T')[0];

            const routesAyer = db.filter(r => r.fecha === ayer);
            const routesHoy = db.filter(r => r.fecha === hoy);
            const routesFuturo = db.filter(r => r.fecha >= mañana);

            if(routesFuturo.length) {
                container.innerHTML += `<div class="section-title"><i class="ph-bold ph-calendar-plus"></i> Programados (Futuro)</div>`;
                routesFuturo.forEach(r => container.innerHTML += renderCard(r));
            }

            container.innerHTML += `<div class="section-title"><i class="ph-bold ph-truck"></i> Despachos de Hoy</div>`;
            if(!routesHoy.length) container.innerHTML += `<p style="font-size:12px; color:gray; margin-left:10px;">No hay rutas para hoy aún.</p>`;
            routesHoy.forEach(r => container.innerHTML += renderCard(r, 'today'));

            if(routesAyer.length) {
                container.innerHTML += `<div class="section-title"><i class="ph-bold ph-clock-counter-clockwise"></i> Rutas de Ayer</div>`;
                routesAyer.forEach(r => container.innerHTML += renderCard(r));
            }
        }

        function renderCard(r, type = '') {
            const total = r.items.reduce((a,b)=>a+b.can,0);
            return `
            <div class="route-card ${type}">
                <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                    <div><b style="font-size:20px;">${r.placa}</b><div style="font-size:11px; color:var(--text-dim); font-weight:700;">${r.chofer} | ${r.auxiliar}</div></div>
                    <div style="text-align:right;"><span style="font-size:9px; font-weight:800; display:block; opacity:0.5;">${r.fecha}</span><b style="font-size:22px;">${total}</b><span style="font-size:10px; font-weight:800;"> CJS</span></div>
                </div>
                <div class="route-actions">
                    <button class="action-btn" onclick="openViewModal('${r.id}')"><i class="ph-bold ph-eye"></i>VER</button>
                    <button class="action-btn" onclick="editRoute('${r.id}')"><i class="ph-bold ph-pencil-simple"></i>EDITAR</button>
                    <button class="action-btn wa" onclick="openWAModal('${r.id}')"><i class="ph-bold ph-whatsapp-logo"></i>WHATSAPP</button>
                </div>
            </div>`;
        }

        async function saveAndSync() {
            const idx = db.findIndex(x => x.id === current.id);
            if(idx > -1) db[idx] = current; else db.unshift(current);
            localStorage.setItem('twins_v48_db', JSON.stringify(db));
            go('page-dash'); renderStats(); renderSmartHistory();
        }

        function renderStats() {
            const hoy = new Date().toISOString().split('T')[0], mes = hoy.substring(0,7);
            const sum = (arr) => arr.reduce((a,b)=>a+b.items.reduce((x,y)=>x+y.can,0), 0);
            document.getElementById('stat-hoy').innerText = sum(db.filter(r => r.fecha === hoy));
            document.getElementById('stat-mes').innerText = sum(db.filter(r => r.fecha.startsWith(mes)));
        }

        function openViewModal(id) {
            const r = db.find(x => x.id === id);
            document.getElementById('view-title').innerText = `Ruta ${r.placa}`;
            document.getElementById('view-body').innerHTML = r.items.map(i => `<div class="modal-item"><span>${i.cli}</span><span>${i.can} Cjs</span></div>`).join('');
            document.getElementById('modal-view').style.display = 'flex';
        }

        function openWAModal(id) {
            waTargetId = id;
            const r = db.find(x => x.id === id);
            document.getElementById('wa-summary').innerHTML = `<div class="modal-item"><span>Unidad:</span><span>${r.placa}</span></div><div class="modal-item"><span>Total Cajas:</span><span>${r.items.reduce((a,b)=>a+b.can,0)}</span></div><div class="modal-item"><span>Total Envíos:</span><span>${r.items.length}</span></div>`;
            document.getElementById('modal-wa').style.display = 'flex';
        }

        function executeWA() {
            const r = db.find(x => x.id === waTargetId);
            const lista = r.items.map(i => `• ${i.cli}: ${i.can}`).join('\n');
            const totalCajas = r.items.reduce((a,b)=>a+b.can,0);
            const totalClientes = r.items.length;
            const msg = `*TWINS ELITE*\n\n🚛 *UNIDAD:* ${r.placa}\n👤 *CHOFER:* ${r.chofer}\n🤝 *AUX:* ${r.auxiliar}\n\n*LISTA DE DESPACHO:*\n${lista}\n\n📦 *TOTAL CAJAS:* ${totalCajas}\n👥 *TOTAL CLIENTES:* ${totalClientes}`;
            window.location.href = "whatsapp://send?text=" + encodeURIComponent(msg);
            closeModal('modal-wa');
        }

        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function editRoute(id) { current = JSON.parse(JSON.stringify(db.find(x => x.id === id))); refreshLoadUI(); go('page-load'); }
        function go(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            if(id === 'page-dash') document.getElementById('btn-nav-dash').classList.add('active');
            if(id === 'page-units') document.getElementById('btn-nav-units').classList.add('active');
            if(id === 'page-dash') renderSmartHistory();
        }
    </script>
</body>
</html>
