<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TWINS ELITE - V65.4 Stable</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root {
            --bg: #f4f6f8; --surface: #ffffff; --accent: #000000; 
            --text: #111827; --text-dim: #6b7280; --border: #e5e7eb; 
            --gold: #FFD700; --silver: #C0C0C0; --bronze: #CD7F32; --green: #10b981; --red: #ef4444;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { margin: 0; background: var(--bg); color: var(--text); padding-bottom: 100px; }

        /* --- BLOQUEO DE SEGURIDAD --- */
        #login-screen { position: fixed; inset: 0; background: #000; z-index: 5000; display: flex; align-items: center; justify-content: center; padding: 25px; }
        .login-card { background: #fff; width: 100%; max-width: 400px; padding: 40px 25px; border-radius: 35px; text-align: center; }

        .page { display: none; padding: 20px; max-width: 600px; margin: 0 auto; animation: fade 0.2s ease; }
        .active { display: block; }
        @keyframes fade { from { opacity: 0; } to { opacity: 1; } }

        /* --- ESTADÍSTICAS --- */
        .core-dash { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .master-card { background: #fff; padding: 18px; border-radius: 24px; border: 1px solid var(--border); display: flex; flex-direction: column; justify-content: space-between; height: 120px; }
        .master-card.black { background: #000; color: #fff; border: none; }
        .stat-label { font-size: 10px; font-weight: 800; text-transform: uppercase; opacity: 0.6; margin-bottom: 5px; display: block; }
        .stat-main { font-size: 28px; font-weight: 900; line-height: 1; display: block; }
        .stat-sub { font-size: 11px; font-weight: 800; margin-top: 10px; padding-top: 8px; border-top: 1px solid rgba(150,150,150,0.2); display: block; }

        /* --- DATA RANKING --- */
        .rank-box { background: #fff; border-radius: 24px; padding: 20px; border: 1px solid var(--border); margin-bottom: 20px; }
        .rank-header { display: flex; align-items: center; gap: 8px; margin-bottom: 15px; font-weight: 800; font-size: 13px; text-transform: uppercase; color: var(--text-dim); }
        .rank-item { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
        .rank-pos { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 12px; background: #eee; color: #aaa; flex-shrink: 0; }
        .pos-1 { background: var(--gold); color: #000; }
        .pos-2 { background: var(--silver); color: #000; }
        .pos-3 { background: var(--bronze); color: #000; }
        .rank-info { flex: 1; }
        .rank-name { font-size: 14px; font-weight: 700; margin-bottom: 4px; display: flex; justify-content: space-between; }
        .rank-bar-bg { background: #f3f4f6; height: 6px; border-radius: 10px; overflow: hidden; }
        .rank-bar-fill { background: #000; height: 100%; border-radius: 10px; transition: width 0.8s ease; }
        .rank-stats { font-size: 10px; font-weight: 800; color: var(--text-dim); margin-top: 4px; display: flex; gap: 10px; }
        .rank-stats b { color: #000; }

        /* --- HISTORIAL Y BUSCADOR --- */
        .search-box { position: relative; margin-bottom: 20px; }
        .search-box input { width: 100%; padding: 16px 20px 16px 50px; background: #fff; border: 1px solid var(--border); border-radius: 18px; font-weight: 700; outline: none; }
        .search-box i { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); font-size: 20px; color: var(--text-dim); }
        .route-card { background: #fff; border-radius: 24px; padding: 20px; margin-bottom: 15px; border: 1px solid var(--border); }
        .card-crew { font-size: 11px; font-weight: 700; color: #4b5563; margin-top: 12px; padding: 12px; background: #f9fafb; border-radius: 15px; }

        /* --- CARGA --- */
        .truck-load-header { background: #000; color: #fff; padding: 25px; border-radius: 28px; margin-bottom: 20px; }
        .truck-progress-bg { height: 8px; background: rgba(255,255,255,0.15); border-radius: 10px; margin-top: 15px; }
        .truck-progress-fill { height: 100%; background: var(--green); border-radius: 10px; transition: width 0.5s ease; width: 0%; }

        /* --- MODAL Y NAV --- */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); display: none; align-items: flex-end; z-index: 2000; }
        .modal-content { background: #fff; width: 100%; border-radius: 35px 35px 0 0; padding: 30px 20px; max-height: 85vh; overflow-y: auto; }
        .nav-bottom { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; height: 85px; display: none; border-top: 1px solid var(--border); z-index: 1000; }
        .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #9ca3af; background: none; border: none; font-size: 10px; font-weight: 800; }
        .nav-btn.active { color: #000; }
        .field { background: #fff; border: 1px solid var(--border); border-radius: 16px; padding: 16px; width: 100%; font-size: 15px; font-weight: 700; outline: none; margin-bottom: 12px; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-card">
            <h2 style="font-weight:900; margin-bottom:5px;">Twins Elite</h2>
            <p style="color:var(--text-dim); font-size:12px; margin-bottom:25px;">CONTROL DE ACCESO</p>
            <select id="user-select" class="field" onchange="checkUserType()">
                <option value="">Seleccione Usuario</option>
                <option value="TAJHO">TAJHO</option>
                <option value="FRANCHESCO">FRANCHESCO</option>
                <option value="OSCAR">OSCAR</option>
                <option value="LUIS HERBER">LUIS HERBER</option>
            </select>
            <input type="password" id="pass-field" class="field" placeholder="Contraseña Admin" style="display:none;">
            <button onclick="login()" style="width:100%; padding:20px; background:#000; color:#fff; border-radius:20px; font-weight:800; border:none; margin-top:10px;">ACCEDER</button>
        </div>
    </div>

    <div id="page-units" class="page">
        <h1 style="font-weight:900; margin-bottom:20px;">Despacho</h1>
        <div id="units-grid" style="display:grid; grid-template-columns:1fr 1fr; gap:15px;"></div>
    </div>

    <div id="page-dash" class="page active">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h1 style="font-weight:900; margin:0;">Twins Elite</h1>
            <div id="sync-indicator" style="width:8px; height:8px; border-radius:50%; background:var(--green); opacity:0.5;"></div>
        </div>
        <div class="core-dash">
            <div class="master-card black">
                <div><span class="stat-label">Control Hoy</span><span id="stat-hoy-cajas" class="stat-main">0</span></div>
                <span id="stat-hoy-envios" class="stat-sub">0 CLIENTES</span>
            </div>
            <div class="master-card">
                <div><span class="stat-label">Resumen Mes</span><span id="stat-mes-cajas" class="stat-main">0</span></div>
                <span id="stat-mes-envios" class="stat-sub">0 CLIENTES</span>
            </div>
        </div>
        <div class="search-box">
            <i class="ph-bold ph-magnifying-glass"></i>
            <input type="text" id="smart-search" placeholder="Buscar cliente, chofer o placa..." onkeyup="renderHistory()">
        </div>
        <div id="hist-cont"></div>
    </div>

    <div id="page-data" class="page">
        <h1 style="font-weight:900; margin-bottom:20px;">Rendimiento</h1>
        <input type="month" id="f-month" class="field" onchange="renderData()">
        <div class="rank-box"><div class="rank-header"><i class="ph-bold ph-steering-wheel"></i> Top Choferes</div><div id="rank-choferes-list"></div></div>
        <div class="rank-box"><div class="rank-header"><i class="ph-bold ph-users-three"></i> Top Auxiliares</div><div id="rank-auxiliares-list"></div></div>
    </div>

    <div id="page-load" class="page">
        <div class="truck-load-header">
            <div style="display:flex; justify-content:space-between; align-items:center;"><span style="font-size:10px; font-weight:800; opacity:0.7;">VEHÍCULO CARGANDO</span><b id="load-perc-txt" style="font-size:12px; color:var(--green);">0%</b></div>
            <div style="display:flex; justify-content:space-between; align-items:flex-end; margin-top:5px;"><h2 id="load-placa-txt" style="margin:0; font-size:32px; font-weight:900;">---</h2><div><span style="font-size:24px; font-weight:900;" id="load-total">0</span> <small style="opacity:0.6; font-size:10px;">/ 150</small></div></div>
            <div class="truck-progress-bg"><div id="load-bar" class="truck-progress-fill"></div></div>
        </div>
        <div style="display:flex; gap:10px; margin-bottom:15px;">
            <input type="text" id="i-cli" placeholder="Cliente" class="field" style="flex:2; margin:0">
            <input type="number" id="i-can" placeholder="Cjs" class="field" style="flex:1; margin:0">
        </div>
        <button onclick="addItem()" style="width:100%; padding:20px; background:#000; color:#fff; border-radius:20px; font-weight:800; border:none;">AGREGAR</button>
        <div id="load-list" style="margin-top:20px;"></div>
        <button id="btn-save" onclick="save()" style="display:none; width:100%; padding:22px; background:var(--green); color:#fff; border-radius:22px; font-weight:900; border:none; margin-top:20px;">GUARDAR RUTA</button>
    </div>

    <div id="page-config" class="page">
        <div style="background:#000; color:#fff; padding:30px; border-radius:30px; margin-bottom:25px; text-align:center;"><h2 id="conf-placa" style="margin:0; font-size:36px;">---</h2></div>
        <input type="date" id="c-fecha" class="field">
        <select id="c-chofer" class="field"></select>
        <select id="c-aux" class="field"></select>
        <button onclick="goLoad()" style="width:100%; padding:20px; background:#000; color:#fff; border-radius:20px; font-weight:800; border:none;">INICIAR CARGA</button>
    </div>

    <div id="modal-list" class="modal">
        <div class="modal-content"><div id="m-items"></div><button onclick="closeM()" style="width:100%; margin-top:20px; padding:20px; border-radius:20px; background:#eee; border:none; font-weight:800;">CERRAR</button></div>
    </div>

    <nav class="nav-bottom" id="main-nav">
        <button class="nav-btn" id="n-units" onclick="go('page-units')"><i class="ph-bold ph-plus-circle"></i>NUEVA</button>
        <button class="nav-btn active" id="n-dash" onclick="go('page-dash')"><i class="ph-bold ph-clock-counter-clockwise"></i>HISTORIAL</button>
        <button class="nav-btn" id="n-data" onclick="go('page-data')" style="display:none;"><i class="ph-bold ph-database"></i>DATA</button>
    </nav>

    <script>
        const CLOUD_URL = "https://script.google.com/macros/s/AKfycbzkIqN5__aLRTfyeJSWAAB-pUmt54kGsv4Ex2KWz_dgAvrCT_Gty05uZelf6gbcL4p7/exec";
        
        let db = JSON.parse(localStorage.getItem('twins_v63_db')) || [];
        let cur = JSON.parse(localStorage.getItem('twins_cur_draft')) || { items: [] };
        let userAuth = JSON.parse(localStorage.getItem('twins_auth')) || null;
        let isSyncing = false;

        const FLOTA = { "CEP-929": "ROMARIO", "BPN-711": "CESAR C.", "BVN-704": "LUIS H.", "BUL-742": "WALDIR", "BVN-930": "MARCELO" };
        const CONDUCTORES = ["TAJHO", "ROMARIO", "CESAR C.", "LUIS H.", "WALDIR", "MARCELO"];
        const AUXILIARES = ["POR ASIGNAR", "CRISTOPHER", "PERCY", "PLACIDO", "RODOLFO", "RICARDO", "ELIO", "JOFER", "MARTIN", "NELSON"];

        window.onload = () => {
            const ug = document.getElementById('units-grid');
            for(let p in FLOTA) ug.innerHTML += `<div style="background:#fff; padding:25px; border-radius:24px; text-align:center; border:1px solid var(--border);" onclick="initConf('${p}')"><i class="ph-bold ph-truck" style="font-size:28px;"></i><br><b>${p}</b></div>`;
            const sc = document.getElementById('c-chofer'), sa = document.getElementById('c-aux');
            CONDUCTORES.forEach(c => sc.innerHTML += `<option value="${c}">${c}</option>`);
            AUXILIARES.forEach(a => sa.innerHTML += `<option value="${a}">${a}</option>`);
            document.getElementById('f-month').value = new Date().toISOString().substring(0,7);
            
            if(userAuth) applyAuth();
            renderStats(); 
            renderHistory();

            // Restaurar borrador si existe
            if(cur.placa) {
                document.getElementById('load-placa-txt').innerText = cur.placa;
                refreshLoad();
            }

            setInterval(() => { if(userAuth) pullCloudData(true); }, 15000);
        };

        function checkUserType() { const u = document.getElementById('user-select').value; document.getElementById('pass-field').style.display = (u === 'TAJHO') ? 'block' : 'none'; }
        function login() { const u = document.getElementById('user-select').value; const p = document.getElementById('pass-field').value; if(!u) return; if(u === 'TAJHO' && p !== '1994') { alert("Clave Incorrecta"); return; } userAuth = { name: u, admin: (u === 'TAJHO') }; localStorage.setItem('twins_auth', JSON.stringify(userAuth)); applyAuth(); }
        function applyAuth() { document.getElementById('login-screen').style.display = 'none'; document.getElementById('main-nav').style.display = 'flex'; if(userAuth.admin) document.getElementById('n-data').style.display = 'flex'; pullCloudData(); }

        async function syncCloud(data) {
            const indicator = document.getElementById('sync-indicator');
            indicator.style.opacity = "1";
            try {
                fetch(CLOUD_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) })
                .then(() => { indicator.style.opacity = "0.5"; });
            } catch(e){ indicator.style.background = "var(--red)"; }
        }

        async function pullCloudData(silent = false) {
            if(isSyncing) return;
            isSyncing = true;
            const indicator = document.getElementById('sync-indicator');
            if(!silent) indicator.style.opacity = "1";
            try {
                const res = await fetch(CLOUD_URL);
                const cloud = await res.json();
                if(cloud && JSON.stringify(cloud) !== JSON.stringify(db)) {
                    db = cloud;
                    localStorage.setItem('twins_v63_db', JSON.stringify(db));
                    renderStats(); 
                    renderHistory();
                    if(document.getElementById('page-data').classList.contains('active')) renderData();
                }
                indicator.style.background = "var(--green)";
            } catch(e){ indicator.style.background = "var(--red)"; } finally { isSyncing = false; indicator.style.opacity = "0.5"; }
        }

        function go(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(n => n.classList.remove('active'));
            document.getElementById('n-'+id.split('-')[1]).classList.add('active');
            if(id === 'page-data') renderData();
            if(id === 'page-dash') pullCloudData(true);
        }

        function renderStats() {
            const hoy = new Date().toISOString().split('T')[0];
            const rHoy = db.filter(r => r.fecha.includes(hoy));
            const rMes = db.filter(r => r.fecha.startsWith(hoy.substring(0,7)));
            const sum = (a) => a.reduce((x,y) => x + (y.items ? y.items.reduce((z,w)=>z+w.can,0) : 0), 0);
            const cli = (a) => a.reduce((x,y) => x + (y.items ? y.items.length : 0), 0);
            document.getElementById('stat-hoy-cajas').innerText = sum(rHoy);
            document.getElementById('stat-hoy-envios').innerText = cli(rHoy) + " CLIENTES";
            document.getElementById('stat-mes-cajas').innerText = sum(rMes);
            document.getElementById('stat-mes-envios').innerText = cli(rMes) + " CLIENTES";
        }

        function initConf(p) { cur = { id: 'R'+Date.now(), placa: p, items: [], fecha: new Date().toISOString().split('T')[0], chofer: FLOTA[p], auxiliar: "POR ASIGNAR" }; localStorage.setItem('twins_cur_draft', JSON.stringify(cur)); document.getElementById('conf-placa').innerText = p; document.getElementById('c-fecha').value = cur.fecha; go('page-config'); }
        function goLoad() { cur.fecha = document.getElementById('c-fecha').value; cur.chofer = document.getElementById('c-chofer').value; cur.auxiliar = document.getElementById('c-aux').value; localStorage.setItem('twins_cur_draft', JSON.stringify(cur)); document.getElementById('load-placa-txt').innerText = cur.placa; refreshLoad(); go('page-load'); }
        function addItem() { const cli = document.getElementById('i-cli').value.toUpperCase().trim(); const can = parseInt(document.getElementById('i-can').value); if(cli && can) { cur.items.push({cli, can}); localStorage.setItem('twins_cur_draft', JSON.stringify(cur)); document.getElementById('i-cli').value=""; document.getElementById('i-can').value=""; refreshLoad(); } }
        
        function refreshLoad() { 
            const total = cur.items.reduce((a,b)=>a+b.can, 0); 
            const perc = Math.min((total/150)*100, 100).toFixed(0);
            document.getElementById('load-total').innerText = total;
            document.getElementById('load-perc-txt').innerText = perc+"%";
            document.getElementById('load-bar').style.width = perc+"%";
            document.getElementById('btn-save').style.display = total>0 ? 'block' : 'none';
            document.getElementById('load-list').innerHTML = cur.items.map((it, i) => `
                <div style="display:flex; justify-content:space-between; padding:15px; background:#fff; border-radius:15px; border:1px solid #eee; margin-bottom:10px;">
                    <span><i class="ph-bold ph-trash" style="color:var(--red); margin-right:12px;" onclick="cur.items.splice(${i},1); localStorage.setItem('twins_cur_draft', JSON.stringify(cur)); refreshLoad();"></i>${it.cli}</span>
                    <b>${it.can}</b>
                </div>`).reverse().join(''); 
        }

        function save() { 
            const idx = db.findIndex(r => r.id === cur.id); 
            if(idx > -1) {
                db[idx] = JSON.parse(JSON.stringify(cur));
            } else {
                db.unshift(JSON.parse(JSON.stringify(cur)));
            }
            localStorage.setItem('twins_v63_db', JSON.stringify(db)); 
            localStorage.removeItem('twins_cur_draft'); // Limpiar borrador al guardar
            renderStats(); renderHistory();
            syncCloud(cur);
            cur = { items: [] }; // Resetear objeto actual
            go('page-dash'); 
        }

        function renderHistory() {
            const q = document.getElementById('smart-search').value.toLowerCase();
            let filt = db.filter(r => r.chofer.toLowerCase().includes(q) || r.placa.toLowerCase().includes(q) || r.fecha.includes(q));
            document.getElementById('hist-cont').innerHTML = filt.map(r => `
                <div class="route-card">
                    <div style="display:flex; justify-content:space-between; font-size:10px; font-weight:800; color:var(--text-dim);"><span>📅 ${r.fecha.split('T')[0]}</span><span>${r.placa}</span></div>
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-top:5px;"><b style="font-size:24px;">${r.items ? r.items.reduce((a,b)=>a+b.can,0) : 0} CJS</b><b>${r.items ? r.items.length : 0} CLI.</b></div>
                    <div class="card-crew">👤 ${r.chofer} | 👥 ${r.auxiliar}</div>
                    <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-top:15px; border-top:1px solid #eee; padding-top:15px;">
                        <button onclick="viewL('${r.id}')" style="background:#fff; border:1px solid #eee; padding:10px; border-radius:12px; font-weight:800; font-size:10px;">LISTA</button>
                        <button onclick="editR('${r.id}')" style="background:#fff; border:1px solid #eee; padding:10px; border-radius:12px; font-weight:800; font-size:10px;">EDITAR</button>
                        <button onclick="shareW('${r.id}')" style="background:#fff; border:1px solid #eee; padding:10px; border-radius:12px; font-weight:800; font-size:10px;">REPORTE</button>
                    </div>
                </div>`).join('');
        }

        function renderData() {
            const m = document.getElementById('f-month').value;
            let filt = db.filter(r => r.fecha.startsWith(m));
            let cS = {}, aS = {};
            filt.forEach(r => { 
                if(!r.items) return;
                let cjs = r.items.reduce((a,b)=>a+b.can,0);
                cS[r.chofer] = cS[r.chofer] || {cjs:0, cls:0}; cS[r.chofer].cjs += cjs; cS[r.chofer].cls += r.items.length;
                aS[r.auxiliar] = aS[r.auxiliar] || {cjs:0, r:0}; aS[r.auxiliar].cjs += cjs; aS[r.auxiliar].r++;
            });
            const draw = (data, targetId, isAux) => {
                let sorted = Object.entries(data).sort((a,b)=>b[1].cjs - a[1].cjs).slice(0,5);
                let max = sorted[0] ? sorted[0][1].cjs : 1;
                document.getElementById(targetId).innerHTML = sorted.map(([n,v], i) => `
                    <div class="rank-item">
                        <div class="rank-pos ${i<3 ? 'pos-'+(i+1) : ''}">${i+1}</div>
                        <div class="rank-info">
                            <div class="rank-name"><span>${n}</span><span>${v.cjs} CJS</span></div>
                            <div class="rank-bar-bg"><div class="rank-bar-fill" style="width:${(v.cjs/max)*100}%"></div></div>
                            <div class="rank-stats"><span>Cjs: <b>${v.cjs}</b></span><span>${isAux?'Rut':'Cli'}: <b>${isAux?v.r:v.cls}</b></span></div>
                        </div>
                    </div>`).join('');
            };
            draw(cS, 'rank-choferes-list', false); draw(aS, 'rank-auxiliares-list', true);
        }

        function viewL(id) { const r = db.find(x => x.id === id); if(!r.items) return; document.getElementById('m-items').innerHTML = r.items.map(i => `<div style="display:flex; justify-content:space-between; padding:15px; border-bottom:1px solid #eee; font-weight:800;"><span>${i.cli}</span><span>${i.can} CJS</span></div>`).join(''); document.getElementById('modal-list').style.display = 'flex'; }
        function closeM() { document.getElementById('modal-list').style.display = 'none'; }
        
        function editR(id) { 
            const rFound = db.find(x => x.id === id);
            if(rFound) {
                cur = JSON.parse(JSON.stringify(rFound)); // Copia exacta con el mismo ID
                localStorage.setItem('twins_cur_draft', JSON.stringify(cur));
                document.getElementById('load-placa-txt').innerText = cur.placa;
                refreshLoad(); 
                go('page-load'); 
            }
        }
        
        function shareW(id) { 
            const r = db.find(x => x.id === id); 
            const totalCajas = r.items ? r.items.reduce((a,b)=>a+b.can,0) : 0;
            const totalClientes = r.items ? r.items.length : 0;
            let msg = `*TWINS ELITE*%0A%0A`;
            msg += `🚛 *UNIDAD:* ${r.placa}%0A`;
            msg += `👤 *CHOFER:* ${r.chofer}%0A`;
            msg += `🤝 *AUX:* ${r.auxiliar}%0A%0A`;
            msg += `*LISTA:*%0A`;
            if(r.items) r.items.forEach(i => { msg += `• ${i.cli}: ${i.can}%0A`; });
            msg += `%0A📦 *TOTAL:* ${totalCajas} Cjs`;
            msg += `%0A👥 *CLIENTES:* ${totalClientes}`;
            window.location.href = "https://api.whatsapp.com/send?text=" + msg; 
        }
    </script>
</body>
