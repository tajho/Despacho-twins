<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TWINS ELITE - V23 SMART</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root {
            --bg: #0b111a; --surface: #1a222f; --accent: #007aff; 
            --text: #ffffff; --text-dim: #94a3b8; --border: #2d3748; 
            --success: #34c759; --danger: #ff3b30;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; }
        
        /* Contenedores Principales */
        .page { display: none; height: 100vh; overflow-y: auto; padding: 10px 15px 140px 15px; max-width: 500px; margin: 0 auto; scroll-behavior: smooth; }
        .active { display: block !important; }

        /* Header Dinámico */
        .top-header { position: sticky; top: 0; z-index: 1000; background: rgba(11, 17, 26, 0.9); backdrop-filter: blur(20px); padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }

        /* Tarjetas de Datos */
        .card { background: var(--surface); border-radius: 22px; padding: 18px; border: 1px solid var(--border); margin-bottom: 15px; position: relative; overflow: hidden; }
        .h-header { display: flex; justify-content: space-between; align-items: flex-start; }
        .h-header b { font-size: 20px; color: #fff; letter-spacing: -0.5px; }
        .h-header .cjs { background: rgba(52, 199, 89, 0.15); color: var(--success); padding: 4px 10px; border-radius: 8px; font-weight: 800; font-size: 16px; }
        
        .h-info { font-size: 13px; color: var(--text-dim); margin: 10px 0 15px 0; display: flex; align-items: center; gap: 8px; }
        .date-badge { background: var(--border); color: #fff; padding: 3px 8px; border-radius: 6px; font-size: 11px; }

        /* Botones de Acción */
        .h-actions { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.05); }
        .btn-act { border: none; border-radius: 14px; padding: 12px 5px; font-size: 11px; font-weight: 800; color: white; display: flex; align-items: center; justify-content: center; gap: 6px; cursor: pointer; transition: 0.1s; }
        .btn-act:active { transform: scale(0.95); opacity: 0.8; }
        .btn-v { background: #334155; }
        .btn-e { background: #475569; }
        .btn-w { background: #075e54; }

        /* Buscador Inteligente */
        .search-area { position: sticky; top: 0; background: var(--bg); padding: 10px 0 20px 0; z-index: 100; }
        .search-container { background: var(--surface); border: 2px solid var(--border); border-radius: 16px; display: flex; align-items: center; padding: 0 15px; transition: 0.3s; }
        .search-container:focus-within { border-color: var(--accent); box-shadow: 0 0 15px rgba(0,122,255,0.2); }
        .search-container input { background: none; border: none; color: white; padding: 16px 0; width: 100%; font-size: 15px; font-weight: 600; }

        /* Navbar */
        .nav-bar { position: fixed; bottom: 20px; left: 15px; right: 15px; background: #1c2533; height: 75px; border-radius: 24px; display: flex; border: 1px solid var(--border); z-index: 2000; box-shadow: 0 15px 35px rgba(0,0,0,0.6); }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-dim); background: none; border: none; font-size: 9px; font-weight: 700; transition: 0.3s; }
        .nav-item.active { color: var(--accent); }
        .nav-item i { font-size: 26px; margin-bottom: 4px; }

        /* Inputs Generales */
        .inp-main { background: var(--surface); border: 1px solid var(--border); padding: 18px; border-radius: 16px; color: white; width: 100%; margin-bottom: 12px; font-size: 16px; }
        .btn-big { width:100%; padding:20px; border-radius:18px; border:none; font-weight:800; font-size:16px; cursor:pointer; }
    </style>
</head>
<body>

    <header id="app-header" class="top-header" style="display:none">
        <div style="font-weight:900; font-size:20px; letter-spacing:-1px;">TWINS <span style="color:var(--accent)">ELITE</span></div>
        <div onclick="syncData()" id="sync-btn" style="font-size:10px; font-weight:800; color:var(--success); background:rgba(52, 199, 89, 0.1); padding:8px 12px; border-radius:20px; cursor:pointer;">
            <i class="ph-bold ph-arrows-clockwise"></i> ACTUALIZAR
        </div>
    </header>

    <div id="page-login" class="page active">
        <div style="text-align:center; padding:80px 0">
            <h1 style="font-weight:800; margin:0; font-size:28px;">Sistema de Despacho</h1>
            <p style="color:var(--text-dim); margin-top:10px;">Gestión de Inventario V23</p>
        </div>
        <div id="login-options"></div>
    </div>

    <div id="page-history" class="page">
        <div class="search-area">
            <div class="search-container">
                <i class="ph-bold ph-magnifying-glass" style="margin-right:12px; color:var(--text-dim)"></i>
                <input type="text" id="smart-search" placeholder="Placa, cliente o fecha (ej: 929 25/02)" oninput="renderSmartHistory()">
            </div>
        </div>
        <div id="history-feed"></div>
    </div>

    <div id="page-select-plate" class="page">
        <h3 style="margin-bottom:25px; font-weight:800; font-size:22px;">Nueva Ruta</h3>
        <div id="plate-options" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;"></div>
    </div>

    <div id="page-route" class="page">
        <div style="background: linear-gradient(135deg, #007aff, #0056b3); padding: 25px; border-radius: 28px; margin-bottom: 20px; color:white; box-shadow: 0 10px 25px rgba(0,122,255,0.3);">
            <div style="display:flex; justify-content:space-between; align-items:center">
                <div><small style="font-weight:800; opacity:0.8; font-size:11px;">CARGA ACTUAL</small><div id="count-cajas" style="font-size:48px; font-weight:800;">0</div></div>
                <div style="text-align:right"><b id="active-plate-label" style="font-size:22px; display:block;">---</b><span id="count-puntos" style="font-size:13px; opacity:0.9;">0 clientes</span></div>
            </div>
        </div>
        <input type="text" id="inp-cli" class="inp-main" placeholder="Nombre del Cliente">
        <div style="display:flex; gap:12px; margin-bottom:20px">
            <input type="number" id="inp-can" class="inp-main" placeholder="Cant." style="flex:1;">
            <button onclick="addPoint()" style="background:var(--accent); border:none; border-radius:16px; color:white; width:75px; font-size:28px;"><i class="ph-bold ph-plus"></i></button>
        </div>
        <div id="live-list"></div>
        <div id="finalize-area" style="display:none; margin-top:20px;">
            <button onclick="openDateModal()" class="btn-big" style="background:var(--success); color:white; box-shadow: 0 8px 20px rgba(52,199,89,0.3);">ENVIAR A BASE DE DATOS</button>
        </div>
    </div>

    <div id="page-fleet" class="page">
        <h3 style="font-weight:800; font-size:22px; margin-bottom:20px;">Control de Flota</h3>
        <div id="fleet-container"></div>
    </div>

    <div id="page-reports" class="page">
        <h3 style="font-weight:800; font-size:22px; margin-bottom:20px;">Estadísticas de Carga</h3>
        <div id="report-details"></div>
    </div>

    <div id="modal-date" class="modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:3000; align-items:center; justify-content:center; padding:20px;">
        <div style="background:var(--surface); width:100%; max-width:400px; border-radius:30px; padding:30px; border:1px solid var(--border); text-align:center;">
            <h3 style="margin:0 0 10px 0;">Programación</h3>
            <p style="color:var(--text-dim); margin-bottom:25px;">¿Cuándo sale este despacho?</p>
            <button onclick="finalizeProcess('hoy')" class="btn-big" style="background:var(--accent); color:white; margin-bottom:12px;">PARA HOY</button>
            <button onclick="finalizeProcess('mañana')" class="btn-big" style="background:var(--border); color:white;">PARA MAÑANA</button>
            <button onclick="closeModal('modal-date')" style="background:none; border:none; color:var(--danger); margin-top:20px; font-weight:700;">CANCELAR</button>
        </div>
    </div>

    <div id="modal-view" class="modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:3000; align-items:center; justify-content:center; padding:20px;">
        <div style="background:var(--surface); width:100%; max-width:400px; border-radius:30px; padding:30px; border:1px solid var(--border);">
            <h3 id="mv-title" style="margin:0; color:var(--accent); font-size:24px;"></h3>
            <div id="mv-body" style="max-height:400px; overflow-y:auto; margin:20px 0; border-top:1px solid var(--border); padding-top:15px;"></div>
            <button onclick="closeModal('modal-view')" class="btn-big" style="background:var(--accent); color:white;">ENTENDIDO</button>
        </div>
    </div>

    <nav id="app-nav" class="nav-bar" style="display:none">
        <button class="nav-item" id="n-route" onclick="go('page-select-plate')"><i class="ph-fill ph-plus-circle"></i>RUTA</button>
        <button class="nav-item active" id="n-history" onclick="go('page-history')"><i class="ph-fill ph-database"></i>DATA</button>
        <button class="nav-item" id="n-fleet" onclick="go('page-fleet')"><i class="ph-fill ph-truck"></i>FLOTA</button>
        <button class="nav-item" id="n-reports" onclick="go('page-reports')"><i class="ph-fill ph-chart-pie-slice"></i>REPORTE</button>
    </nav>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbxuVVOZfMx8jkN-q079s6g7ppPAF4XIkNG-DEQGt6MqiownzLo3NMyWBIZ1hkTyoPBl/exec";
        let db = [], currentCarga = [], activeUser = "";
        const ASIGNACION = { "CEP-929": "ROMARIO", "BPN-711": "CESAR C.", "BVN-704": "LUIS H.", "BUL-742": "WALDIR", "BVN-930": "MARCELO" };

        window.onload = () => {
            const saved = localStorage.getItem('tw_db_v23');
            if(saved) { db = JSON.parse(saved); renderSmartHistory(); }
            setupUI();
            if(localStorage.getItem('tw_logged')) login(localStorage.getItem('tw_logged'));
        };

        function setupUI() {
            const l = document.getElementById('login-options');
            ['TAJHO ADMIN', 'FRANCESCO', 'OSCAR', 'LUIS HERBER'].forEach(u => {
                l.innerHTML += `<div onclick="checkPass('${u}')" style="background:var(--surface); padding:22px; border-radius:20px; margin-bottom:12px; border:1px solid var(--border); font-weight:700; display:flex; justify-content:space-between; align-items:center; cursor:pointer;">${u} <i class="ph ph-caret-right"></i></div>`;
            });
            document.getElementById('plate-options').innerHTML = Object.keys(ASIGNACION).map(p => 
                `<div onclick="startPlate('${p}')" style="background:var(--surface); border:1px solid var(--border); padding:30px 10px; border-radius:22px; font-weight:800; text-align:center; font-size:18px; cursor:pointer;">${p}</div>`
            ).join('');
        }

        async function syncData() {
            const btn = document.getElementById('sync-btn');
            btn.innerHTML = "ACTUALIZANDO...";
            try {
                const r = await fetch(API);
                const raw = await r.json();
                // Limpieza inteligente de datos
                db = raw.filter(x => x.placa && x.total < 10000).map((item, index) => ({
                    ...item, 
                    internalId: 'ID-' + Math.random().toString(36).substr(2, 9),
                    fecha: item.fecha.includes('T') ? item.fecha.split('T')[0] : item.fecha
                }));
                localStorage.setItem('tw_db_v23', JSON.stringify(db));
                renderSmartHistory();
                btn.innerHTML = `<i class="ph-bold ph-check"></i> AL DÍA`;
                setTimeout(() => btn.innerHTML = `<i class="ph-bold ph-arrows-clockwise"></i> ACTUALIZAR`, 3000);
            } catch(e) { btn.innerHTML = "ERROR"; }
        }

        function renderSmartHistory() {
            const val = document.getElementById('smart-search').value.toLowerCase();
            const terms = val.split(' ').filter(t => t !== '');
            let html = "";
            
            const filtered = db.filter(r => {
                const searchString = `${r.placa} ${r.chofer} ${r.items} ${r.fecha}`.toLowerCase();
                return terms.every(term => searchString.includes(term));
            });

            filtered.forEach(r => {
                const fDisplay = r.fecha.split('-').reverse().join('/'); // Convierte 2026-02-24 a 24/02/2026
                html += `
                <div class="card">
                    <div class="h-header">
                        <b>${r.placa}</b> 
                        <span class="cjs">${r.total} CJS</span>
                    </div>
                    <div class="h-info">
                        <i class="ph ph-user"></i> ${r.chofer} <span class="date-badge">${fDisplay}</span>
                    </div>
                    <div class="h-actions">
                        <button class="btn-act btn-v" onclick="viewR('${r.internalId}')"><i class="ph-bold ph-eye"></i> VER</button>
                        <button class="btn-act btn-e" onclick="editR('${r.internalId}')"><i class="ph-bold ph-pencil-simple"></i> EDITAR</button>
                        <button class="btn-act btn-w" onclick="sendWA('${r.internalId}')"><i class="ph-bold ph-whatsapp-logo"></i> WA</button>
                    </div>
                </div>`;
            });
            document.getElementById('history-feed').innerHTML = html || "<p style='text-align:center; opacity:0.3; margin-top:50px;'>No se encontraron resultados exactos</p>";
        }

        function viewR(id) {
            const r = db.find(x => x.internalId === id);
            if(!r) return;
            document.getElementById('mv-title').innerText = "Unidad " + r.placa;
            document.getElementById('mv-body').innerHTML = r.items.split(',').map(li => 
                `<div style="padding:15px; border-bottom:1px solid var(--border); font-size:15px; font-weight:600; display:flex; justify-content:space-between;">
                    ${li.trim()}
                </div>`).join('');
            document.getElementById('modal-view').style.display = 'flex';
        }

        function editR(id) {
            const r = db.find(x => x.internalId === id);
            if(!r || !confirm("¿Cargar esta ruta para modificarla?")) return;
            localStorage.setItem('tw_temp_placa', r.placa);
            currentCarga = r.items.split(',').map(li => {
                const p = li.split(':');
                return { cli: p[0].trim(), can: parseInt(p[1]) || 0 };
            });
            go('page-route'); refreshCargaUI();
        }

        function sendWA(id) {
            const r = db.find(x => x.internalId === id);
            const f = r.fecha.split('-').reverse().join('/');
            const msg = `*TWINS ELITE*\n📦 *${r.placa}* (${r.chofer})\n📅 *Fecha:* ${f}\n\n*CARGA:*\n${r.items.split(',').map(li => "• " + li.trim()).join('\n')}\n\n*TOTAL: ${r.total} CAJAS*`;
            window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
        }

        // --- CORE LOGIC ---
        function login(u) {
            activeUser = u; localStorage.setItem('tw_logged', u);
            document.getElementById('page-login').classList.remove('active');
            document.getElementById('app-header').style.display = 'flex';
            document.getElementById('app-nav').style.display = 'flex';
            syncData(); go('page-history');
        }
        function checkPass(u) { if(u==='TAJHO ADMIN' && prompt("Pass:")!=="1994") return; login(u); }
        function startPlate(p) { localStorage.setItem('tw_temp_placa', p); go('page-route'); refreshCargaUI(); }

        function go(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            const bid = id.includes('plate') || id.includes('route') ? 'n-route' : 'n-'+id.split('-')[1];
            if(document.getElementById(bid)) document.getElementById(bid).classList.add('active');
        }

        function addPoint() {
            const cli = document.getElementById('inp-cli').value.toUpperCase(), can = parseInt(document.getElementById('inp-can').value);
            if(!cli || isNaN(can)) return;
            currentCarga.push({cli, can});
            document.getElementById('inp-cli').value = ""; document.getElementById('inp-can').value = "";
            refreshCargaUI();
        }

        function refreshCargaUI() {
            let t = 0; let h = "";
            document.getElementById('active-plate-label').innerText = localStorage.getItem('tw_temp_placa') || "---";
            currentCarga.forEach((it, i) => {
                t += it.can;
                h += `<div class="card" style="display:flex; justify-content:space-between; margin-bottom:10px; padding:15px; border-left:5px solid var(--accent);">
                    <span><b>${it.can}</b> ${it.cli}</span>
                    <i class="ph-bold ph-trash" style="color:var(--danger); font-size:22px;" onclick="currentCarga.splice(${i},1);refreshCargaUI()"></i>
                </div>`;
            });
            document.getElementById('count-cajas').innerText = t;
            document.getElementById('count-puntos').innerText = currentCarga.length + " clientes";
            document.getElementById('finalize-area').style.display = t > 0 ? 'block' : 'none';
            document.getElementById('live-list').innerHTML = h;
        }

        function openDateModal() { document.getElementById('modal-date').style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        async function finalizeProcess(tipo) {
            let fechaEnvio = new Date();
            if(tipo === 'mañana') fechaEnvio.setDate(fechaEnvio.getDate() + 1);
            
            const r = {
                fecha: fechaEnvio.toISOString().split('T')[0],
                chofer: ASIGNACION[localStorage.getItem('tw_temp_placa')],
                placa: localStorage.getItem('tw_temp_placa'),
                items: currentCarga.map(i => `${i.cli}: ${i.can}`).join(", "),
                total: currentCarga.reduce((a,b)=>a+b.can,0),
                operario: activeUser,
                internalId: 'ID-' + Math.random().toString(36).substr(2, 9)
            };

            db.unshift(r);
            localStorage.setItem('tw_db_v23', JSON.stringify(db));
            fetch(API, {method:'POST', mode:'no-cors', body:JSON.stringify(r)});
            
            closeModal('modal-date');
            currentCarga = []; localStorage.removeItem('tw_temp_placa');
            go('page-history');
        }
    </script>
</body>
</html>
