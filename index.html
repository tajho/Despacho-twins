<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TWINS DESPACHOS V49</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #010204; --glass: rgba(255, 255, 255, 0.04);
            --accent: #007aff; --accent-glow: rgba(0, 122, 255, 0.4);
            --text: #f5f5f7; --text-dim: #86868b;
            --border: rgba(255, 255, 255, 0.1);
            --success: #2ed158; --danger: #ff453a;
        }

        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; outline: none; }
        body { 
            margin: 0; background: var(--bg); color: var(--text); 
            font-family: 'Plus Jakarta Sans', sans-serif; min-height: 100vh;
            background-image: radial-gradient(circle at 50% 0%, #0f172a, #010204);
        }

        .page { display: none; padding: 20px; padding-bottom: 120px; max-width: 500px; margin: 0 auto; animation: scaleIn 0.3s ease-out; }
        .active { display: block !important; }
        @keyframes scaleIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

        .top-header { 
            position: sticky; top: 0; z-index: 1000; 
            background: rgba(1, 2, 4, 0.8); backdrop-filter: blur(20px);
            padding: 20px; display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 1px solid var(--border);
        }
        .logo { font-weight: 800; font-size: 19px; letter-spacing: -1px; }
        .logo span { color: var(--accent); }

        .slider-wrapper { position: relative; width: 100%; overflow: hidden; margin-bottom: 20px; }
        .slider-container { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; scroll-behavior: smooth; gap: 15px; -ms-overflow-style: none; scrollbar-width: none; }
        .slider-container::-webkit-scrollbar { display: none; }
        .slide { min-width: 100%; scroll-snap-align: start; background: var(--glass); border: 1px solid var(--border); border-radius: 30px; padding: 20px; backdrop-filter: blur(15px); }
        .slider-dots { display: flex; justify-content: center; gap: 8px; margin-top: 10px; }
        .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-dim); transition: 0.3s; }
        .dot.active { width: 20px; background: var(--accent); border-radius: 10px; }

        .card { background: var(--glass); border: 1px solid var(--border); border-radius: 30px; padding: 22px; margin-bottom: 18px; backdrop-filter: blur(15px); }
        input, select { width: 100%; padding: 18px; border-radius: 20px; border: 1px solid var(--border); background: rgba(255,255,255,0.02); color: white; font-size: 15px; }
        .btn { width: 100%; padding: 18px; border-radius: 22px; border: none; font-size: 15px; font-weight: 700; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 10px; }
        .btn-main { background: var(--accent); color: white; box-shadow: 0 10px 25px var(--accent-glow); }
        .btn-ghost { background: var(--glass); color: var(--text); border: 1px solid var(--border); }
        .badge { font-size: 10px; padding: 5px 12px; border-radius: 50px; font-weight: 800; }
        .bg-route { background: rgba(0, 122, 255, 0.15); color: var(--accent); }

        .nav-bar { position: fixed; bottom: 25px; left: 20px; right: 20px; background: rgba(15, 15, 20, 0.85); backdrop-filter: blur(30px); height: 80px; border-radius: 35px; border: 1px solid var(--border); display: flex; justify-content: space-around; align-items: center; z-index: 2000; }
        .nav-link { display: flex; flex-direction: column; align-items: center; color: var(--text-dim); border: none; background: none; flex: 1; font-size: 10px; font-weight: 700; }
        .nav-link.active { color: var(--accent); }
        .nav-link i { font-size: 26px; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.96); backdrop-filter: blur(20px); z-index: 3000; padding: 25px; align-items: center; justify-content: center; }
        .modal-card { background: #0a0c10; border-radius: 40px; padding: 35px; width: 100%; max-width: 400px; border: 1px solid var(--border); }
        .stat-label { font-size: 9px; color: var(--text-dim); font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; }
        .stat-value { font-size: 20px; font-weight: 800; }
        .chart-container { position: relative; height: 180px; width: 100%; }
    </style>
</head>
<body>

    <div id="m-auth" class="modal">
        <div class="modal-card">
            <h2 style="text-align:center; margin:0">Admin Auth</h2>
            <input type="password" id="admin-pass" placeholder="••••" style="text-align:center; font-size:28px; letter-spacing:10px; margin-bottom:25px">
            <button class="btn btn-main" onclick="verifyAuth()">DESBLOQUEAR</button>
        </div>
    </div>

    <div id="m-list" class="modal" onclick="this.style.display='none'">
        <div class="modal-card" onclick="event.stopPropagation()">
            <h3 id="m-title" style="margin:0 0 5px 0">Detalle</h3>
            <div id="m-container" style="max-height: 300px; overflow-y: auto; margin-top:20px"></div>
            <button class="btn btn-main" style="margin-top:25px" onclick="document.getElementById('m-list').style.display='none'">CERRAR</button>
        </div>
    </div>

    <header id="app-header" class="top-header" style="display:none">
        <div class="logo">TWINS <span>DESPACHOS</span></div>
        <div id="user-display" style="font-size:11px; font-weight:800; color:var(--accent)">---</div>
    </header>

    <div id="page-login" class="page active">
        <h1 style="text-align:center; margin-top:10vh">TWINS DESPACHOS</h1>
        <div id="login-grid" style="display:grid; gap:14px; padding: 20px;"></div>
    </div>

    <div id="page-route" class="page">
        <div class="card" style="background: linear-gradient(135deg, #007aff, #0033aa); color:white;">
            <span style="font-size:11px; font-weight:800; opacity:0.8">CARGA ACTUAL</span>
            <div id="total-cajas" style="font-size:55px; font-weight:800">0</div>
            <div id="total-puntos" style="font-size:12px; font-weight:700;">0 PUNTOS</div>
        </div>

        <div class="card">
            <input type="text" id="cli" placeholder="Cliente o Destino" style="margin-bottom:12px">
            <div style="display:flex; gap:12px">
                <input type="number" id="can" placeholder="Cant." style="flex:0.8">
                <button class="btn btn-main" onclick="addItem()" style="flex:1.2">AÑADIR</button>
            </div>
        </div>

        <div id="send-zone" style="display:none">
            <div id="temp-list" class="card" style="border-style:dashed; background:transparent;"></div>
            <div class="card">
                <select id="pla" onchange="smartPredict()" style="margin-bottom:12px"></select>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:12px">
                    <select id="cho"></select>
                    <select id="aux"></select>
                </div>
                <button class="btn" style="background:var(--success); color:black" onclick="document.getElementById('m-type').style.display='flex'">
                    GUARDAR DESPACHO
                </button>
            </div>
        </div>
    </div>

    <div id="page-history" class="page">
        <div class="slider-wrapper">
            <div class="slider-container" id="slider">
                <div class="slide"><div class="stat-label">Productividad Choferes</div><div class="chart-container"><canvas id="choferChart"></canvas></div></div>
                <div class="slide"><div class="stat-label">Productividad Auxiliares</div><div class="chart-container"><canvas id="auxiliarChart"></canvas></div></div>
            </div>
            <div class="slider-dots"><div class="dot active"></div><div class="dot"></div></div>
        </div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px; margin-bottom:12px">
            <div class="card" style="margin:0; padding:15px; text-align:center"><div class="stat-label">Cajas Día</div><div class="stat-value" id="st-cajas" style="color:var(--accent)">0</div></div>
            <div class="card" style="margin:0; padding:15px; text-align:center"><div class="stat-label">Acumulado Mes</div><div class="stat-value" id="st-mes-cajas">0</div></div>
        </div>
        <div style="display:flex; gap:10px; margin-bottom:20px">
            <input type="date" id="f-filter" onchange="renderHistory()" style="flex:1.2">
            <input type="text" id="search" oninput="renderHistory()" placeholder="Buscar..." style="flex:0.8">
        </div>
        <div id="history-container"></div>
    </div>

    <div id="page-fleet" class="page">
        <div id="fleet-list"></div>
    </div>

    <div id="m-type" class="modal">
        <div class="modal-card">
            <h3 style="text-align:center">Fecha de Salida</h3>
            <button class="btn btn-main" style="margin-bottom:15px" onclick="saveRoute('HOY')">HOY</button>
            <button class="btn btn-ghost" onclick="saveRoute('MAÑANA')">MAÑANA</button>
        </div>
    </div>

    <nav id="app-nav" class="nav-bar" style="display:none">
        <button class="nav-link active" id="n-route" onclick="nav('page-route')"><i class="ph ph-plus-circle"></i>Ruta</button>
        <button class="nav-link" id="n-history" onclick="nav('page-history')"><i class="ph ph-database"></i>Data</button>
        <button class="nav-link" id="n-fleet" onclick="nav('page-fleet')"><i class="ph ph-truck"></i>Flota</button>
    </nav>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbxCRMbdOGYjf0R-w1v9tHG76jDhHXxuXOwHahYEV7Gj1lFn3y42C2s9DUO5nkgO75qy/exec";
        let user = "", items = [], database = [], cChart = null, aChart = null, editIndex = null;
        
        const PLACAS = ["CEP-929", "BPN-711", "BVN-704", "BUL-742", "BVN-930"];
        const CHOFERES = ["TAJHO", "LUIS H.", "ROMARIO", "CESAR C.", "WALDIR", "MARCELO"];
        const AUXILIARES = ["Cristopher", "Plácido", "Martin", "Percy", "Rodolfo", "Ricardo", "Elio", "Daniel C.", "Jofer", "Nelson", "Julio"];
        const SOATS = { "CEP-929": "2026-07-22", "BPN-711": "2026-06-10", "BVN-704": "2026-07-02", "BUL-742": "2026-04-02", "BVN-930": "2026-07-02" };

        window.onload = () => {
            initInputs();
            const savedUser = localStorage.getItem('tw_user');
            if(savedUser) login(savedUser);
            resetDateFilter();
            loadData();
            document.getElementById('slider').addEventListener('scroll', (e) => {
                const active = Math.round(e.target.scrollLeft / e.target.offsetWidth);
                document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === active));
            });
        };

        function resetDateFilter() { document.getElementById('f-filter').value = new Date().toISOString().split('T')[0]; }

        function initInputs() {
            const grid = document.getElementById('login-grid');
            ['TAJHO ADMIN', 'FRANCESCO', 'OSCAR', 'LUIS HERBER'].forEach(u => { grid.innerHTML += `<button class="btn btn-ghost" onclick="checkAuth('${u}')">${u}</button>`; });
            document.getElementById('pla').innerHTML = '<option value="">Placa</option>' + PLACAS.map(p => `<option value="${p}">${p}</option>`).join('');
            document.getElementById('cho').innerHTML = '<option value="">Chofer</option>' + CHOFERES.map(c => `<option value="${c}">${c}</option>`).join('');
            document.getElementById('aux').innerHTML = '<option value="">Auxiliar</option>' + AUXILIARES.map(a => `<option value="${a}">${a}</option>`).join('');
        }

        async function loadData() {
            const cache = localStorage.getItem('tw_db_cache');
            if (cache) { database = JSON.parse(cache); renderHistory(); renderFleet(); }
            try {
                const r = await fetch(API);
                database = await r.json();
                localStorage.setItem('tw_db_cache', JSON.stringify(database));
                renderHistory(); renderFleet();
            } catch(e) {}
        }

        function renderHistory() {
            const cont = document.getElementById('history-container'), fD = document.getElementById('f-filter').value;
            const sQ = document.getElementById('search').value.toUpperCase();
            let html = "", diaCajas = 0, mesCajas = 0, dataC = {}, dataA = {};
            const tM = new Date(fD + "T00:00:00").getMonth(), tY = new Date(fD + "T00:00:00").getFullYear();

            database.forEach((r, idx) => {
                const rDate = new Date(r.fecha + "T00:00:00");
                const total = parseFloat(r.total || 0);
                if (rDate.getMonth() === tM && rDate.getFullYear() === tY) {
                    dataC[r.chofer] = (dataC[r.chofer] || 0) + total;
                    dataA[r.auxiliar] = (dataA[r.auxiliar] || 0) + total;
                    mesCajas += total;
                }
                if (r.fecha.split('T')[0] === fD) {
                    if (!sQ || r.items.toUpperCase().includes(sQ) || r.chofer.toUpperCase().includes(sQ) || r.placa.toUpperCase().includes(sQ)) {
                        diaCajas += total;
                        html = `<div class="card" style="border-left:6px solid var(--accent)">
                            <div style="display:flex; justify-content:space-between; align-items:start">
                                <div><b style="font-size:18px">${r.placa}</b><br><span class="badge bg-route">EN RUTA</span></div>
                                <div style="text-align:right"><b style="color:var(--accent); font-size:20px">${r.total} CJ</b><div style="font-size:10px; opacity:0.6">${r.hora}</div></div>
                            </div>
                            <div style="font-size:14px; margin:15px 0; color:var(--text-dim)">${r.chofer} • ${r.auxiliar}</div>
                            <div style="display:flex; gap:10px">
                                <button class="btn-ghost" style="flex:1; padding:12px; font-size:12px" onclick="viewItems('${r.items}', '${r.chofer}')">DETALLE</button>
                                <button class="btn-ghost" style="width:50px" onclick="editRoute(${idx})"><i class="ph ph-pencil-simple"></i></button>
                                <button class="btn" style="background:#25D366; width:60px" onclick="wa('${r.chofer}','${r.auxiliar}','${r.placa}','${r.total}','${r.items}')"><i class="ph-fill ph-whatsapp-logo"></i></button>
                            </div>
                        </div>` + html;
                    }
                }
            });
            cont.innerHTML = html || "<p style='text-align:center; opacity:0.4'>Sin registros</p>";
            document.getElementById('st-cajas').innerText = diaCajas;
            document.getElementById('st-mes-cajas').innerText = mesCajas;
            updateCharts(dataC, dataA);
        }

        function updateCharts(dataC, dataA) {
            const opt = { indexAxis: 'y', responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { grid: { display: false } }, y: { grid: { display: false } } } };
            if(cChart) cChart.destroy();
            cChart = new Chart(document.getElementById('choferChart'), { type: 'bar', data: { labels: Object.keys(dataC), datasets: [{ data: Object.values(dataC), backgroundColor: '#007aff' }] }, options: opt });
            if(aChart) aChart.destroy();
            aChart = new Chart(document.getElementById('auxiliarChart'), { type: 'bar', data: { labels: Object.keys(dataA), datasets: [{ data: Object.values(dataA), backgroundColor: '#2ed158' }] }, options: opt });
        }

        function editRoute(idx) {
            const r = database[idx]; editIndex = idx;
            items = r.items.split(", ").map(i => { const p = i.split(": "); return { cl: p[0], ca: parseInt(p[1]) }; });
            document.getElementById('pla').value = r.placa; document.getElementById('cho').value = r.chofer; document.getElementById('aux').value = r.auxiliar;
            renderTemp(); nav('page-route');
        }

        function addItem() {
            const cl = document.getElementById('cli').value.toUpperCase(), ca = parseInt(document.getElementById('can').value);
            if(!cl || !ca) return; items.unshift({cl, ca});
            document.getElementById('cli').value = ""; document.getElementById('can').value = ""; renderTemp();
        }

        function renderTemp() {
            const box = document.getElementById('temp-list'); let t = 0; box.innerHTML = "";
            items.forEach(i => { t += i.ca; box.innerHTML += `<div style="display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid var(--border)"><span>${i.cl}</span><b>${i.ca} CJ</b></div>`; });
            document.getElementById('total-cajas').innerText = t; document.getElementById('total-puntos').innerText = items.length + " PUNTOS";
            document.getElementById('send-zone').style.display = items.length ? 'block' : 'none';
        }

        async function saveRoute(tipo) {
            document.getElementById('m-type').style.display = 'none';
            let d = new Date(); if(tipo === 'MAÑANA') d.setDate(d.getDate() + 1);
            const reg = { fecha: d.toISOString().split('T')[0], hora: new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true }), chofer: document.getElementById('cho').value, auxiliar: document.getElementById('aux').value, placa: document.getElementById('pla').value, items: items.map(i => `${i.cl}: ${i.ca}`).join(", "), total: items.reduce((a,b)=>a+b.ca,0), operario: user };
            if(editIndex !== null) { database[editIndex] = reg; editIndex = null; } else { database.unshift(reg); }
            localStorage.setItem('tw_db_cache', JSON.stringify(database));
            renderHistory(); nav('page-history');
            fetch(API, { method: 'POST', mode: 'no-cors', body: JSON.stringify(reg) });
            items = []; renderTemp();
        }

        function nav(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('n-' + id.split('-')[1]).classList.add('active');
            if(id === 'page-history') { resetDateFilter(); renderHistory(); }
            if(id === 'page-fleet') renderFleet();
        }

        function renderFleet() {
            const list = document.getElementById('fleet-list'), hoy = new Date();
            list.innerHTML = `<h2 style="margin-bottom:25px">Gestión de Flota</h2>`;
            PLACAS.forEach(p => {
                const v = new Date(SOATS[p]), dR = Math.ceil((v - hoy) / 86400000);
                list.innerHTML += `<div class="card" style="border-left:4px solid ${dR < 30 ? 'var(--danger)' : 'var(--success)'}">
                    <div style="display:flex; justify-content:space-between"><b>${p}</b><span style="font-size:12px; opacity:0.6">SOAT</span></div>
                    <div style="font-size:20px; font-weight:800; margin-top:10px">${dR} Días restantes</div>
                </div>`;
            });
        }

        function wa(c, a, p, t, i) { window.location.href = `https://wa.me/?text=*📦 DESPACHO TWINS*%0A*Chofer:* ${c}%0A*Auxiliar:* ${a}%0A*Placa:* ${p}%0A*Total:* ${t} CJ%0A%0A*DETALLE:*%0A${i.split(", ").map(x => `✅ ${x.toUpperCase()}`).join("%0A")}`; }
        function viewItems(t, ch) { document.getElementById('m-title').innerText = ch; document.getElementById('m-container').innerHTML = t.split(", ").map(i => `<div style="padding:10px 0; border-bottom:1px solid var(--border)">${i}</div>`).join(''); document.getElementById('m-list').style.display = 'flex'; }
        function checkAuth(u) { if(u === 'TAJHO ADMIN') document.getElementById('m-auth').style.display='flex'; else login(u); }
        function verifyAuth() { if(document.getElementById('admin-pass').value === '1234') { document.getElementById('m-auth').style.display='none'; login('TAJHO ADMIN'); } else alert("PIN Incorrecto"); }
        function login(u) { user = u; localStorage.setItem('tw_user', u); document.getElementById('page-login').classList.remove('active'); document.getElementById('app-header').style.display = 'flex'; document.getElementById('app-nav').style.display = 'flex'; document.getElementById('user-display').innerText = u; nav('page-route'); }
        function smartPredict() { const last = database.find(r => r.placa === document.getElementById('pla').value); if(last) { document.getElementById('cho').value = last.chofer; document.getElementById('aux').value = last.auxiliar; } }
    </script>
</body>
</html>
