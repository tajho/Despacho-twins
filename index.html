<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TWINS LOGISTICS ELITE</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root {
            --bg: #0a0e14;
            --card: rgba(255, 255, 255, 0.05);
            --accent: #007aff;
            --accent-glow: rgba(0, 122, 255, 0.4);
            --text: #ffffff;
            --text-dim: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
            --success: #32d74b;
            --danger: #ff453a;
        }

        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; outline: none; }
        body { 
            margin: 0; 
            background: var(--bg); 
            background: radial-gradient(circle at top right, #1a2533, #0a0e14);
            color: var(--text); 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            min-height: 100vh;
        }

        /* Páginas y Transiciones */
        .page { display: none; padding: 20px; padding-bottom: 120px; max-width: 500px; margin: 0 auto; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .active { display: block !important; }

        /* Header Premium */
        .top-header { 
            position: sticky; top: 0; z-index: 100; 
            background: rgba(10, 14, 20, 0.8);
            backdrop-filter: blur(20px);
            padding: 18px 24px; display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 1px solid var(--border);
        }
        .user-pill { 
            background: var(--accent); 
            padding: 6px 14px; border-radius: 50px; 
            font-size: 11px; font-weight: 800; color: white;
            box-shadow: 0 0 15px var(--accent-glow);
        }

        /* Tarjetas Estilo Glass */
        .card { 
            background: var(--card); 
            backdrop-filter: blur(10px);
            border-radius: 24px; border: 1px solid var(--border); 
            padding: 24px; margin-bottom: 18px; 
        }

        /* Inputs Modernos */
        input, select { 
            width: 100%; padding: 16px; margin: 10px 0; 
            border-radius: 16px; border: 1px solid var(--border); 
            background: rgba(0,0,0,0.2); color: white; 
            font-size: 15px; transition: 0.3s;
        }
        input:focus { border-color: var(--accent); box-shadow: 0 0 10px var(--accent-glow); }

        /* Botones con Esencia */
        .btn { 
            width: 100%; padding: 18px; border-radius: 18px; border: none; 
            font-size: 15px; font-weight: 800; cursor: pointer; 
            display: flex; justify-content: center; align-items: center; gap: 10px; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn:active { transform: scale(0.96); }
        .btn-main { background: var(--accent); color: white; box-shadow: 0 8px 20px var(--accent-glow); }
        
        /* Nav Inferior Minimalista */
        .bottom-nav { 
            position: fixed; bottom: 0; left: 0; right: 0; height: 85px; 
            background: rgba(10, 14, 20, 0.9); backdrop-filter: blur(20px);
            border-top: 1px solid var(--border); 
            display: flex; justify-content: space-around; align-items: center; z-index: 1000;
        }
        .nav-item { 
            background: none; border: none; color: var(--text-dim); 
            font-size: 10px; font-weight: 700; display: flex; flex-direction: column; 
            align-items: center; gap: 6px; flex: 1; transition: 0.3s;
        }
        .nav-item i { font-size: 26px; }
        .nav-item.active-nav { color: var(--accent); }

        /* Modal */
        .modal-overlay { 
            display: none; position: fixed; inset: 0; 
            background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); 
            z-index: 2000; justify-content: center; align-items: center; padding: 20px; 
        }
        .modal-content { 
            background: #161b22; border: 1px solid var(--border);
            border-radius: 32px; padding: 30px; width: 100%; max-width: 360px; text-align: center; 
        }

        /* Listas e Historial */
        .item-row { 
            display: flex; justify-content: space-between; padding: 12px 0; 
            border-bottom: 1px solid var(--border); font-size: 14px; 
        }
        .badge-total { font-size: 48px; font-weight: 800; letter-spacing: -2px; margin: 10px 0; }
    </style>
</head>
<body>

    <div id="modal-ask" class="modal-overlay">
        <div class="modal-content">
            <h3 style="margin:0 0 10px 0; font-weight: 800;">PROGRAMAR RUTA</h3>
            <p style="color:var(--text-dim); font-size:14px; margin-bottom:25px;">Selecciona la fecha de despacho</p>
            <button class="btn btn-main" style="margin-bottom:12px" onclick="confirmarGuardado('HOY')">
                <i class="ph-bold ph-calendar"></i> SALIDA HOY
            </button>
            <button class="btn" style="background:var(--success); color:black" onclick="confirmarGuardado('MAÑANA')">
                <i class="ph-bold ph-clock-afternoon"></i> PARA MAÑANA
            </button>
            <button class="btn" style="background:none; color:var(--text-dim); margin-top:10px" onclick="document.getElementById('modal-ask').style.display='none'">CANCELAR</button>
        </div>
    </div>

    <div id="header-app" class="top-header" style="display:none">
        <div class="user-pill" id="user-display">---</div>
        <div style="font-weight:800; font-size: 16px; letter-spacing: 1px;">TWINS <span style="color:var(--accent)">ELITE</span></div>
        <i class="ph-bold ph-power" onclick="cerrarSesion()" style="font-size:22px; color:var(--danger)"></i>
    </div>

    <div id="p1" class="page active" style="text-align:center; padding-top:12vh">
        <div style="margin-bottom:40px">
            <i class="ph-fill ph-cube" style="font-size: 80px; color: var(--accent); filter: drop-shadow(0 0 15px var(--accent-glow));"></i>
            <h1 style="font-size:32px; font-weight:800; margin:15px 0 5px 0">LOGISTICS</h1>
            <p style="color:var(--text-dim); font-size:14px;">Acceso restringido a personal</p>
        </div>
        <div style="display:grid; gap:14px; padding: 0 20px;">
            <button class="btn" style="background:var(--card); color:white; border:1px solid var(--border);" onclick="login('TAJHO ADMIN')">💎 TAJHO ADMIN</button>
            <button class="btn" style="background:var(--card); color:white; border:1px solid var(--border);" onclick="login('FRANCESCO')">FRANCESCO</button>
            <button class="btn" style="background:var(--card); color:white; border:1px solid var(--border);" onclick="login('OSCAR')">OSCAR</button>
            <button class="btn" style="background:var(--card); color:white; border:1px solid var(--border);" onclick="login('LUIS HERBER')">LUIS HERBER</button>
        </div>
    </div>

    <div id="p2" class="page">
        <div class="card" style="text-align:center; background: linear-gradient(135deg, var(--accent), #005bb5); border:none;">
            <span style="font-size:11px; font-weight:800; opacity:0.8; text-transform:uppercase;">Carga total en lista</span>
            <div class="badge-total" id="total-vivo">0</div>
            <span style="font-size:12px; font-weight:600;">UNIDADES CARGADAS</span>
        </div>

        <div class="card">
            <input type="text" id="cli" placeholder="Nombre del Cliente o Destino">
            <input type="number" id="can" placeholder="Cantidad de Cajas">
            <button class="btn btn-main" onclick="addItem()"><i class="ph-bold ph-plus-circle"></i>AÑADIR A RUTA</button>
        </div>

        <div id="area-envio" style="display:none">
            <div id="lista-items" class="card" style="font-size:14px;"></div>
            <div class="card" style="background: rgba(0,0,0,0.3)">
                <select id="pla"><option value="">Seleccionar Placa</option><option value="CEP-929">CEP-929</option><option value="BPN-711">BPN-711</option><option value="BVN-704">BVN-704</option><option value="BUL-742">BUL-742</option><option value="BVN-930">BVN-930</option></select>
                <select id="cho"><option value="">Seleccionar Chofer</option><option value="LUIS H.">Luis H.</option><option value="ROMARIO">Romario</option><option value="CESAR C.">Cesar C.</option><option value="WALDIR">Waldir</option><option value="MARCELO">Marcelo</option></select>
                <select id="aux"><option value="">Auxiliar</option><option value="CRISTOPHER">Cristopher</option><option value="PLACIDO">Placido</option><option value="RODOLFO">Rodolfo</option></select>
                <button class="btn" style="background:var(--success); color:black;" onclick="abrirModalGuardar()">
                    <i class="ph-bold ph-cloud-arrow-up"></i> FINALIZAR Y GUARDAR
                </button>
            </div>
        </div>
    </div>

    <div id="p3" class="page">
        <div style="display:flex; gap:12px; margin-bottom:20px;">
            <input type="date" id="f-dia" onchange="renderH()" style="margin:0; flex:1">
            <button onclick="load()" style="background:var(--card); color:white; border:1px solid var(--border); padding:15px; border-radius:16px;">
                <i class="ph-bold ph-arrows-clockwise"></i>
            </button>
        </div>
        <div id="h-list"></div>
    </div>

    <div id="p4" class="page">
        <h3 style="font-weight:800; margin-bottom:20px;">ESTADO DE UNIDADES</h3>
        <div id="lista-flota"></div>
    </div>

    <nav id="nav-app" class="bottom-nav" style="display:none">
        <button class="nav-item" id="nav-p2" onclick="nav('p2')"><i class="ph ph-package"></i>Ruta</button>
        <button class="nav-item" id="nav-p3" onclick="nav('p3')"><i class="ph ph-clock-counter-clockwise"></i>Historial</button>
        <button class="nav-item" id="nav-p4" onclick="nav('p4')"><i class="ph ph-truck"></i>Flota</button>
    </nav>

    <script>
        const URL = "https://script.google.com/macros/s/AKfycbxCRMbdOGYjf0R-w1v9tHG76jDhHXxuXOwHahYEV7Gj1lFn3y42C2s9DUO5nkgO75qy/exec";
        let user = "", ruta = [], db = [];

        window.onload = () => {
            const savedU = localStorage.getItem('tw_u');
            document.getElementById('f-dia').value = new Date().toISOString().split('T')[0];
            if(savedU) login(savedU);
            load();
        };

        function login(n) { 
            user = n; localStorage.setItem('tw_u', n);
            document.getElementById('p1').classList.remove('active'); 
            document.getElementById('header-app').style.display='flex'; 
            document.getElementById('nav-app').style.display='flex'; 
            document.getElementById('user-display').innerText = n; 
            nav('p2'); 
        }

        function nav(id) { 
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); 
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active-nav'));
            document.getElementById(id).classList.add('active'); 
            document.getElementById('nav-' + id).classList.add('active-nav');
            if(id === 'p3') renderH();
            if(id === 'p4') renderFlota();
        }

        async function load() { 
            try { 
                const res = await fetch(URL); 
                db = await res.json(); 
                renderH(); renderFlota(); 
            } catch(e){ console.log("Cargando..."); } 
        }

        function addItem() {
            const cl = document.getElementById('cli').value.toUpperCase(), ca = parseInt(document.getElementById('can').value);
            if(!cl || !ca) return; 
            ruta.unshift({cl, ca}); 
            document.getElementById('cli').value = ""; document.getElementById('can').value = ""; renderR(); 
        }

        function renderR() {
            const l = document.getElementById('lista-items'); let s = 0; l.innerHTML = "";
            ruta.forEach((i, x) => { 
                s += i.ca; 
                l.innerHTML += `<div class="item-row"><span>${i.cl}</span><b>${i.ca} CJ <i class="ph ph-trash" onclick="removeItem(${x})" style="color:var(--danger); margin-left:10px"></i></b></div>`; 
            });
            document.getElementById('total-vivo').innerText = s; 
            document.getElementById('area-envio').style.display = ruta.length > 0 ? 'block' : 'none';
        }

        function removeItem(x) { ruta.splice(x,1); renderR(); }

        function abrirModalGuardar() { 
            if(!document.getElementById('pla').value || !document.getElementById('cho').value) return alert("Completa Placa y Chofer");
            document.getElementById('modal-ask').style.display = 'flex'; 
        }

        async function confirmarGuardado(opcion) {
            document.getElementById('modal-ask').style.display = 'none';
            let d = new Date();
            if(opcion === 'MAÑANA') { d.setDate(d.getDate() + 1); if(d.getDay() === 0) d.setDate(d.getDate() + 1); }
            let fT = d.toISOString().split('T')[0];

            const reg = { 
                fecha: fT, chofer: document.getElementById('cho').value, auxiliar: document.getElementById('aux').value, 
                placa: document.getElementById('pla').value, operario: user, 
                items: ruta.map(i => `${i.cl}:${i.ca}`).join(", "), total: ruta.reduce((a,b) => a+b.ca, 0)
            };

            db.push(reg); document.getElementById('f-dia').value = fT; nav('p3'); renderH();

            fetch(URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(reg) }).then(() => setTimeout(load, 3000));
            
            ruta = []; renderR();
            document.getElementById('pla').value = ""; document.getElementById('cho').value = "";
        }

        function renderH() {
            const list = document.getElementById('h-list'), fD = document.getElementById('f-dia').value;
            let html = "";
            db.slice().reverse().forEach(r => {
                if(r.fecha.split("T")[0] === fD) {
                    html += `<div class="card" style="border-left:4px solid var(--accent)">
                        <div style="display:flex; justify-content:space-between; margin-bottom:8px"><b>${r.placa}</b><b style="color:var(--accent)">${r.total} CJ</b></div>
                        <div style="font-size:14px; color:var(--text-dim)">${r.chofer}</div>
                        <div style="font-size:12px; color:var(--text-dim); margin-top:10px; line-height:1.4">${r.items}</div>
                    </div>`;
                }
            });
            list.innerHTML = html || `<p style='text-align:center; color:var(--text-dim); padding-top:40px'>Sin registros</p>`;
        }

        function renderFlota() {
            const list = document.getElementById('lista-flota'), fD = document.getElementById('f-dia').value;
            const pl = ["CEP-929", "BPN-711", "BVN-704", "BUL-742", "BVN-930"];
            list.innerHTML = "";
            pl.forEach(p => {
                let rH = db.find(r => r.placa === p && r.fecha.split('T')[0] === fD);
                list.innerHTML += `<div class="card" style="border-left:5px solid ${rH ? var(--danger) : var(--success)}">
                    <div style="display:flex; justify-content:space-between"><b>${p}</b> <span>${rH ? '🔴':'🟢'}</span></div>
                    <small style="color:var(--text-dim)">${rH ? 'OCUPADO: '+rH.chofer : 'DISPONIBLE'}</small>
                </div>`;
            });
        }

        function cerrarSesion() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
