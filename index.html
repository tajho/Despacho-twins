<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TWINS DESPACHO V12 - SISTEMA BASE</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root {
            --bg: #0b0f17; --surface: #161c28; --accent: #007aff; 
            --text: #ffffff; --text-dim: #94a3b8; --border: #2d3748; 
            --success: #34c759; --danger: #ff3b30; --warning: #ffcc00;
        }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; outline: none; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; }
        
        .page { display: none; padding: 10px 15px 120px 15px; max-width: 500px; margin: 0 auto; }
        .active { display: block !important; }

        .top-header { position: sticky; top: 0; z-index: 1000; background: rgba(11, 15, 23, 0.9); backdrop-filter: blur(10px); padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        
        /* HEADER DE CARGA */
        .loading-header { background: linear-gradient(180deg, var(--surface) 0%, #111827 100%); border-radius: 24px; padding: 20px; border: 1px solid var(--accent); margin-bottom: 15px; }
        .loading-header label { font-size: 10px; font-weight: 800; color: var(--accent); text-transform: uppercase; margin-bottom: 8px; display: block; }

        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .stat-card { background: var(--surface); border: 1px solid var(--border); padding: 15px; border-radius: 18px; text-align: center; }
        .stat-card b { display: block; font-size: 20px; color: var(--accent); }

        input, select { background: #1f2937; border: 1px solid var(--border); padding: 16px; border-radius: 14px; color: white; font-size: 15px; width: 100%; margin-bottom: 10px; }
        
        .btn-add { background: var(--accent); border: none; border-radius: 16px; color: white; padding: 0 20px; font-weight: 800; cursor: pointer; }
        .btn-main { background: var(--success); color: white; width: 100%; padding: 20px; border-radius: 20px; border: none; font-size: 17px; font-weight: 800; margin-top: 10px; cursor: pointer; }
        .btn-opt { background: var(--border); color: white; border: none; padding: 12px; border-radius: 12px; font-size: 12px; font-weight: 700; flex: 1; display: flex; align-items: center; justify-content: center; gap: 5px; }

        /* MANIFIESTO */
        .manifest-card { background: #1e2533; border-radius: 20px; padding: 15px; margin-bottom: 10px; border: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
        .manifest-index { background: var(--accent); color: white; width: 28px; height: 28px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 900; }
        
        .card { background: var(--surface); border-radius: 24px; padding: 20px; margin-bottom: 15px; border: 1px solid var(--border); }
        .detail-box { display: none; background: #0b0f17; border-radius: 14px; padding: 15px; margin: 12px 0; font-size: 14px; color: #e2e8f0; border: 1px solid var(--accent); white-space: pre-line; }

        /* NAVEGACIÓN */
        .nav-bar { position: fixed; bottom: 20px; left: 15px; right: 15px; background: rgba(22, 28, 40, 0.95); backdrop-filter: blur(20px); height: 75px; border-radius: 22px; display: flex; border: 1px solid var(--border); z-index: 2000; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-dim); background: none; border: none; font-size: 10px; font-weight: 700; }
        .nav-item.active { color: var(--accent); }
        .nav-item i { font-size: 24px; margin-bottom: 4px; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 3000; align-items: center; justify-content: center; padding: 20px; }
    </style>
</head>
<body>

    <header id="app-header" class="top-header" style="display:none">
        <div style="font-weight:900; font-size:18px;">TWINS <span style="color:var(--accent)">DESPACHO</span></div>
        <div id="user-info" onclick="logout()" style="font-size:11px; font-weight:800; background:rgba(255,255,255,0.05); padding:8px 15px; border-radius:12px; border:1px solid var(--border)">---</div>
    </header>

    <div id="page-login" class="page active">
        <div style="text-align:center; padding:60px 0">
            <h2 style="font-weight:800; margin-bottom:5px">Acceso Almacén</h2>
            <p style="color:var(--text-dim); font-size:14px">Control de Inventario V12</p>
        </div>
        <div id="login-options"></div>
    </div>

    <div id="page-route" class="page">
        <div class="loading-header">
            <label><i class="ph-bold ph-truck"></i> Vehículo en Muelle</label>
            <select id="sel-pla" onchange="predictAndSave()" style="font-weight:800; border-color:var(--accent)"></select>
            <div style="display:flex; gap:10px">
                <div style="flex:1"><label>Chofer</label><select id="sel-cho" style="font-size:13px"></select></div>
                <div style="flex:1"><label>Auxiliar</label><select id="sel-aux" style="font-size:13px"></select></div>
            </div>
        </div>

        <div class="card" style="padding:15px; border-style:dashed; background:transparent">
            <label style="font-size:10px; font-weight:800; color:var(--text-dim); margin-bottom:8px; display:block">AÑADIR FACTURA:</label>
            <div style="display:flex; gap:10px">
                <input type="text" id="inp-cli" placeholder="Cliente / Fact" style="flex:2; margin-bottom:0">
                <input type="number" id="inp-can" placeholder="Cjs" style="flex:1; margin-bottom:0">
                <button class="btn-add" onclick="addPoint()"><i class="ph-bold ph-plus"></i></button>
            </div>
        </div>

        <div id="live-list" style="margin-top:20px"></div>

        <div id="finalize-area" style="display:none; text-align:center">
            <div style="background:rgba(52, 199, 89, 0.1); padding:15px; border-radius:18px; margin:20px 0">
                <span style="display:block; font-size:11px; font-weight:800; color:var(--success)">TOTAL CARGADO</span>
                <b id="total-cajas-msg" style="font-size:28px; color:var(--success)">0 CAJAS</b>
            </div>
            <button class="btn-main" onclick="openConfirm()">GUARDAR RUTA COMPLETADA</button>
        </div>
    </div>

    <div id="page-history" class="page">
        <div class="stat-grid">
            <div class="stat-card"><small>Cajas Hoy</small><b id="h-cajas-dia">0</b></div>
            <div class="stat-card"><small>Cajas Mes</small><b id="h-cajas-mes">0</b></div>
        </div>
        <div style="display:flex; gap:10px; margin-bottom:20px">
            <input type="date" id="filter-date" onchange="renderHistory()" style="flex:1; margin-bottom:0">
            <select id="filter-month" onchange="renderHistory()" style="flex:1; margin-bottom:0">
                <option value="ALL">Ver Mes Completo</option>
                <option value="0">Enero</option><option value="1">Febrero</option><option value="2">Marzo</option>
                <option value="3">Abril</option><option value="4">Mayo</option><option value="5">Junio</option>
                <option value="6">Julio</option><option value="7">Agosto</option><option value="8">Septiembre</option>
                <option value="9">Octubre</option><option value="10">Noviembre</option><option value="11">Diciembre</option>
            </select>
        </div>
        <div id="history-feed"></div>
    </div>

    <div id="page-fleet" class="page">
        <h3 style="margin-bottom:20px; padding-left:10px">Estado de Documentación</h3>
        <div id="fleet-grid"></div>
    </div>

    <div id="page-stats" class="page">
        <div class="card" style="text-align:center; padding:40px 20px;">
            <i class="ph-fill ph-file-pdf" style="font-size:64px; color:var(--danger); margin-bottom:15px"></i>
            <h3 style="margin-bottom:10px">Reporte Administrativo</h3>
            <button onclick="generatePDF()" class="btn-main" style="background:var(--danger);">GENERAR REPORTE PDF</button>
        </div>
    </div>

    <nav id="app-nav" class="nav-bar" style="display:none">
        <button class="nav-item active" id="n-route" onclick="go('page-route')"><i class="ph-fill ph-package"></i>CARGAR</button>
        <button class="nav-item" id="n-history" onclick="go('page-history')"><i class="ph-fill ph-clock-counter-clockwise"></i>DATA</button>
        <button class="nav-item" id="n-fleet" onclick="go('page-fleet')"><i class="ph-fill ph-truck"></i>FLOTA</button>
        <button class="nav-item" id="n-stats" style="display:none" onclick="go('page-stats')"><i class="ph-fill ph-file-pdf"></i>PDF</button>
    </nav>

    <div id="modal-confirm" class="modal">
        <div class="card" style="width:100%; text-align:center; border: 2px solid var(--accent)">
            <h3 style="margin-bottom:10px">¿Cerrar Despacho?</h3>
            <p id="confirm-summary" style="font-size:14px; color:var(--text-dim); margin-bottom:25px"></p>
            <div style="display:flex; gap:10px">
                <button class="btn-main" style="margin-top:0" onclick="finalize('HOY')">SALIENDO HOY</button>
                <button class="btn-main" style="margin-top:0; background:var(--accent)" onclick="finalize('MAÑANA')">PROGRAMADO</button>
            </div>
            <button onclick="closeConfirm()" style="background:none; border:none; color:var(--text-dim); margin-top:20px">VOLVER</button>
        </div>
    </div>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbxuVVOZfMx8jkN-q079s6g7ppPAF4XIkNG-DEQGt6MqiownzLo3NMyWBIZ1hkTyoPBl/exec";
        let activeUser = "", currentCarga = [], db = [];

        const DATA = {
            placas: ["CEP-929", "BPN-711", "BVN-704", "BUL-742", "BVN-930"],
            choferes: ["TAJHO", "LUIS H.", "ROMARIO", "CESAR C.", "WALDIR", "MARCELO"],
            auxiliares: ["Cristopher", "Plácido", "Martin", "Percy", "Rodolfo", "Ricardo", "Elio", "Daniel C.", "Jofer", "Nelson", "Julio"],
            soats: { "CEP-929": "2026-07-22", "BPN-711": "2026-06-10", "BVN-704": "2026-07-02", "BUL-742": "2026-04-02", "BVN-930": "2026-07-02" }
        };

        window.onload = () => {
            setupUI();
            const su = localStorage.getItem('tw_logged');
            if(su) login(su);
            const sr = localStorage.getItem('tw_temp_route');
            if(sr) { currentCarga = JSON.parse(sr); refreshCargaUI(); }
            syncData();
        };

        function setupUI() {
            const opts = document.getElementById('login-options');
            ['TAJHO ADMIN', 'FRANCESCO', 'OSCAR', 'LUIS HERBER'].forEach(u => {
                opts.innerHTML += `<div class="login-btn" onclick="checkPass('${u}')" style="background:var(--surface); padding:18px; border-radius:18px; margin-bottom:10px; font-weight:700; text-align:center">${u}</div>`;
            });
            document.getElementById('sel-pla').innerHTML = '<option value="">--- PLACA ---</option>' + DATA.placas.map(p => `<option value="${p}">${p}</option>`).join('');
            document.getElementById('sel-cho').innerHTML = '<option value="">Chofer</option>' + DATA.choferes.map(c => `<option value="${c}">${c}</option>`).join('');
            document.getElementById('sel-aux').innerHTML = '<option value="">Auxiliar</option>' + DATA.auxiliares.map(a => `<option value="${a}">${a}</option>`).join('');
            document.getElementById('filter-month').value = new Date().getMonth();
            document.getElementById('filter-date').value = new Date().toLocaleDateString('sv-SE');
        }

        function checkPass(u) { if(u === 'TAJHO ADMIN') { const p = prompt("Clave:"); if(p === "1994") login(u); } else login(u); }

        function login(u) { 
            activeUser = u; localStorage.setItem('tw_logged', u);
            document.getElementById('page-login').classList.remove('active');
            document.getElementById('app-header').style.display = 'flex';
            document.getElementById('app-nav').style.display = 'flex';
            document.getElementById('user-info').innerText = u;
            // Bloque de seguridad para el Reporte PDF
            document.getElementById('n-stats').style.display = (u === "TAJHO ADMIN") ? "flex" : "none";
            go('page-route');
        }

        async function syncData() {
            try {
                const res = await fetch(API);
                const raw = await res.json();
                // Sincronización real con la base de datos
                db = raw.map(r => ({ ...r, total: parseFloat(r.total || 0) }))
                        .sort((a,b) => new Date(b.fecha + ' ' + (b.hora || '00:00')) - new Date(a.fecha + ' ' + (a.hora || '00:00')));
                renderHistory();
            } catch(e) { console.log("Error de sincronización"); }
        }

        function renderHistory() {
            const container = document.getElementById('history-feed');
            const selMonth = document.getElementById('filter-month').value;
            const selDate = document.getElementById('filter-date').value;
            let h = "", dCjs = 0, mCjs = 0;
            const now = new Date();

            db.forEach((r, i) => {
                const rDate = new Date(r.fecha + 'T00:00:00');
                if(rDate.getMonth() === now.getMonth() && rDate.getFullYear() === now.getFullYear()) mCjs += r.total;

                let match = (selMonth === "ALL") ? (r.fecha === selDate) : (rDate.getMonth().toString() === selMonth);
                
                if(match) {
                    if(r.fecha === new Date().toLocaleDateString('sv-SE')) dCjs += r.total;
                    h += `<div class="card">
                        <div style="display:flex; justify-content:space-between">
                            <span style="font-size:11px; color:var(--accent); font-weight:800">${r.fecha}</span>
                            <b style="font-size:17px">${r.placa}</b>
                        </div>
                        <div style="font-weight:800; font-size:24px; margin:10px 0">${r.total} Cjs</div>
                        <div id="details-${i}" class="detail-box"><b>LISTA:</b>\n${(r.detalles || r.items || "").split(', ').join('\n')}</div>
                        <div style="display:flex; gap:8px">
                            <button class="btn-opt" onclick="toggleDetails(${i})">Lista</button>
                            <button class="btn-opt" onclick="loadEdit(${i})">Editar</button>
                            <button class="btn-opt" style="background:#25D366" onclick="shareWA(${i})"><i class="ph ph-whatsapp-logo"></i></button>
                        </div>
                    </div>`;
                }
            });
            document.getElementById('h-cajas-dia').innerText = dCjs;
            document.getElementById('h-cajas-mes').innerText = mCjs;
            container.innerHTML = h || `<p style="text-align:center; opacity:0.3; margin-top:50px">No hay datos en la base</p>`;
        }

        function renderFleet() { 
            const grid = document.getElementById('fleet-grid');
            grid.innerHTML = DATA.placas.map(p => {
                const venc = new Date(DATA.soats[p]);
                const hoy = new Date();
                const diff = Math.ceil((venc - hoy) / (1000 * 60 * 60 * 24));
                const color = diff < 30 ? 'var(--danger)' : 'var(--success)';
                return `
                <div class="card" style="display:flex; justify-content:space-between; align-items:center">
                    <div><b>${p}</b><br><small style="color:var(--text-dim)">Vence: ${DATA.soats[p]}</small></div>
                    <div style="text-align:right"><b style="color:${color}; font-size:20px">${diff}</b><br><small style="font-size:9px; font-weight:800">DÍAS REST.</small></div>
                </div>`;
            }).join('');
        }

        function addPoint() { 
            const cli = document.getElementById('inp-cli').value.toUpperCase(); 
            const can = parseInt(document.getElementById('inp-can').value); 
            if(!cli || !can || !document.getElementById('sel-pla').value) return;
            currentCarga.push({ cli, can }); 
            localStorage.setItem('tw_temp_route', JSON.stringify(currentCarga));
            document.getElementById('inp-cli').value = ""; document.getElementById('inp-can').value = ""; 
            refreshCargaUI(); 
        }

        function refreshCargaUI() { 
            const list = document.getElementById('live-list'); let total = 0; list.innerHTML = ""; 
            currentCarga.forEach((it, i) => { 
                total += it.can; 
                list.innerHTML += `<div class="manifest-card"><div class="manifest-index">${i+1}</div><div style="flex:1"><b>${it.cli}</b></div><div style="color:var(--success); font-weight:800">${it.can} Cjs</div><i class="ph-bold ph-trash" style="color:var(--danger)" onclick="removePoint(${i})"></i></div>`; 
            }); 
            document.getElementById('total-cajas-msg').innerText = total + " CAJAS";
            document.getElementById('finalize-area').style.display = currentCarga.length > 0 ? 'block' : 'none'; 
        }

        async function finalize(op) {
            const now = new Date(); if(op === 'MAÑANA') now.setDate(now.getDate() + 1);
            const r = {
                fecha: now.toLocaleDateString('sv-SE'), hora: new Date().toLocaleTimeString('es-PE', { hour: '2-digit', minute: '2-digit', hour12: false }),
                chofer: document.getElementById('sel-cho').value, auxiliar: document.getElementById('sel-aux').value, placa: document.getElementById('sel-pla').value,
                items: currentCarga.map(i => `${i.cli}: ${i.can}`).join(", "), total: currentCarga.reduce((a,b) => a + b.can, 0), operario: activeUser
            };
            fetch(API, { method: 'POST', mode: 'no-cors', body: JSON.stringify(r) });
            db.unshift(r); currentCarga = []; localStorage.removeItem('tw_temp_route');
            document.getElementById('sel-pla').value = ""; refreshCargaUI(); closeConfirm(); go('page-history');
        }

        function go(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('n-' + id.split('-')[1]).classList.add('active');
            if(id === 'page-history') renderHistory();
            if(id === 'page-fleet') renderFleet();
        }

        function predictAndSave() {
            const placa = document.getElementById('sel-pla').value;
            const ultimo = db.find(r => r.placa === placa);
            if(ultimo) { document.getElementById('sel-cho').value = ultimo.chofer; document.getElementById('sel-aux').value = ultimo.auxiliar; }
        }

        function toggleDetails(i) { const el = document.getElementById(`details-${i}`); el.style.display = el.style.display === 'block' ? 'none' : 'block'; }
        function openConfirm() { document.getElementById('modal-confirm').style.display = 'flex'; }
        function closeConfirm() { document.getElementById('modal-confirm').style.display = 'none'; }
        function logout() { localStorage.clear(); location.reload(); }
        function removePoint(i) { currentCarga.splice(i,1); localStorage.setItem('tw_temp_route', JSON.stringify(currentCarga)); refreshCargaUI(); }
        function shareWA(i) { const r = db[i]; const msg = `*📦 TWINS DESPACHO*%0A*Placa:* ${r.placa}%0A*Cajas:* ${r.total}%0A*Ruta:*%0A${(r.detalles || r.items).split(', ').join('%0A')}`; window.open(`https://wa.me/?text=${msg}`, '_blank'); }
        function generatePDF() {
            const { jsPDF } = window.jspdf; const doc = new jsPDF(); 
            doc.text(`REPORTE TWINS - ${new Date().toLocaleString('es-ES', { month: 'long' }).toUpperCase()}`, 14, 20);
            const body = db.map(r => [r.fecha, r.placa, r.total, r.chofer]);
            doc.autoTable({ head: [['Fecha', 'Placa', 'Cjs', 'Chofer']], body: body, startY: 30 });
            doc.save(`Reporte_Twins.pdf`);
        }
    </script>
</body>
</html>
