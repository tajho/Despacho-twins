<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TWINS ELITE V18</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@phosphor-icons/web"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
:root{
--bg:#0b0f17; --surface:#161c28; --accent:#007aff;
--text:#fff; --border:#2d3748; --success:#34c759;
--warning:#ffcc00;
}
body{margin:0;background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans'}
.page{display:none;padding:15px 15px 120px;max-width:500px;margin:auto}
.active{display:block}
.top-header{position:sticky;top:0;background:#0b0f17;padding:12px;border-bottom:1px solid var(--border)}
input,button{font-family:inherit}
input{width:100%;padding:14px;border-radius:12px;border:1px solid var(--border);background:var(--surface);color:#fff;margin-bottom:10px}
.btn{background:var(--accent);border:none;color:#fff;padding:14px;border-radius:12px;font-weight:800;width:100%}
.card{background:var(--surface);padding:14px;border-radius:12px;margin-bottom:8px;border:1px solid var(--border)}
.quick button{flex:1;padding:10px;border-radius:10px;border:none;background:#1f2937;color:#fff}
.nav{position:fixed;bottom:20px;left:15px;right:15px;background:#1c2533;height:65px;border-radius:18px;display:flex}
.nav button{flex:1;border:none;background:none;color:#94a3b8;font-weight:700}
.nav .active{color:#007aff}
</style>
</head>

<body>

<header class="top-header">
<b>TWINS <span style="color:#007aff">ELITE</span></b>
<span id="status" style="color:#34c759;font-weight:800">● ACTUALIZADO</span>
</header>

<div id="page-route" class="page active">

<h3 id="placaLabel">Seleccionar Unidad</h3>

<input list="clientesList" id="inpCli" placeholder="Cliente">
<datalist id="clientesList"></datalist>

<input type="number" id="inpCan" placeholder="Cantidad">

<div class="quick" style="display:flex;gap:6px;margin-bottom:10px">
<button onclick="quickAdd(1)">+1</button>
<button onclick="quickAdd(5)">+5</button>
<button onclick="quickAdd(10)">+10</button>
</div>

<button class="btn" onclick="addPoint()">AGREGAR</button>

<h2 id="totalBox">0 cajas</h2>
<div id="live"></div>

<button class="btn" style="background:#34c759;margin-top:20px" onclick="finalize()">GUARDAR</button>

<hr style="margin:25px 0">

<button class="btn" style="background:#ffcc00;color:#000" onclick="showRanking()">VER RANKING</button>
<button class="btn" style="background:#34c759;margin-top:8px" onclick="generatePDF()">GENERAR PDF</button>

</div>

<script>
const API="TU_API_AQUI"; // ← TU MISMO LINK
let db=[];
let carga=[];

/* ================= AUTOSAVE ================= */
function saveLocal(){localStorage.setItem("tw_carga",JSON.stringify(carga))}
function loadLocal(){
const d=localStorage.getItem("tw_carga");
if(d)carga=JSON.parse(d);
}

/* ================= SYNC ================= */
async function sync(){
try{
const r=await fetch(API);
db=await r.json();
buildClientes();
}catch{}
}
setInterval(sync,60000);

/* ================= CLIENTES INTELIGENTES ================= */
function buildClientes(){
const set=new Set();
db.forEach(r=>{
r.items.split(',').forEach(i=>set.add(i.split(':')[0].trim()))
});
clientesList.innerHTML=[...set].map(c=>`<option value="${c}">`).join('');
}

/* ================= AGREGAR ================= */
function addPoint(){
const cli=inpCli.value.trim().toUpperCase();
const can=parseInt(inpCan.value);

if(!cli||!can||can<=0||can>500)return alert("Dato inválido");

const ex=carga.find(x=>x.cli===cli);
if(ex)ex.can+=can;
else carga.push({cli,can});

inpCli.value="";inpCan.value="";
saveLocal();
render();
}

/* ================= QUICK ADD ================= */
function quickAdd(n){
inpCan.value=(parseInt(inpCan.value||0)+n);
}

/* ================= RENDER ================= */
function render(){
let total=0,html="";
carga.forEach((c,i)=>{
total+=c.can;
html+=`<div class="card">
<b>${c.can}</b> ${c.cli}
<span onclick="del(${i})" style="float:right;color:red;cursor:pointer">✕</span>
</div>`;
});
live.innerHTML=html;
totalBox.innerText=total+" cajas";
}

/* ================= DELETE ================= */
function del(i){
carga.splice(i,1);
saveLocal();
render();
}

/* ================= FINALIZAR ================= */
async function finalize(){
if(!carga.length)return;

document.getElementById("status").innerText="● EN RUTA";
document.getElementById("status").style.color="#ffcc00";

const total=carga.reduce((a,b)=>a+b.can,0);

const data={
fecha:new Date().toLocaleDateString('sv-SE'),
hora:new Date().toLocaleTimeString(),
chofer:"CHOFER",
placa:"PLACA",
items:carga.map(i=>`${i.cli}: ${i.can}`).join(", "),
total,
operario:"OPERARIO"
};

fetch(API,{method:'POST',mode:'no-cors',body:JSON.stringify(data)});

carga=[];
saveLocal();
render();
sync();

document.getElementById("status").innerText="● ACTUALIZADO";
document.getElementById("status").style.color="#34c759";
}

/* ================= RANKING ================= */
function getRanking(){
const ym=new Date().toLocaleDateString('sv-SE').substring(0,7);
const ch={},op={};

db.forEach(r=>{
if(!r.fecha.startsWith(ym))return;
ch[r.chofer]=(ch[r.chofer]||0)+parseFloat(r.total);
op[r.operario]=(op[r.operario]||0)+parseFloat(r.total);
});

return{
choferes:Object.entries(ch).sort((a,b)=>b[1]-a[1]),
aux:Object.entries(op).sort((a,b)=>b[1]-a[1])
};
}

function showRanking(){
const r=getRanking();
alert(
"CHOFERES:\n"+r.choferes.map((c,i)=>`${i+1}. ${c[0]} ${c[1]} cajas`).join("\n")+
"\n\nAUXILIARES:\n"+r.aux.map((c,i)=>`${i+1}. ${c[0]} ${c[1]} cajas`).join("\n")
);
}

/* ================= PDF ================= */
function generatePDF(){
const {jsPDF}=window.jspdf;
const doc=new jsPDF();
const r=getRanking();

doc.text("REPORTE MENSUAL TWINS ELITE",20,20);

let y=40;
doc.text("CHOFERES",20,y);
y+=10;
r.choferes.forEach((c,i)=>{doc.text(`${i+1}. ${c[0]} - ${c[1]} cajas`,25,y);y+=8;});

y+=10;
doc.text("AUXILIARES",20,y);
y+=10;
r.aux.forEach((c,i)=>{doc.text(`${i+1}. ${c[0]} - ${c[1]} cajas`,25,y);y+=8;});

doc.save("REPORTE_TWINS.pdf");
}

/* INIT */
loadLocal();
render();
sync();
</script>

</body>
</html>
