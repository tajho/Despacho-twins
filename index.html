<div id="page-data" class="page">
    <h1 style="font-weight: 900; font-size: 26px; margin-bottom: 20px;">Auditoría de Personal</h1>
    
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:25px;">
        <input type="month" id="f-month" class="field" onchange="renderData()" style="margin:0">
        <button onclick="injectFakeData()" style="background:#000; color:#fff; border:none; border-radius:12px; font-size:11px; font-weight:800;">SIMULAR MES COMPLETO</button>
    </div>

    <div class="section-tag">Reporte Consolidado Choferes</div>
    <div id="rank-choferes-list" class="rank-box">
        </div>

    <div class="section-tag">Reporte Consolidado Auxiliares</div>
    <div id="rank-auxiliares-list" class="rank-box">
        </div>

    <div class="section-tag">Log de Salidas Registradas</div>
    <div id="data-results"></div>
</div>

<script>
// Nueva lógica de renderizado para Auditoría
function renderData() {
    const m = document.getElementById('f-month').value || new Date().toISOString().substring(0,7);
    let filt = db.filter(r => r.fecha.startsWith(m));
    
    let cStats = {}, aStats = {};
    filt.forEach(r => {
        let cjs = r.items.reduce((a,b)=>a+b.can,0);
        let cls = r.items.length;
        cStats[r.chofer] = cStats[r.chofer] || {cjs:0, cls:0, r:0};
        cStats[r.chofer].cjs += cjs; cStats[r.chofer].cls += cls; cStats[r.chofer].r++;
        
        aStats[r.auxiliar] = aStats[r.auxiliar] || {cjs:0, r:0};
        aStats[r.auxiliar].cjs += cjs; aStats[r.auxiliar].r++;
    });

    const drawTable = (data, targetId, isAux = false) => {
        let sorted = Object.entries(data).sort((a,b) => b[1].cjs - a[1].cjs);
        let html = `<table style="width:100%; font-size:12px; border-collapse:collapse;">
            <tr style="text-align:left; color:gray; font-size:10px;">
                <th style="padding:8px 0;">PERSONAL</th>
                <th>${isAux ? 'RUTAS' : 'CLIENTES'}</th>
                <th style="text-align:right;">TOTAL CAJAS</th>
            </tr>`;
        
        html += sorted.map(([name, val]) => `
            <tr style="border-top:1px solid #f3f4f6;">
                <td style="padding:12px 0; font-weight:700;">${name}</td>
                <td>${isAux ? val.r : val.cls}</td>
                <td style="text-align:right; font-weight:800;">${val.cjs}</td>
            </tr>`).join('') + `</table>`;
            
        document.getElementById(targetId).innerHTML = sorted.length ? html : '<p style="font-size:11px; color:gray;">No hay registros este mes.</p>';
    };

    drawTable(cStats, 'rank-choferes-list');
    drawTable(aStats, 'rank-auxiliares-list', true);
}
</script>
