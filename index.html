<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TWINS ELITE - V45.4 SYNC</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root {
            --bg: #f8fafc; --surface: #ffffff; --accent: #0062ff; 
            --text: #0f172a; --text-dim: #64748b; --border: #e2e8f0; 
            --success: #10b981; --shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { margin: 0; background: var(--bg); color: var(--text); padding-bottom: 90px; }

        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; height: 75px; display: flex; border-top: 1px solid var(--border); z-index: 1000; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-dim); background: none; border: none; font-size: 11px; font-weight: 700; }
        .nav-item.active { color: var(--accent); }

        .page { display: none; padding: 18px; max-width: 500px; margin: 0 auto; animation: fadeIn 0.3s; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .date-divider { display: flex; align-items: center; gap: 10px; margin: 25px 0 12px 5px; font-size: 11px; font-weight: 800; color: var(--accent); text-transform: uppercase; }
        .date-divider::after { content: ""; flex: 1; height: 2px; background: var(--border); }

        .route-card { background: #fff; border-radius: 24px; padding: 18px; margin-bottom: 12px; box-shadow: var(--shadow); border: 1px solid var(--border); }
        .input-box { background: #fff; border: 1px solid var(--border); border-radius: 18px; padding: 16px; width: 100%; font-size: 16px; font-weight: 600; outline: none; }
        
        #sync-loader { display: none; position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--success); color: white; padding: 12px 25px; border-radius: 30px; font-size: 13px; font-weight: 800; z-index: 3000; box-shadow: 0 10px 30px rgba(16,185,129,0.4); }
    </style>
</head>
<body>

    <div id="sync-loader"><i class="ph-bold ph-cloud-arrow-up"></i> SUBIENDO AL EXCEL...</div>

    <div id="page-dash" class="page active">
        <h2 style="font-weight: 800;">Historial</h2>
        <div style="display:flex; gap:8px; margin-bottom:20px;">
            <input type="text" id="search" placeholder="Placa o chofer..." class="input-box" oninput="renderHistory()" style="flex:1;">
            <input type="date" id="filter-date" class="input-box" style="width:55px; padding:10px;" onchange="renderHistory()">
        </div>
        <div id="history-container"></div>
    </div>

    <div id="page-units" class="page">
        <h2 style="font-weight:800;">Nueva Carga</h2>
        <div id="units-grid" style="display:grid; grid-template-columns:1fr 1fr; gap:12px;"></div>
    </div>

    <div id="page-assign" class="page">
        <h2 id="title-placa" style="font-weight:800;">---</h2>
        <div style="background:white; padding:20px; border-radius:24px; border:1px solid var(--border);">
            <label style="font-size:11px; font-weight:800; color:var(--text-dim);">DESPACHO</label>
            <select id="sel-date" class="input-box" style="margin-bottom:15px;">
                <option value="ayer">Ayer</option>
                <option value="hoy" selected>Hoy</option>
                <option value="mañana">Mañana</option>
            </select>
            <label style="font-size:11px; font-weight:800; color:var(--text-dim);">CONDUCTOR</label>
            <select id="sel-chofer" class="input-box" style="margin-bottom:15px;"></select>
            <label style="font-size:11px; font-weight:800; color:var(--text-dim);">AUXILIAR</label>
            <select id="sel-aux" class="input-box"></select>
            <button onclick="confirmAssign()" class="input-box" style="background:var(--accent); color:#fff; border:none; margin-top:20px; padding:22px; font-weight:800;">SIGUIENTE</button>
        </div>
    </div>

    <div id="page-load" class="page">
        <div style="background:var(--text); color:#fff; padding:20px; border-radius:24px; margin-bottom:15px; display:flex; justify-content:space-between; align-items:center;">
            <div><h3 id="load-placa" style="margin:0;">---</h3><span id="load-meta" style="font-size:11px; opacity:0.7;"></span></div>
            <span id="load-total" style="font-size:32px; font-weight:900;">0</span>
        </div>
        <div style="background:white; padding:20px; border-radius:24px; border:1px solid var(--border);">
            <input type="text" id="inp-cli" placeholder="Cliente" class="input-box" style="margin-bottom:10px;">
            <div style="display:flex; gap:10px;">
                <input type="number" id="inp-can" placeholder="Cjs" class="input-box" style="flex:1;">
                <button onclick="addItem()" style="background:var(--accent); color:#fff; border:none; border-radius:18px; width:70px; font-size:32px;">+</button>
            </div>
            <div id="items-list" style="margin-top:20px;"></div>
        </div>
        <button id="btn-finish" onclick="saveAndSync()" class="input-box" style="display:none; background:var(--success); color:#fff; border:none; margin-top:15px; padding:22px; font-weight:800;">TERMINAR Y SUBIR</button>
    </div>

    <nav class="nav-bar">
        <button class="nav-item active" id="n-dash" onclick="go('page-dash')"><i class="ph-fill ph-clock-counter-clockwise" style="font-size:24px;"></i>HISTORIAL</button>
        <button class="nav-item" id="n-units" onclick="go('page-units')"><i class="ph-fill ph-plus-circle" style="font-size:24px;"></i>CARGAR</button>
    </nav>

    <script>
        const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycby59273ThmezjUQ9-AB6Gx5O8G6J6zMB7SAtzImDhUfEoXBlCx-mT9h4AvzVI_2C56O/exec'; 

        let db = JSON.parse(localStorage.getItem('twins_db_v45_4') || '[]');
        let current = { items: [] };

        const FLOTA = { "CEP-929": "ROMARIO", "BPN-711": "CESAR C.", "BVN-704": "LUIS H.", "BUL-742": "WALDIR", "BVN-930": "MARCELO" };
        const CONDUCTORES = ["TAJHO", "ROMARIO", "CESAR C.", "LUIS H.", "WALDIR", "MARCELO"];
        const AUXILIARES = ["POR DEFINIR", "CRISTOPHER", "PERCY", "PLACIDO", "RODOLFO", "RICARDO", "ELIO", "JOFER", "MARTIN", "NELSON", "JULIO", "DANIEL C."];

        window.onload = () => {
            const sc = document.getElementById('sel-chofer'), sa = document.getElementById('sel-aux'), ug = document.getElementById('units-grid');
            CONDUCTORES.forEach(c => sc.innerHTML += `<option value="${c}">${c}</option>`);
            AUXILIARES.forEach(a => sa.innerHTML += `<option value="${a}">${a}</option>`);
            for(let p in FLOTA) ug.innerHTML += `<div style="background:white; padding:25px; border-radius:20px; text-align:center; font-weight:800; border:1px solid var(--border);" onclick="startAssign('${p}')">${p}</div>`;
            renderHistory();
        };

        function startAssign(p) {
            current = { placa: p, items: [], id: 'R' + Date.now() };
            document.getElementById('title-placa').innerText = p;
            document.getElementById('sel-chofer').value = FLOTA[p] || CONDUCTORES[0];
            go('page-assign');
        }

        function confirmAssign() {
            current.chofer = document.getElementById('sel-chofer').value;
            current.auxiliar = document.getElementById('sel-aux').value;
            let d = new Date(); 
            const opt = document.getElementById('sel-date').value;
            if(opt === 'mañana') d.setDate(d.getDate() + 1);
            if(opt === 'ayer') d.setDate(d.getDate() - 1);
            current.fecha = d.toISOString().split('T')[0];
            refreshLoadUI(); go('page-load');
        }

        function addItem() {
            const cli = document.getElementById('inp-cli').value.toUpperCase(), can = parseInt(document.getElementById('inp-can').value);
            if(!cli || !can) return;
            current.items.push({cli, can});
            document.getElementById('inp-cli').value = ""; document.getElementById('inp-can').value = "";
            refreshLoadUI();
        }

        function refreshLoadUI() {
            document.getElementById('load-placa').innerText = current.placa;
            document.getElementById('load-meta').innerText = "Ruta: " + current.fecha;
            let t = current.items.reduce((a,b)=>a+b.can,0);
            document.getElementById('load-total').innerText = t;
            document.getElementById('items-list').innerHTML = current.items.map((it, i) => `
                <div style="display:flex; justify-content:space-between; padding:12px; border-bottom:1px solid #eee; font-weight:600;">
                    <span>${it.can} ${it.cli}</span>
                    <i class="ph-bold ph-trash" style="color:red" onclick="current.items.splice(${i},1);refreshLoadUI()"></i>
                </div>`).join('');
            document.getElementById('btn-finish').style.display = t > 0 ? 'block' : 'none';
        }

        async function saveAndSync() {
            db.unshift(current);
            localStorage.setItem('twins_db_v45_4', JSON.stringify(db));
            
            document.getElementById('sync-loader').style.display = 'block';
            
            try {
                // Envío real al Excel mediante POST
                await fetch(WEB_APP_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(current)
                });
            } catch (e) {
                alert("Guardado localmente. Se subirá al Excel cuando haya mejor conexión.");
            }

            setTimeout(() => {
                document.getElementById('sync-loader').style.display = 'none';
                go('page-dash');
                renderHistory();
            }, 1500);
        }

        function renderHistory() {
            const q = document.getElementById('search').value.toLowerCase();
            const fDate = document.getElementById('filter-date').value;
            const container = document.getElementById('history-container');
            container.innerHTML = "";

            const hoy = new Date().toISOString().split('T')[0];
            let ayer = new Date(); ayer.setDate(ayer.getDate() - 1); ayer = ayer.toISOString().split('T')[0];
            let mañana = new Date(); mañana.setDate(mañana.getDate() + 1); mañana = mañana.toISOString().split('T')[0];

            let data = db.filter(r => JSON.stringify(r).toLowerCase().includes(q));

            if(fDate) {
                renderBlock(container, `DÍA: ${fDate}`, data.filter(r => r.fecha === fDate));
            } else {
                renderBlock(container, "PARA MAÑANA", data.filter(r => r.fecha === mañana));
                renderBlock(container, "CARGA DE HOY", data.filter(r => r.fecha === hoy));
                renderBlock(container, "AYER", data.filter(r => r.fecha === ayer));
            }
        }

        function renderBlock(cont, titulo, items) {
            if(items.length === 0) return;
            cont.innerHTML += `<div class="date-divider">${titulo}</div>`;
            items.forEach(r => {
                const total = r.items.reduce((a,b)=>a+b.can,0);
                cont.innerHTML += `
                <div class="route-card">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <div><b style="font-size:17px;">${r.placa}</b><div style="font-size:11px; color:var(--text-dim);">${r.chofer}</div></div>
                        <div style="text-align:right;"><b style="color:var(--accent); font-size:18px;">${total}</b><div style="font-size:9px; font-weight:800;">CAJAS</div></div>
                    </div>
                </div>`;
            });
        }

        function go(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id === 'page-dash' ? 'n-dash' : 'n-units').classList.add('active');
        }
    </script>
</body>
</html>
