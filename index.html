<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TWINS ELITE - V3</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #05070a; --surface: #0f1218; --accent: #0066ff; 
            --text: #ffffff; --text-dim: #94a3b8; --border: #1e293b; 
            --success: #10b981; --danger: #ef4444;
        }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; outline: none; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; }
        
        .page { display: none; padding: 10px 15px 120px 15px; max-width: 500px; margin: 0 auto; }
        .active { display: block !important; }

        /* HEADER & BANNER */
        .top-header { position: sticky; top: 0; z-index: 1000; background: rgba(5, 7, 10, 0.9); backdrop-filter: blur(10px); padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .stat-banner { background: linear-gradient(135deg, #0066ff, #003399); padding: 20px; border-radius: 20px; color: white; margin-bottom: 15px; position: relative; }

        /* FORMULARIO DISTRIBUIDO */
        .input-group { display: flex; gap: 8px; margin-bottom: 10px; }
        input, select { background: var(--surface); border: 1px solid var(--border); padding: 14px; border-radius: 12px; color: white; font-size: 14px; width: 100%; }
        .btn-add { background: var(--accent); border: none; border-radius: 12px; color: white; padding: 0 20px; font-weight: 800; cursor: pointer; }

        /* LISTA DINÁMICA RÁPIDA */
        .route-item { background: #161b22; border-radius: 12px; padding: 10px 15px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border); animation: slideIn 0.2s ease; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }

        /* HISTORIAL */
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 15px; margin-bottom: 12px; }
        .badge-hora { background: var(--accent); color: white; padding: 3px 8px; border-radius: 6px; font-size: 11px; font-weight: 800; }
        .btn-action { height: 45px; width: 45px; border-radius: 12px; border: none; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; }

        /* NAVEGACIÓN MEJORADA */
        .nav-bar { position: fixed; bottom: 20px; left: 15px; right: 15px; background: rgba(15, 18, 24, 0.95); backdrop-filter: blur(15px); height: 70px; border-radius: 20px; display: flex; border: 1px solid var(--border); z-index: 2000; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-dim); background: none; border: none; font-size: 10px; font-weight: 700; gap: 4px; }
        .nav-item.active { color: var(--accent); }
        .nav-item i { font-size: 22px; }

        .dash-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .dash-box { background: var(--surface); border: 1px solid var(--border); border-radius: 15px; padding: 12px; border-left: 4px solid var(--accent); }
    </style>
</head>
<body>

    <header id="app-header" class="top-header" style="display:none">
        <div style="font-weight:900;">TWINS <span style="color:var(--accent)">ELITE</span></div>
        <div id="user-info" onclick="logout()" style="font-size:11px; font-weight:800; background:var(--surface); padding:8px 15px; border-radius:12px; border:1px solid var(--border)">---</div>
    </header>

    <div id="page-login" class="page active">
        <div style="text-align:center; padding:50px 0"><i class="ph-fill ph-package" style="font-size:70px; color:var(--accent)"></i><h2>INICIAR SESIÓN</h2></div>
        <div id="login-options" style="display:grid; gap:10px"></div>
    </div>

    <div id="page-route" class="page">
        <div class="stat-banner">
            <div style="display:flex; justify-content:space-between">
                <div><small style="font-weight:800">TOTAL CAJAS</small><div id="count-cajas" style="font-size:40px; font-weight:800">0</div></div>
                <div style="text-align:right"><small style="font-weight:800">PUNTOS</small><div id="count-puntos" style="font-size:24px; font-weight:800">0</div></div>
            </div>
        </div>

        <div class="input-group">
            <input type="text" id="inp-cli" placeholder="Cliente" style="flex: 2;">
            <input type="number" id="inp-can" placeholder="Cjs" style="flex: 0.8;">
            <button class="btn-add" onclick="addPoint()"><i class="ph-bold ph-plus"></i></button>
        </div>

        <div id="live-list" style="margin-top:15px; max-height: 250px; overflow-y: auto;"></div>

        <div id="finalize-area" style="display:none; margin-top:20px">
            <select id="sel-pla" onchange="predictAndSave()" style="margin-bottom:8px"></select>
            <div class="input-group">
                <select id="sel-cho" onchange="persist()"></select>
                <select id="sel-aux" onchange="persist()"></select>
            </div>
            <button class="btn-add" style="width:100%; height:55px; background:var(--success); margin-top:10px" onclick="openConfirm()">ENVIAR DESPACHO</button>
        </div>
    </div>

    <div id="page-history" class="page">
        <div class="dash-row">
            <div class="dash-box">
                <span style="font-size:9px; color:var(--text-dim); font-weight:800">MES ACTUAL</span>
                <div id="st-month" style="font-size:20px; font-weight:800">0</div>
                <div id="st-month-env" style="font-size:10px; opacity:0.6">0 Envíos</div>
            </div>
            <div class="dash-box" style="border-left-color:var(--success)">
                <span style="font-size:9px; color:var(--text-dim); font-weight:800">DÍA SELECCIONADO</span>
                <div id="st-day" style="font-size:20px; font-weight:800">0</div>
                <div id="st-day-env" style="font-size:10px; opacity:0.6">0 Envíos</div>
            </div>
        </div>
        <input type="date" id="filter-date" onchange="renderHistory()" style="margin-bottom:15px">
        <div id="history-feed"></div>
    </div>

    <div id="page-stats" class="page">
        <div class="card"><canvas id="c-cho" height="180"></canvas></div>
        <button onclick="generatePDF()" class="btn-add" style="width:100%; background:var(--danger); padding:15px">DESCARGAR PDF</button>
    </div>

    <nav id="app-nav" class="nav-bar" style="display:none">
        <button class="nav-item active" id="n-route" onclick="go('page-route')"><i class="ph-bold ph-list-plus"></i>RUTA</button>
        <button class="nav-item" id="n-history" onclick="go('page-history')"><i class="ph-bold ph-clock-counter-clockwise"></i>DATA</button>
        <button class="nav-item" id="n-stats" onclick="go('page-stats')"><i class="ph-bold ph-chart-line-up"></i>STATS</button>
    </nav>

    <div id="modal-confirm" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:3000; align-items:center; justify-content:center; padding:20px;">
        <div class="card" style="width:100%; text-align:center">
            <h3>¿Confirmar envío?</h3>
            <button class="btn-add" style="width:100%; background:var(--success); padding:15px" onclick="finalize('HOY')">SALIENDO AHORA</button>
            <button class="btn-add" style="width:100%; background:var(--border); padding:15px; margin-top:10px" onclick="finalize('MAÑANA')">PROGRAMAR MAÑANA</button>
            <button onclick="closeConfirm()" style="background:none; border:none; color:var(--text-dim); margin-top:15px">CANCELAR</button>
        </div>
    </div>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbxuVVOZfMx8jkN-q079s6g7ppPAF4XIkNG-DEQGt6MqiownzLo3NMyWBIZ1hkTyoPBl/exec";
        let activeUser = "", currentCarga = [], db = [];

        const DATA = {
            placas: ["CEP-929", "BPN-711", "BVN-704", "BUL-742", "BVN-930"],
            choferes: ["TAJHO", "LUIS H.", "ROMARIO", "CESAR C.", "WALDIR", "MARCELO"],
            auxiliares: ["Cristopher", "Plácido", "Martin", "Percy", "Rodolfo", "Ricardo", "Elio", "Daniel C.", "Jofer", "Nelson", "Julio"]
        };

        window.onload = () => {
            setupUI();
            const saved = localStorage.getItem('tw_logged');
            if(saved) login(saved);
            syncData();
        };

        function setupUI() {
            const opts = document.getElementById('login-options');
            ['TAJHO ADMIN', 'FRANCESCO', 'OSCAR', 'LUIS HERBER'].forEach(u => opts.innerHTML += `<button class="btn-add" style="background:var(--surface); border:1px solid var(--border); padding:18px" onclick="login('${u}')">${u}</button>`);
            document.getElementById('sel-pla').innerHTML = '<option value="">Seleccionar Placa</option>' + DATA.placas.map(p => `<option value="${p}">${p}</option>`).join('');
            document.getElementById('sel-cho').innerHTML = '<option value="">Chofer</option>' + DATA.choferes.map(c => `<option value="${c}">${c}</option>`).join('');
            document.getElementById('sel-aux').innerHTML = '<option value="">Auxiliar</option>' + DATA.auxiliares.map(a => `<option value="${a}">${a}</option>`).join('');
            document.getElementById('filter-date').value = new Date().toISOString().split('T')[0];
        }

        async function syncData() {
            try {
                const res = await fetch(API);
                const raw = await res.json();
                // Normalizar datos para evitar fallos de formato de Google
                db = raw.map(r => ({
                    ...r,
                    fecha: r.fecha ? new Date(r.fecha).toISOString().split('T')[0] : "",
                    total: parseFloat(r.total || 0)
                }));
                localStorage.setItem('tw_db', JSON.stringify(db));
                renderHistory();
            } catch(e) {
                db = JSON.parse(localStorage.getItem('tw_db') || "[]");
            }
        }

        function addPoint() {
            const cli = document.getElementById('inp-cli').value.toUpperCase();
            const can = parseInt(document.getElementById('inp-can').value);
            if(!cli || !can) return;
            currentCarga.push({ cli, can });
            document.getElementById('inp-cli').value = ""; document.getElementById('inp-can').value = "";
            refreshCargaUI();
        }

        function refreshCargaUI() {
            const list = document.getElementById('live-list');
            let total = 0; list.innerHTML = "";
            currentCarga.forEach((it, i) => {
                total += it.can;
                list.innerHTML += `<div class="route-item"><span><b>${it.can}</b> ${it.cli}</span><i class="ph ph-trash" style="color:var(--danger)" onclick="removePoint(${i})"></i></div>`;
            });
            document.getElementById('count-cajas').innerText = total;
            document.getElementById('count-puntos').innerText = currentCarga.length;
            document.getElementById('finalize-area').style.display = currentCarga.length > 0 ? 'block' : 'none';
        }

        function renderHistory() {
            const container = document.getElementById('history-feed');
            const selDate = document.getElementById('filter-date').value;
            let h = "", dTotal = 0, dEnv = 0, mTotal = 0, mEnv = 0;
            const now = new Date(selDate + "T12:00:00");

            db.forEach((r, i) => {
                const rD = new Date(r.fecha + "T12:00:00");
                if(rD.getMonth() === now.getMonth()) { mTotal += r.total; mEnv++; }

                if(r.fecha === selDate) {
                    dTotal += r.total; dEnv++;
                    h += `<div class="card">
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px">
                            <span class="badge-hora">${r.hora || '--:--'}</span>
                            <b style="color:var(--accent)">${r.placa}</b>
                        </div>
                        <div style="font-weight:800; font-size:18px">${r.total} Cajas</div>
                        <div style="font-size:12px; opacity:0.6; margin-bottom:12px">${r.chofer} / ${r.auxiliar}</div>
                        <div style="display:flex; gap:8px">
                            <button class="btn-action" style="background:var(--border); color:white" onclick="alert('${r.detalles || r.items}')"><i class="ph ph-list-bullets"></i></button>
                            <button class="btn-action" style="background:var(--border); color:white" onclick="loadEdit(${i})"><i class="ph ph-pencil-simple"></i></button>
                            <button class="btn-action" style="background:#25D366; color:white" onclick="shareWA('${r.placa}','${r.total}','${r.detalles || r.items}')"><i class="ph-fill ph-whatsapp-logo"></i></button>
                        </div>
                    </div>`;
                }
            });
            container.innerHTML = h || `<p style="text-align:center; opacity:0.3; margin-top:20px">No hay datos</p>`;
            document.getElementById('st-month').innerText = mTotal;
            document.getElementById('st-month-env').innerText = mEnv + " Envíos";
            document.getElementById('st-day').innerText = dTotal;
            document.getElementById('st-day-env').innerText = dEnv + " Envíos";
        }

        async function finalize(tipo) {
            let f = new Date(); if(tipo === 'MAÑANA') f.setDate(f.getDate() + 1);
            const r = {
                fecha: f.toISOString().split('T')[0],
                hora: new Date().toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' }),
                chofer: document.getElementById('sel-cho').value,
                auxiliar: document.getElementById('sel-aux').value,
                placa: document.getElementById('sel-pla').value,
                items: currentCarga.map(i => `${i.cli}: ${i.can}`).join(", "),
                total: currentCarga.reduce((a,b) => a + b.can, 0),
                operario: activeUser
            };
            fetch(API, { method: 'POST', mode: 'no-cors', body: JSON.stringify(r) });
            db.unshift(r); refreshCargaUI(); clearAll(); closeConfirm(); go('page-history');
        }

        function loadEdit(i) {
            const r = db[i];
            currentCarga = (r.detalles || r.items).split(", ").map(it => {
                const [cli, can] = it.split(": ");
                return { cli, can: parseInt(can) };
            });
            document.getElementById('sel-pla').value = r.placa;
            document.getElementById('sel-cho').value = r.chofer;
            document.getElementById('sel-aux').value = r.auxiliar;
            refreshCargaUI();
            go('page-route');
        }

        function shareWA(p, t, it) {
            const msg = `*📦 DESPACHO TWINS*%0A*Placa:* ${p}%0A*Cajas:* ${t}%0A*Ruta:*%0A${it.split(', ').join('%0A')}`;
            window.open(`https://wa.me/?text=${msg}`, '_blank');
        }

        function go(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('n-' + id.split('-')[1]).classList.add('active');
            if(id === 'page-history') renderHistory();
        }

        function login(u) { activeUser = u; localStorage.setItem('tw_logged', u); document.getElementById('page-login').classList.remove('active'); document.getElementById('app-header').style.display = 'flex'; document.getElementById('app-nav').style.display = 'flex'; document.getElementById('user-info').innerText = u; go('page-route'); }
        function removePoint(i) { currentCarga.splice(i,1); refreshCargaUI(); }
        function clearAll() { currentCarga = []; refreshCargaUI(); }
        function openConfirm() { document.getElementById('modal-confirm').style.display = 'flex'; }
        function closeConfirm() { document.getElementById('modal-confirm').style.display = 'none'; }
        function logout() { localStorage.clear(); location.reload(); }
        function predictAndSave() { const l = db.find(r => r.placa === document.getElementById('sel-pla').value); if(l) { document.getElementById('sel-cho').value = l.chofer; document.getElementById('sel-aux').value = l.auxiliar; } }
        function persist() {} // Opcional
    </script>
</body>
</html>
