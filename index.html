<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TWINS ELITE V16.5 - OPERATIVA</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #02040a; --card: #0f172a; --accent: #00d4ff; 
            --text: #f8fafc; --text-dim: #94a3b8;
            --success: #10b981; --danger: #ef4444; --warning: #f59e0b;
            --border: rgba(255,255,255,0.08);
            --grad: linear-gradient(135deg, #00d4ff 0%, #4f46e5 100%);
            --glass: rgba(30, 41, 59, 0.7);
        }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; outline: none; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; }
        
        .page { display: none; padding: 20px; padding-bottom: 100px; max-width: 500px; margin: 0 auto; animation: slideUp 0.3s ease-out; }
        .active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .top-header { position: sticky; top: 0; z-index: 100; background: rgba(2, 4, 10, 0.8); backdrop-filter: blur(20px); padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .card { background: var(--card); border-radius: 24px; border: 1px solid var(--border); padding: 20px; margin-bottom: 16px; }
        .stat-box { background: var(--glass); padding: 18px; border-radius: 20px; border: 1px solid var(--border); }
        
        input, select { width: 100%; padding: 14px; margin: 8px 0; border-radius: 12px; border: 1px solid var(--border); background: #1e293b; color: #fff; font-size: 15px; }
        .btn { width: 100%; padding: 16px; border-radius: 16px; border: none; font-size: 14px; font-weight: 800; cursor: pointer; transition: 0.2s; display: flex; justify-content: center; align-items: center; gap: 8px; }
        .btn-main { background: var(--grad); color: white; }
        .btn-mini { padding: 8px; border-radius: 10px; font-size: 11px; flex: 1; border: 1px solid var(--border); background: rgba(255,255,255,0.05); color: white; cursor: pointer; }

        .bottom-nav { position: fixed; bottom: 15px; left: 15px; right: 15px; height: 65px; background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(20px); border-radius: 20px; border: 1px solid var(--border); display: flex; justify-content: space-around; align-items: center; z-index: 1000; }
        .nav-item { background: none; border: none; color: var(--text-dim); font-size: 10px; font-weight: 700; display: flex; flex-direction: column; align-items: center; }
        .nav-item.active-nav { color: var(--accent); }

        #modal-ask, #modal-pass { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); z-index: 2000; justify-content: center; align-items: center; padding: 20px; }
        .modal-sheet { background: var(--card); border-radius: 28px; padding: 25px; width: 100%; max-width: 340px; }
    </style>
</head>
<body>

    <div id="modal-pass" onclick="this.style.display='none'">
        <div class="modal-sheet" onclick="event.stopPropagation()">
            <h3 style="text-align:center">ADMIN LOGIN</h3>
            <input type="password" id="pass-input" placeholder="CÓDIGO" style="text-align:center">
            <button class="btn btn-main" onclick="checkPass()">ENTRAR</button>
        </div>
    </div>

    <div id="modal-ask" onclick="this.style.display='none'">
        <div class="modal-sheet" onclick="event.stopPropagation()">
            <h3 style="margin-top:0">Programar Salida</h3>
            <p style="color:var(--text-dim); font-size:13px">La fecha se guardará en el Excel según tu elección:</p>
            <button class="btn btn-main" style="margin-bottom:10px" onclick="confirmarGuardado(true)">📦 SALIDA HOY</button>
            <button class="btn" style="background:var(--success); color:#000" onclick="confirmarGuardado(false)">📅 SALIDA MAÑANA</button>
        </div>
    </div>

    <div id="header-app" class="top-header" style="display:none">
        <div style="font-weight:800; color:var(--accent)" id="user-display">---</div>
        <button onclick="cerrarSesion()" style="background:none; border:none; color:var(--danger); font-weight:700">Salir</button>
    </div>

    <div id="p1" class="page active" style="text-align:center; padding-top:10vh">
        <h1 style="font-size:35px; font-weight:900">TWINS <span style="color:var(--accent)">ELITE</span></h1>
        <div style="display:grid; gap:10px; margin-top:40px">
            <button class="btn" style="background:var(--card)" onclick="document.getElementById('modal-pass').style.display='flex'">🔑 TAJHO ADMIN</button>
            <button class="btn" style="background:var(--card)" onclick="login('FRANCESCO')">FRANCESCO</button>
            <button class="btn" style="background:var(--card)" onclick="login('OSCAR')">OSCAR</button>
            <button class="btn" style="background:var(--card)" onclick="login('LUIS HERBER')">LUIS HERBER</button>
        </div>
    </div>

    <div id="p2" class="page">
        <div class="stat-box" style="background:var(--grad); margin-bottom:20px; text-align:center">
            <span style="font-size:12px; opacity:0.8">CAJAS EN CARGA</span>
            <div id="total-vivo" style="font-size:45px; font-weight:900">0</div>
        </div>
        <div class="card">
            <div style="display:flex; gap:8px">
                <input type="text" id="cli" placeholder="Cliente" style="flex:2">
                <input type="number" id="can" placeholder="Cant" style="flex:1">
            </div>
            <button class="btn btn-main" onclick="addItem()">+ AÑADIR</button>
        </div>
        <div id="area-envio" style="display:none">
            <div id="lista-items" class="card"></div>
            <div class="card">
                <select id="pla"><option value="">Placa</option><option value="CEP-929">CEP-929</option><option value="BPN-711">BPN-711</option><option value="BVN-704">BVN-704</option><option value="BUL-742">BUL-742</option><option value="BVN-930">BVN-930</option></select>
                <select id="cho"><option value="">Chofer</option><option value="LUIS H.">Luis H.</option><option value="ROMARIO">Romario</option><option value="CESAR C.">Cesar C.</option><option value="WALDIR">Waldir</option><option value="MARCELO">Marcelo</option></select>
                <select id="aux"><option value="">Auxiliar</option><option value="CRISTOPHER">Cristopher</option><option value="PLACIDO">Placido</option><option value="RODOLFO">Rodolfo</option><option value="MARTIN">Martin</option></select>
                <button class="btn btn-main" style="background:var(--success); margin-top:10px" onclick="abrirModalGuardar()">GUARDAR DESPACHO</button>
            </div>
        </div>
    </div>

    <div id="p3" class="page">
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:15px">
            <div class="stat-box"><small>MES</small><div id="stat-mes" style="font-weight:800">0</div></div>
            <div class="stat-box"><small>DÍA</small><div id="stat-dia" style="font-weight:800; color:var(--accent)">0</div></div>
        </div>
        <input type="date" id="f-dia" onchange="renderH()" style="margin-bottom:15px">
        <div id="h-list"></div>
    </div>

    <div id="p4" class="page">
        <h3>Estado de Flota</h3>
        <div id="lista-flota"></div>
    </div>

    <nav id="nav-app" class="bottom-nav" style="display:none">
        <button class="nav-item" onclick="nav('p2')">Ruta</button>
        <button class="nav-item" onclick="nav('p3')">Historial</button>
        <button class="nav-item" onclick="nav('p4')">Flota</button>
    </nav>

    <script>
        const URL = "https://script.google.com/macros/s/AKfycbz9V0MzUuuAHTa9N4-xrsVJV7DbkWLtgJY5xHM7_JTfIDlBxCtimM6FHjRpVczuD2kM/exec";
        let user = "", ruta = [], db = [];
        const infoFlota = {
            "CEP-929": "15/05/2026", "BPN-711": "22/08/2026", "BVN-704": "10/01/2027", "BUL-742": "05/11/2026", "BVN-930": "30/09/2026"
        };

        window.onload = () => {
            const u = localStorage.getItem('tw_u');
            if(u) login(u);
            document.getElementById('f-dia').value = new Date().toISOString().split('T')[0];
            load();
        };

        function login(n) { 
            user = n; localStorage.setItem('tw_u', n);
            document.getElementById('p1').style.display='none'; 
            document.getElementById('header-app').style.display='flex'; 
            document.getElementById('nav-app').style.display='flex'; 
            document.getElementById('user-display').innerText = n; 
            nav('p2'); 
        }

        function checkPass() {
            if(document.getElementById('pass-input').value === "2026") {
                document.getElementById('modal-pass').style.display='none';
                login('TAJHO');
            } else alert("Error");
        }

        function nav(id) { 
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); 
            document.getElementById(id).classList.add('active'); 
            if(id === 'p3') renderH();
            if(id === 'p4') renderFlota();
        }

        async function load() { 
            try { const r = await fetch(URL); db = await r.json(); renderH(); renderFlota(); } catch(e){} 
        }

        function addItem() {
            const cl = document.getElementById('cli').value.toUpperCase(), ca = parseInt(document.getElementById('can').value);
            if(!cl || !ca) return; ruta.unshift({cl, ca}); 
            document.getElementById('cli').value = ""; document.getElementById('can').value = ""; 
            renderR(); 
        }

        function renderR() {
            const l = document.getElementById('lista-items'); let s = 0; l.innerHTML = "";
            ruta.forEach((i, x) => { s += i.ca; l.innerHTML += `<div style="display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid var(--border)"><span>${i.cl}</span><b>${i.ca} CJ <span onclick="removeItem(${x})" style="color:var(--danger); cursor:pointer">✕</span></b></div>`; });
            document.getElementById('total-vivo').innerText = s; 
            document.getElementById('area-envio').style.display = ruta.length > 0 ? 'block' : 'none';
        }

        function removeItem(x) { ruta.splice(x,1); renderR(); }

        function abrirModalGuardar() { document.getElementById('modal-ask').style.display = 'flex'; }

        async function confirmarGuardado(esHoy) {
            document.getElementById('modal-ask').style.display = 'none';
            let d = new Date();
            if(!esHoy) {
                d.setDate(d.getDate() + 1);
                if(d.getDay() === 0) d.setDate(d.getDate() + 1);
            }
            // FECHA CRÍTICA: Se envía esta fecha al Excel
            let fechaProgramada = d.toISOString().split('T')[0];

            const r = { 
                fecha: fechaProgramada, 
                chofer: document.getElementById('cho').value, 
                auxiliar: document.getElementById('aux').value, 
                placa: document.getElementById('pla').value, 
                operario: user, 
                items: ruta.map(i => `${i.cl}:${i.ca}`).join(", "), 
                total: ruta.reduce((a,b) => a+b.ca, 0)
            };

            db.push(r);
            document.getElementById('f-dia').value = fechaProgramada;
            nav('p3'); renderH();

            // Envío al Excel con la fecha programada
            fetch(URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(r) });
            
            ruta = []; renderR();
            document.getElementById('cho').value = ""; document.getElementById('pla').value = "";
            setTimeout(load, 3000);
        }

        function renderH() {
            const list = document.getElementById('h-list'), fD = document.getElementById('f-dia').value;
            let cMes = 0, cDia = 0, html = "";
            db.slice().reverse().forEach(r => {
                let rF = r.fecha.split("T")[0];
                cMes += parseFloat(r.total);
                if(fD === rF) {
                    cDia += parseFloat(r.total);
                    html += `<div class="card">
                        <div style="display:flex; justify-content:space-between"><b>${r.placa}</b><span style="color:var(--accent)">${r.total} CJ</span></div>
                        <div style="font-size:13px; margin:5px 0">${r.chofer} | <small>Aux: ${r.auxiliar || 'Ninguno'}</small></div>
                        <div style="font-size:11px; color:var(--text-dim)">${r.items}</div>
                        <div style="display:flex; gap:5px; margin-top:10px">
                            <button class="btn-mini" onclick="editarRuta('${r.items}', '${r.chofer}', '${r.placa}', '${r.auxiliar}')">✏️ Editar</button>
                            <button class="btn-mini" onclick="sendWA('${r.fecha}', '${r.chofer}', '${r.total}', '${r.items}')">📱 WA</button>
                        </div>
                    </div>`;
                }
            });
            list.innerHTML = html || "<p style='text-align:center; color:gray'>No hay rutas</p>";
            document.getElementById('stat-dia').innerText = Math.round(cDia);
            document.getElementById('stat-mes').innerText = Math.round(cMes);
        }

        function editarRuta(items, cho, pla, aux) {
            if(!confirm("¿Cargar esta ruta para editar?")) return;
            ruta = items.split(", ").map(i => { const [cl, ca] = i.split(":"); return {cl, ca: parseInt(ca)}; });
            document.getElementById('cho').value = cho;
            document.getElementById('pla').value = pla;
            document.getElementById('aux').value = aux;
            renderR(); nav('p2');
        }

        function sendWA(f, c, t, i) {
            let m = `*📦 DESPACHO TWINS*\n*Fecha:* ${f.split('T')[0]}\n*Chofer:* ${c}\n*Total:* ${t} CJ\n\n*DETALLE:*\n${i.replace(/:/g, ': ').replace(/,/g, '\n')}`;
            window.location.href = `https://wa.me/?text=${encodeURIComponent(m)}`;
        }

        function renderFlota() {
            const list = document.getElementById('lista-flota'), fD = document.getElementById('f-dia').value;
            const placas = ["CEP-929", "BPN-711", "BVN-704", "BUL-742", "BVN-930"];
            list.innerHTML = "";
            placas.forEach(p => {
                let rH = db.find(r => r.placa === p && r.fecha.split('T')[0] === fD);
                list.innerHTML += `<div class="card" style="border-left:5px solid ${rH ? 'var(--danger)':'var(--success)'}">
                    <div style="display:flex; justify-content:space-between">
                        <b>${p}</b>
                        <small style="color:var(--warning)">SOAT: ${infoFlota[p]}</small>
                    </div>
                    <div style="font-size:12px; margin-top:5px">${rH ? '⛔ OCUPADO: ' + rH.chofer : '✅ DISPONIBLE'}</div>
                </div>`;
            });
        }

        function cerrarSesion() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
