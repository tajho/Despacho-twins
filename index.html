<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TWINS DESPACHOS - ELITE</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root {
            --bg: #05070a; --surface: #0f1218;
            --accent: #0066ff; --text: #ffffff; --text-dim: #94a3b8;
            --border: #1e293b; --success: #10b981; --warning: #f59e0b; --danger: #ef4444;
        }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; outline: none; transition: all 0.2s ease; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; }
        
        .page { display: none; padding: 15px 15px 130px 15px; max-width: 500px; margin: 0 auto; }
        .active { display: block !important; animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .top-header { position: sticky; top: 0; z-index: 1000; background: rgba(5, 7, 10, 0.85); backdrop-filter: blur(12px); padding: 18px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 24px; padding: 18px; margin-bottom: 15px; }
        
        /* Dashboard Conteo */
        .dash-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 15px; }
        .dash-box { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 15px; position: relative; overflow: hidden; }
        .dash-box::after { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; background: var(--accent); }
        .dash-box.day::after { background: var(--success); }
        .dash-label { font-size: 10px; font-weight: 800; color: var(--text-dim); text-transform: uppercase; margin-bottom: 4px; display: block; }
        .dash-val { font-size: 24px; font-weight: 800; }
        .dash-sub { font-size: 11px; opacity: 0.7; font-weight: 600; }

        /* Barra de Navegación Mejorada */
        .nav-bar { position: fixed; bottom: 25px; left: 20px; right: 20px; background: rgba(15, 18, 24, 0.9); backdrop-filter: blur(20px); height: 75px; border-radius: 28px; display: flex; border: 1px solid rgba(255,255,255,0.08); z-index: 2000; box-shadow: 0 20px 40px rgba(0,0,0,0.5); padding: 0 10px; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-dim); background: none; border: none; font-size: 10px; font-weight: 700; gap: 4px; }
        .nav-item i { font-size: 24px; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .nav-item.active { color: var(--accent); }
        .nav-item.active i { transform: translateY(-5px) scale(1.1); color: var(--accent); }
        
        .stat-banner { background: linear-gradient(135deg, #0066ff, #003399); padding: 25px; border-radius: 28px; color: white; margin-bottom: 15px; position: relative; }
        
        input, select { background: #1a1f26; border: 1.5px solid var(--border); padding: 16px; border-radius: 18px; color: white; font-size: 15px; width: 100%; margin-bottom: 12px; }
        input:focus { border-color: var(--accent); }
        .btn { border: none; border-radius: 18px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-add { background: var(--accent); color: white; padding: 16px; width: 100%; box-shadow: 0 8px 16px rgba(0,102,255,0.3); }
        .btn-save { background: var(--success); color: white; padding: 20px; width: 100%; font-size: 16px; }

        .history-card { border-left: 0; padding: 18px; position: relative; }
        .badge-hora { background: rgba(0,102,255,0.15); color: var(--accent); padding: 5px 10px; border-radius: 10px; font-size: 11px; font-weight: 800; }
        .history-detail { display: none; background: #05070a; padding: 15px; border-radius: 16px; margin-top: 15px; border: 1px solid var(--border); font-size: 13px; }
    </style>
</head>
<body>

    <header id="app-header" class="top-header" style="display:none">
        <div style="font-weight:900; letter-spacing:-0.5px">TWINS <span style="color:var(--accent)">ELITE</span></div>
        <div id="user-info" onclick="logout()" style="font-size:11px; font-weight:800; background:var(--surface); padding:8px 15px; border-radius:15px; border:1px solid var(--border)">---</div>
    </header>

    <div id="page-login" class="page active">
        <div style="text-align:center; padding:60px 0"><i class="ph-fill ph-shield-check" style="font-size:80px; color:var(--accent)"></i><h2 style="letter-spacing:-1px">Warehouse Manager</h2></div>
        <div id="login-options" style="display:grid; gap:12px"></div>
    </div>

    <div id="page-route" class="page">
        <div class="stat-banner">
            <div style="font-size:12px; opacity:0.8; font-weight:700">CARGA EN PROCESO</div>
            <div style="display:flex; justify-content:space-between; align-items:baseline">
                <div id="count-cajas" style="font-size:45px; font-weight:800">0</div>
                <div style="text-align:right"><span id="count-puntos" style="font-size:20px; font-weight:800">0</span><br><small style="font-weight:700; opacity:0.7">PUNTOS</small></div>
            </div>
            <button onclick="clearAll()" style="position:absolute; top:20px; right:20px; background:rgba(255,255,255,0.1); border:none; color:white; padding:6px 12px; border-radius:10px; font-size:10px; font-weight:800">LIMPIAR</button>
        </div>
        <div class="card">
            <input type="text" id="inp-cli" placeholder="Nombre del Cliente">
            <div style="display:flex; gap:12px">
                <input type="number" id="inp-can" placeholder="Cant." style="flex:0.4">
                <button class="btn btn-add" onclick="addPoint()"><i class="ph-bold ph-plus"></i>Añadir Carga</button>
            </div>
        </div>
        <div id="list-container" style="display:none">
            <div id="live-list" style="margin-bottom:15px"></div>
            <div class="card">
                <select id="sel-pla" onchange="predictAndSave()"></select>
                <div style="display:flex; gap:10px"><select id="sel-cho" onchange="persist()"></select><select id="sel-aux" onchange="persist()"></select></div>
                <button class="btn btn-save" onclick="openConfirm()">FINALIZAR DESPACHO</button>
            </div>
        </div>
    </div>

    <div id="page-history" class="page">
        <div class="dash-row">
            <div class="dash-box">
                <span class="dash-label">Mes Actual</span>
                <span id="st-month" class="dash-val">0</span>
                <span id="st-month-env" class="dash-sub">0 Envíos</span>
            </div>
            <div class="dash-box day">
                <span class="dash-label">Día Seleccionado</span>
                <span id="st-day" class="dash-val">0</span>
                <span id="st-day-env" class="dash-sub">0 Envíos</span>
            </div>
        </div>
        <input type="date" id="filter-date" onchange="renderHistory()">
        <div id="history-feed"></div>
    </div>

    <div id="page-fleet" class="page"><div id="fleet-grid"></div></div>

    <div id="page-stats" class="page">
        <div class="card"><span class="dash-label">Cajas por Chofer</span><div style="height:200px"><canvas id="c-cho"></canvas></div></div>
        <div class="card"><span class="dash-label">Cajas por Auxiliar</span><div style="height:200px"><canvas id="c-aux"></canvas></div></div>
        <button class="btn" style="background:var(--danger); color:white; width:100%; padding:20px; font-size:16px" onclick="generatePDF()"><i class="ph-bold ph-file-pdf"></i>EXPORTAR REPORTE MES</button>
    </div>

    <nav id="app-nav" class="nav-bar" style="display:none">
        <button class="nav-item active" id="n-route" onclick="go('page-route')"><i class="ph-fill ph-stack"></i>HOJA</button>
        <button class="nav-item" id="n-history" onclick="go('page-history')"><i class="ph-fill ph-clock-counter-clockwise"></i>DATA</button>
        <button class="nav-item" id="n-fleet" onclick="go('page-fleet')"><i class="ph-fill ph-truck"></i>FLOTA</button>
        <button class="nav-item" id="n-stats" onclick="go('page-stats')"><i class="ph-fill ph-chart-bar"></i>STATS</button>
    </nav>

    <div id="modal-confirm" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:3000; align-items:center; justify-content:center; padding:25px; backdrop-filter:blur(10px)">
        <div class="card" style="width:100%; max-width:400px; text-align:center">
            <h3>¿Programar Salida?</h3>
            <button class="btn btn-save" onclick="finalize('HOY')">SALIENDO AHORA</button>
            <button class="btn" style="background:var(--border); color:white; width:100%; padding:18px; margin-top:10px" onclick="finalize('MAÑANA')">PROGRAMAR MAÑANA</button>
            <button onclick="closeConfirm()" style="background:none; border:none; color:var(--text-dim); margin-top:20px">REGRESAR</button>
        </div>
    </div>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbxuVVOZfMx8jkN-q079s6g7ppPAF4XIkNG-DEQGt6MqiownzLo3NMyWBIZ1hkTyoPBl/exec";
        let activeUser = "", currentCarga = [], db = [];
        let charts = {};

        const DATA = {
            placas: ["CEP-929", "BPN-711", "BVN-704", "BUL-742", "BVN-930"],
            choferes: ["TAJHO", "LUIS H.", "ROMARIO", "CESAR C.", "WALDIR", "MARCELO"],
            auxiliares: ["Cristopher", "Plácido", "Martin", "Percy", "Rodolfo", "Ricardo", "Elio", "Daniel C.", "Jofer", "Nelson", "Julio"],
            soats: { "CEP-929": "2026-07-22", "BPN-711": "2026-06-10", "BVN-704": "2026-07-02", "BUL-742": "2026-04-02", "BVN-930": "2026-07-02" }
        };

        window.onload = () => {
            setupUI();
            const savedUser = localStorage.getItem('tw_logged');
            if(savedUser) login(savedUser);
            if(localStorage.getItem('tw_temp_carga')) {
                currentCarga = JSON.parse(localStorage.getItem('tw_temp_carga'));
                refreshCargaUI();
            }
            syncData();
        };

        function setupUI() {
            const grid = document.getElementById('login-options');
            ['TAJHO ADMIN', 'FRANCESCO', 'OSCAR', 'LUIS HERBER'].forEach(u => grid.innerHTML += `<button class="btn" style="background:var(--surface); border:1px solid var(--border); color:white; padding:18px" onclick="login('${u}')">${u}</button>`);
            document.getElementById('sel-pla').innerHTML = '<option value="">Unidad</option>' + DATA.placas.map(p => `<option value="${p}">${p}</option>`).join('');
            document.getElementById('sel-cho').innerHTML = '<option value="">Chofer</option>' + DATA.choferes.map(c => `<option value="${c}">${c}</option>`).join('');
            document.getElementById('sel-aux').innerHTML = '<option value="">Auxiliar</option>' + DATA.auxiliares.map(a => `<option value="${a}">${a}</option>`).join('');
            document.getElementById('filter-date').value = new Date().toLocaleDateString('en-CA');
        }

        async function syncData() {
            try {
                const res = await fetch(API);
                db = await res.json();
                localStorage.setItem('tw_db', JSON.stringify(db));
                renderHistory();
            } catch(e) {
                db = JSON.parse(localStorage.getItem('tw_db') || "[]");
                renderHistory();
            }
        }

        function renderHistory() {
            const container = document.getElementById('history-feed');
            const selDate = document.getElementById('filter-date').value;
            let h = "", dTotal = 0, dEnv = 0, mTotal = 0, mEnv = 0;
            const now = new Date(selDate + "T12:00:00");

            db.forEach((r, i) => {
                // Adaptamos la lectura al nuevo orden del Excel
                const rFecha = r.fecha.split('T')[0];
                const rD = new Date(rFecha + "T12:00:00");
                const rCajas = parseFloat(r.total || 0);

                if(rD.getMonth() === now.getMonth() && rD.getFullYear() === now.getFullYear()) {
                    mTotal += rCajas; mEnv++;
                }

                if(rFecha === selDate) {
                    dTotal += rCajas; dEnv++;
                    h += `<div class="card history-card">
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px">
                            <span class="badge-hora"><i class="ph ph-clock"></i> ${r.hora || '--:--'}</span>
                            <span style="font-weight:800; color:var(--accent)">${r.placa}</span>
                        </div>
                        <div style="font-size:18px; font-weight:800; margin-bottom:4px">${rCajas} Cajas</div>
                        <div style="font-size:12px; font-weight:600; opacity:0.6; margin-bottom:15px">${r.chofer} • ${r.auxiliar}</div>
                        <div id="det-${i}" class="history-detail">${(r.detalles || r.items || "").split(', ').join('<br>')}</div>
                        <div style="display:flex; gap:8px">
                            <button class="btn" style="flex:1; background:var(--accent); color:white; font-size:11px" onclick="toggleDet(${i})">VER RUTA</button>
                            <button class="btn" style="background:var(--border); width:48px" onclick="loadEdit(${i})"><i class="ph ph-pencil"></i></button>
                            <button class="btn" style="background:#25D366; width:48px; color:white" onclick="shareWA('${r.placa}','${rCajas}','${r.detalles || r.items}')"><i class="ph-fill ph-whatsapp-logo"></i></button>
                        </div>
                    </div>`;
                }
            });
            container.innerHTML = h || `<div style="text-align:center; padding:40px; opacity:0.3">No hay registros</div>`;
            document.getElementById('st-day').innerText = dTotal;
            document.getElementById('st-day-env').innerText = dEnv + " Envíos";
            document.getElementById('st-month').innerText = mTotal;
            document.getElementById('st-month-env').innerText = mEnv + " Envíos";
        }

        async function finalize(tipo) {
            let f = new Date(); if(tipo === 'MAÑANA') f.setDate(f.getDate() + 1);
            const r = {
                fecha: f.toLocaleDateString('en-CA'),
                hora: new Date().toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' }),
                chofer: document.getElementById('sel-cho').value,
                auxiliar: document.getElementById('sel-aux').value,
                placa: document.getElementById('sel-pla').value,
                items: currentCarga.map(i => `${i.cli}: ${i.can}`).join(", "),
                total: currentCarga.reduce((a,b) => a + (parseFloat(b.can)||0), 0),
                operario: activeUser
            };
            fetch(API, { method: 'POST', mode: 'no-cors', body: JSON.stringify(r) });
            db.unshift(r); localStorage.setItem('tw_db', JSON.stringify(db));
            clearAll(); closeConfirm(); go('page-history');
        }

        function drawCharts() {
            const sCho = {}, sAux = {};
            const now = new Date();
            db.forEach(r => {
                const rD = new Date(r.fecha.split('T')[0] + "T12:00:00");
                if(rD.getMonth() === now.getMonth()) {
                    sCho[r.chofer] = (sCho[r.chofer] || 0) + parseFloat(r.total);
                    sAux[r.auxiliar] = (sAux[r.auxiliar] || 0) + parseFloat(r.total);
                }
            });
            
            const config = (label, data) => ({
                type: 'bar',
                data: { labels: Object.keys(data), datasets: [{ data: Object.values(data), backgroundColor: '#0066ff', borderRadius: 10 }] },
                options: { indexAxis: 'y', maintainAspectRatio: false, plugins: { legend: false }, scales: { x: { display: false }, y: { ticks: { color: '#fff', font: { weight: 'bold' } }, grid: { display: false } } } }
            });

            if(charts.cho) charts.cho.destroy();
            if(charts.aux) charts.aux.destroy();
            charts.cho = new Chart(document.getElementById('c-cho'), config('Choferes', sCho));
            charts.aux = new Chart(document.getElementById('c-aux'), config('Auxiliares', sAux));
        }

        function generatePDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.setFontSize(18); doc.text("REPORTE MENSUAL TWINS", 14, 20);
            doc.autoTable({
                head: [['Fecha', 'Hora', 'Placa', 'Chofer', 'Total CJ']],
                body: db.map(r => [r.fecha.split('T')[0], r.hora, r.placa, r.chofer, r.total]),
                startY: 30, theme: 'grid'
            });
            doc.save("Reporte_Twins.pdf");
        }

        function go(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('n-' + id.split('-')[1]).classList.add('active');
            if(id === 'page-history') renderHistory();
            if(id === 'page-stats') setTimeout(drawCharts, 300);
            if(id === 'page-fleet') renderFleet();
        }

        function login(u) { activeUser = u; localStorage.setItem('tw_logged', u); document.getElementById('page-login').classList.remove('active'); document.getElementById('app-header').style.display = 'flex'; document.getElementById('app-nav').style.display = 'flex'; document.getElementById('user-info').innerText = u; go('page-route'); }
        function addPoint() { const cli = document.getElementById('inp-cli').value.toUpperCase(); const can = parseInt(document.getElementById('inp-can').value); if(!cli || !can) return; currentCarga.push({ cli, can }); document.getElementById('inp-cli').value = ""; document.getElementById('inp-can').value = ""; persist(); refreshCargaUI(); }
        function refreshCargaUI() { const c = document.getElementById('live-list'); let t = 0; c.innerHTML = ""; currentCarga.forEach((it, i) => { t += it.can; c.innerHTML += `<div class="card" style="padding:12px; margin-bottom:8px; display:flex; justify-content:space-between"><span>${it.can} CJ - ${it.cli}</span><i class="ph ph-trash" style="color:var(--danger)" onclick="removePoint(${i})"></i></div>`; }); document.getElementById('count-cajas').innerText = t; document.getElementById('count-puntos').innerText = currentCarga.length; document.getElementById('list-container').style.display = currentCarga.length > 0 ? 'block' : 'none'; }
        function persist() { localStorage.setItem('tw_temp_carga', JSON.stringify(currentCarga)); localStorage.setItem('tw_temp_pla', document.getElementById('sel-pla').value); localStorage.setItem('tw_temp_cho', document.getElementById('sel-cho').value); localStorage.setItem('tw_temp_aux', document.getElementById('sel-aux').value); }
        function predictAndSave() { const l = db.find(r => r.placa === document.getElementById('sel-pla').value); if(l) { document.getElementById('sel-cho').value = l.chofer; document.getElementById('sel-aux').value = l.auxiliar; } persist(); }
        function toggleDet(i) { const d = document.getElementById(`det-${i}`); d.style.display = d.style.display === 'block' ? 'none' : 'block'; }
        function shareWA(p, t, i) { window.open(`https://wa.me/?text=*📦 TWINS*%0A*Placa:* ${p}%0A*Cajas:* ${t}%0A*Detalle:*%0A${i.split(", ").join("%0A")}`, '_blank'); }
        function removePoint(i) { currentCarga.splice(i,1); persist(); refreshCargaUI(); }
        function clearAll() { if(confirm("¿Borrar?")) { currentCarga = []; localStorage.removeItem('tw_temp_carga'); refreshCargaUI(); } }
        function openConfirm() { document.getElementById('modal-confirm').style.display = 'flex'; }
        function closeConfirm() { document.getElementById('modal-confirm').style.display = 'none'; }
        function logout() { localStorage.clear(); location.reload(); }
        function renderFleet() { document.getElementById('fleet-grid').innerHTML = DATA.placas.map(p => { const d = Math.ceil((new Date(DATA.soats[p]) - new Date()) / 86400000); return `<div class="card" style="display:flex; justify-content:space-between"><div><b>${p}</b><br><small>SOAT: ${DATA.soats[p]}</small></div><span style="color:${d<30?'var(--danger)':'var(--success)'}; font-weight:800">${d}d</span></div>`; }).join(''); }
        function loadEdit(i) { const r = db[i]; currentCarga = (r.detalles || r.items).split(", ").map(it => { const [cli, can] = it.split(": "); return { cli, can: parseInt(can) }; }); document.getElementById('sel-pla').value = r.placa; document.getElementById('sel-cho').value = r.chofer; document.getElementById('sel-aux').value = r.auxiliar; refreshCargaUI(); go('page-route'); }
    </script>
</body>
</html>
