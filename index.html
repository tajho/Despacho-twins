<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TWINS - CONCEPTO SIMPLE</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root {
            --bg: #f8fafc; --surface: #ffffff; --accent: #007aff; 
            --text: #1e293b; --text-dim: #64748b; --border: #e2e8f0; 
            --success: #22c55e; --danger: #ef4444;
        }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; }
        
        .page { display: none; padding: 15px 15px 120px 15px; max-width: 500px; margin: 0 auto; }
        .active { display: block !important; }

        /* HEADER ELEGANTE */
        .top-header { background: var(--surface); padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--border); }
        .logo { font-weight: 800; font-size: 22px; color: var(--accent); }

        /* TARJETAS PASO A PASO */
        .step-card { background: var(--surface); border-radius: 24px; padding: 20px; margin-bottom: 15px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border: 1px solid var(--border); }
        .step-num { background: var(--accent); color: white; width: 24px; height: 24px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 800; margin-right: 8px; }
        .step-title { font-weight: 700; font-size: 14px; color: var(--text-dim); text-transform: uppercase; }

        /* INPUTS AMIGABLES */
        select, input { width: 100%; padding: 18px; border-radius: 16px; border: 2px solid var(--border); font-size: 16px; margin-top: 10px; font-family: inherit; font-weight: 600; }
        select:focus, input:focus { border-color: var(--accent); outline: none; }

        /* BOTONES RAPIDOS */
        .qty-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 10px; }
        .qty-btn { background: #f1f5f9; padding: 15px; border-radius: 12px; text-align: center; font-weight: 800; cursor: pointer; border: 1px solid var(--border); }
        .qty-btn:active { background: var(--accent); color: white; }

        .btn-add { background: var(--text); color: white; width: 100%; padding: 18px; border-radius: 16px; border: none; font-weight: 800; font-size: 16px; margin-top: 15px; display: flex; align-items: center; justify-content: center; gap: 10px; }

        /* LISTA DE CARGA */
        .item-row { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: #f8fafc; border-radius: 12px; margin-top: 8px; border-left: 4px solid var(--accent); }

        /* NAVEGACIÓN INFERIOR */
        .nav-bar { position: fixed; bottom: 15px; left: 15px; right: 15px; background: #1e293b; height: 75px; border-radius: 22px; display: flex; justify-content: space-around; align-items: center; z-index: 1000; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .nav-item { color: #94a3b8; text-align: center; border: none; background: none; font-weight: 700; font-size: 11px; }
        .nav-item.active { color: white; }
        .nav-item i { font-size: 24px; display: block; margin-bottom: 4px; }

        /* BOTÓN FLOTANTE GUARDAR */
        .btn-float { position: fixed; bottom: 100px; left: 15px; right: 15px; background: var(--success); color: white; padding: 20px; border-radius: 18px; text-align: center; font-weight: 800; font-size: 18px; text-decoration: none; box-shadow: 0 8px 20px rgba(34, 197, 94, 0.3); border: none; display: none; z-index: 999; }

        /* HISTORIAL */
        .hist-card { background: white; border-radius: 20px; padding: 18px; margin-bottom: 12px; border: 1px solid var(--border); }
        .tag { padding: 4px 10px; border-radius: 8px; font-size: 10px; font-weight: 800; float: right; }
        .tag-hoy { background: #dcfce7; color: #166534; }
        .tag-mañana { background: #dbeafe; color: #1e40af; }
    </style>
</head>
<body>

    <header class="top-header">
        <div class="logo">TWINS <span style="font-weight:400; color:var(--text-dim)">ALMACÉN</span></div>
        <div id="user-badge" style="font-weight: 800; font-size: 12px; background: #f1f5f9; padding: 6px 12px; border-radius: 10px;">---</div>
    </header>

    <div id="page-login" class="page active">
        <h2 style="text-align:center; margin: 30px 0">¿Quién está operando?</h2>
        <div id="login-list"></div>
    </div>

    <div id="page-route" class="page">
        <div class="step-card">
            <span class="step-num">1</span><span class="step-title">Vehículo y Equipo</span>
            <select id="sel-pla" onchange="predictData()"></select>
            <div style="display:flex; gap:10px">
                <select id="sel-cho"></select>
                <select id="sel-aux"></select>
            </div>
        </div>

        <div class="step-card">
            <span class="step-num">2</span><span class="step-title">Cargar Factura / Cliente</span>
            <input type="text" id="inp-cli" placeholder="Nombre del Cliente">
            <input type="number" id="inp-can" placeholder="Cantidad de Cajas" style="font-size: 24px;">
            <div class="qty-grid">
                <div class="qty-btn" onclick="quickAdd(1)">+1</div>
                <div class="qty-btn" onclick="quickAdd(5)">+5</div>
                <div class="qty-btn" onclick="quickAdd(10)">+10</div>
                <div class="qty-btn" style="color:var(--danger)" onclick="clearQty()">X</div>
            </div>
            <button class="btn-add" onclick="addItem()"><i class="ph-bold ph-plus"></i> AGREGAR A LA LISTA</button>
        </div>

        <div id="list-container"></div>
        <button id="btn-final" class="btn-float" onclick="showConfirm()">GUARDAR CARGA TOTAL</button>
    </div>

    <div id="page-history" class="page">
        <h3 style="margin-left: 10px">Últimos Despachos</h3>
        <div id="history-list"></div>
    </div>

    <div id="page-fleet" class="page">
        <h3 style="margin-left: 10px">Estado de Camiones</h3>
        <div id="fleet-list"></div>
    </div>

    <nav class="nav-bar" id="main-nav" style="display:none">
        <button class="nav-item active" id="n-route" onclick="go('page-route')"><i class="ph-fill ph-plus-circle"></i>NUEVO</button>
        <button class="nav-item" id="n-history" onclick="go('page-history')"><i class="ph-fill ph-clock"></i>HISTORIAL</button>
        <button class="nav-item" id="n-fleet" onclick="go('page-fleet')"><i class="ph-fill ph-truck"></i>FLOTA</button>
    </nav>

    <div id="modal-save" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:2000; align-items:center; padding:20px;">
        <div class="step-card" style="width:100%; text-align:center">
            <h2>¿Cuándo sale esta ruta?</h2>
            <button class="btn-add" style="background:var(--success)" onclick="saveAll('HOY')">SALIENDO HOY</button>
            <button class="btn-add" style="background:var(--accent)" onclick="saveAll('MAÑANA')">PARA MAÑANA</button>
            <button onclick="hideConfirm()" style="background:none; border:none; margin-top:20px; color:var(--text-dim); font-weight:700">CANCELAR</button>
        </div>
    </div>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbxuVVOZfMx8jkN-q079s6g7ppPAF4XIkNG-DEQGt6MqiownzLo3NMyWBIZ1hkTyoPBl/exec";
        const APP_DATA = {
            placas: ["CEP-929", "BPN-711", "BVN-704", "BUL-742", "BVN-930"],
            choferes: ["TAJHO", "LUIS H.", "ROMARIO", "CESAR C.", "WALDIR", "MARCELO"],
            auxiliares: ["Cristopher", "Plácido", "Martin", "Percy", "Rodolfo", "Ricardo", "Elio", "Daniel C.", "Jofer", "Nelson", "Julio"],
            soats: { "CEP-929": "2026-07-22", "BPN-711": "2026-06-10", "BVN-704": "2026-07-02", "BUL-742": "2026-04-02", "BVN-930": "2026-07-02" }
        };

        let currentItems = [], db = [], user = "";

        window.onload = () => {
            // Cargar selectores
            document.getElementById('sel-pla').innerHTML = '<option value="">-- ELIGE PLACA --</option>' + APP_DATA.placas.map(p=>`<option value="${p}">${p}</option>`).join('');
            document.getElementById('sel-cho').innerHTML = '<option value="">Chofer</option>' + APP_DATA.choferes.map(c=>`<option value="${c}">${c}</option>`).join('');
            document.getElementById('sel-aux').innerHTML = '<option value="">Auxiliar</option>' + APP_DATA.auxiliares.map(a=>`<option value="${a}">${a}</option>`).join('');
            
            // Login List
            document.getElementById('login-list').innerHTML = ['TAJHO ADMIN', 'FRANCESCO', 'OSCAR', 'LUIS HERBER'].map(u => 
                `<div class="step-card" style="text-align:center; font-weight:800; font-size:18px" onclick="doLogin('${u}')">${u}</div>`
            ).join('');

            const logged = localStorage.getItem('tw_user');
            if(logged) doLogin(logged);
            fetchDB();
        };

        function doLogin(u) {
            user = u; localStorage.setItem('tw_user', u);
            document.getElementById('page-login').classList.remove('active');
            document.getElementById('main-nav').style.display = 'flex';
            document.getElementById('user-badge').innerText = u;
            go('page-route');
        }

        function quickAdd(n) { 
            const val = document.getElementById('inp-can');
            val.value = (parseInt(val.value) || 0) + n;
        }
        function clearQty() { document.getElementById('inp-can').value = ''; }

        function addItem() {
            const cli = document.getElementById('inp-cli').value.toUpperCase();
            const can = document.getElementById('inp-can').value;
            if(!cli || !can || !document.getElementById('sel-pla').value) return alert("Completa los datos arriba");
            
            currentItems.push({ cli, can });
            document.getElementById('inp-cli').value = '';
            document.getElementById('inp-can').value = '';
            renderList();
        }

        function renderList() {
            const cont = document.getElementById('list-container');
            cont.innerHTML = currentItems.map((it, i) => `
                <div class="item-row">
                    <span><b>${it.cli}</b></span>
                    <span><b style="color:var(--accent)">${it.can} Cjs</b> 
                    <i class="ph-bold ph-trash" style="margin-left:10px; color:var(--danger)" onclick="removeItem(${i})"></i></span>
                </div>
            `).join('');
            document.getElementById('btn-final').style.display = currentItems.length > 0 ? 'block' : 'none';
        }

        async function saveAll(tipo) {
            const fecha = new Date(); if(tipo === 'MAÑANA') fecha.setDate(fecha.getDate() + 1);
            const data = {
                fecha: fecha.toLocaleDateString('sv-SE'),
                placa: document.getElementById('sel-pla').value,
                chofer: document.getElementById('sel-cho').value,
                auxiliar: document.getElementById('sel-aux').value,
                total: currentItems.reduce((a,b)=> a + parseInt(b.can), 0),
                items: currentItems.map(x => `${x.cli}: ${x.can}`).join(", ")
            };

            document.getElementById('btn-final').innerText = "GUARDANDO...";
            await fetch(API, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
            
            db.unshift(data);
            currentItems = [];
            renderList();
            hideConfirm();
            go('page-history');
            document.getElementById('btn-final').innerText = "GUARDAR CARGA TOTAL";
        }

        function renderHistory() {
            const today = new Date().toLocaleDateString('sv-SE');
            document.getElementById('history-list').innerHTML = db.map(r => {
                const esHoy = r.fecha === today;
                return `
                <div class="hist-card">
                    <span class="tag ${esHoy ? 'tag-hoy' : 'tag-mañana'}">${esHoy ? 'PARA HOY' : 'MAÑANA'}</span>
                    <div style="font-weight:800; font-size:18px">${r.placa}</div>
                    <div style="color:var(--accent); font-weight:800; font-size:20px; margin:5px 0">${r.total} CAJAS</div>
                    <div style="font-size:12px; color:var(--text-dim)">${r.items.substring(0,60)}...</div>
                </div>`;
            }).join('');
        }

        function renderFleet() {
            document.getElementById('fleet-list').innerHTML = APP_DATA.placas.map(p => {
                const diff = Math.ceil((new Date(APP_DATA.soats[p]) - new Date()) / (1000*60*60*24));
                const color = diff < 30 ? 'var(--danger)' : 'var(--success)';
                return `
                <div class="hist-card" style="display:flex; justify-content:space-between; align-items:center">
                    <div><b>${p}</b><br><small>Vence: ${APP_DATA.soats[p]}</small></div>
                    <div style="text-align:right"><b style="color:${color}; font-size:22px">${diff}</b><br><small>DÍAS</small></div>
                </div>`;
            }).join('');
        }

        function predictData() {
            const p = document.getElementById('sel-pla').value;
            const last = db.find(x => x.placa === p);
            if(last) {
                document.getElementById('sel-cho').value = last.chofer;
                document.getElementById('sel-aux').value = last.auxiliar;
            }
        }

        async function fetchDB() { try { const r = await fetch(API); db = await r.json(); } catch(e){} }
        function go(id) {
            document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('n-'+id.split('-')[1]).classList.add('active');
            if(id === 'page-history') renderHistory();
            if(id === 'page-fleet') renderFleet();
        }
        function removeItem(i) { currentItems.splice(i,1); renderList(); }
        function showConfirm() { document.getElementById('modal-save').style.display = 'flex'; }
        function hideConfirm() { document.getElementById('modal-save').style.display = 'none'; }
    </script>
</body>
</html>
