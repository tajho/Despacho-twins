<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TWINS DESPACHO ELITE</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root {
            --bg: #05070a; --card: rgba(255, 255, 255, 0.04);
            --accent: #007aff; --accent-light: #58a6ff;
            --text: #ffffff; --text-dim: #8b949e;
            --border: rgba(255, 255, 255, 0.08);
            --success: #30d158; --danger: #ff453a; --warning: #ffd60a;
        }

        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; outline: none; }
        body { 
            margin: 0; background: var(--bg); 
            color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; 
            min-height: 100vh; overflow-x: hidden;
        }

        .page { display: none; padding: 15px; padding-bottom: 120px; max-width: 550px; margin: 0 auto; animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .active { display: block !important; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Header Premium */
        .top-header { 
            position: sticky; top: 0; z-index: 1000; 
            background: rgba(5, 7, 10, 0.7); backdrop-filter: blur(20px);
            padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 1px solid var(--border);
        }
        .logo { font-weight: 800; font-size: 16px; letter-spacing: -0.5px; }
        .logo span { color: var(--accent); }

        /* Tarjetas con Efecto */
        .card { 
            background: var(--card); border: 1px solid var(--border); 
            border-radius: 28px; padding: 20px; margin-bottom: 15px;
            backdrop-filter: blur(10px); transition: transform 0.2s;
        }

        /* Stats Inteligentes */
        .stat-box { display: flex; flex-direction: column; gap: 5px; }
        .stat-val { font-size: 24px; font-weight: 800; }
        .stat-lab { font-size: 10px; color: var(--text-dim); text-transform: uppercase; font-weight: 700; }

        /* Inputs Modernos */
        .input-group { position: relative; margin-bottom: 10px; }
        input, select { 
            width: 100%; padding: 18px; border-radius: 20px; border: 1px solid var(--border); 
            background: rgba(255,255,255,0.03); color: white; font-size: 15px; font-weight: 500;
        }
        input:focus { border-color: var(--accent); background: rgba(0,122,255,0.05); }

        /* Botones */
        .btn { 
            width: 100%; padding: 18px; border-radius: 22px; border: none; 
            font-size: 15px; font-weight: 700; cursor: pointer; 
            display: flex; justify-content: center; align-items: center; gap: 10px; transition: 0.2s;
        }
        .btn-primary { background: var(--accent); color: white; box-shadow: 0 10px 25px rgba(0,122,255,0.3); }
        .btn-ghost { background: var(--card); border: 1px solid var(--border); color: var(--text); }
        .btn-mini { padding: 10px; border-radius: 14px; font-size: 11px; font-weight: 700; }

        /* Nav Flotante */
        .nav-bar { 
            position: fixed; bottom: 20px; left: 20px; right: 20px; 
            background: rgba(30, 30, 30, 0.8); backdrop-filter: blur(25px);
            height: 75px; border-radius: 30px; border: 1px solid var(--border);
            display: flex; justify-content: space-around; align-items: center; z-index: 2000;
        }
        .nav-link { 
            display: flex; flex-direction: column; align-items: center; gap: 4px;
            color: var(--text-dim); text-decoration: none; font-size: 10px; font-weight: 700;
            background: none; border: none; flex: 1;
        }
        .nav-link.active { color: var(--accent); }
        .nav-link i { font-size: 24px; }

        /* Barra de Progreso */
        .progress-container { height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; margin: 10px 0; overflow: hidden; }
        .progress-bar { height: 100%; background: var(--accent); width: 0%; transition: 0.5s; }

        .modal { 
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); 
            backdrop-filter: blur(15px); z-index: 3000; padding: 20px; 
            align-items: center; justify-content: center;
        }
        .modal-body { background: #121418; border-radius: 35px; padding: 30px; width: 100%; max-width: 400px; border: 1px solid var(--border); }
    </style>
</head>
<body>

    <div id="m-list" class="modal" onclick="this.style.display='none'">
        <div class="modal-body" onclick="event.stopPropagation()">
            <h3 id="m-title" style="margin:0 0 5px 0">Carga Detallada</h3>
            <p id="m-subtitle" style="color:var(--text-dim); font-size:12px; margin-bottom:20px;"></p>
            <div id="m-container" style="max-height: 250px; overflow-y: auto;"></div>
            <button class="btn btn-primary" style="margin-top:20px" onclick="document.getElementById('m-list').style.display='none'">CERRAR</button>
        </div>
    </div>

    <div id="m-date" class="modal">
        <div class="modal-body">
            <h2 style="text-align:center; font-weight:800; margin-top:0">¿Cuándo sale?</h2>
            <p style="text-align:center; color:var(--text-dim); margin-bottom:25px">Asigna la fecha de despacho</p>
            <button class="btn btn-primary" style="margin-bottom:12px" onclick="saveRoute('HOY')"><i class="ph ph-lightning-fill"></i> DESPACHAR HOY</button>
            <button class="btn btn-ghost" style="margin-bottom:12px; color:var(--success); border-color:var(--success)" onclick="saveRoute('MAÑANA')"><i class="ph ph-calendar-plus"></i> PROGRAMAR MAÑANA</button>
            <button class="btn" style="background:none; color:var(--text-dim)" onclick="document.getElementById('m-date').style.display='none'">CANCELAR</button>
        </div>
    </div>

    <header id="app-header" class="top-header" style="display:none">
        <div class="logo">TWINS <span>DESPACHO</span></div>
        <div style="display:flex; align-items:center; gap:12px">
            <div class="user-pill" id="user-display">---</div>
            <i class="ph-bold ph-power" onclick="logout()" style="color:var(--danger); font-size:20px"></i>
        </div>
    </header>

    <div id="page-login" class="page active" style="text-align:center; padding-top:12vh">
        <div style="font-size: 60px; margin-bottom: 10px;">📦</div>
        <h1 style="font-weight: 800; margin-bottom: 5px;">SISTEMA ELITE</h1>
        <p style="color:var(--text-dim); margin-bottom: 40px">Ingresa tus credenciales de almacén</p>
        <div id="login-grid" style="display:grid; gap:12px; padding: 0 20px;"></div>
    </div>

    <div id="page-route" class="page">
        <div class="card" style="background: linear-gradient(135deg, #007aff, #004494); border:none; color:white;">
            <div style="display:flex; justify-content:space-between; align-items:center">
                <span class="stat-lab" style="color:rgba(255,255,255,0.7)">Carga en cola</span>
                <i class="ph ph-package" style="font-size:24px"></i>
            </div>
            <div class="stat-val" id="total-cajas" style="font-size:50px">0</div>
            <div class="progress-container"><div id="load-bar" class="progress-bar" style="background:white"></div></div>
        </div>

        <div class="card">
            <input type="text" id="cli" placeholder="Cliente o Destino" style="margin-bottom:10px">
            <div style="display:flex; gap:10px">
                <input type="number" id="can" placeholder="Cantidad" style="flex:1">
                <button class="btn btn-primary" onclick="addItem()" style="flex:1"><i class="ph-bold ph-plus"></i> AÑADIR</button>
            </div>
        </div>

        <div id="send-zone" style="display:none">
            <div id="temp-list" class="card" style="font-size:13px; max-height: 150px; overflow-y: auto;"></div>
            <div class="card">
                <select id="pla" onchange="smartPredict()" style="margin-bottom:10px"></select>
                <div style="display:flex; gap:10px; margin-bottom:10px">
                    <select id="cho" style="flex:1"></select>
                    <select id="aux" style="flex:1"></select>
                </div>
                <button class="btn" style="background:var(--success); color:black" onclick="openSave()"><i class="ph ph-check-circle"></i> GUARDAR RUTA</button>
            </div>
        </div>
    </div>

    <div id="page-history" class="page">
        <div class="stat-grid" style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:15px">
            <div class="card" style="margin:0; padding:15px">
                <span class="stat-lab">Total Mes</span>
                <span class="stat-val" id="st-mes" style="color:var(--accent)">0</span>
            </div>
            <div class="card" style="margin:0; padding:15px">
                <span class="stat-lab">Prom. Ruta</span>
                <span class="stat-val" id="st-prom" style="color:var(--success)">0</span>
            </div>
        </div>

        <div style="display:flex; gap:10px; margin-bottom:15px">
            <input type="date" id="f-filter" onchange="renderHistory()" style="flex:1; margin:0">
            <input type="text" id="search" oninput="renderHistory()" placeholder="Buscar..." style="flex:1; margin:0; padding:10px 15px">
        </div>
        
        <div id="history-container"></div>
    </div>

    <div id="page-fleet" class="page">
        <div id="fleet-stats" class="card" style="text-align:center; padding:15px; background:rgba(48, 209, 88, 0.1); border-color:rgba(48, 209, 88, 0.2)">
            <span class="stat-lab" style="color:var(--success)">Unidades Disponibles</span>
            <div class="stat-val" id="fleet-count" style="color:var(--success)">0 / 0</div>
        </div>
        <div id="fleet-list"></div>
    </div>

    <nav id="app-nav" class="nav-bar" style="display:none">
        <button class="nav-link" id="n-route" onclick="nav('page-route')"><i class="ph ph-cube"></i>Ruta</button>
        <button class="nav-link" id="n-history" onclick="nav('page-history')"><i class="ph ph-chart-pie"></i>Data</button>
        <button class="nav-link" id="n-fleet" onclick="nav('page-fleet')"><i class="ph ph-truck"></i>Flota</button>
    </nav>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbxCRMbdOGYjf0R-w1v9tHG76jDhHXxuXOwHahYEV7Gj1lFn3y42C2s9DUO5nkgO75qy/exec";
        let user = "", items = [], database = [];
        
        const PLACAS = ["CEP-929", "BPN-711", "BVN-704", "BUL-742", "BVN-930"];
        const CHOFERES = ["LUIS H.", "ROMARIO", "CESAR C.", "WALDIR", "MARCELO"];
        const AUXILIARES = ["CRISTOPHER", "PLACIDO", "RODOLFO", "SIN AUXILIAR"];
        const SOATS = { "CEP-929": "15/05/26", "BPN-711": "22/08/26", "BVN-704": "10/01/27", "BUL-742": "05/11/26", "BVN-930": "30/09/26" };

        window.onload = () => {
            initInputs();
            const saved = localStorage.getItem('tw_user');
            document.getElementById('f-filter').value = new Date().toISOString().split('T')[0];
            if(saved) login(saved);
            loadData();
        };

        function initInputs() {
            const grid = document.getElementById('login-grid');
            ['TAJHO ADMIN', 'FRANCESCO', 'OSCAR', 'LUIS HERBER'].forEach(u => {
                grid.innerHTML += `<button class="btn btn-ghost" onclick="login('${u}')">${u}</button>`;
            });

            const sP = document.getElementById('pla'), sC = document.getElementById('cho'), sA = document.getElementById('aux');
            sP.innerHTML = '<option value="">Seleccionar Placa</option>' + PLACAS.map(p => `<option value="${p}">${p}</option>`).join('');
            sC.innerHTML = '<option value="">Chofer</option>' + CHOFERES.map(c => `<option value="${c}">${c}</option>`).join('');
            sA.innerHTML = '<option value="">Auxiliar</option>' + AUXILIARES.map(a => `<option value="${a}">${a}</option>`).join('');
        }

        function login(u) {
            user = u; localStorage.setItem('tw_user', u);
            document.getElementById('page-login').classList.remove('active');
            document.getElementById('app-header').style.display = 'flex';
            document.getElementById('app-nav').style.display = 'flex';
            document.getElementById('user-display').innerText = u;
            nav('page-route');
        }

        function nav(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('n-' + id.split('-')[1]).classList.add('active');
            if(id === 'page-history') renderHistory();
            if(id === 'page-fleet') renderFleet();
        }

        async function loadData() {
            try { const r = await fetch(API); database = await r.json(); renderHistory(); renderFleet(); } catch(e){}
        }

        // INTELIGENCIA: Predicción y Validación de ocupación
        function smartPredict() {
            const p = document.getElementById('pla').value;
            if(!p) return;
            
            // 1. Avisar si ya está ocupado hoy
            const hoy = new Date().toISOString().split('T')[0];
            const ocupado = database.find(r => r.placa === p && r.fecha.split('T')[0] === hoy);
            if(ocupado) alert(`¡ATENCIÓN! La placa ${p} ya fue asignada hoy a ${ocupado.chofer}.`);

            // 2. Predecir personal frecuente
            const last = database.slice().reverse().find(r => r.placa === p);
            if(last) {
                document.getElementById('cho').value = last.chofer;
                document.getElementById('aux').value = last.auxiliar;
            }
        }

        function addItem() {
            const cl = document.getElementById('cli').value.toUpperCase(), ca = parseInt(document.getElementById('can').value);
            if(!cl || !ca) return;
            items.unshift({cl, ca});
            document.getElementById('cli').value = ""; document.getElementById('can').value = "";
            renderTemp();
        }

        function renderTemp() {
            const box = document.getElementById('temp-list');
            let total = 0; box.innerHTML = "";
            items.forEach((item, i) => {
                total += item.ca;
                box.innerHTML += `<div style="display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid var(--border)">
                    <span>${item.cl}</span><b>${item.ca} CJ <i class="ph ph-trash" onclick="items.splice(${i},1);renderTemp()" style="color:var(--danger);margin-left:8px"></i></b>
                </div>`;
            });
            document.getElementById('total-cajas').innerText = total;
            document.getElementById('load-bar').style.width = Math.min((total/1000)*100, 100) + "%";
            document.getElementById('send-zone').style.display = items.length ? 'block' : 'none';
        }

        function openSave() { document.getElementById('m-date').style.display = 'flex'; }

        async function saveRoute(tipo) {
            document.getElementById('m-date').style.display = 'none';
            let d = new Date();
            if(tipo === 'MAÑANA') { d.setDate(d.getDate() + 1); if(d.getDay() === 0) d.setDate(d.getDate() + 1); }
            const fT = d.toISOString().split('T')[0];

            const reg = {
                fecha: fT, chofer: document.getElementById('cho').value, auxiliar: document.getElementById('aux').value,
                placa: document.getElementById('pla').value, operario: user,
                items: items.map(i => `${i.cl}:${i.ca}`).join(", "), total: items.reduce((a,b)=>a+b.ca,0)
            };

            database.push(reg);
            document.getElementById('f-filter').value = fT;
            nav('page-history');
            
            fetch(API, { method: 'POST', mode: 'no-cors', body: JSON.stringify(reg) });
            items = []; renderTemp();
            document.getElementById('pla').value = "";
        }

        function renderHistory() {
            const cont = document.getElementById('history-container'), fD = document.getElementById('f-filter').value;
            const sQ = document.getElementById('search').value.toUpperCase();
            let html = "", tM = 0, tD = 0, nD = 0;
            const mes = new Date().getMonth();

            database.slice().reverse().forEach(r => {
                const rf = r.fecha.split('T')[0];
                if(new Date(r.fecha + "T00:00:00").getMonth() === mes) tM += parseFloat(r.total);
                
                if(rf === fD && (r.items.toUpperCase().includes(sQ) || r.chofer.toUpperCase().includes(sQ))) {
                    tD += parseFloat(r.total); nD++;
                    html += `<div class="card" style="border-left:5px solid ${rf > new Date().toISOString().split('T')[0] ? 'var(--success)' : 'var(--accent)'}">
                        <div style="display:flex; justify-content:space-between; margin-bottom:10px">
                            <b style="font-size:16px">${r.placa}</b>
                            <span style="color:var(--accent); font-weight:800">${r.total} CJ</span>
                        </div>
                        <div style="font-size:13px; font-weight:600; margin-bottom:15px">${r.chofer} <span style="color:var(--text-dim)">• ${r.auxiliar}</span></div>
                        <div style="display:flex; gap:8px">
                            <button class="btn-mini btn-ghost" style="flex:1" onclick="viewItems('${r.items}', '${r.chofer}')">VER LISTA</button>
                            <button class="btn-mini btn-ghost" style="flex:1" onclick="editR('${r.items}','${r.chofer}','${r.pla}','${r.aux}')">EDITAR</button>
                            <button class="btn-mini" style="background:#25D366; color:white; border:none; width:45px" onclick="wa('${r.fecha}','${r.chofer}','${r.total}','${r.items}')"><i class="ph ph-whatsapp-logo" style="font-size:18px"></i></button>
                        </div>
                    </div>`;
                }
            });
            cont.innerHTML = html || "<p style='text-align:center; color:var(--text-dim)'>No hay registros</p>";
            document.getElementById('st-mes').innerText = Math.round(tM);
            document.getElementById('st-prom').innerText = nD ? Math.round(tD/nD) : 0;
        }

        function viewItems(txt, ch) {
            document.getElementById('m-title').innerText = "Ruta: " + ch;
            const container = document.getElementById('m-container');
            container.innerHTML = txt.split(", ").map(i => {
                const [cl, ca] = i.split(":");
                return `<div style="display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid var(--border)"><span>${cl}</span><b>${ca} CJ</b></div>`;
            }).join('');
            document.getElementById('m-list').style.display = 'flex';
        }

        function editR(i,c,p,a) {
            items = i.split(", ").map(x => { const [cl, ca] = x.split(":"); return {cl, ca: parseInt(ca)}; });
            document.getElementById('cho').value = c; document.getElementById('pla').value = p; document.getElementById('aux').value = a;
            renderTemp(); nav('page-route');
        }

        function wa(f,c,t,i) {
            const m = `*TWINS DESPACHO*%0A*Fecha:* ${f.split('T')[0]}%0A*Chofer:* ${c}%0A*Total:* ${t} CJ%0A%0A*Detalle:*%0A${i.replace(/:/g, ': ').replace(/,/g, '%0A')}`;
            window.location.href = `https://wa.me/?text=${m}`;
        }

        function renderFleet() {
            const list = document.getElementById('fleet-list'), fD = document.getElementById('f-filter').value;
            let lib = 0; list.innerHTML = "";
            PLACAS.forEach(p => {
                const r = database.find(x => x.placa === p && x.fecha.split('T')[0] === fD);
                if(!r) lib++;
                list.innerHTML += `<div class="card" style="border-left:5px solid ${r ? 'var(--danger)' : 'var(--success)'}">
                    <div style="display:flex; justify-content:space-between"><b>${p}</b> <small style="font-size:10px; color:var(--text-dim)">SOAT: ${SOATS[p]}</small></div>
                    <div style="margin-top:8px; font-size:14px">${r ? '🔴 EN RUTA: ' + r.chofer : '🟢 DISPONIBLE'}</div>
                </div>`;
            });
            document.getElementById('fleet-count').innerText = `${lib} / ${PLACAS.length}`;
        }

        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
