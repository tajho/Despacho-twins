<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TWINS - REPORTE INTERNO</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root {
            --bg: #05070a; --surface: #0f1218;
            --accent: #0066ff; --text: #ffffff; --text-dim: #94a3b8;
            --border: #1e293b; --success: #10b981; --danger: #ef4444;
        }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; outline: none; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; }
        
        .page { display: none; padding: 15px 15px 120px 15px; max-width: 500px; margin: 0 auto; }
        .active { display: block !important; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .top-header { position: sticky; top: 0; z-index: 1000; background: rgba(5, 7, 10, 0.9); backdrop-filter: blur(10px); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 16px; margin-bottom: 15px; }
        
        /* Dashboard Conteo */
        .dash-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .dash-box { background: var(--surface); border: 1px solid var(--border); border-radius: 18px; padding: 12px; border-left: 4px solid var(--accent); }
        .dash-box.day { border-left-color: var(--success); }
        .dash-label { font-size: 10px; font-weight: 800; color: var(--text-dim); text-transform: uppercase; margin-bottom: 4px; }
        .dash-val { font-size: 22px; font-weight: 800; display: block; }

        /* Navegación Original Dinámica */
        .nav-bar { position: fixed; bottom: 20px; left: 15px; right: 15px; background: rgba(22, 27, 34, 0.95); backdrop-filter: blur(15px); height: 70px; border-radius: 22px; display: flex; border: 1px solid rgba(255,255,255,0.08); z-index: 2000; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-dim); background: none; border: none; font-size: 10px; font-weight: 700; }
        .nav-item.active { color: var(--accent); }
        .nav-item i { font-size: 24px; margin-bottom: 4px; }

        .btn { border: none; border-radius: 14px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-save { background: var(--success); color: white; padding: 18px; width: 100%; font-size: 16px; }
        input, select { background: #1a1f26; border: 1px solid var(--border); padding: 15px; border-radius: 14px; color: white; width: 100%; margin-bottom: 10px; }

        .history-card { border-left: 4px solid var(--accent); padding: 15px; margin-bottom: 12px; }
        .badge-hora { background: var(--accent); color: white; padding: 2px 8px; border-radius: 6px; font-size: 10px; font-weight: 800; }
    </style>
</head>
<body>

    <header id="app-header" class="top-header" style="display:none">
        <div style="font-weight:900;">TWINS <span style="color:var(--accent)">PRO</span></div>
        <div id="user-info" onclick="logout()" style="font-size:11px; font-weight:800; background:var(--border); padding:8px 15px; border-radius:20px;">---</div>
    </header>

    <div id="page-route" class="page">
        <div class="card" style="background:linear-gradient(135deg, #0066ff, #003399); color:white">
            <small style="font-weight:700">CARGA TOTAL</small>
            <div id="count-cajas" style="font-size:40px; font-weight:800">0</div>
        </div>
        <div class="card">
            <input type="text" id="inp-cli" placeholder="Cliente">
            <div style="display:flex; gap:10px">
                <input type="number" id="inp-can" placeholder="Cajas" style="flex:0.5">
                <button class="btn" onclick="addPoint()" style="flex:1.5; background:var(--accent); color:white">AÑADIR</button>
            </div>
        </div>
        <div id="list-container" style="display:none">
            <div id="live-list"></div>
            <div class="card">
                <select id="sel-pla" onchange="predictAndSave()"></select>
                <div style="display:flex; gap:10px"><select id="sel-cho"></select><select id="sel-aux"></select></div>
                <button class="btn btn-save" onclick="finalize()">GUARDAR DESPACHO</button>
            </div>
        </div>
    </div>

    <div id="page-history" class="page">
        <div class="dash-row">
            <div class="dash-box"><span class="dash-label">Mes</span><span id="st-month" class="dash-val">0</span></div>
            <div class="dash-box day"><span class="dash-label">Día</span><span id="st-day" class="dash-val">0</span></div>
        </div>
        <input type="date" id="filter-date" onchange="renderHistory()">
        <div id="history-feed"></div>
    </div>

    <div id="page-report" class="page">
        <div class="card" style="text-align:center">
            <i class="ph ph-file-pdf" style="font-size:60px; color:var(--danger)"></i>
            <h3>Reporte Administrativo</h3>
            <p style="color:var(--text-dim); font-size:14px">Genera un PDF con el resumen mensual detallado de Choferes y Auxiliares.</p>
            <button class="btn" style="background:var(--danger); color:white; width:100%; padding:18px" onclick="generateReportPDF()">DESCARGAR REPORTE</button>
        </div>
    </div>

    <nav id="app-nav" class="nav-bar" style="display:none">
        <button class="nav-item active" id="n-route" onclick="go('page-route')"><i class="ph-fill ph-note-pencil"></i>HOJA</button>
        <button class="nav-item" id="n-history" onclick="go('page-history')"><i class="ph-fill ph-clock-counter-clockwise"></i>DATA</button>
        <button class="nav-item" id="n-report" onclick="go('page-report')"><i class="ph-fill ph-file-text"></i>REPORTE</button>
    </nav>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbxuVVOZfMx8jkN-q079s6g7ppPAF4XIkNG-DEQGt6MqiownzLo3NMyWBIZ1hkTyoPBl/exec";
        let db = [], currentCarga = [], activeUser = "";

        const DATA = {
            placas: ["CEP-929", "BPN-711", "BVN-704", "BUL-742", "BVN-930"],
            choferes: ["TAJHO", "LUIS H.", "ROMARIO", "CESAR C.", "WALDIR", "MARCELO"],
            auxiliares: ["Cristopher", "Plácido", "Martin", "Percy", "Rodolfo", "Ricardo", "Elio", "Daniel C.", "Jofer", "Nelson", "Julio"]
        };

        window.onload = () => {
            document.getElementById('sel-pla').innerHTML = '<option value="">Placa</option>' + DATA.placas.map(p => `<option value="${p}">${p}</option>`).join('');
            document.getElementById('sel-cho').innerHTML = '<option value="">Chofer</option>' + DATA.choferes.map(c => `<option value="${c}">${c}</option>`).join('');
            document.getElementById('sel-aux').innerHTML = '<option value="">Auxiliar</option>' + DATA.auxiliares.map(a => `<option value="${a}">${a}</option>`).join('');
            document.getElementById('filter-date').value = new Date().toLocaleDateString('en-CA');
            
            if(localStorage.getItem('tw_logged')) login(localStorage.getItem('tw_logged'));
            else setupLogin();
            syncData();
        };

        function setupLogin() {
            const page = document.getElementById('page-route');
            page.style.display = 'block';
            page.innerHTML = `<h2>Identifícate</h2>` + ['TAJHO ADMIN', 'FRANCESCO', 'OSCAR', 'LUIS HERBER'].map(u => `<button class="btn" style="background:var(--surface); border:1px solid var(--border); color:white; padding:18px; width:100%; margin-bottom:10px" onclick="login('${u}')">${u}</button>`).join('');
        }

        function login(u) {
            activeUser = u; localStorage.setItem('tw_logged', u);
            location.reload(); // Recarga para limpiar UI de login
        }

        if(localStorage.getItem('tw_logged')) {
            document.getElementById('app-header').style.display = 'flex';
            document.getElementById('app-nav').style.display = 'flex';
            document.getElementById('user-info').innerText = localStorage.getItem('tw_logged');
            activeUser = localStorage.getItem('tw_logged');
        }

        async function syncData() {
            const res = await fetch(API);
            db = await res.json();
            renderHistory();
        }

        function renderHistory() {
            const container = document.getElementById('history-feed');
            const selDate = document.getElementById('filter-date').value;
            let h = "", dTotal = 0, mTotal = 0;
            const now = new Date(selDate + "T12:00:00");

            db.forEach(r => {
                const rDate = r.fecha.includes('T') ? r.fecha.split('T')[0] : r.fecha;
                const rCajas = parseFloat(r.total || 0);
                const rD = new Date(rDate + "T12:00:00");

                if(rD.getMonth() === now.getMonth()) mTotal += rCajas;
                if(rDate === selDate) {
                    dTotal += rCajas;
                    h += `<div class="card history-card">
                        <div style="display:flex; justify-content:space-between"><span class="badge-hora">${r.hora}</span><b>${r.placa}</b></div>
                        <div style="margin:10px 0; font-weight:800; font-size:18px">${rCajas} Cajas</div>
                        <small style="opacity:0.6">${r.chofer} / ${r.auxiliar}</small>
                    </div>`;
                }
            });
            container.innerHTML = h;
            document.getElementById('st-day').innerText = dTotal;
            document.getElementById('st-month').innerText = mTotal;
        }

        async function finalize() {
            const r = {
                fecha: new Date().toLocaleDateString('en-CA'),
                hora: new Date().toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' }),
                chofer: document.getElementById('sel-cho').value,
                auxiliar: document.getElementById('sel-aux').value,
                placa: document.getElementById('sel-pla').value,
                items: currentCarga.map(i => `${i.cli}: ${i.can}`).join(", "),
                total: currentCarga.reduce((a,b) => a + (parseFloat(b.can)||0), 0),
                operario: activeUser
            };
            await fetch(API, { method: 'POST', mode: 'no-cors', body: JSON.stringify(r) });
            location.reload();
        }

        function generateReportPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const now = new Date();
            const mesActual = now.getMonth();

            // Cálculos Internos
            const sCho = {}, sAux = {};
            db.forEach(r => {
                const rD = new Date((r.fecha.includes('T') ? r.fecha.split('T')[0] : r.fecha) + "T12:00:00");
                if(rD.getMonth() === mesActual) {
                    sCho[r.chofer] = (sCho[r.chofer] || 0) + parseFloat(r.total);
                    sAux[r.auxiliar] = (sAux[r.auxiliar] || 0) + parseFloat(r.total);
                }
            });

            doc.setFontSize(16); doc.text("REPORTE INTERNO DE DESPACHOS - TWINS", 14, 20);
            doc.setFontSize(10); doc.text(`Generado el: ${now.toLocaleString()}`, 14, 28);

            doc.text("RENDIMIENTO POR CHOFER (MES)", 14, 40);
            doc.autoTable({
                startY: 45, head: [['Chofer', 'Total Cajas Mensual']],
                body: Object.entries(sCho).map(([k,v]) => [k, v]),
            });

            doc.text("RENDIMIENTO POR AUXILIAR (MES)", 14, doc.lastAutoTable.finalY + 10);
            doc.autoTable({
                startY: doc.lastAutoTable.finalY + 15, head: [['Auxiliar', 'Total Cajas Mensual']],
                body: Object.entries(sAux).map(([k,v]) => [k, v]),
                theme: 'striped'
            });

            doc.save(`Reporte_Interno_${now.getMonth()+1}.pdf`);
        }

        function go(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('n-' + id.split('-')[1]).classList.add('active');
        }

        function addPoint() {
            const cli = document.getElementById('inp-cli').value.toUpperCase();
            const can = parseInt(document.getElementById('inp-can').value);
            if(cli && can) {
                currentCarga.push({cli, can});
                document.getElementById('inp-cli').value = ""; document.getElementById('inp-can').value = "";
                refreshCargaUI();
            }
        }

        function refreshCargaUI() {
            const container = document.getElementById('live-list');
            let t = 0; container.innerHTML = "";
            currentCarga.forEach(i => { t += i.can; container.innerHTML += `<div class="card" style="padding:10px; margin-bottom:5px">${i.can} CJ - ${i.cli}</div>`; });
            document.getElementById('count-cajas').innerText = t;
            document.getElementById('list-container').style.display = 'block';
        }

        function predictAndSave() {
            const l = db.find(r => r.placa === document.getElementById('sel-pla').value);
            if(l) { document.getElementById('sel-cho').value = l.chofer; document.getElementById('sel-aux').value = l.auxiliar; }
        }

        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
