<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TWINS ELITE - V66.7 OFICIAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root {
            --bg: #f4f6f8; --surface: #ffffff; --accent: #000000; 
            --text: #111827; --text-dim: #6b7280; --border: #e5e7eb; 
            --gold: #FFD700; --silver: #C0C0C0; --bronze: #CD7F32; --green: #10b981; --red: #ef4444;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { margin: 0; background: var(--bg); color: var(--text); padding-bottom: 100px; }

        #login-screen { position: fixed; inset: 0; background: #000; z-index: 5000; display: flex; align-items: center; justify-content: center; padding: 25px; }
        .login-card { background: #fff; width: 100%; max-width: 400px; padding: 40px 25px; border-radius: 35px; text-align: center; }

        .page { display: none; padding: 20px; max-width: 600px; margin: 0 auto; }
        .active { display: block; }

        .core-dash { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .master-card { background: #fff; padding: 18px; border-radius: 24px; border: 1px solid var(--border); display: flex; flex-direction: column; justify-content: space-between; height: 110px; }
        .master-card.black { background: #000; color: #fff; border: none; }
        .stat-label { font-size: 10px; font-weight: 800; text-transform: uppercase; opacity: 0.6; }
        .stat-main { font-size: 26px; font-weight: 900; }

        .search-box { position: relative; margin-bottom: 15px; }
        .search-box input { width: 100%; padding: 14px 20px 14px 45px; background: #fff; border: 1px solid var(--border); border-radius: 18px; font-weight: 700; outline: none; }
        .search-box i { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--text-dim); }
        
        /* TARJETA OPTIMIZADA */
        .route-card { background: #fff; border-radius: 24px; padding: 16px; margin-bottom: 12px; border: 1px solid var(--border); }
        .card-crew { font-size: 10px; font-weight: 700; color: #4b5563; margin-top: 8px; padding: 8px 12px; background: #f9fafb; border-radius: 10px; display: flex; justify-content: space-between; }
        
        .card-actions { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-top: 12px; }
        .btn-card { background: #f9fafb; border: 1px solid #eee; padding: 8px 4px; border-radius: 10px; font-weight: 800; font-size: 9px; text-transform: uppercase; color: var(--text); display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .btn-card i { font-size: 14px; }
        .btn-card.rep { border-color: var(--green); color: var(--green); }

        .nav-bottom { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; height: 80px; display: none; border-top: 1px solid var(--border); z-index: 1000; padding: 0 10px; }
        .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #9ca3af; background: none; border: none; font-size: 10px; font-weight: 800; gap: 4px; }
        .nav-btn.active { color: #000; }
        .nav-btn i { font-size: 22px; }

        .field { background: #f9fafb; border: 1px solid var(--border); border-radius: 16px; padding: 14px; width: 100%; font-size: 15px; font-weight: 700; outline: none; margin-bottom: 10px; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); display: none; align-items: flex-end; z-index: 2000; }
        .modal-content { background: #fff; width: 100%; border-radius: 30px 30px 0 0; padding: 25px; max-height: 80vh; overflow-y: auto; }
        .btn-off { background: #fef2f2; border: none; width: 38px; height: 38px; border-radius: 12px; color: var(--red); display: flex; align-items: center; justify-content: center; font-size: 20px; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-card">
            <h2 style="font-weight:900;">Twins Elite</h2>
            <select id="user-select" class="field" onchange="checkUserType()">
                <option value="">Usuario</option>
                <option value="TAJHO">TAJHO</option>
                <option value="FRANCHESCO">FRANCHESCO</option>
                <option value="OSCAR">OSCAR</option>
                <option value="LUIS HERBER">LUIS HERBER</option>
            </select>
            <input type="password" id="pass-field" class="field" placeholder="Contraseña" style="display:none;">
            <button onclick="login()" style="width:100%; padding:18px; background:#000; color:#fff; border-radius:18px; font-weight:800; border:none; margin-top:10px;">ACCEDER</button>
        </div>
    </div>

    <div id="page-dash" class="page active">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h1 style="font-weight:900; margin:0;">Twins Elite</h1>
            <button class="btn-off" onclick="logout()"><i class="ph-bold ph-power"></i></button>
        </div>
        <div class="core-dash">
            <div class="master-card black">
                <span class="stat-label">Cajas Hoy</span>
                <span id="stat-hoy-cajas" class="stat-main">0</span>
            </div>
            <div class="master-card">
                <span class="stat-label">Cajas Mes</span>
                <span id="stat-mes-cajas" class="stat-main">0</span>
            </div>
        </div>
        <div class="search-box">
            <i class="ph-bold ph-magnifying-glass"></i>
            <input type="text" id="smart-search" placeholder="Buscar..." onkeyup="renderHistory()">
        </div>
        <div id="hist-cont"></div>
    </div>

    <div id="page-units" class="page">
        <h1 style="font-weight:900; margin-bottom:20px;">Nueva Ruta</h1>
        <div id="units-grid" style="display:grid; grid-template-columns:1fr 1fr; gap:12px;"></div>
    </div>

    <div id="page-data" class="page">
        <h1 style="font-weight:900; margin-bottom:20px;">Rendimiento</h1>
        <input type="month" id="f-month" class="field" onchange="renderData()">
        <div id="rank-choferes-list"></div>
        <div id="rank-auxiliares-list"></div>
    </div>

    <div id="page-load" class="page">
        <h2 id="load-placa-txt" style="font-size:28px; font-weight:900;">---</h2>
        <div style="display:flex; gap:10px; margin-bottom:15px;">
            <input type="text" id="i-cli" placeholder="Cliente" class="field" style="flex:2; margin:0">
            <input type="number" id="i-can" placeholder="Cjs" class="field" style="flex:1; margin:0">
        </div>
        <button onclick="addItem()" style="width:100%; padding:18px; background:#000; color:#fff; border-radius:18px; font-weight:800; border:none;">AGREGAR</button>
        <div id="load-list" style="margin-top:15px;"></div>
        <button id="btn-save" onclick="save()" style="display:none; width:100%; padding:20px; background:var(--green); color:#fff; border-radius:18px; font-weight:900; border:none; margin-top:15px;">FINALIZAR</button>
    </div>

    <div id="page-config" class="page">
        <h2 id="conf-placa" style="font-weight:900;">---</h2>
        <input type="date" id="c-fecha" class="field">
        <select id="c-chofer" class="field"></select>
        <select id="c-aux" class="field"></select>
        <button onclick="goLoad()" style="width:100%; padding:18px; background:#000; color:#fff; border-radius:18px; font-weight:800; border:none;">CONTINUAR</button>
    </div>

    <div id="modal-crew" class="modal">
        <div class="modal-content">
            <h3 style="font-weight:900; margin-bottom:15px;">Actualizar Equipo</h3>
            <select id="qe-chofer" class="field"></select>
            <select id="qe-aux" class="field"></select>
            <button onclick="saveQuickCrew()" style="width:100%; padding:18px; background:#000; color:#fff; border-radius:15px; font-weight:800; border:none;">CONFIRMAR CAMBIOS</button>
            <button onclick="closeCrew()" style="width:100%; margin-top:10px; padding:12px; background:#f4f6f8; border-radius:15px; font-weight:800; border:none; width:100%;">CANCELAR</button>
        </div>
    </div>

    <nav class="nav-bottom" id="main-nav">
        <button class="nav-btn" id="n-units" onclick="go('page-units')"><i class="ph-bold ph-plus-circle"></i>NUEVA</button>
        <button class="nav-btn active" id="n-dash" onclick="go('page-dash')"><i class="ph-bold ph-clock-counter-clockwise"></i>HISTORIAL</button>
        <button class="nav-btn" id="n-data" onclick="go('page-data')"><i class="ph-bold ph-chart-bar"></i>DATA</button>
    </nav>

    <script>
        const CLOUD_URL = "https://script.google.com/macros/s/AKfycbzkIqN5__aLRTfyeJSWAAB-pUmt54kGsv4Ex2KWz_dgAvrCT_Gty05uZelf6gbcL4p7/exec";
        let db = JSON.parse(localStorage.getItem('twins_v63_db')) || [];
        let cur = { items: [] };
        let userAuth = JSON.parse(localStorage.getItem('twins_auth')) || null;
        let qid = null;

        const FLOTA = { "CEP-929": "ROMARIO", "BPN-711": "CESAR C.", "BVN-704": "LUIS H.", "BUL-742": "WALDIR", "BVN-930": "MARCELO" };
        const CONDUCTORES = ["TAJHO", "ROMARIO", "CESAR C.", "LUIS H.", "WALDIR", "MARCELO"];
        const AUXILIARES = ["POR ASIGNAR", "CRISTOPHER", "PERCY", "PLACIDO", "RODOLFO", "RICARDO", "ELIO", "JOFER", "MARTIN", "NELSON"];

        window.onload = () => {
            const ug = document.getElementById('units-grid');
            for(let p in FLOTA) ug.innerHTML += `<div style="background:#fff; padding:20px; border-radius:20px; text-align:center; border:1px solid var(--border);" onclick="initConf('${p}')"><b>${p}</b></div>`;
            
            const sc = document.getElementById('c-chofer'), sa = document.getElementById('c-aux');
            const qec = document.getElementById('qe-chofer'), qea = document.getElementById('qe-aux');
            CONDUCTORES.forEach(c => { sc.innerHTML += `<option value="${c}">${c}</option>`; qec.innerHTML += `<option value="${c}">${c}</option>`; });
            AUXILIARES.forEach(a => { sa.innerHTML += `<option value="${a}">${a}</option>`; qea.innerHTML += `<option value="${a}">${a}</option>`; });
            
            if(userAuth) applyAuth();
            renderStats(); renderHistory();
            setInterval(pullCloudData, 10000); // Actualización veloz en segundo plano
        };

        function checkUserType() { document.getElementById('pass-field').style.display = (document.getElementById('user-select').value === 'TAJHO') ? 'block' : 'none'; }
        function login() { 
            const u = document.getElementById('user-select').value; 
            const p = document.getElementById('pass-field').value; 
            if(!u) return; 
            if(u === 'TAJHO' && p !== '1994') return alert("Error");
            userAuth = { name: u, admin: (u === 'TAJHO') };
            localStorage.setItem('twins_auth', JSON.stringify(userAuth));
            applyAuth();
        }
        function logout() { localStorage.removeItem('twins_auth'); location.reload(); }
        function applyAuth() { document.getElementById('login-screen').style.display = 'none'; document.getElementById('main-nav').style.display = 'flex'; pullCloudData(); }

        async function pullCloudData() {
            try {
                const res = await fetch(CLOUD_URL);
                const cloud = await res.json();
                if(cloud && Array.isArray(cloud)) { db = cloud; localStorage.setItem('twins_v63_db', JSON.stringify(db)); renderHistory(); renderStats(); }
            } catch(e){}
        }

        function go(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(n => n.classList.remove('active'));
            if(document.getElementById('n-'+id.split('-')[1])) document.getElementById('n-'+id.split('-')[1]).classList.add('active');
        }

        function initConf(p) { 
            const hoy = new Date().toLocaleDateString('en-CA'); 
            cur = { id: 'R'+Date.now(), placa: p, items: [], fecha: hoy, chofer: FLOTA[p], auxiliar: "POR ASIGNAR" }; 
            document.getElementById('conf-placa').innerText = p; document.getElementById('c-fecha').value = hoy; go('page-config'); 
        }

        function goLoad() { 
            cur.fecha = document.getElementById('c-fecha').value; cur.chofer = document.getElementById('c-chofer').value; 
            cur.auxiliar = document.getElementById('c-aux').value; document.getElementById('load-placa-txt').innerText = cur.placa; refreshLoad(); go('page-load'); 
        }

        function addItem() { 
            const cli = document.getElementById('i-cli').value.toUpperCase(); const can = parseInt(document.getElementById('i-can').value); 
            if(cli && can) { cur.items.push({cli, can}); refreshLoad(); document.getElementById('i-cli').value=""; document.getElementById('i-can').value=""; } 
        }

        function refreshLoad() { 
            document.getElementById('btn-save').style.display = cur.items.length > 0 ? 'block' : 'none';
            document.getElementById('load-list').innerHTML = cur.items.map((it, i) => `
                <div style="display:flex; justify-content:space-between; padding:12px; background:#fff; border-radius:12px; margin-bottom:8px; border:1px solid #eee;">
                    <span>${it.cli}</span><b>${it.can}</b>
                </div>`).reverse().join(''); 
        }

        function save() { 
            const idx = db.findIndex(r => r.id === cur.id);
            if(idx > -1) db[idx] = JSON.parse(JSON.stringify(cur)); else db.unshift(JSON.parse(JSON.stringify(cur)));
            localStorage.setItem('twins_v63_db', JSON.stringify(db));
            fetch(CLOUD_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(cur) });
            cur = { items: [] }; go('page-dash'); renderHistory(); renderStats();
        }

        function renderHistory() {
            const q = document.getElementById('smart-search').value.toLowerCase();
            document.getElementById('hist-cont').innerHTML = db.filter(r => 
                r.chofer.toLowerCase().includes(q) || r.placa.toLowerCase().includes(q) || r.fecha.includes(q)
            ).map(r => `
                <div class="route-card">
                    <div style="display:flex; justify-content:space-between; font-size:10px; font-weight:800; color:var(--text-dim);">
                        <span>📅 ${r.fecha.split('T')[0]}</span><span>${r.placa}</span>
                    </div>
                    <div style="display:flex; justify-content:space-between; align-items:center; margin:8px 0;">
                        <b style="font-size:22px;">${r.items.reduce((a,b)=>a+b.can,0)} CJS</b>
                        <span style="font-size:12px; font-weight:800;">${r.items.length} CLI</span>
                    </div>
                    <div class="card-crew"><span>👤 ${r.chofer}</span><span>👥 ${r.auxiliar}</span></div>
                    <div class="card-actions">
                        <button onclick="viewL('${r.id}')" class="btn-card"><i class="ph-bold ph-list"></i>Ver</button>
                        <button onclick="openCrew('${r.id}')" class="btn-card"><i class="ph-bold ph-users"></i>Equipo</button>
                        <button onclick="editR('${r.id}')" class="btn-card"><i class="ph-bold ph-pencil"></i>Editar</button>
                        <button onclick="shareW('${r.id}')" class="btn-card rep"><i class="ph-bold ph-whatsapp-logo"></i>WhatsApp</button>
                    </div>
                </div>`).join('');
        }

        function openCrew(id) { qid = id; const r = db.find(x => x.id === id); document.getElementById('qe-chofer').value = r.chofer; document.getElementById('qe-aux').value = r.auxiliar; document.getElementById('modal-crew').style.display = 'flex'; }
        
        function saveQuickCrew() { 
            const idx = db.findIndex(x => x.id === qid); 
            if(idx > -1) { 
                db[idx].chofer = document.getElementById('qe-chofer').value; 
                db[idx].auxiliar = document.getElementById('qe-aux').value; 
                localStorage.setItem('twins_v63_db', JSON.stringify(db)); 
                fetch(CLOUD_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(db[idx]) });
                closeCrew(); renderHistory(); 
            } 
        }

        function closeCrew() { document.getElementById('modal-crew').style.display = 'none'; }
        function viewL(id) { const r = db.find(x => x.id === id); alert(r.items.map(i => i.cli + ": " + i.can).join('\n')); }
        function editR(id) { const r = db.find(x => x.id === id); cur = JSON.parse(JSON.stringify(r)); document.getElementById('load-placa-txt').innerText = cur.placa; refreshLoad(); go('page-load'); }
        
        function shareW(id) { 
            const r = db.find(x => x.id === id); 
            let msg = `*TWINS ELITE*%0A📅 *FECHA:* ${r.fecha.split('T')[0]}%0A🚛 *UNIDAD:* ${r.placa}%0A👤 *CHOFER:* ${r.chofer}%0A🤝 *AUX:* ${r.auxiliar}%0A%0A*TOTAL:* ${r.items.reduce((a,b)=>a+b.can,0)} Cjs`; 
            window.location.href = "https://api.whatsapp.com/send?text=" + msg; 
        }

        function renderStats() {
            const hoy = new Date().toLocaleDateString('en-CA');
            const rHoy = db.filter(r => r.fecha.includes(hoy));
            const sum = (a) => a.reduce((x,y) => x + y.items.reduce((z,w)=>z+w.can,0), 0);
            document.getElementById('stat-hoy-cajas').innerText = sum(rHoy);
            document.getElementById('stat-mes-cajas').innerText = sum(db.filter(r => r.fecha.startsWith(hoy.substring(0,7))));
        }
    </script>
</body>
</html>
