<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TWINS LOGISTICS ELITE V21.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root {
            --bg: #030712; --card: #111827; --accent: #22d3ee; 
            --text: #f3f4f6; --text-dim: #9ca3af;
            --success: #10b981; --danger: #f43f5e; --warning: #fbbf24;
            --border: rgba(255,255,255,0.05);
            --grad: linear-gradient(135deg, #22d3ee 0%, #3b82f6 100%);
        }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; outline: none; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; }
        
        .page { display: none; padding: 20px; padding-bottom: 120px; max-width: 500px; margin: 0 auto; animation: fadeIn 0.4s ease; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .top-header { position: sticky; top: 0; z-index: 100; background: rgba(3, 7, 18, 0.8); backdrop-filter: blur(15px); padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .user-pill { background: rgba(34, 211, 238, 0.1); border: 1px solid rgba(34, 211, 238, 0.2); padding: 6px 14px; border-radius: 50px; color: var(--accent); font-size: 12px; font-weight: 800; }

        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .stat-card { background: var(--card); border: 1px solid var(--border); padding: 15px; border-radius: 20px; }
        .stat-num { font-size: 18px; font-weight: 800; display: block; color: var(--accent); }
        .stat-label { font-size: 9px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; display: block;}

        .card { background: var(--card); border-radius: 24px; border: 1px solid var(--border); padding: 20px; margin-bottom: 15px; }
        input, select { width: 100%; padding: 15px; margin: 8px 0; border-radius: 14px; border: 1px solid var(--border); background: #1f2937; color: #fff; font-size: 15px; }

        .btn { width: 100%; padding: 18px; border-radius: 18px; border: none; font-size: 14px; font-weight: 800; cursor: pointer; transition: 0.3s; display: flex; justify-content: center; align-items: center; gap: 10px; }
        .btn-main { background: var(--grad); color: white; }
        .btn-mini { padding: 10px; border-radius: 12px; font-size: 10px; flex: 1; border: 1px solid var(--border); background: rgba(255,255,255,0.03); color: white; font-weight: 700; cursor: pointer; }

        .bottom-nav { position: fixed; bottom: 20px; left: 20px; right: 20px; height: 75px; background: rgba(17, 24, 39, 0.95); backdrop-filter: blur(20px); border-radius: 24px; border: 1px solid var(--border); display: flex; justify-content: space-around; align-items: center; z-index: 1000; }
        .nav-item { background: none; border: none; color: var(--text-dim); font-size: 10px; font-weight: 700; display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1; }
        .nav-item i { font-size: 24px; }
        .nav-item.active-nav { color: var(--accent); transform: translateY(-3px); transition: 0.2s; }

        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); z-index: 2000; justify-content: center; align-items: center; padding: 20px; }
        .modal-content { background: var(--card); border-radius: 30px; padding: 25px; width: 100%; max-width: 360px; border: 1px solid var(--border); }
        .list-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
    </style>
</head>
<body>

    <div id="modal-list" class="modal-overlay" onclick="this.style.display='none'">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h3 style="margin:0">Detalle de Carga</h3>
            <p id="list-sub" style="color:var(--text-dim); font-size:11px; margin-bottom:20px;"></p>
            <div id="list-container" style="max-height: 300px; overflow-y: auto; margin-bottom:20px;"></div>
            <button class="btn btn-main" onclick="document.getElementById('modal-list').style.display='none'">CERRAR</button>
        </div>
    </div>

    <div id="modal-ask" class="modal-overlay" onclick="this.style.display='none'">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h3>Asignar Fecha de Salida</h3>
            <p style="color:var(--text-dim); font-size:14px; margin-bottom:20px;">¿Cuándo se despachará esta mercadería?</p>
            <button class="btn btn-main" style="margin-bottom:12px" onclick="confirmarGuardado('HOY')">📦 DESPACHAR HOY</button>
            <button class="btn" style="background:var(--success); color:black" onclick="confirmarGuardado('MAÑANA')">📅 DESPACHAR MAÑANA</button>
        </div>
    </div>

    <div id="header-app" class="top-header" style="display:none">
        <div class="user-pill"><span id="user-display">---</span></div>
        <div style="font-weight:900; font-size:14px;">TWINS <span style="color:var(--accent)">ELITE</span></div>
        <button onclick="cerrarSesion()" style="background:none; border:none; color:var(--danger);"><i class="ph ph-power" style="font-size:22px;"></i></button>
    </div>

    <div id="p1" class="page active" style="text-align:center; padding-top:10vh">
        <h1 style="font-size:32px; font-weight:900; margin-bottom:40px;">TWINS <span style="color:var(--accent)">ELITE</span></h1>
        <div style="display:grid; gap:12px;">
            <button class="btn" style="background:var(--card); border:1px solid var(--border);" onclick="login('TAJHO ADMIN')">💎 TAJHO ADMIN</button>
            <button class="btn" style="background:var(--card); border:1px solid var(--border);" onclick="login('FRANCESCO')">FRANCESCO</button>
            <button class="btn" style="background:var(--card); border:1px solid var(--border);" onclick="login('OSCAR')">OSCAR</button>
            <button class="btn" style="background:var(--card); border:1px solid var(--border);" onclick="login('LUIS HERBER')">LUIS HERBER</button>
        </div>
    </div>

    <div id="p2" class="page">
        <div class="stat-card" style="background:var(--grad); border:none; margin-bottom:20px; text-align:center;">
            <span class="stat-label" style="color:white;">Carga Lista</span>
            <span id="total-vivo" style="font-size:45px; font-weight:900; color:white;">0</span>
        </div>
        <div class="card">
            <div style="display:flex; gap:10px">
                <input type="text" id="cli" placeholder="Destino / Cliente">
                <input type="number" id="can" placeholder="Cajas" style="width:100px">
            </div>
            <button class="btn btn-main" onclick="addItem()">AÑADIR A RUTA</button>
        </div>
        <div id="area-envio" style="display:none">
            <div id="lista-items" class="card"></div>
            <div class="card">
                <select id="pla"><option value="">Camión</option><option value="CEP-929">CEP-929</option><option value="BPN-711">BPN-711</option><option value="BVN-704">BVN-704</option><option value="BUL-742">BUL-742</option><option value="BVN-930">BVN-930</option></select>
                <select id="cho"><option value="">Chofer</option><option value="LUIS H.">Luis H.</option><option value="ROMARIO">Romario</option><option value="CESAR C.">Cesar C.</option><option value="WALDIR">Waldir</option><option value="MARCELO">Marcelo</option></select>
                <select id="aux"><option value="">Auxiliar</option><option value="CRISTOPHER">Cristopher</option><option value="PLACIDO">Placido</option><option value="RODOLFO">Rodolfo</option></select>
                <button class="btn btn-main" style="background:var(--success); color:black;" onclick="abrirModalGuardar()">CONFIRMAR ENVÍO</button>
            </div>
        </div>
    </div>

    <div id="p3" class="page">
        <div class="stat-grid">
            <div class="stat-card">
                <span class="stat-label">REPORTE MENSUAL</span>
                <div style="display:flex; gap:15px;">
                    <div><small style="font-size:8px;">ENVÍOS</small><span id="stat-mes-env" class="stat-num">0</span></div>
                    <div><small style="font-size:8px;">CAJAS</small><span id="stat-mes-caj" class="stat-num">0</span></div>
                </div>
            </div>
            <div class="stat-card">
                <span class="stat-label">REPORTE DEL DÍA</span>
                <div style="display:flex; gap:15px;">
                    <div><small style="font-size:8px;">ENVÍOS</small><span id="stat-dia-env" class="stat-num" style="color:var(--success)">0</span></div>
                    <div><small style="font-size:8px;">CAJAS</small><span id="stat-dia-caj" class="stat-num" style="color:var(--success)">0</span></div>
                </div>
            </div>
        </div>
        <input type="date" id="f-dia" onchange="renderH()" style="margin-bottom:20px;">
        <div id="h-list"></div>
    </div>

    <div id="p4" class="page">
        <h3 style="font-weight:800;">Estado de Flota</h3>
        <div id="lista-flota"></div>
    </div>

    <nav id="nav-app" class="bottom-nav" style="display:none">
        <button class="nav-item" id="nav-p2" onclick="nav('p2')"><i class="ph ph-package"></i>Ruta</button>
        <button class="nav-item" id="nav-p3" onclick="nav('p3')"><i class="ph ph-clock-counter-clockwise"></i>Historial</button>
        <button class="nav-item" id="nav-p4" onclick="nav('p4')"><i class="ph ph-truck"></i>Flota</button>
    </nav>

    <script>
        const URL = "https://script.google.com/macros/s/AKfycbz9V0MzUuuAHTa9N4-xrsVJV7DbkWLtgJY5xHM7_JTfIDlBxCtimM6FHjRpVczuD2kM/exec";
        let user = "", ruta = [], db = [];
        const soats = { "CEP-929": "15/05/26", "BPN-711": "22/08/26", "BVN-704": "10/01/27", "BUL-742": "05/11/26", "BVN-930": "30/09/26" };

        window.onload = () => {
            const u = localStorage.getItem('tw_u');
            if(u) login(u);
            const hoy = new Date().toLocaleDateString('en-CA'); // Formato YYYY-MM-DD local
            document.getElementById('f-dia').value = hoy;
            load();
            setInterval(load, 20000); // Actualiza db cada 20 seg
        };

        function login(n) { 
            user = n; localStorage.setItem('tw_u', n);
            document.getElementById('p1').style.display='none'; 
            document.getElementById('header-app').style.display='flex'; 
            document.getElementById('nav-app').style.display='flex'; 
            document.getElementById('user-display').innerText = n; 
            nav('p2'); 
        }

        function nav(id) { 
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); 
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active-nav'));
            document.getElementById(id).classList.add('active'); 
            document.getElementById('nav-' + id).classList.add('active-nav');
            if(id === 'p3') renderH();
            if(id === 'p4') renderFlota();
        }

        async function load() { 
            try { const r = await fetch(URL); db = await r.json(); renderH(); renderFlota(); } catch(e){} 
        }

        function addItem() {
            const cl = document.getElementById('cli').value.toUpperCase(), ca = parseInt(document.getElementById('can').value);
            if(!cl || !ca) return; ruta.unshift({cl, ca}); 
            document.getElementById('cli').value = ""; document.getElementById('can').value = ""; 
            renderR(); 
        }

        function renderR() {
            const l = document.getElementById('lista-items'); let s = 0; l.innerHTML = "";
            ruta.forEach((i, x) => { s += i.ca; l.innerHTML += `<div class="list-row"><span>${i.cl}</span><b>${i.ca} CJ <span onclick="removeItem(${x})" style="color:var(--danger); cursor:pointer">✕</span></b></div>`; });
            document.getElementById('total-vivo').innerText = s; 
            document.getElementById('area-envio').style.display = ruta.length > 0 ? 'block' : 'none';
        }

        function removeItem(x) { ruta.splice(x,1); renderR(); }

        function abrirModalGuardar() { 
            if(!document.getElementById('pla').value || !document.getElementById('cho').value) return alert("Falta Placa o Chofer");
            document.getElementById('modal-ask').style.display = 'flex'; 
        }

        async function confirmarGuardado(opcion) {
            document.getElementById('modal-ask').style.display = 'none';
            
            // CÁLCULO DE FECHA EXPLÍCITO (Evita que el Excel ponga 'Hoy')
            let d = new Date();
            if(opcion === 'MAÑANA') {
                d.setDate(d.getDate() + 1);
                if(d.getDay() === 0) d.setDate(d.getDate() + 1); // Salta domingo
            }
            // Formato YYYY-MM-DD estricto
            let fechaFinalString = d.toLocaleDateString('en-CA'); 

            const registro = { 
                fecha: fechaFinalString, 
                chofer: document.getElementById('cho').value, 
                auxiliar: document.getElementById('aux').value, 
                placa: document.getElementById('pla').value, 
                operario: user, 
                items: ruta.map(i => `${i.cl}:${i.ca}`).join(", "), 
                total: ruta.reduce((a,b) => a+b.ca, 0)
            };

            // 1. Guardar localmente para respuesta inmediata
            db.push(registro);
            
            // 2. IMPORTANTE: Cambiar la vista del calendario a la fecha guardada para que NO se borre
            document.getElementById('f-dia').value = fechaFinalString;
            
            nav('p3'); 
            renderH();

            // 3. Envío al Excel
            await fetch(URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(registro) });
            
            // Limpieza
            ruta = []; renderR();
            document.getElementById('pla').value = "";
            document.getElementById('cho').value = "";
            document.getElementById('aux').value = "";
        }

        function renderH() {
            const list = document.getElementById('h-list'), fD = document.getElementById('f-dia').value;
            let cMes = 0, eMes = 0, cDia = 0, eDia = 0, html = "";
            const mesActual = new Date().getMonth();

            // Recorremos la base de datos
            db.slice().reverse().forEach(r => {
                let rF = r.fecha.split("T")[0]; // Limpia formato ISO si viene del server
                let rDate = new Date(r.fecha + "T00:00:00"); // Asegura lectura local

                // Conteo mensual
                if(rDate.getMonth() === mesActual) { cMes += parseFloat(r.total); eMes++; }

                // Filtro por fecha seleccionada en el input
                if(fD === rF) {
                    cDia += parseFloat(r.total); eDia++;
                    html += `<div class="card">
                        <div style="display:flex; justify-content:space-between">
                            <span style="background:var(--accent); color:black; padding:2px 8px; border-radius:6px; font-size:10px; font-weight:800">${r.placa}</span>
                            <b style="color:var(--accent)">${r.total} CJ</b>
                        </div>
                        <div style="font-weight:700; margin-top:8px">${r.chofer} <small style="color:var(--text-dim)">/ ${r.auxiliar || 'Sin Aux'}</small></div>
                        <div style="display:flex; gap:8px; margin-top:12px">
                            <button class="btn-mini" onclick="verLista('${r.items}', '${r.chofer}')">📋 VER LISTA</button>
                            <button class="btn-mini" onclick="editarRuta('${r.items}', '${r.chofer}', '${r.placa}', '${r.auxiliar}')">✏️ EDITAR</button>
                            <button class="btn-mini" onclick="sendWA('${r.fecha}', '${r.chofer}', '${r.total}', '${r.items}')">WA</button>
                        </div>
                    </div>`;
                }
            });

            list.innerHTML = html || `<p style='text-align:center; color:gray; padding:20px;'>No hay rutas para el ${fD}</p>`;
            document.getElementById('stat-mes-env').innerText = eMes;
            document.getElementById('stat-mes-caj').innerText = Math.round(cMes);
            document.getElementById('stat-dia-env').innerText = eDia;
            document.getElementById('stat-dia-caj').innerText = Math.round(cDia);
        }

        function verLista(items, chofer) {
            document.getElementById('list-sub').innerText = "Responsable: " + chofer;
            const container = document.getElementById('list-container');
            container.innerHTML = "";
            items.split(", ").forEach(i => {
                const [cl, ca] = i.split(":");
                container.innerHTML += `<div class="list-row"><span>${cl}</span><b>${ca} CJ</b></div>`;
            });
            document.getElementById('modal-list').style.display = 'flex';
        }

        function editarRuta(items, cho, pla, aux) {
            if(!confirm("¿Editar esta ruta? Se cargará en la pantalla principal.")) return;
            ruta = items.split(", ").map(i => { const [cl, ca] = i.split(":"); return {cl, ca: parseInt(ca)}; });
            document.getElementById('cho').value = cho; document.getElementById('pla').value = pla; document.getElementById('aux').value = aux;
            renderR(); nav('p2');
        }

        function sendWA(f, c, t, i) {
            let m = `*TWINS ELITE*\n*Fecha:* ${f.split('T')[0]}\n*Chofer:* ${c}\n*Total:* ${t} CJ\n\n*LISTA:*\n${i.replace(/:/g, ': ').replace(/,/g, '\n')}`;
            window.location.href = `https://wa.me/?text=${encodeURIComponent(m)}`;
        }

        function renderFlota() {
            const list = document.getElementById('lista-flota'), fD = document.getElementById('f-dia').value;
            const placas = ["CEP-929", "BPN-711", "BVN-704", "BUL-742", "BVN-930"];
            list.innerHTML = "";
            placas.forEach(p => {
                let rH = db.find(r => r.placa === p && r.fecha.split('T')[0] === fD);
                list.innerHTML += `<div class="card" style="border-left:5px solid ${rH ? 'var(--danger)':'var(--success)'}">
                    <div style="display:flex; justify-content:space-between"><b>${p}</b><small>SOAT: ${soats[p]}</small></div>
                    <div style="font-size:12px; margin-top:5px">${rH ? 'OCUPADO: ' + rH.chofer : 'DISPONIBLE'}</div>
                </div>`;
            });
        }

        function cerrarSesion() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
