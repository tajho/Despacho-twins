<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TWINS DESPACHOS PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root {
            --bg: #0f172a; /* Slate 900 - Más suave que el negro */
            --surface: #1e293b; /* Slate 800 */
            --accent: #3b82f6; /* Azul brillante */
            --accent-soft: rgba(59, 130, 246, 0.1);
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --border: #334155;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
        }

        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; outline: none; transition: all 0.2s ease; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; line-height: 1.5; }
        
        .page { display: none; padding: 15px 15px 110px 15px; max-width: 500px; margin: 0 auto; }
        .active { display: block !important; animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Header Premium */
        .top-header { position: sticky; top: 0; z-index: 1000; background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); padding: 18px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .logo { font-weight: 800; font-size: 18px; letter-spacing: -0.5px; }
        .logo span { color: var(--accent); }

        /* Dashboard de Conteo Inteligente */
        .dash-container { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .dash-card { background: var(--surface); border: 1px solid var(--border); border-radius: 24px; padding: 16px; position: relative; overflow: hidden; }
        .dash-card::after { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: var(--accent); }
        .dash-card.monthly::after { background: var(--warning); }
        .dash-label { font-size: 10px; font-weight: 700; text-transform: uppercase; color: var(--text-dim); margin-bottom: 8px; display: block; }
        .dash-row { display: flex; align-items: baseline; gap: 5px; margin-bottom: 4px; }
        .dash-num { font-size: 24px; font-weight: 800; }
        .dash-sub { font-size: 11px; font-weight: 600; opacity: 0.7; }

        /* Estilo de Tarjetas */
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 24px; padding: 18px; margin-bottom: 16px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        
        /* Inputs y Selects Modernos */
        input, select { background: #0f172a; border: 1.5px solid var(--border); padding: 14px 18px; border-radius: 16px; color: white; font-size: 15px; width: 100%; margin-bottom: 12px; }
        input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }

        /* Botones */
        .btn { border: none; border-radius: 16px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 14px; }
        .btn-add { background: var(--accent); color: white; padding: 14px; width: 100%; box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3); }
        .btn-save { background: var(--success); color: white; padding: 18px; width: 100%; font-size: 16px; }
        
        /* Navegación Premium */
        .nav-bar { position: fixed; bottom: 20px; left: 20px; right: 20px; background: rgba(30, 41, 59, 0.9); backdrop-filter: blur(15px); height: 75px; border-radius: 28px; display: flex; border: 1px solid rgba(255,255,255,0.1); z-index: 2000; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-dim); background: none; border: none; font-size: 10px; font-weight: 700; position: relative; }
        .nav-item i { font-size: 24px; margin-bottom: 4px; transition: transform 0.3s ease; }
        .nav-item.active { color: var(--accent); }
        .nav-item.active i { transform: translateY(-5px); color: var(--accent); }
        .nav-ind { position: absolute; top: -1px; width: 30px; height: 4px; background: var(--accent); border-radius: 0 0 4px 4px; box-shadow: 0 2px 10px var(--accent); transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        /* Historial y Detalles */
        .history-card { border-left: 0; padding: 18px; position: relative; }
        .history-detail { display: none; background: rgba(15, 23, 42, 0.5); border-radius: 16px; padding: 12px; margin-top: 15px; border: 1px solid var(--border); font-size: 13px; }
        .badge { padding: 4px 10px; border-radius: 8px; font-size: 10px; font-weight: 800; background: var(--accent-soft); color: var(--accent); }
    </style>
</head>
<body>

    <header id="app-header" class="top-header" style="display:none">
        <div class="logo">TWINS <span>DESPACHOS</span></div>
        <div id="user-info" onclick="logout()" style="font-size:11px; font-weight:800; background:var(--surface); border:1px solid var(--border); padding:8px 15px; border-radius:14px;">---</div>
    </header>

    <div id="page-login" class="page active">
        <div style="text-align:center; padding:60px 0">
            <div style="background:var(--accent-soft); width:100px; height:100px; border-radius:30px; display:flex; align-items:center; justify-content:center; margin:0 auto">
                <i class="ph-fill ph-truck" style="font-size:50px; color:var(--accent)"></i>
            </div>
            <h2 style="margin-top:25px; letter-spacing:-1px">Logistics Hub</h2>
            <p style="color:var(--text-dim); font-size:14px">Selecciona tu perfil de acceso</p>
        </div>
        <div id="login-options" style="display:grid; gap:12px"></div>
    </div>

    <div id="page-route" class="page">
        <div class="dash-container">
            <div class="dash-card">
                <span class="dash-label">Carga en Hoja</span>
                <div class="dash-row"><span id="count-cajas" class="dash-num">0</span><span class="dash-sub">CJ</span></div>
            </div>
            <div class="dash-card">
                <span class="dash-label">Puntos de Entrega</span>
                <div class="dash-row"><span id="count-puntos" class="dash-num">0</span><span class="dash-sub">PTS</span></div>
                <button onclick="clearAll()" style="background:none; border:none; color:var(--danger); font-size:10px; font-weight:800; padding:0; cursor:pointer">LIMPIAR TODO</button>
            </div>
        </div>

        <div class="card">
            <input type="text" id="inp-cli" placeholder="Nombre del Cliente">
            <div style="display:flex; gap:12px">
                <input type="number" id="inp-can" placeholder="Cant. Cajas" style="flex:0.6">
                <button class="btn btn-add" onclick="addPoint()"><i class="ph-bold ph-plus"></i>AÑADIR</button>
            </div>
        </div>

        <div id="list-container" style="display:none">
            <div id="live-list" style="margin-bottom:15px"></div>
            <div class="card">
                <select id="sel-pla" onchange="predictAndSave()"></select>
                <div style="display:flex; gap:10px">
                    <select id="sel-cho" onchange="persist()"></select>
                    <select id="sel-aux" onchange="persist()"></select>
                </div>
                <button class="btn btn-save" onclick="openConfirm()">DESPACHAR UNIDAD</button>
            </div>
        </div>
    </div>

    <div id="page-history" class="page">
        <div class="dash-container">
            <div class="dash-card">
                <span class="dash-label">Resumen Diario</span>
                <div class="dash-row"><span id="st-day" class="dash-num">0</span><span class="dash-sub">CJ</span></div>
                <div class="dash-sub"><span id="st-day-env">0</span> Envíos</div>
            </div>
            <div class="dash-card monthly">
                <span class="dash-label">Resumen Mensual</span>
                <div class="dash-row"><span id="st-month" class="dash-num">0</span><span class="dash-sub">CJ</span></div>
                <div class="dash-sub"><span id="st-month-env">0</span> Envíos totales</div>
            </div>
        </div>

        <div style="display:flex; gap:10px; margin-bottom:15px">
            <input type="date" id="filter-date" onchange="renderHistory()" style="margin:0">
        </div>
        
        <div id="history-feed"></div>
    </div>

    <div id="page-fleet" class="page">
        <h3 style="margin-bottom:15px; font-weight:800">Estado de Unidades</h3>
        <div id="fleet-grid"></div>
    </div>

    <div id="page-stats" class="page">
        <div class="card">
            <span class="dash-label">Rendimiento por Chofer (CJ)</span>
            <div style="height:250px; margin-top:15px"><canvas id="c-cho"></canvas></div>
        </div>
        <button class="btn" style="background:var(--danger); color:white; width:100%; padding:18px" onclick="generatePDF()">
            <i class="ph-bold ph-file-pdf"></i>EXPORTAR REPORTE MENSUAL
        </button>
    </div>

    <nav id="app-nav" class="nav-bar" style="display:none">
        <div id="nav-ind" class="nav-ind"></div>
        <button class="nav-item active" id="n-route" onclick="go('page-route', 0)"><i class="ph ph-stack"></i>HOJA</button>
        <button class="nav-item" id="n-history" onclick="go('page-history', 1)"><i class="ph ph-chart-line-up"></i>DATA</button>
        <button class="nav-item" id="n-fleet" onclick="go('page-fleet', 2)"><i class="ph ph-truck"></i>FLOTA</button>
        <button class="nav-item" id="n-stats" style="display:none" onclick="go('page-stats', 3)"><i class="ph ph-presentation-chart"></i>STATS</button>
    </nav>

    <div id="modal-confirm" style="display:none; position:fixed; inset:0; background:rgba(15, 23, 42, 0.95); z-index:3000; align-items:center; justify-content:center; padding:25px; backdrop-filter:blur(8px)">
        <div class="card" style="width:100%; max-width:400px; text-align:center; border:1.5px solid var(--accent)">
            <i class="ph ph-clock-countdown" style="font-size:40px; color:var(--accent)"></i>
            <h2 style="margin:15px 0 5px 0">Programar Salida</h2>
            <p style="color:var(--text-dim); margin-bottom:25px; font-size:14px">¿Cuándo iniciará ruta esta unidad?</p>
            <button class="btn btn-save" onclick="finalize('HOY')">SALIENDO AHORA</button>
            <button class="btn" style="background:var(--surface); border:1px solid var(--border); color:white; width:100%; padding:16px; margin-bottom:15px" onclick="finalize('MAÑANA')">PROGRAMAR MAÑANA</button>
            <button onclick="closeConfirm()" style="background:none; border:none; color:var(--text-dim); font-weight:700">Regresar</button>
        </div>
    </div>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbxCRMbdOGYjf0R-w1v9tHG76jDhHXxuXOwHahYEV7Gj1lFn3y42C2s9DUO5nkgO75qy/exec";
        let activeUser = "", currentCarga = [], db = [];
        let chartInstances = {};

        const DATA = {
            placas: ["CEP-929", "BPN-711", "BVN-704", "BUL-742", "BVN-930"],
            choferes: ["TAJHO", "LUIS H.", "ROMARIO", "CESAR C.", "WALDIR", "MARCELO"],
            auxiliares: ["Cristopher", "Plácido", "Martin", "Percy", "Rodolfo", "Ricardo", "Elio", "Daniel C.", "Jofer", "Nelson", "Julio"],
            soats: { "CEP-929": "2026-07-22", "BPN-711": "2026-06-10", "BVN-704": "2026-07-02", "BUL-742": "2026-04-02", "BVN-930": "2026-07-02" }
        };

        window.onload = () => {
            setupUI();
            const savedUser = localStorage.getItem('tw_logged');
            if(savedUser) login(savedUser);
            if(localStorage.getItem('tw_temp_carga')) {
                currentCarga = JSON.parse(localStorage.getItem('tw_temp_carga'));
                refreshCargaUI();
                document.getElementById('sel-pla').value = localStorage.getItem('tw_temp_pla') || "";
                document.getElementById('sel-cho').value = localStorage.getItem('tw_temp_cho') || "";
                document.getElementById('sel-aux').value = localStorage.getItem('tw_temp_aux') || "";
            }
            syncData();
        };

        function setupUI() {
            const grid = document.getElementById('login-options');
            ['TAJHO ADMIN', 'FRANCESCO', 'OSCAR', 'LUIS HERBER'].forEach(u => grid.innerHTML += `<button class="btn" style="background:var(--surface); border:1px solid var(--border); color:white; padding:18px; font-size:15px" onclick="login('${u}')">${u}</button>`);
            document.getElementById('sel-pla').innerHTML = '<option value="">Unidad</option>' + DATA.placas.map(p => `<option value="${p}">${p}</option>`).join('');
            document.getElementById('sel-cho').innerHTML = '<option value="">Chofer</option>' + DATA.choferes.map(c => `<option value="${c}">${c}</option>`).join('');
            document.getElementById('sel-aux').innerHTML = '<option value="">Auxiliar</option>' + DATA.auxiliares.map(a => `<option value="${a}">${a}</option>`).join('');
            document.getElementById('filter-date').value = new Date().toLocaleDateString('en-CA');
        }

        async function syncData() {
            try {
                const res = await fetch(API);
                db = await res.json();
                localStorage.setItem('tw_db', JSON.stringify(db));
                renderHistory(); renderFleet();
            } catch(e) {
                db = JSON.parse(localStorage.getItem('tw_db') || "[]");
                renderHistory(); renderFleet();
            }
        }

        function addPoint() {
            const cli = document.getElementById('inp-cli').value.toUpperCase();
            const can = parseInt(document.getElementById('inp-can').value);
            if(!cli || !can) return;
            currentCarga.push({ cli, can });
            document.getElementById('inp-cli').value = ""; 
            document.getElementById('inp-can').value = "";
            persist(); refreshCargaUI();
        }

        function refreshCargaUI() {
            const container = document.getElementById('live-list');
            let total = 0; container.innerHTML = "";
            currentCarga.forEach((item, i) => {
                total += item.can;
                container.innerHTML += `<div class="card" style="padding:12px; margin-bottom:8px; display:flex; justify-content:space-between; align-items:center; background:var(--accent-soft); border-color:rgba(59,130,246,0.2)">
                    <span style="font-weight:600"><b>${item.can}</b> CJ - ${item.cli}</span>
                    <i class="ph-bold ph-x-circle" style="color:var(--danger); font-size:20px" onclick="removePoint(${i})"></i>
                </div>`;
            });
            document.getElementById('count-cajas').innerText = total;
            document.getElementById('count-puntos').innerText = currentCarga.length;
            document.getElementById('list-container').style.display = currentCarga.length > 0 ? 'block' : 'none';
        }

        function renderHistory() {
            const container = document.getElementById('history-feed');
            const selDate = document.getElementById('filter-date').value;
            let h = "", dTotal = 0, dEnv = 0, mTotal = 0, mEnv = 0;
            const now = new Date(selDate + "T12:00:00");

            db.forEach((r, i) => {
                const rD = new Date(r.fecha + "T12:00:00");
                const pts = r.puntos || r.items.split(',').length;
                
                // Conteo Mensual
                if(rD.getMonth() === now.getMonth() && rD.getFullYear() === now.getFullYear()) { 
                    mTotal += parseFloat(r.total); 
                    mEnv++; 
                }
                
                // Conteo Diario y Listado
                if(r.fecha === selDate) {
                    dTotal += parseFloat(r.total);
                    dEnv++;
                    h += `<div class="card history-card">
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px">
                            <span class="badge">${r.hora}</span>
                            <span style="font-weight:800; color:var(--accent)">${r.placa}</span>
                        </div>
                        <div style="font-size:18px; font-weight:800; margin-bottom:4px">${r.total} Cajas <span style="font-size:12px; font-weight:500; color:var(--text-dim)">en ${pts} puntos</span></div>
                        <div style="font-size:12px; font-weight:600; opacity:0.8; margin-bottom:15px">${r.chofer} • ${r.auxiliar}</div>
                        <div id="det-${i}" class="history-detail">${r.items.split(',').join('<br>')}</div>
                        <div style="display:grid; grid-template-columns: 2fr 1fr 1fr; gap:8px">
                            <button class="btn" style="background:var(--accent-soft); color:var(--accent); padding:10px" onclick="toggleDet(${i})">VER RUTA</button>
                            <button class="btn" style="background:var(--surface); border:1px solid var(--border); color:white" onclick="loadEdit(${i})"><i class="ph ph-pencil-simple"></i></button>
                            <button class="btn" style="background:#128c7e; color:white" onclick="shareWA('${r.placa}','${r.total}','${r.items}')"><i class="ph-fill ph-whatsapp-logo"></i></button>
                        </div>
                    </div>`;
                }
            });
            container.innerHTML = h || `<div style="text-align:center; padding:40px; color:var(--text-dim)">No hay despachos registrados para esta fecha</div>`;
            document.getElementById('st-day').innerText = dTotal;
            document.getElementById('st-day-env').innerText = dEnv;
            document.getElementById('st-month').innerText = mTotal;
            document.getElementById('st-month-env').innerText = mEnv;
        }

        function renderFleet() {
            document.getElementById('fleet-grid').innerHTML = DATA.placas.map(p => {
                const vence = new Date(DATA.soats[p]);
                const dias = Math.ceil((vence - new Date()) / 86400000);
                const color = dias < 15 ? 'var(--danger)' : (dias < 45 ? 'var(--warning)' : 'var(--success)');
                return `<div class="card" style="display:flex; justify-content:space-between; align-items:center">
                    <div><b style="font-size:16px">${p}</b><br><small style="color:var(--text-dim)">Vence: ${DATA.soats[p]}</small></div>
                    <div style="text-align:right"><div style="font-size:18px; font-weight:800; color:${color}">${dias}d</div><small style="font-size:9px; font-weight:700">RESTANTES</small></div>
                </div>`;
            }).join('');
        }

        function drawCharts() {
            const stats = {};
            db.forEach(r => {
                const now = new Date();
                const rD = new Date(r.fecha + "T12:00:00");
                if(rD.getMonth() === now.getMonth()) {
                    stats[r.chofer] = (stats[r.chofer] || 0) + parseFloat(r.total);
                }
            });
            if(chartInstances['c-cho']) chartInstances['c-cho'].destroy();
            chartInstances['c-cho'] = new Chart(document.getElementById('c-cho'), {
                type: 'bar',
                data: { labels: Object.keys(stats), datasets: [{ data: Object.values(stats), backgroundColor: '#3b82f6', borderRadius: 8, barPercentage: 0.6 }] },
                options: { 
                    indexAxis: 'y', 
                    maintainAspectRatio: false, 
                    plugins: { legend: false },
                    scales: { 
                        x: { grid: { display: false }, ticks: { color: '#94a3b8' } },
                        y: { grid: { display: false }, ticks: { color: '#f8fafc', font: { weight: 'bold' } } }
                    }
                }
            });
        }

        // --- Funciones de Lógica Core ---
        function login(u) { 
            activeUser = u; 
            localStorage.setItem('tw_logged', u); 
            document.getElementById('page-login').classList.remove('active'); 
            document.getElementById('app-header').style.display = 'flex'; 
            document.getElementById('app-nav').style.display = 'flex'; 
            document.getElementById('user-info').innerText = u; 
            if(u === "TAJHO ADMIN") document.getElementById('n-stats').style.display = "flex"; 
            go('page-route', 0); 
        }

        function go(id, idx) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            const items = Array.from(document.querySelectorAll('.nav-item')).filter(i => i.style.display !== 'none');
            const realIdx = items.findIndex(i => i.id === 'n-' + id.split('-')[1]);
            document.getElementById('nav-ind').style.left = `calc(${realIdx * (100/items.length)}% + (${100/items.length}% - 30px) / 2)`;
            if(id === 'page-history') renderHistory();
            if(id === 'page-stats') setTimeout(drawCharts, 200);
            if(id === 'page-fleet') renderFleet();
        }

        async function finalize(tipo) {
            let f = new Date(); if(tipo === 'MAÑANA') f.setDate(f.getDate() + 1);
            const r = {
                fecha: f.toLocaleDateString('en-CA'),
                hora: new Date().toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' }),
                placa: document.getElementById('sel-pla').value,
                chofer: document.getElementById('sel-cho').value,
                auxiliar: document.getElementById('sel-aux').value,
                items: currentCarga.map(i => `${i.cli}: ${i.can}`).join(", "),
                total: currentCarga.reduce((a,b) => a + (parseFloat(b.can)||0), 0),
                puntos: currentCarga.length,
                operario: activeUser
            };
            fetch(API, { method: 'POST', mode: 'no-cors', body: JSON.stringify(r) });
            db.unshift(r); 
            localStorage.setItem('tw_db', JSON.stringify(db));
            clearAll(); closeConfirm(); go('page-history', 1);
        }

        function loadEdit(i) {
            const r = db[i]; 
            currentCarga = r.items.split(", ").map(it => { const [cli, can] = it.split(": "); return { cli, can: parseInt(can) }; });
            document.getElementById('sel-pla').value = r.placa;
            document.getElementById('sel-cho').value = r.chofer;
            document.getElementById('sel-aux').value = r.auxiliar;
            refreshCargaUI(); go('page-route', 0);
        }

        function persist() { 
            localStorage.setItem('tw_temp_carga', JSON.stringify(currentCarga)); 
            localStorage.setItem('tw_temp_pla', document.getElementById('sel-pla').value);
            localStorage.setItem('tw_temp_cho', document.getElementById('sel-cho').value);
            localStorage.setItem('tw_temp_aux', document.getElementById('sel-aux').value);
        }

        function predictAndSave() { 
            const l = db.find(r => r.placa === document.getElementById('sel-pla').value); 
            if(l) { document.getElementById('sel-cho').value = l.chofer; document.getElementById('sel-aux').value = l.auxiliar; } 
            persist(); 
        }

        function toggleDet(i) { const d = document.getElementById(`det-${i}`); d.style.display = d.style.display === 'block' ? 'none' : 'block'; }
        function shareWA(p, t, i) { 
            const msg = `*📦 TWINS DESPACHOS*%0A*Placa:* ${p}%0A*Total:* ${t} Cajas%0A*Detalle:*%0A${i.split(", ").join("%0A")}`;
            window.open(`https://wa.me/?text=${msg}`, '_blank'); 
        }
        function generatePDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.setFontSize(18); doc.text("REPORTE MENSUAL DE DESPACHOS", 14, 20);
            doc.setFontSize(11); doc.text(`Generado por: ${activeUser} - ${new Date().toLocaleDateString()}`, 14, 28);
            doc.autoTable({ head: [['Fecha', 'Unidad', 'Chofer', 'Total CJ']], body: db.map(r => [r.fecha, r.placa, r.chofer, r.total]), startY: 35, theme: 'grid' });
            doc.save(`Reporte_Twins_${new Date().getMonth()+1}.pdf`);
        }
        function removePoint(i) { currentCarga.splice(i,1); persist(); refreshCargaUI(); }
        function clearAll() { if(confirm("¿Borrar toda la hoja actual?")) { currentCarga = []; localStorage.removeItem('tw_temp_carga'); refreshCargaUI(); } }
        function logout() { localStorage.clear(); location.reload(); }
        function openConfirm() { document.getElementById('modal-confirm').style.display = 'flex'; }
        function closeConfirm() { document.getElementById('modal-confirm').style.display = 'none'; }
    </script>
</body>
</html>
