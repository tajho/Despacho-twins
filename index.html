<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TWINS ELITE - OFICIAL V13</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root {
            --bg: #0b0f17; --surface: #161c28; --accent: #007aff; 
            --text: #ffffff; --text-dim: #94a3b8; --border: #2d3748; 
            --success: #34c759; --danger: #ff3b30;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; }
        
        .page { display: none; padding: 10px 15px 120px 15px; max-width: 500px; margin: 0 auto; }
        .active { display: block !important; }

        .top-header { position: sticky; top: 0; z-index: 1000; background: rgba(11, 15, 23, 0.9); backdrop-filter: blur(10px); padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }

        /* DATA COMPACTA - V13 */
        .summary-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .summary-box { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 12px; border-left: 4px solid var(--accent); }
        .box-green { border-left-color: var(--success); }
        
        .summary-box label { font-size: 9px; font-weight: 800; color: var(--text-dim); text-transform: uppercase; display: block; margin-bottom: 4px; }
        .data-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 2px; }
        .data-row b { font-size: 18px; color: #fff; }
        .data-row span { font-size: 10px; color: var(--text-dim); font-weight: 600; }

        /* NAV BAR */
        .nav-bar { position: fixed; bottom: 20px; left: 15px; right: 15px; background: rgba(22, 28, 40, 0.95); backdrop-filter: blur(20px); height: 70px; border-radius: 20px; display: flex; border: 1px solid var(--border); z-index: 2000; box-shadow: 0 8px 25px rgba(0,0,0,0.5); }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-dim); background: none; border: none; font-size: 9px; font-weight: 700; }
        .nav-item.active { color: var(--accent); }
        .nav-item i { font-size: 22px; margin-bottom: 3px; }

        /* RUTA (MANTENIDO) */
        .stat-banner { background: linear-gradient(135deg, #007aff, #0056b3); padding: 20px; border-radius: 20px; margin-bottom: 15px; }
        input, select { background: var(--surface); border: 1px solid var(--border); padding: 14px; border-radius: 12px; color: white; width: 100%; font-size: 15px; margin-bottom: 10px; }
        .btn-main { background: var(--success); color: white; width: 100%; padding: 16px; border-radius: 14px; border: none; font-weight: 800; }
        .route-item { background: var(--surface); padding: 12px; border-radius: 12px; margin-bottom: 6px; display: flex; justify-content: space-between; border: 1px solid var(--border); font-size: 14px; }
    </style>
</head>
<body>

    <header id="app-header" class="top-header" style="display:none">
        <div style="font-weight:900; font-size:16px;">TWINS <span style="color:var(--accent)">ELITE</span></div>
        <div id="user-info" style="font-size:10px; font-weight:800; background:rgba(255,255,255,0.05); padding:6px 10px; border-radius:8px;">---</div>
    </header>

    <div id="page-login" class="page active">
        <div style="text-align:center; padding:50px 0"><h3 style="font-weight:800;">Warehouse Login</h3></div>
        <div id="login-options"></div>
    </div>

    <div id="page-select-plate" class="page">
        <div style="text-align:center; padding:20px 0"><h3 style="font-weight:800;">Unidad de Carga</h3></div>
        <div id="plate-options" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;"></div>
    </div>

    <div id="page-route" class="page">
        <div class="stat-banner">
            <div style="display:flex; justify-content:space-between; align-items:center">
                <div><small style="font-weight:800; font-size:10px;">CAJAS</small><div id="count-cajas" style="font-size:36px; font-weight:800;">0</div></div>
                <div style="text-align:right"><b id="active-plate-label" style="font-size:16px;">---</b><small style="display:block; font-size:10px;">Ptos: <span id="count-puntos">0</span></small></div>
            </div>
        </div>
        <input type="text" id="inp-cli" placeholder="Cliente">
        <div style="display:flex; gap:10px">
            <input type="number" id="inp-can" placeholder="Cant." style="flex:1">
            <button onclick="addPoint()" style="background:var(--accent); border:none; border-radius:12px; color:white; width:60px; height:48px;"><i class="ph-bold ph-plus"></i></button>
        </div>
        <div id="live-list"></div>
        <div id="finalize-area" style="display:none; margin-top:15px; border-top:1px solid var(--border); padding-top:15px">
            <select id="sel-pla" onchange="predictAndSave()"></select>
            <div style="display:flex; gap:10px"><select id="sel-cho"></select><select id="sel-aux"></select></div>
            <button class="btn-main" onclick="openConfirm()">GUARDAR DESPACHO</button>
            <button onclick="clearAll()" style="width:100%; background:none; border:none; color:var(--danger); font-size:11px; margin-top:12px; font-weight:700">ANULAR CARGA</button>
        </div>
    </div>

    <div id="page-history" class="page">
        <h3 style="margin: 10px 0;">Resumen Data</h3>
        
        <div class="summary-container">
            <div class="summary-box">
                <label id="label-month">MES ACTUAL</label>
                <div class="data-row"><b id="h-cajas-mes">0</b><span>Cajas</span></div>
                <div class="data-row"><b id="h-envios-mes">0</b><span>Clientes</span></div>
            </div>
            <div class="summary-box box-green">
                <label>HOY</label>
                <div class="data-row"><b id="h-cajas-dia">0</b><span>Cajas</span></div>
                <div class="data-row"><b id="h-envios-dia">0</b><span>Clientes</span></div>
            </div>
        </div>

        <div style="border-top: 1px solid var(--border); padding-top: 15px;">
            <label style="font-size:10px; font-weight:800; color:var(--text-dim);">BUSCAR POR FECHA</label>
            <input type="date" id="filter-date" onchange="renderHistoryList()" style="margin-top:5px; padding:10px;">
            <div id="history-feed" style="margin-top:10px;"></div>
        </div>
    </div>

    <div id="page-fleet" class="page"><h3 style="margin-bottom:15px">Flota</h3><div id="fleet-grid"></div></div>

    <div id="page-stats" class="page">
        <div style="text-align:center; padding:30px 0">
            <i class="ph-fill ph-file-pdf" style="font-size:50px; color:var(--danger)"></i>
            <button class="btn-main" style="margin-top:20px">DESCARGAR REPORTE</button>
        </div>
    </div>

    <nav id="app-nav" class="nav-bar" style="display:none">
        <button class="nav-item active" id="n-route" onclick="checkNewRoute()"><i class="ph-fill ph-plus-circle"></i>NUEVO</button>
        <button class="nav-item" id="n-history" onclick="go('page-history')"><i class="ph-fill ph-chart-pie-slice"></i>DATA</button>
        <button class="nav-item" id="n-fleet" onclick="go('page-fleet')"><i class="ph-fill ph-truck"></i>FLOTA</button>
        <button class="nav-item" id="n-stats" onclick="go('page-stats')"><i class="ph-fill ph-file-text"></i>REPORTE</button>
    </nav>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbxuVVOZfMx8jkN-q079s6g7ppPAF4XIkNG-DEQGt6MqiownzLo3NMyWBIZ1hkTyoPBl/exec";
        let activeUser = "", currentCarga = [], db = [];
        const ASIGNACION = { "CEP-929": "ROMARIO", "BPN-711": "CESAR C.", "BVN-704": "LUIS H.", "BUL-742": "WALDIR", "BVN-930": "MARCELO" };
        const AUXILIARES = ["Cristopher", "Plácido", "Martin", "Percy", "Rodolfo", "Ricardo", "Elio", "Daniel C.", "Jofer", "Nelson", "Julio"];

        window.onload = () => {
            setupUI();
            if(localStorage.getItem('tw_logged')) login(localStorage.getItem('tw_logged'));
        };

        function setupUI() {
            const opts = document.getElementById('login-options');
            ['TAJHO ADMIN', 'FRANCESCO', 'OSCAR', 'LUIS HERBER'].forEach(u => {
                opts.innerHTML += `<div onclick="checkPass('${u}')" style="background:var(--surface); padding:15px; border-radius:12px; margin-bottom:8px; border:1px solid var(--border); display:flex; justify-content:space-between; font-weight:700; font-size:14px;">${u} <i class="ph-bold ph-caret-right"></i></div>`;
            });
            document.getElementById('plate-options').innerHTML = Object.keys(ASIGNACION).map(p => 
                `<div onclick="startWithPlate('${p}')" style="background:var(--surface); border:1px solid var(--border); padding:15px 5px; border-radius:12px; color:white; font-weight:800; text-align:center; font-size:14px;">${p}</div>`
            ).join('');
            document.getElementById('sel-pla').innerHTML = Object.keys(ASIGNACION).map(p => `<option value="${p}">${p}</option>`).join('');
            document.getElementById('sel-cho').innerHTML = Object.values(ASIGNACION).map(c => `<option value="${c}">${c}</option>`).join('');
            document.getElementById('sel-aux').innerHTML = AUXILIARES.map(a => `<option value="${a}">${a}</option>`).join('');
        }

        function login(u) {
            activeUser = u; localStorage.setItem('tw_logged', u);
            document.getElementById('page-login').classList.remove('active');
            document.getElementById('app-header').style.display = 'flex';
            document.getElementById('app-nav').style.display = 'flex';
            document.getElementById('user-info').innerText = u;
            checkNewRoute();
            syncData();
        }

        function checkPass(u) { if(u==='TAJHO ADMIN' && prompt("Clave:")!=="1994") return; login(u); }

        async function syncData() {
            try {
                const r = await fetch(API);
                db = await r.json();
                processStats();
            } catch(e) { console.log(e); }
        }

        function processStats() {
            const hoy = new Date().toLocaleDateString('sv-SE');
            const mes = hoy.substring(0, 7);
            let dC = 0, dE = 0, mC = 0, mE = 0;
            db.forEach(r => {
                const t = parseFloat(r.total || 0);
                if(r.fecha === hoy) { dC += t; dE++; }
                if(r.fecha && r.fecha.startsWith(mes)) { mC += t; mE++; }
            });
            document.getElementById('h-cajas-dia').innerText = dC;
            document.getElementById('h-envios-dia').innerText = dE;
            document.getElementById('h-cajas-mes').innerText = mC;
            document.getElementById('h-envios-mes').innerText = mE;
            document.getElementById('label-month').innerText = new Date().toLocaleString('es-ES', { month: 'short' }).toUpperCase();
        }

        function renderHistoryList() {
            const date = document.getElementById('filter-date').value;
            let html = "";
            db.filter(r => r.fecha === date).forEach(r => {
                html += `<div class="route-item"><span><b>${r.total}</b> ${r.placa}</span><small style="color:var(--text-dim)">${r.hora}</small></div>`;
            });
            document.getElementById('history-feed').innerHTML = html || "No hay registros";
        }

        function go(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            let navBtnId = "n-route"; 
            if(id === 'page-history') navBtnId = "n-history";
            if(id === 'page-fleet') navBtnId = "n-fleet";
            if(id === 'page-stats') navBtnId = "n-stats";
            if(document.getElementById(navBtnId)) document.getElementById(navBtnId).classList.add('active');
        }

        function checkNewRoute() {
            if(localStorage.getItem('tw_temp_placa')) {
                const saved = localStorage.getItem('tw_temp_route');
                if(saved) currentCarga = JSON.parse(saved);
                document.getElementById('sel-pla').value = localStorage.getItem('tw_temp_placa');
                document.getElementById('active-plate-label').innerText = localStorage.getItem('tw_temp_placa');
                predictAndSave(); refreshCargaUI(); go('page-route');
            } else { go('page-select-plate'); }
        }

        function startWithPlate(p) {
            localStorage.setItem('tw_temp_placa', p);
            document.getElementById('sel-pla').value = p;
            document.getElementById('active-plate-label').innerText = p;
            predictAndSave(); go('page-route');
        }

        function addPoint() {
            const cli = document.getElementById('inp-cli').value.toUpperCase();
            const can = parseInt(document.getElementById('inp-can').value);
            if(!cli || !can) return;
            currentCarga.push({cli, can});
            localStorage.setItem('tw_temp_route', JSON.stringify(currentCarga));
            document.getElementById('inp-cli').value = ""; document.getElementById('inp-can').value = "";
            refreshCargaUI();
        }

        function refreshCargaUI() {
            let total = 0; let html = "";
            currentCarga.forEach((it, i) => {
                total += it.can;
                html += `<div class="route-item"><span><b>${it.can}</b> ${it.cli}</span><i class="ph ph-trash" style="color:var(--danger)" onclick="removePoint(${i})"></i></div>`;
            });
            document.getElementById('count-cajas').innerText = total;
            document.getElementById('count-puntos').innerText = currentCarga.length;
            document.getElementById('finalize-area').style.display = currentCarga.length > 0 ? 'block' : 'none';
            document.getElementById('live-list').innerHTML = html;
        }

        function removePoint(i) { currentCarga.splice(i,1); localStorage.setItem('tw_temp_route', JSON.stringify(currentCarga)); refreshCargaUI(); }
        function clearAll() { if(confirm("¿Borrar?")) { localStorage.removeItem('tw_temp_route'); localStorage.removeItem('tw_temp_placa'); currentCarga=[]; refreshCargaUI(); go('page-select-plate'); }}
        function predictAndSave() { const p = document.getElementById('sel-pla').value; if(ASIGNACION[p]) document.getElementById('sel-cho').value = ASIGNACION[p]; }
        function openConfirm() { if(confirm("¿Guardar?")) finalize(); }
        async function finalize() {
            const r = {
                fecha: new Date().toLocaleDateString('sv-SE'), hora: new Date().toLocaleTimeString('es-PE', {hour:'2-digit', minute:'2-digit', hour12:false}),
                chofer: document.getElementById('sel-cho').value, auxiliar: document.getElementById('sel-aux').value, placa: document.getElementById('sel-pla').value,
                items: currentCarga.map(i => `${i.cli}: ${i.can}`).join(", "), total: currentCarga.reduce((a,b)=>a+b.can,0), operario: activeUser
            };
            fetch(API, {method:'POST', mode:'no-cors', body:JSON.stringify(r)});
            db.unshift(r); processStats();
            localStorage.removeItem('tw_temp_route'); localStorage.removeItem('tw_temp_placa');
            currentCarga=[]; refreshCargaUI(); go('page-history');
        }
    </script>
</body>
</html>
