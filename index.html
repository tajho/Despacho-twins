<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TWINS ELITE - OFICIAL V6</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root {
            --bg: #0b0f17; --surface: #161c28; --accent: #007aff; 
            --text: #ffffff; --text-dim: #94a3b8; --border: #2d3748; 
            --success: #34c759; --danger: #ff3b30; --warning: #ffcc00;
        }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; outline: none; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; }
        
        .page { display: none; padding: 10px 15px 120px 15px; max-width: 500px; margin: 0 auto; }
        .active { display: block !important; }

        .top-header { position: sticky; top: 0; z-index: 1000; background: rgba(11, 15, 23, 0.9); backdrop-filter: blur(10px); padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        
        .stat-banner { background: linear-gradient(135deg, #007aff, #0056b3); padding: 25px; border-radius: 24px; color: white; margin-bottom: 20px; box-shadow: 0 10px 20px rgba(0,122,255,0.2); }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .stat-card { background: var(--surface); border: 1px solid var(--border); padding: 15px; border-radius: 18px; text-align: center; }
        .stat-card b { display: block; font-size: 20px; color: var(--accent); }
        .stat-card small { font-size: 10px; color: var(--text-dim); text-transform: uppercase; font-weight: 800; }

        .input-group { display: flex; gap: 10px; margin-bottom: 15px; }
        input, select { background: var(--surface); border: 2px solid var(--border); padding: 18px; border-radius: 16px; color: white; font-size: 16px; width: 100%; }
        
        .btn-add { background: var(--accent); border: none; border-radius: 16px; color: white; padding: 0 25px; font-weight: 800; cursor: pointer; display: flex; align-items: center; }
        .btn-main { background: var(--success); color: white; width: 100%; padding: 20px; border-radius: 18px; border: none; font-size: 17px; font-weight: 800; margin-top: 15px; cursor: pointer; }
        .btn-opt { background: var(--border); color: white; border: none; padding: 10px; border-radius: 12px; font-size: 12px; font-weight: 700; cursor: pointer; flex: 1; }

        .route-item { background: var(--surface); border-radius: 16px; padding: 16px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border); }
        .card { background: var(--surface); border-radius: 24px; padding: 20px; margin-bottom: 15px; border: 1px solid var(--border); }
        .detail-box { display: none; background: rgba(0,0,0,0.2); border-radius: 12px; padding: 12px; margin: 12px 0; font-size: 13px; color: #cbd5e1; white-space: pre-line; border: 1px solid rgba(255,255,255,0.05); }

        .nav-bar { position: fixed; bottom: 20px; left: 15px; right: 15px; background: rgba(22, 28, 40, 0.95); backdrop-filter: blur(20px); height: 75px; border-radius: 22px; display: flex; border: 1px solid var(--border); z-index: 2000; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-dim); background: none; border: none; font-size: 11px; font-weight: 700; }
        .nav-item.active { color: var(--accent); }
        .nav-item i { font-size: 26px; }

        .login-btn { background: var(--surface); border: 1px solid var(--border); color: white; padding: 20px; border-radius: 20px; font-size: 16px; font-weight: 700; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 3000; align-items: center; justify-content: center; padding: 20px; }
    </style>
</head>
<body>

    <header id="app-header" class="top-header" style="display:none">
        <div style="font-weight:900; font-size:18px;">TWINS <span style="color:var(--accent)">ELITE</span></div>
        <div id="user-info" onclick="logout()" style="font-size:11px; font-weight:800; background:rgba(255,255,255,0.05); padding:8px 15px; border-radius:12px; border:1px solid var(--border)">---</div>
    </header>

    <div id="page-login" class="page active">
        <div style="text-align:center; padding:60px 0">
            <h2 style="font-weight:800;">Iniciar Sesión</h2>
            <p style="color:var(--text-dim);">Identifícate para continuar</p>
        </div>
        <div id="login-options"></div>
    </div>

    <div id="page-route" class="page">
        <div class="stat-banner">
            <div style="display:flex; justify-content:space-between; align-items:center">
                <div><small style="font-weight:800; opacity:0.8">CAJAS ACTUAL</small><div id="count-cajas" style="font-size:48px; font-weight:800;">0</div></div>
                <div style="text-align:right"><small style="font-weight:800; opacity:0.8">CLIENTES</small><div id="count-puntos" style="font-size:28px; font-weight:800">0</div></div>
            </div>
        </div>
        
        <div class="input-group"><input type="text" id="inp-cli" placeholder="Nombre del Cliente" style="flex:2"></div>
        <div class="input-group">
            <input type="number" id="inp-can" placeholder="Cajas" style="flex:1">
            <button class="btn-add" onclick="addPoint()" style="flex:0.5; justify-content:center"><i class="ph-bold ph-plus" style="font-size:24px"></i></button>
        </div>

        <div id="live-list"></div>

        <div id="finalize-area" style="display:none; margin-top:20px; border-top:1px solid var(--border); padding-top:20px">
            <select id="sel-pla" onchange="predictAndSave()" style="margin-bottom:10px"></select>
            <div class="input-group"><select id="sel-cho"></select><select id="sel-aux"></select></div>
            <button class="btn-main" onclick="openConfirm()">REGISTRAR DESPACHO</button>
        </div>
    </div>

    <div id="page-history" class="page">
        <div class="stat-grid">
            <div class="stat-card"><small>Hoy Cajas</small><b id="h-cajas-dia">0</b></div>
            <div class="stat-card"><small>Hoy Envíos</small><b id="h-envios-dia">0</b></div>
            <div class="stat-card"><small>Mes Cajas</small><b id="h-cajas-mes">0</b></div>
            <div class="stat-card"><small>Mes Envíos</small><b id="h-envios-mes">0</b></div>
        </div>
        <input type="date" id="filter-date" onchange="renderHistory()" style="margin-bottom:20px">
        <div id="history-feed"></div>
    </div>

    <div id="page-fleet" class="page"><div id="fleet-grid"></div></div>
    <div id="page-stats" class="page">
        <div class="card" style="text-align:center; padding:40px 20px;">
            <i class="ph-fill ph-file-pdf" style="font-size:64px; color:var(--danger); margin-bottom:15px"></i>
            <h3>Reporte PDF Mensual</h3>
            <button onclick="generatePDF()" class="btn-main" style="background:var(--danger);">DESCARGAR</button>
        </div>
    </div>

    <nav id="app-nav" class="nav-bar" style="display:none">
        <button class="nav-item active" id="n-route" onclick="go('page-route')"><i class="ph-fill ph-plus-circle"></i>NUEVO</button>
        <button class="nav-item" id="n-history" onclick="go('page-history')"><i class="ph-fill ph-clock-counter-clockwise"></i>DATA</button>
        <button class="nav-item" id="n-fleet" onclick="go('page-fleet')"><i class="ph-fill ph-truck"></i>FLOTA</button>
        <button class="nav-item" id="n-stats" style="display:none" onclick="go('page-stats')"><i class="ph-fill ph-file-text"></i>REPORTE</button>
    </nav>

    <div id="modal-confirm" class="modal">
        <div class="card" style="width:100%; text-align:center;">
            <h3 style="margin-bottom:5px">¿Cuándo sale este despacho?</h3>
            <p style="font-size:13px; color:var(--text-dim); margin-bottom:20px">Elige la fecha de salida oficial</p>
            
            <div style="display:flex; gap:10px; margin-bottom:15px">
                <button class="btn-main" style="margin-top:0" onclick="finalize('HOY')">HOY</button>
                <button class="btn-main" style="margin-top:0; background:var(--accent)" onclick="finalize('MAÑANA')">MAÑANA</button>
            </div>
            
            <button onclick="closeConfirm()" style="background:none; border:none; color:var(--text-dim); font-weight:700">CANCELAR</button>
        </div>
    </div>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbxuVVOZfMx8jkN-q079s6g7ppPAF4XIkNG-DEQGt6MqiownzLo3NMyWBIZ1hkTyoPBl/exec";
        let activeUser = "", currentCarga = [], db = [];

        const DATA = {
            placas: ["CEP-929", "BPN-711", "BVN-704", "BUL-742", "BVN-930"],
            choferes: ["TAJHO", "LUIS H.", "ROMARIO", "CESAR C.", "WALDIR", "MARCELO"],
            auxiliares: ["Cristopher", "Plácido", "Martin", "Percy", "Rodolfo", "Ricardo", "Elio", "Daniel C.", "Jofer", "Nelson", "Julio"],
            soats: { "CEP-929": "2026-07-22", "BPN-711": "2026-06-10", "BVN-704": "2026-07-02", "BUL-742": "2026-04-02", "BVN-930": "2026-07-02" }
        };

        window.onload = () => {
            setupUI();
            const savedUser = localStorage.getItem('tw_logged');
            if(savedUser) login(savedUser, true);
            const savedRoute = localStorage.getItem('tw_temp_route');
            if(savedRoute) { currentCarga = JSON.parse(savedRoute); refreshCargaUI(); }
            syncData();
        };

        function setupUI() {
            const opts = document.getElementById('login-options');
            ['TAJHO ADMIN', 'FRANCESCO', 'OSCAR', 'LUIS HERBER'].forEach(u => {
                opts.innerHTML += `<div class="login-btn" onclick="checkPass('${u}')"><span>${u}</span><i class="ph-bold ph-caret-right"></i></div>`;
            });
            document.getElementById('sel-pla').innerHTML = '<option value="">Placa</option>' + DATA.placas.map(p => `<option value="${p}">${p}</option>`).join('');
            document.getElementById('sel-cho').innerHTML = '<option value="">Chofer</option>' + DATA.choferes.map(c => `<option value="${c}">${c}</option>`).join('');
            document.getElementById('sel-aux').innerHTML = '<option value="">Auxiliar</option>' + DATA.auxiliares.map(a => `<option value="${a}">${a}</option>`).join('');
            document.getElementById('filter-date').value = new Date().toLocaleDateString('sv-SE');
        }

        function checkPass(u) {
            if(u === 'TAJHO ADMIN') {
                const p = prompt("Clave:");
                if(p === "1994") login(u);
                else alert("Error");
            } else login(u);
        }

        function login(u, skip = false) { 
            activeUser = u; localStorage.setItem('tw_logged', u);
            document.getElementById('page-login').classList.remove('active');
            document.getElementById('app-header').style.display = 'flex';
            document.getElementById('app-nav').style.display = 'flex';
            document.getElementById('user-info').innerText = u;
            if(u === "TAJHO ADMIN") document.getElementById('n-stats').style.display = "flex";
            go('page-route');
        }

        async function syncData() {
            try {
                const res = await fetch(API);
                const raw = await res.json();
                db = raw.map(r => ({ ...r, total: parseFloat(r.total || 0) }));
                renderHistory(); renderFleet();
            } catch(e) {}
        }

        function renderHistory() {
            const container = document.getElementById('history-feed');
            const selDate = document.getElementById('filter-date').value;
            const now = new Date();
            let h = "", dCjs = 0, dEnv = 0, mCjs = 0, mEnv = 0;

            db.forEach((r, i) => {
                const rDate = new Date(r.fecha);
                const rFechaStr = rDate.toLocaleDateString('sv-SE');
                if(rDate.getMonth() === now.getMonth() && rDate.getFullYear() === now.getFullYear()) { mCjs += r.total; mEnv++; }
                
                if(rFechaStr === selDate) {
                    dCjs += r.total; dEnv++;
                    h += `<div class="card">
                        <div style="display:flex; justify-content:space-between; align-items:center">
                            <span style="background:var(--accent); padding:4px 10px; border-radius:10px; font-size:12px; font-weight:800">${r.hora}</span>
                            <b style="color:var(--accent); font-size:18px">${r.placa}</b>
                        </div>
                        <div style="font-weight:800; font-size:24px; margin:15px 0">${r.total} Cajas</div>
                        <div style="font-size:12px; font-weight:700; opacity:0.7; margin-bottom:10px">${r.chofer} / ${r.auxiliar}</div>
                        
                        <div id="details-${i}" class="detail-box">${(r.detalles || r.items || "").split(', ').join('\n')}</div>
                        
                        <div style="display:flex; gap:8px">
                            <button class="btn-opt" onclick="toggleDetails(${i})"><i class="ph-bold ph-list"></i> Lista</button>
                            <button class="btn-opt" onclick="loadEdit(${i})"><i class="ph-bold ph-pencil"></i></button>
                            <button class="btn-opt" style="background:#25D366" onclick="shareWA(${i})"><i class="ph-bold ph-whatsapp-logo"></i></button>
                        </div>
                    </div>`;
                }
            });
            document.getElementById('h-cajas-dia').innerText = dCjs;
            document.getElementById('h-envios-dia').innerText = dEnv;
            document.getElementById('h-cajas-mes').innerText = mCjs;
            document.getElementById('h-envios-mes').innerText = mEnv;
            container.innerHTML = h || `<p style="text-align:center; opacity:0.3; margin-top:50px">Sin datos</p>`;
        }

        function toggleDetails(i) {
            const el = document.getElementById(`details-${i}`);
            el.style.display = el.style.display === 'block' ? 'none' : 'block';
        }

        async function finalize(opcion) {
            const now = new Date();
            if(opcion === 'MAÑANA') now.setDate(now.getDate() + 1);

            const r = {
                fecha: now.toLocaleDateString('sv-SE'), 
                hora: new Date().toLocaleTimeString('es-PE', { hour: '2-digit', minute: '2-digit', hour12: false }),
                chofer: document.getElementById('sel-cho').value,
                auxiliar: document.getElementById('sel-aux').value,
                placa: document.getElementById('sel-pla').value,
                items: currentCarga.map(i => `${i.cli}: ${i.can}`).join(", "),
                total: currentCarga.reduce((a,b) => a + b.can, 0),
                operario: activeUser
            };
            
            fetch(API, { method: 'POST', mode: 'no-cors', body: JSON.stringify(r) });
            db.unshift(r); 
            currentCarga = []; 
            localStorage.removeItem('tw_temp_route');
            refreshCargaUI(); closeConfirm(); go('page-history');
        }

        function addPoint() { 
            const cli = document.getElementById('inp-cli').value.toUpperCase(); 
            const can = parseInt(document.getElementById('inp-can').value); 
            if(!cli || !can) return; 
            currentCarga.push({ cli, can }); 
            document.getElementById('inp-cli').value = ""; 
            document.getElementById('inp-can').value = ""; 
            refreshCargaUI(); 
        }

        function refreshCargaUI() { 
            const list = document.getElementById('live-list'); 
            let total = 0; list.innerHTML = ""; 
            currentCarga.forEach((it, i) => { 
                total += it.can; 
                list.innerHTML += `<div class="route-item"><span><b style="color:var(--accent)">${it.can}</b> ${it.cli}</span><i class="ph ph-trash" style="color:var(--danger)" onclick="removePoint(${i})"></i></div>`; 
            }); 
            document.getElementById('count-cajas').innerText = total; 
            document.getElementById('count-puntos').innerText = currentCarga.length; 
            document.getElementById('finalize-area').style.display = currentCarga.length > 0 ? 'block' : 'none'; 
            localStorage.setItem('tw_temp_route', JSON.stringify(currentCarga));
        }

        function shareWA(i) {
            const r = db[i];
            const msg = `*📦 DESPACHO TWINS ELITE*%0A*Fecha Salida:* ${r.fecha}%0A*Placa:* ${r.placa}%0A*Cajas:* ${r.total}%0A*Ruta:*%0A${(r.detalles || r.items).split(', ').join('%0A')}`;
            window.open(`https://wa.me/?text=${msg}`, '_blank');
        }

        function go(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('n-' + id.split('-')[1]).classList.add('active');
            if(id === 'page-history') renderHistory();
            if(id === 'page-fleet') renderFleet();
        }

        function logout() { localStorage.clear(); location.reload(); }
        function removePoint(i) { currentCarga.splice(i,1); refreshCargaUI(); }
        function openConfirm() { document.getElementById('modal-confirm').style.display = 'flex'; }
        function closeConfirm() { document.getElementById('modal-confirm').style.display = 'none'; }
        function loadEdit(i) { 
            const r = db[i]; currentCarga = (r.detalles || r.items).split(", ").map(it => { const [cli, can] = it.split(": "); return { cli, can: parseInt(can) }; });
            document.getElementById('sel-pla').value = r.placa; document.getElementById('sel-cho').value = r.chofer; document.getElementById('sel-aux').value = r.auxiliar;
            refreshCargaUI(); go('page-route'); 
        }
        function predictAndSave() { const l = db.find(r => r.placa === document.getElementById('sel-pla').value); if(l) { document.getElementById('sel-cho').value = l.chofer; document.getElementById('sel-aux').value = l.auxiliar; } }
        function renderFleet() { document.getElementById('fleet-grid').innerHTML = DATA.placas.map(p => { const d = Math.ceil((new Date(DATA.soats[p]) - new Date()) / 86400000); return `<div class="card" style="display:flex; justify-content:space-between"><div><b>${p}</b><br><small>Vence: ${DATA.soats[p]}</small></div><span style="color:${d<30?'var(--danger)':'var(--success)'}; font-weight:800">${d}d</span></div>`; }).join(''); }
        function generatePDF() {
            const { jsPDF } = window.jspdf; const doc = new jsPDF(); const now = new Date(); const mes = now.toLocaleString('es-ES', { month: 'long' }).toUpperCase();
            doc.text(`REPORTE TWINS ELITE - ${mes}`, 14, 20);
            const body = db.filter(r => new Date(r.fecha).getMonth() === now.getMonth()).map(r => [r.fecha, r.hora, r.placa, r.total, r.chofer]);
            doc.autoTable({ head: [['Fecha', 'Hora', 'Placa', 'Cajas', 'Chofer']], body: body, startY: 30 });
            doc.save(`Twins_Reporte_${mes}.pdf`);
        }
    </script>
</body>
</html>
