<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TWINS ELITE - V26 OPERATIONAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root {
            --bg: #f3f6fb; --surface: #ffffff; --accent: #0052ff; 
            --text: #1e293b; --text-dim: #64748b; --border: #e2e8f0; 
            --success: #10b981; --danger: #f43f5e;
            --shadow: 0 10px 25px -5px rgba(0,0,0,0.05), 0 8px 10px -6px rgba(0,0,0,0.05);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; }
        
        /* Contenedores */
        .page { display: none; height: 100vh; overflow-y: auto; padding: 10px 20px 150px 20px; max-width: 500px; margin: 0 auto; -webkit-overflow-scrolling: touch; }
        .active { display: block !important; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

        /* Header Ejecutivo */
        .main-header { position: sticky; top: 0; z-index: 1000; background: rgba(243, 246, 251, 0.9); backdrop-filter: blur(20px); padding: 15px 5px; display: flex; justify-content: space-between; align-items: center; }
        .brand { font-weight: 800; font-size: 22px; letter-spacing: -1px; }
        .brand span { color: var(--accent); }

        /* Buscador Inteligente V26 */
        .search-wrapper { position: sticky; top: 60px; z-index: 900; margin-bottom: 20px; }
        .search-input-group { background: var(--surface); border-radius: 20px; padding: 14px 20px; display: flex; align-items: center; gap: 12px; box-shadow: var(--shadow); border: 1px solid var(--border); }
        .search-input-group input { background: none; border: none; width: 100%; font-size: 15px; font-weight: 600; color: var(--text); }
        .search-input-group i { color: var(--accent); font-size: 20px; }

        /* Tarjetas de Carga */
        .data-card { background: var(--surface); border-radius: 24px; padding: 20px; border: 1px solid var(--border); margin-bottom: 15px; box-shadow: var(--shadow); position: relative; }
        .data-card:active { transform: translateY(2px); box-shadow: none; }
        
        .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
        .plate-tag { font-size: 20px; font-weight: 800; color: var(--text); }
        .qty-badge { background: #eff6ff; color: var(--accent); padding: 6px 12px; border-radius: 12px; font-weight: 800; font-size: 15px; border: 1px solid #dbeafe; }

        .card-mid { font-size: 13px; color: var(--text-dim); font-weight: 600; margin-bottom: 18px; display: flex; align-items: center; gap: 6px; }
        .date-chip { background: #f8fafc; border: 1px solid var(--border); padding: 2px 8px; border-radius: 6px; color: var(--text); }

        /* Acciones de una Sola Mano */
        .card-btns { display: grid; grid-template-columns: 1fr 1fr 1.2fr; gap: 8px; border-top: 1px solid #f1f5f9; padding-top: 15px; }
        .btn-action { border: none; border-radius: 14px; padding: 12px 5px; font-size: 10px; font-weight: 700; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .b-view { background: #f1f5f9; color: #475569; }
        .b-edit { background: #e0e7ff; color: #4338ca; }
        .b-wa { background: #dcfce7; color: #15803d; }

        /* Formulario de Carga */
        .hero-stats { background: linear-gradient(135deg, #0052ff, #00a3ff); border-radius: 28px; padding: 25px; color: #fff; margin-bottom: 25px; box-shadow: 0 15px 30px rgba(0,82,255,0.2); }
        .input-pro { background: #fff; border: 1px solid var(--border); padding: 18px; border-radius: 18px; width: 100%; font-size: 16px; font-weight: 600; margin-bottom: 12px; box-shadow: inset 0 2px 4px rgba(0,0,0,0.02); }
        .btn-confirm { background: var(--text); color: #fff; border: none; border-radius: 20px; padding: 20px; width: 100%; font-weight: 800; font-size: 16px; cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }

        /* Navegación Inferior (Floating Nav) */
        .bottom-nav { position: fixed; bottom: 30px; left: 20px; right: 20px; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(15px); height: 75px; border-radius: 25px; display: flex; border: 1px solid var(--border); z-index: 2000; box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-dim); background: none; border: none; font-size: 10px; font-weight: 700; }
        .nav-item.active { color: var(--accent); }
        .nav-item i { font-size: 26px; margin-bottom: 2px; }

        /* Modales */
        .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.3); backdrop-filter: blur(5px); z-index:3000; align-items:center; justify-content:center; padding:20px; }
        .modal-content { background: #fff; border-radius: 30px; padding: 30px; width: 100%; max-width: 400px; text-align: center; box-shadow: var(--shadow); }
    </style>
</head>
<body>

    <header id="app-header" class="page active" style="height:auto; display:none;">
        <div class="main-header">
            <div class="brand">TWINS <span>ELITE</span></div>
            <div onclick="syncData()" id="sync-pill" style="font-size:10px; font-weight:800; color:var(--success); background:#ecfdf5; padding:8px 15px; border-radius:20px; border:1px solid #d1fae5; cursor:pointer;">
                <i class="ph-bold ph-arrows-clockwise"></i> ACTUALIZAR
            </div>
        </div>
    </header>

    <div id="page-login" class="page active">
        <div style="text-align:center; padding:50px 0 30px;">
            <div style="width:80px; height:80px; background:var(--accent); border-radius:24px; margin:0 auto 20px; display:flex; align-items:center; justify-content:center; box-shadow: 0 10px 30px rgba(0,82,255,0.3);">
                <i class="ph-fill ph-truck" style="font-size:45px; color:#fff;"></i>
            </div>
            <h1 style="font-weight:800; margin:0; font-size:26px;">Logística Interna</h1>
            <p style="color:var(--text-dim); font-weight:500;">Selecciona tu usuario operativo</p>
        </div>
        <div id="login-options"></div>
    </div>

    <div id="page-history" class="page">
        <div class="search-wrapper">
            <div class="search-input-group">
                <i class="ph-bold ph-magnifying-glass"></i>
                <input type="text" id="smart-search" placeholder="Buscar por placa, chofer o cliente..." oninput="renderSmartHistory()">
            </div>
        </div>
        <div id="history-feed"></div>
    </div>

    <div id="page-select-plate" class="page">
        <h2 style="font-weight:800; margin-bottom:20px;">Nueva Carga</h2>
        <div id="plate-options" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;"></div>
    </div>

    <div id="page-route" class="page">
        <div class="hero-stats">
            <small style="font-weight:700; opacity:0.8; letter-spacing:1px;">CAJAS TOTALES</small>
            <div style="display:flex; justify-content:space-between; align-items:flex-end; margin-top:5px;">
                <h1 id="count-cajas" style="font-size:58px; margin:0; font-weight:800; line-height:1;">0</h1>
                <div style="text-align:right;">
                    <b id="active-plate-label" style="font-size:22px; display:block;">---</b>
                    <span id="count-puntos" style="font-size:14px; opacity:0.9;">0 Clientes</span>
                </div>
            </div>
        </div>
        
        <input type="text" id="inp-cli" class="input-pro" placeholder="Nombre del Cliente" list="suggestions">
        <datalist id="suggestions"></datalist>
        
        <div style="display:flex; gap:12px; margin-bottom:25px;">
            <input type="number" id="inp-can" class="input-pro" placeholder="Cant." style="flex:1; margin-bottom:0;">
            <button onclick="addPoint()" style="background:var(--accent); color:#fff; border:none; border-radius:18px; width:75px; font-size:28px;"><i class="ph-bold ph-plus"></i></button>
        </div>
        
        <div id="live-list"></div>
        <div id="finalize-area" style="display:none; margin-top:20px;">
            <button onclick="openModal('modal-date')" class="btn-confirm">REGISTRAR DESPACHO</button>
        </div>
    </div>

    <div id="modal-date" class="modal-overlay">
        <div class="modal-content">
            <h3 style="font-weight:800; margin-bottom:10px;">Programación</h3>
            <p style="color:var(--text-dim); margin-bottom:25px;">¿Para qué fecha es esta ruta?</p>
            <button onclick="finalizeProcess('hoy')" class="btn-confirm" style="background:var(--accent); margin-bottom:12px;">PARA HOY</button>
            <button onclick="finalizeProcess('mañana')" class="input-pro" style="background:#f1f5f9; border:none;">PARA MAÑANA</button>
            <button onclick="closeModal('modal-date')" style="background:none; border:none; color:var(--danger); margin-top:15px; font-weight:700;">CANCELAR</button>
        </div>
    </div>

    <div id="modal-view" class="modal-overlay">
        <div class="modal-content" style="text-align:left;">
            <h3 id="mv-title" style="margin-top:0; color:var(--accent);"></h3>
            <div id="mv-body" style="max-height:400px; overflow-y:auto; border-top:1px solid var(--border); padding-top:15px;"></div>
            <button onclick="closeModal('modal-view')" class="btn-confirm" style="margin-top:20px;">CERRAR</button>
        </div>
    </div>

    <nav id="app-nav" class="bottom-nav" style="display:none">
        <button class="nav-item active" id="n-route" onclick="go('page-select-plate')"><i class="ph-fill ph-plus-circle"></i>NUEVO</button>
        <button class="nav-item" id="n-history" onclick="go('page-history')"><i class="ph-fill ph-database"></i>HISTORIAL</button>
        <button class="nav-item" id="n-fleet" onclick="go('page-fleet')"><i class="ph-fill ph-truck"></i>FLOTA</button>
        <button class="nav-item" id="n-reports" onclick="go('page-reports')"><i class="ph-fill ph-user-gear"></i>ADMIN</button>
    </nav>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbxuVVOZfMx8jkN-q079s6g7ppPAF4XIkNG-DEQGt6MqiownzLo3NMyWBIZ1hkTyoPBl/exec";
        let db = [], currentCarga = [], activeUser = "";
        const ASIGNACION = { "CEP-929": "ROMARIO", "BPN-711": "CESAR C.", "BVN-704": "LUIS H.", "BUL-742": "WALDIR", "BVN-930": "MARCELO" };

        window.onload = () => {
            const saved = localStorage.getItem('tw_db_v26');
            if(saved) { db = JSON.parse(saved); renderSmartHistory(); updateSuggestions(); }
            setupUI();
            if(localStorage.getItem('tw_logged')) login(localStorage.getItem('tw_logged'));
        };

        function setupUI() {
            const l = document.getElementById('login-options');
            ['TAJHO ADMIN', 'FRANCESCO', 'OSCAR', 'LUIS HERBER'].forEach(u => {
                l.innerHTML += `<div onclick="checkPass('${u}')" class="data-card" style="display:flex; justify-content:space-between; align-items:center; cursor:pointer; font-weight:700;">${u} <i class="ph-bold ph-arrow-right" style="color:var(--accent)"></i></div>`;
            });
            document.getElementById('plate-options').innerHTML = Object.keys(ASIGNACION).map(p => 
                `<div onclick="startPlate('${p}')" class="data-card" style="text-align:center; padding:35px 10px; font-weight:800; font-size:20px; cursor:pointer; border-bottom:4px solid var(--accent);">${p}</div>`
            ).join('');
        }

        async function syncData() {
            const pill = document.getElementById('sync-pill');
            pill.innerHTML = "SINCRONIZANDO...";
            try {
                const r = await fetch(API);
                const data = await r.json();
                db = data.map((x, i) => ({ ...x, internalId: 'V26-'+Date.now()+i, fecha: x.fecha.split('T')[0] }));
                localStorage.setItem('tw_db_v26', JSON.stringify(db));
                renderSmartHistory(); updateSuggestions();
                pill.innerHTML = "● ACTUALIZADO";
            } catch(e) { pill.innerHTML = "● MODO OFFLINE"; }
        }

        function renderSmartHistory() {
            const query = document.getElementById('smart-search').value.toLowerCase();
            let html = "";
            const filtered = db.filter(r => `${r.placa} ${r.chofer} ${r.items} ${r.fecha}`.toLowerCase().includes(query));

            filtered.forEach(r => {
                const fDisplay = r.fecha.split('-').reverse().join('/');
                html += `
                <div class="data-card">
                    <div class="card-top">
                        <div class="plate-tag">${r.placa}</div>
                        <div class="qty-badge">${r.total} CJS</div>
                    </div>
                    <div class="card-mid">
                        <i class="ph-bold ph-user-circle"></i> ${r.chofer} 
                        <span class="date-chip">${fDisplay}</span>
                    </div>
                    <div class="card-btns">
                        <button class="btn-action b-view" onclick="viewR('${r.internalId}')"><i class="ph-bold ph-eye"></i>VER</button>
                        <button class="btn-action b-edit" onclick="editR('${r.internalId}')"><i class="ph-bold ph-pencil-simple"></i>EDITAR</button>
                        <button class="btn-action b-wa" onclick="sendWA('${r.internalId}')"><i class="ph-bold ph-whatsapp-logo"></i>WHATSAPP</button>
                    </div>
                </div>`;
            });
            document.getElementById('history-feed').innerHTML = html || "<p style='text-align:center; padding-top:50px; color:var(--text-dim);'>No se encontraron registros</p>";
        }

        function viewR(id) {
            const r = db.find(x => x.internalId === id);
            if(!r) return;
            document.getElementById('mv-title').innerText = "Ruta: " + r.placa;
            document.getElementById('mv-body').innerHTML = r.items.split(',').map(li => 
                `<div style="padding:15px; border-bottom:1px solid #f1f5f9; font-weight:600; font-size:15px; display:flex; justify-content:space-between;">
                    ${li.trim()}
                </div>`).join('');
            openModal('modal-view');
        }

        function editR(id) {
            const r = db.find(x => x.internalId === id);
            if(!r || !confirm("¿Cargar esta ruta para editarla?")) return;
            localStorage.setItem('tw_temp_placa', r.placa);
            currentCarga = r.items.split(',').map(li => {
                const p = li.split(':');
                return { cli: p[0].trim(), can: parseInt(p[1]) || 0 };
            });
            go('page-route'); refreshCargaUI();
        }

        function startPlate(p) { localStorage.setItem('tw_temp_placa', p); go('page-route'); refreshCargaUI(); }

        function addPoint() {
            const cli = document.getElementById('inp-cli').value.toUpperCase(), can = parseInt(document.getElementById('inp-can').value);
            if(!cli || isNaN(can)) return;
            currentCarga.push({cli, can});
            document.getElementById('inp-cli').value = ""; document.getElementById('inp-can').value = "";
            refreshCargaUI();
        }

        function refreshCargaUI() {
            let t = 0; let h = "";
            document.getElementById('active-plate-label').innerText = localStorage.getItem('tw_temp_placa') || "---";
            currentCarga.forEach((it, i) => {
                t += it.can;
                h += `<div class="data-card" style="display:flex; justify-content:space-between; padding:15px; margin-bottom:10px; border-left:5px solid var(--accent);">
                    <span><b>${it.can}</b> ${it.cli}</span>
                    <i class="ph-bold ph-trash" style="color:var(--danger); font-size:22px;" onclick="currentCarga.splice(${i},1);refreshCargaUI()"></i>
                </div>`;
            });
            document.getElementById('count-cajas').innerText = t;
            document.getElementById('count-puntos').innerText = currentCarga.length + " Clientes";
            document.getElementById('finalize-area').style.display = t > 0 ? 'block' : 'none';
            document.getElementById('live-list').innerHTML = h;
        }

        async function finalizeProcess(tipo) {
            let f = new Date(); if(tipo === 'mañana') f.setDate(f.getDate() + 1);
            const r = {
                fecha: f.toISOString().split('T')[0],
                chofer: ASIGNACION[localStorage.getItem('tw_temp_placa')],
                placa: localStorage.getItem('tw_temp_placa'),
                items: currentCarga.map(i => `${i.cli}: ${i.can}`).join(", "),
                total: currentCarga.reduce((a,b)=>a+b.can,0),
                internalId: 'V26-'+Date.now()
            };
            db.unshift(r); localStorage.setItem('tw_db_v26', JSON.stringify(db));
            fetch(API, {method:'POST', mode:'no-cors', body:JSON.stringify(r)});
            closeModal('modal-date'); currentCarga = []; go('page-history');
        }

        function login(u) {
            activeUser = u; localStorage.setItem('tw_logged', u);
            document.getElementById('page-login').classList.remove('active');
            document.getElementById('app-header').style.display = 'block';
            document.getElementById('app-nav').style.display = 'flex';
            syncData(); go('page-history');
        }

        function checkPass(u) { if(u==='TAJHO ADMIN' && prompt("Acceso:")!=="1994") return; login(u); }
        function go(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            const bid = id.includes('plate') || id.includes('route') ? 'n-route' : 'n-'+id.split('-')[1];
            if(document.getElementById(bid)) document.getElementById(bid).classList.add('active');
            if(id==='page-history') renderSmartHistory();
        }
        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        
        function sendWA(id) {
            const r = db.find(x => x.internalId === id);
            const msg = `*TWINS ELITE*\n📦 *Unidad:* ${r.placa}\n👤 *Chofer:* ${r.chofer}\n📅 *Fecha:* ${r.fecha.split('-').reverse().join('/')}\n\n*DETALLE:*\n${r.items.split(',').map(li => "• " + li.trim()).join('\n')}\n\n*TOTAL: ${r.total} CAJAS*`;
            window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
        }

        function updateSuggestions() {
            const clientes = [...new Set(db.flatMap(r => r.items.split(',').map(i => i.split(':')[0].trim())))];
            document.getElementById('suggestions').innerHTML = clientes.slice(0, 20).map(c => `<option value="${c}">`).join('');
        }
    </script>
</body>
</html>
