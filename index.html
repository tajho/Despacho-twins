<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TWINS LOGISTICS ELITE</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #02040a; --card: #0f172a; --accent: #00d4ff; 
            --text: #f8fafc; --text-dim: #94a3b8;
            --success: #10b981; --danger: #ef4444; --warning: #f59e0b;
            --border: rgba(255,255,255,0.08);
            --grad: linear-gradient(135deg, #00d4ff 0%, #4f46e5 100%);
            --glass: rgba(30, 41, 59, 0.7);
        }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; outline: none; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; line-height: 1.5; }
        
        /* Animaciones */
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .page { display: none; padding: 20px; padding-bottom: 100px; max-width: 500px; margin: 0 auto; animation: slideUp 0.4s ease-out; }
        .active { display: block; }

        /* Header Moderno */
        .top-header { position: sticky; top: 0; z-index: 100; background: rgba(2, 4, 10, 0.8); backdrop-filter: blur(20px); padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .user-tag { background: rgba(0, 212, 255, 0.1); padding: 6px 12px; border-radius: 100px; border: 1px solid rgba(0, 212, 255, 0.2); display: flex; align-items: center; gap: 8px; }
        .dot { width: 8px; height: 8px; background: var(--success); border-radius: 50%; box-shadow: 0 0 10px var(--success); }

        /* Tarjetas Estilo iOS */
        .card { background: var(--card); border-radius: 24px; border: 1px solid var(--border); padding: 20px; margin-bottom: 16px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.3); }
        .stat-box { background: var(--glass); padding: 20px; border-radius: 24px; border: 1px solid var(--border); text-align: left; position: relative; overflow: hidden; }
        .stat-val { font-size: 24px; font-weight: 800; color: var(--text); display: block; }
        .stat-label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; font-weight: 700; }

        /* Inputs y Botones */
        input, select { width: 100%; padding: 16px; margin: 8px 0; border-radius: 16px; border: 1px solid var(--border); background: #1e293b; color: var(--text); font-size: 15px; transition: 0.3s; }
        input:focus { border-color: var(--accent); box-shadow: 0 0 0 4px rgba(0, 212, 255, 0.1); }
        .btn { width: 100%; padding: 18px; border-radius: 18px; border: none; font-size: 15px; font-weight: 800; cursor: pointer; transition: 0.3s; display: flex; justify-content: center; align-items: center; gap: 10px; }
        .btn-main { background: var(--grad); color: white; box-shadow: 0 10px 20px -5px rgba(79, 70, 229, 0.5); }
        .btn-main:active { transform: scale(0.98); }

        /* Flota e Historial Detallado */
        .badge { padding: 4px 10px; border-radius: 8px; font-size: 10px; font-weight: 800; text-transform: uppercase; }
        .badge-success { background: rgba(16, 185, 129, 0.1); color: var(--success); }
        .badge-busy { background: rgba(239, 68, 68, 0.1); color: var(--danger); }
        
        .item-row { display: flex; justify-content: space-between; align-items: center; padding: 14px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .item-row:last-child { border: none; }

        /* Navegación */
        .bottom-nav { position: fixed; bottom: 20px; left: 20px; right: 20px; height: 70px; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px); border-radius: 25px; border: 1px solid var(--border); display: flex; justify-content: space-around; align-items: center; z-index: 1000; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        .nav-item { background: none; border: none; color: var(--text-dim); font-size: 10px; font-weight: 700; display: flex; flex-direction: column; align-items: center; gap: 4px; transition: 0.3s; }
        .nav-item i { font-size: 20px; margin-bottom: 2px; }
        .nav-item.active-nav { color: var(--accent); transform: translateY(-5px); }

        #modal-ask { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); z-index: 2000; flex-direction: column; justify-content: flex-end; }
        .modal-sheet { background: var(--card); border-radius: 32px 32px 0 0; padding: 30px; animation: slideUp 0.3s ease-out; }
    </style>
</head>
<body>

    <div id="modal-ask" onclick="this.style.display='none'">
        <div class="modal-sheet" onclick="event.stopPropagation()">
            <div style="width: 40px; height: 5px; background: var(--border); border-radius: 10px; margin: 0 auto 20px;"></div>
            <h3 style="margin: 0 0 10px 0; font-weight: 800;">Programar Salida</h3>
            <p style="color: var(--text-dim); font-size: 14px; margin-bottom: 25px;">Selecciona cuándo se ejecutará este despacho para actualizar el inventario.</p>
            <button class="btn btn-main" style="margin-bottom: 12px;" onclick="confirmarGuardado(true)">📦 Salida Hoy</button>
            <button class="btn" style="background: var(--glass); color: white;" onclick="confirmarGuardado(false)">📅 Próximo Día Útil</button>
        </div>
    </div>

    <div id="header-app" class="top-header" style="display:none;">
        <div class="user-tag">
            <div class="dot"></div>
            <span id="user-display" style="font-weight: 800; font-size: 12px; letter-spacing: 0.5px;">---</span>
        </div>
        <button onclick="cerrarSesion()" style="background:none; border:none; color: var(--danger); font-weight: 700; font-size: 12px;">Cerrar</button>
    </div>

    <div id="p1" class="page active" style="text-align: center; padding-top: 15vh;">
        <div style="background: var(--grad); width: 80px; height: 80px; border-radius: 22px; margin: 0 auto 24px; display: flex; align-items: center; justify-content: center; font-size: 32px; box-shadow: 0 20px 40px rgba(0, 212, 255, 0.3);">📦</div>
        <h1 style="font-size: 32px; font-weight: 900; margin-bottom: 8px;">TWINS <span style="font-weight: 300; color: var(--accent);">ELITE</span></h1>
        <p style="color: var(--text-dim); margin-bottom: 40px;">Warehouse Management System</p>
        <div style="display: grid; gap: 12px;">
            <button class="btn" style="background: var(--card); color: white; border: 1px solid var(--border);" onclick="login('FRANCESCO')">Francesco</button>
            <button class="btn" style="background: var(--card); color: white; border: 1px solid var(--border);" onclick="login('OSCAR')">Oscar</button>
            <button class="btn" style="background: var(--card); color: white; border: 1px solid var(--border);" onclick="login('LUIS HERBER')">Luis Herber</button>
            <button class="btn" style="background: rgba(255,255,255,0.05); color: var(--text-dim);" onclick="document.getElementById('modal-pass').style.display='flex'">Acceso Admin</button>
        </div>
    </div>

    <div id="p2" class="page">
        <div class="stat-box" style="background: var(--grad); border: none; margin-bottom: 24px;">
            <span class="stat-label" style="color: rgba(255,255,255,0.7);">Cajas en Carga Actual</span>
            <span id="total-vivo" style="font-size: 48px; font-weight: 900;">0</span>
            <div style="position: absolute; right: -20px; bottom: -20px; font-size: 100px; opacity: 0.1;">📦</div>
        </div>

        <div class="card">
            <h4 style="margin: 0 0 16px 0; font-size: 14px; color: var(--accent);">DETALLE DE CARGA</h4>
            <div style="display: flex; gap: 10px;">
                <input type="text" id="cli" list="clientes-sugeridos" placeholder="Cliente / Destino" style="flex:2;">
                <input type="number" id="can" placeholder="Cajas" style="flex:1;">
            </div>
            <datalist id="clientes-sugeridos"></datalist>
            <button class="btn btn-main" onclick="addItem()">Añadir a Despacho</button>
        </div>

        <div id="area-envio" style="display:none;">
            <div class="card" id="lista-items"></div>
            <div class="card">
                <h4 style="margin: 0 0 16px 0; font-size: 14px; color: var(--accent);">ASIGNACIÓN DE RECURSOS</h4>
                <select id="pla"><option value="">Seleccionar Placa</option><option value="CEP-929">CEP-929</option><option value="BPN-711">BPN-711</option><option value="BVN-704">BVN-704</option><option value="BUL-742">BUL-742</option><option value="BVN-930">BVN-930</option></select>
                <select id="cho"><option value="">Seleccionar Chofer</option><option value="LUIS H.">Luis H.</option><option value="ROMARIO">Romario</option><option value="CESAR C.">Cesar C.</option><option value="WALDIR">Waldir</option><option value="MARCELO">Marcelo</option></select>
                <select id="aux"><option value="">Seleccionar Auxiliar</option><option value="CRISTOPHER">Cristopher</option><option value="PLACIDO">Placido</option><option value="RODOLFO">Rodolfo</option><option value="MARTIN">Martin</option></select>
                <button class="btn btn-main" style="background: var(--success); margin-top: 10px;" onclick="abrirModalGuardar()">Finalizar y Guardar</button>
            </div>
        </div>
    </div>

    <div id="p3" class="page">
        <div class="stat-grid">
            <div class="stat-box">
                <span class="stat-label">Mes Total</span>
                <span id="stat-mes" class="stat-val">0</span>
            </div>
            <div class="stat-box">
                <span class="stat-label">Filtro Hoy</span>
                <span id="stat-dia" class="stat-val" style="color: var(--success);">0</span>
            </div>
        </div>

        <div class="card" style="padding: 12px;">
            <div style="display: flex; gap: 8px;">
                <select id="f-mes" onchange="renderH()" style="margin:0; flex:1; padding:12px;">
                    <option value="ALL">Todo el Año</option>
                    <option value="0">Ene</option><option value="1">Feb</option><option value="2">Mar</option>
                </select>
                <input type="date" id="f-dia" onchange="renderH()" style="margin:0; flex:1.5; padding:12px;">
            </div>
        </div>

        <div id="h-list"></div>
    </div>

    <div id="p4" class="page">
        <h3 style="font-weight: 800; margin-bottom: 20px;">Estado de Unidades</h3>
        <div id="lista-flota"></div>
    </div>

    <nav id="nav-app" class="bottom-nav" style="display:none;">
        <button id="n2" class="nav-item" onclick="nav('p2')"><i>📦</i>Ruta</button>
        <button id="n3" class="nav-item" onclick="nav('p3')"><i>📊</i>Historial</button>
        <button id="n4" class="nav-item" onclick="nav('p4')"><i>🚛</i>Flota</button>
    </nav>

    <script>
        const URL = "https://script.google.com/macros/s/AKfycbz9V0MzUuuAHTa9N4-xrsVJV7DbkWLtgJY5xHM7_JTfIDlBxCtimM6FHjRpVczuD2kM/exec";
        let user = "", ruta = [], db = [];

        window.onload = () => {
            const lastUser = localStorage.getItem('tw_u');
            if(lastUser) login(lastUser, localStorage.getItem('tw_p') || 'p2');
            setTodayFilters();
            load();
        };

        function setTodayFilters() {
            let h = new Date();
            let f = h.getFullYear() + '-' + String(h.getMonth() + 1).padStart(2, '0') + '-' + String(h.getDate()).padStart(2, '0');
            document.getElementById('f-dia').value = f;
            document.getElementById('f-mes').value = h.getMonth().toString();
        }

        function login(n, targetPage = 'p2') { 
            user = n; localStorage.setItem('tw_u', n);
            document.getElementById('p1').style.display='none'; 
            document.getElementById('header-app').style.display='flex'; 
            document.getElementById('nav-app').style.display='flex'; 
            document.getElementById('user-display').innerText = n; 
            nav(targetPage); 
        }

        function nav(id) { 
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); 
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-nav')); 
            document.getElementById(id).classList.add('active'); 
            document.getElementById('n' + id.charAt(1)).classList.add('active-nav');
            if(id === 'p3') renderH();
            if(id === 'p4') renderFlota();
            localStorage.setItem('tw_p', id);
        }

        async function load() { 
            try { 
                const r = await fetch(URL); 
                db = await r.json(); 
                renderH(); 
                renderFlota();
            } catch(e){ console.error("Error DB"); } 
        }

        function addItem() {
            const cl = document.getElementById('cli').value.toUpperCase().trim(), ca = parseInt(document.getElementById('can').value);
            if(!cl || !ca) return; 
            ruta.unshift({cl, ca}); 
            document.getElementById('cli').value = ""; document.getElementById('can').value = ""; 
            renderR(); 
        }

        function renderR() {
            const l = document.getElementById('lista-items'); let s = 0; l.innerHTML = "";
            ruta.forEach((i, x) => { 
                s += i.ca; 
                l.innerHTML += `
                <div class="item-row">
                    <div>
                        <div style="font-weight:700;">${i.cl}</div>
                        <div style="font-size:10px; color:var(--text-dim);">DESPACHO PENDIENTE</div>
                    </div>
                    <div style="display:flex; align-items:center; gap:15px;">
                        <b style="color:var(--accent);">${i.ca} CJ</b>
                        <span onclick="removeItem(${x})" style="color:var(--danger); font-weight:900; cursor:pointer;">✕</span>
                    </div>
                </div>`; 
            });
            document.getElementById('total-vivo').innerText = s; 
            document.getElementById('area-envio').style.display = ruta.length > 0 ? 'block' : 'none';
        }

        function removeItem(x) { ruta.splice(x,1); renderR(); }

        function abrirModalGuardar() { 
            if(!document.getElementById('cho').value || !document.getElementById('pla').value) return alert("Asigna chofer y placa.");
            document.getElementById('modal-ask').style.display = 'flex'; 
        }

        async function confirmarGuardado(esHoy) {
            document.getElementById('modal-ask').style.display = 'none';
            let d = new Date();
            if(!esHoy) {
                d.setDate(d.getDate() + 1);
                if(d.getDay() === 0) d.setDate(d.getDate() + 1);
            }
            let fFinal = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');

            const r = { 
                fecha: fFinal,
                chofer: document.getElementById('cho').value, 
                auxiliar: document.getElementById('aux').value, 
                placa: document.getElementById('pla').value, 
                operario: user, 
                items: ruta.map(i => `${i.cl}:${i.ca}`).join(", "), 
                total: ruta.reduce((a,b) => a+b.ca, 0)
            };

            db.push(r);
            document.getElementById('f-dia').value = fFinal;
            nav('p3'); 
            renderH();

            fetch(URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(r) });
            
            ruta = []; renderR(); 
            document.getElementById('cho').value = ""; document.getElementById('pla').value = "";
            setTimeout(load, 3000); 
        }

        function renderH() {
            const list = document.getElementById('h-list');
            const fM = document.getElementById('f-mes').value;
            const fD = document.getElementById('f-dia').value;
            let cMes = 0, cDia = 0, html = "";

            db.slice().reverse().forEach(r => {
                let rF = r.fecha.split("T")[0];
                let rMes = new Date(rF + "T12:00:00").getMonth().toString();

                if(fM === "ALL" || rMes === fM) cMes += parseFloat(r.total);
                if(fD === rF) {
                    cDia += parseFloat(r.total);
                    html += `
                    <div class="card" onclick="alert('${r.items.replace(/,/g, '\\n')}')">
                        <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                            <span class="badge badge-success">${r.placa}</span>
                            <span style="font-size:12px; font-weight:800; color:var(--accent);">${r.total} CAJAS</span>
                        </div>
                        <div style="font-weight:700;">${r.chofer}</div>
                        <div style="font-size:11px; color:var(--text-dim); margin-top:4px;">Aux: ${r.auxiliar || 'Sin auxiliar'}</div>
                        <div style="font-size:10px; color:var(--accent); margin-top:8px; border-top:1px solid var(--border); pt:8px;">
                            Click para ver detalle de clientes
                        </div>
                    </div>`;
                }
            });
            list.innerHTML = html || "<div style='text-align:center; padding:40px; color:gray;'>No hay registros</div>";
            document.getElementById('stat-mes').innerText = Math.round(cMes);
            document.getElementById('stat-dia').innerText = Math.round(cDia);
        }

        function renderFlota() {
            const list = document.getElementById('lista-flota');
            const placas = ["CEP-929", "BPN-711", "BVN-704", "BUL-742", "BVN-930"];
            let hoy = document.getElementById('f-dia').value;
            list.innerHTML = "";
            
            placas.forEach(p => {
                let rH = db.find(r => r.placa === p && r.fecha.split('T')[0] === hoy);
                list.innerHTML += `
                <div class="card" style="display:flex; align-items:center; gap:20px; border-left: 5px solid ${rH ? 'var(--danger)' : 'var(--success)'}">
                    <div style="background: ${rH ? 'rgba(239,68,68,0.1)' : 'rgba(16,185,129,0.1)'}; width:50px; height:50px; border-radius:15px; display:flex; align-items:center; justify-content:center; font-size:20px;">
                        ${rH ? '🚚' : '🚛'}
                    </div>
                    <div style="flex:1;">
                        <div style="font-weight:800; font-size:16px;">${p}</div>
                        <div class="badge ${rH ? 'badge-busy' : 'badge-success'}">${rH ? 'Ocupado' : 'Disponible'}</div>
                    </div>
                    ${rH ? `<div style="text-align:right;"><div style="font-size:10px; color:var(--text-dim);">CHOFER</div><div style="font-weight:700; font-size:12px;">${rH.chofer}</div></div>` : ''}
                </div>`;
            });
        }

        function cerrarSesion() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
