<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TWINS ELITE - OFICIAL V11</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root {
            --bg: #0b0f17; --surface: #161c28; --accent: #007aff; 
            --text: #ffffff; --text-dim: #94a3b8; --border: #2d3748; 
            --success: #34c759; --danger: #ff3b30;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; }
        
        .page { display: none; padding: 10px 15px 120px 15px; max-width: 500px; margin: 0 auto; }
        .active { display: block !important; }

        /* HEADER */
        .top-header { position: sticky; top: 0; z-index: 1000; background: rgba(11, 15, 23, 0.9); backdrop-filter: blur(10px); padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }

        /* DATA CARDS - DISEÑO OPTIMIZADO */
        .summary-box { background: var(--surface); border: 1px solid var(--border); border-radius: 24px; padding: 20px; margin-bottom: 15px; position: relative; overflow: hidden; }
        .summary-box::before { content: ''; position: absolute; top: 0; left: 0; width: 6px; height: 100%; }
        .box-blue::before { background: var(--accent); }
        .box-green::before { background: var(--success); }

        .summary-title { font-size: 12px; font-weight: 800; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
        .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .data-point { display: flex; flex-direction: column; }
        .data-point b { font-size: 28px; font-weight: 800; color: #fff; }
        .data-point span { font-size: 11px; color: var(--text-dim); font-weight: 600; }

        /* NUEVO / RUTA (SE MANTIENE INTACTO) */
        .stat-banner { background: linear-gradient(135deg, #007aff, #0056b3); padding: 25px; border-radius: 24px; color: white; margin-bottom: 20px; }
        .input-group { display: flex; gap: 10px; margin-bottom: 15px; }
        input, select { background: var(--surface); border: 2px solid var(--border); padding: 18px; border-radius: 16px; color: white; font-size: 16px; width: 100%; }
        .btn-add { background: var(--accent); border: none; border-radius: 16px; color: white; padding: 0 25px; font-weight: 800; }
        .btn-main { background: var(--success); color: white; width: 100%; padding: 20px; border-radius: 18px; border: none; font-size: 17px; font-weight: 800; margin-top: 15px; }
        .route-item { background: var(--surface); border-radius: 16px; padding: 16px; margin-bottom: 8px; display: flex; justify-content: space-between; border: 1px solid var(--border); }

        /* NAV */
        .nav-bar { position: fixed; bottom: 20px; left: 15px; right: 15px; background: rgba(22, 28, 40, 0.95); backdrop-filter: blur(20px); height: 75px; border-radius: 22px; display: flex; border: 1px solid var(--border); z-index: 2000; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-dim); background: none; border: none; font-size: 11px; font-weight: 700; }
        .nav-item.active { color: var(--accent); }
        .nav-item i { font-size: 26px; }

        .loading-overlay { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
    </style>
</head>
<body>

    <div id="loading" class="loading-overlay">
        <i class="ph-bold ph-circle-notch-bold" style="font-size: 40px; color: var(--accent); animation: spin 1s linear infinite;"></i>
        <p style="margin-top: 15px; font-weight: 700;">Sincronizando Inventario...</p>
    </div>

    <header id="app-header" class="top-header" style="display:none">
        <div style="font-weight:900; font-size:18px;">TWINS <span style="color:var(--accent)">ELITE</span></div>
        <div id="user-info" style="font-size:11px; font-weight:800; background:rgba(255,255,255,0.05); padding:8px 15px; border-radius:12px;">---</div>
    </header>

    <div id="page-login" class="page active">
        <div style="text-align:center; padding:60px 0"><h2 style="font-weight:800;">Acceso Warehouse</h2></div>
        <div id="login-options"></div>
    </div>

    <div id="page-select-plate" class="page">
        <div style="text-align:center; padding:30px 0"><h2 style="font-weight:800;">Unidad de Carga</h2></div>
        <div id="plate-options" style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;"></div>
    </div>

    <div id="page-route" class="page">
        <div class="stat-banner">
            <div style="display:flex; justify-content:space-between; align-items:center">
                <div><small style="font-weight:800; opacity:0.8">CAJAS EN CARGA</small><div id="count-cajas" style="font-size:48px; font-weight:800;">0</div></div>
                <div style="text-align:right"><b id="active-plate-label" style="font-size:20px; display:block;">---</b><small>Puntos: <span id="count-puntos">0</span></small></div>
            </div>
        </div>
        <div class="input-group"><input type="text" id="inp-cli" placeholder="Nombre Cliente"></div>
        <div class="input-group">
            <input type="number" id="inp-can" placeholder="Cantidad" style="flex:1">
            <button class="btn-add" onclick="addPoint()"><i class="ph-bold ph-plus"></i></button>
        </div>
        <div id="live-list"></div>
        <div id="finalize-area" style="display:none; margin-top:20px; border-top:1px solid var(--border); padding-top:20px">
            <select id="sel-pla" onchange="predictAndSave()" style="margin-bottom:10px;"></select>
            <div class="input-group"><select id="sel-cho"></select><select id="sel-aux"></select></div>
            <button class="btn-main" onclick="openConfirm()">FINALIZAR DESPACHO</button>
            <button onclick="clearAll()" style="width:100%; background:none; border:none; color:var(--danger); font-weight:700; margin-top:15px;">ANULAR</button>
        </div>
    </div>

    <div id="page-history" class="page">
        <div style="padding: 10px 0 20px 0;">
            <h2 style="font-weight: 800; margin-bottom: 5px;">Data Almacén</h2>
            <p style="color: var(--text-dim); font-size: 14px;">Resumen de movimientos oficiales.</p>
        </div>

        <div class="summary-box box-blue">
            <div class="summary-title"><i class="ph-bold ph-calendar-check"></i> Acumulado del Mes</div>
            <div class="summary-grid">
                <div class="data-point">
                    <span id="label-month">---</span>
                    <b id="h-cajas-mes">0</b>
                    <span>Cajas</span>
                </div>
                <div class="data-point">
                    <span>DESPACHOS</span>
                    <b id="h-envios-mes">0</b>
                    <span>Clientes</span>
                </div>
            </div>
        </div>

        <div class="summary-box box-green">
            <div class="summary-title"><i class="ph-bold ph-clock-countdown"></i> Movimiento del Día</div>
            <div class="summary-grid">
                <div class="data-point">
                    <span id="label-today">---</span>
                    <b id="h-cajas-dia">0</b>
                    <span>Cajas</span>
                </div>
                <div class="data-point">
                    <span>DESPACHOS</span>
                    <b id="h-envios-dia">0</b>
                    <span>Clientes</span>
                </div>
            </div>
        </div>

        <div style="margin-top: 20px;">
            <div class="dash-section-title" style="color: var(--text-dim); font-size: 11px; font-weight: 800; text-transform: uppercase; margin-bottom: 10px;">Buscador de Historial</div>
            <input type="date" id="filter-date" onchange="renderHistoryList()" style="margin-bottom:15px">
            <div id="history-feed"></div>
        </div>
    </div>

    <nav id="app-nav" class="nav-bar" style="display:none">
        <button class="nav-item active" id="n-route" onclick="checkNewRoute()"><i class="ph-fill ph-plus-circle"></i>NUEVO</button>
        <button class="nav-item" id="n-history" onclick="go('page-history')"><i class="ph-fill ph-chart-pie-slice"></i>DATA</button>
    </nav>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbxuVVOZfMx8jkN-q079s6g7ppPAF4XIkNG-DEQGt6MqiownzLo3NMyWBIZ1hkTyoPBl/exec";
        let activeUser = "", currentCarga = [], db = [];
        const ASIGNACION = { "CEP-929": "ROMARIO", "BPN-711": "CESAR C.", "BVN-704": "LUIS H.", "BUL-742": "WALDIR", "BVN-930": "MARCELO" };
        const AUXILIARES = ["Cristopher", "Plácido", "Martin", "Percy", "Rodolfo", "Ricardo", "Elio", "Daniel C.", "Jofer", "Nelson", "Julio"];

        window.onload = () => {
            setupUI();
            const saved = localStorage.getItem('tw_logged');
            if(saved) login(saved);
        };

        function setupUI() {
            const opts = document.getElementById('login-options');
            ['TAJHO ADMIN', 'FRANCESCO', 'OSCAR', 'LUIS HERBER'].forEach(u => {
                opts.innerHTML += `<div class="login-btn" onclick="checkPass('${u}')" style="background:var(--surface); padding:20px; border-radius:18px; margin-bottom:10px; border:1px solid var(--border); display:flex; justify-content:space-between; font-weight:700;">${u} <i class="ph-bold ph-caret-right"></i></div>`;
            });
            document.getElementById('plate-options').innerHTML = Object.keys(ASIGNACION).map(p => 
                `<div onclick="startWithPlate('${p}')" style="background:var(--surface); border:2px solid var(--border); padding:25px 10px; border-radius:18px; color:white; font-weight:800; text-align:center;"><b>${p}</b><br><small style="font-size:10px; color:var(--accent)">${ASIGNACION[p]}</small></div>`
            ).join('');
            document.getElementById('sel-pla').innerHTML = Object.keys(ASIGNACION).map(p => `<option value="${p}">${p}</option>`).join('');
            document.getElementById('sel-cho').innerHTML = Object.values(ASIGNACION).map(c => `<option value="${c}">${c}</option>`).join('');
            document.getElementById('sel-aux').innerHTML = AUXILIARES.map(a => `<option value="${a}">${a}</option>`).join('');
        }

        function login(u) { 
            activeUser = u; 
            localStorage.setItem('tw_logged', u); 
            document.getElementById('page-login').classList.remove('active'); 
            document.getElementById('app-header').style.display = 'flex'; 
            document.getElementById('app-nav').style.display = 'flex'; 
            document.getElementById('user-info').innerText = u; 
            
            const savedPlaca = localStorage.getItem('tw_temp_placa');
            if(savedPlaca) {
                const savedRoute = localStorage.getItem('tw_temp_route');
                if(savedRoute) currentCarga = JSON.parse(savedRoute);
                document.getElementById('sel-pla').value = savedPlaca;
                document.getElementById('active-plate-label').innerText = savedPlaca;
                refreshCargaUI();
                go('page-route');
            } else {
                go('page-select-plate');
            }
            syncData();
        }

        async function syncData() {
            try {
                const r = await fetch(API);
                db = await r.json();
                processDataStats();
                document.getElementById('loading').style.display = 'none';
            } catch(e) { console.error(e); }
        }

        // FUNCIÓN CLAVE: PROCESA TODO EN UN SOLO CICLO PARA VELOCIDAD
        function processDataStats() {
            const hoy = new Date().toLocaleDateString('sv-SE');
            const mesActual = hoy.substring(0, 7);
            
            let dCjs = 0, dEnv = 0, mCjs = 0, mEnv = 0;

            for (let i = 0; i < db.length; i++) {
                const r = db[i];
                const total = parseFloat(r.total || 0);
                if (r.fecha === hoy) { dCjs += total; dEnv++; }
                if (r.fecha && r.fecha.startsWith(mesActual)) { mCjs += total; mEnv++; }
            }

            // Actualizar Cuadros
            document.getElementById('h-cajas-dia').innerText = dCjs;
            document.getElementById('h-envios-dia').innerText = dEnv;
            document.getElementById('h-cajas-mes').innerText = mCjs;
            document.getElementById('h-envios-mes').innerText = mEnv;
            
            document.getElementById('label-today').innerText = "HOY " + hoy.split('-').reverse().slice(0,2).join('/');
            document.getElementById('label-month').innerText = new Date().toLocaleString('es-ES', { month: 'long' }).toUpperCase();
        }

        function renderHistoryList() {
            const container = document.getElementById('history-feed');
            const selDate = document.getElementById('filter-date').value;
            let h = "";
            db.forEach(r => {
                if(r.fecha === selDate) {
                    h += `<div class="route-item" style="font-size:13px">
                        <span><b>${r.total}</b> ${r.placa}</span>
                        <span style="color:var(--text-dim)">${r.hora}</span>
                    </div>`;
                }
            });
            container.innerHTML = h || `<p style="text-align:center; opacity:0.3; font-size:12px">Sin registros para esta fecha</p>`;
        }

        // LÓGICA DE CARGA (INTACTA)
        function startWithPlate(p) {
            localStorage.setItem('tw_temp_placa', p);
            document.getElementById('sel-pla').value = p;
            document.getElementById('active-plate-label').innerText = p;
            if(ASIGNACION[p]) document.getElementById('sel-cho').value = ASIGNACION[p];
            go('page-route');
        }

        function addPoint() { 
            const cli = document.getElementById('inp-cli').value.toUpperCase(); 
            const can = parseInt(document.getElementById('inp-can').value); 
            if(!cli || !can) return; 
            currentCarga.push({ cli, can }); 
            localStorage.setItem('tw_temp_route', JSON.stringify(currentCarga));
            document.getElementById('inp-cli').value = ""; 
            document.getElementById('inp-can').value = ""; 
            refreshCargaUI(); 
        }

        function refreshCargaUI() { 
            const list = document.getElementById('live-list'); 
            let total = 0; list.innerHTML = ""; 
            currentCarga.forEach((it, i) => { 
                total += it.can; 
                list.innerHTML += `<div class="route-item"><span><b>${it.can}</b> ${it.cli}</span><i class="ph ph-trash" style="color:var(--danger)" onclick="removePoint(${i})"></i></div>`; 
            }); 
            document.getElementById('count-cajas').innerText = total; 
            document.getElementById('count-puntos').innerText = currentCarga.length; 
            document.getElementById('finalize-area').style.display = currentCarga.length > 0 ? 'block' : 'none'; 
        }

        function removePoint(i) { currentCarga.splice(i,1); localStorage.setItem('tw_temp_route', JSON.stringify(currentCarga)); refreshCargaUI(); }
        
        function clearAll() { 
            if(!confirm("¿Borrar carga?")) return;
            currentCarga = []; localStorage.removeItem('tw_temp_route'); localStorage.removeItem('tw_temp_placa');
            refreshCargaUI(); go('page-select-plate');
        }

        async function finalize() {
            const r = {
                fecha: new Date().toLocaleDateString('sv-SE'), 
                hora: new Date().toLocaleTimeString('es-PE', { hour: '2-digit', minute: '2-digit', hour12: false }),
                chofer: document.getElementById('sel-cho').value,
                auxiliar: document.getElementById('sel-aux').value,
                placa: document.getElementById('sel-pla').value,
                items: currentCarga.map(i => `${i.cli}: ${i.can}`).join(", "),
                total: currentCarga.reduce((a,b) => a + b.can, 0),
                operario: activeUser
            };
            fetch(API, { method: 'POST', mode: 'no-cors', body: JSON.stringify(r) });
            db.unshift(r); 
            processDataStats();
            currentCarga = []; localStorage.removeItem('tw_temp_route'); localStorage.removeItem('tw_temp_placa');
            refreshCargaUI(); go('page-history');
        }

        function go(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            let navId = id.includes('plate') ? 'n-route' : 'n-' + id.split('-')[1];
            if(document.getElementById(navId)) document.getElementById(navId).classList.add('active');
        }

        function checkPass(u) { if(u === 'TAJHO ADMIN' && prompt("Clave:") !== "1994") return; login(u); }
        function checkNewRoute() { if(localStorage.getItem('tw_temp_placa')) go('page-route'); else go('page-select-plate'); }
        function openConfirm() { if(confirm("¿Guardar despacho oficial?")) finalize(); }
        function predictAndSave() { const p = document.getElementById('sel-pla').value; if(ASIGNACION[p]) document.getElementById('sel-cho').value = ASIGNACION[p]; }
    </script>
    <style>@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }</style>
</body>
</html>
