<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TWINS ELITE - V19 PRO-DATABASE</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root {
            --bg: #0b111a; --surface: #1a222f; --accent: #007aff; 
            --text: #ffffff; --text-dim: #94a3b8; --border: #2d3748; 
            --success: #34c759; --danger: #ff3b30; --warning: #ffcc00;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; height: 100vh; overflow: hidden; }
        
        /* Estructura Scrollable */
        .page { display: none; height: 100vh; overflow-y: auto; padding: 10px 15px 140px 15px; max-width: 500px; margin: 0 auto; scroll-behavior: smooth; }
        .active { display: block !important; }

        .top-header { position: sticky; top: 0; z-index: 1000; background: rgba(11, 17, 26, 0.95); backdrop-filter: blur(15px); padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }

        /* BUSCADOR FIJO EN DATA */
        .search-box { position: sticky; top: 0; background: var(--bg); padding: 10px 0; z-index: 100; }
        .search-container { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; display: flex; align-items: center; padding: 0 15px; }
        .search-container input { background: none; border: none; color: white; padding: 14px 0; width: 100%; font-size: 14px; }

        /* TARJETAS ROBUSTAS */
        .history-card { background: var(--surface); border-radius: 18px; padding: 16px; border: 1px solid var(--border); margin-bottom: 12px; border-left: 5px solid var(--accent); }
        .h-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
        .h-header b { font-size: 18px; color: #fff; }
        .h-header span { background: rgba(52, 199, 89, 0.1); color: var(--success); padding: 4px 8px; border-radius: 6px; font-size: 11px; font-weight: 800; }
        .h-info { font-size: 12px; color: var(--text-dim); margin-bottom: 12px; line-height: 1.4; }
        
        .h-actions { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 12px; }
        .btn-act { border: none; border-radius: 10px; padding: 10px; font-size: 10px; font-weight: 800; color: white; display: flex; align-items: center; justify-content: center; gap: 4px; cursor: pointer; }
        .btn-view { background: #2d3748; }
        .btn-edit { background: #3e4c62; }
        .btn-wa { background: #128c7e; }

        /* NAVBAR */
        .nav-bar { position: fixed; bottom: 20px; left: 15px; right: 15px; background: #1c2533; height: 75px; border-radius: 22px; display: flex; border: 1px solid var(--border); z-index: 2000; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-dim); background: none; border: none; font-size: 10px; font-weight: 700; transition: 0.2s; }
        .nav-item.active { color: var(--accent); }
        .nav-item i { font-size: 26px; margin-bottom: 2px; }

        /* MODAL */
        .modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:3000; align-items:center; justify-content:center; padding:20px; }
        .modal-content { background:var(--surface); width:100%; max-width:400px; border-radius:24px; padding:25px; border:1px solid var(--border); }
        
        /* INPUTS */
        .inp-main { background: var(--surface); border: 1px solid var(--border); padding: 16px; border-radius: 14px; color: white; width: 100%; margin-bottom: 10px; font-size: 16px; }
    </style>
</head>
<body>

    <header id="app-header" class="top-header" style="display:none">
        <div style="font-weight:900; font-size:18px; letter-spacing:-0.5px;">TWINS <span style="color:var(--accent)">ELITE</span></div>
        <div id="db-status" onclick="syncData()" style="font-size:10px; font-weight:800; color:var(--text-dim); background:rgba(255,255,255,0.05); padding:5px 10px; border-radius:20px; cursor:pointer;">
            <i class="ph-bold ph-arrow-counter-clockwise"></i> <span id="sync-text">MEMORIA</span>
        </div>
    </header>

    <div id="page-login" class="page active">
        <div style="text-align:center; padding:60px 0">
            <h2 style="font-weight:800; margin:0;">Bienvenido</h2>
            <p style="color:var(--text-dim); font-size:14px;">Inicia sesión para continuar</p>
        </div>
        <div id="login-options"></div>
    </div>

    <div id="page-select-plate" class="page">
        <h3 style="margin-bottom:20px; font-weight:800;">Seleccionar Unidad</h3>
        <div id="plate-options" style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;"></div>
    </div>

    <div id="page-route" class="page">
        <div style="background: linear-gradient(135deg, #007aff, #0056b3); padding: 22px; border-radius: 24px; margin-bottom: 20px; box-shadow: 0 10px 20px rgba(0,122,255,0.2);">
            <div style="display:flex; justify-content:space-between; align-items:center">
                <div><small style="font-weight:800; opacity:0.7; font-size:10px; text-transform:uppercase;">Cajas Cargadas</small><div id="count-cajas" style="font-size:42px; font-weight:800;">0</div></div>
                <div style="text-align:right"><b id="active-plate-label" style="font-size:20px; display:block;">---</b><span id="count-puntos" style="font-size:12px; opacity:0.8;">0 clientes</span></div>
            </div>
        </div>
        <input type="text" id="inp-cli" class="inp-main" placeholder="Nombre del Cliente">
        <div style="display:flex; gap:10px; margin-bottom:20px">
            <input type="number" id="inp-can" class="inp-main" placeholder="Cant." style="flex:1; margin-bottom:0;">
            <button onclick="addPoint()" style="background:var(--accent); border:none; border-radius:14px; color:white; width:65px; font-size:24px;"><i class="ph-bold ph-plus"></i></button>
        </div>
        <div id="live-list"></div>
        <div id="finalize-area" style="display:none; margin-top:20px; border-top:1px solid var(--border); padding-top:20px">
            <button onclick="confirmFinalize()" style="background:var(--success); color:white; width:100%; padding:20px; border-radius:18px; border:none; font-weight:800; font-size:16px; box-shadow: 0 5px 15px rgba(52,199,89,0.3);">ENVIAR A EXCEL</button>
        </div>
    </div>

    <div id="page-history" class="page">
        <div class="search-box">
            <div class="search-container">
                <i class="ph-bold ph-magnifying-glass" style="color:var(--text-dim); margin-right:10px;"></i>
                <input type="text" id="search-input" placeholder="Buscar por chofer, placa o cliente..." oninput="renderHistory()">
            </div>
        </div>
        
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:20px">
            <div style="background:var(--surface); padding:15px; border-radius:18px; border-left:4px solid var(--accent)">
                <small style="font-size:10px; color:var(--text-dim); font-weight:800;">TOTAL MES</small><br><b id="h-mes" style="font-size:22px">0</b>
            </div>
            <div style="background:var(--surface); padding:15px; border-radius:18px; border-left:4px solid var(--success)">
                <small style="font-size:10px; color:var(--text-dim); font-weight:800;">TOTAL HOY</small><br><b id="h-hoy" style="font-size:22px">0</b>
            </div>
        </div>

        <div id="history-feed"></div>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <h3 id="m-title" style="margin-top:0; color:var(--accent); font-weight:800;"></h3>
            <div id="m-body" style="max-height:350px; overflow-y:auto; margin:20px 0; border-top:1px solid var(--border)"></div>
            <button onclick="closeModal()" style="width:100%; background:var(--accent); border:none; padding:16px; border-radius:14px; color:white; font-weight:800; font-size:14px;">CERRAR</button>
        </div>
    </div>

    <nav id="app-nav" class="nav-bar" style="display:none">
        <button class="nav-item" id="n-route" onclick="go('page-route')"><i class="ph-fill ph-plus-circle"></i>NUEVO</button>
        <button class="nav-item" id="n-history" onclick="go('page-history')"><i class="ph-fill ph-chart-pie-slice"></i>DATA</button>
    </nav>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbxuVVOZfMx8jkN-q079s6g7ppPAF4XIkNG-DEQGt6MqiownzLo3NMyWBIZ1hkTyoPBl/exec";
        let db = [], currentCarga = [], activeUser = "";
        const ASIGNACION = { "CEP-929": "ROMARIO", "BPN-711": "CESAR C.", "BVN-704": "LUIS H.", "BUL-742": "WALDIR", "BVN-930": "MARCELO" };

        window.onload = () => {
            // CARGA INICIAL DESDE MEMORIA LOCAL (VELOCIDAD 100%)
            const savedDB = localStorage.getItem('tw_db_v19');
            if(savedDB) {
                db = JSON.parse(savedDB);
                processStats();
                renderHistory();
            }
            
            setupUI();
            if(localStorage.getItem('tw_logged')) login(localStorage.getItem('tw_logged'));
        };

        function setupUI() {
            const l = document.getElementById('login-options');
            ['TAJHO ADMIN', 'FRANCESCO', 'OSCAR', 'LUIS HERBER'].forEach(u => {
                l.innerHTML += `<div onclick="checkPass('${u}')" style="background:var(--surface); padding:20px; border-radius:16px; margin-bottom:10px; border:1px solid var(--border); font-weight:700; display:flex; justify-content:space-between; align-items:center;">${u} <i class="ph ph-caret-right"></i></div>`;
            });
            document.getElementById('plate-options').innerHTML = Object.keys(ASIGNACION).map(p => 
                `<div onclick="startPlate('${p}')" style="background:var(--surface); border:1px solid var(--border); padding:25px 10px; border-radius:18px; font-weight:800; text-align:center; font-size:16px;">${p}</div>`
            ).join('');
        }

        async function syncData() {
            const stText = document.getElementById('sync-text');
            const stIcon = document.getElementById('db-status');
            stText.innerText = "ACTUALIZANDO...";
            stIcon.style.color = "var(--warning)";

            try {
                const r = await fetch(API);
                const newData = await r.json();
                if(newData && newData.length > 0) {
                    db = newData;
                    localStorage.setItem('tw_db_v19', JSON.stringify(db)); // GUARDAR EN MEMORIA
                    processStats();
                    renderHistory();
                    stText.innerText = "ONLINE";
                    stIcon.style.color = "var(--success)";
                }
            } catch(e) {
                stText.innerText = "ERROR SYNC";
                stIcon.style.color = "var(--danger)";
            }
        }

        function processStats() {
            const hoy = new Date().toLocaleDateString('sv-SE');
            let dC = 0, mC = 0;
            db.forEach(r => {
                const n = parseFloat(r.total || 0);
                if(r.fecha === hoy) dC += n;
                if(r.fecha && r.fecha.startsWith(hoy.substring(0, 7))) mC += n;
            });
            document.getElementById('h-hoy').innerText = dC;
            document.getElementById('h-mes').innerText = mC;
        }

        function renderHistory() {
            const container = document.getElementById('history-feed');
            const query = document.getElementById('search-input').value.toLowerCase();
            let html = "";

            // FILTRADO GLOBAL SOBRE TODA LA DB
            const filtered = db.filter(r => 
                r.placa.toLowerCase().includes(query) || 
                r.chofer.toLowerCase().includes(query) || 
                r.items.toLowerCase().includes(query)
            );

            filtered.slice(0, 50).forEach((r, idx) => {
                // Buscamos el índice original en la DB para las funciones de botones
                const originalIdx = db.indexOf(r);
                html += `
                <div class="history-card">
                    <div class="h-header">
                        <b>${r.placa}</b> 
                        <span>${r.total} CJS</span>
                    </div>
                    <div class="h-info">
                        <i class="ph-fill ph-user-circle"></i> ${r.chofer}<br>
                        <i class="ph-fill ph-calendar-blank"></i> ${r.fecha} | ${r.hora}
                    </div>
                    <div class="h-actions">
                        <button class="btn-act btn-view" onclick="viewR(${originalIdx})"><i class="ph-bold ph-eye"></i> LISTA</button>
                        <button class="btn-act btn-edit" onclick="editR(${originalIdx})"><i class="ph-bold ph-pencil"></i> EDITAR</button>
                        <button class="btn-act btn-wa" onclick="sendWA(${originalIdx})"><i class="ph-bold ph-whatsapp-logo"></i> ENVIAR</button>
                    </div>
                </div>`;
            });
            container.innerHTML = html || "<p style='text-align:center; opacity:0.3; margin-top:40px;'>No se encontraron registros</p>";
        }

        function viewR(i) {
            const r = db[i];
            document.getElementById('m-title').innerText = "Ruta " + r.placa;
            document.getElementById('m-body').innerHTML = r.items.split(',').map(li => `<div style="padding:15px; border-bottom:1px solid rgba(255,255,255,0.05); font-size:14px; font-weight:600;">${li.trim()}</div>`).join('');
            document.getElementById('modal').style.display = "flex";
        }

        function editR(i) {
            const r = db[i];
            if(confirm("¿Cargar esta ruta para editarla? Se reemplazará lo que tengas en 'NUEVO'.")) {
                localStorage.setItem('tw_temp_placa', r.placa);
                currentCarga = r.items.split(',').map(li => {
                    const p = li.split(':');
                    return { cli: p[0] ? p[0].trim() : "S/N", can: p[1] ? parseInt(p[1]) : 0 };
                });
                go('page-route'); refreshCargaUI();
            }
        }

        function sendWA(i) {
            const r = db[i];
            const msg = `*TWINS ELITE - DESPACHO*\n📦 *${r.placa}* (${r.chofer})\n📅 *${r.fecha}* | ${r.hora}\n\n*DETALLE DE CARGA:*\n${r.items.split(',').map(li => "• " + li.trim()).join('\n')}\n\n*TOTAL: ${r.total} CAJAS*`;
            window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
        }

        function closeModal() { document.getElementById('modal').style.display = "none"; }

        function login(u) {
            activeUser = u; localStorage.setItem('tw_logged', u);
            document.getElementById('page-login').classList.remove('active');
            document.getElementById('app-header').style.display = 'flex';
            document.getElementById('app-nav').style.display = 'flex';
            syncData(); go('page-history');
        }

        function checkPass(u) { if(u==='TAJHO ADMIN' && prompt("Clave:")!=="1994") return; login(u); }
        function startPlate(p) { localStorage.setItem('tw_temp_placa', p); go('page-route'); refreshCargaUI(); }

        function go(id) {
            if(id === 'page-route' && !localStorage.getItem('tw_temp_placa')) { go('page-select-plate'); return; }
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            const bid = id === 'page-select-plate' ? 'n-route' : (id === 'page-route' ? 'n-route' : 'n-history');
            document.getElementById(bid).classList.add('active');
            if(id === 'page-history') renderHistory();
        }

        function addPoint() {
            const cli = document.getElementById('inp-cli').value.toUpperCase(), can = parseInt(document.getElementById('inp-can').value);
            if(!cli || isNaN(can)) return;
            currentCarga.push({cli, can});
            document.getElementById('inp-cli').value = ""; document.getElementById('inp-can').value = "";
            refreshCargaUI();
        }

        function refreshCargaUI() {
            let t = 0; let h = "";
            document.getElementById('active-plate-label').innerText = localStorage.getItem('tw_temp_placa') || "---";
            currentCarga.forEach((it, i) => {
                t += it.can;
                h += `<div style="background:var(--surface); padding:16px; border-radius:14px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center; border:1px solid var(--border);"><span><b style="color:var(--accent); font-size:18px; margin-right:10px;">${it.can}</b> ${it.cli}</span><i class="ph-bold ph-trash" style="color:var(--danger); font-size:20px;" onclick="currentCarga.splice(${i},1);refreshCargaUI()"></i></div>`;
            });
            document.getElementById('count-cajas').innerText = t;
            document.getElementById('count-puntos').innerText = currentCarga.length + " clientes";
            document.getElementById('finalize-area').style.display = t > 0 ? 'block' : 'none';
            document.getElementById('live-list').innerHTML = h;
        }

        function confirmFinalize() { if(confirm("¿Enviar despacho al Excel oficial?")) finalize(); }

        async function finalize() {
            const p = localStorage.getItem('tw_temp_placa');
            const r = { 
                fecha: new Date().toLocaleDateString('sv-SE'), 
                hora: new Date().toLocaleTimeString('es-PE', {hour:'2-digit', minute:'2-digit', hour12:false}), 
                chofer: ASIGNACION[p], 
                placa: p, 
                items: currentCarga.map(i => `${i.cli}: ${i.can}`).join(", "), 
                total: currentCarga.reduce((a,b)=>a+b.can,0), 
                operario: activeUser 
            };

            // AGREGAR AL INICIO DE LA DB LOCAL INMEDIATAMENTE
            db.unshift(r);
            localStorage.setItem('tw_db_v19', JSON.stringify(db));
            
            // ENVIAR AL EXCEL
            fetch(API, {method:'POST', mode:'no-cors', body:JSON.stringify(r)});
            
            processStats();
            currentCarga = []; 
            localStorage.removeItem('tw_temp_placa'); 
            go('page-history');
        }
    </script>
</body>
</html>
