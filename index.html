<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TWINS LOGISTICS ELITE V17.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030712; --card: #111827; --accent: #22d3ee; 
            --text: #f3f4f6; --text-dim: #9ca3af;
            --success: #10b981; --danger: #f43f5e; --warning: #fbbf24;
            --border: rgba(255,255,255,0.05);
            --grad: linear-gradient(135deg, #22d3ee 0%, #3b82f6 100%);
        }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; outline: none; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; }
        
        .page { display: none; padding: 20px; padding-bottom: 110px; max-width: 500px; margin: 0 auto; animation: fadeIn 0.4s ease; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Header Premium */
        .top-header { position: sticky; top: 0; z-index: 100; background: rgba(3, 7, 18, 0.8); backdrop-filter: blur(15px); padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .user-pill { background: rgba(34, 211, 238, 0.1); border: 1px solid rgba(34, 211, 238, 0.2); padding: 6px 14px; border-radius: 50px; color: var(--accent); font-size: 12px; font-weight: 800; }

        /* Dashboard de Estadísticas */
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .stat-card { background: var(--card); border: 1px solid var(--border); padding: 15px; border-radius: 20px; position: relative; overflow: hidden; }
        .stat-card::after { content: ''; position: absolute; top: 0; right: 0; width: 40px; height: 40px; background: var(--accent); opacity: 0.05; border-radius: 0 0 0 100%; }
        .stat-num { font-size: 22px; font-weight: 800; display: block; margin-top: 5px; }
        .stat-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }

        /* Tarjetas */
        .card { background: var(--card); border-radius: 24px; border: 1px solid var(--border); padding: 20px; margin-bottom: 15px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        
        /* Inputs Modernos */
        input, select { width: 100%; padding: 15px; margin: 8px 0; border-radius: 14px; border: 1px solid var(--border); background: #1f2937; color: #fff; font-size: 15px; transition: all 0.3s; }
        input:focus { border-color: var(--accent); background: #111827; }

        /* Botones */
        .btn { width: 100%; padding: 18px; border-radius: 18px; border: none; font-size: 14px; font-weight: 800; cursor: pointer; transition: 0.3s; display: flex; justify-content: center; align-items: center; gap: 10px; }
        .btn-main { background: var(--grad); color: white; box-shadow: 0 4px 15px rgba(34, 211, 238, 0.3); }
        .btn-mini { padding: 10px; border-radius: 12px; font-size: 11px; flex: 1; border: 1px solid var(--border); background: rgba(255,255,255,0.03); color: white; font-weight: 700; }

        /* Navegación Inferior */
        .bottom-nav { position: fixed; bottom: 20px; left: 20px; right: 20px; height: 75px; background: rgba(17, 24, 39, 0.9); backdrop-filter: blur(20px); border-radius: 24px; border: 1px solid var(--border); display: flex; justify-content: space-around; align-items: center; z-index: 1000; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.5); }
        .nav-item { background: none; border: none; color: var(--text-dim); font-size: 10px; font-weight: 700; display: flex; flex-direction: column; align-items: center; gap: 4px; transition: 0.3s; }
        .nav-item.active-nav { color: var(--accent); transform: translateY(-5px); }
        .nav-icon { font-size: 20px; }

        /* Modales */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); z-index: 2000; justify-content: center; align-items: center; padding: 20px; }
        .modal-content { background: var(--card); border-radius: 30px; padding: 30px; width: 100%; max-width: 360px; border: 1px solid var(--border); animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { transform: translateY(20px); } to { transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="modal-pass" class="modal-overlay" onclick="this.style.display='none'">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h2 style="text-align:center; margin-bottom:20px;">Seguridad</h2>
            <input type="password" id="pass-input" placeholder="CÓDIGO ADMIN" style="text-align:center; font-size:24px; letter-spacing:5px;">
            <button class="btn btn-main" onclick="checkPass()">AUTENTICAR</button>
        </div>
    </div>

    <div id="modal-ask" class="modal-overlay" onclick="this.style.display='none'">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h3 style="margin-top:0">Programar Salida</h3>
            <p style="color:var(--text-dim); font-size:14px; margin-bottom:25px;">Selecciona cuándo saldrá esta mercadería para el control de inventario:</p>
            <button class="btn btn-main" style="margin-bottom:12px" onclick="confirmarGuardado(true)">📦 DESPACHO HOY</button>
            <button class="btn" style="background:var(--success); color:#000" onclick="confirmarGuardado(false)">📅 PRÓX. DÍA ÚTIL</button>
        </div>
    </div>

    <div id="header-app" class="top-header" style="display:none">
        <div class="user-pill"><span id="user-display">---</span></div>
        <div style="font-weight:900; letter-spacing:1px; font-size:14px;">TWINS <span style="color:var(--accent)">ELITE</span></div>
        <button onclick="cerrarSesion()" style="background:none; border:none; color:var(--danger); font-weight:800; font-size:12px;">SALIR</button>
    </div>

    <div id="p1" class="page active" style="text-align:center; padding-top:10vh">
        <div style="background:var(--grad); width:70px; height:70px; border-radius:20px; margin:0 auto 20px; display:flex; align-items:center; justify-content:center; font-size:30px; box-shadow: 0 10px 30px rgba(34, 211, 238, 0.4);">📦</div>
        <h1 style="font-size:32px; font-weight:900; margin-bottom:5px;">BIENVENIDO</h1>
        <p style="color:var(--text-dim); margin-bottom:40px;">Control de Inventario & Flota</p>
        <div style="display:grid; gap:12px;">
            <button class="btn" style="background:var(--card); border:1px solid var(--border);" onclick="document.getElementById('modal-pass').style.display='flex'">💎 TAJHO ADMIN</button>
            <button class="btn" style="background:var(--card); border:1px solid var(--border);" onclick="login('FRANCESCO')">FRANCESCO</button>
            <button class="btn" style="background:var(--card); border:1px solid var(--border);" onclick="login('OSCAR')">OSCAR</button>
            <button class="btn" style="background:var(--card); border:1px solid var(--border);" onclick="login('LUIS HERBER')">LUIS HERBER</button>
        </div>
    </div>

    <div id="p2" class="page">
        <div class="stat-card" style="background:var(--grad); border:none; margin-bottom:20px;">
            <span class="stat-label" style="color:white; opacity:0.8;">Carga Actual</span>
            <span id="total-vivo" style="font-size:45px; font-weight:900; color:white; display:block;">0</span>
        </div>

        <div class="card">
            <h4 style="margin:0 0 15px 0; color:var(--accent); font-size:13px;">NUEVO ITEM</h4>
            <div style="display:flex; gap:10px">
                <input type="text" id="cli" placeholder="Cliente / Destino" style="flex:2">
                <input type="number" id="can" placeholder="Cant" style="flex:1">
            </div>
            <button class="btn btn-main" onclick="addItem()">AÑADIR A LISTA</button>
        </div>

        <div id="area-envio" style="display:none">
            <div id="lista-items" class="card" style="padding:10px 20px;"></div>
            <div class="card">
                <h4 style="margin:0 0 15px 0; color:var(--accent); font-size:13px;">DATOS DE SALIDA</h4>
                <select id="pla"><option value="">Placa del Camión</option><option value="CEP-929">CEP-929</option><option value="BPN-711">BPN-711</option><option value="BVN-704">BVN-704</option><option value="BUL-742">BUL-742</option><option value="BVN-930">BVN-930</option></select>
                <select id="cho"><option value="">Chofer Asignado</option><option value="LUIS H.">Luis H.</option><option value="ROMARIO">Romario</option><option value="CESAR C.">Cesar C.</option><option value="WALDIR">Waldir</option><option value="MARCELO">Marcelo</option></select>
                <select id="aux"><option value="">Auxiliar de Apoyo</option><option value="CRISTOPHER">Cristopher</option><option value="PLACIDO">Placido</option><option value="RODOLFO">Rodolfo</option><option value="MARTIN">Martin</option></select>
                <button class="btn btn-main" style="background:var(--success); margin-top:10px; color:black;" onclick="abrirModalGuardar()">GUARDAR REGISTRO</button>
            </div>
        </div>
    </div>

    <div id="p3" class="page">
        <div class="stat-grid">
            <div class="stat-card"><span class="stat-label">Cajas Mes</span><span id="stat-mes-cajas" class="stat-num" style="color:var(--accent)">0</span></div>
            <div class="stat-card"><span class="stat-label">Envíos Mes</span><span id="stat-mes-envios" class="stat-num">0</span></div>
            <div class="stat-card" style="grid-column: span 2;"><span class="stat-label">Hoy Seleccionado</span><span id="stat-dia" class="stat-num" style="color:var(--success)">0 Cajas</span></div>
        </div>

        <div style="display:flex; gap:10px; margin-bottom:20px;">
            <input type="date" id="f-dia" onchange="renderH()" style="flex:2; margin:0;">
            <button class="btn" style="flex:1; padding:0; background:var(--card); border:1px solid var(--border)" onclick="load()">🔄</button>
        </div>

        <div id="h-list"></div>
    </div>

    <div id="p4" class="page">
        <h2 style="margin-bottom:20px; font-weight:800;">Estatus de Flota</h2>
        <div id="lista-flota"></div>
    </div>

    <nav id="nav-app" class="bottom-nav" style="display:none">
        <button class="nav-item" id="nav-p2" onclick="nav('p2')"><span class="nav-icon">📦</span>Ruta</button>
        <button class="nav-item" id="nav-p3" onclick="nav('p3')"><span class="nav-icon">📊</span>Historial</button>
        <button class="nav-item" id="nav-p4" onclick="nav('p4')"><span class="nav-icon">🚛</span>Flota</button>
    </nav>

    <script>
        const URL = "https://script.google.com/macros/s/AKfycbz9V0MzUuuAHTa9N4-xrsVJV7DbkWLtgJY5xHM7_JTfIDlBxCtimM6FHjRpVczuD2kM/exec";
        let user = "", ruta = [], db = [];
        const soatData = { "CEP-929": "15/05/26", "BPN-711": "22/08/26", "BVN-704": "10/01/27", "BUL-742": "05/11/26", "BVN-930": "30/09/26" };

        window.onload = () => {
            const u = localStorage.getItem('tw_u');
            if(u) login(u);
            document.getElementById('f-dia').value = new Date().toISOString().split('T')[0];
            load();
        };

        function login(n) { 
            user = n; localStorage.setItem('tw_u', n);
            document.getElementById('p1').style.display='none'; 
            document.getElementById('header-app').style.display='flex'; 
            document.getElementById('nav-app').style.display='flex'; 
            document.getElementById('user-display').innerText = n; 
            nav('p2'); 
        }

        function checkPass() {
            if(document.getElementById('pass-input').value === "2026") {
                document.getElementById('modal-pass').style.display='none';
                login('TAJHO');
            } else { alert("Código incorrecto"); }
        }

        function nav(id) { 
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); 
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-nav'));
            document.getElementById(id).classList.add('active'); 
            document.getElementById('nav-' + id).classList.add('active-nav');
            if(id === 'p3') renderH();
            if(id === 'p4') renderFlota();
        }

        async function load() { 
            try { 
                const r = await fetch(URL); 
                db = await r.json(); 
                renderH(); renderFlota(); 
            } catch(e){ console.error("Error cargando base de datos"); } 
        }

        function addItem() {
            const cl = document.getElementById('cli').value.toUpperCase(), ca = parseInt(document.getElementById('can').value);
            if(!cl || !ca) return; 
            ruta.unshift({cl, ca}); 
            document.getElementById('cli').value = ""; document.getElementById('can').value = ""; 
            renderR(); 
        }

        function renderR() {
            const l = document.getElementById('lista-items'); let s = 0; l.innerHTML = "";
            ruta.forEach((i, x) => { 
                s += i.ca; 
                l.innerHTML += `<div style="display:flex; justify-content:space-between; padding:12px 0; border-bottom:1px solid var(--border)">
                    <span>${i.cl}</span><b>${i.ca} CJ <span onclick="removeItem(${x})" style="color:var(--danger); margin-left:15px; cursor:pointer;">✕</span></b>
                </div>`; 
            });
            document.getElementById('total-vivo').innerText = s; 
            document.getElementById('area-envio').style.display = ruta.length > 0 ? 'block' : 'none';
        }

        function removeItem(x) { ruta.splice(x,1); renderR(); }

        function abrirModalGuardar() { document.getElementById('modal-ask').style.display = 'flex'; }

        async function confirmarGuardado(esHoy) {
            document.getElementById('modal-ask').style.display = 'none';
            let d = new Date();
            if(!esHoy) {
                d.setDate(d.getDate() + 1);
                if(d.getDay() === 0) d.setDate(d.getDate() + 1);
            }
            let fFinal = d.toISOString().split('T')[0];

            const r = { 
                fecha: fFinal, 
                chofer: document.getElementById('cho').value, 
                auxiliar: document.getElementById('aux').value, 
                placa: document.getElementById('pla').value, 
                operario: user, 
                items: ruta.map(i => `${i.cl}:${i.ca}`).join(", "), 
                total: ruta.reduce((a,b) => a+b.ca, 0)
            };

            db.push(r);
            document.getElementById('f-dia').value = fFinal;
            nav('p3'); renderH();

            fetch(URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(r) });
            ruta = []; renderR();
            setTimeout(load, 3000);
        }

        function renderH() {
            const list = document.getElementById('h-list'), fD = document.getElementById('f-dia').value;
            let cMes = 0, eMes = 0, cDia = 0, html = "";
            
            const currentMonth = new Date().getMonth();

            db.slice().reverse().forEach(r => {
                let rDate = new Date(r.fecha);
                let rF = r.fecha.split("T")[0];
                
                if(rDate.getMonth() === currentMonth) {
                    cMes += parseFloat(r.total);
                    eMes++;
                }

                if(fD === rF) {
                    cDia += parseFloat(r.total);
                    html += `<div class="card">
                        <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                            <span style="background:var(--accent); color:#000; padding:3px 8px; border-radius:6px; font-size:10px; font-weight:800;">${r.placa}</span>
                            <b style="color:var(--accent)">${r.total} CJ</b>
                        </div>
                        <div style="font-size:14px; font-weight:700;">${r.chofer} <span style="font-weight:400; color:var(--text-dim); font-size:12px;">/ ${r.auxiliar || 'Sin Aux'}</span></div>
                        <div style="font-size:11px; color:var(--text-dim); margin:8px 0; line-height:1.4;">${r.items}</div>
                        <div style="display:flex; gap:8px; margin-top:10px;">
                            <button class="btn-mini" onclick="editarRuta('${r.items}', '${r.chofer}', '${r.placa}', '${r.auxiliar}')">EDITAR</button>
                            <button class="btn-mini" onclick="sendWA('${r.fecha}', '${r.chofer}', '${r.total}', '${r.items}')">WHATSAPP</button>
                        </div>
                    </div>`;
                }
            });
            list.innerHTML = html || "<p style='text-align:center; color:gray; padding:20px;'>No hay despachos para esta fecha.</p>";
            document.getElementById('stat-mes-cajas').innerText = Math.round(cMes);
            document.getElementById('stat-mes-envios').innerText = eMes;
            document.getElementById('stat-dia').innerText = Math.round(cDia) + " Cajas";
        }

        function editarRuta(items, cho, pla, aux) {
            ruta = items.split(", ").map(i => { const [cl, ca] = i.split(":"); return {cl, ca: parseInt(ca)}; });
            document.getElementById('cho').value = cho;
            document.getElementById('pla').value = pla;
            document.getElementById('aux').value = aux;
            renderR(); nav('p2');
        }

        function sendWA(f, c, t, i) {
            let m = `*📦 DESPACHO TWINS*\n*Fecha:* ${f.split('T')[0]}\n*Chofer:* ${c}\n*Cajas:* ${t}\n\n*CLIENTES:*\n${i.replace(/:/g, ': ').replace(/,/g, '\n')}`;
            window.location.href = `https://wa.me/?text=${encodeURIComponent(m)}`;
        }

        function renderFlota() {
            const list = document.getElementById('lista-flota'), fD = document.getElementById('f-dia').value;
            const placas = ["CEP-929", "BPN-711", "BVN-704", "BUL-742", "BVN-930"];
            list.innerHTML = "";
            placas.forEach(p => {
                let rH = db.find(r => r.placa === p && r.fecha.split('T')[0] === fD);
                list.innerHTML += `<div class="card" style="border-left: 5px solid ${rH ? 'var(--danger)' : 'var(--success)'}">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <div>
                            <div style="font-weight:800; font-size:16px;">${p}</div>
                            <div style="font-size:10px; color:var(--text-dim);">SOAT: ${soatData[p]}</div>
                        </div>
                        <div style="text-align:right;">
                            <span style="font-size:10px; font-weight:800; color:${rH ? 'var(--danger)' : 'var(--success)'}">${rH ? 'EN RUTA' : 'DISPONIBLE'}</span>
                            <div style="font-size:12px; font-weight:700;">${rH ? rH.chofer : 'Libre'}</div>
                        </div>
                    </div>
                </div>`;
            });
        }

        function cerrarSesion() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
