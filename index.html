<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TWINS ELITE - V66.9 OFICIAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root {
            --bg: #f4f6f8; --surface: #ffffff; --accent: #000000; 
            --text: #111827; --text-dim: #6b7280; --border: #e5e7eb; 
            --gold: #FFD700; --silver: #C0C0C0; --bronze: #CD7F32; --green: #10b981; --red: #ef4444;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { margin: 0; background: var(--bg); color: var(--text); padding-bottom: 100px; }

        #login-screen { position: fixed; inset: 0; background: #000; z-index: 5000; display: flex; align-items: center; justify-content: center; padding: 25px; }
        .login-card { background: #fff; width: 100%; max-width: 400px; padding: 40px 25px; border-radius: 35px; text-align: center; }

        .page { display: none; padding: 20px; max-width: 600px; margin: 0 auto; animation: fade 0.2s ease; }
        .active { display: block; }
        @keyframes fade { from { opacity: 0; } to { opacity: 1; } }

        .core-dash { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .master-card { background: #fff; padding: 18px; border-radius: 24px; border: 1px solid var(--border); display: flex; flex-direction: column; justify-content: space-between; height: 120px; }
        .master-card.black { background: #000; color: #fff; border: none; }
        
        .route-card { background: #fff; border-radius: 24px; padding: 16px; margin-bottom: 12px; border: 1px solid var(--border); }
        .card-crew { font-size: 10px; font-weight: 700; color: #4b5563; margin: 8px 0; padding: 8px 12px; background: #f9fafb; border-radius: 12px; display: flex; justify-content: space-between; }
        .card-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: 10px; border-top: 1px solid #eee; padding-top: 10px; }
        .btn-card { background: #fff; border: 1px solid #eee; padding: 10px; border-radius: 12px; font-weight: 800; font-size: 10px; text-transform: uppercase; color: var(--text); }

        /* Barra de Capacidad en Carga */
        .cap-container { background: #eee; height: 12px; border-radius: 10px; margin: 15px 0; overflow: hidden; position: relative; }
        .cap-bar { background: var(--accent); height: 100%; transition: width 0.4s ease; width: 0%; }
        .cap-text { font-size: 11px; font-weight: 800; display: flex; justify-content: space-between; margin-bottom: 5px; }

        .nav-bottom { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; height: 85px; display: none; border-top: 1px solid var(--border); z-index: 1000; }
        .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #9ca3af; background: none; border: none; font-size: 10px; font-weight: 800; }
        .nav-btn.active { color: #000; }
        .field { background: #fff; border: 1px solid var(--border); border-radius: 16px; padding: 16px; width: 100%; font-size: 15px; font-weight: 700; outline: none; margin-bottom: 12px; }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); display: none; align-items: flex-end; z-index: 2000; }
        .modal-content { background: #fff; width: 100%; border-radius: 35px 35px 0 0; padding: 30px 20px; max-height: 85vh; overflow-y: auto; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-card">
            <h2 style="font-weight:900; margin-bottom:20px;">Twins Elite</h2>
            <select id="user-select" class="field" onchange="checkUserType()">
                <option value="">Seleccione Usuario</option>
                <option value="TAJHO">TAJHO</option>
                <option value="FRANCHESCO">FRANCHESCO</option>
                <option value="OSCAR">OSCAR</option>
                <option value="LUIS HERBER">LUIS HERBER</option>
            </select>
            <input type="password" id="pass-field" class="field" placeholder="Contraseña Admin" style="display:none;">
            <button onclick="login()" style="width:100%; padding:20px; background:#000; color:#fff; border-radius:20px; font-weight:800; border:none; margin-top:10px;">ACCEDER</button>
        </div>
    </div>

    <div id="page-dash" class="page active">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h1 style="font-weight:900; margin:0;">Historial</h1>
            <button onclick="logout()" style="border:none; background:none; font-size:24px; color:var(--red);"><i class="ph-bold ph-power"></i></button>
        </div>
        <div class="core-dash">
            <div class="master-card black">
                <div><span style="font-size:10px; font-weight:800; opacity:0.6;">HOY</span><span id="stat-hoy-cajas" style="display:block; font-size:28px; font-weight:900;">0</span></div>
                <span id="stat-hoy-envios" style="font-size:11px; font-weight:800; opacity:0.6;">0 RUTAS</span>
            </div>
            <div class="master-card">
                <div><span style="font-size:10px; font-weight:800; opacity:0.6;">MES</span><span id="stat-mes-cajas" style="display:block; font-size:28px; font-weight:900;">0</span></div>
                <span id="stat-mes-envios" style="font-size:11px; font-weight:800; opacity:0.6;">0 RUTAS</span>
            </div>
        </div>
        <div id="hist-cont"></div>
    </div>

    <div id="page-load" class="page">
        <h2 id="load-placa-txt" style="font-size:32px; font-weight:900; margin-bottom:5px;">---</h2>
        
        <div class="cap-text">
            <span>CAPACIDAD DE CARGA</span>
            <span id="cap-num">0 / 150 CJS</span>
        </div>
        <div class="cap-container">
            <div id="load-bar" class="cap-bar"></div>
        </div>

        <div style="display:flex; gap:10px; margin-bottom:15px;">
            <input type="text" id="i-cli" placeholder="Cliente" class="field" style="flex:2; margin:0">
            <input type="number" id="i-can" placeholder="Cjs" class="field" style="flex:1; margin:0">
        </div>
        <button onclick="addItem()" style="width:100%; padding:20px; background:#000; color:#fff; border-radius:20px; font-weight:800; border:none;">AGREGAR</button>
        <div id="load-list" style="margin-top:20px;"></div>
        <button id="btn-save" onclick="save()" style="display:none; width:100%; padding:22px; background:var(--green); color:#fff; border-radius:22px; font-weight:900; border:none; margin-top:20px;">GUARDAR RUTA</button>
    </div>

    <div id="page-units" class="page">
        <h1 style="font-weight:900; margin-bottom:20px;">Despacho</h1>
        <div id="units-grid" style="display:grid; grid-template-columns:1fr 1fr; gap:15px;"></div>
    </div>

    <div id="page-config" class="page">
        <div style="background:#000; color:#fff; padding:30px; border-radius:30px; margin-bottom:25px; text-align:center;"><h2 id="conf-placa" style="margin:0; font-size:36px;">---</h2></div>
        <input type="date" id="c-fecha" class="field">
        <select id="c-chofer" class="field"></select>
        <select id="c-aux" class="field"></select>
        <button onclick="goLoad()" style="width:100%; padding:20px; background:#000; color:#fff; border-radius:20px; font-weight:800; border:none;">INICIAR CARGA</button>
    </div>

    <div id="modal-crew" class="modal">
        <div class="modal-content">
            <h3 style="font-weight:900; margin-bottom:20px;">Editar Equipo</h3>
            <select id="qe-chofer" class="field"></select>
            <select id="qe-aux" class="field"></select>
            <button onclick="saveQuickCrew()" style="width:100%; margin-top:10px; padding:20px; border-radius:20px; background:#000; color:#fff; border:none; font-weight:800;">ACTUALIZAR</button>
            <button onclick="closeCrew()" style="width:100%; margin-top:10px; padding:15px; border-radius:20px; background:#eee; border:none; font-weight:800;">CANCELAR</button>
        </div>
    </div>

    <nav class="nav-bottom" id="main-nav">
        <button class="nav-btn" id="n-units" onclick="go('page-units')"><i class="ph-bold ph-plus-circle"></i>NUEVA</button>
        <button class="nav-btn active" id="n-dash" onclick="go('page-dash')"><i class="ph-bold ph-clock-counter-clockwise"></i>HISTORIAL</button>
        <button class="nav-btn" id="n-data" onclick="go('page-data')"><i class="ph-bold ph-chart-bar"></i>DATA</button>
    </nav>

    <script>
        const CLOUD_URL = "https://script.google.com/macros/s/AKfycbzkIqN5__aLRTfyeJSWAAB-pUmt54kGsv4Ex2KWz_dgAvrCT_Gty05uZelf6gbcL4p7/exec";
        let db = JSON.parse(localStorage.getItem('twins_v63_db')) || [];
        let cur = { items: [] };
        let userAuth = JSON.parse(localStorage.getItem('twins_auth')) || null;
        let quickEditId = null;

        const FLOTA = { "CEP-929": "ROMARIO", "BPN-711": "CESAR C.", "BVN-704": "LUIS H.", "BUL-742": "WALDIR", "BVN-930": "MARCELO" };
        const CAPACIDADES = { "CEP-929": 200, "BPN-711": 150, "BVN-704": 150, "BUL-742": 150, "BVN-930": 150 };
        const CONDUCTORES = ["TAJHO", "ROMARIO", "CESAR C.", "LUIS H.", "WALDIR", "MARCELO"];
        const AUXILIARES = ["POR ASIGNAR", "CRISTOPHER", "PERCY", "PLACIDO", "RODOLFO", "RICARDO", "ELIO", "JOFER", "MARTIN", "NELSON"];

        window.onload = () => {
            const ug = document.getElementById('units-grid');
            for(let p in FLOTA) ug.innerHTML += `<div style="background:#fff; padding:25px; border-radius:24px; text-align:center; border:1px solid var(--border);" onclick="initConf('${p}')"><i class="ph-bold ph-truck" style="font-size:28px;"></i><br><b>${p}</b></div>`;
            const sc = document.getElementById('c-chofer'), sa = document.getElementById('c-aux');
            const qec = document.getElementById('qe-chofer'), qea = document.getElementById('qe-aux');
            CONDUCTORES.forEach(c => { sc.innerHTML += `<option value="${c}">${c}</option>`; qec.innerHTML += `<option value="${c}">${c}</option>`; });
            AUXILIARES.forEach(a => { sa.innerHTML += `<option value="${a}">${a}</option>`; qea.innerHTML += `<option value="${a}">${a}</option>`; });
            if(userAuth) applyAuth();
            renderStats(); renderHistory();
        };

        function checkUserType() { const u = document.getElementById('user-select').value; document.getElementById('pass-field').style.display = (u === 'TAJHO') ? 'block' : 'none'; }
        function login() { const u = document.getElementById('user-select').value; const p = document.getElementById('pass-field').value; if(!u) return; if(u === 'TAJHO' && p !== '1994') { alert("Clave Incorrecta"); return; } userAuth = { name: u, admin: (u === 'TAJHO') }; localStorage.setItem('twins_auth', JSON.stringify(userAuth)); applyAuth(); }
        function logout() { localStorage.removeItem('twins_auth'); location.reload(); }
        function applyAuth() { document.getElementById('login-screen').style.display = 'none'; document.getElementById('main-nav').style.display = 'flex'; pullCloudData(); }

        async function pullCloudData() {
            try {
                const res = await fetch(CLOUD_URL);
                const cloud = await res.json();
                if(cloud && Array.isArray(cloud)) { db = cloud; localStorage.setItem('twins_v63_db', JSON.stringify(db)); renderStats(); renderHistory(); }
            } catch(e){}
        }

        function go(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'page-dash') renderHistory();
        }

        function initConf(p) { 
            const hoy = new Date().toLocaleDateString('en-CA'); 
            cur = { id: 'R'+Date.now(), placa: p, items: [], fecha: hoy, chofer: FLOTA[p], auxiliar: "POR ASIGNAR" }; 
            document.getElementById('conf-placa').innerText = p; 
            document.getElementById('c-fecha').value = hoy; 
            go('page-config'); 
        }

        function goLoad() { 
            cur.fecha = document.getElementById('c-fecha').value; 
            cur.chofer = document.getElementById('c-chofer').value; 
            cur.auxiliar = document.getElementById('c-aux').value; 
            document.getElementById('load-placa-txt').innerText = cur.placa; 
            refreshLoad(); go('page-load'); 
        }

        function addItem() { 
            const cli = document.getElementById('i-cli').value.toUpperCase().trim(); 
            const can = parseInt(document.getElementById('i-can').value); 
            if(cli && can) { cur.items.push({cli, can}); refreshLoad(); document.getElementById('i-cli').value=""; document.getElementById('i-can').value=""; } 
        }

        function refreshLoad() { 
            const total = cur.items.reduce((a,b)=>a+b.can, 0); 
            const capMax = CAPACIDADES[cur.placa] || 150;
            const perc = Math.min((total / capMax) * 100, 100);
            
            document.getElementById('load-bar').style.width = perc + "%";
            document.getElementById('cap-num').innerText = `${total} / ${capMax} CJS`;
            document.getElementById('btn-save').style.display = total>0 ? 'block' : 'none';
            document.getElementById('load-list').innerHTML = cur.items.map((it, i) => `
                <div style="display:flex; justify-content:space-between; padding:15px; background:#fff; border-radius:15px; border:1px solid #eee; margin-bottom:10px;">
                    <span><i class="ph-bold ph-trash" style="color:var(--red); margin-right:12px;" onclick="cur.items.splice(${i},1); refreshLoad();"></i>${it.cli}</span>
                    <b>${it.can}</b>
                </div>`).reverse().join(''); 
        }

        // CORRECCIÓN DUPLICIDAD
        function save() { 
            const idx = db.findIndex(r => r.id === cur.id); 
            if(idx > -1) db[idx] = JSON.parse(JSON.stringify(cur)); 
            else db.unshift(JSON.parse(JSON.stringify(cur)));
            
            localStorage.setItem('twins_v63_db', JSON.stringify(db)); 
            fetch(CLOUD_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(cur) });
            cur = { items: [] }; renderStats(); go('page-dash'); 
        }

        function renderHistory() {
            document.getElementById('hist-cont').innerHTML = db.map(r => `
                <div class="route-card">
                    <div style="display:flex; justify-content:space-between; font-size:10px; font-weight:800; color:var(--text-dim);">
                        <span>📅 ${r.fecha.split('T')[0]}</span>
                        <span>${r.placa}</span>
                    </div>
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-top:5px;">
                        <b style="font-size:24px;">${r.items ? r.items.reduce((a,b)=>a+b.can,0) : 0} CJS</b>
                        <b>${r.items ? r.items.length : 0} CLI.</b>
                    </div>
                    <div class="card-crew"><span>👤 ${r.chofer}</span><span>👥 ${r.auxiliar}</span></div>
                    <div class="card-actions">
                        <button onclick="openCrew('${r.id}')" class="btn-card">Equipo</button>
                        <button onclick="editR('${r.id}')" class="btn-card">Editar</button>
                        <button onclick="shareW('${r.id}')" class="btn-card" style="border-color:var(--green); color:var(--green);">WhatsApp</button>
                    </div>
                </div>`).join('');
        }

        function openCrew(id) { quickEditId = id; const r = db.find(x => x.id === id); document.getElementById('qe-chofer').value = r.chofer; document.getElementById('qe-aux').value = r.auxiliar; document.getElementById('modal-crew').style.display = 'flex'; }
        
        function saveQuickCrew() { 
            const idx = db.findIndex(x => x.id === quickEditId); 
            if(idx > -1) { 
                db[idx].chofer = document.getElementById('qe-chofer').value; 
                db[idx].auxiliar = document.getElementById('qe-aux').value; 
                localStorage.setItem('twins_v63_db', JSON.stringify(db)); 
                fetch(CLOUD_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(db[idx]) });
                renderHistory(); closeCrew(); 
            } 
        }

        function closeCrew() { document.getElementById('modal-crew').style.display = 'none'; }
        function editR(id) { const r = db.find(x => x.id === id); if(r) { cur = JSON.parse(JSON.stringify(r)); document.getElementById('load-placa-txt').innerText = cur.placa; refreshLoad(); go('page-load'); } }
        
        function shareW(id) { 
            const r = db.find(x => x.id === id); 
            let msg = `*TWINS ELITE*%0A📅 *FECHA:* ${r.fecha.split('T')[0]}%0A🚛 *UNIDAD:* ${r.placa}%0A👤 *CHOFER:* ${r.chofer}%0A🤝 *AUX:* ${r.auxiliar}%0A📦 *TOTAL:* ${r.items.reduce((a,b)=>a+b.can,0)} Cjs`; 
            window.location.href = "https://api.whatsapp.com/send?text=" + msg; 
        }

        function renderStats() {
            const hoy = new Date().toLocaleDateString('en-CA');
            const rHoy = db.filter(r => r.fecha.includes(hoy));
            const sum = (a) => a.reduce((x,y) => x + (y.items ? y.items.reduce((z,w)=>z+w.can,0) : 0), 0);
            document.getElementById('stat-hoy-cajas').innerText = sum(rHoy);
            document.getElementById('stat-hoy-envios').innerText = rHoy.length + " RUTAS";
        }
    </script>
</body>
</html>
