<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TWINS ELITE - V46.5 CORE</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root {
            --bg: #fdfdfd; --surface: #ffffff; --accent: #000000; 
            --text: #000000; --text-dim: #6b7280; --border: #e5e7eb; 
            --success: #000000; --shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { margin: 0; background: var(--bg); color: var(--text); padding-bottom: 100px; }

        .page { display: none; padding: 20px; max-width: 550px; margin: 0 auto; animation: fade 0.3s ease; }
        .active { display: block; }
        @keyframes fade { from { opacity: 0; } to { opacity: 1; } }

        /* Dos Cuadros Maestros */
        .core-dash { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .master-card { background: var(--surface); padding: 20px; border-radius: 28px; border: 2px solid var(--accent); box-shadow: var(--shadow); position: relative; }
        .master-card i { position: absolute; right: 15px; top: 15px; font-size: 20px; opacity: 0.2; }
        .master-card.black { background: var(--accent); color: #fff; }
        .master-card.black .stat-label { color: rgba(255,255,255,0.7); }
        .stat-label { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 5px; }
        .stat-main { font-size: 28px; font-weight: 900; }
        .stat-sub { font-size: 11px; font-weight: 600; display: block; margin-top: 2px; }

        /* Tarjetas de Ruta Intel */
        .route-card { background: #fff; border-radius: 28px; padding: 22px; margin-bottom: 15px; border: 1px solid var(--border); box-shadow: var(--shadow); }
        .route-actions { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 20px; }
        .action-btn { border: 1px solid var(--border); border-radius: 16px; padding: 14px 5px; font-size: 10px; font-weight: 800; background: #fff; color: var(--text); display: flex; flex-direction: column; align-items: center; gap: 6px; }
        .action-btn.wa { background: #000; color: #fff; border: none; }

        .input-box { background: #f3f4f6; border: 2px solid transparent; border-radius: 20px; padding: 18px; width: 100%; font-size: 16px; font-weight: 700; outline: none; transition: 0.2s; }
        .input-box:focus { background: #fff; border-color: var(--accent); }

        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; height: 80px; display: flex; border-top: 1px solid var(--border); z-index: 1000; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-dim); background: none; border: none; font-size: 10px; font-weight: 800; gap: 5px; }
        .nav-item.active { color: var(--accent); }
        .nav-item i { font-size: 26px; }

        #sync-loader { display: none; position: fixed; top: 0; left: 0; right: 0; height: 4px; background: #000; z-index: 5000; overflow: hidden; }
        #sync-loader::after { content: ""; display: block; width: 40%; height: 100%; background: #fff; animation: move 1s infinite linear; }
        @keyframes move { from { margin-left: -40%; } to { margin-left: 100%; } }
    </style>
</head>
<body>

    <div id="sync-loader"></div>

    <div id="page-dash" class="page active">
        <h2 style="font-weight: 900; letter-spacing: -1.5px; margin-bottom: 25px; font-size: 28px;">Gestión de Rutas</h2>
        
        <div class="core-dash">
            <div class="master-card black">
                <i class="ph-fill ph-package"></i>
                <span class="stat-label">Hoy</span>
                <span id="stat-cajas-hoy" class="stat-main">0</span>
                <span id="stat-envios-hoy" class="stat-sub">0 ENVÍOS</span>
            </div>
            <div class="master-card">
                <i class="ph-fill ph-calendar"></i>
                <span class="stat-label">Mes</span>
                <span id="stat-cajas-mes" class="stat-main">0</span>
                <span id="stat-envios-mes" class="stat-sub">0 ENVÍOS</span>
            </div>
        </div>

        <div id="history-container"></div>
    </div>

    <div id="page-units" class="page">
        <h2 style="font-weight:900;">Nueva Unidad</h2>
        <div id="units-grid" style="display:grid; grid-template-columns:1fr 1fr; gap:12px;"></div>
    </div>

    <div id="page-assign" class="page">
        <h2 id="title-placa" style="font-weight:900; font-size:32px;">---</h2>
        <div style="background:white; padding:25px; border-radius:32px; border:1px solid var(--border); box-shadow: var(--shadow);">
            <label class="stat-label">Fecha despacho</label>
            <select id="sel-date" class="input-box" style="margin-bottom:15px;">
                <option value="hoy">Para Hoy</option>
                <option value="mañana" selected>Para Mañana</option>
            </select>
            <label class="stat-label">Equipo asignado</label>
            <select id="sel-chofer" class="input-box" style="margin-bottom:10px;"></select>
            <select id="sel-aux" class="input-box"></select>
            <button onclick="confirmAssign()" class="input-box" style="background:var(--accent); color:#fff; border:none; margin-top:25px; font-weight:900; height:70px;">COMENZAR CARGA</button>
        </div>
    </div>

    <div id="page-load" class="page">
        <div style="background:#000; color:#fff; padding:25px; border-radius:32px; margin-bottom:15px; display:flex; justify-content:space-between; align-items:center;">
            <div>
                <h3 id="load-placa" style="margin:0; font-weight:900; font-size:24px;">---</h3>
                <span id="load-meta" style="font-size:11px; font-weight:700; opacity:0.6;"></span>
            </div>
            <span id="load-total" style="font-size:36px; font-weight:900;">0</span>
        </div>
        
        <div style="background:white; padding:25px; border-radius:32px; border:1px solid var(--border); box-shadow: var(--shadow);">
            <input type="text" id="inp-cli" placeholder="Nombre Cliente" class="input-box" style="margin-bottom:12px;" list="suggest-clients">
            <datalist id="suggest-clients"></datalist>
            <div style="display:flex; gap:10px;">
                <input type="number" id="inp-can" placeholder="Cjs" class="input-box" style="flex:1;">
                <button onclick="addItem()" style="background:#000; color:#fff; border:none; border-radius:20px; width:80px; font-size:30px;"><i class="ph-bold ph-plus"></i></button>
            </div>
            <div id="items-list" style="margin-top:25px;"></div>
        </div>
        <button id="btn-finish" onclick="saveAndSync()" class="input-box" style="display:none; background:#000; color:#fff; border:none; margin-top:20px; font-weight:900; height:70px;">GUARDAR EN EXCEL</button>
    </div>

    <nav class="nav-bar">
        <button class="nav-item active" id="n-dash" onclick="go('page-dash')"><i class="ph-fill ph-chart-bar"></i>HISTORIAL</button>
        <button class="nav-item" id="n-units" onclick="go('page-units')"><i class="ph-fill ph-plus-circle"></i>NUEVA</button>
    </nav>

    <script>
        const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycby59273ThmezjUQ9-AB6Gx5O8G6J6zMB7SAtzImDhUfEoXBlCx-mT9h4AvzVI_2C56O/exec';

        let db = JSON.parse(localStorage.getItem('twins_core_v46')) || [];
        let clientsRegistry = JSON.parse(localStorage.getItem('twins_clients')) || [];
        let current = { items: [] };

        const FLOTA = { "CEP-929": "ROMARIO", "BPN-711": "CESAR C.", "BVN-704": "LUIS H.", "BUL-742": "WALDIR", "BVN-930": "MARCELO" };
        const CONDUCTORES = ["TAJHO", "ROMARIO", "CESAR C.", "LUIS H.", "WALDIR", "MARCELO"];
        const AUXILIARES = ["POR DEFINIR", "CRISTOPHER", "PERCY", "PLACIDO", "RODOLFO", "RICARDO", "ELIO", "JOFER", "MARTIN", "NELSON", "JULIO", "DANIEL C."];

        window.onload = () => {
            const sc = document.getElementById('sel-chofer'), sa = document.getElementById('sel-aux'), ug = document.getElementById('units-grid');
            CONDUCTORES.forEach(c => sc.innerHTML += `<option value="${c}">${c}</option>`);
            AUXILIARES.forEach(a => sa.innerHTML += `<option value="${a}">${a}</option>`);
            for(let p in FLOTA) ug.innerHTML += `<div style="background:white; padding:30px; border-radius:24px; text-align:center; font-weight:900; border:1px solid var(--border); font-size:18px;" onclick="startAssign('${p}')">${p}</div>`;
            renderHistory(); renderStats();
        };

        function startAssign(p) {
            const hoy = new Date().toISOString().split('T')[0];
            const duplicate = db.find(r => r.placa === p && r.fecha === hoy);
            if(duplicate && !confirm(`Ojo: La unidad ${p} ya fue registrada hoy. ¿Duplicar?`)) return;

            current = { placa: p, items: [], id: 'R' + Date.now() };
            document.getElementById('title-placa').innerText = p;
            document.getElementById('sel-chofer').value = FLOTA[p] || CONDUCTORES[0];
            go('page-assign');
        }

        function confirmAssign() {
            current.chofer = document.getElementById('sel-chofer').value;
            current.auxiliar = document.getElementById('sel-aux').value;
            let d = new Date(); 
            if(document.getElementById('sel-date').value === 'mañana') d.setDate(d.getDate() + 1);
            current.fecha = d.toISOString().split('T')[0];
            refreshLoadUI(); go('page-load');
        }

        function addItem() {
            const cli = document.getElementById('inp-cli').value.toUpperCase().trim(), 
                  can = parseInt(document.getElementById('inp-can').value);
            if(!cli || isNaN(can)) return;
            
            current.items.push({cli, can});
            if(!clientsRegistry.includes(cli)) {
                clientsRegistry.push(cli);
                localStorage.setItem('twins_clients', JSON.stringify(clientsRegistry));
                document.getElementById('suggest-clients').innerHTML += `<option value="${cli}">`;
            }

            document.getElementById('inp-cli').value = ""; 
            document.getElementById('inp-can').value = "";
            document.getElementById('inp-cli').focus();
            refreshLoadUI();
        }

        function refreshLoadUI() {
            document.getElementById('load-placa').innerText = current.placa;
            document.getElementById('load-meta').innerText = `Ruta: ${current.fecha}`;
            let t = current.items.reduce((a,b)=>a+b.can,0);
            document.getElementById('load-total').innerText = t;
            document.getElementById('items-list').innerHTML = current.items.map((it, i) => `
                <div style="display:flex; justify-content:space-between; padding:15px; border-bottom:1px solid #eee; font-weight:800; background:#f9f9f9; border-radius:12px; margin-bottom:8px;">
                    <span>${it.can} <small>•</small> ${it.cli}</span>
                    <i class="ph-bold ph-trash" style="color:red" onclick="current.items.splice(${i},1);refreshLoadUI()"></i>
                </div>`).reverse().join('');
            document.getElementById('btn-finish').style.display = t > 0 ? 'block' : 'none';
        }

        async function saveAndSync() {
            const idx = db.findIndex(x => x.id === current.id);
            if(idx > -1) db[idx] = current; else db.unshift(current);
            localStorage.setItem('twins_core_v46', JSON.stringify(db));
            
            document.getElementById('sync-loader').style.display = 'block';
            
            try {
                await fetch(WEB_APP_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(current) });
            } catch (e) { console.log("Excel Offline"); }

            setTimeout(() => {
                document.getElementById('sync-loader').style.display = 'none';
                go('page-dash'); renderHistory(); renderStats();
            }, 1000);
        }

        function renderStats() {
            const hoy = new Date().toISOString().split('T')[0];
            const mes = hoy.substring(0,7);
            const dataHoy = db.filter(r => r.fecha === hoy);
            const dataMes = db.filter(r => r.fecha.startsWith(mes));

            document.getElementById('stat-cajas-hoy').innerText = dataHoy.reduce((a,b)=>a+b.items.reduce((x,y)=>x+y.can,0), 0);
            document.getElementById('stat-envios-hoy').innerText = dataHoy.length + " ENVÍOS";
            document.getElementById('stat-cajas-mes').innerText = dataMes.reduce((a,b)=>a+b.items.reduce((x,y)=>x+y.can,0), 0);
            document.getElementById('stat-envios-mes').innerText = dataMes.length + " ENVÍOS";
        }

        function renderHistory() {
            const container = document.getElementById('history-container');
            container.innerHTML = "";
            const hoy = new Date().toISOString().split('T')[0];
            let mañana = new Date(); mañana.setDate(mañana.getDate() + 1); mañana = mañana.toISOString().split('T')[0];

            renderBlock(container, "Próximos Despachos", db.filter(r => r.fecha === mañana));
            renderBlock(container, "Registros de Hoy", db.filter(r => r.fecha === hoy));
        }

        function renderBlock(cont, titulo, items) {
            if(items.length === 0) return;
            cont.innerHTML += `<div style="font-size:12px; font-weight:900; margin:30px 0 15px 5px; text-transform:uppercase;">${titulo}</div>`;
            items.forEach(r => {
                const total = r.items.reduce((a,b)=>a+b.can,0);
                cont.innerHTML += `
                <div class="route-card">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <div>
                            <b style="font-size:22px;">${r.placa}</b>
                            <div style="font-size:11px; color:var(--text-dim); font-weight:700;">${r.chofer} | ${r.items.length} Clientes</div>
                        </div>
                        <div style="text-align:right;">
                            <b style="font-size:26px; color:#000;">${total}</b>
                            <div style="font-size:9px; font-weight:900;">CAJAS</div>
                        </div>
                    </div>
                    <div class="route-actions">
                        <button class="action-btn" onclick="viewItems('${r.id}')"><i class="ph-bold ph-list"></i>VER</button>
                        <button class="action-btn" onclick="editRoute('${r.id}')"><i class="ph-bold ph-pencil"></i>EDITAR</button>
                        <button class="action-btn wa" onclick="sendWA('${r.id}')"><i class="ph-bold ph-whatsapp-logo"></i>WHATSAPP</button>
                    </div>
                </div>`;
            });
        }

        function viewItems(id) {
            const r = db.find(x => x.id === id);
            alert(`DETALLE ${r.placa}:\n\n` + r.items.map(i => `${i.cli}: ${i.can} Cjs`).join('\n'));
        }

        function editRoute(id) {
            current = JSON.parse(JSON.stringify(db.find(x => x.id === id)));
            refreshLoadUI(); go('page-load');
        }

        function sendWA(id) {
            const r = db.find(x => x.id === id);
            const msg = `*TWINS ELITE*\n🚛 *UNIDAD:* ${r.placa}\n👤 *CHOFER:* ${r.chofer}\n📅 *RUTA:* ${r.fecha}\n\n*DETALLE:*\n${r.items.map(i=>`• ${i.cli}: ${i.can}`).join('\n')}\n\n*TOTAL: ${r.items.reduce((a,b)=>a+b.can,0)} Cjs*`;
            window.location.href = "whatsapp://send?text=" + encodeURIComponent(msg);
        }

        function go(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id === 'page-dash' ? 'n-dash' : 'n-units').classList.add('active');
            if(id === 'page-dash') renderStats();
        }
    </script>
</body>
</html>
