<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TWINS ELITE - V42 PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root {
            --bg: #f8fafc; --surface: #ffffff; --accent: #0062ff; 
            --text: #0f172a; --text-dim: #64748b; --border: #e2e8f0; 
            --success: #10b981; --danger: #f43f5e;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { margin: 0; background: var(--bg); color: var(--text); padding-bottom: 90px; }

        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; height: 70px; display: flex; border-top: 1px solid var(--border); z-index: 1000; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-dim); background: none; border: none; font-size: 10px; font-weight: 700; }
        .nav-item.active { color: var(--accent); }
        .nav-item i { font-size: 22px; margin-bottom: 2px; }

        .page { display: none; padding: 15px; max-width: 500px; margin: 0 auto; animation: fadeIn 0.2s ease; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .stat-card { padding: 12px; border-radius: 18px; border: 1px solid var(--border); background: #fff; }
        .stat-card.blue { background: var(--accent); color: #fff; border: none; }

        .card { background: #fff; border-radius: 18px; padding: 15px; border: 1px solid var(--border); margin-bottom: 10px; }
        .card-actions { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 12px; border-top: 1px solid var(--border); padding-top: 12px; }
        
        .btn-act { border: none; border-radius: 10px; padding: 10px; font-size: 11px; font-weight: 800; display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--text-dim); background: var(--bg); }
        .btn-act.wa { color: #10b981; background: #ecfdf5; }
        .btn-act i { font-size: 18px; }

        .input-box { background: #fff; border: 1px solid var(--border); border-radius: 14px; padding: 14px; width: 100%; font-size: 16px; font-weight: 600; margin-bottom: 10px; outline: none; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; align-items: center; justify-content: center; z-index: 2000; padding: 15px; backdrop-filter: blur(4px); }
        .modal-content { background: #fff; border-radius: 25px; padding: 20px; width: 100%; max-height: 80vh; overflow-y: auto; }
        
        .chip { padding: 10px 14px; background: var(--bg); border-radius: 10px; font-size: 12px; font-weight: 700; margin: 4px; display: inline-block; }
    </style>
</head>
<body>

    <div id="page-dashboard" class="page active">
        <div class="stats-grid">
            <div class="stat-card blue">
                <span style="font-size:9px; font-weight:800; opacity:0.8;">MES</span>
                <div style="font-size:20px; font-weight:900;" id="m-cajas">0</div>
                <div style="font-size:11px; font-weight:700;" id="m-envios">0 ENVÍOS</div>
            </div>
            <div class="stat-card">
                <span style="font-size:9px; font-weight:800; color:var(--accent);">HOY</span>
                <div style="font-size:20px; font-weight:900;" id="d-cajas">0</div>
                <div style="font-size:11px; font-weight:700; color:var(--accent);" id="d-envios">0 ENVÍOS</div>
            </div>
        </div>
        <input type="text" id="smart-search" placeholder="Buscar..." class="input-box" oninput="renderHistory()">
        <div id="history-feed"></div>
    </div>

    <div id="page-assign" class="page">
        <h3 style="font-weight:800;" id="assign-title">Nueva Ruta</h3>
        <div class="card">
            <label style="font-size:10px; font-weight:800;">CONDUCTOR:</label>
            <select id="sel-chofer" class="input-box"></select>
            
            <label style="font-size:10px; font-weight:800;">AUXILIAR:</label>
            <select id="sel-aux" class="input-box"></select>
            
            <div style="margin: 15px 0; padding: 10px; background: #fff9db; border-radius: 12px; font-size: 12px; font-weight: 700;">
                <i class="ph-bold ph-calendar"></i> ¿Sale hoy? 
                <input type="checkbox" id="check-hoy" style="margin-left:10px;" onchange="toggleAuxWarning()">
            </div>
            
            <button onclick="startCarga()" class="input-box" style="background:var(--accent); color:#fff; border:none; margin-top:10px;">EMPEZAR CARGA</button>
            <button onclick="go('page-select-plate')" style="width:100%; border:none; background:none; font-weight:700; color:var(--text-dim);">VOLVER</button>
        </div>
    </div>

    <div id="page-route" class="page">
        <div class="card" style="background:var(--text); color:#fff; border:none;">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <div><h2 id="route-placa" style="margin:0;">---</h2><span id="route-meta" style="font-size:11px; opacity:0.7;">---</span></div>
                <div style="font-size:28px; font-weight:900;" id="count-cajas">0</div>
            </div>
        </div>
        <div class="card" style="margin-top:10px;">
            <input type="text" id="inp-cli" placeholder="Cliente" class="input-box">
            <div style="display:flex; gap:8px;">
                <input type="number" id="inp-can" placeholder="Cajas" class="input-box" style="flex:1;">
                <button onclick="addPoint()" style="background:var(--accent); color:#fff; border:none; border-radius:14px; width:65px; font-size:28px;">+</button>
            </div>
            <div id="live-list" style="margin-top:15px;"></div>
        </div>
        <button id="btn-save" onclick="saveFinal()" class="input-box" style="display:none; background:var(--success); color:#fff; border:none; padding:20px; font-size:16px;">GUARDAR DESPACHO</button>
    </div>

    <div id="page-select-plate" class="page"><h3 style="font-weight:800;">Elegir Unidad</h3><div id="plate-grid"></div></div>

    <div id="modal-view" class="modal"><div class="modal-content"><h4 id="v-title"></h4><div id="v-list"></div><button onclick="closeModals()" class="input-box" style="margin-top:15px;">CERRAR</button></div></div>

    <div id="modal-wa" class="modal"><div class="modal-content">
        <h3><i class="ph-fill ph-whatsapp-logo" style="color:#10b981"></i> Enviar Reporte</h3>
        <label style="font-size:10px; font-weight:800;">CHOFER:</label>
        <input type="text" id="wa-chofer" class="input-box">
        <label style="font-size:10px; font-weight:800;">AUXILIAR:</label>
        <div id="wa-chips"></div>
        <input type="text" id="wa-aux" class="input-box">
        <button onclick="sendWA()" class="input-box" style="background:#10b981; color:#fff; border:none;">ENVIAR A WHATSAPP</button>
        <button onclick="closeModals()" style="width:100%; background:none; border:none; padding:10px;">CANCELAR</button>
    </div></div>

    <nav class="nav-bar">
        <button class="nav-item active" id="n-dashboard" onclick="go('page-dashboard')"><i class="ph-fill ph-chart-pie"></i>CONTROL</button>
        <button class="nav-item" id="n-route" onclick="go('page-select-plate')"><i class="ph-fill ph-plus-circle"></i>NUEVO</button>
    </nav>

    <script>
        let db = JSON.parse(localStorage.getItem('tw_db_v42') || '[]');
        let current = { items: [] }, isEdit = false, activeId = null;
        const FLOTA = { "CEP-929": "ROMARIO", "BPN-711": "CESAR C.", "BVN-704": "LUIS H.", "BUL-742": "WALDIR", "BVN-930": "MARCELO" };
        const CONDUCTORES = ["TAJHO", "ROMARIO", "CESAR C.", "LUIS H.", "WALDIR", "MARCELO", "RELEVO 1"];
        const AUXILIARES = ["POR DEFINIR", "CRISTOPHER", "PERCY", "PLACIDO", "RODOLFO", "RICARDO", "ELIO", "JOFER", "MARTIN", "NELSON", "JULIO", "DANIEL C."];

        window.onload = () => { setupSelects(); setupPlates(); renderHistory(); renderStats(); };

        function setupSelects() {
            const sc = document.getElementById('sel-chofer'), sa = document.getElementById('sel-aux');
            CONDUCTORES.forEach(d => sc.innerHTML += `<option value="${d}">${d}</option>`);
            AUXILIARES.forEach(a => sa.innerHTML += `<option value="${a}">${a}</option>`);
            const chips = document.getElementById('wa-chips');
            AUXILIARES.slice(1).forEach(a => chips.innerHTML += `<span class="chip" onclick="setWAux('${a}')">${a}</span>`);
        }

        function setupPlates() {
            const g = document.getElementById('plate-grid');
            for(let p in FLOTA) g.innerHTML += `<div class="card" onclick="initRoute('${p}')" style="font-weight:800; padding:20px; text-align:center;">${p}</div>`;
        }

        function initRoute(p) {
            isEdit = false;
            current = { placa: p, chofer: FLOTA[p], auxiliar: "POR DEFINIR", items: [] };
            document.getElementById('assign-title').innerText = p;
            document.getElementById('sel-chofer').value = FLOTA[p];
            document.getElementById('sel-aux').value = "POR DEFINIR";
            go('page-assign');
        }

        function startCarga() {
            current.chofer = document.getElementById('sel-chofer').value;
            current.auxiliar = document.getElementById('sel-aux').value;
            current.fecha = document.getElementById('check-hoy').checked ? new Date().toISOString().split('T')[0] : 'PROGRAMADO';
            refreshCargaUI(); go('page-route');
        }

        function addPoint() {
            const cli = document.getElementById('inp-cli').value.toUpperCase(), can = parseInt(document.getElementById('inp-can').value);
            if(!cli || !can) return;
            current.items.push({cli, can});
            document.getElementById('inp-cli').value = ""; document.getElementById('inp-can').value = "";
            refreshCargaUI();
        }

        function refreshCargaUI() {
            document.getElementById('route-placa').innerText = current.placa;
            document.getElementById('route-meta').innerText = `${current.chofer} | ${current.auxiliar}`;
            let t = 0, h = "";
            current.items.forEach((it, i) => {
                t += it.can;
                h += `<div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #eee; font-size:14px;">
                    <span><b>${it.can}</b> ${it.cli}</span>
                    <i class="ph-bold ph-trash" style="color:var(--danger)" onclick="current.items.splice(${i},1);refreshCargaUI()"></i>
                </div>`;
            });
            document.getElementById('count-cajas').innerText = t;
            document.getElementById('live-list').innerHTML = h;
            document.getElementById('btn-save').style.display = t > 0 ? 'block' : 'none';
        }

        function saveFinal() {
            if(isEdit) {
                db[db.findIndex(x => x.id === activeId)] = current;
            } else {
                current.id = 'ID' + Date.now();
                if(current.fecha === 'PROGRAMADO') {
                    let d = new Date(); d.setDate(d.getDate()+1);
                    current.fecha = d.toISOString().split('T')[0];
                }
                db.unshift(current);
            }
            localStorage.setItem('tw_db_v42', JSON.stringify(db));
            go('page-dashboard'); renderHistory(); renderStats();
        }

        function renderHistory() {
            const q = document.getElementById('smart-search').value.toLowerCase();
            let h = "";
            db.filter(r => JSON.stringify(r).toLowerCase().includes(q)).slice(0,25).forEach(r => {
                const total = r.items.reduce((a,b)=>a+b.can,0);
                h += `<div class="card">
                    <div style="display:flex; justify-content:space-between;">
                        <b style="font-size:16px;">${r.placa}</b>
                        <b style="color:var(--accent);">${total} CJS</b>
                    </div>
                    <div style="font-size:11px; color:var(--text-dim); margin:4px 0;">${r.chofer} | ${r.auxiliar}</div>
                    <div class="card-actions">
                        <button class="btn-act" onclick="viewItems('${r.id}')"><i class="ph-bold ph-eye"></i>LISTA</button>
                        <button class="btn-act" onclick="editItems('${r.id}')"><i class="ph-bold ph-pencil-simple"></i>EDITAR</button>
                        <button class="btn-act wa" onclick="prepWA('${r.id}')"><i class="ph-fill ph-whatsapp-logo"></i>WHATSAPP</button>
                    </div>
                </div>`;
            });
            document.getElementById('history-feed').innerHTML = h;
        }

        function viewItems(id) {
            const r = db.find(x => x.id === id);
            document.getElementById('v-title').innerText = r.placa;
            document.getElementById('v-list').innerHTML = r.items.map(i => `<div style="padding:8px; border-bottom:1px solid #eee;"><b>${i.can}</b> ${i.cli}</div>`).join('');
            document.getElementById('modal-view').style.display = 'flex';
        }

        function editItems(id) {
            isEdit = true; activeId = id;
            current = JSON.parse(JSON.stringify(db.find(x => x.id === id)));
            refreshCargaUI(); go('page-route');
        }

        function prepWA(id) {
            activeId = id;
            const r = db.find(x => x.id === id);
            document.getElementById('wa-chofer').value = r.chofer;
            document.getElementById('wa-aux').value = r.auxiliar === "POR DEFINIR" ? "" : r.auxiliar;
            document.getElementById('modal-wa').style.display = 'flex';
        }

        function setWAux(n) { document.getElementById('wa-aux').value = n; }

        function sendWA() {
            const r = db.find(x => x.id === activeId);
            r.chofer = document.getElementById('wa-chofer').value;
            r.auxiliar = document.getElementById('wa-aux').value || "POR DEFINIR";
            localStorage.setItem('tw_db_v42', JSON.stringify(db));
            
            const total = r.items.reduce((a,b)=>a+b.can,0);
            const msg = `*TWINS ELITE*\n📦 *Unidad:* ${r.placa}\n👤 *Chofer:* ${r.chofer}\n🤝 *Auxiliar:* ${r.auxiliar}\n📅 *Fecha:* ${r.fecha}\n\n*TOTAL: ${total} CAJAS*`;
            window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
            closeModals(); renderHistory();
        }

        function renderStats() {
            const h = new Date().toISOString().split('T')[0];
            const dH = db.filter(r => r.fecha === h);
            document.getElementById('d-cajas').innerText = dH.reduce((a,b)=>a+b.items.reduce((x,y)=>x+y.can,0), 0);
            document.getElementById('d-envios').innerText = dH.reduce((a,b)=>a+b.items.length, 0);
            document.getElementById('m-cajas').innerText = db.reduce((a,b)=>a+b.items.reduce((x,y)=>x+y.can,0), 0);
            document.getElementById('m-envios').innerText = db.reduce((a,b)=>a+b.items.length, 0);
        }

        function go(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            if(id === 'page-dashboard') document.getElementById('n-dashboard').classList.add('active');
        }
        function closeModals() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }
        function toggleAuxWarning() { 
            if(document.getElementById('check-hoy').checked) {
                alert("Ruta para hoy: Por favor asegúrate de elegir el auxiliar correcto.");
            }
        }
    </script>
</body>
</html>
