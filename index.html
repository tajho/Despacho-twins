<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TWINS ELITE - V52.5</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root {
            --bg: #f4f7f6; --surface: #ffffff; --accent: #000000; 
            --text: #1a1a1a; --text-dim: #71717a; --border: #e4e4e7; 
            --gold: #fbbf24; --silver: #94a3b8; --bronze: #92400e;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { margin: 0; background: var(--bg); color: var(--text); padding-bottom: 100px; }

        .page { display: none; padding: 20px; max-width: 600px; margin: 0 auto; animation: fade 0.2s ease; }
        .active { display: block; }
        @keyframes fade { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        /* Buscador Flotante */
        .search-bar { position: sticky; top: 15px; background: rgba(255,255,255,0.8); backdrop-filter: blur(12px); z-index: 100; padding: 10px; border-radius: 20px; border: 1px solid var(--border); display: flex; gap: 8px; margin-bottom: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .search-input { background: transparent; border: none; flex: 1; font-size: 14px; font-weight: 600; outline: none; padding-left: 5px; }
        
        /* Stats Compactas */
        .core-dash { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .master-card { background: #fff; padding: 15px; border-radius: 20px; border: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
        .master-card i { font-size: 24px; padding: 10px; background: #f4f4f5; border-radius: 12px; }
        .master-card.black { background: #000; color: #fff; border: none; }
        .master-card.black i { background: #333; color: #fff; }
        .stat-val { font-size: 20px; font-weight: 800; display: block; }
        .stat-lbl { font-size: 9px; font-weight: 700; text-transform: uppercase; opacity: 0.6; }

        /* Timeline Historial (Menos aglomerado) */
        .section-tag { font-size: 11px; font-weight: 800; color: var(--accent); text-transform: uppercase; margin: 30px 0 15px 5px; display: flex; align-items: center; gap: 10px; }
        .section-tag::after { content: ''; flex: 1; height: 1px; background: var(--border); }
        
        .route-card { background: #fff; border-radius: 22px; padding: 18px; margin-bottom: 12px; border: 1px solid var(--border); }
        .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px; }
        .placa-box { background: #f4f4f5; padding: 4px 10px; border-radius: 8px; font-weight: 800; font-size: 14px; }
        .cjs-box { text-align: right; }
        .cjs-box b { font-size: 20px; font-weight: 900; color: #000; }
        .info-row { display: flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 600; color: var(--text-dim); margin-top: 4px; }

        .route-actions { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; padding-top: 15px; border-top: 1px solid #f1f1f4; }
        .btn-act { border: none; background: #f8f9fa; border-radius: 12px; padding: 8px; font-size: 10px; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 6px; color: #444; }
        .btn-act.black { background: #000; color: #fff; }

        /* Nav */
        .nav-bottom { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; height: 75px; display: flex; border-top: 1px solid var(--border); z-index: 1000; padding: 0 10px; }
        .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #a1a1aa; background: none; border: none; font-size: 10px; font-weight: 700; }
        .nav-btn.active { color: #000; }
        .nav-btn i { font-size: 22px; margin-bottom: 4px; }

        /* Formularios */
        .field { background: #fff; border: 1px solid var(--border); border-radius: 14px; padding: 14px; width: 100%; font-size: 15px; font-weight: 600; outline: none; margin-bottom: 10px; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 2000; padding: 20px; backdrop-filter: blur(4px); }
        .modal-box { background: #fff; border-radius: 24px; padding: 20px; width: 100%; max-height: 80vh; overflow-y: auto; }
    </style>
</head>
<body>

    <div id="page-dash" class="page active">
        <div class="search-bar">
            <i class="ph-bold ph-magnifying-glass" style="color:gray"></i>
            <input type="text" id="main-search" class="search-input" placeholder="Buscar chofer, placa o cliente..." oninput="renderSmartHistory()">
            <input type="date" id="date-picker" onchange="renderSmartHistory()" style="border:none; font-size:12px; font-weight:800; outline:none; background:transparent;">
        </div>

        <div class="core-dash">
            <div class="master-card black">
                <i class="ph-bold ph-package"></i>
                <div><span id="stat-hoy-cajas" class="stat-val">0</span><span class="stat-lbl">Hoy</span></div>
            </div>
            <div class="master-card">
                <i class="ph-bold ph-funnel"></i>
                <div><span id="stat-fil-cajas" class="stat-val">0</span><span class="stat-lbl">Filtrado</span></div>
            </div>
        </div>

        <div id="smart-history"></div>
    </div>

    <div id="page-data" class="page">
        <h1 style="font-weight:900; font-size:24px;">Rendimiento</h1>
        <input type="month" id="f-month" class="field" onchange="renderData()">
        <div id="rankings-cont"></div>
    </div>

    <div id="page-units" class="page">
        <h1 style="font-weight:900; font-size:24px; margin-bottom:20px;">Nueva Carga</h1>
        <div id="units-grid" style="display:grid; grid-template-columns:1fr 1fr; gap:12px;"></div>
    </div>

    <div id="page-load" class="page">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2 id="view-placa-load" style="margin:0">---</h2>
            <div style="text-align:right;"><b id="view-total-load" style="font-size:24px;">0</b><span class="stat-lbl" style="display:block">CJS</span></div>
        </div>
        <input type="text" id="i-cli" placeholder="Nombre del Cliente" class="field">
        <input type="number" id="i-can" placeholder="Cantidad Cajas" class="field">
        <button onclick="addItem()" style="width:100%; padding:16px; background:#000; color:#fff; border-radius:14px; font-weight:800; border:none; margin-bottom:20px;">+ AGREGAR CLIENTE</button>
        <div id="load-list"></div>
        <button id="btn-save" onclick="saveRoute()" style="display:none; width:100%; padding:18px; background:#10b981; color:#fff; border:none; border-radius:16px; font-weight:800; margin-top:20px;">GUARDAR REGISTRO</button>
    </div>

    <nav class="nav-bottom">
        <button class="nav-btn active" id="n-dash" onclick="go('page-dash')"><i class="ph-bold ph-house-simple"></i>INICIO</button>
        <button class="nav-btn" id="n-units" onclick="go('page-units')"><i class="ph-bold ph-plus-circle"></i>NUEVA</button>
        <button class="nav-btn" id="n-data" onclick="go('page-data')"><i class="ph-bold ph-chart-bar"></i>DATA</button>
    </nav>

    <div id="modal-view" class="modal"><div class="modal-box"><h3 id="m-title" style="margin-top:0"></h3><div id="m-body"></div><button onclick="closeModal()" class="field" style="margin-top:20px; background:#000; color:#fff;">CERRAR</button></div></div>

    <script>
        let db = JSON.parse(localStorage.getItem('twins_v50_db')) || [];
        let current = { items: [] };

        const FLOTA = { "CEP-929": "ROMARIO", "BPN-711": "CESAR C.", "BVN-704": "LUIS H.", "BUL-742": "WALDIR", "BVN-930": "MARCELO" };
        const CONDUCTORES = ["TAJHO", "ROMARIO", "CESAR C.", "LUIS H.", "WALDIR", "MARCELO"];
        const AUXILIARES = ["CRISTOPHER", "PERCY", "PLACIDO", "RODOLFO", "RICARDO", "ELIO", "JOFER", "MARTIN", "NELSON"];

        window.onload = () => {
            document.getElementById('f-month').value = new Date().toISOString().substring(0,7);
            const ug = document.getElementById('units-grid');
            for(let p in FLOTA) ug.innerHTML += `<div style="background:#fff; padding:25px 10px; border-radius:20px; text-align:center; font-weight:800; border:1px solid var(--border);" onclick="startRoute('${p}')">${p}</div>`;
            renderSmartHistory(); renderStats();
        };

        // --- LÓGICA DE CARGA ---
        function startRoute(p) {
            current = { id: 'R'+Date.now(), placa: p, chofer: FLOTA[p], auxiliar: AUXILIARES[0], fecha: new Date().toISOString().split('T')[0], items: [] };
            document.getElementById('view-placa-load').innerText = p;
            refreshLoadList();
            go('page-load');
        }

        function addItem() {
            const cli = document.getElementById('i-cli').value.toUpperCase().trim();
            const can = parseInt(document.getElementById('i-can').value);
            if(!cli || !can) return;
            current.items.push({cli, can});
            document.getElementById('i-cli').value = ""; document.getElementById('i-can').value = "";
            refreshLoadList();
        }

        function refreshLoadList() {
            const total = current.items.reduce((a,b)=>a+b.can, 0);
            document.getElementById('view-total-load').innerText = total;
            document.getElementById('btn-save').style.display = total > 0 ? 'block' : 'none';
            document.getElementById('load-list').innerHTML = current.items.map((it, i) => `
                <div style="display:flex; justify-content:space-between; padding:12px; background:#fff; border-radius:12px; border:1px solid #eee; margin-bottom:8px; font-weight:700; font-size:13px;">
                    <span>${it.can} • ${it.cli}</span>
                    <i class="ph-bold ph-trash" style="color:#ef4444" onclick="current.items.splice(${i},1);refreshLoadList()"></i>
                </div>`).reverse().join('');
        }

        function saveRoute() {
            const idx = db.findIndex(r => r.id === current.id);
            if(idx > -1) db[idx] = current; else db.unshift(current);
            localStorage.setItem('twins_v50_db', JSON.stringify(db));
            go('page-dash'); renderSmartHistory(); renderStats();
        }

        // --- HISTORIAL ---
        function renderSmartHistory() {
            const q = document.getElementById('main-search').value.toLowerCase();
            const d = document.getElementById('date-picker').value;
            const cont = document.getElementById('smart-history');
            const hoy = new Date().toISOString().split('T')[0];

            let filtered = db.filter(r => {
                const textMatch = r.chofer.toLowerCase().includes(q) || r.placa.toLowerCase().includes(q) || r.items.some(i => i.cli.toLowerCase().includes(q));
                const dateMatch = d ? r.fecha === d : true;
                return textMatch && dateMatch;
            });

            document.getElementById('stat-fil-cajas').innerText = filtered.reduce((a,b)=>a+b.items.reduce((x,y)=>x+y.can,0),0);

            let html = "";
            const sections = { "Hoy": filtered.filter(r => r.fecha === hoy), "Anteriores": filtered.filter(r => r.fecha !== hoy) };

            for(let key in sections) {
                if(sections[key].length) {
                    html += `<div class="section-tag">${key}</div>`;
                    sections[key].forEach(r => {
                        const total = r.items.reduce((a,b)=>a+b.can,0);
                        html += `
                        <div class="route-card">
                            <div class="card-top">
                                <div>
                                    <span class="placa-box">${r.placa}</span>
                                    <div class="info-row" style="margin-top:10px;"><i class="ph-bold ph-steering-wheel"></i> ${r.chofer}</div>
                                    <div class="info-row"><i class="ph-bold ph-users"></i> ${r.auxiliar}</div>
                                </div>
                                <div class="cjs-box"><b>${total}</b><span class="stat-lbl" style="display:block">CAJAS</span></div>
                            </div>
                            <div class="route-actions">
                                <button class="btn-act" onclick="viewRoute('${r.id}')"><i class="ph-bold ph-eye"></i> Ver</button>
                                <button class="btn-act" onclick="editRoute('${r.id}')"><i class="ph-bold ph-pencil-simple"></i> Edit</button>
                                <button class="btn-act black" onclick="shareWA('${r.id}')"><i class="ph-bold ph-whatsapp-logo"></i> WA</button>
                            </div>
                        </div>`;
                    });
                }
            }
            cont.innerHTML = html || '<div style="text-align:center; padding:40px; color:gray;">No hay registros</div>';
        }

        // --- ACCIONES ---
        function viewRoute(id) {
            const r = db.find(x => x.id === id);
            document.getElementById('m-title').innerText = `Ruta ${r.placa} - ${r.fecha}`;
            document.getElementById('m-body').innerHTML = r.items.map(i => `<div style="display:flex; justify-content:space-between; padding:12px; border-bottom:1px solid #f4f4f5; font-weight:600;"><span>${i.cli}</span><b>${i.can} CJS</b></div>`).join('');
            document.getElementById('modal-view').style.display = 'flex';
        }

        function editRoute(id) {
            current = JSON.parse(JSON.stringify(db.find(x => x.id === id)));
            document.getElementById('view-placa-load').innerText = current.placa;
            refreshLoadList();
            go('page-load');
        }

        function shareWA(id) {
            const r = db.find(x => x.id === id);
            let txt = `*REPORTE DE CARGA - ${r.placa}*%0A_Fecha: ${r.fecha}_%0A_Chofer: ${r.chofer}_%0A%0A`;
            r.items.forEach(i => txt += `• ${i.can} Cjs - ${i.cli}%0A`);
            txt += `%0A*TOTAL: ${r.items.reduce((a,b)=>a+b.can,0)} CAJAS*`;
            window.open(`https://api.whatsapp.com/send?text=${txt}`);
        }

        function closeModal() { document.getElementById('modal-view').style.display = 'none'; }

        function go(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(n => n.classList.remove('active'));
            document.getElementById('n-'+id.split('-')[1]).classList.add('active');
            window.scrollTo(0,0);
        }

        function renderStats() {
            const hoy = new Date().toISOString().split('T')[0];
            const rH = db.filter(r => r.fecha === hoy);
            document.getElementById('stat-hoy-cajas').innerText = rH.reduce((a,b)=>a+b.items.reduce((x,y)=>x+y.can,0),0);
        }
    </script>
</body>
</html>
