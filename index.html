<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TWINS LOGISTICS FORTRRESS V56</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #0a0c10; --surface: #14171d; --card: #1c2128;
            --accent: #0071ff; --text: #f8fafc; --text-dim: #94a3b8;
            --border: #2d333b; --success: #22c55e; --danger: #ef4444;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { 
            margin: 0; background: var(--bg); color: var(--text); 
            font-family: 'Plus Jakarta Sans', sans-serif; font-size: 14px;
        }

        .page { display: none; padding: 15px; padding-bottom: 100px; max-width: 600px; margin: 0 auto; }
        .active { display: block !important; animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Header */
        .top-nav { 
            position: sticky; top: 0; z-index: 1000; background: rgba(10, 12, 16, 0.9);
            backdrop-filter: blur(10px); padding: 15px 20px; display: flex; 
            justify-content: space-between; border-bottom: 1px solid var(--border);
        }

        /* Widgets de Resumen */
        .dashboard-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .summary-box { background: var(--surface); border: 1px solid var(--border); padding: 15px; border-radius: 20px; text-align: center; }
        .summary-box b { font-size: 22px; color: var(--accent); display: block; }
        .summary-box small { font-size: 10px; text-transform: uppercase; color: var(--text-dim); }

        /* Formulario y Lista de Carga */
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 18px; margin-bottom: 12px; }
        input, select { background: var(--surface); border: 1px solid var(--border); padding: 14px; border-radius: 12px; color: white; width: 100%; margin-bottom: 10px; font-family: inherit; }
        
        .point-tag { 
            display: flex; justify-content: space-between; align-items: center; 
            background: rgba(255,255,255,0.03); padding: 12px; border-radius: 12px; 
            margin-bottom: 8px; border: 1px solid var(--border);
        }

        /* Botones */
        .btn { border: none; border-radius: 12px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.1s; }
        .btn-p { background: var(--accent); color: white; width: 100%; padding: 15px; }
        .btn-s { background: var(--surface); color: white; border: 1px solid var(--border); padding: 10px; font-size: 12px; }
        .btn-del { background: rgba(239, 68, 68, 0.1); color: var(--danger); width: 32px; height: 32px; border-radius: 8px; }

        /* Historial Expandible */
        .h-card { border-left: 4px solid var(--accent); }
        .h-header { display: flex; justify-content: space-between; align-items: center; }
        .h-details { display: none; margin-top: 15px; padding: 10px; background: var(--bg); border-radius: 12px; font-size: 12px; color: var(--text-dim); }
        .h-details.show { display: block; }

        /* Navbar Inferior */
        .tab-bar { position: fixed; bottom: 15px; left: 15px; right: 15px; background: #161b22; height: 70px; border-radius: 20px; display: flex; border: 1px solid var(--border); z-index: 2000; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .tab-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-dim); background: none; border: none; font-size: 10px; font-weight: 700; }
        .tab-item.active { color: var(--accent); }
        .tab-item i { font-size: 24px; margin-bottom: 2px; }
    </style>
</head>
<body>

    <header id="header" class="top-nav" style="display:none">
        <div style="font-weight:900; font-size:18px">TWINS <span style="color:var(--accent)">PRO</span></div>
        <div id="u-name" onclick="logout()" style="font-size:11px; background:var(--border); padding:5px 12px; border-radius:15px">---</div>
    </header>

    <div id="page-login" class="page active">
        <div style="text-align:center; padding:50px 0">
            <h1 style="font-size:28px">Logística</h1>
            <p style="color:var(--text-dim)">Selecciona tu perfil de acceso</p>
        </div>
        <div id="l-grid" style="display:grid; gap:10px"></div>
    </div>

    <div id="page-route" class="page">
        <div class="dashboard-row">
            <div class="summary-box"><small>Cajas en Lista</small><b id="c-total">0</b></div>
            <div class="summary-box"><small>Destinos</small><b id="p-total">0</b></div>
        </div>

        <div class="card">
            <input type="text" id="in-cli" placeholder="Nombre del Destino / Punto">
            <div style="display:flex; gap:10px">
                <input type="number" id="in-can" placeholder="Cant." style="flex:0.4">
                <button class="btn btn-p" onclick="addPoint()" style="flex:1.6">AGREGAR PUNTO</button>
            </div>
        </div>

        <div id="carga-section" style="display:none">
            <div id="puntos-list" style="margin-bottom:15px"></div>
            <div class="card">
                <select id="s-pla" onchange="predict()"></select>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px">
                    <select id="s-cho"></select>
                    <select id="s-aux"></select>
                </div>
                <button class="btn btn-p" style="background:var(--success)" onclick="finalize()">GUARDAR DESPACHO</button>
                <button class="btn btn-s" style="width:100%; margin-top:10px" onclick="clearData()">LIMPIAR CARGA</button>
            </div>
        </div>
    </div>

    <div id="page-history" class="page">
        <div class="dashboard-row">
            <div class="summary-box"><small>Total Hoy</small><b id="st-d">0</b></div>
            <div class="summary-box"><small>Total Mes</small><b id="st-m">0</b></div>
        </div>
        <div style="display:flex; gap:8px; margin-bottom:15px">
            <input type="date" id="f-date" onchange="renderHistory()" style="flex:1; margin:0">
            <button class="btn btn-s" onclick="sync()"><i class="ph ph-arrows-clockwise"></i></button>
        </div>
        <div id="h-feed"></div>
    </div>

    <div id="page-stats" class="page">
        <div class="card"><small class="summary-box" style="border:none">Volumen Choferes (Mes)</small><div style="height:200px"><canvas id="ch-cho"></canvas></div></div>
        <div class="card"><small class="summary-box" style="border:none">Volumen Auxiliares (Mes)</small><div style="height:200px"><canvas id="ch-aux"></canvas></div></div>
    </div>

    <div id="page-fleet" class="page"><div id="f-grid"></div></div>

    <nav id="nav" class="tab-bar" style="display:none">
        <button class="tab-item active" id="n-route" onclick="go('page-route')"><i class="ph ph-clipboard-text"></i>RUTA</button>
        <button class="tab-item" id="n-history" onclick="go('page-history')"><i class="ph ph-database"></i>DATA</button>
        <button class="tab-item" id="n-stats" onclick="go('page-stats')"><i class="ph ph-chart-line"></i>STATS</button>
        <button class="tab-item" id="n-fleet" onclick="go('page-fleet')"><i class="ph ph-truck"></i>FLOTA</button>
    </nav>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbxCRMbdOGYjf0R-w1v9tHG76jDhHXxuXOwHahYEV7Gj1lFn3y42C2s9DUO5nkgO75qy/exec";
        let user = "", items = [], db = [], charts = {};

        const CONFIG = {
            placas: ["CEP-929", "BPN-711", "BVN-704", "BUL-742", "BVN-930"],
            choferes: ["TAJHO", "LUIS H.", "ROMARIO", "CESAR C.", "WALDIR", "MARCELO"],
            auxiliares: ["Cristopher", "Plácido", "Martin", "Percy", "Rodolfo", "Ricardo", "Elio", "Daniel C.", "Jofer", "Nelson", "Julio"],
            soats: { "CEP-929": "2026-07-22", "BPN-711": "2026-06-10", "BVN-704": "2026-07-02", "BUL-742": "2026-04-02", "BVN-930": "2026-07-02" }
        };

        window.onload = () => {
            setup();
            // RECUPERACIÓN DE SEGURIDAD
            const savedItems = localStorage.getItem('tw_items_cache');
            if(savedItems) { items = JSON.parse(savedItems); updateItemsUI(); }
            
            const savedUser = localStorage.getItem('tw_user');
            if(savedUser) login(savedUser);
            sync();
        };

        function setup() {
            const grid = document.getElementById('l-grid');
            ['TAJHO ADMIN', 'FRANCESCO', 'OSCAR', 'LUIS HERBER'].forEach(u => grid.innerHTML += `<button class="btn btn-s" onclick="login('${u}')">${u}</button>`);
            document.getElementById('s-pla').innerHTML = '<option value="">Placa</option>' + CONFIG.placas.map(p => `<option value="${p}">${p}</option>`).join('');
            document.getElementById('s-cho').innerHTML = '<option value="">Chofer</option>' + CONFIG.choferes.map(c => `<option value="${c}">${c}</option>`).join('');
            document.getElementById('s-aux').innerHTML = '<option value="">Auxiliar</option>' + CONFIG.auxiliares.map(a => `<option value="${a}">${a}</option>`).join('');
        }

        function addPoint() {
            const cli = document.getElementById('in-cli').value.toUpperCase();
            const can = parseInt(document.getElementById('in-can').value);
            if(!cli || !can) return;
            items.push({ cli, can });
            document.getElementById('in-cli').value = ""; document.getElementById('in-can').value = "";
            saveProgress();
            updateItemsUI();
        }

        function saveProgress() { localStorage.setItem('tw_items_cache', JSON.stringify(items)); }

        function updateItemsUI() {
            const list = document.getElementById('puntos-list');
            let total = 0; list.innerHTML = "";
            items.forEach((it, i) => {
                total += it.can;
                list.innerHTML += `<div class="point-tag"><span><b>${it.can}</b> CJ • ${it.cli}</span><button class="btn-del" onclick="delItem(${i})"><i class="ph ph-trash"></i></button></div>`;
            });
            document.getElementById('c-total').innerText = total;
            document.getElementById('p-total').innerText = items.length;
            document.getElementById('carga-section').style.display = items.length > 0 ? 'block' : 'none';
        }

        function delItem(i) { items.splice(i, 1); saveProgress(); updateItemsUI(); }

        function finalize() {
            const aux = document.getElementById('s-aux').value;
            if(!aux) return alert("Selecciona Auxiliar");
            
            const data = {
                fecha: new Date().toLocaleDateString('en-CA'),
                hora: new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true }),
                placa: document.getElementById('s-pla').value,
                chofer: document.getElementById('s-cho').value,
                auxiliar: aux,
                items: items.map(i => `${i.cli}: ${i.can}`).join(", "),
                total: items.reduce((a,b)=>a+b.can,0),
                operario: user
            };

            db.unshift(data);
            localStorage.setItem('tw_db', JSON.stringify(db));
            fetch(API, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
            clearData();
            go('page-history');
        }

        function clearData() { items = []; localStorage.removeItem('tw_items_cache'); updateItemsUI(); }

        function renderHistory() {
            const feed = document.getElementById('h-feed'), filter = document.getElementById('f-date').value;
            let html = "", dTot = 0, mTot = 0, now = new Date(filter + "T12:00:00");

            db.forEach((r, i) => {
                const rD = new Date(r.fecha + "T12:00:00");
                if(rD.getMonth() === now.getMonth() && rD.getFullYear() === now.getFullYear()) mTot += parseFloat(r.total);
                if(r.fecha.split('T')[0] === filter) {
                    dTot += parseFloat(r.total);
                    html += `
                    <div class="card h-card">
                        <div class="h-header" onclick="toggleDet(${i})">
                            <div><b style="color:var(--accent)">${r.placa}</b><br><small>${r.hora}</small></div>
                            <div style="text-align:right"><b>${r.total} CJ</b><br><i class="ph ph-caret-down"></i></div>
                        </div>
                        <div id="det-${i}" class="h-details">
                            <div style="margin-bottom:8px; border-bottom:1px solid var(--border); padding-bottom:5px">Equpo: ${r.chofer} / ${r.auxiliar}</div>
                            ${r.items.split(", ").join("<br>")}
                            <button class="btn btn-s" style="width:100%; margin-top:10px" onclick="share('${r.placa}','${r.total}','${r.items}')">ENVIAR WHATSAPP</button>
                        </div>
                    </div>`;
                }
            });
            feed.innerHTML = html || "<p style='text-align:center; opacity:0.3'>Sin datos</p>";
            document.getElementById('st-d').innerText = dTot;
            document.getElementById('st-m').innerText = mTot;
        }

        function toggleDet(i) { document.getElementById(`det-${i}`).classList.toggle('show'); }

        function go(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('n-' + id.split('-')[1]).classList.add('active');
            if(id === 'page-history') { document.getElementById('f-date').value = "2026-02-23"; renderHistory(); }
            if(id === 'page-stats') renderCharts();
            if(id === 'page-fleet') renderFleet();
        }

        function renderCharts() {
            const cC = {}, cA = {}, month = new Date().getMonth();
            db.forEach(r => {
                if(new Date(r.fecha + "T12:00:00").getMonth() === month) {
                    cC[r.chofer] = (cC[r.chofer] || 0) + parseFloat(r.total);
                    cA[r.auxiliar] = (cA[r.auxiliar] || 0) + parseFloat(r.total);
                }
            });
            const build = (id, data, col) => {
                if(charts[id]) charts[id].destroy();
                charts[id] = new Chart(document.getElementById(id), {
                    type: 'bar', data: { labels: Object.keys(data), datasets: [{ data: Object.values(data), backgroundColor: col, borderRadius: 6 }] },
                    options: { indexAxis: 'y', maintainAspectRatio: false, plugins: { legend: false }, scales: { x: { display: false }, y: { ticks: { color: '#94a3b8' } } } }
                });
            }
            build('ch-cho', cC, '#0071ff'); build('ch-aux', cA, '#22c55e');
        }

        function renderFleet() {
            const grid = document.getElementById('f-grid'), hoy = new Date(); grid.innerHTML = "<h3>SOAT y Unidades</h3>";
            CONFIG.placas.forEach(p => {
                const dias = Math.ceil((new Date(CONFIG.soats[p]) - hoy) / 86400000);
                grid.innerHTML += `<div class="card"><b>${p}</b><br><small>Vence: ${CONFIG.soats[p]}</small><div style="font-size:18px; font-weight:800; color:${dias<30?'var(--danger)':'var(--success)'}">${dias} días restantes</div></div>`;
            });
        }

        async function sync() {
            try { const res = await fetch(API); db = await res.json(); localStorage.setItem('tw_db', JSON.stringify(db)); renderHistory(); } 
            catch(e) { db = JSON.parse(localStorage.getItem('tw_db')) || []; renderHistory(); }
        }

        function login(u) { user = u; localStorage.setItem('tw_user', u); document.getElementById('page-login').classList.remove('active'); document.getElementById('header').style.display = 'flex'; document.getElementById('nav').style.display = 'flex'; document.getElementById('u-name').innerText = u; go('page-route'); }
        function logout() { localStorage.clear(); location.reload(); }
        function predict() { const l = db.find(r => r.placa === document.getElementById('s-pla').value); if(l) { document.getElementById('s-cho').value = l.chofer; document.getElementById('s-aux').value = l.auxiliar; } }
        function share(p, t, i) { window.location.href = `https://wa.me/?text=*📦 DESPACHO TWINS*%0A*Placa:* ${p}%0A*Cajas:* ${t}%0A*Detalle:*%0A${i.split(", ").join("%0A")}`; }
    </script>
</body>
</html>
