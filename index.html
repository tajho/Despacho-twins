<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TWINS DESPACHOS</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        :root {
            --bg: #05070a; --surface: #0f1218;
            --accent: #0066ff; --text: #ffffff; --text-dim: #94a3b8;
            --border: #1e293b; --success: #10b981; --warning: #f59e0b; --danger: #ef4444;
        }

        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; outline: none; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; }

        .page { display: none; padding: 15px 15px 120px 15px; max-width: 500px; margin: 0 auto; animation: fadeIn 0.3s ease; }
        .active { display: block !important; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .top-header { position: sticky; top: 0; z-index: 1000; background: rgba(5, 7, 10, 0.9); backdrop-filter: blur(10px); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 16px; margin-bottom: 15px; }
        
        .nav-bar { 
            position: fixed; bottom: 20px; left: 15px; right: 15px; 
            background: rgba(22, 27, 34, 0.95); backdrop-filter: blur(15px);
            height: 70px; border-radius: 22px; display: flex; 
            border: 1px solid rgba(255,255,255,0.08); z-index: 2000; 
        }
        .nav-item { 
            flex: 1; display: flex; flex-direction: column; align-items: center; 
            justify-content: center; color: var(--text-dim); background: none; 
            border: none; font-size: 10px; font-weight: 700; transition: 0.2s;
            padding-top: 5px; cursor: pointer;
        }
        .nav-item i { font-size: 22px; margin-bottom: 4px; }
        .nav-item.active { color: var(--accent); }
        .nav-indicator { 
            position: absolute; top: 0; width: 25px; height: 3px; 
            background: var(--accent); border-radius: 0 0 5px 5px;
            box-shadow: 0 2px 8px var(--accent); transition: 0.3s;
        }

        .stat-banner { background: linear-gradient(135deg, #0052cc, #003399); padding: 22px; border-radius: 24px; color: white; display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .stat-val { font-size: 42px; font-weight: 800; }
        .stat-label { font-size: 11px; font-weight: 700; text-transform: uppercase; opacity: 0.8; }

        input, select { background: #1a1f26; border: 1px solid var(--border); padding: 15px; border-radius: 14px; color: white; font-size: 15px; width: 100%; margin-bottom: 10px; }
        .btn { border: none; border-radius: 14px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s; }
        .btn-add { background: var(--accent); color: white; padding: 15px; }
        .btn-save { background: var(--success); color: white; padding: 18px; width: 100%; font-size: 16px; }
        .btn-pdf { background: #e11d48; color: white; padding: 15px; width: 100%; margin-top: 20px; }
        
        .chart-container { height: 200px; width: 100%; margin-top: 10px; }
        .history-card { border-left: 4px solid var(--accent); }
    </style>
</head>
<body>

    <header id="app-header" class="top-header" style="display:none">
        <div style="font-weight:900; font-size: 18px">TWINS <span style="color:var(--accent)">DESPACHOS</span></div>
        <div id="user-info" onclick="logout()" style="font-size:11px; font-weight:800; background:var(--border); padding:8px 15px; border-radius:20px;">---</div>
    </header>

    <div id="page-login" class="page active">
        <div style="text-align:center; padding:50px 0">
            <i class="ph-fill ph-package" style="font-size:80px; color:var(--accent)"></i>
            <h1 style="margin-top:20px;">INICIAR SESIÓN</h1>
        </div>
        <div id="login-options" style="display:grid; gap:12px"></div>
    </div>

    <div id="page-route" class="page">
        <div class="stat-banner">
            <div><div class="stat-label">Carga Actual</div><div id="count-cajas" class="stat-val">0</div></div>
            <div style="text-align:right">
                <div class="stat-label">Puntos</div><div id="count-puntos" style="font-size:24px; font-weight:800">0</div>
                <button onclick="clearAll()" style="background:rgba(255,255,255,0.15); border:none; color:white; padding:6px 12px; border-radius:10px; margin-top:8px; font-size:10px; font-weight:700">RESETEAR</button>
            </div>
        </div>
        <div class="card">
            <input type="text" id="inp-cli" placeholder="Nombre del Cliente">
            <div style="display:flex; gap:10px">
                <input type="number" id="inp-can" placeholder="Cajas" style="flex:0.5">
                <button class="btn btn-add" onclick="addPoint()" style="flex:1.5">AÑADIR A CARGA</button>
            </div>
        </div>
        <div id="list-container" style="display:none">
            <div id="live-list" style="margin-bottom:15px"></div>
            <div class="card">
                <select id="sel-pla" onchange="predictAndSave()"></select>
                <div style="display:flex; gap:10px">
                    <select id="sel-cho" onchange="persistSelection()"></select>
                    <select id="sel-aux" onchange="persistSelection()"></select>
                </div>
                <button id="btn-main-action" class="btn btn-save" onclick="openConfirm()">GUARDAR DESPACHO</button>
            </div>
        </div>
    </div>

    <div id="page-history" class="page">
        <div id="history-feed"></div>
    </div>

    <div id="page-stats" class="page">
        <div class="card">
            <div class="stat-label">Resumen Mensual de Cajas</div>
            <div class="chart-container"><canvas id="c-cho"></canvas></div>
        </div>
        <div class="card">
            <div class="stat-label">Viajes por Placa</div>
            <div class="chart-container"><canvas id="c-pla"></canvas></div>
        </div>
        <button class="btn btn-pdf" onclick="generatePDF()"><i class="ph ph-file-pdf"></i> DESCARGAR REPORTE MENSUAL</button>
    </div>

    <nav id="app-nav" class="nav-bar" style="display:none">
        <div id="nav-ind" class="nav-indicator"></div>
        <button class="nav-item active" onclick="go('page-route', 0)"><i class="ph ph-article"></i>HOJA</button>
        <button class="nav-item" onclick="go('page-history', 1)"><i class="ph ph-clock-counter-clockwise"></i>DATA</button>
        <button id="nav-stats-btn" class="nav-item" style="display:none" onclick="go('page-stats', 2)"><i class="ph ph-chart-bar"></i>STATS</button>
    </nav>

    <div id="modal-confirm" class="modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:3000; align-items:center; justify-content:center; padding:20px;">
        <div class="card" style="width:100%; max-width:350px; text-align:center">
            <h3>Finalizar Registro</h3>
            <button class="btn btn-save" onclick="finalize()">SALIENDO AHORA</button>
            <button onclick="closeConfirm()" style="background:none; border:none; color:var(--text-dim); margin-top:20px;">Cancelar</button>
        </div>
    </div>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbxCRMbdOGYjf0R-w1v9tHG76jDhHXxuXOwHahYEV7Gj1lFn3y42C2s9DUO5nkgO75qy/exec";
        let activeUser = "", currentCarga = [], db = [];
        let chartInstances = {};

        const DATA = {
            placas: ["CEP-929", "BPN-711", "BVN-704", "BUL-742", "BVN-930"],
            choferes: ["TAJHO", "LUIS H.", "ROMARIO", "CESAR C.", "WALDIR", "MARCELO"],
            auxiliares: ["Cristopher", "Plácido", "Martin", "Percy", "Rodolfo", "Ricardo", "Elio", "Daniel C.", "Jofer", "Nelson", "Julio"]
        };

        window.onload = () => {
            setupUI();
            const savedUser = localStorage.getItem('tw_logged');
            if(savedUser) login(savedUser);
            
            // Recuperar datos no guardados
            const savedCarga = localStorage.getItem('tw_temp_carga');
            if(savedCarga) {
                currentCarga = JSON.parse(savedCarga);
                refreshCargaUI();
                document.getElementById('sel-pla').value = localStorage.getItem('tw_temp_pla') || "";
                document.getElementById('sel-cho').value = localStorage.getItem('tw_temp_cho') || "";
                document.getElementById('sel-aux').value = localStorage.getItem('tw_temp_aux') || "";
            }
            syncData();
        };

        function setupUI() {
            const grid = document.getElementById('login-options');
            ['TAJHO ADMIN', 'FRANCESCO', 'OSCAR', 'LUIS HERBER'].forEach(u => {
                grid.innerHTML += `<button class="btn" style="background:var(--surface); border:1px solid var(--border); color:white; padding:18px" onclick="login('${u}')">${u}</button>`;
            });
            document.getElementById('sel-pla').innerHTML = '<option value="">Unidad</option>' + DATA.placas.map(p => `<option value="${p}">${p}</option>`).join('');
            document.getElementById('sel-cho').innerHTML = '<option value="">Chofer</option>' + DATA.choferes.map(c => `<option value="${c}">${c}</option>`).join('');
            document.getElementById('sel-aux').innerHTML = '<option value="">Auxiliar</option>' + DATA.auxiliares.map(a => `<option value="${a}">${a}</option>`).join('');
        }

        async function syncData() {
            try {
                const res = await fetch(API);
                db = await res.json();
                localStorage.setItem('tw_db', JSON.stringify(db));
            } catch(e) {
                db = JSON.parse(localStorage.getItem('tw_db') || "[]");
            }
        }

        function addPoint() {
            const cli = document.getElementById('inp-cli').value.toUpperCase();
            const can = parseInt(document.getElementById('inp-can').value);
            if(!cli || !can) return;
            currentCarga.push({ cli, can });
            document.getElementById('inp-cli').value = ""; document.getElementById('inp-can').value = "";
            localStorage.setItem('tw_temp_carga', JSON.stringify(currentCarga));
            refreshCargaUI();
        }

        function persistSelection() {
            localStorage.setItem('tw_temp_pla', document.getElementById('sel-pla').value);
            localStorage.setItem('tw_temp_cho', document.getElementById('sel-cho').value);
            localStorage.setItem('tw_temp_aux', document.getElementById('sel-aux').value);
        }

        function predictAndSave() {
            const last = db.find(r => r.placa === document.getElementById('sel-pla').value);
            if(last) {
                document.getElementById('sel-cho').value = last.chofer;
                document.getElementById('sel-aux').value = last.auxiliar;
            }
            persistSelection();
        }

        function refreshCargaUI() {
            const container = document.getElementById('live-list');
            let total = 0; container.innerHTML = "";
            currentCarga.forEach((item, i) => {
                total += item.can;
                container.innerHTML += `<div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid var(--border)"><span><b>${item.can}</b> - ${item.cli}</span><i class="ph ph-trash" style="color:var(--danger)" onclick="removePoint(${i})"></i></div>`;
            });
            document.getElementById('count-cajas').innerText = total;
            document.getElementById('count-puntos').innerText = currentCarga.length;
            document.getElementById('list-container').style.display = currentCarga.length > 0 ? 'block' : 'none';
        }

        function removePoint(i) { 
            currentCarga.splice(i,1); 
            localStorage.setItem('tw_temp_carga', JSON.stringify(currentCarga));
            refreshCargaUI(); 
        }

        function login(u) { 
            activeUser = u; 
            localStorage.setItem('tw_logged', u);
            document.getElementById('page-login').classList.remove('active');
            document.getElementById('app-header').style.display = 'flex';
            document.getElementById('app-nav').style.display = 'flex';
            document.getElementById('user-info').innerText = u;
            
            // Acceso exclusivo Tajho
            if(u === "TAJHO ADMIN") document.getElementById('nav-stats-btn').style.display = "flex";
            
            go('page-route', 0);
        }

        async function finalize() {
            const registro = {
                fecha: new Date().toLocaleDateString('en-CA'),
                hora: new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' }),
                placa: document.getElementById('sel-pla').value,
                chofer: document.getElementById('sel-cho').value,
                auxiliar: document.getElementById('sel-aux').value,
                items: currentCarga.map(i => `${i.cli}: ${i.can}`).join(", "),
                total: currentCarga.reduce((a,b) => a + b.can, 0),
                operario: activeUser
            };
            
            fetch(API, { method: 'POST', mode: 'no-cors', body: JSON.stringify(registro) });
            db.unshift(registro);
            localStorage.setItem('tw_db', JSON.stringify(db));
            clearAll();
            closeConfirm();
            go('page-history', 1);
        }

        function clearAll() {
            currentCarga = [];
            localStorage.removeItem('tw_temp_carga');
            localStorage.removeItem('tw_temp_pla');
            localStorage.removeItem('tw_temp_cho');
            localStorage.removeItem('tw_temp_aux');
            refreshCargaUI();
        }

        function go(id, idx) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('nav-ind').style.left = `calc(${idx * 33.33}% + (33.33% - 25px) / 2)`;
            if(id === 'page-stats') setTimeout(drawCharts, 100);
        }

        function drawCharts() {
            const statsC = {}, statsP = {};
            db.forEach(r => {
                statsC[r.chofer] = (statsC[r.chofer] || 0) + parseFloat(r.total);
                statsP[r.placa] = (statsP[r.placa] || 0) + 1;
            });

            const render = (id, data, color) => {
                if(chartInstances[id]) chartInstances[id].destroy();
                chartInstances[id] = new Chart(document.getElementById(id), {
                    type: 'bar',
                    data: { labels: Object.keys(data), datasets: [{ data: Object.values(data), backgroundColor: color, borderRadius: 5 }] },
                    options: { indexAxis: 'y', maintainAspectRatio: false, plugins: { legend: false } }
                });
            };
            render('c-cho', statsC, '#0066ff');
            render('c-pla', statsP, '#f59e0b');
        }

        function generatePDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.text("REPORTE MENSUAL TWINS DESPACHOS", 14, 20);
            
            const tableData = db.map(r => [r.fecha, r.placa, r.chofer, r.total]);
            doc.autoTable({
                head: [['Fecha', 'Unidad', 'Chofer', 'Total Cajas']],
                body: tableData,
                startY: 30
            });
            doc.save(`Reporte_Twins_${new Date().getMonth()+1}.pdf`);
        }

        function logout() { localStorage.removeItem('tw_logged'); location.reload(); }
        function openConfirm() { document.getElementById('modal-confirm').style.display = 'flex'; }
        function closeConfirm() { document.getElementById('modal-confirm').style.display = 'none'; }
    </script>
</body>
</html>
