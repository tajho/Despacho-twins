<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TWINS ELITE - FIX</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root {
            --bg: #05070a; --surface: #0f1218;
            --accent: #0066ff; --text: #ffffff; --text-dim: #94a3b8;
            --border: #1e293b; --success: #10b981; --danger: #ef4444;
        }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; outline: none; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; }
        
        .page { display: none; padding: 15px 15px 120px 15px; max-width: 500px; margin: 0 auto; }
        .active { display: block !important; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .top-header { position: sticky; top: 0; z-index: 1000; background: rgba(5, 7, 10, 0.9); backdrop-filter: blur(10px); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 16px; margin-bottom: 15px; }
        
        .dash-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .dash-box { background: var(--surface); border: 1px solid var(--border); border-radius: 18px; padding: 12px; border-left: 4px solid var(--accent); }
        .dash-label { font-size: 10px; font-weight: 800; color: var(--text-dim); text-transform: uppercase; margin-bottom: 4px; display: block; }
        .dash-val { font-size: 20px; font-weight: 800; }

        .nav-bar { position: fixed; bottom: 20px; left: 15px; right: 15px; background: rgba(15, 18, 24, 0.95); backdrop-filter: blur(15px); height: 75px; border-radius: 25px; display: flex; border: 1px solid rgba(255,255,255,0.08); z-index: 2000; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-dim); background: none; border: none; font-size: 9px; font-weight: 800; text-transform: uppercase; }
        .nav-item i { font-size: 24px; margin-bottom: 4px; }
        .nav-item.active { color: var(--accent); }

        .btn { border: none; border-radius: 14px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-add { background: var(--accent); color: white; padding: 15px; width: 100%; }
        input, select { background: #1a1f26; border: 1px solid var(--border); padding: 15px; border-radius: 14px; color: white; width: 100%; margin-bottom: 10px; font-size: 15px; }
        
        .item-row { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.03); padding: 12px; border-radius: 12px; margin-bottom: 8px; border: 1px solid var(--border); }
    </style>
</head>
<body>

    <header id="app-header" class="top-header" style="display:none">
        <div style="font-weight:900;">TWINS <span style="color:var(--accent)">PRO</span></div>
        <div id="user-info" onclick="logout()" style="font-size:10px; font-weight:800; background:var(--border); padding:8px 15px; border-radius:20px;">---</div>
    </header>

    <div id="page-login" class="page active">
        <div style="text-align:center; padding:50px 0"><i class="ph-fill ph-user-circle" style="font-size:70px; color:var(--accent)"></i><h2>SESIÓN</h2></div>
        <div id="login-options" style="display:grid; gap:12px"></div>
    </div>

    <div id="page-route" class="page">
        <div class="card" style="background:var(--accent); color:white; border:none; display:flex; justify-content:space-between; align-items:center">
            <div><small style="font-weight:700">CAJAS</small><div id="count-cajas" style="font-size:35px; font-weight:800">0</div></div>
            <div style="text-align:right"><small style="font-weight:700">ITEMS</small><div id="count-items" style="font-size:35px; font-weight:800">0</div></div>
        </div>
        <div class="card">
            <input type="text" id="inp-cli" placeholder="Cliente">
            <div style="display:flex; gap:10px">
                <input type="number" id="inp-can" placeholder="Cant." style="flex:0.5">
                <button class="btn btn-add" onclick="addPoint()">AÑADIR</button>
            </div>
        </div>
        <div id="list-container" style="display:none">
            <div id="live-list" style="margin-bottom:15px"></div>
            <div class="card">
                <select id="sel-pla" onchange="predictAndSave()"></select>
                <div style="display:flex; gap:10px"><select id="sel-cho"></select><select id="sel-aux"></select></div>
                <button class="btn" onclick="finalize()" style="background:var(--success); color:white; width:100%; padding:18px; font-size:16px">FINALIZAR REGISTRO</button>
            </div>
        </div>
    </div>

    <div id="page-history" class="page">
        <div class="dash-row">
            <div class="dash-box">
                <span class="dash-label">Mes Actual</span>
                <span id="st-month" class="dash-val">0</span>
                <div style="font-size:10px; opacity:0.6" id="st-month-env">0 Envíos</div>
            </div>
            <div class="dash-box" style="border-left-color:var(--success)">
                <span class="dash-label">Día Seleccionado</span>
                <span id="st-day" class="dash-val">0</span>
                <div style="font-size:10px; opacity:0.6" id="st-day-env">0 Envíos</div>
            </div>
        </div>
        <input type="date" id="filter-date" onchange="renderHistory()">
        <div id="history-feed"></div>
    </div>

    <div id="page-fleet" class="page"><div id="fleet-grid"></div></div>

    <div id="page-report" class="page">
        <div class="card" style="text-align:center; padding:40px 20px">
            <i class="ph ph-file-pdf" style="font-size:60px; color:var(--danger)"></i>
            <h3>Reporte Administrativo</h3>
            <button class="btn" style="background:var(--danger); color:white; width:100%; padding:20px" onclick="generateReportPDF()">DESCARGAR PDF</button>
        </div>
    </div>

    <nav id="app-nav" class="nav-bar" style="display:none">
        <button class="nav-item active" id="n-route" onclick="go('page-route')"><i class="ph-fill ph-plus-circle"></i>RUTA</button>
        <button class="nav-item" id="n-history" onclick="go('page-history')"><i class="ph-fill ph-clock-counter-clockwise"></i>HISTORIAL</button>
        <button class="nav-item" id="n-fleet" onclick="go('page-fleet')"><i class="ph-fill ph-truck"></i>FLOTA</button>
        <button class="nav-item" id="n-report" onclick="checkAdminAccess()" style="display:none"><i class="ph-fill ph-file-text"></i>REPORTE</button>
    </nav>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbxuVVOZfMx8jkN-q079s6g7ppPAF4XIkNG-DEQGt6MqiownzLo3NMyWBIZ1hkTyoPBl/exec";
        let db = [], currentCarga = [], activeUser = "";

        const DATA = {
            placas: ["CEP-929", "BPN-711", "BVN-704", "BUL-742", "BVN-930"],
            choferes: ["TAJHO", "LUIS H.", "ROMARIO", "CESAR C.", "WALDIR", "MARCELO"],
            auxiliares: ["Cristopher", "Plácido", "Martin", "Percy", "Rodolfo", "Ricardo", "Elio", "Daniel C.", "Jofer", "Nelson", "Julio"],
            soats: { "CEP-929": "2026-07-22", "BPN-711": "2026-06-10", "BVN-704": "2026-07-02", "BUL-742": "2026-04-02", "BVN-930": "2026-07-02" }
        };

        window.onload = () => {
            const grid = document.getElementById('login-options');
            ['TAJHO ADMIN', 'FRANCESCO', 'OSCAR', 'LUIS HERBER'].forEach(u => grid.innerHTML += `<button class="btn" style="background:var(--surface); border:1px solid var(--border); color:white; padding:18px" onclick="login('${u}')">${u}</button>`);
            
            document.getElementById('sel-pla').innerHTML = '<option value="">Unidad</option>' + DATA.placas.map(p => `<option value="${p}">${p}</option>`).join('');
            document.getElementById('sel-cho').innerHTML = '<option value="">Chofer</option>' + DATA.choferes.map(c => `<option value="${c}">${c}</option>`).join('');
            document.getElementById('sel-aux').innerHTML = '<option value="">Auxiliar</option>' + DATA.auxiliares.map(a => `<option value="${a}">${a}</option>`).join('');
            document.getElementById('filter-date').value = new Date().toLocaleDateString('en-CA');
            
            if(localStorage.getItem('tw_logged')) login(localStorage.getItem('tw_logged'));
            syncData();
        };

        function login(u) {
            activeUser = u; localStorage.setItem('tw_logged', u);
            document.getElementById('page-login').classList.remove('active');
            document.getElementById('app-header').style.display = 'flex';
            document.getElementById('app-nav').style.display = 'flex';
            document.getElementById('user-info').innerText = u;
            if(u === 'TAJHO ADMIN') document.getElementById('n-report').style.display = 'flex';
            go('page-route');
        }

        async function syncData() {
            try {
                const res = await fetch(API);
                db = await res.json();
                renderHistory();
            } catch(e) { console.log("Error sync"); }
        }

        function addPoint() {
            const cli = document.getElementById('inp-cli').value.toUpperCase();
            const can = parseInt(document.getElementById('inp-can').value);
            if(cli && can) {
                currentCarga.push({cli, can});
                document.getElementById('inp-cli').value = ""; document.getElementById('inp-can').value = "";
                refreshCargaUI();
            }
        }

        function removePoint(i) {
            currentCarga.splice(i, 1);
            refreshCargaUI();
        }

        function refreshCargaUI() {
            const c = document.getElementById('live-list'); let t = 0; c.innerHTML = "";
            currentCarga.forEach((item, i) => {
                t += item.can;
                c.innerHTML += `<div class="item-row">
                    <span><b>${item.can}</b> - ${item.cli}</span>
                    <i class="ph ph-trash" style="color:var(--danger); font-size:20px" onclick="removePoint(${i})"></i>
                </div>`;
            });
            document.getElementById('count-cajas').innerText = t;
            document.getElementById('count-items').innerText = currentCarga.length;
            document.getElementById('list-container').style.display = currentCarga.length > 0 ? 'block' : 'none';
        }

        function renderHistory() {
            const container = document.getElementById('history-feed');
            const selDate = document.getElementById('filter-date').value;
            let h = "", dTotal = 0, dEnv = 0, mTotal = 0, mEnv = 0;
            const filterMonth = new Date(selDate + "T12:00:00").getMonth();

            db.forEach(r => {
                const rDate = r.fecha.includes('T') ? r.fecha.split('T')[0] : r.fecha;
                const rCajas = parseFloat(r.total || 0);
                const rD = new Date(rDate + "T12:00:00");

                if(rD.getMonth() === filterMonth) { mTotal += rCajas; mEnv++; }
                if(rDate === selDate) {
                    dTotal += rCajas; dEnv++;
                    h += `<div class="card" style="border-left:4px solid var(--accent)">
                        <div style="display:flex; justify-content:space-between"><b>${r.placa}</b> <span style="font-size:11px; font-weight:800; color:var(--accent)">${r.hora}</span></div>
                        <div style="font-size:20px; font-weight:800; margin:5px 0">${rCajas} Cajas</div>
                        <small style="opacity:0.6">${r.chofer} / ${r.auxiliar}</small>
                    </div>`;
                }
            });
            container.innerHTML = h || `<p style="text-align:center; opacity:0.3; margin-top:20px">Sin registros</p>`;
            document.getElementById('st-day').innerText = dTotal;
            document.getElementById('st-day-env').innerText = dEnv + " Envíos";
            document.getElementById('st-month').innerText = mTotal;
            document.getElementById('st-month-env').innerText = mEnv + " Envíos";
        }

        async function finalize() {
            const now = new Date();
            const payload = {
                fecha: now.toLocaleDateString('en-CA'), // Formato YYYY-MM-DD fijo
                hora: now.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' }),
                chofer: document.getElementById('sel-cho').value,
                auxiliar: document.getElementById('sel-aux').value,
                placa: document.getElementById('sel-pla').value,
                items: currentCarga.map(i => `${i.cli}: ${i.can}`).join(", "),
                total: currentCarga.reduce((a,b) => a + (parseFloat(b.can)||0), 0),
                operario: activeUser
            };
            await fetch(API, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
            alert("Despacho Guardado!");
            location.reload();
        }

        function checkAdminAccess() {
            if(activeUser !== 'TAJHO ADMIN') return alert("No autorizado");
            if(prompt("Código Pin:") === "1994") go('page-report');
            else alert("Código erróneo");
        }

        function generateReportPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const now = new Date();
            const mesActual = now.getMonth();

            let sCho = {}, sAux = {};
            db.forEach(r => {
                const rD = new Date((r.fecha.includes('T') ? r.fecha.split('T')[0] : r.fecha) + "T12:00:00");
                if(rD.getMonth() === mesActual) {
                    if(!sCho[r.chofer]) sCho[r.chofer] = { cajas: 0, viajes: 0 };
                    sCho[r.chofer].cajas += parseFloat(r.total || 0); sCho[r.chofer].viajes++;

                    if(!sAux[r.auxiliar]) sAux[r.auxiliar] = { cajas: 0, viajes: 0 };
                    sAux[r.auxiliar].cajas += parseFloat(r.total || 0); sAux[r.auxiliar].viajes++;
                }
            });

            const bodyCho = Object.entries(sCho).map(([k, v]) => [k, v.viajes, v.cajas]).sort((a,b) => a[2] - b[2]);
            const bodyAux = Object.entries(sAux).map(([k, v]) => [k, v.viajes, v.cajas]).sort((a,b) => a[2] - b[2]);

            doc.text("REPORTE MENSUAL TWINS", 14, 20);
            doc.autoTable({ startY: 30, head: [['Chofer', 'Viajes', 'Cajas']], body: bodyCho });
            doc.autoTable({ startY: doc.lastAutoTable.finalY + 10, head: [['Auxiliar', 'Viajes', 'Cajas']], body: bodyAux });
            doc.save("Reporte_Twins.pdf");
        }

        function go(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('n-' + id.split('-')[1]).classList.add('active');
            if(id === 'page-fleet') renderFleet();
        }

        function renderFleet() {
            document.getElementById('fleet-grid').innerHTML = DATA.placas.map(p => {
                const d = Math.ceil((new Date(DATA.soats[p]) - new Date()) / 86400000);
                return `<div class="card" style="display:flex; justify-content:space-between"><div><b>${p}</b></div><b style="color:${d<30?'var(--danger)':'var(--success)'}">${d} Días</b></div>`;
            }).join('');
        }

        function predictAndSave() {
            const l = db.find(r => r.placa === document.getElementById('sel-pla').value);
            if(l) { document.getElementById('sel-cho').value = l.chofer; document.getElementById('sel-aux').value = l.auxiliar; }
        }

        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
