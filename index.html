<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TWINS DESPACHOS</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #05070a; --surface: #0f1218;
            --accent: #0066ff; --accent-glow: rgba(0, 102, 255, 0.3);
            --text: #ffffff; --text-dim: #94a3b8;
            --border: #1e293b; --success: #10b981; --warning: #f59e0b; --danger: #ef4444;
        }

        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; outline: none; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; min-height: 100vh; }

        .page { display: none; padding: 15px; padding-bottom: 110px; max-width: 600px; margin: 0 auto; animation: pageFade 0.3s ease; }
        .active { display: block !important; }
        @keyframes pageFade { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        .top-header { position: sticky; top: 0; z-index: 1000; background: rgba(5, 7, 10, 0.8); backdrop-filter: blur(12px); padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 16px; margin-bottom: 12px; }
        
        /* Barra de Navegación Mejorada */
        .nav-bar { 
            position: fixed; bottom: 20px; left: 15px; right: 15px; 
            background: rgba(22, 27, 34, 0.8); backdrop-filter: blur(20px);
            height: 75px; border-radius: 24px; display: flex; 
            border: 1px solid rgba(255,255,255,0.1); z-index: 2000; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }
        .nav-item { 
            flex: 1; display: flex; flex-direction: column; align-items: center; 
            justify-content: center; color: var(--text-dim); background: none; 
            border: none; font-size: 11px; font-weight: 700; position: relative;
            transition: 0.3s;
        }
        .nav-item.active { color: var(--accent); }
        .nav-item.active::after {
            content: ''; position: absolute; top: 0; width: 30%; height: 3px;
            background: var(--accent); border-radius: 0 0 10px 10px; box-shadow: 0 2px 10px var(--accent);
        }
        .nav-item i { font-size: 24px; margin-bottom: 4px; }

        .stat-banner { background: linear-gradient(135deg, var(--accent), #0033cc); padding: 20px; border-radius: 24px; color: white; display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .stat-val { font-size: 38px; font-weight: 800; line-height: 1; }
        .stat-label { font-size: 10px; font-weight: 700; text-transform: uppercase; opacity: 0.8; }

        input, select { background: #1a1f26; border: 1px solid var(--border); padding: 14px; border-radius: 14px; color: white; font-size: 15px; font-weight: 500; width: 100%; }
        .btn { border: none; border-radius: 14px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-add { background: var(--accent); color: white; padding: 14px 20px; }
        .btn-save { background: var(--success); color: white; padding: 16px; width: 100%; font-size: 15px; }
        
        .history-card { border-left: 4px solid var(--accent); }
        .history-puntos { display: none; font-size: 12px; color: #e2e8f0; background: #05070a; padding: 12px; border-radius: 12px; margin: 10px 0; border: 1px dashed #334155; }
        .history-puntos.show { display: block; }

        .fleet-progress { height: 6px; background: #1a1f26; border-radius: 10px; margin-top: 10px; overflow: hidden; }
        .fleet-bar { height: 100%; border-radius: 10px; transition: width 0.5s; }
    </style>
</head>
<body>

    <header id="app-header" class="top-header" style="display:none">
        <div style="font-weight:900;">TWINS <span style="color:var(--accent)">DESPACHOS</span></div>
        <div id="user-info" onclick="logout()" style="font-size:10px; font-weight:800; background:var(--border); padding:6px 12px; border-radius:20px;">---</div>
    </header>

    <div id="page-login" class="page active">
        <div style="text-align:center; padding:60px 0">
            <i class="ph-fill ph-package" style="font-size:70px; color:var(--accent)"></i>
            <h1 style="margin-top:15px">TWINS DESPACHOS</h1>
        </div>
        <div id="login-options" style="display:grid; gap:12px"></div>
    </div>

    <div id="page-route" class="page">
        <div class="stat-banner">
            <div><div class="stat-label">Carga Actual</div><div id="count-cajas" class="stat-val">0</div></div>
            <div style="text-align:right">
                <div class="stat-label">Puntos</div><div id="count-puntos" style="font-size:24px; font-weight:800">0</div>
                <button onclick="clearAll()" style="background:rgba(255,255,255,0.1); border:none; color:white; padding:5px 10px; border-radius:8px; margin-top:5px; font-size:10px">RESETEAR</button>
            </div>
        </div>
        <div class="card">
            <input type="text" id="inp-cli" placeholder="Nombre del Cliente" style="margin-bottom:10px">
            <div style="display:flex; gap:10px">
                <input type="number" id="inp-can" placeholder="Cajas" style="flex:0.6">
                <button class="btn btn-add" onclick="addPoint()" style="flex:1.4">AÑADIR A CARGA</button>
            </div>
        </div>
        <div id="list-container" style="display:none">
            <div id="live-list" style="margin-bottom:15px"></div>
            <div class="card">
                <select id="sel-pla" onchange="predict()" style="margin-bottom:10px"></select>
                <div style="display:flex; gap:10px; margin-bottom:10px">
                    <select id="sel-cho"></select><select id="sel-aux"></select>
                </div>
                <button id="btn-main-action" class="btn btn-save" onclick="openConfirm()">GUARDAR DESPACHO</button>
            </div>
        </div>
    </div>

    <div id="page-history" class="page">
        <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:8px; margin-bottom:15px">
            <div class="card" style="margin:0; text-align:center; padding:10px"><div class="stat-label">Hoy</div><div id="st-day" style="font-size:18px; font-weight:800; color:var(--accent)">0</div></div>
            <div class="card" style="margin:0; text-align:center; padding:10px"><div class="stat-label">Mes Cajas</div><div id="st-month" style="font-size:18px; font-weight:800">0</div></div>
            <div class="card" style="margin:0; text-align:center; padding:10px"><div class="stat-label">Mes Puntos</div><div id="st-pts-mes" style="font-size:18px; font-weight:800; color:var(--success)">0</div></div>
        </div>
        <div style="display:flex; gap:8px; margin-bottom:15px">
            <input type="date" id="filter-date" onchange="renderHistory()" style="flex:1">
            <button class="btn" style="background:var(--surface); border:1px solid var(--border); width:50px" onclick="syncData()"><i class="ph ph-arrows-clockwise"></i></button>
        </div>
        <div id="history-feed"></div>
    </div>

    <div id="page-stats" class="page">
        <div class="card"><div class="stat-label">Producción Choferes (Mes)</div><div style="height:200px; margin-top:10px"><canvas id="c-cho"></canvas></div></div>
        <div class="card"><div class="stat-label">Producción Auxiliares (Mes)</div><div style="height:200px; margin-top:10px"><canvas id="c-aux"></canvas></div></div>
        <div class="card"><div class="stat-label">Frecuencia de Unidades (Mes)</div><div style="height:200px; margin-top:10px"><canvas id="c-pla"></canvas></div></div>
    </div>

    <div id="page-fleet" class="page">
        <h3 style="margin:0 0 15px 0">Seguros y Vencimientos</h3>
        <div id="fleet-grid"></div>
    </div>

    <nav id="app-nav" class="nav-bar" style="display:none">
        <button class="nav-item active" id="n-route" onclick="go('page-route')"><i class="ph ph-layout"></i>HOJA</button>
        <button class="nav-item" id="n-history" onclick="go('page-history')"><i class="ph ph-database"></i>DATA</button>
        <button class="nav-item" id="n-stats" onclick="go('page-stats')"><i class="ph ph-chart-bar"></i>STATS</button>
        <button class="nav-item" id="n-fleet" onclick="go('page-fleet')"><i class="ph ph-shield-check"></i>FLOTA</button>
    </nav>

    <div id="modal-confirm" class="modal"><div class="modal-content"><h3 style="text-align:center">Confirmar Salida</h3><button class="btn btn-save" onclick="finalize('HOY')">SALIENDO AHORA</button><button class="btn" style="width:100%; margin-top:10px; background:var(--border); color:white; padding:16px; border-radius:14px" onclick="finalize('MAÑANA')">PROGRAMAR MAÑANA</button><button onclick="closeConfirm()" style="width:100%; border:none; background:none; color:var(--text-dim); margin-top:15px">Cancelar</button></div></div>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbxCRMbdOGYjf0R-w1v9tHG76jDhHXxuXOwHahYEV7Gj1lFn3y42C2s9DUO5nkgO75qy/exec";
        let activeUser = "", currentCarga = [], db = [], editIdx = null;
        let chartInstances = {};

        const DATA = {
            placas: ["CEP-929", "BPN-711", "BVN-704", "BUL-742", "BVN-930"],
            choferes: ["TAJHO", "LUIS H.", "ROMARIO", "CESAR C.", "WALDIR", "MARCELO"],
            auxiliares: ["Cristopher", "Plácido", "Martin", "Percy", "Rodolfo", "Ricardo", "Elio", "Daniel C.", "Jofer", "Nelson", "Julio"],
            soats: { "CEP-929": "2026-07-22", "BPN-711": "2026-06-10", "BVN-704": "2026-07-02", "BUL-742": "2026-04-02", "BVN-930": "2026-07-02" }
        };

        window.onload = () => {
            setupUI();
            if(localStorage.getItem('tw_logged')) login(localStorage.getItem('tw_logged'));
            if(localStorage.getItem('tw_pending_carga')) { currentCarga = JSON.parse(localStorage.getItem('tw_pending_carga')); refreshCargaUI(); }
            syncData();
        };

        function setupUI() {
            const grid = document.getElementById('login-options');
            ['TAJHO ADMIN', 'FRANCESCO', 'OSCAR', 'LUIS HERBER'].forEach(u => grid.innerHTML += `<button class="btn" style="background:var(--surface); border:1px solid var(--border); color:white; padding:15px; border-radius:15px" onclick="login('${u}')">${u}</button>`);
            document.getElementById('sel-pla').innerHTML = '<option value="">Unidad</option>' + DATA.placas.map(p => `<option value="${p}">${p}</option>`).join('');
            document.getElementById('sel-cho').innerHTML = '<option value="">Chofer</option>' + DATA.choferes.map(c => `<option value="${c}">${c}</option>`).join('');
            document.getElementById('sel-aux').innerHTML = '<option value="">Auxiliar</option>' + DATA.auxiliares.map(a => `<option value="${a}">${a}</option>`).join('');
        }

        async function syncData() {
            try {
                const res = await fetch(API);
                db = await res.json();
                localStorage.setItem('tw_db', JSON.stringify(db));
                renderHistory(); updateFleet();
            } catch(e) {
                db = JSON.parse(localStorage.getItem('tw_db') || "[]");
                renderHistory(); updateFleet();
            }
        }

        function addPoint() {
            const cli = document.getElementById('inp-cli').value.toUpperCase();
            const can = parseInt(document.getElementById('inp-can').value);
            if(!cli || !can) return;
            currentCarga.push({ cli, can });
            document.getElementById('inp-cli').value = ""; document.getElementById('inp-can').value = "";
            localStorage.setItem('tw_pending_carga', JSON.stringify(currentCarga));
            refreshCargaUI();
        }

        function refreshCargaUI() {
            const container = document.getElementById('live-list');
            let total = 0; container.innerHTML = "";
            currentCarga.forEach((item, i) => {
                total += item.can;
                container.innerHTML += `<div class="point-item"><div><b>${item.can}</b> CJ - ${item.cli}</div><button style="border:none; background:none; color:var(--danger)" onclick="removePoint(${i})"><i class="ph ph-trash"></i></button></div>`;
            });
            document.getElementById('count-cajas').innerText = total;
            document.getElementById('count-puntos').innerText = currentCarga.length;
            document.getElementById('list-container').style.display = currentCarga.length > 0 ? 'block' : 'none';
        }

        function removePoint(idx) { currentCarga.splice(idx, 1); localStorage.setItem('tw_pending_carga', JSON.stringify(currentCarga)); refreshCargaUI(); }

        async function finalize(tipo) {
            const aux = document.getElementById('sel-aux').value; if(!aux) return alert("Falta Auxiliar");
            closeConfirm();
            let f = new Date(); if(tipo === 'MAÑANA') f.setDate(f.getDate() + 1);
            const registro = {
                fecha: f.toLocaleDateString('en-CA'),
                hora: new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' }),
                placa: document.getElementById('sel-pla').value,
                chofer: document.getElementById('sel-cho').value,
                auxiliar: aux,
                items: currentCarga.map(i => `${i.cli}: ${i.can}`).join(", "),
                total: currentCarga.reduce((a,b) => a + b.can, 0),
                puntos: currentCarga.length,
                operario: activeUser
            };
            if(editIdx !== null) db[editIdx] = registro; else db.unshift(registro);
            localStorage.setItem('tw_db', JSON.stringify(db));
            localStorage.removeItem('tw_pending_carga');
            go('page-history');
            fetch(API, { method: 'POST', mode: 'no-cors', body: JSON.stringify(registro) });
            clearAll();
        }

        function renderHistory() {
            const container = document.getElementById('history-feed');
            const filterDate = document.getElementById('filter-date').value;
            let html = "", dTotal = 0, mTotal = 0, mPts = 0;
            const now = new Date(filterDate + "T12:00:00");

            db.forEach((r, i) => {
                const rDate = new Date(r.fecha + "T12:00:00");
                const pts = r.puntos || r.items.split(',').length;
                if(rDate.getMonth() === now.getMonth() && rDate.getFullYear() === now.getFullYear()) {
                    mTotal += parseFloat(r.total); mPts += pts;
                }
                if(r.fecha.split('T')[0] === filterDate) {
                    dTotal += parseFloat(r.total);
                    html = `<div class="card history-card">
                        <div style="display:flex; justify-content:space-between; font-size:12px; color:var(--text-dim); margin-bottom:5px">
                            <span>${r.hora}</span><span style="color:var(--accent); font-weight:800">${r.placa}</span>
                        </div>
                        <div style="font-weight:700">${r.total} CJ en ${pts} Puntos</div>
                        <div style="font-size:11px; opacity:0.6">${r.chofer} / ${r.auxiliar}</div>
                        <div id="hist-list-${i}" class="history-puntos">${r.items.split(", ").map(li => `<div>• ${li}</div>`).join("")}</div>
                        <div style="display:flex; gap:8px; margin-top:10px">
                            <button class="btn" style="flex:1; background:var(--accent); color:white; font-size:11px; padding:10px" onclick="toggleList(${i})">VER DETALLE</button>
                            <button class="btn" style="background:var(--border); width:40px" onclick="loadToEdit(${i})"><i class="ph ph-pencil"></i></button>
                            <button class="btn" style="background:#25D366; width:45px; color:white" onclick="share('${r.placa}','${r.total}','${r.items}')"><i class="ph-fill ph-whatsapp-logo"></i></button>
                        </div>
                    </div>` + html;
                }
            });
            container.innerHTML = html || `<p style="text-align:center; opacity:0.3; padding:40px">Sin datos</p>`;
            document.getElementById('st-day').innerText = dTotal;
            document.getElementById('st-month').innerText = mTotal;
            document.getElementById('st-pts-mes').innerText = mPts;
        }

        function drawCharts() {
            const now = new Date();
            const stats = { cho: {}, aux: {}, pla: {} };
            
            db.forEach(r => {
                const rD = new Date(r.fecha + "T12:00:00");
                if(rD.getMonth() === now.getMonth()) {
                    stats.cho[r.chofer] = (stats.cho[r.chofer] || 0) + parseFloat(r.total);
                    stats.aux[r.auxiliar] = (stats.aux[r.auxiliar] || 0) + parseFloat(r.total);
                    stats.pla[r.placa] = (stats.pla[r.placa] || 0) + 1;
                }
            });

            const createChart = (id, labels, data, color) => {
                if(chartInstances[id]) chartInstances[id].destroy();
                chartInstances[id] = new Chart(document.getElementById(id), {
                    type: 'bar',
                    data: { labels, datasets: [{ data, backgroundColor: color, borderRadius: 8 }] },
                    options: { indexAxis: 'y', maintainAspectRatio: false, plugins: { legend: false }, scales: { x: { display: false }, y: { ticks: { color: '#94a3b8' } } } }
                });
            };

            createChart('c-cho', Object.keys(stats.cho), Object.values(stats.cho), '#0066ff');
            createChart('c-aux', Object.keys(stats.aux), Object.values(stats.aux), '#10b981');
            createChart('c-pla', Object.keys(stats.pla), Object.values(stats.pla), '#f59e0b');
        }

        function updateFleet() {
            const grid = document.getElementById('fleet-grid'); grid.innerHTML = "";
            DATA.placas.forEach(p => {
                const dias = Math.ceil((new Date(DATA.soats[p]) - new Date()) / 86400000);
                const color = dias < 30 ? "var(--danger)" : (dias < 60 ? "var(--warning)" : "var(--success)");
                grid.innerHTML += `<div class="card" style="border-left: 4px solid ${color}">
                    <div style="display:flex; justify-content:space-between"><b>${p}</b> <span style="color:${color}; font-weight:800">${dias} d</span></div>
                    <div style="font-size:10px; color:var(--text-dim)">SOAT: ${DATA.soats[p]}</div>
                    <div class="fleet-progress"><div class="fleet-bar" style="width:${Math.min(100, (dias/365)*100)}%; background:${color}"></div></div>
                </div>`;
            });
        }

        function go(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('n-' + id.split('-')[1]).classList.add('active');
            if(id === 'page-history') { document.getElementById('filter-date').value = new Date().toLocaleDateString('en-CA'); renderHistory(); }
            if(id === 'page-stats') setTimeout(drawCharts, 100);
            if(id === 'page-fleet') updateFleet();
        }

        function login(u) { activeUser = u; localStorage.setItem('tw_logged', u); document.getElementById('page-login').classList.remove('active'); document.getElementById('app-header').style.display = 'flex'; document.getElementById('app-nav').style.display = 'flex'; document.getElementById('user-info').innerText = u; go('page-route'); }
        function logout() { localStorage.removeItem('tw_logged'); location.reload(); }
        function toggleList(idx) { document.getElementById(`hist-list-${idx}`).classList.toggle('show'); }
        function openConfirm() { document.getElementById('modal-confirm').style.display = 'flex'; }
        function closeConfirm() { document.getElementById('modal-confirm').style.display = 'none'; }
        function clearAll() { currentCarga = []; editIdx = null; localStorage.removeItem('tw_pending_carga'); refreshCargaUI(); }
        function predict() { const last = db.find(r => r.placa === document.getElementById('sel-pla').value); if(last) { document.getElementById('sel-cho').value = last.chofer; document.getElementById('sel-aux').value = last.auxiliar; } }
        function loadToEdit(i) { const r = db[i]; editIdx = i; currentCarga = r.items.split(", ").map(it => { const [cli, can] = it.split(": "); return { cli, can: parseInt(can) }; }); document.getElementById('sel-pla').value = r.placa; document.getElementById('sel-cho').value = r.chofer; document.getElementById('sel-aux').value = r.auxiliar; refreshCargaUI(); go('page-route'); }
        function share(p, t, i) { window.location.href = `https://wa.me/?text=*📦 TWINS DESPACHOS*%0A*Placa:* ${p}%0A*Cajas:* ${t}%0A*Ruta:*%0A${i.split(", ").join("%0A")}`; }
    </script>
</body>
</html>
