<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TWINS ELITE - V38 ULTRA</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root {
            --bg: #f8fafc; --surface: #ffffff; --accent: #0062ff; 
            --text: #0f172a; --text-dim: #64748b; --border: #e2e8f0; 
            --success: #10b981; --danger: #f43f5e;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { margin: 0; background: var(--bg); color: var(--text); padding-bottom: 90px; }

        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; height: 70px; display: flex; border-top: 1px solid var(--border); z-index: 1000; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-dim); background: none; border: none; font-size: 10px; font-weight: 700; }
        .nav-item.active { color: var(--accent); }
        .nav-item i { font-size: 22px; margin-bottom: 2px; }

        .page { display: none; padding: 15px; max-width: 500px; margin: 0 auto; animation: fadeIn 0.1s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .active { display: block; }

        .stats-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .stat-box { padding: 12px; border-radius: 18px; }
        .stat-box.blue { background: var(--accent); color: #fff; }
        .stat-box.white { background: #fff; color: var(--text); border: 1px solid var(--border); }
        .stat-num { font-size: 18px; font-weight: 800; }

        .card { background: #fff; border-radius: 18px; padding: 15px; border: 1px solid var(--border); margin-bottom: 10px; position: relative; }
        .card-actions { display: flex; gap: 8px; margin-top: 10px; border-top: 1px solid var(--border); padding-top: 10px; }
        .btn-icon { flex: 1; border: none; border-radius: 10px; padding: 10px; font-size: 18px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        
        .input-box { background: #fff; border: 1px solid var(--border); border-radius: 14px; padding: 14px; width: 100%; font-size: 16px; font-weight: 600; margin-bottom: 10px; outline: none; }
        .driver-selector { display: flex; justify-content: space-between; align-items: center; background: var(--bg); padding: 15px; border-radius: 14px; border: 1px solid var(--border); margin-top: 5px; cursor: pointer; }
        
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; align-items: center; justify-content: center; z-index: 2000; padding: 15px; backdrop-filter: blur(4px); }
        .driver-chip { padding: 15px; border-bottom: 1px solid var(--border); font-weight: 700; }
    </style>
</head>
<body>

    <div id="page-dashboard" class="page active">
        <div class="stats-container">
            <div class="stat-box blue">
                <span style="font-size:9px; font-weight:800; opacity:0.8;">ACUMULADO MES</span>
                <div style="display:flex; justify-content:space-between; margin:5px 0;"><span class="stat-num" id="m-cajas">0</span><i class="ph-bold ph-package"></i></div>
                <div style="display:flex; justify-content:space-between;"><span style="font-size:14px; font-weight:800;" id="m-clientes">0</span><i class="ph-bold ph-users" style="font-size:12px;"></i></div>
            </div>
            <div class="stat-box white">
                <span style="font-size:9px; font-weight:800; color:var(--accent);">HOY</span>
                <div style="display:flex; justify-content:space-between; margin:5px 0;"><span class="stat-num" id="d-cajas">0</span><i class="ph-bold ph-package" style="color:var(--accent)"></i></div>
                <div style="display:flex; justify-content:space-between;"><span style="font-size:14px; font-weight:800;" id="d-clientes">0</span><i class="ph-bold ph-users" style="color:var(--accent); font-size:12px;"></i></div>
            </div>
        </div>
        <input type="text" id="smart-search" placeholder="Buscar registros..." class="input-box" oninput="renderHistory()">
        <div id="history-feed"></div>
    </div>

    <div id="page-select-plate" class="page">
        <h3 style="font-weight:800; margin-bottom:15px;">Seleccionar Unidad</h3>
        <div id="plate-grid"></div>
    </div>

    <div id="page-crew" class="page">
        <h3 style="margin-bottom:15px;">Asignación de Personal</h3>
        <div class="card">
            <div id="crew-plate" style="font-size:24px; font-weight:900; color:var(--accent); text-align:center; margin-bottom:20px;">---</div>
            <label style="font-size:10px; font-weight:800;">CONDUCTOR:</label>
            <div class="driver-selector" onclick="openModal('modal-drivers')">
                <span id="display-driver" style="font-weight:800;">---</span>
                <i class="ph-bold ph-caret-right" style="color:var(--accent)"></i>
            </div>
            <label style="font-size:10px; font-weight:800; margin-top:15px; display:block;">AUXILIAR:</label>
            <select id="sel-aux" class="input-box" style="margin-top:5px;">
                <option value="POR DEFINIR">-- POR DEFINIR (MAÑANA) --</option>
                <option value="CRISTOPHER">CRISTOPHER</option>
                <option value="PERCY">PERCY</option>
                <option value="PLACIDO">PLACIDO</option>
                <option value="RODOLFO">RODOLFO</option>
                <option value="RICARDO">RICARDO</option>
                <option value="ELIO">ELIO</option>
                <option value="JOFER">JOFER</option>
                <option value="MARTIN">MARTIN</option>
                <option value="NELSON">NELSON</option>
                <option value="JULIO">JULIO</option>
                <option value="DANIEL C.">DANIEL C.</option>
            </select>
            <button onclick="confirmCrew()" class="input-box" style="background:var(--accent); color:#fff; border:none; margin-top:10px;">IR A CARGA</button>
        </div>
    </div>

    <div id="page-route" class="page">
        <div style="background:var(--text); padding:15px; border-radius:15px; color:#fff; margin-bottom:15px; display:flex; justify-content:space-between; align-items:center;">
            <div id="route-header-info" style="font-size:12px; font-weight:700;"></div>
            <div style="font-size:24px; font-weight:800;" id="count-cajas">0</div>
        </div>
        <input type="text" id="inp-cli" placeholder="Nombre Cliente" class="input-box">
        <div style="display:flex; gap:8px;">
            <input type="number" id="inp-can" placeholder="Cajas" class="input-box" style="flex:1;">
            <button onclick="addPoint()" style="background:var(--accent); color:#fff; border:none; border-radius:12px; width:55px; font-size:24px;">+</button>
        </div>
        <div id="live-list" style="margin-top:10px;"></div>
        <button id="btn-save" onclick="openModal('modal-date')" style="display:none; background:var(--success); color:#fff; width:100%; padding:18px; border-radius:15px; border:none; font-weight:800; margin-top:15px;">GUARDAR RUTA</button>
    </div>

    <div id="modal-drivers" class="modal"><div style="background:#fff; border-radius:25px; width:100%; max-height:80vh; overflow-y:auto;" id="drivers-list"></div></div>
    
    <div id="modal-details" class="modal">
        <div style="background:#fff; border-radius:25px; padding:20px; width:100%; max-height:70vh; overflow-y:auto;">
            <h4 id="det-title" style="margin:0 0 15px 0;"></h4>
            <div id="det-list"></div>
            <button onclick="closeModals()" class="input-box" style="background:var(--text); color:#fff; border:none; margin-top:15px;">CERRAR</button>
        </div>
    </div>

    <div id="modal-wa-confirm" class="modal">
        <div style="background:#fff; border-radius:25px; padding:20px; width:100%; text-align:center;">
            <i class="ph-fill ph-whatsapp-logo" style="font-size:40px; color:#10b981;"></i>
            <h4 style="margin:10px 0;">¿Confirmar Personal?</h4>
            <div id="wa-preview" style="background:var(--bg); padding:15px; border-radius:15px; margin-bottom:15px; text-align:left; font-size:14px;"></div>
            <button onclick="executeWA()" class="input-box" style="background:#10b981; color:#fff; border:none;">ENVIAR WHATSAPP</button>
            <button onclick="closeModals()" style="width:100%; background:none; border:none; color:var(--text-dim); font-weight:700;">CANCELAR</button>
        </div>
    </div>

    <div id="modal-date" class="modal">
        <div style="background:#fff; border-radius:25px; padding:25px; width:100%; text-align:center;">
            <h4 style="margin:0 0 10px 0;">¿Cuándo sale?</h4>
            <button onclick="finalize('hoy')" class="input-box" style="background:var(--success); color:#fff; border:none;">PARA HOY</button>
            <button onclick="finalize('mañana')" class="input-box" style="background:var(--accent); color:#fff; border:none;">PARA MAÑANA</button>
        </div>
    </div>

    <nav class="nav-bar">
        <button class="nav-item active" id="n-dashboard" onclick="go('page-dashboard')"><i class="ph-fill ph-chart-pie"></i>CONTROL</button>
        <button class="nav-item" id="n-route" onclick="go('page-select-plate')"><i class="ph-fill ph-plus-circle"></i>NUEVO</button>
    </nav>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbxuVVOZfMx8jkN-q079s6g7ppPAF4XIkNG-DEQGt6MqiownzLo3NMyWBIZ1hkTyoPBl/exec";
        let db = JSON.parse(localStorage.getItem('tw_db_v38') || '[]');
        let currentCarga = [], activeId = null;
        const FLOTA = { "CEP-929": "ROMARIO", "BPN-711": "CESAR C.", "BVN-704": "LUIS H.", "BUL-742": "WALDIR", "BVN-930": "MARCELO" };
        const CONDUCTORES = ["TAJHO", "ROMARIO", "CESAR C.", "LUIS H.", "WALDIR", "MARCELO", "RELEVO 1"];

        window.onload = () => { renderStats(); renderHistory(); setupPlates(); setupDrivers(); };

        function setupPlates() {
            const g = document.getElementById('plate-grid');
            for(let p in FLOTA) g.innerHTML += `<div class="card" onclick="startCrew('${p}')" style="font-weight:800; padding:20px;">${p}</div>`;
        }

        function setupDrivers() {
            const l = document.getElementById('drivers-list');
            l.innerHTML = '<div style="padding:20px; border-bottom:1px solid #eee; text-align:center;"><b>Seleccionar Conductor</b></div>';
            CONDUCTORES.forEach(d => l.innerHTML += `<div class="driver-chip" onclick="selectDriver('${d}')">${d}</div>`);
        }

        function startCrew(p) {
            localStorage.setItem('tmp_p', p);
            localStorage.setItem('tmp_d', FLOTA[p]);
            document.getElementById('crew-plate').innerText = p;
            document.getElementById('display-driver').innerText = FLOTA[p];
            go('page-crew');
        }

        function selectDriver(d) {
            localStorage.setItem('tmp_d', d);
            document.getElementById('display-driver').innerText = d;
            closeModals();
        }

        function confirmCrew() {
            localStorage.setItem('tmp_a', document.getElementById('sel-aux').value);
            document.getElementById('route-header-info').innerHTML = `${localStorage.getItem('tmp_p')}<br>${localStorage.getItem('tmp_d')}`;
            currentCarga = []; updateCargaUI();
            go('page-route');
        }

        function addPoint() {
            const cli = document.getElementById('inp-cli').value.toUpperCase(), can = parseInt(document.getElementById('inp-can').value);
            if(!cli || !can) return;
            currentCarga.push({cli, can});
            document.getElementById('inp-cli').value = ""; document.getElementById('inp-can').value = "";
            updateCargaUI();
        }

        function updateCargaUI() {
            let t = 0, h = "";
            currentCarga.forEach((it, i) => {
                t += it.can;
                h += `<div class="card" style="display:flex; justify-content:space-between; padding:10px; margin-bottom:5px; border-left:3px solid var(--accent); font-size:13px;">
                    <span><b>${it.can}</b> ${it.cli}</span>
                    <i class="ph ph-trash" style="color:var(--danger)" onclick="currentCarga.splice(${i},1);updateCargaUI()"></i>
                </div>`;
            });
            document.getElementById('count-cajas').innerText = t;
            document.getElementById('btn-save').style.display = t > 0 ? 'block' : 'none';
            document.getElementById('live-list').innerHTML = h;
        }

        async function finalize(tipo) {
            let f = new Date(); if(tipo==='mañana') f.setDate(f.getDate()+1);
            const r = {
                fecha: f.toISOString().split('T')[0],
                placa: localStorage.getItem('tmp_p'),
                chofer: localStorage.getItem('tmp_d'),
                auxiliar: localStorage.getItem('tmp_a'),
                items: currentCarga.map(i => `${i.cli}: ${i.can}`).join(", "),
                total: currentCarga.reduce((a,b)=>a+b.can,0),
                puntos: currentCarga.length,
                id: 'R' + Date.now()
            };
            db.unshift(r); localStorage.setItem('tw_db_v38', JSON.stringify(db));
            fetch(API, {method:'POST', mode:'no-cors', body:JSON.stringify(r)});
            closeModals(); go('page-dashboard'); renderStats(); renderHistory();
        }

        function renderHistory() {
            const q = document.getElementById('smart-search').value.toLowerCase();
            let h = "";
            db.filter(r => JSON.stringify(r).toLowerCase().includes(q)).slice(0,15).forEach(r => {
                const isP = r.auxiliar === "POR DEFINIR";
                h += `<div class="card" style="border-left:4px solid ${isP?'var(--danger)':'var(--accent)'}">
                    <div style="display:flex; justify-content:space-between;"><b>${r.placa}</b><b style="color:var(--accent)">${r.total} CJS</b></div>
                    <div style="font-size:11px; color:var(--text-dim); margin-top:4px;">${r.chofer} | ${r.auxiliar}</div>
                    <div class="card-actions">
                        <button class="btn-icon" style="background:var(--bg);" onclick="showDetails('${r.id}')"><i class="ph-bold ph-eye"></i></button>
                        <button class="btn-icon" style="background:#ecfdf5; color:#10b981;" onclick="preWA('${r.id}')"><i class="ph-fill ph-whatsapp-logo"></i></button>
                    </div>
                </div>`;
            });
            document.getElementById('history-feed').innerHTML = h;
        }

        function showDetails(id) {
            const r = db.find(x => x.id === id);
            document.getElementById('det-title').innerText = `${r.placa} - Puntos`;
            document.getElementById('det-list').innerHTML = r.items.split(',').map(i => `<div style="padding:10px; border-bottom:1px solid #eee;">${i.trim()}</div>`).join('');
            openModal('modal-details');
        }

        function preWA(id) {
            activeId = id;
            const r = db.find(x => x.id === id);
            document.getElementById('wa-preview').innerHTML = `<b>Chofer:</b> ${r.chofer}<br><b>Auxiliar:</b> ${r.auxiliar}<br><b>Total:</b> ${r.total} Cajas`;
            openModal('modal-wa-confirm');
        }

        function executeWA() {
            const r = db.find(x => x.id === activeId);
            const msg = `*TWINS ELITE*\n📦 *Unidad:* ${r.placa}\n👤 *Chofer:* ${r.chofer}\n🤝 *Auxiliar:* ${r.auxiliar}\n📅 *Fecha:* ${r.fecha}\n\n*TOTAL: ${r.total} CAJAS*`;
            window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
            closeModals();
        }

        function renderStats() {
            const h = new Date().toISOString().split('T')[0], m = h.substring(0,7);
            const dH = db.filter(r => r.fecha === h), dM = db.filter(r => r.fecha.startsWith(m));
            document.getElementById('d-cajas').innerText = dH.reduce((a,b)=>a+b.total,0);
            document.getElementById('d-clientes').innerText = dH.reduce((a,b)=>a+b.puntos,0);
            document.getElementById('m-cajas').innerText = dM.reduce((a,b)=>a+b.total,0);
            document.getElementById('m-clientes').innerText = dM.reduce((a,b)=>a+b.puntos,0);
        }

        function go(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id.includes('dash')?'n-dashboard':'n-route').classList.add('active');
        }
        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModals() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }
    </script>
</body>
</html>
