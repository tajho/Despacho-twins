<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TWINS DESPACHO NEBULA V33</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root {
            --bg: #020406; --glass: rgba(255, 255, 255, 0.03);
            --accent: #007aff; --accent-glow: rgba(0, 122, 255, 0.5);
            --text: #f5f5f7; --text-dim: #86868b;
            --border: rgba(255, 255, 255, 0.08);
            --success: #2ed158; --danger: #ff453a; --info: #58a6ff;
        }

        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; outline: none; }
        body { 
            margin: 0; background: var(--bg); color: var(--text); 
            font-family: 'Plus Jakarta Sans', sans-serif; min-height: 100vh;
            background-image: radial-gradient(circle at 50% -20%, #111827, #020406);
        }

        .page { display: none; padding: 20px; padding-bottom: 120px; max-width: 500px; margin: 0 auto; animation: scaleUp 0.4s cubic-bezier(0.2, 0, 0, 1); }
        .active { display: block !important; }
        @keyframes scaleUp { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

        .top-header { 
            position: sticky; top: 0; z-index: 1000; 
            background: rgba(2, 4, 6, 0.8); backdrop-filter: blur(20px);
            padding: 20px; display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 1px solid var(--border);
        }
        .logo { font-weight: 800; font-size: 18px; letter-spacing: -0.5px; color: var(--text); }
        .logo span { color: var(--accent); }

        .card { 
            background: var(--glass); border: 1px solid var(--border); 
            border-radius: 28px; padding: 20px; margin-bottom: 15px;
            backdrop-filter: blur(10px);
        }

        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 15px; }
        .stat-card { background: var(--glass); border: 1px solid var(--border); padding: 15px; border-radius: 20px; }
        .stat-val { display: block; font-size: 22px; font-weight: 800; color: var(--text); }
        .stat-lab { font-size: 9px; color: var(--text-dim); font-weight: 700; text-transform: uppercase; }

        input, select { 
            width: 100%; padding: 16px; border-radius: 18px; border: 1px solid var(--border); 
            background: rgba(255,255,255,0.03); color: white; font-size: 15px;
        }

        .btn { 
            width: 100%; padding: 18px; border-radius: 20px; border: none; 
            font-size: 15px; font-weight: 700; cursor: pointer; 
            display: flex; justify-content: center; align-items: center; gap: 10px; transition: 0.3s;
        }
        .btn-main { background: var(--accent); color: white; box-shadow: 0 10px 20px var(--accent-glow); }
        .btn-ghost { background: var(--glass); color: var(--text); border: 1px solid var(--border); }

        .status-badge { font-size: 9px; padding: 4px 10px; border-radius: 50px; font-weight: 800; text-transform: uppercase; }
        .status-done { background: rgba(46, 209, 88, 0.15); color: var(--success); }
        .status-pending { background: rgba(0, 122, 255, 0.15); color: var(--accent); }

        .nav-bar { 
            position: fixed; bottom: 20px; left: 20px; right: 20px; 
            background: rgba(20, 20, 25, 0.9); backdrop-filter: blur(25px);
            height: 75px; border-radius: 30px; border: 1px solid var(--border);
            display: flex; justify-content: space-around; align-items: center; z-index: 2000;
        }
        .nav-link { display: flex; flex-direction: column; align-items: center; color: var(--text-dim); border: none; background: none; flex: 1; font-size: 10px; font-weight: 700; }
        .nav-link.active { color: var(--accent); }
        .nav-link i { font-size: 24px; margin-bottom: 2px; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); backdrop-filter: blur(15px); z-index: 3000; padding: 25px; align-items: center; justify-content: center; }
        .modal-card { background: #0c0e12; border-radius: 35px; padding: 30px; width: 100%; max-width: 400px; border: 1px solid var(--border); }
    </style>
</head>
<body>

    <div id="m-auth" class="modal">
        <div class="modal-card">
            <h2 style="text-align:center; margin:0">Acceso Admin</h2>
            <p style="text-align:center; color:var(--text-dim); font-size:13px; margin-bottom:25px">Verificación de identidad requerida</p>
            <input type="password" id="admin-pass" placeholder="••••" style="text-align:center; font-size:24px; letter-spacing:8px; margin-bottom:20px">
            <button class="btn btn-main" onclick="verifyAuth()">INGRESAR</button>
            <button class="btn" style="background:none; color:var(--text-dim)" onclick="location.reload()">VOLVER</button>
        </div>
    </div>

    <div id="m-list" class="modal" onclick="this.style.display='none'">
        <div class="modal-card" onclick="event.stopPropagation()">
            <h3 id="m-title" style="margin:0 0 5px 0">Detalle</h3>
            <p id="m-subtitle" style="color:var(--text-dim); font-size:12px; margin-bottom:20px;"></p>
            <div id="m-container" style="max-height: 250px; overflow-y: auto;"></div>
            <button class="btn btn-main" style="margin-top:20px" onclick="document.getElementById('m-list').style.display='none'">CERRAR</button>
        </div>
    </div>

    <header id="app-header" class="top-header" style="display:none">
        <div class="logo">TWINS <span>DESPACHO</span></div>
        <div style="display:flex; align-items:center; gap:12px">
            <div style="font-size:10px; font-weight:800; background:var(--glass); padding:5px 12px; border-radius:10px" id="user-display">---</div>
            <i class="ph-bold ph-power" onclick="logout()" style="color:var(--danger); font-size:20px"></i>
        </div>
    </header>

    <div id="page-login" class="page active" style="text-align:center; padding-top:10vh">
        <div style="width: 80px; height: 80px; background: var(--accent); border-radius: 25px; display:flex; align-items:center; justify-content:center; margin: 0 auto 30px; box-shadow: 0 15px 30px var(--accent-glow)">
            <i class="ph-fill ph-truck" style="font-size: 40px; color: white;"></i>
        </div>
        <h1 style="font-weight: 800; font-size: 28px; margin: 0;">BIENVENIDO</h1>
        <p style="color:var(--text-dim); margin-bottom: 40px">Selecciona tu usuario para iniciar</p>
        <div id="login-grid" style="display:grid; gap:12px; padding: 0 20px;"></div>
    </div>

    <div id="page-route" class="page">
        <div class="card" style="background: linear-gradient(135deg, #007aff, #0044bb); border:none; display:flex; justify-content:space-between; align-items:center">
            <div>
                <span class="stat-lab" style="color:rgba(255,255,255,0.7)">Carga Preparada</span>
                <div id="total-cajas" style="font-size:45px; font-weight:800; line-height:1">0</div>
                <div id="total-puntos" style="font-size:12px; font-weight:700; margin-top:5px; opacity:0.9">0 Puntos de entrega</div>
            </div>
            <i class="ph-fill ph-package" style="font-size:60px; opacity:0.2"></i>
        </div>

        <div class="card">
            <input type="text" id="cli" placeholder="Cliente / Destino" style="margin-bottom:12px">
            <div style="display:flex; gap:10px">
                <input type="number" id="can" placeholder="Cant." style="flex:0.7">
                <button class="btn btn-main" onclick="addItem()" style="flex:1.3"><i class="ph-bold ph-plus"></i>AÑADIR</button>
            </div>
        </div>

        <div id="send-zone" style="display:none">
            <div id="temp-list" class="card" style="font-size:13px; border-style:dashed; background:transparent"></div>
            <div class="card">
                <select id="pla" onchange="smartPredict()" style="margin-bottom:12px"></select>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:12px">
                    <select id="cho"></select>
                    <select id="aux"></select>
                </div>
                <button class="btn" style="background:var(--success); color:black" onclick="document.getElementById('m-type').style.display='flex'">
                    <i class="ph-bold ph-check"></i> GUARDAR DESPACHO
                </button>
            </div>
        </div>
    </div>

    <div id="page-history" class="page">
        <div class="stat-grid">
            <div class="stat-card">
                <span class="stat-lab">Total Cajas</span>
                <span class="stat-val" id="st-cajas">0</span>
            </div>
            <div class="stat-card">
                <span class="stat-lab">Total Puntos</span>
                <span class="stat-val" id="st-puntos" style="color:var(--info)">0</span>
            </div>
        </div>

        <div id="admin-tools" style="display:none; margin-bottom:15px">
            <button class="btn btn-ghost" style="color:var(--success); border-color:var(--success)" onclick="alert('Exportando reporte...')">
                <i class="ph-bold ph-microsoft-excel-logo"></i> REPORTE GERENCIAL
            </button>
        </div>

        <div style="display:flex; gap:10px; margin-bottom:15px">
            <input type="date" id="f-filter" onchange="renderHistory()" style="flex:1">
            <input type="text" id="search" oninput="renderHistory()" placeholder="Buscar..." style="flex:1">
        </div>
        <div id="history-container"></div>
    </div>

    <div id="page-fleet" class="page">
        <div id="fleet-list"></div>
    </div>

    <div id="m-type" class="modal">
        <div class="modal-card">
            <h3 style="text-align:center; margin-top:0">Fecha de Salida</h3>
            <button class="btn btn-main" style="margin-bottom:12px" onclick="saveRoute('HOY')">HOY</button>
            <button class="btn btn-ghost" style="color:var(--success)" onclick="saveRoute('MAÑANA')">MAÑANA</button>
            <button class="btn" style="background:none; color:var(--text-dim)" onclick="document.getElementById('m-type').style.display='none'">CANCELAR</button>
        </div>
    </div>

    <nav id="app-nav" class="nav-bar" style="display:none">
        <button class="nav-link" id="n-route" onclick="nav('page-route')"><i class="ph ph-cube"></i>Ruta</button>
        <button class="nav-link" id="n-history" onclick="nav('page-history')"><i class="ph ph-chart-line"></i>Data</button>
        <button class="nav-link" id="n-fleet" onclick="nav('page-fleet')"><i class="ph ph-truck"></i>Flota</button>
    </nav>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbxCRMbdOGYjf0R-w1v9tHG76jDhHXxuXOwHahYEV7Gj1lFn3y42C2s9DUO5nkgO75qy/exec";
        let user = "", items = [], database = [];
        
        const PLACAS = ["CEP-929", "BPN-711", "BVN-704", "BUL-742", "BVN-930"];
        const CHOFERES = ["LUIS H.", "ROMARIO", "CESAR C.", "WALDIR", "MARCELO"];
        const AUXILIARES = ["CRISTOPHER", "PLACIDO", "RODOLFO", "SIN AUXILIAR"];
        const SOATS = { "CEP-929": "15/05/26", "BPN-711": "22/08/26", "BVN-704": "10/01/27", "BUL-742": "05/11/26", "BVN-930": "30/09/26" };

        window.onload = () => {
            initInputs();
            const saved = localStorage.getItem('tw_user');
            document.getElementById('f-filter').value = new Date().toISOString().split('T')[0];
            if(saved) login(saved);
            loadData();
        };

        function initInputs() {
            const grid = document.getElementById('login-grid');
            ['TAJHO ADMIN', 'FRANCESCO', 'OSCAR', 'LUIS HERBER'].forEach(u => {
                grid.innerHTML += `<button class="btn btn-ghost" onclick="checkAuth('${u}')">${u}</button>`;
            });
            document.getElementById('pla').innerHTML = '<option value="">Placa</option>' + PLACAS.map(p => `<option value="${p}">${p}</option>`).join('');
            document.getElementById('cho').innerHTML = '<option value="">Chofer</option>' + CHOFERES.map(c => `<option value="${c}">${c}</option>`).join('');
            document.getElementById('aux').innerHTML = '<option value="">Auxiliar</option>' + AUXILIARES.map(a => `<option value="${a}">${a}</option>`).join('');
        }

        function checkAuth(u) {
            if(u === 'TAJHO ADMIN') {
                document.getElementById('m-auth').style.display = 'flex';
                document.getElementById('admin-pass').focus();
            } else { login(u); }
        }

        function verifyAuth() {
            if(document.getElementById('admin-pass').value === '1234') {
                document.getElementById('m-auth').style.display = 'none';
                login('TAJHO ADMIN');
            } else { alert("Clave Incorrecta"); }
        }

        function login(u) {
            user = u; localStorage.setItem('tw_user', u);
            document.getElementById('page-login').classList.remove('active');
            document.getElementById('app-header').style.display = 'flex';
            document.getElementById('app-nav').style.display = 'flex';
            document.getElementById('user-display').innerText = u;
            if(u === 'TAJHO ADMIN') document.getElementById('admin-tools').style.display = 'block';
            nav('page-route');
        }

        function nav(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('n-' + id.split('-')[1]).classList.add('active');
            if(id === 'page-history') renderHistory();
            if(id === 'page-fleet') renderFleet();
        }

        async function loadData() {
            try { const r = await fetch(API); database = await r.json(); renderHistory(); renderFleet(); } catch(e){}
        }

        function smartPredict() {
            const p = document.getElementById('pla').value;
            if(!p) return;
            const last = database.slice().reverse().find(r => r.placa === p);
            if(last) {
                document.getElementById('cho').value = last.chofer;
                document.getElementById('aux').value = last.auxiliar;
            }
        }

        function addItem() {
            const cl = document.getElementById('cli').value.toUpperCase(), ca = parseInt(document.getElementById('can').value);
            if(!cl || !ca) return;
            items.unshift({cl, ca});
            document.getElementById('cli').value = ""; document.getElementById('can').value = "";
            renderTemp();
        }

        function renderTemp() {
            const box = document.getElementById('temp-list');
            let total = 0; box.innerHTML = "";
            items.forEach((item, i) => {
                total += item.ca;
                box.innerHTML += `<div style="display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid var(--border)">
                    <span>${item.cl}</span><b>${item.ca} CJ <i class="ph ph-trash" onclick="items.splice(${i},1);renderTemp()" style="color:var(--danger);margin-left:10px"></i></b>
                </div>`;
            });
            document.getElementById('total-cajas').innerText = total;
            document.getElementById('total-puntos').innerText = items.length + " Puntos de entrega";
            document.getElementById('send-zone').style.display = items.length ? 'block' : 'none';
        }

        async function saveRoute(tipo) {
            document.getElementById('m-type').style.display = 'none';
            let d = new Date();
            if(tipo === 'MAÑANA') { d.setDate(d.getDate() + 1); if(d.getDay() === 0) d.setDate(d.getDate() + 1); }
            const fT = d.toISOString().split('T')[0];

            const reg = {
                fecha: fT, chofer: document.getElementById('cho').value, auxiliar: document.getElementById('aux').value,
                placa: document.getElementById('pla').value, operario: user,
                items: items.map(i => `${i.cl}:${i.ca}`).join(", "), 
                total: items.reduce((a,b)=>a+b.ca,0),
                puntos: items.length
            };

            database.push(reg);
            document.getElementById('f-filter').value = fT;
            nav('page-history');
            fetch(API, { method: 'POST', mode: 'no-cors', body: JSON.stringify(reg) });
            items = []; renderTemp();
        }

        function renderHistory() {
            const cont = document.getElementById('history-container'), fD = document.getElementById('f-filter').value;
            const sQ = document.getElementById('search').value.toUpperCase();
            const hoyStr = new Date().toISOString().split('T')[0];
            let html = "", tC = 0, tP = 0;

            database.slice().reverse().forEach(r => {
                const rf = r.fecha.split('T')[0];
                const matchesSearch = r.items.toUpperCase().includes(sQ) || r.chofer.toUpperCase().includes(sQ);

                if(rf === fD && matchesSearch) {
                    tC += parseFloat(r.total); tP += parseInt(r.puntos || r.items.split(',').length);
                    
                    // INTELIGENCIA DE ESTADO: Si la fecha es menor a hoy, está entregado
                    const isOld = rf < hoyStr;
                    const statusClass = isOld ? "status-done" : "status-pending";
                    const statusLabel = isOld ? "ENTREGADO" : (rf === hoyStr ? "EN RUTA" : "PROGRAMADO");

                    html += `<div class="card" style="border-left:5px solid ${isOld ? 'var(--success)' : 'var(--accent)'}">
                        <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:12px">
                            <div>
                                <b style="font-size:17px; display:block">${r.placa}</b>
                                <span class="status-badge ${statusClass}">${statusLabel}</span>
                            </div>
                            <div style="text-align:right">
                                <b style="color:var(--accent); font-size:18px">${r.total} CJ</b>
                                <div style="font-size:10px; color:var(--text-dim)">${r.puntos || r.items.split(',').length} PUNTOS</div>
                            </div>
                        </div>
                        <div style="font-size:13px; font-weight:600; margin-bottom:15px; color:var(--text-dim)">${r.chofer} • ${r.auxiliar}</div>
                        <div style="display:flex; gap:8px">
                            <button class="btn-mini btn-ghost" style="flex:1; padding:10px" onclick="viewItems('${r.items}', '${r.chofer}')">VER DETALLE</button>
                            <button class="btn-mini" style="background:#25D366; color:white; border:none; width:50px" onclick="wa('${r.fecha}','${r.chofer}','${r.total}','${r.items}')"><i class="ph-fill ph-whatsapp-logo" style="font-size:20px"></i></button>
                        </div>
                    </div>`;
                }
            });
            cont.innerHTML = html || "<p style='text-align:center; color:var(--text-dim); padding:40px'>No hay registros para este día</p>";
            document.getElementById('st-cajas').innerText = tC;
            document.getElementById('st-puntos').innerText = tP;
        }

        function viewItems(txt, ch) {
            document.getElementById('m-title').innerText = "Destinos: " + ch;
            document.getElementById('m-container').innerHTML = txt.split(", ").map(i => {
                const [cl, ca] = i.split(":");
                return `<div style="display:flex; justify-content:space-between; padding:12px 0; border-bottom:1px solid var(--border)"><span>${cl}</span><b>${ca} CJ</b></div>`;
            }).join('');
            document.getElementById('m-list').style.display = 'flex';
        }

        function wa(f,c,t,i) {
            const m = `*TWINS DESPACHO*%0A*Estado:* DESPACHADO%0A*Fecha:* ${f.split('T')[0]}%0A*Chofer:* ${c}%0A*Carga:* ${t} CJ%0A%0A*Detalle:*%0A${i.replace(/:/g, ': ').replace(/,/g, '%0A')}`;
            window.location.href = `https://wa.me/?text=${m}`;
        }

        function renderFleet() {
            const list = document.getElementById('fleet-list'), fD = document.getElementById('f-filter').value;
            list.innerHTML = `<h3 style="margin-bottom:20px; font-weight:800">Estado de Unidades</h3>`;
            PLACAS.forEach(p => {
                const r = database.find(x => x.placa === p && x.fecha.split('T')[0] === fD);
                list.innerHTML += `<div class="card" style="border-left:5px solid ${r ? 'var(--danger)' : 'var(--success)'}">
                    <div style="display:flex; justify-content:space-between"><b>${p}</b> <small style="font-size:10px; color:var(--text-dim)">SOAT: ${SOATS[p]}</small></div>
                    <div style="margin-top:8px; font-size:14px">${r ? '🔴 ASIGNADO: ' + r.chofer : '🟢 DISPONIBLE'}</div>
                </div>`;
            });
        }

        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
