<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TWINS ELITE - V17 OFICIAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root {
            --bg: #0b0f17; --surface: #161c28; --accent: #007aff; 
            --text: #ffffff; --text-dim: #94a3b8; --border: #2d3748; 
            --success: #34c759; --danger: #ff3b30; --warning: #ffcc00;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; }
        
        .page { display: none; padding: 10px 15px 120px 15px; max-width: 500px; margin: 0 auto; }
        .active { display: block !important; }

        .top-header { position: sticky; top: 0; z-index: 1000; background: rgba(11, 15, 23, 0.95); backdrop-filter: blur(10px); padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }

        /* TARJETAS DE DATA MEJORADAS */
        .history-card { 
            background: var(--surface); 
            border-radius: 20px; 
            padding: 16px; 
            border: 1px solid var(--border); 
            margin-bottom: 15px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .h-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .h-header b { font-size: 18px; color: var(--accent); letter-spacing: 0.5px; }
        .h-header .badge { background: rgba(52, 199, 89, 0.15); color: var(--success); padding: 4px 10px; border-radius: 8px; font-size: 12px; font-weight: 800; }
        
        .h-body { font-size: 13px; color: var(--text-dim); margin-bottom: 15px; line-height: 1.5; }
        .h-body i { color: var(--accent); margin-right: 5px; width: 16px; text-align: center; }

        /* BOTONERA DE ACCIÓN - AHORA MÁS VISIBLE */
        .h-actions { 
            display: flex; 
            gap: 8px; 
            margin-top: 12px; 
            padding-top: 12px; 
            border-top: 1px solid var(--border);
        }
        .btn-act { 
            flex: 1; 
            border: none; 
            border-radius: 10px; 
            padding: 10px 5px; 
            font-size: 11px; 
            font-weight: 800; 
            color: white; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 4px;
            cursor: pointer;
        }
        .btn-view { background: #2d3748; }
        .btn-edit { background: #3e4c62; }
        .btn-wa { background: #128c7e; }

        /* MODAL */
        .modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:3000; align-items:center; justify-content:center; padding:20px; backdrop-filter: blur(5px); }
        .modal-content { background:var(--surface); width:100%; max-width:380px; border-radius:24px; padding:24px; border:1px solid var(--border); }

        /* NAV */
        .nav-bar { position: fixed; bottom: 20px; left: 15px; right: 15px; background: #1c2533; height: 70px; border-radius: 20px; display: flex; border: 1px solid var(--border); z-index: 2000; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-dim); background: none; border: none; font-size: 10px; font-weight: 700; }
        .nav-item.active { color: var(--accent); }
        .nav-item i { font-size: 24px; margin-bottom: 2px; }

        input { background: var(--surface); border: 1px solid var(--border); padding: 14px; border-radius: 12px; color: white; width: 100%; margin-bottom: 10px; font-size: 15px; }
    </style>
</head>
<body>

    <header id="app-header" class="top-header" style="display:none">
        <div style="font-weight:900; font-size:16px;">TWINS <span style="color:var(--accent)">ELITE</span></div>
        <div id="sync-label" style="font-size:10px; font-weight:800; color:var(--success)">● ACTUALIZADO</div>
    </header>

    <div id="page-login" class="page active">
        <div style="text-align:center; padding:60px 0"><h2 style="font-weight:800;">Acceso</h2></div>
        <div id="login-options"></div>
    </div>

    <div id="page-select-plate" class="page">
        <h3 style="text-align:center; margin-bottom:20px;">Seleccione Unidad</h3>
        <div id="plate-options" style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;"></div>
    </div>

    <div id="page-route" class="page">
        <div style="background: linear-gradient(135deg, #007aff, #0056b3); padding: 20px; border-radius: 20px; margin-bottom: 20px;">
            <div style="display:flex; justify-content:space-between; align-items:center">
                <div><small style="font-weight:800; opacity:0.8">CAJAS TOTAL</small><div id="count-cajas" style="font-size:38px; font-weight:800;">0</div></div>
                <div style="text-align:right"><b id="active-plate-label" style="font-size:18px;">---</b><br><small id="count-puntos">0 puntos</small></div>
            </div>
        </div>
        <input type="text" id="inp-cli" placeholder="Nombre Cliente">
        <div style="display:flex; gap:10px; margin-bottom:15px">
            <input type="number" id="inp-can" placeholder="Cant." style="flex:1">
            <button onclick="addPoint()" style="background:var(--accent); border:none; border-radius:12px; color:white; width:60px; height:50px;"><i class="ph-bold ph-plus"></i></button>
        </div>
        <div id="live-list"></div>
        <div id="finalize-area" style="display:none; margin-top:20px; border-top:1px solid var(--border); padding-top:20px">
            <button onclick="finalize()" style="background:var(--success); color:white; width:100%; padding:18px; border-radius:15px; border:none; font-weight:800; font-size:16px;">GUARDAR EN EXCEL</button>
        </div>
    </div>

    <div id="page-history" class="page">
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:15px">
            <div style="background:var(--surface); padding:12px; border-radius:15px; border-left:4px solid var(--accent)">
                <small style="font-size:9px; color:var(--text-dim)">MES</small><br><b id="h-mes" style="font-size:18px">0</b>
            </div>
            <div style="background:var(--surface); padding:12px; border-radius:15px; border-left:4px solid var(--success)">
                <small style="font-size:9px; color:var(--text-dim)">HOY</small><br><b id="h-hoy" style="font-size:18px">0</b>
            </div>
        </div>
        <input type="text" id="search-input" placeholder="Buscar chofer, placa o cliente..." oninput="renderHistory()">
        <div id="history-feed"></div>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <h3 id="m-title" style="margin-top:0; color:var(--accent)">Detalle</h3>
            <div id="m-body" style="max-height:300px; overflow-y:auto; margin:15px 0; border-top:1px solid var(--border)"></div>
            <button onclick="closeModal()" style="width:100%; background:var(--accent); border:none; padding:15px; border-radius:12px; color:white; font-weight:800;">ENTENDIDO</button>
        </div>
    </div>

    <nav id="app-nav" class="nav-bar" style="display:none">
        <button class="nav-item active" id="n-route" onclick="go('page-route')"><i class="ph-fill ph-plus-circle"></i>NUEVO</button>
        <button class="nav-item" id="n-history" onclick="go('page-history')"><i class="ph-fill ph-chart-pie-slice"></i>DATA</button>
    </nav>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbxuVVOZfMx8jkN-q079s6g7ppPAF4XIkNG-DEQGt6MqiownzLo3NMyWBIZ1hkTyoPBl/exec";
        let db = [], currentCarga = [], activeUser = "";
        const ASIGNACION = { "CEP-929": "ROMARIO", "BPN-711": "CESAR C.", "BVN-704": "LUIS H.", "BUL-742": "WALDIR", "BVN-930": "MARCELO" };

        window.onload = () => {
            setupUI();
            if(localStorage.getItem('tw_logged')) login(localStorage.getItem('tw_logged'));
        };

        function setupUI() {
            const l = document.getElementById('login-options');
            ['TAJHO ADMIN', 'FRANCESCO', 'OSCAR', 'LUIS HERBER'].forEach(u => {
                l.innerHTML += `<div onclick="checkPass('${u}')" style="background:var(--surface); padding:18px; border-radius:15px; margin-bottom:10px; border:1px solid var(--border); font-weight:700;">${u}</div>`;
            });
            document.getElementById('plate-options').innerHTML = Object.keys(ASIGNACION).map(p => 
                `<div onclick="startPlate('${p}')" style="background:var(--surface); border:1px solid var(--border); padding:20px 10px; border-radius:15px; font-weight:800; text-align:center;">${p}</div>`
            ).join('');
        }

        async function syncData() {
            try {
                const r = await fetch(API);
                db = await r.json();
                processStats(); renderHistory();
            } catch(e) { console.error(e); }
        }

        function processStats() {
            const hoy = new Date().toLocaleDateString('sv-SE');
            let dC = 0, mC = 0;
            db.forEach(r => {
                const n = parseFloat(r.total || 0);
                if(r.fecha === hoy) dC += n;
                if(r.fecha && r.fecha.startsWith(hoy.substring(0, 7))) mC += n;
            });
            document.getElementById('h-hoy').innerText = dC;
            document.getElementById('h-mes').innerText = mC;
        }

        function renderHistory() {
            const container = document.getElementById('history-feed');
            const query = document.getElementById('search-input').value.toLowerCase();
            let html = "";

            db.filter(r => r.placa.toLowerCase().includes(query) || r.chofer.toLowerCase().includes(query) || r.items.toLowerCase().includes(query))
            .slice(0, 20).forEach((r, idx) => {
                html += `
                <div class="history-card">
                    <div class="h-header"><b>${r.placa}</b> <span class="badge">${r.total} CJS</span></div>
                    <div class="h-body">
                        <div><i class="ph-fill ph-user"></i> ${r.chofer}</div>
                        <div><i class="ph-fill ph-clock"></i> ${r.hora} | ${r.fecha}</div>
                    </div>
                    <div class="h-actions">
                        <button class="btn-act btn-view" onclick="viewR(${idx})"><i class="ph-bold ph-eye"></i> VER</button>
                        <button class="btn-act btn-edit" onclick="editR(${idx})"><i class="ph-bold ph-pencil"></i> EDITAR</button>
                        <button class="btn-act btn-wa" onclick="sendWA(${idx})"><i class="ph-bold ph-whatsapp-logo"></i> WA</button>
                    </div>
                </div>`;
            });
            container.innerHTML = html || "<p style='text-align:center; opacity:0.3; margin-top:20px;'>No hay datos</p>";
        }

        function viewR(i) {
            const r = db[i];
            document.getElementById('m-title').innerText = "Ruta " + r.placa;
            document.getElementById('m-body').innerHTML = r.items.split(',').map(li => `<div style="padding:12px; border-bottom:1px solid var(--border); font-size:14px;">${li.trim()}</div>`).join('');
            document.getElementById('modal').style.display = "flex";
        }

        function editR(i) {
            const r = db[i];
            if(confirm("¿Cargar esta ruta para editar?")) {
                localStorage.setItem('tw_temp_placa', r.placa);
                currentCarga = r.items.split(',').map(li => {
                    const p = li.split(':');
                    return { cli: p[0].trim(), can: parseInt(p[1]) || 0 };
                });
                go('page-route'); refreshCargaUI();
            }
        }

        function sendWA(i) {
            const r = db[i];
            const msg = `*TWINS ELITE*\n📦 *${r.placa}* (${r.chofer})\n\n*RUTA:*\n${r.items.split(',').map(li => "• " + li.trim()).join('\n')}\n\n*TOTAL: ${r.total} CAJAS*`;
            window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
        }

        function closeModal() { document.getElementById('modal').style.display = "none"; }

        // CORE LOGIC
        function login(u) {
            activeUser = u; localStorage.setItem('tw_logged', u);
            document.getElementById('page-login').classList.remove('active');
            document.getElementById('app-header').style.display = 'flex';
            document.getElementById('app-nav').style.display = 'flex';
            syncData(); go('page-history');
        }
        function checkPass(u) { if(u==='TAJHO ADMIN' && prompt("Clave:")!=="1994") return; login(u); }
        function startPlate(p) { localStorage.setItem('tw_temp_placa', p); go('page-route'); refreshCargaUI(); }
        function go(id) {
            if(id === 'page-route' && !localStorage.getItem('tw_temp_placa')) { go('page-select-plate'); return; }
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            const bid = id === 'page-select-plate' ? 'n-route' : 'n-' + id.split('-')[1];
            if(document.getElementById(bid)) document.getElementById(bid).classList.add('active');
        }
        function addPoint() {
            const cli = document.getElementById('inp-cli').value.toUpperCase(), can = parseInt(document.getElementById('inp-can').value);
            if(!cli || !can) return;
            currentCarga.push({cli, can});
            document.getElementById('inp-cli').value = ""; document.getElementById('inp-can').value = "";
            refreshCargaUI();
        }
        function refreshCargaUI() {
            let t = 0; let h = "";
            document.getElementById('active-plate-label').innerText = localStorage.getItem('tw_temp_placa') || "---";
            currentCarga.forEach((it, i) => {
                t += it.can;
                h += `<div style="background:var(--surface); padding:14px; border-radius:12px; margin-bottom:8px; display:flex; justify-content:space-between; border:1px solid var(--border);"><span><b>${it.can}</b> ${it.cli}</span><i class="ph ph-trash" style="color:var(--danger)" onclick="currentCarga.splice(${i},1);refreshCargaUI()"></i></div>`;
            });
            document.getElementById('count-cajas').innerText = t;
            document.getElementById('count-puntos').innerText = currentCarga.length + " puntos";
            document.getElementById('finalize-area').style.display = t > 0 ? 'block' : 'none';
            document.getElementById('live-list').innerHTML = h;
        }
        async function finalize() {
            const p = localStorage.getItem('tw_temp_placa');
            const r = { fecha: new Date().toLocaleDateString('sv-SE'), hora: new Date().toLocaleTimeString('es-PE', {hour:'2-digit', minute:'2-digit', hour12:false}), chofer: ASIGNACION[p], placa: p, items: currentCarga.map(i => `${i.cli}: ${i.can}`).join(", "), total: currentCarga.reduce((a,b)=>a+b.can,0), operario: activeUser };
            fetch(API, {method:'POST', mode:'no-cors', body:JSON.stringify(r)});
            db.unshift(r); processStats(); currentCarga = []; localStorage.removeItem('tw_temp_placa'); go('page-history');
        }
    </script>
</body>
</html>
