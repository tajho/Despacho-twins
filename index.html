<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TWINS ELITE - V58.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root {
            --bg: #f4f6f8; --surface: #ffffff; --accent: #000000; 
            --text: #111827; --text-dim: #6b7280; --border: #e5e7eb; 
            --gold: #FFD700; --green: #10b981; --red: #ef4444;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { margin: 0; background: var(--bg); color: var(--text); padding-bottom: 100px; }

        .page { display: none; padding: 20px; max-width: 600px; margin: 0 auto; animation: fade 0.3s ease; }
        .active { display: block; }
        @keyframes fade { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

        /* Filtros */
        .filter-tabs { display: flex; gap: 8px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 5px; scrollbar-width: none; }
        .filter-btn { background: #fff; border: 1px solid var(--border); padding: 10px 18px; border-radius: 12px; font-size: 11px; font-weight: 800; white-space: nowrap; color: var(--text-dim); }
        .filter-btn.active { background: #000; color: #fff; border-color: #000; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }

        /* Tarjetas */
        .route-card { background: #fff; border-radius: 24px; padding: 20px; margin-bottom: 15px; border: 1px solid var(--border); }
        .card-meta { display: flex; justify-content: space-between; font-size: 10px; font-weight: 800; color: var(--text-dim); margin-bottom: 10px; }
        .route-actions { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 15px; border-top: 1px solid #f3f4f6; padding-top: 15px; }
        .btn-act { border: 1px solid var(--border); border-radius: 14px; padding: 12px 5px; font-size: 10px; font-weight: 800; background: #fff; display: flex; flex-direction: column; align-items: center; gap: 5px; color: var(--text); }
        .btn-act.wa { background: #000; color: #fff; border: none; }

        /* Selector de Unidades */
        .unit-card { background: #fff; padding: 25px 15px; border-radius: 22px; text-align: center; border: 1px solid var(--border); cursor: pointer; }
        .unit-card:active { background: #000; color: #fff; }

        /* Navegación */
        .nav-bottom { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; height: 85px; display: flex; border-top: 1px solid var(--border); z-index: 1000; padding: 0 10px; }
        .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #9ca3af; background: none; border: none; font-size: 10px; font-weight: 800; }
        .nav-btn.active { color: #000; }
        .nav-btn i { font-size: 26px; margin-bottom: 4px; }

        .field { background: #fff; border: 1px solid var(--border); border-radius: 16px; padding: 16px; width: 100%; font-size: 15px; font-weight: 700; outline: none; margin-bottom: 12px; }

        /* Rankings Data */
        .rank-card { background: #fff; border-radius: 24px; padding: 20px; border: 1px solid var(--border); margin-bottom: 15px; }
        .rank-bar-bg { background: #f3f4f6; height: 10px; border-radius: 10px; margin: 8px 0; overflow: hidden; }
        .rank-bar-fill { background: #000; height: 100%; border-radius: 10px; width: 0; transition: width 1s ease; }
    </style>
</head>
<body>

    <div id="page-units" class="page active">
        <h1 style="font-weight:900; margin-bottom:10px;">Twins Elite</h1>
        <p style="color:var(--text-dim); font-size:13px; font-weight:700; margin-bottom:25px;">Selecciona unidad:</p>
        <div id="units-grid" style="display:grid; grid-template-columns:1fr 1fr; gap:15px;"></div>
        <button onclick="injectFullData()" style="width:100%; margin-top:30px; padding:15px; border-radius:15px; background:#fff; border:2px dashed #ccc; font-weight:800; color:gray;">[ DESARROLLO: GENERAR DATA DE PRUEBA ]</button>
    </div>

    <div id="page-dash" class="page">
        <h1 style="font-weight:900; margin-bottom:20px;">Control Diario</h1>
        <div class="filter-tabs">
            <button class="filter-btn" id="f-ayer" onclick="setFilter('ayer')">AYER</button>
            <button class="filter-btn active" id="f-hoy" onclick="setFilter('hoy')">HOY</button>
            <button class="filter-btn" id="f-mañana" onclick="setFilter('mañana')">PRÓX. RUTA</button>
            <button class="filter-btn" id="f-todos" onclick="setFilter('todos')">HISTORIAL</button>
        </div>
        <div id="hist-cont"></div>
    </div>

    <div id="page-data" class="page">
        <h1 style="font-weight:900;">Rendimiento</h1>
        <input type="month" id="f-month" class="field" onchange="renderData()">
        <div class="rank-card">
            <div style="font-weight:800; font-size:11px; color:var(--text-dim); margin-bottom:15px;">TOP CHOFERES</div>
            <div id="rank-choferes"></div>
        </div>
        <div class="rank-card">
            <div style="font-weight:800; font-size:11px; color:var(--text-dim); margin-bottom:15px;">TOP AUXILIARES</div>
            <div id="rank-auxiliares"></div>
        </div>
    </div>

    <div id="page-config" class="page">
        <h2 id="conf-placa" style="font-weight:900; font-size:32px; margin-bottom:20px;">---</h2>
        <label style="font-size:11px; font-weight:800;">FECHA DE SALIDA</label>
        <input type="date" id="c-fecha" class="field">
        <label style="font-size:11px; font-weight:800;">CHOFER</label>
        <select id="c-chofer" class="field"></select>
        <label style="font-size:11px; font-weight:800;">AUXILIAR</label>
        <select id="c-aux" class="field"></select>
        <button onclick="goLoad()" style="width:100%; padding:20px; background:#000; color:#fff; border-radius:20px; font-weight:800; border:none;">SIGUIENTE</button>
    </div>

    <div id="page-load" class="page">
        <div style="display:flex; justify-content:space-between; margin-bottom:20px; background:#fff; padding:15px; border-radius:20px; border:1px solid var(--border);">
            <b id="load-placa-txt">---</b>
            <b id="load-total" style="font-size:22px;">0 CJS</b>
        </div>
        <div style="display:flex; gap:10px; margin-bottom:15px;">
            <input type="text" id="i-cli" placeholder="Cliente" class="field" style="flex:2; margin:0">
            <input type="number" id="i-can" placeholder="Cjs" class="field" style="flex:1; margin:0">
        </div>
        <button onclick="addItem()" style="width:100%; padding:18px; background:#000; color:#fff; border-radius:18px; font-weight:800; border:none;">AGREGAR</button>
        <div id="load-list" style="margin-top:20px;"></div>
        <button id="btn-save" onclick="save()" style="display:none; width:100%; padding:20px; background:var(--green); color:#fff; border-radius:20px; font-weight:900; border:none; margin-top:20px;">FINALIZAR</button>
    </div>

    <nav class="nav-bottom">
        <button class="nav-btn active" id="n-units" onclick="go('page-units')"><i class="ph-bold ph-plus-circle"></i>NUEVA</button>
        <button class="nav-btn" id="n-dash" onclick="go('page-dash')"><i class="ph-bold ph-clock-counter-clockwise"></i>HISTORIAL</button>
        <button class="nav-btn" id="n-data" onclick="go('page-data')"><i class="ph-bold ph-chart-bar"></i>DATA</button>
    </nav>

    <script>
        let db = JSON.parse(localStorage.getItem('twins_db_v58')) || [];
        let cur = { items: [] };
        let activeFilter = 'hoy';

        const FLOTA = { "CEP-929": "ROMARIO", "BPN-711": "CESAR C.", "BVN-704": "LUIS H.", "BUL-742": "WALDIR", "BVN-930": "MARCELO" };
        const CONDUCTORES = ["TAJHO", "ROMARIO", "CESAR C.", "LUIS H.", "WALDIR", "MARCELO"];
        const AUXILIARES = ["CRISTOPHER", "PERCY", "PLACIDO", "RODOLFO", "RICARDO", "ELIO", "JOFER", "MARTIN", "NELSON"];

        window.onload = () => {
            const ug = document.getElementById('units-grid');
            for(let p in FLOTA) ug.innerHTML += `<div class="unit-card" onclick="initConf('${p}')"><i class="ph-bold ph-truck" style="font-size:24px;"></i><br><b>${p}</b></div>`;
            const sc = document.getElementById('c-chofer'), sa = document.getElementById('c-aux');
            CONDUCTORES.forEach(c => sc.innerHTML += `<option value="${c}">${c}</option>`);
            AUXILIARES.forEach(a => sa.innerHTML += `<option value="${a}">${a}</option>`);
            document.getElementById('f-month').value = new Date().toISOString().substring(0,7);
            renderHistory();
        };

        function initConf(p) {
            cur = { id: 'R'+Date.now(), placa: p, items: [], fecha: new Date().toISOString().split('T')[0], chofer: FLOTA[p], auxiliar: AUXILIARES[0] };
            document.getElementById('conf-placa').innerText = p;
            document.getElementById('c-fecha').value = cur.fecha;
            document.getElementById('c-chofer').value = cur.chofer;
            document.getElementById('c-aux').value = cur.auxiliar;
            go('page-config');
        }

        function goLoad() {
            cur.fecha = document.getElementById('c-fecha').value;
            cur.chofer = document.getElementById('c-chofer').value;
            cur.auxiliar = document.getElementById('c-aux').value;
            document.getElementById('load-placa-txt').innerText = cur.placa + " (" + cur.fecha + ")";
            refreshLoad();
            go('page-load');
        }

        function addItem() {
            const cli = document.getElementById('i-cli').value.toUpperCase().trim();
            const can = parseInt(document.getElementById('i-can').value);
            if(cli && can) { cur.items.push({cli, can}); document.getElementById('i-cli').value=""; document.getElementById('i-can').value=""; refreshLoad(); }
        }

        // --- CORRECCIÓN: ELIMINAR ITEM ---
        function removeItem(index) {
            cur.items.splice(index, 1);
            refreshLoad();
        }

        function refreshLoad() {
            const total = cur.items.reduce((a,b)=>a+b.can, 0);
            document.getElementById('load-total').innerText = total + " CJS";
            document.getElementById('btn-save').style.display = total > 0 ? 'block' : 'none';
            document.getElementById('load-list').innerHTML = cur.items.map((it, i) => `
                <div style="display:flex; justify-content:space-between; align-items:center; padding:15px; background:#fff; border-radius:15px; border:1px solid #eee; margin-bottom:10px; font-weight:700;">
                    <div style="display:flex; align-items:center; gap:10px;">
                        <i class="ph-bold ph-trash" style="color:var(--red); font-size:20px;" onclick="removeItem(${i})"></i>
                        <span>${it.cli}</span>
                    </div>
                    <b>${it.can}</b>
                </div>`).reverse().join('');
        }

        function save() {
            const idx = db.findIndex(r => r.id === cur.id);
            if(idx > -1) db[idx] = cur; else db.unshift(cur);
            localStorage.setItem('twins_db_v58', JSON.stringify(db));
            go('page-dash'); setFilter('hoy');
        }

        function setFilter(f) {
            activeFilter = f;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('f-'+f).classList.add('active');
            renderHistory();
        }

        function renderHistory() {
            const hoy = new Date().toISOString().split('T')[0];
            const ayer = new Date(Date.now() - 864e5).toISOString().split('T')[0];
            
            let filt = db;
            if(activeFilter === 'hoy') filt = db.filter(r => r.fecha === hoy);
            if(activeFilter === 'ayer') filt = db.filter(r => r.fecha === ayer);
            if(activeFilter === 'mañana') {
                // Inteligencia: Buscar la primera fecha mayor a hoy (salta fines de semana)
                filt = db.filter(r => r.fecha > hoy).sort((a,b) => a.fecha.localeCompare(b.fecha));
                if(filt.length > 0) {
                    const nextDate = filt[0].fecha;
                    filt = filt.filter(r => r.fecha === nextDate);
                }
            }

            document.getElementById('hist-cont').innerHTML = filt.map(r => `
                <div class="route-card">
                    <div class="card-meta"><span>${r.fecha}</span><span>${r.chofer}</span></div>
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <b>${r.placa}</b>
                        <b style="font-size:20px;">${r.items.reduce((a,b)=>a+b.can,0)} CJS</b>
                    </div>
                    <div class="route-actions">
                        <button class="btn-act" onclick="alert('Lista: '+JSON.stringify(r.items))"><i class="ph-bold ph-list"></i>VER</button>
                        <button class="btn-act" onclick="editR('${r.id}')"><i class="ph-bold ph-pencil"></i>EDIT</button>
                        <button class="btn-act wa" onclick="shareWA('${r.id}')"><i class="ph-bold ph-whatsapp-logo"></i>REPORTE</button>
                    </div>
                </div>`).join('') || '<p style="text-align:center; color:gray; padding:40px;">No hay registros.</p>';
        }

        function renderData() {
            const m = document.getElementById('f-month').value;
            let filt = db.filter(r => r.fecha.startsWith(m));
            let cS = {}, aS = {};
            filt.forEach(r => {
                let cjs = r.items.reduce((a,b)=>a+b.can,0);
                cS[r.chofer] = (cS[r.chofer] || {cjs:0}); cS[r.chofer].cjs += cjs;
                aS[r.auxiliar] = (aS[r.auxiliar] || {cjs:0}); aS[r.auxiliar].cjs += cjs;
            });
            const draw = (data, id) => {
                let sorted = Object.entries(data).sort((a,b)=>b[1].cjs - a[1].cjs).slice(0,5);
                let max = sorted[0] ? sorted[0][1].cjs : 1;
                document.getElementById(id).innerHTML = sorted.map(([n, v]) => `
                    <div style="margin-bottom:15px;">
                        <div style="display:flex; justify-content:space-between; font-weight:800; font-size:12px;"><span>${n}</span><span>${v.cjs} CJS</span></div>
                        <div class="rank-bar-bg"><div class="rank-bar-fill" style="width:${(v.cjs/max)*100}%"></div></div>
                    </div>`).join('');
            };
            draw(cS, 'rank-choferes'); draw(aS, 'rank-auxiliares');
        }

        // --- GENERADOR DE DATA PARA REVISIÓN ---
        function injectFullData() {
            const mesActual = new Date().toISOString().substring(0,7);
            let fakeData = [];
            for(let i=1; i<=15; i++) {
                let d = `${mesActual}-${i < 10 ? '0'+i : i}`;
                fakeData.push({
                    id: 'F'+i, fecha: d, placa: "CEP-929", 
                    chofer: CONDUCTORES[i % 6], auxiliar: AUXILIARES[i % 9],
                    items: [{cli: "CLIENTE A", can: 10 + i}, {cli: "CLIENTE B", can: 20}]
                });
            }
            db = fakeData;
            localStorage.setItem('twins_db_v58', JSON.stringify(db));
            alert("Data de prueba generada. Revisa HISTORIAL y DATA.");
            location.reload();
        }

        function shareWA(id) {
            const r = db.find(x => x.id === id);
            let txt = `*TWINS ELITE*%0A%0A🚛 *UNIDAD:* ${r.placa}%0A👤 *CHOFER:* ${r.chofer}%0A🤝 *AUX:* ${r.auxiliar}%0A%0A*LISTA:*%0A`;
            r.items.forEach(i => txt += `• ${i.cli}: ${i.can}%0A`);
            txt += `%0A📦 *TOTAL:* ${r.items.reduce((a,b)=>a+b.can,0)} Cjs`;
            window.location.href = "https://api.whatsapp.com/send?text=" + txt;
        }

        function editR(id) { cur = JSON.parse(JSON.stringify(db.find(r => r.id === id))); goLoad(); }

        function go(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(n => n.classList.remove('active'));
            document.getElementById('n-'+id.split('-')[1]).classList.add('active');
            if(id === 'page-data') renderData();
            window.scrollTo(0,0);
        }
    </script>
</body>
</html>
