<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TWINS DESPACHO NEBULA</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root {
            --bg: #030508; --glass: rgba(255, 255, 255, 0.03);
            --accent: #007aff; --accent-glow: rgba(0, 122, 255, 0.5);
            --text: #f5f5f7; --text-dim: #86868b;
            --border: rgba(255, 255, 255, 0.1);
            --success: #2ed158; --danger: #ff453a;
        }

        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; outline: none; }
        body { 
            margin: 0; background: var(--bg); color: var(--text); 
            font-family: 'Plus Jakarta Sans', sans-serif; min-height: 100vh;
            background-image: radial-gradient(circle at 50% -20%, #1a1a2e, #030508);
        }

        .page { display: none; padding: 20px; padding-bottom: 120px; max-width: 500px; margin: 0 auto; animation: scaleUp 0.4s cubic-bezier(0.2, 0, 0, 1); }
        .active { display: block !important; }
        @keyframes scaleUp { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        /* Header Estilo iOS */
        .top-header { 
            position: sticky; top: 0; z-index: 1000; 
            background: rgba(3, 5, 8, 0.8); backdrop-filter: blur(20px);
            padding: 20px; display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 1px solid var(--border);
        }
        .logo { font-weight: 800; font-size: 18px; letter-spacing: -0.5px; background: linear-gradient(to right, #fff, #007aff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* Tarjetas Nebula */
        .card { 
            background: var(--glass); border: 1px solid var(--border); 
            border-radius: 30px; padding: 22px; margin-bottom: 18px;
            backdrop-filter: blur(10px); box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* Inputs de Vidrio */
        input, select { 
            width: 100%; padding: 18px; border-radius: 20px; border: 1px solid var(--border); 
            background: rgba(255,255,255,0.02); color: white; font-size: 15px; transition: 0.3s;
        }
        input:focus { border-color: var(--accent); background: rgba(0,122,255,0.1); box-shadow: 0 0 15px var(--accent-glow); }

        /* Botones Premium */
        .btn { 
            width: 100%; padding: 18px; border-radius: 22px; border: none; 
            font-size: 15px; font-weight: 700; cursor: pointer; 
            display: flex; justify-content: center; align-items: center; gap: 10px; transition: 0.3s;
        }
        .btn-main { background: var(--accent); color: white; box-shadow: 0 10px 20px rgba(0,122,255,0.4); }
        .btn-main:active { transform: scale(0.97); }
        .btn-ghost { background: var(--glass); color: var(--text); border: 1px solid var(--border); }
        .btn-mini { padding: 10px; border-radius: 14px; font-size: 11px; font-weight: 800; }

        /* Barra de Navegación */
        .nav-bar { 
            position: fixed; bottom: 25px; left: 20px; right: 20px; 
            background: rgba(25, 25, 25, 0.8); backdrop-filter: blur(30px);
            height: 80px; border-radius: 35px; border: 1px solid var(--border);
            display: flex; justify-content: space-around; align-items: center; z-index: 2000;
        }
        .nav-link { 
            display: flex; flex-direction: column; align-items: center; gap: 6px;
            color: var(--text-dim); border: none; background: none; flex: 1; font-size: 10px; font-weight: 700;
        }
        .nav-link.active { color: var(--accent); }
        .nav-link i { font-size: 26px; }

        /* Modales */
        .modal { 
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92); 
            backdrop-filter: blur(15px); z-index: 3000; padding: 25px; align-items: center; justify-content: center;
        }
        .modal-card { background: #0c0e12; border-radius: 35px; padding: 30px; width: 100%; max-width: 400px; border: 1px solid var(--border); }

        .stat-pill { background: rgba(0, 122, 255, 0.15); color: var(--accent); padding: 5px 12px; border-radius: 12px; font-size: 12px; font-weight: 800; }
    </style>
</head>
<body>

    <div id="m-auth" class="modal">
        <div class="modal-card">
            <h2 style="text-align:center; margin:0">Seguridad Admin</h2>
            <p style="text-align:center; color:var(--text-dim); margin-bottom:20px">Ingresa la clave de acceso</p>
            <input type="password" id="admin-pass" placeholder="••••" style="text-align:center; font-size:24px; letter-spacing:10px; margin-bottom:20px">
            <button class="btn btn-main" onclick="verifyAuth()">ACCEDER</button>
            <button class="btn" style="background:none; color:var(--text-dim)" onclick="location.reload()">CANCELAR</button>
        </div>
    </div>

    <div id="m-list" class="modal" onclick="this.style.display='none'">
        <div class="modal-card" onclick="event.stopPropagation()">
            <h3 id="m-title" style="margin:0 0 5px 0">Carga</h3>
            <p id="m-subtitle" style="color:var(--text-dim); font-size:12px; margin-bottom:20px;"></p>
            <div id="m-container" style="max-height: 250px; overflow-y: auto;"></div>
            <button class="btn btn-main" style="margin-top:20px" onclick="document.getElementById('m-list').style.display='none'">CERRAR</button>
        </div>
    </div>

    <header id="app-header" class="top-header" style="display:none">
        <div class="logo">TWINS NEBULA</div>
        <div style="display:flex; align-items:center; gap:12px">
            <div class="stat-pill" id="user-display">---</div>
            <i class="ph-bold ph-power" onclick="logout()" style="color:var(--danger); font-size:22px"></i>
        </div>
    </header>

    <div id="page-login" class="page active" style="text-align:center; padding-top:12vh">
        <div style="width: 90px; height: 90px; background: var(--accent); border-radius: 30px; display:flex; align-items:center; justify-content:center; margin: 0 auto 30px; box-shadow: 0 20px 40px var(--accent-glow)">
            <i class="ph-fill ph-planet" style="font-size: 50px; color: white;"></i>
        </div>
        <h1 style="font-weight: 800; font-size: 32px; margin: 0;">SISTEMA V32</h1>
        <p style="color:var(--text-dim); margin-bottom: 40px">Selecciona tu perfil de usuario</p>
        <div id="login-grid" style="display:grid; gap:14px; padding: 0 20px;"></div>
    </div>

    <div id="page-route" class="page">
        <div class="card" style="background: linear-gradient(135deg, #007aff, #003366); border:none; position:relative; overflow:hidden">
            <div style="position:relative; z-index:2">
                <span style="font-size:11px; font-weight:800; opacity:0.8; text-transform:uppercase; letter-spacing:1px">Carga Actual</span>
                <div id="total-cajas" style="font-size:64px; font-weight:800; margin:5px 0">0</div>
                <div style="height:4px; background:rgba(255,255,255,0.2); border-radius:10px"><div id="load-bar" style="height:100%; width:0%; background:#fff; border-radius:10px; transition:1s"></div></div>
            </div>
            <i class="ph ph-package" style="position:absolute; right:-20px; bottom:-20px; font-size:150px; opacity:0.1"></i>
        </div>

        <div class="card">
            <input type="text" id="cli" placeholder="Cliente o Destino" style="margin-bottom:12px">
            <div style="display:flex; gap:12px">
                <input type="number" id="can" placeholder="Cajas" style="flex:0.8">
                <button class="btn btn-main" onclick="addItem()" style="flex:1.2"><i class="ph-bold ph-plus"></i>AÑADIR</button>
            </div>
        </div>

        <div id="send-zone" style="display:none">
            <div id="temp-list" class="card" style="border-style:dashed; font-size:14px; background:transparent"></div>
            <div class="card">
                <select id="pla" onchange="smartPredict()" style="margin-bottom:12px"></select>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:12px">
                    <select id="cho"></select>
                    <select id="aux"></select>
                </div>
                <button class="btn" style="background:var(--success); color:black" onclick="document.getElementById('m-type').style.display='flex'">
                    <i class="ph-fill ph-paper-plane-tilt"></i> GUARDAR RUTA
                </button>
            </div>
        </div>
    </div>

    <div id="page-history" class="page">
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:20px">
            <div class="card" style="margin:0; padding:15px; text-align:center">
                <span style="font-size:9px; color:var(--text-dim); font-weight:800">MES ACTUAL</span>
                <div class="stat-pill" id="st-mes" style="font-size:20px; margin-top:5px">0</div>
            </div>
            <div class="card" style="margin:0; padding:15px; text-align:center">
                <span style="font-size:9px; color:var(--text-dim); font-weight:800">EFICIENCIA DÍA</span>
                <div class="stat-pill" id="st-prom" style="font-size:20px; margin-top:5px; background:rgba(46, 209, 88, 0.2); color:var(--success)">0</div>
            </div>
        </div>

        <div id="admin-tools" style="display:none; margin-bottom:15px">
            <button class="btn btn-ghost" style="color:var(--accent); border-color:var(--accent)" onclick="alert('Generando Reporte Excel...')">
                <i class="ph-bold ph-file-arrow-down"></i> GENERAR REPORTE EXCEL
            </button>
        </div>

        <div style="display:flex; gap:10px; margin-bottom:15px">
            <input type="date" id="f-filter" onchange="renderHistory()" style="flex:1; margin:0">
            <input type="text" id="search" oninput="renderHistory()" placeholder="Buscar..." style="flex:1; margin:0">
        </div>
        <div id="history-container"></div>
    </div>

    <div id="page-fleet" class="page">
        <h3 id="fleet-count" style="margin-bottom:20px; font-weight:800; color:var(--accent)">Unidades: 0/0</h3>
        <div id="fleet-list"></div>
    </div>

    <div id="m-type" class="modal">
        <div class="modal-card">
            <h3 style="text-align:center; margin-top:0">Programación</h3>
            <button class="btn btn-main" style="margin-bottom:12px" onclick="saveRoute('HOY')">DESPACHAR HOY</button>
            <button class="btn btn-ghost" style="color:var(--success)" onclick="saveRoute('MAÑANA')">PROGRAMAR MAÑANA</button>
            <button class="btn" style="background:none; color:var(--text-dim)" onclick="document.getElementById('m-type').style.display='none'">CANCELAR</button>
        </div>
    </div>

    <nav id="app-nav" class="nav-bar" style="display:none">
        <button class="nav-link" id="n-route" onclick="nav('page-route')"><i class="ph ph-lightning"></i>Ruta</button>
        <button class="nav-link" id="n-history" onclick="nav('page-history')"><i class="ph ph-chart-bar"></i>Data</button>
        <button class="nav-link" id="n-fleet" onclick="nav('page-fleet')"><i class="ph ph-truck"></i>Flota</button>
    </nav>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbxCRMbdOGYjf0R-w1v9tHG76jDhHXxuXOwHahYEV7Gj1lFn3y42C2s9DUO5nkgO75qy/exec";
        let user = "", items = [], database = [];
        
        const PLACAS = ["CEP-929", "BPN-711", "BVN-704", "BUL-742", "BVN-930"];
        const CHOFERES = ["LUIS H.", "ROMARIO", "CESAR C.", "WALDIR", "MARCELO"];
        const AUXILIARES = ["CRISTOPHER", "PLACIDO", "RODOLFO", "SIN AUXILIAR"];
        const SOATS = { "CEP-929": "15/05/26", "BPN-711": "22/08/26", "BVN-704": "10/01/27", "BUL-742": "05/11/26", "BVN-930": "30/09/26" };

        window.onload = () => {
            initInputs();
            const saved = localStorage.getItem('tw_user');
            document.getElementById('f-filter').value = new Date().toISOString().split('T')[0];
            if(saved) login(saved, true);
            loadData();
        };

        function initInputs() {
            const grid = document.getElementById('login-grid');
            ['TAJHO ADMIN', 'FRANCESCO', 'OSCAR', 'LUIS HERBER'].forEach(u => {
                grid.innerHTML += `<button class="btn btn-ghost" onclick="checkAuth('${u}')">${u}</button>`;
            });
            document.getElementById('pla').innerHTML = '<option value="">Unidad</option>' + PLACAS.map(p => `<option value="${p}">${p}</option>`).join('');
            document.getElementById('cho').innerHTML = '<option value="">Chofer</option>' + CHOFERES.map(c => `<option value="${c}">${c}</option>`).join('');
            document.getElementById('aux').innerHTML = '<option value="">Auxiliar</option>' + AUXILIARES.map(a => `<option value="${a}">${a}</option>`).join('');
        }

        function checkAuth(u) {
            if(u === 'TAJHO ADMIN') {
                document.getElementById('m-auth').style.display = 'flex';
                document.getElementById('admin-pass').focus();
            } else { login(u); }
        }

        function verifyAuth() {
            if(document.getElementById('admin-pass').value === '1234') {
                document.getElementById('m-auth').style.display = 'none';
                login('TAJHO ADMIN');
            } else { alert("Clave Incorrecta"); }
        }

        function login(u, skip) {
            user = u; localStorage.setItem('tw_user', u);
            document.getElementById('page-login').classList.remove('active');
            document.getElementById('app-header').style.display = 'flex';
            document.getElementById('app-nav').style.display = 'flex';
            document.getElementById('user-display').innerText = u;
            if(u === 'TAJHO ADMIN') document.getElementById('admin-tools').style.display = 'block';
            nav('page-route');
        }

        function nav(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('n-' + id.split('-')[1]).classList.add('active');
            if(id === 'page-history') renderHistory();
            if(id === 'page-fleet') renderFleet();
        }

        async function loadData() {
            try { const r = await fetch(API); database = await r.json(); renderHistory(); renderFleet(); } catch(e){}
        }

        // INTELIGENCIA DUAL: Sugiere Chofer y Auxiliar
        function smartPredict() {
            const p = document.getElementById('pla').value;
            if(!p) return;
            const last = database.slice().reverse().find(r => r.placa === p);
            if(last) {
                document.getElementById('cho').value = last.chofer;
                document.getElementById('aux').value = last.auxiliar;
            }
        }

        function addItem() {
            const cl = document.getElementById('cli').value.toUpperCase(), ca = parseInt(document.getElementById('can').value);
            if(!cl || !ca) return;
            items.unshift({cl, ca});
            document.getElementById('cli').value = ""; document.getElementById('can').value = "";
            renderTemp();
        }

        function renderTemp() {
            const box = document.getElementById('temp-list');
            let total = 0; box.innerHTML = "";
            items.forEach((item, i) => {
                total += item.ca;
                box.innerHTML += `<div style="display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid var(--border)">
                    <span>${item.cl}</span><b>${item.ca} CJ <i class="ph ph-trash" onclick="items.splice(${i},1);renderTemp()" style="color:var(--danger);margin-left:10px"></i></b>
                </div>`;
            });
            document.getElementById('total-cajas').innerText = total;
            document.getElementById('load-bar').style.width = Math.min((total/1000)*100, 100) + "%";
            document.getElementById('send-zone').style.display = items.length ? 'block' : 'none';
        }

        async function saveRoute(tipo) {
            document.getElementById('m-type').style.display = 'none';
            let d = new Date();
            if(tipo === 'MAÑANA') { d.setDate(d.getDate() + 1); if(d.getDay() === 0) d.setDate(d.getDate() + 1); }
            const fT = d.toISOString().split('T')[0];

            const reg = {
                fecha: fT, chofer: document.getElementById('cho').value, auxiliar: document.getElementById('aux').value,
                placa: document.getElementById('pla').value, operario: user,
                items: items.map(i => `${i.cl}:${i.ca}`).join(", "), total: items.reduce((a,b)=>a+b.ca,0)
            };

            database.push(reg);
            document.getElementById('f-filter').value = fT;
            nav('page-history');
            
            fetch(API, { method: 'POST', mode: 'no-cors', body: JSON.stringify(reg) });
            items = []; renderTemp();
        }

        function renderHistory() {
            const cont = document.getElementById('history-container'), fD = document.getElementById('f-filter').value;
            const sQ = document.getElementById('search').value.toUpperCase();
            let html = "", tM = 0, tD = 0, nD = 0;
            const mes = new Date().getMonth();

            database.slice().reverse().forEach(r => {
                const rf = r.fecha.split('T')[0];
                if(new Date(r.fecha + "T00:00:00").getMonth() === mes) tM += parseFloat(r.total);
                
                if(rf === fD && (r.items.toUpperCase().includes(sQ) || r.chofer.toUpperCase().includes(sQ))) {
                    tD += parseFloat(r.total); nD++;
                    html += `<div class="card" style="border-left:5px solid ${rf > new Date().toISOString().split('T')[0] ? 'var(--success)' : 'var(--accent)'}">
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px">
                            <b style="font-size:18px">${r.placa}</b>
                            <div class="stat-pill">${r.total} CJ</div>
                        </div>
                        <div style="font-size:14px; font-weight:600; margin-bottom:18px">${r.chofer} <span style="color:var(--text-dim)">• ${r.auxiliar}</span></div>
                        <div style="display:flex; gap:10px">
                            <button class="btn-mini btn-ghost" style="flex:1" onclick="viewItems('${r.items}', '${r.chofer}')">LISTA</button>
                            <button class="btn-mini" style="background:#25D366; color:white; border:none; width:50px" onclick="wa('${r.fecha}','${r.chofer}','${r.total}','${r.items}')"><i class="ph ph-whatsapp-logo" style="font-size:20px"></i></button>
                        </div>
                    </div>`;
                }
            });
            cont.innerHTML = html || "<p style='text-align:center; color:var(--text-dim)'>No hay registros</p>";
            document.getElementById('st-mes').innerText = Math.round(tM) + " CJ";
            document.getElementById('st-prom').innerText = nD ? Math.round(tD/nD) : 0;
        }

        function viewItems(txt, ch) {
            document.getElementById('m-title').innerText = "Ruta: " + ch;
            document.getElementById('m-container').innerHTML = txt.split(", ").map(i => {
                const [cl, ca] = i.split(":");
                return `<div style="display:flex; justify-content:space-between; padding:12px 0; border-bottom:1px solid var(--border)"><span>${cl}</span><b>${ca} CJ</b></div>`;
            }).join('');
            document.getElementById('m-list').style.display = 'flex';
        }

        function wa(f,c,t,i) {
            const m = `*TWINS DESPACHO*%0A*Fecha:* ${f.split('T')[0]}%0A*Chofer:* ${c}%0A*Total:* ${t} CJ%0A%0A*Detalle:*%0A${i.replace(/:/g, ': ').replace(/,/g, '%0A')}`;
            window.location.href = `https://wa.me/?text=${m}`;
        }

        function renderFleet() {
            const list = document.getElementById('fleet-list'), fD = document.getElementById('f-filter').value;
            let lib = 0; list.innerHTML = "";
            PLACAS.forEach(p => {
                const r = database.find(x => x.placa === p && x.fecha.split('T')[0] === fD);
                if(!r) lib++;
                list.innerHTML += `<div class="card" style="border-left:5px solid ${r ? 'var(--danger)' : 'var(--success)'}">
                    <div style="display:flex; justify-content:space-between"><b>${p}</b> <small style="font-size:10px; color:var(--text-dim)">SOAT: ${SOATS[p]}</small></div>
                    <div style="margin-top:8px; font-size:14px">${r ? '🔴 ASIGNADO: ' + r.chofer : '🟢 LIBRE'}</div>
                </div>`;
            });
            document.getElementById('fleet-count').innerText = `Unidades Libres: ${lib} / ${PLACAS.length}`;
        }

        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
