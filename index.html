<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TWINS TITANIUM V58</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #08090b; --surface: #111318; --card: #1a1d24;
            --accent: #00e5ff; --accent-glow: rgba(0, 229, 255, 0.2);
            --text: #f1f5f9; --text-dim: #94a3b8;
            --border: rgba(255, 255, 255, 0.08); --success: #22c55e; --danger: #ff4757;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { 
            margin: 0; background: var(--bg); color: var(--text); 
            font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden;
        }

        /* Header Estilo Logístico */
        .top-header { 
            position: sticky; top: 0; z-index: 1000; background: rgba(8, 9, 11, 0.85);
            backdrop-filter: blur(15px); padding: 15px 20px; display: flex; 
            justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border);
        }
        .user-tag { font-size: 11px; font-weight: 700; color: var(--accent); border: 1px solid var(--accent); padding: 4px 12px; border-radius: 20px; text-transform: uppercase; cursor: pointer; }

        .page { display: none; padding: 15px; padding-bottom: 110px; max-width: 550px; margin: 0 auto; animation: pageIn 0.3s ease; }
        .active { display: block !important; }
        @keyframes pageIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Contadores de Impacto */
        .metrics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .metric-card { background: var(--card); border: 1px solid var(--border); border-radius: 22px; padding: 18px; position: relative; overflow: hidden; }
        .metric-card b { font-size: 30px; font-weight: 800; display: block; letter-spacing: -1px; }
        .metric-card span { font-size: 10px; font-weight: 700; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; }
        .metric-card::before { content: ''; position: absolute; top: 0; left: 0; width: 3px; height: 100%; background: var(--accent); }

        /* Tarjetas de Diseño Moderno */
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 20px; margin-bottom: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .field-label { font-size: 11px; font-weight: 700; color: var(--text-dim); margin-bottom: 8px; display: block; padding-left: 4px; }
        
        input, select { 
            background: #0d0f13; border: 1px solid var(--border); padding: 16px; border-radius: 16px; 
            color: white; width: 100%; font-size: 15px; margin-bottom: 12px; transition: 0.2s; font-family: inherit;
        }
        input:focus { border-color: var(--accent); box-shadow: 0 0 15px var(--accent-glow); }

        /* Botones Pro */
        .btn { border: none; border-radius: 16px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s; }
        .btn:active { transform: scale(0.97); }
        .btn-main { background: var(--accent); color: #000; padding: 18px; width: 100%; font-size: 15px; }
        .btn-ghost { background: rgba(255,255,255,0.04); color: white; border: 1px solid var(--border); padding: 12px; font-size: 13px; }
        .btn-del { background: rgba(255, 71, 87, 0.1); color: var(--danger); width: 36px; height: 36px; border-radius: 12px; }

        /* Lista de Puntos en Hoja de Ruta */
        .point-item { display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.2); padding: 12px 16px; border-radius: 15px; margin-bottom: 8px; border-left: 3px solid var(--accent); }
        .point-info { font-weight: 600; }
        .point-info span { color: var(--accent); font-weight: 800; margin-right: 5px; }

        /* Historial Expandible */
        .h-card { border-radius: 22px; padding: 18px; }
        .h-header { display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .h-details { max-height: 0; overflow: hidden; transition: 0.4s ease; font-size: 13px; color: var(--text-dim); }
        .h-details.open { max-height: 400px; padding-top: 15px; }
        .h-pill { background: rgba(0, 229, 255, 0.1); color: var(--accent); padding: 4px 10px; border-radius: 8px; font-size: 10px; font-weight: 800; }

        /* Navbar Dock Style */
        .dock-nav { position: fixed; bottom: 20px; left: 20px; right: 20px; background: rgba(26, 29, 36, 0.95); backdrop-filter: blur(20px); height: 75px; border-radius: 28px; display: flex; border: 1px solid var(--border); z-index: 2000; box-shadow: 0 15px 40px rgba(0,0,0,0.5); }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-dim); background: none; border: none; font-size: 10px; font-weight: 700; transition: 0.3s; }
        .nav-item.active { color: var(--accent); }
        .nav-item i { font-size: 24px; margin-bottom: 3px; }
        .nav-item.active i { filter: drop-shadow(0 0 8px var(--accent)); }
    </style>
</head>
<body>

    <header class="top-header" id="ui-header" style="display:none">
        <div style="font-weight:900; letter-spacing: -1px; font-size: 18px">TWINS <span style="color:var(--accent)">LOGISTICS</span></div>
        <div id="ui-user" class="user-tag" onclick="logout()">---</div>
    </header>

    <div id="page-login" class="page active">
        <div style="text-align:center; padding:50px 0">
            <i class="ph-fill ph-shield-checkered" style="font-size: 60px; color: var(--accent)"></i>
            <h1 style="margin:10px 0; font-weight: 800">Acceso Almacén</h1>
            <p style="color: var(--text-dim)">Control de Inventario V58</p>
        </div>
        <div id="login-options" style="display:grid; gap:12px"></div>
    </div>

    <div id="page-route" class="page">
        <div class="metrics-grid">
            <div class="metric-card"><span>Cajas Totales</span><b id="val-cajas">0</b></div>
            <div class="metric-card"><span>Puntos Ruta</span><b id="val-puntos">0</b></div>
        </div>

        <div class="card">
            <span class="field-label">AÑADIR CLIENTE A LA CARGA</span>
            <input type="text" id="in-cli" placeholder="Nombre del Cliente">
            <div style="display:flex; gap:10px">
                <input type="number" id="in-can" placeholder="Cant." style="flex:0.4">
                <button class="btn btn-main" onclick="addItem()" style="flex:1.6"><i class="ph-bold ph-plus"></i>AÑADIR</button>
            </div>
        </div>

        <div id="carga-activa" style="display:none">
            <div id="lista-puntos" style="margin-bottom:20px"></div>

            <div class="card" style="background: var(--surface)">
                <span class="field-label">ASIGNACIÓN DE TRANSPORTE</span>
                <select id="sel-pla" onchange="autoPredict()"></select>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px">
                    <select id="sel-cho"></select>
                    <select id="sel-aux"></select>
                </div>
                <button class="btn btn-main" style="background: var(--success); color: black" onclick="finalizarCarga()">FINALIZAR DESPACHO</button>
                <button class="btn btn-ghost" style="width:100%; margin-top:10px; border:none" onclick="limpiarTodo()">LIMPIAR CARGA ACTUAL</button>
            </div>
        </div>
    </div>

    <div id="page-history" class="page">
        <div class="metrics-grid">
            <div class="metric-card"><span>Despacho Hoy</span><b id="st-d">0</b></div>
            <div class="metric-card"><span>Acumulado Mes</span><b id="st-m">0</b></div>
        </div>
        <div style="display:flex; gap:10px; margin-bottom:20px">
            <input type="date" id="filtro-fecha" onchange="renderHistory()" style="flex:1; margin:0">
            <button class="btn btn-ghost" style="width:55px" onclick="sync()"><i class="ph ph-arrows-clockwise" style="font-size:20px"></i></button>
        </div>
        <div id="historial-feed"></div>
    </div>

    <div id="page-stats" class="page">
        <div class="card"><span class="field-label">VOLUMEN POR CHOFER (CJ)</span><div style="height:220px"><canvas id="c-cho"></canvas></div></div>
        <div class="card"><span class="field-label">VOLUMEN POR AUXILIAR (CJ)</span><div style="height:220px"><canvas id="c-aux"></canvas></div></div>
    </div>

    <div id="page-fleet" class="page"><div id="flota-grid"></div></div>

    <nav class="dock-nav" id="ui-nav" style="display:none">
        <button class="nav-item active" id="n-route" onclick="go('page-route')"><i class="ph ph-truck"></i>RUTA</button>
        <button class="nav-item" id="n-history" onclick="go('page-history')"><i class="ph ph-article"></i>DATA</button>
        <button class="nav-item" id="n-stats" onclick="go('page-stats')"><i class="ph ph-chart-line-up"></i>STATS</button>
        <button class="nav-item" id="n-fleet" onclick="go('page-fleet')"><i class="ph ph-shield-check"></i>FLOTA</button>
    </nav>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbxCRMbdOGYjf0R-w1v9tHG76jDhHXxuXOwHahYEV7Gj1lFn3y42C2s9DUO5nkgO75qy/exec";
        let user = "", items = [], db = [], charts = {};

        const DATA = {
            placas: ["CEP-929", "BPN-711", "BVN-704", "BUL-742", "BVN-930"],
            choferes: ["TAJHO", "LUIS H.", "ROMARIO", "CESAR C.", "WALDIR", "MARCELO"],
            auxiliares: ["Cristopher", "Plácido", "Martin", "Percy", "Rodolfo", "Ricardo", "Elio", "Daniel C.", "Jofer", "Nelson", "Julio"],
            soats: { "CEP-929": "2026-07-22", "BPN-711": "2026-06-10", "BVN-704": "2026-07-02", "BUL-742": "2026-04-02", "BVN-930": "2026-07-02" }
        };

        window.onload = () => {
            initApp();
            const cacheI = localStorage.getItem('tw_items');
            if(cacheI) { items = JSON.parse(cacheI); updateCargaUI(); }
            const cacheU = localStorage.getItem('tw_user');
            if(cacheU) login(cacheU);
            sync();
        };

        function initApp() {
            const grid = document.getElementById('login-options');
            ['TAJHO ADMIN', 'FRANCESCO', 'OSCAR', 'LUIS HERBER'].forEach(u => grid.innerHTML += `<button class="btn btn-ghost" style="padding:18px" onclick="login('${u}')">${u}</button>`);
            document.getElementById('sel-pla').innerHTML = '<option value="">Vehículo</option>' + DATA.placas.map(p => `<option value="${p}">${p}</option>`).join('');
            document.getElementById('sel-cho').innerHTML = '<option value="">Chofer</option>' + DATA.choferes.map(c => `<option value="${c}">${c}</option>`).join('');
            document.getElementById('sel-aux').innerHTML = '<option value="">Auxiliar</option>' + DATA.auxiliares.map(a => `<option value="${a}">${a}</option>`).join('');
        }

        function addItem() {
            const cl = document.getElementById('in-cli').value.toUpperCase();
            const ca = parseInt(document.getElementById('in-can').value);
            if(!cl || !ca) return;
            items.push({ cl, ca });
            document.getElementById('in-cli').value = ""; document.getElementById('in-can').value = "";
            saveItems(); updateCargaUI();
        }

        function delItem(i) { items.splice(i, 1); saveItems(); updateCargaUI(); }
        function saveItems() { localStorage.setItem('tw_items', JSON.stringify(items)); }

        function updateCargaUI() {
            const box = document.getElementById('lista-puntos');
            let t = 0; box.innerHTML = "";
            items.forEach((it, i) => {
                t += it.ca;
                box.innerHTML += `<div class="point-item"><div class="point-info"><span>${it.ca} CJ</span> ${it.cl}</div><button class="btn-del" onclick="delItem(${i})"><i class="ph ph-trash"></i></button></div>`;
            });
            document.getElementById('val-cajas').innerText = t;
            document.getElementById('val-puntos').innerText = items.length;
            document.getElementById('carga-activa').style.display = items.length > 0 ? 'block' : 'none';
        }

        async function finalizarCarga() {
            if(!document.getElementById('sel-aux').value) return alert("Selecciona un auxiliar válido");
            const reg = {
                fecha: new Date().toLocaleDateString('en-CA'),
                hora: new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true }),
                placa: document.getElementById('sel-pla').value,
                chofer: document.getElementById('sel-cho').value,
                auxiliar: document.getElementById('sel-aux').value,
                items: items.map(i => `${i.cl}: ${i.ca}`).join(", "),
                total: items.reduce((a,b)=>a+b.ca,0),
                operario: user
            };
            db.unshift(reg);
            localStorage.setItem('tw_db', JSON.stringify(db));
            fetch(API, { method: 'POST', mode: 'no-cors', body: JSON.stringify(reg) });
            limpiarTodo(); go('page-history');
        }

        function limpiarTodo() { items = []; localStorage.removeItem('tw_items'); updateCargaUI(); }

        function renderHistory() {
            const feed = document.getElementById('historial-feed'), filter = document.getElementById('filtro-fecha').value;
            let html = "", dTot = 0, mTot = 0, selD = new Date(filter + "T12:00:00");

            db.forEach((r, idx) => {
                const rD = new Date(r.fecha + "T12:00:00");
                if(rD.getMonth() === selD.getMonth()) mTot += parseFloat(r.total);
                if(r.fecha.split('T')[0] === filter) {
                    dTot += parseFloat(r.total);
                    html += `
                    <div class="card h-card">
                        <div class="h-header" onclick="toggleDet(${idx})">
                            <div><span class="h-pill">${r.placa}</span><br><small style="font-weight:700; color:white">${r.hora}</small></div>
                            <div style="text-align:right"><b>${r.total} CJ</b><br><i class="ph ph-caret-down" style="font-size:12px; color:var(--accent)"></i></div>
                        </div>
                        <div id="det-${idx}" class="h-details">
                            <div style="padding:15px; background:rgba(0,0,0,0.2); border-radius:18px">
                                <b style="color:var(--accent)">RUTA DETALLADA:</b><br>${r.items.split(", ").join("<br>")}
                                <div style="margin-top:10px; border-top:1px solid var(--border); padding-top:10px">Equipo: ${r.chofer} / ${r.auxiliar}</div>
                            </div>
                            <button class="btn btn-main" style="margin-top:12px; padding:12px; font-size:13px" onclick="share('${r.placa}','${r.total}','${r.items}')"><i class="ph-fill ph-whatsapp-logo"></i> ENVIAR REPORTE</button>
                        </div>
                    </div>`;
                }
            });
            feed.innerHTML = html || "<p style='text-align:center; opacity:0.3; padding:40px'>No hay registros para este día</p>";
            document.getElementById('st-d').innerText = dTot;
            document.getElementById('st-m').innerText = mTot;
        }

        function toggleDet(i) { document.getElementById(`det-${i}`).classList.toggle('open'); }

        function go(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('n-' + id.split('-')[1]).classList.add('active');
            if(id === 'page-history') { document.getElementById('filtro-fecha').value = "2026-02-23"; renderHistory(); }
            if(id === 'page-stats') renderCharts();
            if(id === 'page-fleet') renderFleet();
        }

        function renderCharts() {
            const cC = {}, cA = {}, m = new Date().getMonth();
            db.forEach(r => {
                if(new Date(r.fecha + "T12:00:00").getMonth() === m) {
                    cC[r.chofer] = (cC[r.chofer] || 0) + parseFloat(r.total);
                    cA[r.auxiliar] = (cA[r.auxiliar] || 0) + parseFloat(r.total);
                }
            });
            const plot = (id, obj, color) => {
                if(charts[id]) charts[id].destroy();
                charts[id] = new Chart(document.getElementById(id), {
                    type: 'bar', data: { labels: Object.keys(obj), datasets: [{ data: Object.values(obj), backgroundColor: color, borderRadius: 8 }] },
                    options: { indexAxis: 'y', maintainAspectRatio: false, plugins: { legend: false }, scales: { x: { display: false }, y: { ticks: { color: '#94a3b8' } } } }
                });
            };
            plot('c-cho', cC, '#00e5ff'); plot('c-aux', cA, '#22c55e');
        }

        function renderFleet() {
            const grid = document.getElementById('flota-grid'), hoy = new Date(); grid.innerHTML = "<h3 style='margin-bottom:15px'>Seguros y SOAT</h3>";
            DATA.placas.forEach(p => {
                const dias = Math.ceil((new Date(DATA.soats[p]) - hoy) / 86400000);
                grid.innerHTML += `<div class="card">
                    <div style="display:flex; justify-content:space-between"><b>${p}</b> <small>${DATA.soats[p]}</small></div>
                    <div style="font-size:20px; font-weight:800; color:${dias<30?'var(--danger)':'var(--accent)'}; margin-top:8px">${dias} días restantes</div>
                </div>`;
            });
        }

        async function sync() {
            try { const res = await fetch(API); db = await res.json(); localStorage.setItem('tw_db', JSON.stringify(db)); renderHistory(); } 
            catch(e) { db = JSON.parse(localStorage.getItem('tw_db')) || []; renderHistory(); }
        }

        function login(u) { user = u; localStorage.setItem('tw_user', u); document.getElementById('page-login').classList.remove('active'); document.getElementById('ui-header').style.display = 'flex'; document.getElementById('ui-nav').style.display = 'flex'; document.getElementById('ui-user').innerText = u; go('page-route'); }
        function logout() { localStorage.clear(); location.reload(); }
        function autoPredict() { const l = db.find(r => r.placa === document.getElementById('sel-pla').value); if(l) { document.getElementById('sel-cho').value = l.chofer; document.getElementById('sel-aux').value = l.auxiliar; } }
        function share(p, t, i) { window.location.href = `https://wa.me/?text=*📦 REPORTE DE DESPACHO TWINS*%0A*Placa:* ${p}%0A*Total Cajas:* ${t}%0A%0A*RUTA:*%0A${i.split(", ").join("%0A")}`; }
    </script>
</body>
</html>
