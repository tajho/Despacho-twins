<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TWINS ELITE - V28 FLOW</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root {
            --bg: #f8fafc; --surface: #ffffff; --accent: #0062ff; 
            --text: #0f172a; --text-dim: #64748b; --border: #e2e8f0; 
            --success: #10b981; --danger: #f43f5e;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Plus Jakarta Sans', sans-serif; transition: 0.2s; }
        body { margin: 0; background: var(--bg); color: var(--text); overflow: hidden; }
        
        /* Layout */
        .page { display: none; height: 100vh; overflow-y: auto; padding: 10px 20px 140px 20px; max-width: 500px; margin: 0 auto; }
        .active { display: block !important; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

        /* Navigation */
        .nav-bar { position: fixed; bottom: 25px; left: 20px; right: 20px; background: #fff; height: 75px; border-radius: 24px; display: flex; border: 1px solid var(--border); z-index: 1000; box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-dim); background: none; border: none; font-size: 10px; font-weight: 700; }
        .nav-item.active { color: var(--accent); }
        .nav-item i { font-size: 24px; margin-bottom: 2px; }

        /* Cards & Buttons */
        .card { background: #fff; border-radius: 22px; padding: 18px; border: 1px solid var(--border); margin-bottom: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .btn-main { background: var(--accent); color: #fff; border: none; border-radius: 18px; padding: 20px; width: 100%; font-weight: 800; font-size: 16px; cursor: pointer; box-shadow: 0 8px 20px rgba(0,98,255,0.2); }
        .btn-ghost { background: #f1f5f9; color: var(--text); border: none; border-radius: 18px; padding: 15px; width: 100%; font-weight: 700; margin-top: 10px; }

        /* Inputs */
        .input-box { background: #fff; border: 1px solid var(--border); border-radius: 16px; padding: 16px; width: 100%; font-size: 16px; font-weight: 600; margin-bottom: 12px; }
        
        /* Modal */
        .modal-wrap { display:none; position:fixed; inset:0; background:rgba(15,23,42,0.5); backdrop-filter:blur(5px); z-index:2000; align-items:center; justify-content:center; padding:20px; }
        .modal-body { background:#fff; border-radius:28px; padding:30px; width:100%; text-align:center; box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

    <div id="page-login" class="page active">
        <div style="text-align:center; padding:60px 0 40px;">
            <div style="width:70px; height:70px; background:var(--accent); border-radius:22px; margin:0 auto 20px; display:flex; align-items:center; justify-content:center; color:#fff; font-size:35px;"><i class="ph-fill ph-user-focus"></i></div>
            <h1 style="font-weight:800; margin:0;">TWINS ELITE</h1>
            <p style="color:var(--text-dim);">Warehouse Management</p>
        </div>
        <div id="login-options"></div>
    </div>

    <div id="page-select-plate" class="page">
        <h2 style="font-weight:800; margin-bottom:5px;">Nueva Carga</h2>
        <p style="color:var(--text-dim); margin-bottom:25px;">Selecciona la unidad de transporte</p>
        <div id="plate-grid" style="display: grid; grid-template-columns: 1fr; gap: 12px;"></div>
    </div>

    <div id="page-route" class="page">
        <div style="background: linear-gradient(135deg, #0062ff, #00a3ff); padding: 25px; border-radius: 25px; color:#fff; margin-bottom: 25px; box-shadow: 0 10px 25px rgba(0,98,255,0.2);">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <div>
                    <b id="active-plate-label" style="font-size:24px; letter-spacing:1px;">---</b><br>
                    <span id="active-driver-label" style="font-size:14px; opacity:0.9;">Conductor</span>
                </div>
                <div style="text-align:right;">
                    <h1 id="count-cajas" style="font-size:45px; margin:0; line-height:1;">0</h1>
                    <small id="count-puntos" style="font-weight:600; opacity:0.8;">0 Clientes</small>
                </div>
            </div>
        </div>

        <input type="text" id="inp-cli" placeholder="Nombre del Cliente" class="input-box" list="suggestions">
        <datalist id="suggestions"></datalist>
        <div style="display:flex; gap:10px; margin-bottom:20px;">
            <input type="number" id="inp-can" placeholder="Cajas" class="input-box" style="flex:1;">
            <button onclick="addPoint()" style="background:var(--text); color:#fff; border:none; border-radius:16px; width:65px; font-size:26px;"><i class="ph ph-plus"></i></button>
        </div>

        <div id="live-list"></div>
        
        <div id="save-area" style="display:none; margin-top:20px;">
            <button onclick="openModal('modal-date')" class="btn-main">GUARDAR DESPACHO</button>
            <button onclick="go('page-select-plate')" class="btn-ghost" style="background:none; color:var(--danger)">Cambiar Camión</button>
        </div>
    </div>

    <div id="page-history" class="page">
        <div style="position:sticky; top:0; background:var(--bg); padding:10px 0; z-index:100;">
            <div class="input-box" style="display:flex; align-items:center; gap:10px; margin-bottom:0;">
                <i class="ph ph-magnifying-glass" style="color:var(--accent)"></i>
                <input type="text" id="smart-search" placeholder="Buscar por placa, chofer o fecha..." style="border:none; outline:none; width:100%; font-weight:600;" oninput="renderHistory()">
            </div>
        </div>
        <div id="history-feed" style="margin-top:15px;"></div>
    </div>

    <div id="modal-date" class="modal-wrap">
        <div class="modal-body">
            <h3 style="margin-top:0; font-weight:800;">¿Cuándo sale esta ruta?</h3>
            <p style="color:var(--text-dim); margin-bottom:25px;">Selecciona la fecha de despacho para el reporte.</p>
            <button onclick="finalize('hoy')" class="btn-main" style="background:var(--success); margin-bottom:10px;">SALE HOY</button>
            <button onclick="finalize('mañana')" class="btn-main">SALE MAÑANA</button>
            <button onclick="closeModal('modal-date')" style="background:none; border:none; color:var(--danger); margin-top:15px; font-weight:700; cursor:pointer;">CANCELAR</button>
        </div>
    </div>

    <nav id="app-nav" class="nav-bar" style="display:none">
        <button class="nav-item active" id="n-route" onclick="go('page-select-plate')"><i class="ph-fill ph-plus-circle"></i>NUEVO</button>
        <button class="nav-item" id="n-history" onclick="go('page-history')"><i class="ph-fill ph-database"></i>DATA</button>
        <button class="nav-item" id="n-reports" onclick="go('page-reports')"><i class="ph-fill ph-chart-pie"></i>REPORTES</button>
    </nav>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbxuVVOZfMx8jkN-q079s6g7ppPAF4XIkNG-DEQGt6MqiownzLo3NMyWBIZ1hkTyoPBl/exec";
        let db = [], currentCarga = [], activeUser = "";
        const FLOTA = { 
            "CEP-929": "ROMARIO", 
            "BPN-711": "CESAR C.", 
            "BVN-704": "LUIS H.", 
            "BUL-742": "WALDIR", 
            "BVN-930": "MARCELO" 
        };

        window.onload = () => {
            const saved = localStorage.getItem('tw_db_v28');
            if(saved) db = JSON.parse(saved);
            setupUI();
            if(localStorage.getItem('tw_logged')) login(localStorage.getItem('tw_logged'));
        };

        function setupUI() {
            // Login
            const l = document.getElementById('login-options');
            ['TAJHO ADMIN', 'FRANCESCO', 'OSCAR', 'LUIS HERBER'].forEach(u => {
                l.innerHTML += `<div onclick="checkPass('${u}')" class="card" style="display:flex; justify-content:space-between; align-items:center; cursor:pointer; font-weight:700;">${u} <i class="ph ph-caret-right"></i></div>`;
            });
            // Flota
            const f = document.getElementById('plate-grid');
            for(let p in FLOTA) {
                f.innerHTML += `
                <div class="card" onclick="selectTruck('${p}')" style="cursor:pointer; display:flex; justify-content:space-between; align-items:center;">
                    <div><b style="font-size:18px;">${p}</b><div style="font-size:12px; color:var(--text-dim)">${FLOTA[p]}</div></div>
                    <i class="ph ph-truck" style="font-size:24px; color:var(--accent)"></i>
                </div>`;
            }
        }

        function selectTruck(p) {
            localStorage.setItem('tmp_p', p);
            localStorage.setItem('tmp_d', FLOTA[p]);
            document.getElementById('active-plate-label').innerText = p;
            document.getElementById('active-driver-label').innerText = FLOTA[p];
            currentCarga = [];
            refreshRouteUI();
            go('page-route');
        }

        function addPoint() {
            const cli = document.getElementById('inp-cli').value.toUpperCase(), can = parseInt(document.getElementById('inp-can').value);
            if(!cli || !can) return;
            currentCarga.push({cli, can});
            document.getElementById('inp-cli').value = ""; document.getElementById('inp-can').value = "";
            refreshRouteUI();
        }

        function refreshRouteUI() {
            let t = 0, h = "";
            currentCarga.forEach((it, i) => {
                t += it.can;
                h += `<div class="card" style="display:flex; justify-content:space-between; padding:15px; border-left:4px solid var(--accent);">
                    <span><b>${it.can}</b> ${it.cli}</span>
                    <i class="ph ph-trash" style="color:var(--danger)" onclick="currentCarga.splice(${i},1);refreshRouteUI()"></i>
                </div>`;
            });
            document.getElementById('count-cajas').innerText = t;
            document.getElementById('count-puntos').innerText = currentCarga.length + " Clientes";
            document.getElementById('save-area').style.display = t > 0 ? 'block' : 'none';
            document.getElementById('live-list').innerHTML = h;
        }

        async function finalize(tipo) {
            let f = new Date(); if(tipo==='mañana') f.setDate(f.getDate()+1);
            const r = {
                fecha: f.toISOString().split('T')[0],
                placa: localStorage.getItem('tmp_p'),
                chofer: localStorage.getItem('tmp_d'),
                items: currentCarga.map(i => `${i.cli}: ${i.can}`).join(", "),
                total: currentCarga.reduce((a,b)=>a+b.can,0),
                operario: activeUser,
                id: 'R'+Date.now()
            };
            db.unshift(r); localStorage.setItem('tw_db_v28', JSON.stringify(db));
            fetch(API, {method:'POST', mode:'no-cors', body:JSON.stringify(r)});
            closeModal('modal-date');
            go('page-history');
            renderHistory();
        }

        function renderHistory() {
            const q = document.getElementById('smart-search').value.toLowerCase();
            let h = "";
            db.filter(r => `${r.placa} ${r.chofer} ${r.items} ${r.fecha}`.toLowerCase().includes(q)).forEach(r => {
                h += `<div class="card">
                    <div style="display:flex; justify-content:space-between;"><b>${r.placa}</b> <span style="background:#f1f5f9; padding:4px 10px; border-radius:8px; font-weight:800; color:var(--accent)">${r.total} CJS</span></div>
                    <div style="font-size:12px; color:var(--text-dim); margin-top:8px;">${r.chofer} | ${r.fecha.split('-').reverse().join('/')}</div>
                    <div style="display:flex; gap:10px; margin-top:15px; border-top:1px solid #f1f5f9; padding-top:10px;">
                        <button onclick="sendWA('${r.id}')" style="background:#ecfdf5; color:#10b981; border:none; border-radius:10px; padding:8px; flex:1; font-weight:700; font-size:12px;"><i class="ph ph-whatsapp-logo"></i> WHATSAPP</button>
                    </div>
                </div>`;
            });
            document.getElementById('history-feed').innerHTML = h || "<p style='text-align:center; color:var(--text-dim);'>No hay registros</p>";
        }

        function login(u) {
            activeUser = u; localStorage.setItem('tw_logged', u);
            document.getElementById('page-login').classList.remove('active');
            document.getElementById('app-nav').style.display = 'flex';
            go('page-history'); renderHistory();
        }

        function checkPass(u) { if(u==='TAJHO ADMIN' && prompt("Acceso:")!=="1994") return; login(u); }
        function go(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            const bid = id.includes('plate') || id.includes('route') ? 'n-route' : 'n-'+id.split('-')[1];
            if(document.getElementById(bid)) document.getElementById(bid).classList.add('active');
        }
        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        
        function sendWA(id) {
            const r = db.find(x => x.id === id);
            const msg = `*TWINS ELITE*\n📦 *Unidad:* ${r.placa}\n👤 *Chofer:* ${r.chofer}\n📅 *Fecha:* ${r.fecha.split('-').reverse().join('/')}\n\n*DETALLE:*\n${r.items}\n\n*TOTAL: ${r.total} CAJAS*`;
            window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
        }
    </script>
</body>
</html>
