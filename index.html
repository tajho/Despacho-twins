<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TWINS ELITE - OFICIAL V14</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root {
            --bg: #0b0f17; --surface: #161c28; --accent: #007aff; 
            --text: #ffffff; --text-dim: #94a3b8; --border: #2d3748; 
            --success: #34c759; --danger: #ff3b30;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; }
        
        .page { display: none; padding: 10px 15px 120px 15px; max-width: 500px; margin: 0 auto; }
        .active { display: block !important; }

        .top-header { position: sticky; top: 0; z-index: 1000; background: rgba(11, 15, 23, 0.9); backdrop-filter: blur(10px); padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }

        /* DATA COMPACTA OPTIMIZADA */
        .summary-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .summary-box { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 10px; border-left: 4px solid var(--accent); }
        .box-green { border-left-color: var(--success); }
        .summary-box label { font-size: 9px; font-weight: 800; color: var(--text-dim); text-transform: uppercase; display: block; margin-bottom: 2px; }
        .data-row { display: flex; justify-content: space-between; align-items: baseline; }
        .data-row b { font-size: 18px; color: #fff; }
        .data-row span { font-size: 9px; color: var(--text-dim); font-weight: 600; text-transform: uppercase; }

        /* FEED DE HISTORIAL MEJORADO */
        .history-card { background: var(--surface); border-radius: 14px; padding: 12px; border: 1px solid var(--border); margin-bottom: 8px; animation: fadeIn 0.3s ease; }
        .history-card .header { display: flex; justify-content: space-between; margin-bottom: 5px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 5px; }
        .history-card b { color: var(--accent); font-size: 14px; }
        .history-card .details { font-size: 12px; color: #cbd5e1; line-height: 1.4; }

        /* NAV BAR */
        .nav-bar { position: fixed; bottom: 20px; left: 15px; right: 15px; background: rgba(22, 28, 40, 0.95); backdrop-filter: blur(20px); height: 70px; border-radius: 20px; display: flex; border: 1px solid var(--border); z-index: 2000; box-shadow: 0 8px 25px rgba(0,0,0,0.5); }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-dim); background: none; border: none; font-size: 9px; font-weight: 700; }
        .nav-item.active { color: var(--accent); }
        .nav-item i { font-size: 22px; margin-bottom: 3px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <header id="app-header" class="top-header" style="display:none">
        <div style="font-weight:900; font-size:16px;">TWINS <span style="color:var(--accent)">ELITE</span></div>
        <div id="sync-indicator" style="font-size:10px; color:var(--success); font-weight:800;">● ONLINE</div>
    </header>

    <div id="page-login" class="page active">
        <div style="text-align:center; padding:50px 0"><h3 style="font-weight:800;">Warehouse Login</h3></div>
        <div id="login-options"></div>
    </div>

    <div id="page-select-plate" class="page">
        <div style="text-align:center; padding:20px 0"><h3 style="font-weight:800;">Unidad de Carga</h3></div>
        <div id="plate-options" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;"></div>
    </div>

    <div id="page-route" class="page">
        <div style="background: linear-gradient(135deg, #007aff, #0056b3); padding: 20px; border-radius: 20px; margin-bottom: 15px; color: white;">
            <div style="display:flex; justify-content:space-between; align-items:center">
                <div><small style="font-weight:800; font-size:10px;">CAJAS</small><div id="count-cajas" style="font-size:36px; font-weight:800;">0</div></div>
                <div style="text-align:right"><b id="active-plate-label" style="font-size:16px;">---</b><small style="display:block; font-size:10px;">Ptos: <span id="count-puntos">0</span></small></div>
            </div>
        </div>
        <input type="text" id="inp-cli" placeholder="Cliente" style="background:var(--surface); border:1px solid var(--border); padding:14px; border-radius:12px; color:white; width:100%; margin-bottom:10px;">
        <div style="display:flex; gap:10px; margin-bottom: 15px;">
            <input type="number" id="inp-can" placeholder="Cant." style="background:var(--surface); border:1px solid var(--border); padding:14px; border-radius:12px; color:white; flex:1;">
            <button onclick="addPoint()" style="background:var(--accent); border:none; border-radius:12px; color:white; width:60px;"><i class="ph-bold ph-plus"></i></button>
        </div>
        <div id="live-list"></div>
        <div id="finalize-area" style="display:none; margin-top:15px; border-top:1px solid var(--border); padding-top:15px">
            <button class="btn-main" onclick="openConfirm()" style="background:var(--success); color:white; width:100%; padding:16px; border-radius:14px; border:none; font-weight:800;">GUARDAR DESPACHO</button>
            <button onclick="clearAll()" style="width:100%; background:none; border:none; color:var(--danger); font-size:11px; margin-top:12px; font-weight:700">ANULAR CARGA</button>
        </div>
    </div>

    <div id="page-history" class="page">
        <h3 style="margin: 10px 0;">Historial Warehouse</h3>
        
        <div class="summary-container">
            <div class="summary-box">
                <label id="label-month">MES</label>
                <div class="data-row"><b id="h-cajas-mes">0</b><span>Cjs</span></div>
                <div class="data-row"><b id="h-envios-mes">0</b><span>Cli</span></div>
            </div>
            <div class="summary-box box-green">
                <label>HOY</label>
                <div class="data-row"><b id="h-cajas-dia">0</b><span>Cjs</span></div>
                <div class="data-row"><b id="h-envios-dia">0</b><span>Cli</span></div>
            </div>
        </div>

        <div style="margin-bottom: 15px;">
            <input type="date" id="filter-date" onchange="renderHistoryList()" style="background:var(--surface); border:1px solid var(--border); padding:10px; border-radius:10px; color:white; width:100%; font-size:13px;">
        </div>

        <div id="history-feed"></div>
    </div>

    <div id="page-fleet" class="page"><h3>Flota</h3><div id="fleet-grid"></div></div>
    <div id="page-stats" class="page"><h3>Reportes</h3></div>

    <nav id="app-nav" class="nav-bar" style="display:none">
        <button class="nav-item active" id="n-route" onclick="checkNewRoute()"><i class="ph-fill ph-plus-circle"></i>NUEVO</button>
        <button class="nav-item" id="n-history" onclick="go('page-history')"><i class="ph-fill ph-chart-pie-slice"></i>DATA</button>
        <button class="nav-item" id="n-fleet" onclick="go('page-fleet')"><i class="ph-fill ph-truck"></i>FLOTA</button>
        <button class="nav-item" id="n-stats" onclick="go('page-stats')"><i class="ph-fill ph-file-text"></i>REPORTE</button>
    </nav>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbxuVVOZfMx8jkN-q079s6g7ppPAF4XIkNG-DEQGt6MqiownzLo3NMyWBIZ1hkTyoPBl/exec";
        let activeUser = "", currentCarga = [], db = [];
        const ASIGNACION = { "CEP-929": "ROMARIO", "BPN-711": "CESAR C.", "BVN-704": "LUIS H.", "BUL-742": "WALDIR", "BVN-930": "MARCELO" };

        window.onload = () => {
            // Cargar caché inmediatamente para velocidad
            const cached = localStorage.getItem('tw_db_cache');
            if(cached) {
                db = JSON.parse(cached);
                processStats();
                renderHistoryList();
            }
            setupLogin();
            if(localStorage.getItem('tw_logged')) login(localStorage.getItem('tw_logged'));
        };

        function setupLogin() {
            const opts = document.getElementById('login-options');
            ['TAJHO ADMIN', 'FRANCESCO', 'OSCAR', 'LUIS HERBER'].forEach(u => {
                opts.innerHTML += `<div onclick="checkPass('${u}')" style="background:var(--surface); padding:15px; border-radius:12px; margin-bottom:8px; border:1px solid var(--border); display:flex; justify-content:space-between; font-weight:700;">${u} <i class="ph-bold ph-caret-right"></i></div>`;
            });
            document.getElementById('plate-options').innerHTML = Object.keys(ASIGNACION).map(p => 
                `<div onclick="startWithPlate('${p}')" style="background:var(--surface); border:1px solid var(--border); padding:15px; border-radius:12px; color:white; font-weight:800; text-align:center;">${p}</div>`
            ).join('');
        }

        async function syncData() {
            document.getElementById('sync-indicator').innerText = "● SYNCING...";
            document.getElementById('sync-indicator').style.color = "var(--warning)";
            try {
                const r = await fetch(API);
                const data = await r.json();
                db = data;
                localStorage.setItem('tw_db_cache', JSON.stringify(db)); // Guardar en caché
                processStats();
                renderHistoryList();
                document.getElementById('sync-indicator').innerText = "● ONLINE";
                document.getElementById('sync-indicator').style.color = "var(--success)";
            } catch(e) {
                document.getElementById('sync-indicator').innerText = "● OFFLINE";
                document.getElementById('sync-indicator').style.color = "var(--danger)";
            }
        }

        function processStats() {
            const hoy = new Date().toLocaleDateString('sv-SE');
            const mes = hoy.substring(0, 7);
            let dC = 0, dE = 0, mC = 0, mE = 0;
            
            db.forEach(r => {
                const total = parseFloat(r.total || 0);
                if(r.fecha === hoy) { dC += total; dE++; }
                if(r.fecha && r.fecha.startsWith(mes)) { mC += total; mE++; }
            });
            
            document.getElementById('h-cajas-dia').innerText = dC;
            document.getElementById('h-envios-dia').innerText = dE;
            document.getElementById('h-cajas-mes').innerText = mC;
            document.getElementById('h-envios-mes').innerText = mE;
            document.getElementById('label-month').innerText = new Date().toLocaleString('es-ES', { month: 'short' }).toUpperCase();
        }

        function renderHistoryList() {
            const container = document.getElementById('history-feed');
            const filterDate = document.getElementById('filter-date').value || new Date().toLocaleDateString('sv-SE');
            
            let html = "";
            const filtered = db.filter(r => r.fecha === filterDate);
            
            filtered.forEach(r => {
                html += `
                    <div class="history-card">
                        <div class="header">
                            <b>${r.placa}</b>
                            <span style="font-size:10px; font-weight:800; color:var(--success)">${r.total} CJS</span>
                        </div>
                        <div class="details">
                            <i class="ph ph-user" style="color:var(--accent)"></i> ${r.chofer}<br>
                            <i class="ph ph-package"></i> ${r.items || r.detalles || 'Sin detalle'}
                        </div>
                        <div style="text-align:right; font-size:9px; color:var(--text-dim); margin-top:5px">${r.hora}</div>
                    </div>`;
            });
            
            container.innerHTML = html || `<p style="text-align:center; opacity:0.2; margin-top:20px;">No hay registros para esta fecha</p>`;
        }

        // Lógica de navegación y login (Intacta para seguridad)
        function login(u) {
            activeUser = u; localStorage.setItem('tw_logged', u);
            document.getElementById('page-login').classList.remove('active');
            document.getElementById('app-header').style.display = 'flex';
            document.getElementById('app-nav').style.display = 'flex';
            checkNewRoute();
            syncData();
        }
        function checkPass(u) { if(u==='TAJHO ADMIN' && prompt("Clave:")!=="1994") return; login(u); }
        function go(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            let navBtnId = "n-route"; 
            if(id === 'page-history') { navBtnId = "n-history"; renderHistoryList(); }
            if(id === 'page-fleet') navBtnId = "n-fleet";
            if(id === 'page-stats') navBtnId = "n-stats";
            document.getElementById(navBtnId).classList.add('active');
        }
        function checkNewRoute() {
            if(localStorage.getItem('tw_temp_placa')) {
                const saved = localStorage.getItem('tw_temp_route');
                if(saved) currentCarga = JSON.parse(saved);
                document.getElementById('active-plate-label').innerText = localStorage.getItem('tw_temp_placa');
                refreshCargaUI(); go('page-route');
            } else { go('page-select-plate'); }
        }
        function startWithPlate(p) { localStorage.setItem('tw_temp_placa', p); go('page-route'); checkNewRoute(); }
        function addPoint() {
            const cli = document.getElementById('inp-cli').value.toUpperCase();
            const can = parseInt(document.getElementById('inp-can').value);
            if(!cli || !can) return;
            currentCarga.push({cli, can});
            localStorage.setItem('tw_temp_route', JSON.stringify(currentCarga));
            document.getElementById('inp-cli').value = ""; document.getElementById('inp-can').value = "";
            refreshCargaUI();
        }
        function refreshCargaUI() {
            let total = 0; let html = "";
            currentCarga.forEach((it, i) => {
                total += it.can;
                html += `<div style="background:var(--surface); padding:10px; border-radius:10px; margin-bottom:5px; display:flex; justify-content:space-between; border:1px solid var(--border);"><span><b>${it.can}</b> ${it.cli}</span><i class="ph ph-trash" style="color:var(--danger)" onclick="removePoint(${i})"></i></div>`;
            });
            document.getElementById('count-cajas').innerText = total;
            document.getElementById('count-puntos').innerText = currentCarga.length;
            document.getElementById('finalize-area').style.display = currentCarga.length > 0 ? 'block' : 'none';
            document.getElementById('live-list').innerHTML = html;
        }
        function removePoint(i) { currentCarga.splice(i,1); localStorage.setItem('tw_temp_route', JSON.stringify(currentCarga)); refreshCargaUI(); }
        function clearAll() { if(confirm("¿Anular?")) { localStorage.clear(); location.reload(); }}
        function openConfirm() { if(confirm("¿Guardar en Excel?")) finalize(); }
        async function finalize() {
            const r = {
                fecha: new Date().toLocaleDateString('sv-SE'), 
                hora: new Date().toLocaleTimeString('es-PE', {hour:'2-digit', minute:'2-digit', hour12:false}),
                chofer: ASIGNACION[localStorage.getItem('tw_temp_placa')], 
                placa: localStorage.getItem('tw_temp_placa'),
                items: currentCarga.map(i => `${i.cli}: ${i.can}`).join(", "), 
                total: currentCarga.reduce((a,b)=>a+b.can,0), 
                operario: activeUser
            };
            fetch(API, {method:'POST', mode:'no-cors', body:JSON.stringify(r)});
            db.unshift(r);
            localStorage.setItem('tw_db_cache', JSON.stringify(db)); // Guardar nuevo registro en caché local
            processStats();
            localStorage.removeItem('tw_temp_route'); localStorage.removeItem('tw_temp_placa');
            currentCarga=[]; refreshCargaUI(); go('page-history');
        }
    </script>
</body>
</html>
