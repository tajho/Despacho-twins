<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TWINS ELITE - V40 SMART</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root {
            --bg: #f8fafc; --surface: #ffffff; --accent: #0062ff; 
            --text: #0f172a; --text-dim: #64748b; --border: #e2e8f0; 
            --success: #10b981; --danger: #f43f5e;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { margin: 0; background: var(--bg); color: var(--text); padding-bottom: 90px; }

        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; height: 70px; display: flex; border-top: 1px solid var(--border); z-index: 1000; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-dim); background: none; border: none; font-size: 10px; font-weight: 700; }
        .nav-item.active { color: var(--accent); }
        .nav-item i { font-size: 22px; margin-bottom: 2px; }

        .page { display: none; padding: 15px; max-width: 500px; margin: 0 auto; }
        .active { display: block; }

        .card { background: #fff; border-radius: 18px; padding: 15px; border: 1px solid var(--border); margin-bottom: 10px; }
        .card-actions { display: flex; gap: 10px; margin-top: 12px; border-top: 1px solid var(--border); padding-top: 12px; }
        .btn-action { flex: 1; border: none; border-radius: 12px; padding: 12px; font-size: 14px; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 5px; cursor: pointer; }
        
        .input-box { background: #fff; border: 1px solid var(--border); border-radius: 14px; padding: 14px; width: 100%; font-size: 16px; font-weight: 600; margin-bottom: 10px; outline: none; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; align-items: center; justify-content: center; z-index: 2000; padding: 15px; backdrop-filter: blur(4px); }
        .modal-content { background: #fff; border-radius: 25px; padding: 20px; width: 100%; max-height: 90vh; overflow-y: auto; }
        
        .chip-container { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 15px; }
        .chip { background: var(--bg); border: 1px solid var(--border); padding: 8px 12px; border-radius: 10px; font-size: 12px; font-weight: 700; color: var(--text-dim); }
        .chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    </style>
</head>
<body>

    <div id="page-dashboard" class="page active">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px;">
            <div style="background:var(--accent); color:#fff; padding:15px; border-radius:20px;">
                <span style="font-size:9px; font-weight:800; opacity:0.8;">ESTE MES</span>
                <div style="font-size:22px; font-weight:900;" id="m-cajas">0</div>
            </div>
            <div style="background:#fff; border:1px solid var(--border); padding:15px; border-radius:20px;">
                <span style="font-size:9px; font-weight:800; color:var(--accent);">HOY</span>
                <div style="font-size:22px; font-weight:900;" id="d-cajas">0</div>
            </div>
        </div>
        <input type="text" id="smart-search" placeholder="Filtrar por placa o chofer..." class="input-box" oninput="renderHistory()">
        <div id="history-feed"></div>
    </div>

    <div id="page-route" class="page">
        <div class="card" style="background:var(--text); color:#fff;">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <div>
                    <h2 id="route-placa" style="margin:0;">---</h2>
                    <span id="route-meta" style="font-size:11px; opacity:0.7;">---</span>
                </div>
                <div style="font-size:28px; font-weight:900;" id="count-cajas">0</div>
            </div>
        </div>

        <div id="edit-header" class="card" style="display:none; margin-top:10px;">
            <label style="font-size:10px; font-weight:800;">CAMBIAR CHOFER:</label>
            <input type="text" id="edit-chofer-val" class="input-box">
            <label style="font-size:10px; font-weight:800;">CAMBIAR AUXILIAR:</label>
            <input type="text" id="edit-aux-val" class="input-box">
        </div>

        <div class="card" style="margin-top:10px;">
            <input type="text" id="inp-cli" placeholder="Nombre del Cliente" class="input-box">
            <div style="display:flex; gap:8px;">
                <input type="number" id="inp-can" placeholder="Cant." class="input-box" style="flex:1;">
                <button onclick="addPoint()" style="background:var(--accent); color:#fff; border:none; border-radius:14px; width:60px; font-size:24px;">+</button>
            </div>
            <div id="live-list" style="margin-top:15px;"></div>
        </div>
        
        <button id="btn-save" onclick="openModal('modal-date')" style="display:none; background:var(--success); color:#fff; width:100%; padding:20px; border-radius:18px; border:none; font-weight:800; font-size:16px;">FINALIZAR Y GUARDAR</button>
    </div>

    <div id="modal-wa" class="modal">
        <div class="modal-content">
            <h3 style="margin:0 0 15px 0;"><i class="ph-fill ph-whatsapp-logo" style="color:#10b981"></i> Reporte WhatsApp</h3>
            
            <label style="font-size:10px; font-weight:800;">CHOFER:</label>
            <input type="text" id="wa-chofer" class="input-box">
            
            <label style="font-size:10px; font-weight:800;">AUXILIAR (Sugerencias):</label>
            <div class="chip-container" id="aux-suggestions"></div>
            <input type="text" id="wa-aux" class="input-box" placeholder="O escribe otro nombre...">
            
            <button onclick="sendWA()" class="input-box" style="background:#10b981; color:#fff; border:none; margin-top:10px;">ENVIAR AHORA</button>
            <button onclick="closeModals()" style="width:100%; background:none; border:none; color:var(--text-dim); font-weight:700;">REGRESAR</button>
        </div>
    </div>

    <div id="modal-date" class="modal"><div class="modal-content" style="text-align:center;"><h4>¿Fecha de Salida?</h4><button onclick="saveFinal('hoy')" class="input-box" style="background:var(--success); color:#fff; border:none;">HOY</button><button onclick="saveFinal('mañana')" class="input-box" style="background:var(--accent); color:#fff; border:none;">MAÑANA</button></div></div>
    <div id="page-select-plate" class="page"><h3 style="font-weight:800;">Nueva Unidad</h3><div id="plate-grid"></div></div>

    <nav class="nav-bar">
        <button class="nav-item active" id="n-dashboard" onclick="go('page-dashboard')"><i class="ph-fill ph-chart-pie"></i>CONTROL</button>
        <button class="nav-item" id="n-route" onclick="go('page-select-plate')"><i class="ph-fill ph-plus-circle"></i>NUEVO</button>
    </nav>

    <script>
        let db = JSON.parse(localStorage.getItem('tw_db_v40') || '[]');
        let current = { items: [] }, activeId = null, isEdit = false;
        
        const FLOTA = { "CEP-929": "ROMARIO", "BPN-711": "CESAR C.", "BVN-704": "LUIS H.", "BUL-742": "WALDIR", "BVN-930": "MARCELO" };
        const AUXILIARES = ["CRISTOPHER", "PERCY", "PLACIDO", "RODOLFO", "RICARDO", "ELIO", "JOFER", "MARTIN", "NELSON", "JULIO", "DANIEL C."];

        window.onload = () => { renderHistory(); renderStats(); setupPlates(); setupSuggestions(); };

        function setupPlates() {
            const g = document.getElementById('plate-grid');
            for(let p in FLOTA) g.innerHTML += `<div class="card" onclick="startNew('${p}')" style="font-weight:800; padding:20px; text-align:center; font-size:18px;">${p}</div>`;
        }

        function setupSuggestions() {
            const container = document.getElementById('aux-suggestions');
            AUXILIARES.forEach(name => {
                container.innerHTML += `<div class="chip" onclick="selectChip('${name}')">${name}</div>`;
            });
        }

        function selectChip(name) {
            document.getElementById('wa-aux').value = name;
            document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
            event.target.classList.add('active');
        }

        function startNew(p) {
            isEdit = false;
            current = { placa: p, chofer: FLOTA[p], auxiliar: "POR DEFINIR", items: [] };
            document.getElementById('edit-header').style.display = 'none';
            refreshUI(); go('page-route');
        }

        function editRoute(id) {
            isEdit = true; activeId = id;
            const r = db.find(x => x.id === id);
            current = JSON.parse(JSON.stringify(r));
            document.getElementById('edit-header').style.display = 'block';
            document.getElementById('edit-chofer-val').value = current.chofer;
            document.getElementById('edit-aux-val').value = current.auxiliar;
            refreshUI(); go('page-route');
        }

        function addPoint() {
            const cli = document.getElementById('inp-cli').value.toUpperCase(), can = parseInt(document.getElementById('inp-can').value);
            if(!cli || !can) return;
            current.items.push({cli, can});
            document.getElementById('inp-cli').value = ""; document.getElementById('inp-can').value = "";
            refreshUI();
        }

        function refreshUI() {
            document.getElementById('route-placa').innerText = current.placa;
            document.getElementById('route-meta').innerText = `${current.chofer} | ${current.auxiliar}`;
            let t = 0, h = "";
            current.items.forEach((it, i) => {
                t += it.can;
                h += `<div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #eee; font-size:13px;">
                    <span><b>${it.can}</b> ${it.cli}</span>
                    <i class="ph ph-trash" style="color:var(--danger)" onclick="current.items.splice(${i},1);refreshUI()"></i>
                </div>`;
            });
            document.getElementById('count-cajas').innerText = t;
            document.getElementById('live-list').innerHTML = h;
            document.getElementById('btn-save').style.display = t > 0 ? 'block' : 'none';
        }

        function saveFinal(tipo) {
            if(isEdit) {
                current.chofer = document.getElementById('edit-chofer-val').value;
                current.auxiliar = document.getElementById('edit-aux-val').value;
                db[db.findIndex(x => x.id === activeId)] = current;
            } else {
                let f = new Date(); if(tipo==='mañana') f.setDate(f.getDate()+1);
                current.fecha = f.toISOString().split('T')[0];
                current.id = 'ID' + Date.now();
                db.unshift(current);
            }
            localStorage.setItem('tw_db_v40', JSON.stringify(db));
            closeModals(); go('page-dashboard'); renderHistory(); renderStats();
        }

        function renderHistory() {
            const q = document.getElementById('smart-search').value.toLowerCase();
            let h = "";
            db.filter(r => JSON.stringify(r).toLowerCase().includes(q)).slice(0,20).forEach(r => {
                const total = r.items.reduce((a,b)=>a+b.can,0);
                h += `<div class="card">
                    <div style="display:flex; justify-content:space-between; align-items:start;">
                        <div><b style="font-size:16px;">${r.placa}</b><div style="font-size:11px; color:var(--text-dim);">${r.chofer} | ${r.auxiliar}</div></div>
                        <b style="color:var(--accent); font-size:16px;">${total} CJS</b>
                    </div>
                    <div class="card-actions">
                        <button class="btn-action" style="background:#f1f5f9; color:var(--text);" onclick="editRoute('${r.id}')"><i class="ph-bold ph-pencil-simple"></i> Editar</button>
                        <button class="btn-action" style="background:#ecfdf5; color:#10b981;" onclick="prepWA('${r.id}')"><i class="ph-fill ph-whatsapp-logo"></i> WhatsApp</button>
                    </div>
                </div>`;
            });
            document.getElementById('history-feed').innerHTML = h || "<p style='text-align:center; opacity:0.4;'>No hay registros</p>";
        }

        function prepWA(id) {
            activeId = id;
            const r = db.find(x => x.id === id);
            document.getElementById('wa-chofer').value = r.chofer;
            document.getElementById('wa-aux').value = r.auxiliar === "POR DEFINIR" ? "" : r.auxiliar;
            openModal('modal-wa');
        }

        function sendWA() {
            const r = db.find(x => x.id === activeId);
            const chofer = document.getElementById('wa-chofer').value;
            const aux = document.getElementById('wa-aux').value || "POR DEFINIR";
            r.chofer = chofer; r.auxiliar = aux;
            localStorage.setItem('tw_db_v40', JSON.stringify(db));

            const items = r.items.map(i => `${i.cli}: ${i.can}`).join(", ");
            const total = r.items.reduce((a,b)=>a+b.can,0);
            const msg = `*TWINS ELITE*\n📦 *Unidad:* ${r.placa}\n👤 *Chofer:* ${chofer}\n🤝 *Auxiliar:* ${aux}\n📅 *Fecha:* ${r.fecha}\n\n*TOTAL: ${total} CAJAS*`;
            window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
            closeModals(); renderHistory();
        }

        function renderStats() {
            const h = new Date().toISOString().split('T')[0];
            const dH = db.filter(r => r.fecha === h);
            document.getElementById('d-cajas').innerText = dH.reduce((a,b)=>a+b.items.reduce((x,y)=>x+y.can,0), 0);
            document.getElementById('m-cajas').innerText = db.filter(r => r.fecha.startsWith(h.substring(0,7))).reduce((a,b)=>a+b.items.reduce((x,y)=>x+y.can,0), 0);
        }

        function go(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id === 'page-dashboard' ? 'n-dashboard' : 'n-route').classList.add('active');
        }
        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModals() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }
    </script>
</body>
</html>
