<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TWINS LOGISTICS ELITE V30.1</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root {
            --bg: #0a0e14;
            --card: rgba(255, 255, 255, 0.05);
            --accent: #007aff;
            --accent-glow: rgba(0, 122, 255, 0.4);
            --text: #ffffff;
            --text-dim: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
            --success: #32d74b;
            --danger: #ff453a;
        }

        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; outline: none; }
        body { 
            margin: 0; background: var(--bg); 
            background: radial-gradient(circle at top right, #1a2533, #0a0e14);
            color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; min-height: 100vh;
        }

        .page { display: none; padding: 20px; padding-bottom: 120px; max-width: 500px; margin: 0 auto; animation: fadeIn 0.4s ease-out; }
        .active { display: block !important; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .top-header { 
            position: sticky; top: 0; z-index: 100; background: rgba(10, 14, 20, 0.8);
            backdrop-filter: blur(20px); padding: 18px 24px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border);
        }
        .user-pill { background: var(--accent); padding: 6px 14px; border-radius: 50px; font-size: 11px; font-weight: 800; color: white; box-shadow: 0 0 15px var(--accent-glow); }

        .card { background: var(--card); backdrop-filter: blur(10px); border-radius: 24px; border: 1px solid var(--border); padding: 20px; margin-bottom: 18px; }

        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 18px; }
        .stat-card { background: var(--card); border: 1px solid var(--border); padding: 15px; border-radius: 20px; }
        .stat-num { font-size: 20px; font-weight: 800; color: var(--accent); display: block; }
        .stat-label { font-size: 9px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }

        input, select { width: 100%; padding: 16px; margin: 10px 0; border-radius: 16px; border: 1px solid var(--border); background: rgba(0,0,0,0.3); color: white; font-size: 15px; }

        .btn { width: 100%; padding: 18px; border-radius: 18px; border: none; font-size: 15px; font-weight: 800; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 10px; transition: 0.3s; }
        .btn-main { background: var(--accent); color: white; box-shadow: 0 8px 20px var(--accent-glow); }
        .btn-mini { padding: 10px; border-radius: 12px; font-size: 10px; flex: 1; background: rgba(255,255,255,0.05); color: white; border: 1px solid var(--border); font-weight: 700; }

        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; height: 85px; background: rgba(10, 14, 20, 0.95); backdrop-filter: blur(20px); border-top: 1px solid var(--border); display: flex; justify-content: space-around; align-items: center; z-index: 1000; }
        .nav-item { background: none; border: none; color: var(--text-dim); font-size: 10px; font-weight: 700; display: flex; flex-direction: column; align-items: center; gap: 6px; flex: 1; }
        .nav-item.active-nav { color: var(--accent); }
        .nav-item i { font-size: 24px; }

        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); z-index: 2000; justify-content: center; align-items: center; padding: 20px; }
        .modal-content { background: #161b22; border: 1px solid var(--border); border-radius: 32px; padding: 25px; width: 100%; max-width: 360px; }
        .list-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
    </style>
</head>
<body>

    <div id="modal-list" class="modal-overlay" onclick="this.style.display='none'">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h3 style="margin:0">Detalle de Carga</h3>
            <p id="list-sub" style="color:var(--text-dim); font-size:11px; margin-bottom:20px;"></p>
            <div id="list-container" style="max-height: 300px; overflow-y: auto; margin-bottom:20px;"></div>
            <button class="btn btn-main" onclick="document.getElementById('modal-list').style.display='none'">CERRAR</button>
        </div>
    </div>

    <div id="modal-ask" class="modal-overlay">
        <div class="modal-content">
            <h3 style="margin-bottom:10px; font-weight: 800;">PROGRAMAR SALIDA</h3>
            <p style="color:var(--text-dim); font-size:14px; margin-bottom:25px;">¿Cuándo se ejecuta esta ruta?</p>
            <button class="btn btn-main" style="margin-bottom:12px" onclick="confirmarGuardado('HOY')">🚀 DESPACHAR HOY</button>
            <button class="btn" style="background:var(--success); color:black" onclick="confirmarGuardado('MAÑANA')">📅 PARA MAÑANA</button>
            <button class="btn" style="background:none; color:var(--text-dim); margin-top:10px" onclick="document.getElementById('modal-ask').style.display='none'">CANCELAR</button>
        </div>
    </div>

    <div id="header-app" class="top-header" style="display:none">
        <div class="user-pill" id="user-display">---</div>
        <div style="font-weight:800;">TWINS <span style="color:var(--accent)">ELITE</span></div>
        <i class="ph-bold ph-power" onclick="cerrarSesion()" style="font-size:22px; color:var(--danger)"></i>
    </div>

    <div id="p1" class="page active" style="text-align:center; padding-top:10vh">
        <i class="ph-fill ph-shield-check" style="font-size: 80px; color: var(--accent); filter: drop-shadow(0 0 15px var(--accent-glow));"></i>
        <h1 style="font-size:32px; font-weight:800; margin:15px 0 30px 0">LOGIN</h1>
        <div style="display:grid; gap:14px; padding: 0 20px;">
            <button class="btn" style="background:var(--card); color:white; border:1px solid var(--border);" onclick="login('TAJHO ADMIN')">💎 TAJHO ADMIN</button>
            <button class="btn" style="background:var(--card); color:white; border:1px solid var(--border);" onclick="login('FRANCESCO')">FRANCESCO</button>
            <button class="btn" style="background:var(--card); color:white; border:1px solid var(--border);" onclick="login('OSCAR')">OSCAR</button>
            <button class="btn" style="background:var(--card); color:white; border:1px solid var(--border);" onclick="login('LUIS HERBER')">LUIS HERBER</button>
        </div>
    </div>

    <div id="p2" class="page">
        <div class="card" style="text-align:center; background: linear-gradient(135deg, var(--accent), #003b73); border:none;">
            <div id="total-vivo" style="font-size:54px; font-weight:800;">0</div>
            <span style="font-size:12px; font-weight:800; opacity:0.8;">CAJAS EN RUTA ACTUAL</span>
        </div>
        <div class="card">
            <input type="text" id="cli" placeholder="Cliente / Destino">
            <input type="number" id="can" placeholder="Cajas">
            <button class="btn btn-main" onclick="addItem()"><i class="ph-bold ph-plus"></i>AÑADIR A LISTA</button>
        </div>
        <div id="area-envio" style="display:none">
            <div id="lista-items" class="card" style="font-size:14px;"></div>
            <div class="card">
                <select id="pla">
                    <option value="">Seleccionar Camión</option>
                    <option value="CEP-929">CEP-929</option>
                    <option value="BPN-711">BPN-711</option>
                    <option value="BVN-704">BVN-704</option>
                    <option value="BUL-742">BUL-742</option>
                    <option value="BVN-930">BVN-930</option>
                </select>
                <select id="cho">
                    <option value="">Seleccionar Chofer</option>
                    <option value="LUIS H.">Luis H.</option>
                    <option value="ROMARIO">Romario</option>
                    <option value="CESAR C.">Cesar C.</option>
                    <option value="WALDIR">Waldir</option>
                    <option value="MARCELO">Marcelo</option>
                </select>
                <select id="aux">
                    <option value="">Seleccionar Auxiliar</option>
                    <option value="CRISTOPHER">Cristopher</option>
                    <option value="PLACIDO">Placido</option>
                    <option value="RODOLFO">Rodolfo</option>
                    <option value="SIN AUXILIAR">Sin Auxiliar</option>
                </select>
                <button class="btn" style="background:var(--success); color:black;" onclick="abrirModalGuardar()">
                    <i class="ph-bold ph-check-circle"></i> GUARDAR RUTA
                </button>
            </div>
        </div>
    </div>

    <div id="p3" class="page">
        <div class="stat-grid">
            <div class="stat-card">
                <span class="stat-label">Reporte Mes</span>
                <div style="display:flex; gap:10px;">
                    <div><small style="font-size:8px; color:var(--text-dim)">ENV</small><span id="stat-mes-env" class="stat-num">0</span></div>
                    <div><small style="font-size:8px; color:var(--text-dim)">CAJ</small><span id="stat-mes-caj" class="stat-num">0</span></div>
                </div>
            </div>
            <div class="stat-card">
                <span class="stat-label">Reporte Día</span>
                <div style="display:flex; gap:10px;">
                    <div><small style="font-size:8px; color:var(--text-dim)">ENV</small><span id="stat-dia-env" class="stat-num" style="color:var(--success)">0</span></div>
                    <div><small style="font-size:8px; color:var(--text-dim)">CAJ</small><span id="stat-dia-caj" class="stat-num" style="color:var(--success)">0</span></div>
                </div>
            </div>
        </div>
        <div style="display:flex; gap:10px; margin-bottom:20px;">
            <input type="date" id="f-dia" onchange="renderH()" style="margin:0">
            <button onclick="load()" style="background:var(--card); color:white; border:1px solid var(--border); padding:15px; border-radius:16px;">
                <i class="ph-bold ph-arrows-clockwise"></i>
            </button>
        </div>
        <div id="h-list"></div>
    </div>

    <div id="p4" class="page">
        <h3 style="margin-bottom:20px; font-weight:800">DISPONIBILIDAD DE UNIDADES</h3>
        <div id="lista-flota"></div>
    </div>

    <nav id="nav-app" class="bottom-nav" style="display:none">
        <button class="nav-item" id="nav-p2" onclick="nav('p2')"><i class="ph ph-package"></i>Ruta</button>
        <button class="nav-item" id="nav-p3" onclick="nav('p3')"><i class="ph ph-clock-counter-clockwise"></i>Historial</button>
        <button class="nav-item" id="nav-p4" onclick="nav('p4')"><i class="ph ph-truck"></i>Flota</button>
    </nav>

    <script>
        const URL = "https://script.google.com/macros/s/AKfycbxCRMbdOGYjf0R-w1v9tHG76jDhHXxuXOwHahYEV7Gj1lFn3y42C2s9DUO5nkgO75qy/exec";
        let user = "", ruta = [], db = [];
        const soats = { "CEP-929": "15/05/26", "BPN-711": "22/08/26", "BVN-704": "10/01/27", "BUL-742": "05/11/26", "BVN-930": "30/09/26" };

        window.onload = () => {
            const savedU = localStorage.getItem('tw_u');
            document.getElementById('f-dia').value = new Date().toISOString().split('T')[0];
            if(savedU) login(savedU);
            load();
            setInterval(load, 30000); 
        };

        function login(n) { 
            user = n; localStorage.setItem('tw_u', n);
            document.getElementById('p1').classList.remove('active'); 
            document.getElementById('header-app').style.display='flex'; 
            document.getElementById('nav-app').style.display='flex'; 
            document.getElementById('user-display').innerText = n; 
            nav('p2'); 
        }

        function nav(id) { 
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); 
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active-nav'));
            document.getElementById(id).classList.add('active'); 
            document.getElementById('nav-' + id).classList.add('active-nav');
            if(id === 'p3') renderH();
            if(id === 'p4') renderFlota();
        }

        async function load() { 
            try { const res = await fetch(URL); db = await res.json(); renderH(); renderFlota(); } catch(e){} 
        }

        function addItem() {
            const cl = document.getElementById('cli').value.toUpperCase(), ca = parseInt(document.getElementById('can').value);
            if(!cl || !ca) return; 
            ruta.unshift({cl, ca}); 
            document.getElementById('cli').value = ""; document.getElementById('can').value = ""; renderR(); 
        }

        function renderR() {
            const l = document.getElementById('lista-items'); let s = 0; l.innerHTML = "";
            ruta.forEach((i, x) => { 
                s += i.ca; 
                l.innerHTML += `<div style="display:flex; justify-content:space-between; padding:12px 0; border-bottom:1px solid var(--border)">
                    <span>${i.cl}</span><b>${i.ca} CJ <i class="ph ph-trash" onclick="removeItem(${x})" style="color:var(--danger); margin-left:10px; cursor:pointer"></i></b>
                </div>`; 
            });
            document.getElementById('total-vivo').innerText = s; 
            document.getElementById('area-envio').style.display = ruta.length > 0 ? 'block' : 'none';
        }

        function removeItem(x) { ruta.splice(x,1); renderR(); }

        function abrirModalGuardar() { 
            if(!document.getElementById('pla').value || !document.getElementById('cho').value) return alert("Completa Placa y Chofer");
            document.getElementById('modal-ask').style.display = 'flex'; 
        }

        async function confirmarGuardado(opcion) {
            document.getElementById('modal-ask').style.display = 'none';
            let d = new Date();
            if(opcion === 'MAÑANA') { 
                d.setDate(d.getDate() + 1); 
                if(d.getDay() === 0) d.setDate(d.getDate() + 1); 
            }
            let fT = d.toISOString().split('T')[0];

            const reg = { 
                fecha: fT, chofer: document.getElementById('cho').value, auxiliar: document.getElementById('aux').value, 
                placa: document.getElementById('pla').value, operario: user, 
                items: ruta.map(i => `${i.cl}:${i.ca}`).join(", "), total: ruta.reduce((a,b) => a+b.ca, 0)
            };

            db.push(reg); 
            document.getElementById('f-dia').value = fT; // Bloquear vista en la fecha guardada
            nav('p3'); 
            renderH();

            fetch(URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(reg) });
            
            ruta = []; renderR();
            document.getElementById('pla').value = ""; document.getElementById('cho').value = "";
        }

        function renderH() {
            const list = document.getElementById('h-list'), fD = document.getElementById('f-dia').value;
            let html = "", tDCaj = 0, tDEnv = 0, tMCaj = 0, tMEnv = 0;
            const mesActual = new Date().getMonth();

            db.slice().reverse().forEach(r => {
                let rFecha = r.fecha.split("T")[0];
                let rDate = new Date(r.fecha + "T00:00:00");

                if(rDate.getMonth() === mesActual) { tMCaj += parseFloat(r.total); tMEnv++; }
                
                if(rFecha === fD) {
                    tDCaj += parseFloat(r.total); tDEnv++;
                    html += `<div class="card" style="border-left:4px solid var(--accent)">
                        <div style="display:flex; justify-content:space-between; margin-bottom:8px"><b>${r.placa}</b><b style="color:var(--accent)">${r.total} CJ</b></div>
                        <div style="font-size:14px; font-weight:700;">${r.chofer} <small style="color:var(--text-dim)">/ ${r.auxiliar}</small></div>
                        <div style="display:flex; gap:5px; margin-top:12px">
                            <button class="btn-mini" onclick="verLista('${r.items}', '${r.chofer}')">📋 VER</button>
                            <button class="btn-mini" onclick="editarRuta('${r.items}', '${r.chofer}', '${r.placa}', '${r.auxiliar}')">✏️ EDIT</button>
                            <button class="btn-mini" onclick="sendWA('${r.fecha}', '${r.chofer}', '${r.total}', '${r.items}')">WA</button>
                        </div>
                    </div>`;
                }
            });
            list.innerHTML = html || `<p style='text-align:center; color:var(--text-dim); padding-top:40px'>No hay rutas para este día</p>`;
            document.getElementById('stat-mes-env').innerText = tMEnv;
            document.getElementById('stat-mes-caj').innerText = Math.round(tMCaj);
            document.getElementById('stat-dia-env').innerText = tDEnv;
            document.getElementById('stat-dia-caj').innerText = Math.round(tDCaj);
        }

        function verLista(items, chofer) {
            document.getElementById('list-sub').innerText = "Chofer: " + chofer;
            const container = document.getElementById('list-container');
            container.innerHTML = "";
            items.split(", ").forEach(i => {
                const [cl, ca] = i.split(":");
                container.innerHTML += `<div class="list-row"><span>${cl}</span><b>${ca} CJ</b></div>`;
            });
            document.getElementById('modal-list').style.display = 'flex';
        }

        function editarRuta(items, cho, pla, aux) {
            if(!confirm("¿Cargar esta ruta para editar?")) return;
            ruta = items.split(", ").map(i => { const [cl, ca] = i.split(":"); return {cl, ca: parseInt(ca)}; });
            document.getElementById('cho').value = cho; document.getElementById('pla').value = pla; document.getElementById('aux').value = aux;
            renderR(); nav('p2');
        }

        function sendWA(f, c, t, i) {
            let m = `*TWINS LOGISTICS*%0A*Fecha:* ${f.split('T')[0]}%0A*Chofer:* ${c}%0A*Total:* ${t} CJ%0A%0A*Detalle:*%0A${i.replace(/:/g, ': ').replace(/,/g, '%0A')}`;
            window.location.href = `https://wa.me/?text=${m}`;
        }

        function renderFlota() {
            const list = document.getElementById('lista-flota'), fD = document.getElementById('f-dia').value;
            const pl = ["CEP-929", "BPN-711", "BVN-704", "BUL-742", "BVN-930"];
            list.innerHTML = "";
            pl.forEach(p => {
                let rH = db.find(r => r.placa === p && r.fecha.split('T')[0] === fD);
                list.innerHTML += `<div class="card" style="border-left:5px solid ${rH ? 'var(--danger)' : 'var(--success)'}">
                    <div style="display:flex; justify-content:space-between"><b>${p}</b> <small>SOAT: ${soats[p]}</small></div>
                    <div style="margin-top:5px; font-size:13px">${rH ? '🔴 OCUPADO: '+rH.chofer : '🟢 DISPONIBLE'}</div>
                </div>`;
            });
        }

        function cerrarSesion() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
