<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TWINS DESPACHOS V54</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #010204; --glass: rgba(255, 255, 255, 0.04);
            --accent: #007aff; --accent-glow: rgba(0, 122, 255, 0.3);
            --text: #f5f5f7; --text-dim: #86868b;
            --border: rgba(255, 255, 255, 0.08);
            --success: #2ed158; --danger: #ff453a;
        }

        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; outline: none; }
        body { 
            margin: 0; background: var(--bg); color: var(--text); 
            font-family: 'Plus Jakarta Sans', sans-serif; min-height: 100vh;
            background-image: radial-gradient(circle at 50% 0%, #0f172a, #010204);
        }

        .page { display: none; padding: 20px; padding-bottom: 120px; max-width: 500px; margin: 0 auto; animation: fadeIn 0.3s ease-out; }
        .active { display: block !important; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .top-header { 
            position: sticky; top: 0; z-index: 1000; 
            background: rgba(1, 2, 4, 0.8); backdrop-filter: blur(20px);
            padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 1px solid var(--border);
        }
        
        .card { background: var(--glass); border: 1px solid var(--border); border-radius: 24px; padding: 18px; margin-bottom: 15px; backdrop-filter: blur(10px); }
        .stat-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 15px; }
        .stat-card { background: rgba(255,255,255,0.02); padding: 12px; border-radius: 18px; border: 1px solid var(--border); text-align: center; }
        .stat-val { font-size: 18px; font-weight: 800; display: block; color: var(--accent); }
        .stat-lab { font-size: 9px; font-weight: 700; color: var(--text-dim); text-transform: uppercase; }

        input, select { width: 100%; padding: 16px; border-radius: 16px; border: 1px solid var(--border); background: rgba(255,255,255,0.03); color: white; font-size: 15px; }
        .btn { width: 100%; padding: 16px; border-radius: 18px; border: none; font-size: 14px; font-weight: 700; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 8px; }
        .btn-main { background: var(--accent); color: white; }
        .btn-ghost { background: var(--glass); color: var(--text); border: 1px solid var(--border); }
        .btn-del { background: rgba(255, 69, 58, 0.15); color: #ff453a; border: none; padding: 8px; border-radius: 10px; cursor: pointer; }

        .nav-bar { position: fixed; bottom: 20px; left: 10px; right: 10px; background: rgba(20, 20, 25, 0.95); backdrop-filter: blur(20px); height: 75px; border-radius: 28px; border: 1px solid var(--border); display: flex; justify-content: space-around; align-items: center; z-index: 2000; }
        .nav-link { display: flex; flex-direction: column; align-items: center; color: var(--text-dim); border: none; background: none; flex: 1; font-size: 10px; font-weight: 600; }
        .nav-link.active { color: var(--accent); }
        .nav-link i { font-size: 24px; margin-bottom: 3px; }

        .route-detail { font-size: 11px; color: var(--text-dim); margin: 10px 0; padding: 8px; background: rgba(255,255,255,0.02); border-radius: 12px; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); z-index: 3000; padding: 20px; align-items: center; justify-content: center; }
        .modal-card { background: #0c0d11; border-radius: 32px; padding: 25px; width: 100%; max-width: 400px; border: 1px solid var(--border); }
    </style>
</head>
<body>

    <header id="app-header" class="top-header" style="display:none">
        <div style="font-weight:800; font-size:18px">TWINS <span style="color:var(--accent)">LOGÍSTICA</span></div>
        <div id="user-display" onclick="logout()" style="font-size:11px; font-weight:700; color:var(--accent); cursor:pointer">---</div>
    </header>

    <div id="page-login" class="page active">
        <h2 style="text-align:center; margin-top:10vh">Ingreso Almacén</h2>
        <div id="login-grid" style="display:grid; gap:10px; padding:10px"></div>
    </div>

    <div id="page-route" class="page">
        <div class="card" style="background: linear-gradient(135deg, #007aff, #0055ff); color:white; border:none">
            <div style="display:flex; justify-content:space-between; align-items:center">
                <div>
                    <span style="font-size:11px; font-weight:700; opacity:0.8">CAJAS ACTUALES</span>
                    <div id="total-cajas" style="font-size:42px; font-weight:800">0</div>
                </div>
                <button onclick="resetForm()" class="btn-ghost" style="border-radius:12px; height:35px; padding:0 12px; font-size:11px; background:rgba(255,255,255,0.15)">NUEVA CARGA</button>
            </div>
            <div id="total-puntos" style="font-size:12px; margin-top:8px; font-weight:600">0 PUNTOS EN COLA</div>
        </div>

        <div class="card">
            <input type="text" id="cli" placeholder="Destino / Cliente" style="margin-bottom:10px">
            <div style="display:flex; gap:10px">
                <input type="number" id="can" placeholder="Cant." style="flex:0.6">
                <button class="btn btn-main" onclick="addItem()" style="flex:1.4">AGREGAR PUNTO</button>
            </div>
        </div>

        <div id="send-zone" style="display:none">
            <div id="temp-list" class="card" style="border-style:dashed; background:transparent;"></div>
            <div class="card">
                <select id="pla" onchange="smartPredict()" style="margin-bottom:10px"></select>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:10px">
                    <select id="cho"></select>
                    <select id="aux"></select>
                </div>
                <button id="btn-save-label" class="btn" style="background:var(--success); color:black" onclick="document.getElementById('m-type').style.display='flex'">FINALIZAR DESPACHO</button>
            </div>
        </div>
    </div>

    <div id="page-history" class="page">
        <div class="stat-grid">
            <div class="stat-card"><span class="stat-lab">Cajas Hoy</span><span class="stat-val" id="st-cajas">0</span></div>
            <div class="stat-card"><span class="stat-lab">Puntos Hoy</span><span class="stat-val" id="st-envios">0</span></div>
            <div class="stat-card"><span class="stat-lab">Cajas Mes</span><span class="stat-val" id="st-mes-c">0</span></div>
            <div class="stat-card"><span class="stat-lab">Puntos Mes</span><span class="stat-val" id="st-mes-e">0</span></div>
        </div>
        <div style="display:flex; gap:8px; margin-bottom:15px">
            <input type="date" id="f-filter" onchange="renderHistory()" style="flex:1">
            <button class="btn-ghost" style="width:50px; border-radius:15px" onclick="genPDF()"><i class="ph ph-file-pdf" style="font-size:20px"></i></button>
        </div>
        <div id="history-container"></div>
    </div>

    <div id="page-stats" class="page">
        <div class="card"><span class="stat-lab">Cajas por Chofer</span><div style="height:220px"><canvas id="chartChofer"></canvas></div></div>
        <div class="card"><span class="stat-lab">Cajas por Auxiliar</span><div style="height:220px"><canvas id="chartAux"></canvas></div></div>
    </div>

    <div id="page-fleet" class="page">
        <h3 style="margin-bottom:15px">Vencimientos SOAT</h3>
        <div id="fleet-list"></div>
    </div>

    <div id="m-type" class="modal">
        <div class="modal-card">
            <h3 style="text-align:center; margin-bottom:20px">¿Cuándo sale esta ruta?</h3>
            <button class="btn btn-main" style="margin-bottom:10px" onclick="saveRoute('HOY')">HOY (23 FEB)</button>
            <button class="btn btn-ghost" onclick="saveRoute('MAÑANA')">MAÑANA (24 FEB)</button>
        </div>
    </div>

    <nav id="app-nav" class="nav-bar" style="display:none">
        <button class="nav-link active" id="n-route" onclick="nav('page-route')"><i class="ph ph-note-pencil"></i>Ruta</button>
        <button class="nav-link" id="n-history" onclick="nav('page-history')"><i class="ph ph-list-bullets"></i>Data</button>
        <button class="nav-link" id="n-stats" onclick="nav('page-stats')"><i class="ph ph-chart-bar"></i>Stats</button>
        <button class="nav-link" id="n-fleet" onclick="nav('page-fleet')"><i class="ph ph-truck"></i>Flota</button>
    </nav>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbxCRMbdOGYjf0R-w1v9tHG76jDhHXxuXOwHahYEV7Gj1lFn3y42C2s9DUO5nkgO75qy/exec";
        let user = "", items = [], database = [], editIndex = null, cChart = null, aChart = null;
        
        const PLACAS = ["CEP-929", "BPN-711", "BVN-704", "BUL-742", "BVN-930"];
        const CHOFERES = ["TAJHO", "LUIS H.", "ROMARIO", "CESAR C.", "WALDIR", "MARCELO"];
        const AUXILIARES = ["Cristopher", "Plácido", "Martin", "Percy", "Rodolfo", "Ricardo", "Elio", "Daniel C.", "Jofer", "Nelson", "Julio"];
        const SOATS = { "CEP-929": "2026-07-22", "BPN-711": "2026-06-10", "BVN-704": "2026-07-02", "BUL-742": "2026-04-02", "BVN-930": "2026-07-02" };

        window.onload = () => {
            initApp();
            const saved = localStorage.getItem('tw_user');
            if(saved) login(saved);
            loadData();
        };

        function initApp() {
            const grid = document.getElementById('login-grid');
            ['TAJHO ADMIN', 'FRANCESCO', 'OSCAR', 'LUIS HERBER'].forEach(u => {
                grid.innerHTML += `<button class="btn btn-ghost" onclick="login('${u}')">${u}</button>`;
            });
            document.getElementById('pla').innerHTML = '<option value="">Placa</option>' + PLACAS.map(p => `<option value="${p}">${p}</option>`).join('');
            document.getElementById('cho').innerHTML = '<option value="">Chofer</option>' + CHOFERES.map(c => `<option value="${c}">${c}</option>`).join('');
            document.getElementById('aux').innerHTML = '<option value="">Auxiliar</option>' + AUXILIARES.map(a => `<option value="${a}">${a}</option>`).join('');
        }

        async function loadData() {
            try {
                const r = await fetch(API);
                database = await r.json();
                localStorage.setItem('tw_db_cache', JSON.stringify(database));
                renderHistory(); renderFleet();
            } catch(e) {
                const cache = localStorage.getItem('tw_db_cache');
                if(cache) { database = JSON.parse(cache); renderHistory(); renderFleet(); }
            }
        }

        function renderHistory() {
            const cont = document.getElementById('history-container'), fD = document.getElementById('f-filter').value;
            let html = "", dCaj = 0, dEnv = 0, mCaj = 0, mEnv = 0;
            const selDate = new Date(fD + "T12:00:00");

            database.forEach((r, idx) => {
                const rD = new Date(r.fecha + "T12:00:00");
                const tot = parseFloat(r.total || 0);
                const pts = r.items ? r.items.split(", ").length : 0;
                
                if(rD.getMonth() === selDate.getMonth() && rD.getFullYear() === selDate.getFullYear()) { mCaj += tot; mEnv += pts; }
                
                if(r.fecha.split('T')[0] === fD) {
                    dCaj += tot; dEnv += pts;
                    html = `<div class="card" style="border-left:5px solid var(--accent)">
                        <div style="display:flex; justify-content:space-between; align-items:start">
                            <div><b>${r.placa}</b><br><small style="color:var(--text-dim)">${r.chofer} | ${r.auxiliar}</small></div>
                            <b style="color:var(--accent); font-size:18px">${tot} CJ</b>
                        </div>
                        <div class="route-detail"><b>RUTA:</b> ${r.items}</div>
                        <div style="display:flex; gap:8px">
                            <button class="btn-ghost" style="flex:1; padding:8px; font-size:12px; border-radius:10px" onclick="editRoute(${idx})">EDITAR RUTA</button>
                            <button class="btn" style="background:#25D366; width:45px; border-radius:10px" onclick="wa('${r.chofer}','${r.auxiliar}','${r.placa}','${r.total}','${r.items}')"><i class="ph-fill ph-whatsapp-logo"></i></button>
                        </div>
                    </div>` + html;
                }
            });
            cont.innerHTML = html || "<p style='text-align:center; opacity:0.3; margin-top:30px'>Sin movimientos este día</p>";
            document.getElementById('st-cajas').innerText = dCaj;
            document.getElementById('st-envios').innerText = dEnv;
            document.getElementById('st-mes-c').innerText = mCaj;
            document.getElementById('st-mes-e').innerText = mEnv;
        }

        function addItem() {
            const cl = document.getElementById('cli').value.toUpperCase(), ca = parseInt(document.getElementById('can').value);
            if(!cl || !ca) return;
            items.push({cl, ca});
            document.getElementById('cli').value = ""; document.getElementById('can').value = "";
            renderTemp();
        }

        function removePoint(idx) {
            items.splice(idx, 1);
            renderTemp();
        }

        function renderTemp() {
            const box = document.getElementById('temp-list'); let t = 0; box.innerHTML = "";
            items.forEach((i, idx) => { 
                t += i.ca; 
                box.innerHTML += `<div style="display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid var(--border)">
                    <span>${i.cl} (${i.ca})</span>
                    <button class="btn-del" onclick="removePoint(${idx})"><i class="ph ph-x"></i></button>
                </div>`; 
            });
            document.getElementById('total-cajas').innerText = t;
            document.getElementById('total-puntos').innerText = items.length + " PUNTOS CARGADOS";
            document.getElementById('send-zone').style.display = items.length ? 'block' : 'none';
        }

        function editRoute(idx) {
            const r = database[idx]; editIndex = idx;
            items = r.items.split(", ").map(i => { const p = i.split(": "); return { cl: p[0], ca: parseInt(p[1]) }; });
            document.getElementById('pla').value = r.placa;
            document.getElementById('cho').value = r.chofer;
            document.getElementById('aux').value = r.auxiliar;
            document.getElementById('btn-save-label').innerText = "ACTUALIZAR DESPACHO";
            renderTemp(); nav('page-route');
        }

        async function saveRoute(tipo) {
            if(!document.getElementById('aux').value) return alert("Selecciona un Auxiliar oficial");
            document.getElementById('m-type').style.display = 'none';
            let d = new Date(); if(tipo === 'MAÑANA') d.setDate(d.getDate() + 1);
            const reg = { 
                fecha: d.toLocaleDateString('en-CA'), 
                hora: new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true }),
                chofer: document.getElementById('cho').value, auxiliar: document.getElementById('aux').value, placa: document.getElementById('pla').value, 
                items: items.map(i => `${i.cl}: ${i.ca}`).join(", "), total: items.reduce((a,b)=>a+b.ca,0), operario: user 
            };
            if(editIndex !== null) { database[editIndex] = reg; editIndex = null; } else { database.unshift(reg); }
            localStorage.setItem('tw_db_cache', JSON.stringify(database));
            nav('page-history');
            fetch(API, { method: 'POST', mode: 'no-cors', body: JSON.stringify(reg) });
            resetForm();
        }

        function resetForm() { items = []; editIndex = null; document.getElementById('btn-save-label').innerText = "FINALIZAR DESPACHO"; renderTemp(); }

        function renderFleet() {
            const list = document.getElementById('fleet-list'), hoy = new Date(); list.innerHTML = "";
            PLACAS.forEach(p => {
                const v = new Date(SOATS[p]), dR = Math.ceil((v - hoy) / 86400000);
                list.innerHTML += `<div class="card">
                    <div style="display:flex; justify-content:space-between"><b>${p}</b> <small>SOAT: ${SOATS[p]}</small></div>
                    <div style="font-size:16px; font-weight:800; color:${dR<30?'#ff453a':'#2ed158'}; margin-top:5px">${dR} días restantes</div>
                </div>`;
            });
        }

        function updateCharts() {
            const dataC = {}, dataA = {}, now = new Date();
            database.forEach(r => { if(new Date(r.fecha + "T12:00:00").getMonth() === now.getMonth()) {
                dataC[r.chofer] = (dataC[r.chofer] || 0) + parseFloat(r.total);
                dataA[r.auxiliar] = (dataA[r.auxiliar] || 0) + parseFloat(r.total);
            }});
            const cfg = (l, v, c) => ({ type: 'bar', data: { labels: Object.keys(l), datasets: [{ data: Object.values(l), backgroundColor: c }] }, options: { indexAxis: 'y', maintainAspectRatio: false, plugins: { legend: false } } });
            if(cChart) cChart.destroy(); cChart = new Chart(document.getElementById('chartChofer'), cfg(dataC, 0, '#007aff'));
            if(aChart) aChart.destroy(); aChart = new Chart(document.getElementById('chartAux'), cfg(dataA, 0, '#2ed158'));
        }

        function nav(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('n-' + id.split('-')[1]).classList.add('active');
            if(id === 'page-history') { document.getElementById('f-filter').value = new Date().toLocaleDateString('en-CA'); renderHistory(); }
            if(id === 'page-stats') setTimeout(updateCharts, 100);
            if(id === 'page-fleet') renderFleet();
        }

        function login(u) { user = u; localStorage.setItem('tw_user', u); document.getElementById('page-login').classList.remove('active'); document.getElementById('app-header').style.display = 'flex'; document.getElementById('app-nav').style.display = 'flex'; document.getElementById('user-display').innerText = u; nav('page-route'); }
        function logout() { localStorage.removeItem('tw_user'); location.reload(); }
        function smartPredict() { const last = database.find(r => r.placa === document.getElementById('pla').value); if(last) { document.getElementById('cho').value = last.chofer; document.getElementById('aux').value = last.auxiliar; } }
        function wa(c, a, p, t, i) { window.location.href = `https://wa.me/?text=*📦 TWINS LOGÍSTICA*%0A*Placa:* ${p}%0A*Cajas:* ${t}%0A*Ruta:* ${i}`; }
        function genPDF() {
            const { jsPDF } = window.jspdf; const doc = new jsPDF();
            const fD = document.getElementById('f-filter').value;
            doc.text("DESPACHOS TWINS - " + fD, 14, 20);
            const body = database.filter(r => r.fecha.split('T')[0] === fD).map(r => [r.placa, r.chofer, r.total, r.items]);
            doc.autoTable({ head: [['Placa', 'Chofer', 'Cant', 'Ruta']], body: body, startY: 25 });
            doc.save(`Twins_${fD}.pdf`);
        }
    </script>
</body>
</html>
