<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TWINS LOGISTICS ELITE V16.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #02040a; --card: #0f172a; --accent: #00d4ff; 
            --text: #f8fafc; --text-dim: #94a3b8;
            --success: #10b981; --danger: #ef4444; --warning: #f59e0b;
            --border: rgba(255,255,255,0.08);
            --grad: linear-gradient(135deg, #00d4ff 0%, #4f46e5 100%);
            --glass: rgba(30, 41, 59, 0.7);
        }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; outline: none; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; line-height: 1.5; }
        
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .page { display: none; padding: 20px; padding-bottom: 100px; max-width: 500px; margin: 0 auto; animation: slideUp 0.4s ease-out; }
        .active { display: block; }

        .top-header { position: sticky; top: 0; z-index: 100; background: rgba(2, 4, 10, 0.8); backdrop-filter: blur(20px); padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .user-tag { background: rgba(0, 212, 255, 0.1); padding: 6px 12px; border-radius: 100px; border: 1px solid rgba(0, 212, 255, 0.2); display: flex; align-items: center; gap: 8px; }
        .dot { width: 8px; height: 8px; background: var(--success); border-radius: 50%; box-shadow: 0 0 10px var(--success); }

        .card { background: var(--card); border-radius: 24px; border: 1px solid var(--border); padding: 20px; margin-bottom: 16px; position: relative; }
        .stat-box { background: var(--glass); padding: 20px; border-radius: 24px; border: 1px solid var(--border); text-align: left; position: relative; overflow: hidden; }
        .stat-val { font-size: 24px; font-weight: 800; color: var(--text); display: block; }
        .stat-label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; font-weight: 700; }

        input, select { width: 100%; padding: 16px; margin: 8px 0; border-radius: 16px; border: 1px solid var(--border); background: #1e293b; color: var(--text); font-size: 15px; }
        .btn { width: 100%; padding: 18px; border-radius: 18px; border: none; font-size: 14px; font-weight: 800; cursor: pointer; transition: 0.3s; display: flex; justify-content: center; align-items: center; gap: 10px; }
        .btn-main { background: var(--grad); color: white; }
        
        .badge { padding: 4px 10px; border-radius: 8px; font-size: 10px; font-weight: 800; text-transform: uppercase; }
        .badge-success { background: rgba(16, 185, 129, 0.1); color: var(--success); }
        .badge-busy { background: rgba(239, 68, 68, 0.1); color: var(--danger); }
        
        .item-row { display: flex; justify-content: space-between; align-items: center; padding: 14px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }

        .bottom-nav { position: fixed; bottom: 20px; left: 20px; right: 20px; height: 70px; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px); border-radius: 25px; border: 1px solid var(--border); display: flex; justify-content: space-around; align-items: center; z-index: 1000; }
        .nav-item { background: none; border: none; color: var(--text-dim); font-size: 10px; font-weight: 700; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .nav-item.active-nav { color: var(--accent); }

        #modal-ask, #modal-detail, #modal-pass { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); z-index: 2000; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
        .modal-sheet { background: var(--card); border-radius: 32px; padding: 30px; width: 100%; max-width: 350px; }
        
        .h-actions { display: flex; gap: 8px; margin-top: 15px; border-top: 1px solid var(--border); padding-top: 12px; }
        .btn-mini { padding: 10px; border-radius: 12px; font-size: 11px; flex: 1; border: 1px solid var(--border); background: rgba(255,255,255,0.03); color: white; font-weight: 700; cursor: pointer; }
    </style>
</head>
<body>

    <div id="modal-pass" onclick="this.style.display='none'">
        <div class="modal-sheet" onclick="event.stopPropagation()" style="text-align: center;">
            <h3 style="margin-bottom: 20px;">ACCESO ADMIN</h3>
            <input type="password" id="pass-input" placeholder="CÓDIGO" style="text-align: center; font-size: 20px;">
            <button class="btn btn-main" onclick="checkPass()">INGRESAR</button>
        </div>
    </div>

    <div id="modal-detail" onclick="this.style.display='none'">
        <div class="modal-sheet" onclick="event.stopPropagation()" style="max-width: 400px;">
            <h3 id="det-titulo" style="margin:0;">Detalle de Carga</h3>
            <p id="det-sub" style="color:var(--text-dim); font-size:12px; margin-bottom:20px;"></p>
            <div id="det-lista" style="max-height: 300px; overflow-y: auto;"></div>
            <button class="btn" style="background:var(--glass); color:white; margin-top: 20px;" onclick="document.getElementById('modal-detail').style.display='none'">Cerrar</button>
        </div>
    </div>

    <div id="modal-ask" onclick="this.style.display='none'">
        <div class="modal-sheet" onclick="event.stopPropagation()">
            <h3 style="margin: 0 0 10px 0;">Programar Ruta</h3>
            <p style="color: var(--text-dim); font-size: 14px; margin-bottom: 25px;">Selecciona la fecha de salida:</p>
            <button class="btn btn-main" style="margin-bottom: 12px;" onclick="confirmarGuardado(true)">📦 Salida HOY</button>
            <button class="btn" style="background: var(--glass); color: white;" onclick="confirmarGuardado(false)">📅 Salida MAÑANA</button>
        </div>
    </div>

    <div id="header-app" class="top-header" style="display:none;">
        <div class="user-tag"><div class="dot"></div><span id="user-display">---</span></div>
        <button onclick="cerrarSesion()" style="background:none; border:none; color: var(--danger); font-weight: 700;">Salir</button>
    </div>

    <div id="p1" class="page active" style="text-align: center; padding-top: 15vh;">
        <div style="background: var(--grad); width: 80px; height: 80px; border-radius: 22px; margin: 0 auto 24px; display: flex; align-items: center; justify-content: center; font-size: 32px;">📦</div>
        <h1 style="font-size: 32px; font-weight: 900; margin-bottom: 40px;">TWINS <span style="color:var(--accent)">ELITE</span></h1>
        <div style="display: grid; gap: 12px;">
            <button class="btn" style="background:var(--card); color:white; border:1px solid var(--border);" onclick="document.getElementById('modal-pass').style.display='flex'">🔑 Tajho Admin</button>
            <button class="btn" style="background:var(--card); color:white; border:1px solid var(--border);" onclick="login('FRANCESCO')">Francesco</button>
            <button class="btn" style="background:var(--card); color:white; border:1px solid var(--border);" onclick="login('OSCAR')">Oscar</button>
            <button class="btn" style="background:var(--card); color:white; border:1px solid var(--border);" onclick="login('LUIS HERBER')">Luis Herber</button>
        </div>
    </div>

    <div id="p2" class="page">
        <div class="stat-box" style="background: var(--grad); border: none; margin-bottom: 24px;">
            <span class="stat-label" style="color: rgba(255,255,255,0.7);">Cajas en Carga</span>
            <span id="total-vivo" style="font-size: 48px; font-weight: 900;">0</span>
        </div>
        <div class="card">
            <div style="display: flex; gap: 10px;">
                <input type="text" id="cli" placeholder="Cliente" style="flex:2;">
                <input type="number" id="can" placeholder="Cant" style="flex:1;">
            </div>
            <button class="btn btn-main" onclick="addItem()">Añadir Item</button>
        </div>
        <div id="area-envio" style="display:none;">
            <div class="card" id="lista-items"></div>
            <div class="card">
                <select id="pla"><option value="">Placa</option><option value="CEP-929">CEP-929</option><option value="BPN-711">BPN-711</option><option value="BVN-704">BVN-704</option><option value="BUL-742">BUL-742</option><option value="BVN-930">BVN-930</option></select>
                <select id="cho"><option value="">Chofer</option><option value="LUIS H.">Luis H.</option><option value="ROMARIO">Romario</option><option value="CESAR C.">Cesar C.</option><option value="WALDIR">Waldir</option><option value="MARCELO">Marcelo</option></select>
                <select id="aux"><option value="">Auxiliar</option><option value="CRISTOPHER">Cristopher</option><option value="PLACIDO">Placido</option><option value="RODOLFO">Rodolfo</option></select>
                <button class="btn btn-main" style="background: var(--success); margin-top: 10px;" onclick="abrirModalGuardar()">Finalizar y Guardar</button>
            </div>
        </div>
    </div>

    <div id="p3" class="page">
        <div class="stat-grid" style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:20px;">
            <div class="stat-box"><span class="stat-label">Total Mes</span><span id="stat-mes" class="stat-val">0</span></div>
            <div class="stat-box"><span class="stat-label">Cajas Día</span><span id="stat-dia" class="stat-val" style="color:var(--success);">0</span></div>
        </div>
        <div class="card" style="padding:10px; display:flex; gap:10px;">
            <select id="f-mes" onchange="renderH()" style="margin:0; flex:1;"><option value="ALL">Mes...</option><option value="0">Ene</option><option value="1">Feb</option><option value="2">Mar</option></select>
            <input type="date" id="f-dia" onchange="updateHistoryDate()" style="margin:0; flex:1.5;">
        </div>
        <div id="h-list"></div>
    </div>

    <div id="p4" class="page">
        <h3 style="font-weight: 800; margin-bottom: 20px;">Unidades en Servicio</h3>
        <div id="lista-flota"></div>
    </div>

    <nav id="nav-app" class="bottom-nav" style="display:none;">
        <button class="nav-item" onclick="nav('p2')">Ruta</button>
        <button class="nav-item" onclick="nav('p3')">Historial</button>
        <button class="nav-item" onclick="nav('p4')">Flota</button>
    </nav>

    <script>
        const URL = "https://script.google.com/macros/s/AKfycbz9V0MzUuuAHTa9N4-xrsVJV7DbkWLtgJY5xHM7_JTfIDlBxCtimM6FHjRpVczuD2kM/exec";
        let user = "", ruta = [], db = [];

        window.onload = () => {
            const lastUser = localStorage.getItem('tw_u');
            if(lastUser) login(lastUser);
            
            // Recuperar fecha guardada o poner hoy
            const savedDate = localStorage.getItem('tw_last_date');
            document.getElementById('f-dia').value = savedDate || new Date().toISOString().split('T')[0];
            document.getElementById('f-mes').value = new Date().getMonth().toString();
            
            load();
        };

        function login(n) { 
            user = n; localStorage.setItem('tw_u', n);
            document.getElementById('p1').style.display='none'; 
            document.getElementById('header-app').style.display='flex'; 
            document.getElementById('nav-app').style.display='flex'; 
            document.getElementById('user-display').innerText = n; 
            nav('p2'); 
        }

        function checkPass() {
            if(document.getElementById('pass-input').value === "2026") {
                document.getElementById('modal-pass').style.display='none';
                login('TAJHO');
            } else alert("Código Incorrecto");
        }

        function nav(id) { 
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); 
            document.getElementById(id).classList.add('active'); 
            if(id === 'p3') renderH();
            if(id === 'p4') renderFlota();
        }

        async function load() { 
            // Carga rápida desde caché local si existe
            const cache = localStorage.getItem('tw_db_cache');
            if(cache) { db = JSON.parse(cache); renderH(); renderFlota(); }

            try { 
                const r = await fetch(URL); 
                db = await r.json(); 
                localStorage.setItem('tw_db_cache', JSON.stringify(db)); // Actualizar caché
                renderH(); renderFlota(); 
            } catch(e){} 
        }

        function addItem() {
            const cl = document.getElementById('cli').value.toUpperCase(), ca = parseInt(document.getElementById('can').value);
            if(!cl || !ca) return; ruta.unshift({cl, ca}); 
            document.getElementById('cli').value = ""; document.getElementById('can').value = ""; 
            renderR(); 
        }

        function renderR() {
            const l = document.getElementById('lista-items'); let s = 0; l.innerHTML = "";
            ruta.forEach((i, x) => { s += i.ca; l.innerHTML += `<div class="item-row"><span>${i.cl}</span><b>${i.ca} CJ <span onclick="removeItem(${x})" style="color:var(--danger); margin-left:10px; cursor:pointer;">✕</span></b></div>`; });
            document.getElementById('total-vivo').innerText = s; 
            document.getElementById('area-envio').style.display = ruta.length > 0 ? 'block' : 'none';
        }

        function removeItem(x) { ruta.splice(x,1); renderR(); }

        function abrirModalGuardar() { 
            if(!document.getElementById('cho').value || !document.getElementById('pla').value) return alert("Completa Chofer y Placa");
            document.getElementById('modal-ask').style.display = 'flex'; 
        }

        async function confirmarGuardado(esHoy) {
            document.getElementById('modal-ask').style.display = 'none';
            let d = new Date();
            if(!esHoy) {
                d.setDate(d.getDate() + 1);
                if(d.getDay() === 0) d.setDate(d.getDate() + 1); // Salta domingo
            }
            let fFinal = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');

            const r = { 
                fecha: fFinal, chofer: document.getElementById('cho').value, 
                auxiliar: document.getElementById('aux').value, placa: document.getElementById('pla').value, 
                operario: user, items: ruta.map(i => `${i.cl}:${i.ca}`).join(", "), 
                total: ruta.reduce((a,b) => a+b.ca, 0)
            };

            db.push(r);
            updateHistoryDate(fFinal); // Cambiar historial a la fecha del registro
            nav('p3');

            fetch(URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(r) });
            ruta = []; renderR();
            // Recarga silenciosa en 2 segundos
            setTimeout(load, 2000);
        }

        function updateHistoryDate(val) {
            const finalDate = val || document.getElementById('f-dia').value;
            document.getElementById('f-dia').value = finalDate;
            localStorage.setItem('tw_last_date', finalDate); // Guardar fecha para que no se pierda
            renderH();
        }

        function renderH() {
            const list = document.getElementById('h-list');
            const fD = document.getElementById('f-dia').value;
            let cMes = 0, cDia = 0, html = "";

            db.slice().reverse().forEach((r) => {
                let rF = r.fecha.split("T")[0];
                cMes += parseFloat(r.total);
                if(fD === rF) {
                    cDia += parseFloat(r.total);
                    html += `
                    <div class="card">
                        <div style="display:flex; justify-content:space-between;">
                            <span class="badge badge-success">${r.placa}</span>
                            <b style="color:var(--accent)">${r.total} CJ</b>
                        </div>
                        <div style="font-weight:700; margin-top:5px;">${r.chofer}</div>
                        <div class="h-actions">
                            <button class="btn-mini" onclick="verDetalle('${r.items}', '${r.chofer}')">Lista</button>
                            <button class="btn-mini" onclick="sendWA('${r.fecha}', '${r.chofer}', '${r.total}', '${r.items}')">WhatsApp</button>
                        </div>
                    </div>`;
                }
            });
            list.innerHTML = html || "<p style='text-align:center; color:gray; padding:20px;'>No hay rutas programadas para este día.</p>";
            document.getElementById('stat-dia').innerText = Math.round(cDia);
            document.getElementById('stat-mes').innerText = Math.round(cMes);
        }

        function verDetalle(items, chofer) {
            document.getElementById('det-sub').innerText = "Responsable: " + chofer;
            const lista = document.getElementById('det-lista');
            lista.innerHTML = "";
            items.split(", ").forEach(i => {
                const [cl, ca] = i.split(":");
                lista.innerHTML += `<div class="item-row"><span>${cl}</span><b>${ca} CJ</b></div>`;
            });
            document.getElementById('modal-detail').style.display = 'flex';
        }

        function sendWA(f, c, t, i) {
            let m = `*📦 DESPACHO TWINS*\n*Fecha:* ${f.split('T')[0]}\n*Chofer:* ${c}\n*Total:* ${t} CJ\n\n*CLIENTES:*\n${i.replace(/:/g, ': ').replace(/,/g, '\n')}`;
            window.location.href = `https://wa.me/?text=${encodeURIComponent(m)}`;
        }

        function renderFlota() {
            const list = document.getElementById('lista-flota');
            const placas = ["CEP-929", "BPN-711", "BVN-704", "BUL-742", "BVN-930"];
            let hoy = document.getElementById('f-dia').value;
            list.innerHTML = "";
            placas.forEach(p => {
                let rH = db.find(r => r.placa === p && r.fecha.split('T')[0] === hoy);
                list.innerHTML += `<div class="card" style="border-left:5px solid ${rH ? 'var(--danger)':'var(--success)'}; display:flex; justify-content:space-between; align-items:center;">
                    <div><b>${p}</b><br><small style="color:var(--text-dim)">${rH ? 'OCUPADO' : 'DISPONIBLE'}</small></div>
                    ${rH ? `<div style="text-align:right"><small>${rH.chofer}</small></div>` : ''}
                </div>`;
            });
        }

        function cerrarSesion() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
