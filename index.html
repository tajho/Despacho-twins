<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TWINS ELITE - V65.0 Security</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root {
            --bg: #f4f6f8; --surface: #ffffff; --accent: #000000; 
            --text: #111827; --text-dim: #6b7280; --border: #e5e7eb; 
            --gold: #FFD700; --silver: #C0C0C0; --bronze: #CD7F32; --green: #10b981; --red: #ef4444;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { margin: 0; background: var(--bg); color: var(--text); padding-bottom: 100px; }

        /* --- PANTALLA DE LOGIN --- */
        #login-screen { position: fixed; inset: 0; background: #000; z-index: 5000; display: flex; align-items: center; justify-content: center; padding: 30px; }
        .login-card { background: #fff; width: 100%; max-width: 400px; padding: 40px 25px; border-radius: 35px; text-align: center; }
        
        .page { display: none; padding: 20px; max-width: 600px; margin: 0 auto; animation: fade 0.2s ease; }
        .active { display: block; }
        @keyframes fade { from { opacity: 0; } to { opacity: 1; } }

        /* --- ESTADÍSTICAS --- */
        .core-dash { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .master-card { background: #fff; padding: 18px; border-radius: 24px; border: 1px solid var(--border); display: flex; flex-direction: column; justify-content: space-between; height: 120px; }
        .master-card.black { background: #000; color: #fff; border: none; }
        .stat-label { font-size: 10px; font-weight: 800; text-transform: uppercase; opacity: 0.6; margin-bottom: 5px; display: block; }
        .stat-main { font-size: 28px; font-weight: 900; line-height: 1; display: block; }
        .stat-sub { font-size: 11px; font-weight: 800; margin-top: 10px; padding-top: 8px; border-top: 1px solid rgba(150,150,150,0.2); display: block; }

        /* --- DATA --- */
        .rank-box { background: #fff; border-radius: 24px; padding: 20px; border: 1px solid var(--border); margin-bottom: 20px; }
        .rank-header { display: flex; align-items: center; gap: 8px; margin-bottom: 15px; font-weight: 800; font-size: 13px; text-transform: uppercase; color: var(--text-dim); }
        .rank-item { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
        .rank-pos { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 12px; background: #eee; color: #aaa; flex-shrink: 0; }
        .pos-1 { background: var(--gold); color: #000; }
        .pos-2 { background: var(--silver); color: #000; }
        .pos-3 { background: var(--bronze); color: #000; }
        
        .search-box { position: relative; margin-bottom: 20px; }
        .search-box input { width: 100%; padding: 16px 20px 16px 50px; background: #fff; border: 1px solid var(--border); border-radius: 18px; font-weight: 700; outline: none; }
        .search-box i { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); font-size: 20px; color: var(--text-dim); }
        .route-card { background: #fff; border-radius: 24px; padding: 20px; margin-bottom: 15px; border: 1px solid var(--border); }
        
        .nav-bottom { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; height: 85px; display: none; border-top: 1px solid var(--border); z-index: 1000; }
        .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #9ca3af; background: none; border: none; font-size: 10px; font-weight: 800; }
        .nav-btn.active { color: #000; }
        .field { background: #fff; border: 1px solid var(--border); border-radius: 16px; padding: 16px; width: 100%; font-size: 15px; font-weight: 700; outline: none; margin-bottom: 12px; }
        
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); display: none; align-items: flex-end; z-index: 2000; }
        .modal-content { background: #fff; width: 100%; border-radius: 35px 35px 0 0; padding: 30px 20px; max-height: 85vh; overflow-y: auto; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-card">
            <i class="ph-bold ph-lock-key" style="font-size: 48px; margin-bottom: 15px; display: block;"></i>
            <h2 style="font-weight: 900; margin-bottom: 5px;">Acceso Privado</h2>
            <p style="color: var(--text-dim); font-size: 13px; margin-bottom: 25px;">Twins Elite Logistics</p>
            
            <select id="user-select" class="field" onchange="togglePassField()">
                <option value="">Selecciona tu usuario</option>
                <option value="TAJHO">TAJHO (Admin)</option>
                <option value="FRANCHESCO">FRANCHESCO</option>
                <option value="OSCAR">OSCAR</option>
                <option value="LUIS HERBER">LUIS HERBER</option>
            </select>
            
            <input type="password" id="pass-field" class="field" placeholder="Contraseña Admin" style="display: none;">
            
            <button onclick="attemptLogin()" style="width: 100%; padding: 20px; background: #000; color: #fff; border: none; border-radius: 20px; font-weight: 800; margin-top: 10px;">ENTRAR</button>
            <p id="login-err" style="color: red; font-size: 11px; font-weight: 700; margin-top: 15px; display: none;">Acceso Denegado</p>
        </div>
    </div>

    <div id="page-units" class="page">
        <h1 style="font-weight:900; margin-bottom:20px;">Despacho</h1>
        <div id="units-grid" style="display:grid; grid-template-columns:1fr 1fr; gap:15px;"></div>
    </div>

    <div id="page-dash" class="page active">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h1 style="font-weight:900; margin: 0;">Twins Elite</h1>
            <span id="user-tag" style="font-size: 10px; font-weight: 800; background: #eee; padding: 5px 12px; border-radius: 20px;">---</span>
        </div>
        <div class="core-dash">
            <div class="master-card black">
                <div><span class="stat-label">Control Hoy</span><span id="stat-hoy-cajas" class="stat-main">0</span></div>
                <span id="stat-hoy-envios" class="stat-sub">0 CLIENTES</span>
            </div>
            <div class="master-card">
                <div><span class="stat-label">Resumen Mes</span><span id="stat-mes-cajas" class="stat-main">0</span></div>
                <span id="stat-mes-envios" class="stat-sub">0 CLIENTES</span>
            </div>
        </div>
        <div class="search-box">
            <i class="ph-bold ph-magnifying-glass"></i>
            <input type="text" id="smart-search" placeholder="Buscar cliente, chofer o placa..." onkeyup="renderHistory()">
        </div>
        <div id="hist-cont"></div>
    </div>

    <div id="page-data" class="page">
        <h1 style="font-weight:900; margin-bottom:20px;">Rendimiento Global</h1>
        <input type="month" id="f-month" class="field" onchange="renderData()">
        <div class="rank-box"><div class="rank-header"><i class="ph-bold ph-steering-wheel"></i> Top Choferes</div><div id="rank-choferes-list"></div></div>
        <div class="rank-box"><div class="rank-header"><i class="ph-bold ph-users-three"></i> Top Auxiliares</div><div id="rank-auxiliares-list"></div></div>
    </div>

    <div id="page-load" class="page">
        <div style="background:#000; color:#fff; padding:25px; border-radius:28px; margin-bottom:20px;">
            <h2 id="load-placa-txt" style="margin:0; font-size:32px; font-weight:900;">---</h2>
            <div style="display:flex; justify-content:space-between; margin-top:10px;"><b id="load-total">0</b> <small>CJS TOTALES</small></div>
        </div>
        <input type="text" id="i-cli" placeholder="Cliente" class="field">
        <input type="number" id="i-can" placeholder="Cjs" class="field">
        <button onclick="addItem()" style="width:100%; padding:20px; background:#000; color:#fff; border-radius:20px; font-weight:800; border:none;">AGREGAR</button>
        <div id="load-list" style="margin-top:20px;"></div>
        <button id="btn-save" onclick="save()" style="display:none; width:100%; padding:22px; background:var(--green); color:#fff; border-radius:22px; font-weight:900; border:none; margin-top:20px;">GUARDAR RUTA</button>
    </div>

    <div id="page-config" class="page">
        <div style="background:#000; color:#fff; padding:30px; border-radius:30px; margin-bottom:25px; text-align:center;"><h2 id="conf-placa" style="margin:0; font-size:36px;">---</h2></div>
        <input type="date" id="c-fecha" class="field">
        <select id="c-chofer" class="field"></select>
        <select id="c-aux" class="field"></select>
        <button onclick="goLoad()" style="width:100%; padding:20px; background:#000; color:#fff; border-radius:20px; font-weight:800; border:none;">INICIAR CARGA</button>
    </div>

    <div id="modal-list" class="modal"><div class="modal-content"><div id="m-items"></div><button onclick="closeM()" style="width:100%; margin-top:20px; padding:20px; border-radius:20px; background:#eee; border:none; font-weight:800;">CERRAR</button></div></div>

    <nav class="nav-bottom" id="main-nav">
        <button class="nav-btn" id="n-units" onclick="go('page-units')"><i class="ph-bold ph-plus-circle"></i>NUEVA</button>
        <button class="nav-btn active" id="n-dash" onclick="go('page-dash')"><i class="ph-bold ph-clock-counter-clockwise"></i>HISTORIAL</button>
        <button class="nav-btn" id="n-data" onclick="go('page-data')" style="display: none;"><i class="ph-bold ph-database"></i>DATA</button>
    </nav>

    <script>
        const CLOUD_URL = "ESCRIBE_AQUI_TU_URL_DE_GOOGLE_APPS_SCRIPT";
        let db = JSON.parse(localStorage.getItem('twins_v63_db')) || [];
        let cur = { items: [] };
        let currentUser = JSON.parse(localStorage.getItem('twins_user')) || null;

        const FLOTA = { "CEP-929": "ROMARIO", "BPN-711": "CESAR C.", "BVN-704": "LUIS H.", "BUL-742": "WALDIR", "BVN-930": "MARCELO" };
        const CONDUCTORES = ["TAJHO", "ROMARIO", "CESAR C.", "LUIS H.", "WALDIR", "MARCELO"];
        const AUXILIARES = ["CRISTOPHER", "PERCY", "PLACIDO", "RODOLFO", "RICARDO", "ELIO", "JOFER", "MARTIN", "NELSON"];

        window.onload = () => {
            if(currentUser) {
                applyPermissions();
            }
            initApp();
        };

        function togglePassField() {
            const user = document.getElementById('user-select').value;
            document.getElementById('pass-field').style.display = (user === 'TAJHO') ? 'block' : 'none';
        }

        function attemptLogin() {
            const user = document.getElementById('user-select').value;
            const pass = document.getElementById('pass-field').value;
            const err = document.getElementById('login-err');

            if(!user) return;

            if(user === 'TAJHO') {
                if(pass === '1994') {
                    loginSuccess(user, true);
                } else {
                    err.style.display = 'block';
                }
            } else {
                loginSuccess(user, false);
            }
        }

        function loginSuccess(name, isAdmin) {
            currentUser = { name, isAdmin };
            localStorage.setItem('twins_user', JSON.stringify(currentUser));
            applyPermissions();
        }

        function applyPermissions() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-nav').style.display = 'flex';
            document.getElementById('user-tag').innerText = currentUser.name + (currentUser.isAdmin ? ' (ADMIN)' : '');
            
            // Solo Tajho ve DATA
            if(currentUser.isAdmin) {
                document.getElementById('n-data').style.display = 'flex';
            }
            pullCloudData();
        }

        function initApp() {
            const ug = document.getElementById('units-grid');
            ug.innerHTML = "";
            for(let p in FLOTA) ug.innerHTML += `<div style="background:#fff; padding:25px; border-radius:24px; text-align:center; border:1px solid var(--border);" onclick="initConf('${p}')"><i class="ph-bold ph-truck" style="font-size:28px;"></i><br><b>${p}</b></div>`;
            const sc = document.getElementById('c-chofer'), sa = document.getElementById('c-aux');
            sc.innerHTML = ""; sa.innerHTML = "";
            CONDUCTORES.forEach(c => sc.innerHTML += `<option value="${c}">${c}</option>`);
            AUXILIARES.forEach(a => sa.innerHTML += `<option value="${a}">${a}</option>`);
            document.getElementById('f-month').value = new Date().toISOString().substring(0,7);
            renderStats(); renderHistory();
        }

        // --- FUNCIONES CORE (Sincronización e Interfaz) ---
        async function syncCloud(data) { if(!CLOUD_URL.includes("ESCRIBE")) try { await fetch(CLOUD_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) }); } catch(e){} }
        async function pullCloudData() { if(!CLOUD_URL.includes("ESCRIBE")) try { const res = await fetch(CLOUD_URL); const cloudDb = await res.json(); if(cloudDb) { db = cloudDb; localStorage.setItem('twins_v63_db', JSON.stringify(db)); renderStats(); renderHistory(); } } catch(e){} }

        function go(id) {
            if(id === 'page-data' && !currentUser.isAdmin) return; // Doble validación
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(n => n.classList.remove('active'));
            document.getElementById('n-'+id.split('-')[1]).classList.add('active');
            if(id === 'page-data') renderData();
        }

        function renderStats() {
            const hoy = new Date().toISOString().split('T')[0];
            const mes = hoy.substring(0,7);
            const rHoy = db.filter(r => r.fecha.includes(hoy));
            const rMes = db.filter(r => r.fecha.startsWith(mes));
            const sumC = (a) => a.reduce((x,y) => x + y.items.reduce((z,w)=>z+w.can,0), 0);
            const sumL = (a) => a.reduce((x,y) => x + y.items.length, 0);
            document.getElementById('stat-hoy-cajas').innerText = sumC(rHoy);
            document.getElementById('stat-hoy-envios').innerText = sumL(rHoy) + " CLIENTES";
            document.getElementById('stat-mes-cajas').innerText = sumC(rMes);
            document.getElementById('stat-mes-envios').innerText = sumL(rMes) + " CLIENTES";
        }

        function save() {
            const idx = db.findIndex(r => r.id === cur.id);
            if(idx > -1) db[idx] = cur; else db.unshift(cur);
            localStorage.setItem('twins_v63_db', JSON.stringify(db));
            syncCloud(cur);
            go('page-dash'); renderStats(); renderHistory();
        }

        function renderHistory() {
            const q = document.getElementById('smart-search').value.toLowerCase();
            let filt = db.filter(r => r.chofer.toLowerCase().includes(q) || r.placa.toLowerCase().includes(q) || r.fecha.includes(q));
            document.getElementById('hist-cont').innerHTML = filt.map(r => `
                <div class="route-card">
                    <div style="display:flex; justify-content:space-between; font-size:10px; font-weight:800; color:var(--text-dim);"><span>📅 ${r.fecha.split('T')[0]}</span><span>${r.placa}</span></div>
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-top:5px;"><b style="font-size:24px;">${r.items.reduce((a,b)=>a+b.can,0)} CJS</b><b>${r.items.length} CLI.</b></div>
                    <div style="font-size:11px; margin-top:10px; background:#f9fafb; padding:10px; border-radius:10px;">👤 ${r.chofer} | 👥 ${r.auxiliar}</div>
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:15px;">
                        <button onclick="viewL('${r.id}')" style="padding:12px; border-radius:12px; border:1px solid #eee; background:#fff; font-weight:800; font-size:10px;">LISTA</button>
                        <button onclick="shareW('${r.id}')" style="padding:12px; border-radius:12px; border:1px solid #eee; background:#fff; font-weight:800; font-size:10px;">REPORTE</button>
                    </div>
                </div>`).join('');
        }

        // --- LÓGICA DE CARGA MANTENIDA ---
        function initConf(p) { cur = { id: 'R'+Date.now(), placa: p, items: [], fecha: new Date().toISOString().split('T')[0], chofer: FLOTA[p], auxiliar: AUXILIARES[0] }; document.getElementById('conf-placa').innerText = p; document.getElementById('c-fecha').value = cur.fecha; go('page-config'); }
        function goLoad() { cur.fecha = document.getElementById('c-fecha').value; cur.chofer = document.getElementById('c-chofer').value; cur.auxiliar = document.getElementById('c-aux').value; document.getElementById('load-placa-txt').innerText = cur.placa; refreshLoad(); go('page-load'); }
        function addItem() { const cli = document.getElementById('i-cli').value.toUpperCase(); const can = parseInt(document.getElementById('i-can').value); if(cli && can) { cur.items.push({cli, can}); document.getElementById('i-cli').value=""; document.getElementById('i-can').value=""; refreshLoad(); } }
        function refreshLoad() { const total = cur.items.reduce((a,b)=>a+b.can, 0); document.getElementById('load-total').innerText = total; document.getElementById('btn-save').style.display = total > 0 ? 'block' : 'none'; document.getElementById('load-list').innerHTML = cur.items.map((it, i) => `<div style="display:flex; justify-content:space-between; padding:15px; background:#fff; border-radius:15px; margin-bottom:10px; border:1px solid #eee;"><span>${it.cli}</span><b>${it.can}</b></div>`).reverse().join(''); }
        function viewL(id) { const r = db.find(x => x.id === id); document.getElementById('m-items').innerHTML = r.items.map(i => `<div style="display:flex; justify-content:space-between; padding:15px; border-bottom:1px solid #eee;"><span>${i.cli}</span><b>${i.can} CJS</b></div>`).join(''); document.getElementById('modal-list').style.display = 'flex'; }
        function closeM() { document.getElementById('modal-list').style.display = 'none'; }
        function shareW(id) { const r = db.find(x => x.id === id); let t = `*TWINS ELITE*%0A🚛 ${r.placa}%0A👤 ${r.chofer}%0A📅 ${r.fecha.split('T')[0]}%0A%0A*CARGA:*%0A`; r.items.forEach(i => t += `• ${i.cli}: ${i.can}%0A`); window.location.href = "https://api.whatsapp.com/send?text=" + t; }
        
        function renderData() {
            if(!currentUser.isAdmin) return;
            const m = document.getElementById('f-month').value;
            let filt = db.filter(r => r.fecha.startsWith(m));
            let cS = {};
            filt.forEach(r => { 
                let cjs = r.items.reduce((a,b)=>a+b.can,0);
                cS[r.chofer] = (cS[r.chofer] || 0) + cjs;
            });
            document.getElementById('rank-choferes-list').innerHTML = Object.entries(cS).map(([n,v]) => `<div style="padding:15px; background:#f9fafb; border-radius:15px; margin-bottom:10px; display:flex; justify-content:space-between;"><b>${n}</b><span>${v} CJS</span></div>`).join('');
        }
    </script>
</body>
</html>
