<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TWINS V13 - FÁCIL</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root {
            --bg: #0b0f17; --surface: #161c28; --accent: #007aff; 
            --text: #ffffff; --text-dim: #94a3b8; --border: #2d3748; 
            --success: #34c759; --danger: #ff3b30;
        }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }
        
        .page { display: none; padding: 10px 15px 140px 15px; max-width: 500px; margin: 0 auto; }
        .active { display: block !important; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* HEADER */
        .top-header { position: sticky; top: 0; z-index: 1000; background: var(--bg); padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }

        /* INPUTS GRANDES PARA DEDOS GRANDES */
        input, select { background: #1f2937; border: 2px solid var(--border); padding: 18px; border-radius: 16px; color: white; font-size: 16px; width: 100%; margin-bottom: 12px; transition: 0.3s; }
        input:focus { border-color: var(--accent); }

        /* BOTONES DE CANTIDAD RÁPIDA */
        .qty-pills { display: flex; gap: 8px; margin-bottom: 15px; }
        .pill { flex: 1; background: var(--border); padding: 12px; border-radius: 12px; text-align: center; font-weight: 800; font-size: 14px; cursor: pointer; }
        .pill:active { background: var(--accent); }

        /* TARJETAS DE RUTA */
        .card-route { background: var(--surface); border-radius: 24px; padding: 20px; border: 1px solid var(--border); margin-bottom: 15px; position: relative; }
        .status-tag { position: absolute; top: 15px; right: 15px; font-size: 10px; padding: 4px 10px; border-radius: 20px; font-weight: 800; text-transform: uppercase; }
        .tag-hoy { background: rgba(52, 199, 89, 0.2); color: var(--success); }
        .tag-manana { background: rgba(0, 122, 255, 0.2); color: var(--accent); }

        /* BOTÓN FLOTANTE DE GUARDADO */
        .btn-save-fixed { position: fixed; bottom: 100px; left: 20px; right: 20px; background: var(--success); color: white; padding: 22px; border-radius: 24px; border: none; font-size: 18px; font-weight: 800; box-shadow: 0 10px 30px rgba(52, 199, 89, 0.4); z-index: 1500; display: none; }

        /* NAVEGACIÓN TIPO APP MODERNA */
        .nav-bar { position: fixed; bottom: 20px; left: 15px; right: 15px; background: rgba(22, 28, 40, 0.95); backdrop-filter: blur(20px); height: 75px; border-radius: 25px; display: flex; border: 1px solid var(--border); z-index: 2000; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-dim); background: none; border: none; font-size: 10px; font-weight: 700; }
        .nav-item.active { color: var(--accent); }
        .nav-item i { font-size: 26px; margin-bottom: 4px; }

        .btn-danger { background: rgba(255, 59, 48, 0.1); color: var(--danger); border: none; padding: 12px; border-radius: 12px; font-weight: 700; width: 100%; }
    </style>
</head>
<body>

    <header id="app-header" class="top-header" style="display:none">
        <div style="font-weight:900; font-size:20px; letter-spacing:-1px">TWINS<span style="color:var(--accent)">.</span></div>
        <div id="user-info" style="font-size:12px; font-weight:800; opacity:0.6"></div>
    </header>

    <div id="page-login" class="page active">
        <div style="padding:40px 0; text-align:center">
            <h1 style="font-size:32px; font-weight:800; margin-bottom:10px">¡Hola! 👋</h1>
            <p style="color:var(--text-dim)">Toca tu nombre para empezar</p>
        </div>
        <div id="login-options"></div>
    </div>

    <div id="page-route" class="page">
        <div style="margin-bottom:20px">
            <label style="font-size:12px; font-weight:800; color:var(--accent); margin-left:5px">1. ¿QUÉ CAMIÓN CARGA?</label>
            <select id="sel-pla" onchange="predictAndSave()" style="margin-top:8px"></select>
            
            <div style="display:flex; gap:10px">
                <select id="sel-cho" style="font-size:14px"></select>
                <select id="sel-aux" style="font-size:14px"></select>
            </div>
        </div>

        <div style="background:var(--surface); padding:20px; border-radius:24px; border:1px solid var(--border)">
            <label style="font-size:12px; font-weight:800; color:var(--text-dim)">2. AÑADIR FACTURAS / CLIENTES</label>
            <input type="text" id="inp-cli" placeholder="Nombre o Factura" style="margin-top:10px">
            
            <input type="number" id="inp-can" placeholder="¿Cuántas cajas?" style="font-size:24px; text-align:center; font-weight:800">
            
            <div class="qty-pills">
                <div class="pill" onclick="addQty(1)">+1</div>
                <div class="pill" onclick="addQty(5)">+5</div>
                <div class="pill" onclick="addQty(10)">+10</div>
                <div class="pill" style="color:var(--danger)" onclick="document.getElementById('inp-can').value=''">Borrar</div>
            </div>

            <button class="btn-main" onclick="addPoint()" style="background:var(--accent); width:100%; padding:20px; border-radius:18px; border:none; color:white; font-weight:800; font-size:16px">+ AGREGAR A LA LISTA</button>
        </div>

        <div id="live-list" style="margin-top:20px"></div>
        <button id="main-save-btn" class="btn-save-fixed" onclick="openConfirm()">FINALIZAR Y GUARDAR</button>
    </div>

    <div id="page-history" class="page">
        <div style="display:flex; gap:10px; margin-bottom:15px">
            <select id="filter-month" onchange="renderHistory()" style="margin-bottom:0">
                <option value="ALL">Todo el mes</option>
                <option value="0">Enero</option><option value="1">Febrero</option><option value="2">Marzo</option>
                </select>
            <input type="date" id="filter-date" onchange="renderHistory()" style="margin-bottom:0">
        </div>
        <div id="history-feed"></div>
    </div>

    <div id="page-fleet" class="page"><div id="fleet-grid"></div></div>

    <nav id="app-nav" class="nav-bar" style="display:none">
        <button class="nav-item active" id="n-route" onclick="go('page-route')"><i class="ph-fill ph-plus-circle"></i>NUEVO</button>
        <button class="nav-item" id="n-history" onclick="go('page-history')"><i class="ph-fill ph-article"></i>REVISAR</button>
        <button class="nav-item" id="n-fleet" onclick="go('page-fleet')"><i class="ph-fill ph-truck"></i>FLOTA</button>
        <button class="nav-item" id="n-stats" style="display:none" onclick="logout()"><i class="ph-fill ph-user"></i>SALIR</button>
    </nav>

    <div id="modal-confirm" class="modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:3000; align-items:center; justify-content:center; padding:20px">
        <div class="card-route" style="width:100%; text-align:center">
            <h2 style="margin-bottom:20px">¿Cuándo sale el camión?</h2>
            <button class="btn-main" onclick="finalize('HOY')" style="background:var(--success); margin-bottom:15px; width:100%; border:none; padding:20px; border-radius:15px; color:white; font-weight:800">SALIENDO AHORA (HOY)</button>
            <button class="btn-main" onclick="finalize('MAÑANA')" style="background:var(--accent); width:100%; border:none; padding:20px; border-radius:15px; color:white; font-weight:800">PARA MAÑANA</button>
            <button onclick="closeConfirm()" style="background:none; border:none; color:var(--text-dim); margin-top:20px; font-weight:700">CANCELAR</button>
        </div>
    </div>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbxuVVOZfMx8jkN-q079s6g7ppPAF4XIkNG-DEQGt6MqiownzLo3NMyWBIZ1hkTyoPBl/exec";
        let currentCarga = [], db = [], activeUser = "";

        const DATA = {
            placas: ["CEP-929", "BPN-711", "BVN-704", "BUL-742", "BVN-930"],
            choferes: ["TAJHO", "LUIS H.", "ROMARIO", "CESAR C.", "WALDIR", "MARCELO"],
            auxiliares: ["Cristopher", "Plácido", "Martin", "Percy", "Rodolfo", "Ricardo", "Elio", "Daniel C.", "Jofer", "Nelson", "Julio"],
            soats: { "CEP-929": "2026-07-22", "BPN-711": "2026-06-10", "BVN-704": "2026-07-02", "BUL-742": "2026-04-02", "BVN-930": "2026-07-02" }
        };

        window.onload = () => {
            setupLogin();
            document.getElementById('sel-pla').innerHTML = '<option value="">-- SELECCIONA PLACA --</option>' + DATA.placas.map(p => `<option value="${p}">${p}</option>`).join('');
            document.getElementById('sel-cho').innerHTML = '<option value="">Chofer</option>' + DATA.choferes.map(c => `<option value="${c}">${c}</option>`).join('');
            document.getElementById('sel-aux').innerHTML = '<option value="">Auxiliar</option>' + DATA.auxiliares.map(a => `<option value="${a}">${a}</option>`).join('');
            
            const savedUser = localStorage.getItem('tw_logged');
            if(savedUser) login(savedUser);
            syncData();
        };

        function setupLogin() {
            const container = document.getElementById('login-options');
            ['TAJHO ADMIN', 'FRANCESCO', 'OSCAR', 'LUIS HERBER'].forEach(u => {
                container.innerHTML += `<div onclick="login('${u}')" style="background:var(--surface); padding:25px; border-radius:20px; margin-bottom:12px; font-weight:800; font-size:18px; text-align:center; border:1px solid var(--border)">${u}</div>`;
            });
        }

        function login(u) {
            activeUser = u; localStorage.setItem('tw_logged', u);
            document.getElementById('page-login').classList.remove('active');
            document.getElementById('app-header').style.display = 'flex';
            document.getElementById('app-nav').style.display = 'flex';
            document.getElementById('user-info').innerText = u;
            go('page-route');
        }

        function addQty(n) {
            const input = document.getElementById('inp-can');
            input.value = (parseInt(input.value) || 0) + n;
        }

        function addPoint() {
            const cli = document.getElementById('inp-cli').value.toUpperCase();
            const can = parseInt(document.getElementById('inp-can').value);
            if(!cli || !can || !document.getElementById('sel-pla').value) {
                alert("Primero selecciona Placa, luego escribe Cliente y Cantidad");
                return;
            }
            currentCarga.push({ cli, can });
            document.getElementById('inp-cli').value = "";
            document.getElementById('inp-can').value = "";
            renderLiveList();
        }

        function renderLiveList() {
            const list = document.getElementById('live-list');
            list.innerHTML = currentCarga.map((it, i) => `
                <div style="background:rgba(255,255,255,0.05); padding:15px; border-radius:15px; margin-bottom:8px; display:flex; justify-content:space-between; align-items:center">
                    <div><small style="opacity:0.5">#${i+1}</small><br><b>${it.cli}</b></div>
                    <div style="display:flex; align-items:center; gap:15px">
                        <b style="font-size:18px; color:var(--accent)">${it.can}</b>
                        <i class="ph-bold ph-trash" style="color:var(--danger); font-size:20px" onclick="removePoint(${i})"></i>
                    </div>
                </div>
            `).join('');
            document.getElementById('main-save-btn').style.display = currentCarga.length > 0 ? 'block' : 'none';
        }

        async function finalize(op) {
            const f = new Date(); if(op === 'MAÑANA') f.setDate(f.getDate() + 1);
            const r = {
                fecha: f.toLocaleDateString('sv-SE'),
                placa: document.getElementById('sel-pla').value,
                total: currentCarga.reduce((a,b) => a + b.can, 0),
                items: currentCarga.map(i => `${i.cli}: ${i.can}`).join(", "),
                chofer: document.getElementById('sel-cho').value,
                auxiliar: document.getElementById('sel-aux').value
            };
            
            // Efecto visual de guardado
            document.getElementById('main-save-btn').innerText = "GUARDANDO...";
            await fetch(API, { method: 'POST', mode: 'no-cors', body: JSON.stringify(r) });
            
            db.unshift(r);
            currentCarga = [];
            renderLiveList();
            closeConfirm();
            go('page-history');
            document.getElementById('main-save-btn').innerText = "FINALIZAR Y GUARDAR";
        }

        function renderHistory() {
            const container = document.getElementById('history-feed');
            const today = new Date().toLocaleDateString('sv-SE');
            
            container.innerHTML = db.map(r => {
                const isHoy = r.fecha === today;
                return `
                <div class="card-route">
                    <span class="status-tag ${isHoy ? 'tag-hoy' : 'tag-manana'}">${isHoy ? 'Para Hoy' : 'Para Mañana'}</span>
                    <small style="color:var(--text-dim)">${r.fecha}</small>
                    <h2 style="margin:5px 0">${r.placa}</h2>
                    <b style="font-size:20px; color:var(--success)">${r.total} Cajas</b>
                    <p style="font-size:12px; opacity:0.6">${r.items.substring(0, 50)}...</p>
                    <button class="btn-danger" style="margin-top:10px" onclick="shareWA('${r.placa}', '${r.total}', '${r.items}')">ENVIAR WHATSAPP</button>
                </div>`;
            }).join('');
        }

        function renderFleet() {
            const container = document.getElementById('fleet-grid');
            container.innerHTML = DATA.placas.map(p => {
                const diff = Math.ceil((new Date(DATA.soats[p]) - new Date()) / (1000*60*60*24));
                return `
                <div class="card-route" style="display:flex; justify-content:space-between; align-items:center">
                    <div><b>${p}</b><br><small>SOAT: ${DATA.soats[p]}</small></div>
                    <div style="text-align:right"><b style="font-size:24px; color:${diff < 30 ? 'var(--danger)' : 'var(--success)'}">${diff}</b><br><small>DÍAS</small></div>
                </div>`;
            }).join('');
        }

        async function syncData() {
            try { const res = await fetch(API); db = await res.json(); renderHistory(); } catch(e) {}
        }

        function go(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('n-' + id.split('-')[1]).classList.add('active');
            if(id === 'page-history') renderHistory();
            if(id === 'page-fleet') renderFleet();
        }

        function addQty(n) {
            const input = document.getElementById('inp-can');
            input.value = (parseInt(input.value) || 0) + n;
        }

        function predictAndSave() {
            const p = document.getElementById('sel-pla').value;
            const u = db.find(r => r.placa === p);
            if(u) { document.getElementById('sel-cho').value = u.chofer; document.getElementById('sel-aux').value = u.auxiliar; }
        }

        function removePoint(i) { currentCarga.splice(i,1); renderLiveList(); }
        function openConfirm() { document.getElementById('modal-confirm').style.display = 'flex'; }
        function closeConfirm() { document.getElementById('modal-confirm').style.display = 'none'; }
        function logout() { localStorage.clear(); location.reload(); }
        function shareWA(p, t, i) {
            const msg = `*📦 DESPACHO TWINS*%0A*Placa:* ${p}%0A*Total:* ${t} Cjs%0A*Detalle:* ${i}`;
            window.open(`https://wa.me/?text=${msg}`, '_blank');
        }
    </script>
</body>
</html>
