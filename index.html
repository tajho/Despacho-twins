<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TWINS ELITE - V47.5</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root {
            --bg: #f8f9fa; --surface: #ffffff; --accent: #000000; 
            --text: #000000; --text-dim: #6b7280; --border: #e5e7eb; 
            --success: #25D366; --shadow: 0 4px 20px rgba(0,0,0,0.05);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { margin: 0; background: var(--bg); color: var(--text); padding-bottom: 90px; }

        .page { display: none; padding: 20px; max-width: 600px; margin: 0 auto; animation: fade 0.3s ease; }
        .active { display: block; }
        @keyframes fade { from { opacity: 0; } to { opacity: 1; } }

        /* Dashboard Stats */
        .core-dash { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .master-card { background: var(--surface); padding: 20px; border-radius: 24px; border: 1px solid var(--border); box-shadow: var(--shadow); }
        .master-card.black { background: var(--accent); color: #fff; border: none; }
        .stat-label { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 5px; opacity: 0.8; }
        .stat-main { font-size: 28px; font-weight: 900; }

        /* Filtros en DATA */
        .filter-bar { background: #fff; padding: 15px; border-radius: 20px; margin-bottom: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; border: 1px solid var(--border); }
        .filter-input { padding: 10px; border-radius: 12px; border: 1px solid var(--border); font-size: 13px; font-weight: 700; outline: none; }

        /* Cards */
        .route-card { background: #fff; border-radius: 24px; padding: 18px; margin-bottom: 12px; border: 1px solid var(--border); box-shadow: var(--shadow); }
        .route-actions { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 15px; }
        .action-btn { border: 1px solid var(--border); border-radius: 14px; padding: 10px 5px; font-size: 10px; font-weight: 800; background: #fff; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .action-btn.wa { background: #000; color: #fff; border: none; }

        /* Inputs */
        .input-box { background: #fff; border: 1px solid var(--border); border-radius: 16px; padding: 16px; width: 100%; font-size: 15px; font-weight: 700; outline: none; }
        .input-box:focus { border-color: #000; }

        /* Modales */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 2000; padding: 20px; backdrop-filter: blur(4px); }
        .modal-content { background: #fff; border-radius: 28px; padding: 25px; width: 100%; max-height: 80vh; overflow-y: auto; box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
        .modal-item { display: flex; justify-content: space-between; padding: 12px; background: #f8f9fa; border-radius: 12px; margin-bottom: 6px; font-weight: 700; font-size: 14px; }

        /* Nav */
        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; height: 75px; display: flex; border-top: 1px solid var(--border); z-index: 1000; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-dim); background: none; border: none; font-size: 10px; font-weight: 800; gap: 4px; }
        .nav-item.active { color: var(--accent); }
        .nav-item i { font-size: 24px; }

        #sync-loader { display: none; position: fixed; top: 0; left: 0; right: 0; height: 3px; background: #000; z-index: 5000; overflow: hidden; }
        #sync-loader::after { content: ""; display: block; width: 30%; height: 100%; background: #fff; animation: move 1s infinite linear; }
        @keyframes move { from { margin-left: -30%; } to { margin-left: 100%; } }
    </style>
</head>
<body>

    <div id="sync-loader"></div>

    <div id="page-dash" class="page active">
        <h2 style="font-weight: 900; letter-spacing: -1px; margin-bottom: 20px;">Dashboard</h2>
        <div class="core-dash">
            <div class="master-card black">
                <span class="stat-label">Hoy (Cjs)</span>
                <span id="stat-hoy" class="stat-main">0</span>
            </div>
            <div class="master-card">
                <span class="stat-label">Mes (Cjs)</span>
                <span id="stat-mes" class="stat-main">0</span>
            </div>
        </div>
        <div id="quick-history"></div>
        <button onclick="injectFakeData()" style="width:100%; margin-top:20px; background:none; border:1px dashed #ccc; padding:10px; font-size:10px; border-radius:10px; color:#999;">CARGAR BASE DE DATOS DE PRUEBA (20 REGISTROS)</button>
    </div>

    <div id="page-data" class="page">
        <h2 style="font-weight: 900; letter-spacing: -1px; margin-bottom: 20px;">Data Histórica</h2>
        <div class="filter-bar">
            <div>
                <label class="stat-label">Mes</label>
                <input type="month" id="filter-month" class="filter-input" onchange="renderDataPage()">
            </div>
            <div>
                <label class="stat-label">Día exacto</label>
                <input type="date" id="filter-day" class="filter-input" onchange="renderDataPage()">
            </div>
        </div>
        <div id="data-list"></div>
    </div>

    <div id="page-units" class="page">
        <h2 style="font-weight: 900;">Seleccionar Unidad</h2>
        <div id="units-grid" style="display:grid; grid-template-columns:1fr 1fr; gap:12px;"></div>
    </div>

    <div id="modal-view" class="modal">
        <div class="modal-content">
            <h3 id="view-title" style="margin-top:0; font-weight:900;">Detalle</h3>
            <div id="view-body"></div>
            <button onclick="closeModal('modal-view')" class="input-box" style="margin-top:20px; background:#f3f4f6; border:none;">CERRAR</button>
        </div>
    </div>

    <div id="modal-wa" class="modal">
        <div class="modal-content">
            <h3 style="margin-top:0; font-weight:900; color:var(--success);">Confirmar Despacho</h3>
            <div id="wa-summary"></div>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:20px;">
                <button onclick="closeModal('modal-wa')" class="input-box" style="background:#f3f4f6; border:none;">ATRÁS</button>
                <button onclick="executeWA()" class="input-box" style="background:var(--success); color:#fff; border:none;">ENVIAR WA</button>
            </div>
        </div>
    </div>

    <div id="page-assign" class="page">
        <h2 id="title-placa" style="font-weight:900; font-size:32px;">---</h2>
        <div class="route-card">
            <label class="stat-label">Fecha despacho</label>
            <input type="date" id="sel-date-manual" class="input-box" style="margin-bottom:15px;">
            <label class="stat-label">Equipo</label>
            <select id="sel-chofer" class="input-box" style="margin-bottom:10px;"></select>
            <select id="sel-aux" class="input-box"></select>
            <button onclick="confirmAssign()" class="input-box" style="background:#000; color:#fff; margin-top:20px;">CONTINUAR</button>
        </div>
    </div>

    <div id="page-load" class="page">
        <div style="background:#000; color:#fff; padding:25px; border-radius:24px; margin-bottom:15px; display:flex; justify-content:space-between; align-items:center;">
            <div><h3 id="load-placa" style="margin:0;">---</h3></div>
            <span id="load-total" style="font-size:32px; font-weight:900;">0</span>
        </div>
        <div class="route-card">
            <input type="text" id="inp-cli" placeholder="Cliente" class="input-box" style="margin-bottom:10px;">
            <div style="display:flex; gap:10px;">
                <input type="number" id="inp-can" placeholder="Cjs" class="input-box">
                <button onclick="addItem()" style="background:#000; color:#fff; border:none; border-radius:15px; width:60px;"><i class="ph-bold ph-plus"></i></button>
            </div>
            <div id="items-list" style="margin-top:20px;"></div>
        </div>
        <button id="btn-finish" onclick="saveAndSync()" class="input-box" style="display:none; background:#000; color:#fff; margin-top:15px;">GUARDAR TODO</button>
    </div>

    <nav class="nav-bar">
        <button class="nav-item active" id="btn-nav-dash" onclick="go('page-dash')"><i class="ph-fill ph-house"></i>INICIO</button>
        <button class="nav-item" id="btn-nav-units" onclick="go('page-units')"><i class="ph-fill ph-plus-circle"></i>NUEVA</button>
        <button class="nav-item" id="btn-nav-data" onclick="go('page-data')"><i class="ph-fill ph-database"></i>DATA</button>
    </nav>

    <script>
        const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbz17aqWIX2ktdjce6dxXKeklCfadQzHDpBbQH4Rb0MvcBEpcOubhKPAv3QayCUE1TtY/exec';
        let db = JSON.parse(localStorage.getItem('twins_v47_db')) || [];
        let current = { items: [] }, waTargetId = null;

        const FLOTA = { "CEP-929": "ROMARIO", "BPN-711": "CESAR C.", "BVN-704": "LUIS H.", "BUL-742": "WALDIR", "BVN-930": "MARCELO" };
        const CONDUCTORES = ["TAJHO", "ROMARIO", "CESAR C.", "LUIS H.", "WALDIR", "MARCELO"];
        const AUXILIARES = ["POR DEFINIR", "CRISTOPHER", "PERCY", "PLACIDO", "RODOLFO", "RICARDO", "ELIO", "JOFER", "MARTIN", "NELSON", "JULIO", "DANIEL C."];

        window.onload = () => {
            document.getElementById('sel-date-manual').valueAsDate = new Date();
            const sc = document.getElementById('sel-chofer'), sa = document.getElementById('sel-aux'), ug = document.getElementById('units-grid');
            CONDUCTORES.forEach(c => sc.innerHTML += `<option value="${c}">${c}</option>`);
            AUXILIARES.forEach(a => sa.innerHTML += `<option value="${a}">${a}</option>`);
            for(let p in FLOTA) ug.innerHTML += `<div style="background:white; padding:25px; border-radius:20px; text-align:center; font-weight:900; border:1px solid var(--border);" onclick="startAssign('${p}')">${p}</div>`;
            renderStats(); renderQuickHistory();
        };

        function startAssign(p) {
            current = { placa: p, items: [], id: 'R' + Date.now() };
            document.getElementById('title-placa').innerText = p;
            document.getElementById('sel-chofer').value = FLOTA[p] || CONDUCTORES[0];
            go('page-assign');
        }

        function confirmAssign() {
            current.chofer = document.getElementById('sel-chofer').value;
            current.auxiliar = document.getElementById('sel-aux').value;
            current.fecha = document.getElementById('sel-date-manual').value;
            refreshLoadUI(); go('page-load');
        }

        function addItem() {
            const cli = document.getElementById('inp-cli').value.toUpperCase().trim(), can = parseInt(document.getElementById('inp-can').value);
            if(!cli || isNaN(can)) return;
            current.items.push({cli, can});
            document.getElementById('inp-cli').value = ""; document.getElementById('inp-can').value = "";
            document.getElementById('inp-cli').focus();
            refreshLoadUI();
        }

        function refreshLoadUI() {
            let t = current.items.reduce((a,b)=>a+b.can,0);
            document.getElementById('load-total').innerText = t;
            document.getElementById('items-list').innerHTML = current.items.map((it, i) => `
                <div class="modal-item"><span>${it.can} • ${it.cli}</span><i class="ph-bold ph-trash" style="color:red" onclick="current.items.splice(${i},1);refreshLoadUI()"></i></div>`).reverse().join('');
            document.getElementById('btn-finish').style.display = t > 0 ? 'block' : 'none';
        }

        async function saveAndSync() {
            const idx = db.findIndex(x => x.id === current.id);
            if(idx > -1) db[idx] = current; else db.unshift(current);
            localStorage.setItem('twins_v47_db', JSON.stringify(db));
            document.getElementById('sync-loader').style.display = 'block';
            try { await fetch(WEB_APP_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(current) }); } catch (e) {}
            setTimeout(() => { document.getElementById('sync-loader').style.display = 'none'; go('page-dash'); renderStats(); renderQuickHistory(); }, 1000);
        }

        function renderStats() {
            const hoy = new Date().toISOString().split('T')[0], mes = hoy.substring(0,7);
            const sum = (arr) => arr.reduce((a,b)=>a+b.items.reduce((x,y)=>x+y.can,0), 0);
            document.getElementById('stat-hoy').innerText = sum(db.filter(r => r.fecha === hoy));
            document.getElementById('stat-mes').innerText = sum(db.filter(r => r.fecha.startsWith(mes)));
        }

        function renderQuickHistory() {
            const container = document.getElementById('quick-history');
            container.innerHTML = `<div class="stat-label" style="margin-top:20px;">Registros Recientes</div>`;
            db.slice(0, 5).forEach(r => container.innerHTML += renderCard(r));
        }

        function renderDataPage() {
            const filterMonth = document.getElementById('filter-month').value;
            const filterDay = document.getElementById('filter-day').value;
            let filtered = db;
            if(filterDay) filtered = filtered.filter(r => r.fecha === filterDay);
            else if(filterMonth) filtered = filtered.filter(r => r.fecha.startsWith(filterMonth));
            
            const container = document.getElementById('data-list');
            container.innerHTML = filtered.length ? "" : "<p style='text-align:center; color:gray; margin-top:40px;'>No hay registros para este filtro.</p>";
            filtered.forEach(r => container.innerHTML += renderCard(r));
        }

        function renderCard(r) {
            const total = r.items.reduce((a,b)=>a+b.can,0);
            return `
            <div class="route-card">
                <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                    <div><b style="font-size:18px;">${r.placa}</b><div style="font-size:11px; color:var(--text-dim); font-weight:700;">${r.chofer} | ${r.auxiliar}</div></div>
                    <div style="text-align:right;"><span style="font-size:10px; font-weight:800; display:block;">${r.fecha}</span><b style="font-size:20px;">${total} Cjs</b></div>
                </div>
                <div class="route-actions">
                    <button class="action-btn" onclick="openViewModal('${r.id}')"><i class="ph-bold ph-list"></i>VER</button>
                    <button class="action-btn" onclick="editRoute('${r.id}')"><i class="ph-bold ph-pencil"></i>EDITAR</button>
                    <button class="action-btn wa" onclick="openWAModal('${r.id}')"><i class="ph-bold ph-whatsapp-logo"></i>WHATSAPP</button>
                </div>
            </div>`;
        }

        function openViewModal(id) {
            const r = db.find(x => x.id === id);
            document.getElementById('view-title').innerText = `Ruta ${r.placa}`;
            document.getElementById('view-body').innerHTML = r.items.map(i => `<div class="modal-item"><span>${i.cli}</span><span>${i.can} Cjs</span></div>`).join('');
            document.getElementById('modal-view').style.display = 'flex';
        }

        function openWAModal(id) {
            waTargetId = id;
            const r = db.find(x => x.id === id);
            document.getElementById('wa-summary').innerHTML = `<div class="modal-item"><span>Placa:</span><span>${r.placa}</span></div><div class="modal-item"><span>Clientes:</span><span>${r.items.length}</span></div><div class="modal-item"><span>Cajas:</span><span>${r.items.reduce((a,b)=>a+b.can,0)}</span></div>`;
            document.getElementById('modal-wa').style.display = 'flex';
        }

        function executeWA() {
            const r = db.find(x => x.id === waTargetId);
            const lista = r.items.map(i => `• ${i.cli}: ${i.can}`).join('\n');
            const totalCajas = r.items.reduce((a,b)=>a+b.can,0);
            const totalClientes = r.items.length;
            const msg = `*TWINS ELITE*\n\n🚛 *UNIDAD:* ${r.placa}\n👤 *CHOFER:* ${r.chofer}\n🤝 *AUX:* ${r.auxiliar}\n\n*LISTA DE DESPACHO:*\n${lista}\n\n📦 *TOTAL CAJAS:* ${totalCajas}\n👥 *TOTAL CLIENTES:* ${totalClientes}`;
            window.location.href = "whatsapp://send?text=" + encodeURIComponent(msg);
            closeModal('modal-wa');
        }

        function injectFakeData() {
            const fakeData = [];
            const dates = ["2026-02-10", "2026-02-15", "2026-02-20", "2026-02-25", "2026-01-20"];
            const placas = Object.keys(FLOTA);
            for(let i=0; i<20; i++) {
                fakeData.push({
                    id: 'FAKE' + i,
                    placa: placas[Math.floor(Math.random()*placas.length)],
                    chofer: CONDUCTORES[Math.floor(Math.random()*CONDUCTORES.length)],
                    auxiliar: AUXILIARES[Math.floor(Math.random()*AUXILIARES.length)],
                    fecha: dates[Math.floor(Math.random()*dates.length)],
                    items: [{cli: "CLIENTE TEST", can: Math.floor(Math.random()*50)+10}]
                });
            }
            db = [...fakeData, ...db];
            localStorage.setItem('twins_v47_db', JSON.stringify(db));
            renderStats(); renderQuickHistory();
            alert("Base de datos falsa inyectada con éxito.");
        }

        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function editRoute(id) { current = JSON.parse(JSON.stringify(db.find(x => x.id === id))); refreshLoadUI(); go('page-load'); }
        function go(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('btn-nav-' + id.replace('page-','')).classList.add('active');
            if(id === 'page-data') renderDataPage();
        }
    </script>
</body>
</html>
