<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TWINS LOGISTICS ELITE V25.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root {
            --bg: #030712; --card: #111827; --accent: #22d3ee; 
            --text: #f3f4f6; --text-dim: #9ca3af;
            --success: #10b981; --danger: #f43f5e;
            --border: rgba(255,255,255,0.08);
            --grad: linear-gradient(135deg, #22d3ee 0%, #3b82f6 100%);
        }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; outline: none; }
        body { 
            margin: 0; background: var(--bg); color: var(--text); 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            overscroll-behavior: contain;
        }
        
        /* Animaciones */
        .page { display: none; padding: 20px; padding-bottom: 120px; max-width: 500px; margin: 0 auto; animation: slideUp 0.3s ease-out; }
        .active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Header Profesional */
        .top-header { 
            position: sticky; top: 0; z-index: 100; 
            background: rgba(3, 7, 18, 0.85); backdrop-filter: blur(20px); 
            padding: 18px 20px; display: flex; justify-content: space-between; 
            align-items: center; border-bottom: 1px solid var(--border);
        }
        .user-pill { 
            background: rgba(34, 211, 238, 0.1); border: 1px solid rgba(34, 211, 238, 0.2); 
            padding: 8px 16px; border-radius: 50px; color: var(--accent); 
            font-size: 11px; font-weight: 800; text-transform: uppercase;
        }

        /* Stats con más estilo */
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .stat-card { 
            background: var(--card); border: 1px solid var(--border); 
            padding: 16px; border-radius: 24px; position: relative; overflow: hidden;
        }
        .stat-card::after {
            content: ""; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(34,211,238,0.05) 0%, transparent 70%);
        }
        .stat-num { font-size: 22px; font-weight: 800; display: block; color: var(--accent); }
        .stat-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; font-weight: 700; }

        /* Componentes de Formulario */
        .card { background: var(--card); border-radius: 28px; border: 1px solid var(--border); padding: 22px; margin-bottom: 18px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        input, select { 
            width: 100%; padding: 16px; margin: 10px 0; border-radius: 16px; 
            border: 1px solid var(--border); background: #1f2937; color: #fff; 
            font-size: 15px; font-weight: 500; transition: 0.3s;
        }
        input:focus { border-color: var(--accent); background: #263345; }

        /* Botones Intuitivos */
        .btn { 
            width: 100%; padding: 18px; border-radius: 20px; border: none; 
            font-size: 15px; font-weight: 800; cursor: pointer; transition: 0.3s; 
            display: flex; justify-content: center; align-items: center; gap: 12px;
            letter-spacing: 0.5px;
        }
        .btn-main { background: var(--grad); color: white; box-shadow: 0 8px 20px rgba(34, 211, 238, 0.3); }
        .btn-main:active { transform: scale(0.98); }
        .btn-mini { padding: 12px; border-radius: 14px; font-size: 11px; flex: 1; border: 1px solid var(--border); background: rgba(255,255,255,0.05); color: white; font-weight: 700; }

        /* Navegación Inferior */
        .bottom-nav { 
            position: fixed; bottom: 0; left: 0; right: 0; 
            height: 90px; background: rgba(17, 24, 39, 0.9); backdrop-filter: blur(20px); 
            border-top: 1px solid var(--border); display: flex; 
            justify-content: space-around; align-items: center; z-index: 1000;
            padding-bottom: 20px;
        }
        .nav-item { 
            background: none; border: none; color: var(--text-dim); 
            font-size: 11px; font-weight: 700; display: flex; 
            flex-direction: column; align-items: center; gap: 6px; flex: 1;
            transition: 0.3s;
        }
        .nav-item i { font-size: 26px; }
        .nav-item.active-nav { color: var(--accent); }
        .nav-item.active-nav i { transform: translateY(-4px); transition: 0.3s; }

        /* Modales Modernos */
        .modal-overlay { 
            display: none; position: fixed; inset: 0; 
            background: rgba(0,0,0,0.8); backdrop-filter: blur(12px); 
            z-index: 2000; justify-content: center; align-items: center; padding: 25px; 
        }
        .modal-content { 
            background: var(--card); border-radius: 35px; padding: 30px; 
            width: 100%; max-width: 400px; border: 1px solid var(--border);
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="modal-ask" class="modal-overlay">
        <div class="modal-content">
            <div style="background: var(--accent); width: 60px; height: 60px; border-radius: 20px; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px;">
                <i class="ph-fill ph-calendar-plus" style="font-size: 32px; color: #000;"></i>
            </div>
            <h3 style="margin: 0 0 10px 0; font-size: 22px;">Programar Salida</h3>
            <p style="color:var(--text-dim); font-size:14px; margin-bottom:25px;">Selecciona la fecha para el Excel y el Historial.</p>
            <button class="btn btn-main" style="margin-bottom:12px" onclick="confirmarGuardado('HOY')">
                <i class="ph ph-clock"></i> DESPACHAR HOY
            </button>
            <button class="btn" style="background:var(--success); color:black" onclick="confirmarGuardado('MAÑANA')">
                <i class="ph ph-calendar-bold"></i> PARA MAÑANA
            </button>
        </div>
    </div>

    <div id="header-app" class="top-header" style="display:none">
        <div class="user-pill"><i class="ph-fill ph-user-circle"></i> <span id="user-display">---</span></div>
        <div style="font-weight:900; font-size:15px; letter-spacing: -0.5px;">TWINS <span style="color:var(--accent)">ELITE</span></div>
        <button onclick="cerrarSesion()" style="background:none; border:none; color:var(--danger); padding:5px;"><i class="ph-bold ph-power" style="font-size:24px;"></i></button>
    </div>

    <div id="p1" class="page active" style="text-align:center; padding-top:12vh">
        <i class="ph-fill ph-truck" style="font-size: 80px; color: var(--accent); margin-bottom: 20px;"></i>
        <h1 style="font-size:36px; font-weight:900; margin:0;">TWINS <span style="color:var(--accent)">ELITE</span></h1>
        <p style="color:var(--text-dim); margin-bottom:40px;">Sistema de Gestión de Almacén</p>
        <div style="display:grid; gap:14px; padding: 0 10px;">
            <button class="btn" style="background:var(--card); border:1px solid var(--border);" onclick="login('TAJHO ADMIN')">💎 TAJHO ADMIN</button>
            <button class="btn" style="background:var(--card); border:1px solid var(--border);" onclick="login('FRANCESCO')">FRANCESCO</button>
            <button class="btn" style="background:var(--card); border:1px solid var(--border);" onclick="login('OSCAR')">OSCAR</button>
            <button class="btn" style="background:var(--card); border:1px solid var(--border);" onclick="login('LUIS HERBER')">LUIS HERBER</button>
        </div>
    </div>

    <div id="p2" class="page">
        <div class="stat-card" style="background:var(--grad); border:none; margin-bottom:20px; text-align:center; padding: 30px;">
            <span class="stat-label" style="color:rgba(255,255,255,0.8);">Cajas en Lista</span>
            <span id="total-vivo" style="font-size:55px; font-weight:900; color:white; display:block;">0</span>
        </div>
        
        <div class="card">
            <div style="display:grid; grid-template-columns: 1fr 90px; gap:12px">
                <input type="text" id="cli" placeholder="Destino o Cliente">
                <input type="number" id="can" placeholder="Cant.">
            </div>
            <button class="btn btn-main" onclick="addItem()">
                <i class="ph-bold ph-plus-circle"></i> AÑADIR A LA RUTA
            </button>
        </div>

        <div id="area-envio" style="display:none">
            <div id="lista-items" class="card" style="padding: 15px; font-size: 14px;"></div>
            <div class="card">
                <label class="stat-label">Asignación de Unidad</label>
                <select id="pla"><option value="">Seleccionar Placa</option><option value="CEP-929">CEP-929</option><option value="BPN-711">BPN-711</option><option value="BVN-704">BVN-704</option><option value="BUL-742">BUL-742</option><option value="BVN-930">BVN-930</option></select>
                <select id="cho"><option value="">Seleccionar Chofer</option><option value="LUIS H.">Luis H.</option><option value="ROMARIO">Romario</option><option value="CESAR C.">Cesar C.</option><option value="WALDIR">Waldir</option><option value="MARCELO">Marcelo</option></select>
                <select id="aux"><option value="">Seleccionar Auxiliar</option><option value="CRISTOPHER">Cristopher</option><option value="PLACIDO">Placido</option><option value="RODOLFO">Rodolfo</option></select>
                <button class="btn btn-main" style="background:var(--success); color:black; margin-top:10px;" onclick="abrirModalGuardar()">
                    <i class="ph-bold ph-paper-plane-tilt"></i> ENVIAR A EXCEL
                </button>
            </div>
        </div>
    </div>

    <div id="p3" class="page">
        <div class="stat-grid">
            <div class="stat-card">
                <span class="stat-label">Cajas Mes</span>
                <span id="stat-mes-caj" class="stat-num">0</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">Cajas hoy</span>
                <span id="stat-dia-caj" class="stat-num" style="color:var(--success)">0</span>
            </div>
        </div>
        <div style="margin-bottom: 20px;">
            <label class="stat-label">Filtrar por Fecha</label>
            <input type="date" id="f-dia" onchange="renderH()" style="margin-top:5px;">
        </div>
        <div id="h-list"></div>
    </div>

    <div id="p4" class="page">
        <h3 style="font-weight:800; margin-bottom:20px;">Estado de Unidades</h3>
        <div id="lista-flota"></div>
    </div>

    <nav id="nav-app" class="bottom-nav" style="display:none">
        <button class="nav-item" id="nav-p2" onclick="nav('p2')"><i class="ph ph-package"></i>Ruta</button>
        <button class="nav-item" id="nav-p3" onclick="nav('p3')"><i class="ph ph-calendar-check"></i>Historial</button>
        <button class="nav-item" id="nav-p4" onclick="nav('p4')"><i class="ph ph-truck"></i>Flota</button>
    </nav>

    <script>
        const URL = "https://script.google.com/macros/s/AKfycbxvTfOgv-zUhmrfHulOnISQb6Ja8STq3P_ed2U2riwbmrYgL5kuSKnyz7hryoZuJe8M/exec";
        let user = "", ruta = [], db = [];
        const soats = { "CEP-929": "15/05/26", "BPN-711": "22/08/26", "BVN-704": "10/01/27", "BUL-742": "05/11/26", "BVN-930": "30/09/26" };

        window.onload = () => {
            const u = localStorage.getItem('tw_u');
            // Iniciar fecha con hoy por defecto
            document.getElementById('f-dia').value = new Date().toLocaleDateString('en-CA');
            if(u) {
                login(u);
            } else {
                document.getElementById('p1').classList.add('active');
            }
            load();
            setInterval(load, 20000); 
        };

        function login(n) { 
            user = n; localStorage.setItem('tw_u', n);
            document.getElementById('p1').style.display='none'; 
            document.getElementById('header-app').style.display='flex'; 
            document.getElementById('nav-app').style.display='flex'; 
            document.getElementById('user-display').innerText = n; 
            nav('p2'); 
        }

        function nav(id) { 
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); 
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active-nav'));
            document.getElementById(id).classList.add('active'); 
            document.getElementById('nav-' + id).classList.add('active-nav');
            if(id === 'p3') renderH();
            if(id === 'p4') renderFlota();
        }

        async function load() { 
            try { 
                const r = await fetch(URL); 
                db = await r.json(); 
                renderH(); renderFlota(); 
            } catch(e){ console.error("Error al cargar datos"); } 
        }

        function addItem() {
            const cl = document.getElementById('cli').value.toUpperCase(), ca = parseInt(document.getElementById('can').value);
            if(!cl || !ca) return; ruta.unshift({cl, ca}); 
            document.getElementById('cli').value = ""; document.getElementById('can').value = ""; 
            renderR(); 
        }

        function renderR() {
            const l = document.getElementById('lista-items'); let s = 0; l.innerHTML = "";
            ruta.forEach((i, x) => { 
                s += i.ca; 
                l.innerHTML += `<div style="display:flex; justify-content:space-between; padding:12px 0; border-bottom:1px solid var(--border)">
                    <span>${i.cl}</span>
                    <b style="color:var(--accent)">${i.ca} CJ <span onclick="removeItem(${x})" style="color:var(--danger); margin-left:10px; cursor:pointer">✕</span></b>
                </div>`; 
            });
            document.getElementById('total-vivo').innerText = s; 
            document.getElementById('area-envio').style.display = ruta.length > 0 ? 'block' : 'none';
        }

        function removeItem(x) { ruta.splice(x,1); renderR(); }

        function abrirModalGuardar() { 
            if(!document.getElementById('cho').value || !document.getElementById('pla').value) {
                alert("Debes seleccionar Chofer y Placa");
                return;
            }
            document.getElementById('modal-ask').style.display = 'flex'; 
        }

        async function confirmarGuardado(opcion) {
            document.getElementById('modal-ask').style.display = 'none';
            
            let d = new Date();
            if(opcion === 'MAÑANA') {
                d.setDate(d.getDate() + 1);
                if(d.getDay() === 0) d.setDate(d.getDate() + 1); 
            }
            let fechaTexto = d.toLocaleDateString('en-CA'); 

            const registro = { 
                fecha: fechaTexto, 
                chofer: document.getElementById('cho').value, 
                auxiliar: document.getElementById('aux').value, 
                placa: document.getElementById('pla').value, 
                operario: user, 
                items: ruta.map(i => `${i.cl}:${i.ca}`).join(", "), 
                total: ruta.reduce((a,b) => a+b.ca, 0)
            };

            // Efecto inmediato en el historial de la App
            db.push(registro);
            document.getElementById('f-dia').value = fechaTexto; // BLOQUEAR VISTA EN LA FECHA ELEGIDA
            nav('p3'); 
            renderH();

            // Envío al servidor
            await fetch(URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(registro) });
            
            // Limpieza tras envío exitoso
            ruta = []; renderR();
            document.getElementById('pla').value = ""; document.getElementById('cho').value = "";
        }

        function renderH() {
            const list = document.getElementById('h-list'), fD = document.getElementById('f-dia').value;
            let cMes = 0, cDia = 0, html = "";
            const mesActual = new Date().getMonth();

            db.slice().reverse().forEach(r => {
                let rF = r.fecha.split("T")[0];
                let rDate = new Date(r.fecha + "T00:00:00");
                if(rDate.getMonth() === mesActual) cMes += parseFloat(r.total);

                if(fD === rF) {
                    cDia += parseFloat(r.total);
                    html += `<div class="card" style="padding:15px; border-left:4px solid var(--accent)">
                        <div style="display:flex; justify-content:space-between; align-items:center">
                            <span style="background:var(--accent); color:black; padding:4px 10px; border-radius:10px; font-size:11px; font-weight:800">${r.placa}</span>
                            <b style="color:var(--accent); font-size:18px;">${r.total} CJ</b>
                        </div>
                        <div style="font-weight:700; margin-top:10px; font-size:15px;">${r.chofer}</div>
                        <div style="color:var(--text-dim); font-size:12px;">Aux: ${r.auxiliar || 'Ninguno'}</div>
                        <button class="btn-mini" style="margin-top:15px; width:100%; background:rgba(34,211,238,0.1); border-color:rgba(34,211,238,0.2); color:var(--accent)" onclick="sendWA('${r.fecha}', '${r.chofer}', '${r.total}', '${r.items}')">
                            <i class="ph-bold ph-whatsapp-logo"></i> COMPARTIR RUTA
                        </button>
                    </div>`;
                }
            });

            list.innerHTML = html || `<p style='text-align:center; color:gray; padding:40px;'>No hay rutas registradas para esta fecha.</p>`;
            document.getElementById('stat-mes-caj').innerText = Math.round(cMes);
            document.getElementById('stat-dia-caj').innerText = Math.round(cDia);
        }

        function sendWA(f, c, t, i) {
            let m = `*TWINS LOGISTICS - REPORTE DE CARGA*\n*Fecha:* ${f.split('T')[0]}\n*Chofer:* ${c}\n*Total:* ${t} CJ\n\n*DETALLE:*\n${i.replace(/:/g, ': ').replace(/,/g, '\n')}`;
            window.location.href = `https://wa.me/?text=${encodeURIComponent(m)}`;
        }

        function renderFlota() {
            const list = document.getElementById('lista-flota'), fD = document.getElementById('f-dia').value;
            const placas = ["CEP-929", "BPN-711", "BVN-704", "BUL-742", "BVN-930"];
            list.innerHTML = "";
            placas.forEach(p => {
                let rH = db.find(r => r.placa === p && r.fecha.split('T')[0] === fD);
                list.innerHTML += `<div class="card" style="border-left:5px solid ${rH ? var(--danger) : var(--success)}; padding:15px;">
                    <div style="display:flex; justify-content:space-between"><b>${p}</b><small style="color:var(--text-dim)">SOAT: ${soats[p]}</small></div>
                    <div style="font-size:13px; margin-top:8px; font-weight:600;">${rH ? '⚠️ RUTA: ' + rH.chofer : '✅ DISPONIBLE'}</div>
                </div>`;
            });
        }

        function cerrarSesion() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
