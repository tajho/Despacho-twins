<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TWINS ELITE - V50.9</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root {
            --bg: #f8f9fa; --surface: #ffffff; --accent: #000000; 
            --text: #111827; --text-dim: #6b7280; --border: #e5e7eb; 
            --gold: #FFD700; --silver: #C0C0C0; --bronze: #CD7F32;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { margin: 0; background: var(--bg); color: var(--text); padding-bottom: 100px; }

        .page { display: none; padding: 20px; max-width: 600px; margin: 0 auto; animation: fade 0.2s ease; }
        .active { display: block; }
        @keyframes fade { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* Buscador Mejorado */
        .search-container { position: sticky; top: 0; background: var(--bg); z-index: 100; padding: 5px 0 15px 0; }
        .search-input { background: #fff; border: 1px solid var(--border); border-radius: 16px; padding: 14px 14px 14px 45px; width: 100%; font-size: 14px; font-weight: 600; outline: none; box-shadow: var(--shadow); }
        .search-icon { position: absolute; left: 16px; top: 20px; font-size: 20px; color: var(--text-dim); }

        /* Dashboard Stats */
        .core-dash { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 25px; }
        .master-card { background: #fff; padding: 20px; border-radius: 24px; border: 1px solid var(--border); display: flex; flex-direction: column; justify-content: space-between; height: 125px; }
        .master-card.black { background: #000; color: #fff; border: none; }
        .stat-label { font-size: 10px; font-weight: 800; text-transform: uppercase; opacity: 0.6; }
        .stat-main { font-size: 28px; font-weight: 900; }

        /* Data & Rankings */
        .rank-box { background: #fff; border-radius: 24px; padding: 20px; border: 1px solid var(--border); margin-bottom: 20px; }
        .rank-header { display: flex; align-items: center; gap: 8px; margin-bottom: 15px; font-weight: 800; font-size: 13px; color: var(--text-dim); text-transform: uppercase; }
        .rank-item { display: flex; align-items: center; gap: 12px; margin-bottom: 15px; }
        .rank-pos { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 12px; background: #f3f4f6; color: #9ca3af; }
        .pos-1 { background: var(--gold); color: #000; }
        .pos-2 { background: var(--silver); color: #000; }
        .pos-3 { background: var(--bronze); color: #000; }
        .rank-info { flex: 1; }
        .rank-bar-bg { background: #f3f4f6; height: 6px; border-radius: 10px; margin-top: 5px; }
        .rank-bar-fill { background: #000; height: 100%; border-radius: 10px; }

        /* General */
        .route-card { background: #fff; border-radius: 20px; padding: 16px; margin-bottom: 12px; border: 1px solid var(--border); }
        .field { background: #fff; border: 1px solid var(--border); border-radius: 14px; padding: 14px; width: 100%; font-size: 15px; font-weight: 600; outline: none; margin-bottom: 10px; }
        .nav-bottom { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; height: 80px; display: flex; border-top: 1px solid var(--border); }
        .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #9ca3af; background: none; border: none; font-size: 10px; font-weight: 800; }
        .nav-btn.active { color: #000; }
    </style>
</head>
<body>

    <div id="page-dash" class="page active">
        <h1 style="font-weight: 900; font-size: 26px; margin-bottom: 20px;">Historial</h1>
        
        <div class="search-container">
            <i class="ph-bold ph-magnifying-glass search-icon"></i>
            <input type="text" id="main-search" class="search-input" placeholder="Buscar chofer, placa o cliente..." oninput="renderSmartHistory()">
        </div>

        <div class="core-dash">
            <div class="master-card black">
                <div><span class="stat-label">Cajas Hoy</span><span id="stat-hoy-cajas" class="stat-main">0</span></div>
                <div style="border-top:1px solid #333; padding-top:8px; font-size:12px; font-weight:800;" id="stat-hoy-envios">0 CLI</div>
            </div>
            <div class="master-card">
                <div><span class="stat-label">Filtrado</span><span id="stat-fil-cajas" class="stat-main">0</span></div>
                <div style="border-top:1px solid #eee; padding-top:8px; font-size:12px; font-weight:800;" id="stat-fil-envios">0 CLI</div>
            </div>
        </div>

        <div id="smart-history"></div>
    </div>

    <div id="page-data" class="page">
        <h1 style="font-weight: 900; font-size: 26px; margin-bottom: 20px;">Rendimiento</h1>
        
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:25px;">
            <input type="month" id="f-month" class="field" onchange="renderData()" style="margin:0">
            <button onclick="injectFakeData()" style="background:#f3f4f6; border:none; border-radius:12px; font-size:10px; font-weight:800;">RECARGAR PRUEBA</button>
        </div>

        <div class="rank-box">
            <div class="rank-header"><i class="ph-bold ph-steering-wheel"></i> Top Choferes</div>
            <div id="rank-choferes-list"></div>
        </div>

        <div class="rank-box">
            <div class="rank-header"><i class="ph-bold ph-users-three"></i> Top Auxiliares</div>
            <div id="rank-auxiliares-list"></div>
        </div>
    </div>

    <div id="page-units" class="page">
        <h1 style="font-weight: 900; font-size: 26px; margin-bottom: 20px;">Nueva Carga</h1>
        <div id="units-grid" style="display:grid; grid-template-columns:1fr 1fr; gap:12px;"></div>
    </div>

    <nav class="nav-bottom">
        <button class="nav-btn active" id="n-dash" onclick="go('page-dash')"><i class="ph-bold ph-clock-counter-clockwise"></i>HISTORIAL</button>
        <button class="nav-btn" id="n-units" onclick="go('page-units')"><i class="ph-bold ph-plus-circle"></i>NUEVA</button>
        <button class="nav-btn" id="n-data" onclick="go('page-data')"><i class="ph-bold ph-chart-bar"></i>DATA</button>
    </nav>

    <script>
        let db = JSON.parse(localStorage.getItem('twins_v50_db')) || [];

        const CONDUCTORES = ["TAJHO", "ROMARIO", "CESAR C.", "LUIS H.", "WALDIR", "MARCELO"];
        const AUXILIARES = ["CRISTOPHER", "PERCY", "PLACIDO", "RODOLFO", "RICARDO", "ELIO", "JOFER", "MARTIN", "NELSON"];

        // BUSCADOR Y RENDERIZADO DE HISTORIAL
        function renderSmartHistory() {
            const query = document.getElementById('main-search').value.toLowerCase();
            const cont = document.getElementById('smart-history');
            
            let filtered = db.filter(r => {
                const matchGeneral = r.chofer.toLowerCase().includes(query) || 
                                   r.placa.toLowerCase().includes(query) || 
                                   r.auxiliar.toLowerCase().includes(query);
                const matchCliente = r.items.some(i => i.cli.toLowerCase().includes(query));
                return matchGeneral || matchCliente;
            });

            // Actualizar Stats de Búsqueda
            document.getElementById('stat-fil-cajas').innerText = filtered.reduce((a,b) => a + b.items.reduce((x,y)=>x+y.can,0), 0);
            document.getElementById('stat-fil-envios').innerText = filtered.reduce((a,b) => a + b.items.length, 0) + " CLIENTES";

            cont.innerHTML = filtered.map(r => `
                <div class="route-card">
                    <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                        <div>
                            <b style="font-size:16px;">${r.placa}</b>
                            <div style="font-size:11px; color:var(--text-dim); font-weight:700;">${r.chofer} | ${r.auxiliar}</div>
                        </div>
                        <div style="text-align:right;">
                            <span style="font-size:10px; display:block; opacity:0.6;">${r.fecha}</span>
                            <b style="font-size:16px;">${r.items.reduce((a,b)=>a+b.can,0)} CJS</b>
                        </div>
                    </div>
                    <div style="margin-top:10px; font-size:11px; color:var(--text-dim); border-top:1px solid #f3f4f6; padding-top:8px;">
                        ${r.items.map(i => i.cli).slice(0,3).join(', ')}${r.items.length > 3 ? '...' : ''}
                    </div>
                </div>
            `).join('') || '<p style="text-align:center; color:gray; margin-top:20px;">No se encontraron resultados.</p>';
        }

        // SECCIÓN DATA: RANKINGS
        function renderData() {
            const m = document.getElementById('f-month').value || new Date().toISOString().substring(0,7);
            let filt = db.filter(r => r.fecha.startsWith(m));
            
            let cStats = {}, aStats = {};
            filt.forEach(r => {
                let cjs = r.items.reduce((a,b)=>a+b.can,0);
                cStats[r.chofer] = cStats[r.chofer] || {cjs:0, cls:0};
                cStats[r.chofer].cjs += cjs; cStats[r.chofer].cls += r.items.length;
                aStats[r.auxiliar] = aStats[r.auxiliar] || {cjs:0, r:0};
                aStats[r.auxiliar].cjs += cjs; aStats[r.auxiliar].r++;
            });

            const draw = (data, targetId, isAux = false) => {
                let sorted = Object.entries(data).sort((a,b) => b[1].cjs - a[1].cjs).slice(0,5);
                let maxCjs = sorted[0] ? sorted[0][1].cjs : 1;
                document.getElementById(targetId).innerHTML = sorted.map(([name, val], i) => {
                    let perc = (val.cjs / maxCjs) * 100;
                    return `
                    <div class="rank-item">
                        <div class="rank-pos ${i<3 ? 'pos-'+(i+1) : ''}">${i+1}</div>
                        <div class="rank-info">
                            <div style="display:flex; justify-content:space-between; font-size:13px; font-weight:700;">
                                <span>${name}</span><span>${val.cjs} CJS</span>
                            </div>
                            <div class="rank-bar-bg"><div class="rank-bar-fill" style="width:${perc}%"></div></div>
                            <div style="font-size:10px; font-weight:800; color:var(--text-dim); margin-top:4px;">
                                ${isAux ? val.r + ' RUTAS' : val.cls + ' CLIENTES'}
                            </div>
                        </div>
                    </div>`;
                }).join('') || '<p style="font-size:12px;color:gray">Sin datos este mes.</p>';
            };

            draw(cStats, 'rank-choferes-list');
            draw(aStats, 'rank-auxiliares-list', true);
        }

        // UTILIDADES
        function injectFakeData() {
            let fake = [];
            for(let i=0; i<15; i++) {
                let d = new Date(); d.setDate(d.getDate() - i);
                fake.push({
                    id: 'F'+i, fecha: d.toISOString().split('T')[0], placa: "BPN-711",
                    chofer: CONDUCTORES[Math.floor(Math.random()*CONDUCTORES.length)],
                    auxiliar: AUXILIARES[Math.floor(Math.random()*AUXILIARES.length)],
                    items: [{cli: "CLIENTE X", can: 50}, {cli: "CLIENTE Y", can: 30}]
                });
            }
            db = fake; renderSmartHistory(); renderData(); renderStats();
        }

        function renderStats() {
            const hoy = new Date().toISOString().split('T')[0];
            const rHoy = db.filter(r => r.fecha === hoy);
            document.getElementById('stat-hoy-cajas').innerText = rHoy.reduce((a,b)=>a+b.items.reduce((x,y)=>x+y.can,0),0);
            document.getElementById('stat-hoy-envios').innerText = rHoy.reduce((a,b)=>a+b.items.length, 0) + " CLI";
        }

        function go(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(n => n.classList.remove('active'));
            document.getElementById('n-' + id.split('-')[1]).classList.add('active');
            if(id === 'page-data') renderData();
        }

        window.onload = () => {
            document.getElementById('f-month').value = new Date().toISOString().substring(0,7);
            if(db.length === 0) injectFakeData();
            renderSmartHistory(); renderStats();
            
            // Render de unidades para nueva carga
            const ug = document.getElementById('units-grid');
            ["CEP-929", "BPN-711", "BVN-704", "BUL-742", "BVN-930"].forEach(p => {
                ug.innerHTML += `<div style="background:#fff; padding:20px; border-radius:18px; text-align:center; font-weight:800; border:1px solid var(--border); shadow:var(--shadow)">${p}</div>`;
            });
        };
    </script>
</body>
</html>
