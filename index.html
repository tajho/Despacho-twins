<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TWINS ELITE - V65.0 OFFICIAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root {
            --bg: #f4f6f8; --surface: #ffffff; --accent: #000000; 
            --text: #111827; --text-dim: #6b7280; --border: #e5e7eb; 
            --gold: #FFD700; --silver: #C0C0C0; --green: #10b981; --red: #ef4444;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { margin: 0; background: var(--bg); color: var(--text); padding-bottom: 100px; overflow-x: hidden; }

        /* --- LOGIN --- */
        #page-login { position: fixed; inset: 0; background: #fff; z-index: 5000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; }
        .login-card { width: 100%; max-width: 350px; text-align: center; }
        .user-sel { width: 100%; padding: 20px; margin-bottom: 12px; border-radius: 20px; border: 1px solid var(--border); background: #fff; font-weight: 800; display: flex; align-items: center; gap: 15px; transition: 0.2s; cursor: pointer; }
        .user-sel:active { background: #f0f0f0; transform: scale(0.98); }
        .badge-admin { background: #000; color: #fff; font-size: 9px; padding: 2px 8px; border-radius: 10px; margin-left: auto; }

        /* --- ESTRUCTURA --- */
        .page { display: none; padding: 20px; max-width: 600px; margin: 0 auto; animation: fade 0.2s ease; }
        .active { display: block; }
        @keyframes fade { from { opacity: 0; } to { opacity: 1; } }

        /* --- DASHBOARD --- */
        .core-dash { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .master-card { background: #fff; padding: 18px; border-radius: 24px; border: 1px solid var(--border); display: flex; flex-direction: column; justify-content: space-between; height: 120px; }
        .master-card.black { background: #000; color: #fff; border: none; }
        .stat-label { font-size: 10px; font-weight: 800; text-transform: uppercase; opacity: 0.6; }
        .stat-main { font-size: 28px; font-weight: 900; line-height: 1; }
        .stat-sub { font-size: 11px; font-weight: 800; margin-top: 10px; padding-top: 8px; border-top: 1px solid rgba(150,150,150,0.2); }

        /* --- CARDS & BUSQUEDA --- */
        .search-box { position: relative; margin-bottom: 20px; }
        .search-box input { width: 100%; padding: 16px 20px 16px 50px; background: #fff; border: 1px solid var(--border); border-radius: 18px; font-weight: 700; outline: none; }
        .search-box i { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); font-size: 20px; color: var(--text-dim); }
        .route-card { background: #fff; border-radius: 24px; padding: 20px; margin-bottom: 15px; border: 1px solid var(--border); }
        .card-crew { font-size: 11px; font-weight: 700; color: #4b5563; margin-top: 12px; padding: 12px; background: #f9fafb; border-radius: 15px; }

        /* --- CARGA --- */
        .truck-load-header { background: #000; color: #fff; padding: 25px; border-radius: 28px; margin-bottom: 20px; }
        .truck-progress-bg { height: 8px; background: rgba(255,255,255,0.15); border-radius: 10px; margin-top: 15px; }
        .truck-progress-fill { height: 100%; background: var(--green); border-radius: 10px; transition: width 0.5s ease; width: 0%; }

        /* --- UI ELEMENTS --- */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); display: none; align-items: flex-end; z-index: 2000; }
        .modal-content { background: #fff; width: 100%; border-radius: 35px 35px 0 0; padding: 30px 20px; max-height: 85vh; overflow-y: auto; }
        .nav-bottom { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; height: 85px; display: flex; border-top: 1px solid var(--border); z-index: 1000; }
        .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #9ca3af; background: none; border: none; font-size: 10px; font-weight: 800; }
        .nav-btn.active { color: #000; }
        .field { background: #fff; border: 1px solid var(--border); border-radius: 16px; padding: 16px; width: 100%; font-size: 15px; font-weight: 700; outline: none; margin-bottom: 12px; }
        
        .sync-loader { position: fixed; top: 20px; right: 20px; background: #000; color: #fff; padding: 8px 15px; border-radius: 20px; font-size: 10px; font-weight: 800; display: none; z-index: 6000; }
    </style>
</head>
<body>

    <div id="sync-status" class="sync-loader">SINCRONIZANDO...</div>

    <div id="page-login">
        <div class="login-card">
            <i class="ph-bold ph-shield-check" style="font-size: 60px; margin-bottom: 10px;"></i>
            <h1 style="font-weight: 900; margin: 0;">Twins Elite</h1>
            <p style="color: var(--text-dim); font-weight: 700; margin-bottom: 40px;">Acceso de Almacén</p>
            
            <div class="user-sel" onclick="login('TAJHO')">
                <i class="ph-bold ph-user-circle-gear"></i> TAJHO <span class="badge-admin">ADMIN</span>
            </div>
            <div class="user-sel" onclick="login('FRANCHESCO')">
                <i class="ph-bold ph-user-circle"></i> FRANCHESCO
            </div>
            <div class="user-sel" onclick="login('OSCAR')">
                <i class="ph-bold ph-user-circle"></i> OSCAR
            </div>
            <div class="user-sel" onclick="login('LUIS HERBER')">
                <i class="ph-bold ph-user-circle"></i> LUIS HERBER
            </div>
        </div>
    </div>

    <div id="page-units" class="page">
        <h1 style="font-weight:900; margin-bottom:20px;">Despacho</h1>
        <div id="units-grid" style="display:grid; grid-template-columns:1fr 1fr; gap:15px;"></div>
    </div>

    <div id="page-dash" class="page">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h1 style="font-weight:900; margin:0;">Historial</h1>
            <span id="user-tag" style="font-size:10px; font-weight:800; background:#eee; padding:5px 12px; border-radius:20px;">---</span>
        </div>
        <div class="core-dash">
            <div class="master-card black">
                <div><span class="stat-label">Hoy</span><br><span id="stat-hoy-cajas" class="stat-main">0</span></div>
                <span id="stat-hoy-envios" class="stat-sub">0 CLIENTES</span>
            </div>
            <div class="master-card">
                <div><span class="stat-label">Este Mes</span><br><span id="stat-mes-cajas" class="stat-main">0</span></div>
                <span id="stat-mes-envios" class="stat-sub">0 CLIENTES</span>
            </div>
        </div>
        <div class="search-box">
            <i class="ph-bold ph-magnifying-glass"></i>
            <input type="text" id="smart-search" placeholder="Buscar cliente o placa..." onkeyup="renderHistory()">
        </div>
        <div id="hist-cont"></div>
    </div>

    <div id="page-load" class="page">
        <div class="truck-load-header">
            <div style="display:flex; justify-content:space-between; align-items:center;"><span style="font-size:10px; font-weight:800; opacity:0.7;">CARGANDO UNIDAD</span><b id="load-perc-txt" style="font-size:12px; color:var(--green);">0%</b></div>
            <div style="display:flex; justify-content:space-between; align-items:flex-end; margin-top:5px;"><h2 id="load-placa-txt" style="margin:0; font-size:32px; font-weight:900;">---</h2><div><span style="font-size:24px; font-weight:900;" id="load-total">0</span> <small style="opacity:0.6; font-size:10px;">/ 150</small></div></div>
            <div class="truck-progress-bg"><div id="load-bar" class="truck-progress-fill"></div></div>
        </div>
        <div style="display:flex; gap:10px; margin-bottom:15px;">
            <input type="text" id="i-cli" placeholder="Cliente" class="field" style="flex:2; margin:0">
            <input type="number" id="i-can" placeholder="Cant." class="field" style="flex:1; margin:0">
        </div>
        <button onclick="addItem()" style="width:100%; padding:20px; background:#000; color:#fff; border-radius:20px; font-weight:800; border:none; cursor:pointer;">AÑADIR A LISTA</button>
        <div id="load-list" style="margin-top:20px;"></div>
        <button id="btn-save" onclick="save()" style="display:none; width:100%; padding:22px; background:var(--green); color:#fff; border-radius:22px; font-weight:900; border:none; margin-top:20px; cursor:pointer;">FINALIZAR Y SUBIR AL EXCEL</button>
    </div>

    <div id="page-config" class="page">
        <div style="background:#000; color:#fff; padding:30px; border-radius:30px; margin-bottom:25px; text-align:center;"><h2 id="conf-placa" style="margin:0; font-size:36px;">---</h2></div>
        <label style="font-size:10px; font-weight:800; margin-left:10px;">FECHA DE RUTA</label>
        <input type="date" id="c-fecha" class="field">
        <label style="font-size:10px; font-weight:800; margin-left:10px;">CONDUCTOR</label>
        <select id="c-chofer" class="field"></select>
        <label style="font-size:10px; font-weight:800; margin-left:10px;">AUXILIAR</label>
        <select id="c-aux" class="field"></select>
        <button onclick="goLoad()" style="width:100%; padding:20px; background:#000; color:#fff; border-radius:20px; font-weight:800; border:none; margin-top:10px;">INICIAR CARGA</button>
    </div>

    <nav id="navbar" class="nav-bottom" style="display:none;">
        <button class="nav-btn" onclick="go('page-units')"><i class="ph-bold ph-plus-circle"></i>NUEVA</button>
        <button class="nav-btn" onclick="go('page-dash')"><i class="ph-bold ph-clock-counter-clockwise"></i>HISTORIAL</button>
    </nav>

    <script>
        // --- CONFIGURACIÓN ---
        const CLOUD_URL = "https://script.google.com/macros/s/AKfycbw4OYM62wblduBDeC5CvqI_srCA372l63Yhy1SzMYk6SHNNOM2_GC9FXIbAb9Ufv3na/exec";
        
        let db = JSON.parse(localStorage.getItem('twins_v65_db')) || [];
        let cur = { items: [] };
        let currentUser = "";

        const FLOTA = { "CEP-929": "ROMARIO", "BPN-711": "CESAR C.", "BVN-704": "LUIS H.", "BUL-742": "WALDIR", "BVN-930": "MARCELO" };
        const CONDUCTORES = ["TAJHO", "ROMARIO", "CESAR C.", "LUIS H.", "WALDIR", "MARCELO"];
        const AUXILIARES = ["CRISTOPHER", "PERCY", "PLACIDO", "RODOLFO", "RICARDO", "ELIO", "JOFER", "MARTIN", "NELSON"];

        function login(user) {
            currentUser = user;
            document.getElementById('page-login').style.display = 'none';
            document.getElementById('navbar').style.display = 'flex';
            document.getElementById('user-tag').innerText = "👤 " + user;
            go('page-dash');
            pullCloudData();
        }

        window.onload = () => {
            const ug = document.getElementById('units-grid');
            for(let p in FLOTA) ug.innerHTML += `<div style="background:#fff; padding:25px; border-radius:24px; text-align:center; border:1px solid var(--border);" onclick="initConf('${p}')"><i class="ph-bold ph-truck" style="font-size:28px;"></i><br><b>${p}</b></div>`;
            const sc = document.getElementById('c-chofer'), sa = document.getElementById('c-aux');
            CONDUCTORES.forEach(c => sc.innerHTML += `<option value="${c}">${c}</option>`);
            AUXILIARES.forEach(a => sa.innerHTML += `<option value="${a}">${a}</option>`);
        };

        // FUNCIÓN CORREGIDA PARA GUARDAR EN GOOGLE
        async function syncCloud(data) {
            document.getElementById('sync-status').style.display = 'block';
            try {
                await fetch(CLOUD_URL, {
                    method: 'POST',
                    mode: 'no-cors', // Necesario para Google Apps Script
                    cache: 'no-cache',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                console.log("Datos enviados a Google");
                setTimeout(() => document.getElementById('sync-status').style.display = 'none', 2000);
            } catch (e) {
                console.error("Error de sincronización:", e);
                alert("Error al conectar con Excel. Revisa tu internet.");
            }
        }

        async function pullCloudData() {
            try {
                const response = await fetch(CLOUD_URL);
                const cloudDb = await response.json();
                if(cloudDb && cloudDb.length > 0) {
                    db = cloudDb;
                    localStorage.setItem('twins_v65_db', JSON.stringify(db));
                    renderHistory();
                    renderStats();
                }
            } catch (e) { console.log("Usando base de datos local"); }
        }

        function go(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'page-dash') { renderStats(); renderHistory(); }
        }

        function renderStats() {
            const hoy = new Date().toISOString().split('T')[0];
            const rHoy = db.filter(r => r.fecha === hoy);
            const rMes = db.filter(r => r.fecha.startsWith(hoy.substring(0,7)));
            const sumCjs = (arr) => arr.reduce((a,b) => a + b.items.reduce((x,y)=>x+y.can,0), 0);
            document.getElementById('stat-hoy-cajas').innerText = sumCjs(rHoy);
            document.getElementById('stat-hoy-envios').innerText = rHoy.length + " RUTAS";
            document.getElementById('stat-mes-cajas').innerText = sumCjs(rMes);
            document.getElementById('stat-mes-envios').innerText = rMes.length + " RUTAS";
        }

        function initConf(p) {
            cur = { 
                id: 'R' + Date.now(), 
                placa: p, 
                items: [], 
                fecha: new Date().toISOString().split('T')[0], 
                chofer: FLOTA[p], 
                auxiliar: AUXILIARES[0], 
                registradoPor: currentUser 
            };
            document.getElementById('conf-placa').innerText = p;
            document.getElementById('c-fecha').value = cur.fecha;
            document.getElementById('c-chofer').value = cur.chofer;
            document.getElementById('c-aux').value = cur.auxiliar;
            go('page-config');
        }

        function goLoad() {
            cur.fecha = document.getElementById('c-fecha').value;
            cur.chofer = document.getElementById('c-chofer').value;
            cur.auxiliar = document.getElementById('c-aux').value;
            document.getElementById('load-placa-txt').innerText = cur.placa;
            refreshLoad(); go('page-load');
        }

        function addItem() {
            const cli = document.getElementById('i-cli').value.toUpperCase().trim();
            const can = parseInt(document.getElementById('i-can').value);
            if(cli && can) {
                cur.items.push({cli, can});
                document.getElementById('i-cli').value="";
                document.getElementById('i-can').value="";
                refreshLoad();
            }
        }

        function refreshLoad() {
            const total = cur.items.reduce((a,b)=>a+b.can, 0);
            const perc = Math.min((total / 150) * 100, 100).toFixed(0);
            document.getElementById('load-total').innerText = total;
            document.getElementById('load-perc-txt').innerText = perc + "%";
            document.getElementById('load-bar').style.width = perc + "%";
            document.getElementById('btn-save').style.display = total > 0 ? 'block' : 'none';
            document.getElementById('load-list').innerHTML = cur.items.map((it, i) => `
                <div style="display:flex; justify-content:space-between; padding:15px; background:#fff; border-radius:15px; border:1px solid #eee; margin-bottom:10px; font-weight:700;">
                    <span>${it.cli}</span>
                    <b>${it.can} CJS</b>
                </div>`).reverse().join('');
        }

        function save() {
            // Guardar localmente
            db.unshift(cur);
            localStorage.setItem('twins_v65_db', JSON.stringify(db));
            
            // Enviar a la nube (Google Excel)
            syncCloud(cur);
            
            // Volver al inicio
            go('page-dash');
        }

        function renderHistory() {
            const q = document.getElementById('smart-search').value.toLowerCase();
            let filt = db.filter(r => r.placa.toLowerCase().includes(q) || r.items.some(i => i.cli.toLowerCase().includes(q)));
            document.getElementById('hist-cont').innerHTML = filt.map(r => `
                <div class="route-card">
                    <div style="display:flex; justify-content:space-between; font-size:10px; font-weight:800; color:var(--text-dim);"><span>📅 ${r.fecha}</span><span>${r.placa}</span></div>
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-top:5px;">
                        <b style="font-size:24px;">${r.items.reduce((a,b)=>a+b.can,0)} CJS</b>
                        <b style="color:var(--text-dim); font-size:12px;">${r.items.length} CLIENTES</b>
                    </div>
                    <div class="card-crew">👤 ${r.chofer} | 👥 ${r.auxiliar}</div>
                </div>`).join('');
        }
    </script>
</body>
</html>
