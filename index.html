<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TWINS DESPACHOS - OFFICIAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root {
            --bg: #05070a; --surface: #0f1218;
            --accent: #0066ff; --text: #ffffff; --text-dim: #94a3b8;
            --border: #1e293b; --success: #10b981; --warning: #f59e0b; --danger: #ef4444;
        }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; outline: none; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; }
        
        .page { display: none; padding: 15px 15px 120px 15px; max-width: 500px; margin: 0 auto; }
        .active { display: block !important; }

        .top-header { position: sticky; top: 0; z-index: 1000; background: rgba(5, 7, 10, 0.9); backdrop-filter: blur(10px); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 16px; margin-bottom: 15px; }
        
        /* Nav Estilo Corregido */
        .nav-bar { position: fixed; bottom: 20px; left: 15px; right: 15px; background: rgba(22, 27, 34, 0.95); backdrop-filter: blur(15px); height: 70px; border-radius: 22px; display: flex; border: 1px solid rgba(255,255,255,0.08); z-index: 2000; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-dim); background: none; border: none; font-size: 10px; font-weight: 700; position: relative; }
        .nav-item.active { color: var(--accent); }
        .nav-ind { position: absolute; top: 0; width: 25px; height: 3px; background: var(--accent); border-radius: 0 0 5px 5px; box-shadow: 0 2px 8px var(--accent); transition: 0.3s; }

        .stat-banner { background: linear-gradient(135deg, #0052cc, #003399); padding: 22px; border-radius: 24px; color: white; display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .stat-val { font-size: 38px; font-weight: 800; }
        
        input, select { background: #1a1f26; border: 1px solid var(--border); padding: 15px; border-radius: 14px; color: white; font-size: 15px; width: 100%; margin-bottom: 10px; }
        .btn { border: none; border-radius: 14px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-add { background: var(--accent); color: white; padding: 15px; }
        .btn-save { background: var(--success); color: white; padding: 18px; width: 100%; font-size: 16px; margin-bottom: 10px; }

        .history-card { border-left: 4px solid var(--accent); padding: 12px; margin-bottom: 12px; }
        .history-detail { display: none; background: #05070a; padding: 10px; border-radius: 10px; margin-top: 10px; font-size: 12px; border: 1px dashed var(--border); }
        .show { display: block !important; }
    </style>
</head>
<body>

    <header id="app-header" class="top-header" style="display:none">
        <div style="font-weight:900;">TWINS <span style="color:var(--accent)">DESPACHOS</span></div>
        <div id="user-info" onclick="logout()" style="font-size:11px; font-weight:800; background:var(--border); padding:8px 15px; border-radius:20px;">---</div>
    </header>

    <div id="page-login" class="page active">
        <div style="text-align:center; padding:50px 0"><i class="ph-fill ph-package" style="font-size:80px; color:var(--accent)"></i><h2>BIENVENIDO</h2></div>
        <div id="login-options" style="display:grid; gap:12px"></div>
    </div>

    <div id="page-route" class="page">
        <div class="stat-banner">
            <div><div style="font-size:11px; opacity:0.8; font-weight:700">CARGA ACTUAL</div><div id="count-cajas" class="stat-val">0</div></div>
            <div style="text-align:right"><div style="font-size:11px; opacity:0.8; font-weight:700">PUNTOS</div><div id="count-puntos" style="font-size:24px; font-weight:800">0</div><button onclick="clearAll()" style="background:rgba(255,255,255,0.15); border:none; color:white; padding:5px 10px; border-radius:8px; font-size:10px; margin-top:5px">RESET</button></div>
        </div>
        <div class="card">
            <input type="text" id="inp-cli" placeholder="Cliente">
            <div style="display:flex; gap:10px">
                <input type="number" id="inp-can" placeholder="Cajas" style="flex:0.5">
                <button class="btn btn-add" onclick="addPoint()" style="flex:1.5">AÑADIR</button>
            </div>
        </div>
        <div id="list-container" style="display:none">
            <div id="live-list" style="margin-bottom:15px"></div>
            <div class="card">
                <select id="sel-pla" onchange="predictAndSave()"></select>
                <div style="display:flex; gap:10px"><select id="sel-cho" onchange="persist()"></select><select id="sel-aux" onchange="persist()"></select></div>
                <button class="btn btn-save" onclick="openConfirm()">GUARDAR DESPACHO</button>
            </div>
        </div>
    </div>

    <div id="page-history" class="page">
        <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:10px; margin-bottom:15px">
            <div class="card" style="margin:0; text-align:center; padding:10px"><small>HOY</small><div id="st-day" style="font-weight:800; color:var(--accent)">0</div></div>
            <div class="card" style="margin:0; text-align:center; padding:10px"><small>MES CJ</small><div id="st-month" style="font-weight:800">0</div></div>
            <div class="card" style="margin:0; text-align:center; padding:10px"><small>PTS</small><div id="st-pts" style="font-weight:800; color:var(--success)">0</div></div>
        </div>
        <input type="date" id="filter-date" onchange="renderHistory()">
        <div id="history-feed"></div>
    </div>

    <div id="page-fleet" class="page"><div id="fleet-grid"></div></div>

    <div id="page-stats" class="page">
        <div class="card"><canvas id="c-cho" style="height:200px"></canvas></div>
        <button class="btn" style="background:var(--danger); color:white; width:100%; padding:15px" onclick="generatePDF()">DESCARGAR REPORTE PDF</button>
    </div>

    <nav id="app-nav" class="nav-bar" style="display:none">
        <div id="nav-ind" class="nav-ind"></div>
        <button class="nav-item active" id="n-route" onclick="go('page-route', 0)"><i class="ph ph-article"></i>HOJA</button>
        <button class="nav-item" id="n-history" onclick="go('page-history', 1)"><i class="ph ph-clock-counter-clockwise"></i>DATA</button>
        <button class="nav-item" id="n-fleet" onclick="go('page-fleet', 2)"><i class="ph ph-truck"></i>FLOTA</button>
        <button class="nav-item" id="n-stats" style="display:none" onclick="go('page-stats', 3)"><i class="ph ph-chart-bar"></i>STATS</button>
    </nav>

    <div id="modal-confirm" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:3000; align-items:center; justify-content:center; padding:20px;">
        <div class="card" style="width:100%; max-width:350px; text-align:center">
            <h3>Confirmar Salida</h3>
            <button class="btn btn-save" onclick="finalize('HOY')">SALIENDO AHORA</button>
            <button class="btn" style="background:var(--border); color:white; width:100%; padding:15px; margin-bottom:10px" onclick="finalize('MAÑANA')">PROGRAMAR MAÑANA</button>
            <button onclick="closeConfirm()" style="background:none; border:none; color:var(--text-dim); margin-top:10px">CANCELAR</button>
        </div>
    </div>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbxCRMbdOGYjf0R-w1v9tHG76jDhHXxuXOwHahYEV7Gj1lFn3y42C2s9DUO5nkgO75qy/exec";
        let activeUser = "", currentCarga = [], db = [], editIdx = null;

        const DATA = {
            placas: ["CEP-929", "BPN-711", "BVN-704", "BUL-742", "BVN-930"],
            choferes: ["TAJHO", "LUIS H.", "ROMARIO", "CESAR C.", "WALDIR", "MARCELO"],
            auxiliares: ["Cristopher", "Plácido", "Martin", "Percy", "Rodolfo", "Ricardo", "Elio", "Daniel C.", "Jofer", "Nelson", "Julio"],
            soats: { "CEP-929": "2026-07-22", "BPN-711": "2026-06-10", "BVN-704": "2026-07-02", "BUL-742": "2026-04-02", "BVN-930": "2026-07-02" }
        };

        window.onload = () => {
            setupUI();
            const savedUser = localStorage.getItem('tw_logged');
            if(savedUser) login(savedUser);
            if(localStorage.getItem('tw_temp_carga')) {
                currentCarga = JSON.parse(localStorage.getItem('tw_temp_carga'));
                refreshCargaUI();
                document.getElementById('sel-pla').value = localStorage.getItem('tw_temp_pla') || "";
                document.getElementById('sel-cho').value = localStorage.getItem('tw_temp_cho') || "";
                document.getElementById('sel-aux').value = localStorage.getItem('tw_temp_aux') || "";
            }
            syncData();
        };

        function setupUI() {
            const grid = document.getElementById('login-options');
            ['TAJHO ADMIN', 'FRANCESCO', 'OSCAR', 'LUIS HERBER'].forEach(u => grid.innerHTML += `<button class="btn" style="background:var(--surface); border:1px solid var(--border); color:white; padding:18px" onclick="login('${u}')">${u}</button>`);
            document.getElementById('sel-pla').innerHTML = '<option value="">Unidad</option>' + DATA.placas.map(p => `<option value="${p}">${p}</option>`).join('');
            document.getElementById('sel-cho').innerHTML = '<option value="">Chofer</option>' + DATA.choferes.map(c => `<option value="${c}">${c}</option>`).join('');
            document.getElementById('sel-aux').innerHTML = '<option value="">Auxiliar</option>' + DATA.auxiliares.map(a => `<option value="${a}">${a}</option>`).join('');
            document.getElementById('filter-date').value = new Date().toLocaleDateString('en-CA');
        }

        async function syncData() {
            try {
                const res = await fetch(API);
                db = await res.json();
                localStorage.setItem('tw_db', JSON.stringify(db));
                renderHistory(); renderFleet();
            } catch(e) {
                db = JSON.parse(localStorage.getItem('tw_db') || "[]");
                renderHistory(); renderFleet();
            }
        }

        function addPoint() {
            const cli = document.getElementById('inp-cli').value.toUpperCase();
            const can = parseInt(document.getElementById('inp-can').value);
            if(!cli || !can) return;
            currentCarga.push({ cli, can });
            document.getElementById('inp-cli').value = ""; document.getElementById('inp-can').value = "";
            persist(); refreshCargaUI();
        }

        function refreshCargaUI() {
            const container = document.getElementById('live-list');
            let total = 0; container.innerHTML = "";
            currentCarga.forEach((item, i) => {
                total += item.can;
                container.innerHTML += `<div class="card" style="padding:10px; margin-bottom:5px; display:flex; justify-content:space-between"><span>${item.can} CJ - ${item.cli}</span><i class="ph ph-trash" style="color:var(--danger)" onclick="removePoint(${i})"></i></div>`;
            });
            document.getElementById('count-cajas').innerText = total;
            document.getElementById('count-puntos').innerText = currentCarga.length;
            document.getElementById('list-container').style.display = currentCarga.length > 0 ? 'block' : 'none';
        }

        function removePoint(i) { currentCarga.splice(i,1); persist(); refreshCargaUI(); }

        function renderHistory() {
            const container = document.getElementById('history-feed');
            const selDate = document.getElementById('filter-date').value;
            let h = "", dTotal = 0, mTotal = 0, mPts = 0;
            const now = new Date(selDate + "T12:00:00");

            db.forEach((r, i) => {
                const rD = new Date(r.fecha + "T12:00:00");
                const pts = r.puntos || r.items.split(',').length;
                if(rD.getMonth() === now.getMonth()) { mTotal += parseFloat(r.total); mPts += pts; }
                if(r.fecha === selDate) {
                    dTotal += parseFloat(r.total);
                    h += `<div class="card history-card">
                        <div style="display:flex; justify-content:space-between; font-size:11px; color:var(--accent); font-weight:800"><span>${r.hora}</span><span>${r.placa}</span></div>
                        <div style="font-weight:700; margin:5px 0">${r.total} CJ en ${pts} Puntos</div>
                        <div style="font-size:11px; opacity:0.6">${r.chofer} / ${r.auxiliar}</div>
                        <div id="det-${i}" class="history-detail">${r.items.split(',').join('<br>')}</div>
                        <div style="display:flex; gap:8px; margin-top:10px">
                            <button class="btn" style="flex:1; background:var(--accent); font-size:11px; color:white" onclick="toggleDet(${i})">RUTA</button>
                            <button class="btn" style="background:var(--border); width:45px" onclick="loadEdit(${i})"><i class="ph ph-pencil"></i></button>
                            <button class="btn" style="background:#25D366; width:45px; color:white" onclick="shareWA('${r.placa}','${r.total}','${r.items}')"><i class="ph-fill ph-whatsapp-logo"></i></button>
                        </div>
                    </div>`;
                }
            });
            container.innerHTML = h || `<p style="text-align:center; opacity:0.3; margin-top:30px">Sin datos</p>`;
            document.getElementById('st-day').innerText = dTotal;
            document.getElementById('st-month').innerText = mTotal;
            document.getElementById('st-pts').innerText = mPts;
        }

        function renderFleet() {
            document.getElementById('fleet-grid').innerHTML = DATA.placas.map(p => {
                const d = Math.ceil((new Date(DATA.soats[p]) - new Date()) / 86400000);
                return `<div class="card" style="display:flex; justify-content:space-between"><div><b>${p}</b><br><small>SOAT: ${DATA.soats[p]}</small></div><span style="color:${d<30?'var(--danger)':'var(--success)'}; font-weight:800">${d}d</span></div>`;
            }).join('');
        }

        async function finalize(tipo) {
            let f = new Date(); if(tipo === 'MAÑANA') f.setDate(f.getDate() + 1);
            const r = {
                fecha: f.toLocaleDateString('en-CA'),
                hora: new Date().toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' }),
                placa: document.getElementById('sel-pla').value,
                chofer: document.getElementById('sel-cho').value,
                auxiliar: document.getElementById('sel-aux').value,
                items: currentCarga.map(i => `${i.cli}: ${i.can}`).join(", "),
                total: currentCarga.reduce((a,b) => a + b.can, 0),
                puntos: currentCarga.length,
                operario: activeUser
            };
            fetch(API, { method: 'POST', mode: 'no-cors', body: JSON.stringify(r) });
            db.unshift(r); localStorage.setItem('tw_db', JSON.stringify(db));
            clearAll(); closeConfirm(); go('page-history', 1);
        }

        function loadEdit(i) {
            const r = db[i]; editIdx = i;
            currentCarga = r.items.split(", ").map(it => { const [cli, can] = it.split(": "); return { cli, can: parseInt(can) }; });
            document.getElementById('sel-pla').value = r.placa;
            document.getElementById('sel-cho').value = r.chofer;
            document.getElementById('sel-aux').value = r.auxiliar;
            refreshCargaUI(); go('page-route', 0);
        }

        function go(id, idx) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            const items = Array.from(document.querySelectorAll('.nav-item')).filter(i => i.style.display !== 'none');
            const realIdx = items.findIndex(i => i.id === 'n-' + id.split('-')[1]);
            document.getElementById('nav-ind').style.left = `calc(${realIdx * (100/items.length)}% + (${100/items.length}% - 25px) / 2)`;
            if(id === 'page-stats') drawCharts();
        }

        function login(u) { activeUser = u; localStorage.setItem('tw_logged', u); document.getElementById('page-login').classList.remove('active'); document.getElementById('app-header').style.display = 'flex'; document.getElementById('app-nav').style.display = 'flex'; document.getElementById('user-info').innerText = u; if(u === "TAJHO ADMIN") document.getElementById('n-stats').style.display = "flex"; go('page-route', 0); }
        function persist() { localStorage.setItem('tw_temp_carga', JSON.stringify(currentCarga)); localStorage.setItem('tw_temp_pla', document.getElementById('sel-pla').value); localStorage.setItem('tw_temp_cho', document.getElementById('sel-cho').value); localStorage.setItem('tw_temp_aux', document.getElementById('sel-aux').value); }
        function predictAndSave() { const l = db.find(r => r.placa === document.getElementById('sel-pla').value); if(l) { document.getElementById('sel-cho').value = l.chofer; document.getElementById('sel-aux').value = l.auxiliar; } persist(); }
        function toggleDet(i) { document.getElementById(`det-${i}`).classList.toggle('show'); }
        function shareWA(p, t, i) { window.location.href = `https://wa.me/?text=*📦 TWINS DESPACHOS*%0A*Placa:* ${p}%0A*Cajas:* ${t}%0A*Ruta:*%0A${i.split(", ").join("%0A")}`; }
        function logout() { localStorage.clear(); location.reload(); }
        function clearAll() { currentCarga = []; localStorage.removeItem('tw_temp_carga'); refreshCargaUI(); }
        function openConfirm() { document.getElementById('modal-confirm').style.display = 'flex'; }
        function closeConfirm() { document.getElementById('modal-confirm').style.display = 'none'; }
    </script>
</body>
</html>
